# ╔══════════════════════════════════════════════════════════════════╗
# ║  TMAX — Hierarchical leader-key tmux config                    ║
# ║  Leader: Shift+F12                                              ║
# ║                                                                  ║
# ║  Tree: Leader → key → key → ... → execute at leaf               ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Prefix key ────────────────────────────────────────────────────
unbind C-b
set -g prefix S-F12
bind S-F12 send-prefix

# ── General ───────────────────────────────────────────────────────
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g escape-time 0
set -g history-limit 3500
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -g set-clipboard on
set -g display-time 1500

# ── Status bar ────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=colour248"
set -g status-left "#[fg=colour214,bold] #S "
set -g status-left-length 20
set -g status-right ""
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour214,bold] #I:#W "

# ── Pane borders ──────────────────────────────────────────────────
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour214"

# ── Clipboard (vi mode) ──────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Helper: 3-pane layout (20%|40%|40%) ──────────────────────────
# Reused by tab/project bindings
bind-key L split-window -h -l 20% \; split-window -h -l 50% \; select-pane -t 1

# ══════════════════════════════════════════════════════════════════
# ║  LEADER KEY TREE                                                ║
# ║                                                                  ║
# ║  Branches show hints → press next key                           ║
# ║  Leaves execute immediately                                      ║
# ══════════════════════════════════════════════════════════════════

# ┌──────────────────────────────────────────────────────────────────
# │ Level 0: Root leaves (Leader → key = execute)
# └──────────────────────────────────────────────────────────────────

# Leader → a: pane left
bind a select-pane -L

# Leader → d: pane right
bind d select-pane -R

# Leader → q: close window (only if >1 window)
bind q if-shell '[ "$(tmux list-windows | wc -l)" -gt 1 ]' 'kill-window' ''

# Leader → p: project picker (fzf popup)
bind p display-popup -E -w 60% -h 60% '\
  dirs="$HOME/projects $HOME/dev"; \
  sel=$(find $dirs -mindepth 1 -maxdepth 1 -type d 2>/dev/null | fzf --layout=reverse --prompt="Project > "); \
  [ -n "$sel" ] && tmux new-window -c "$sel" -n "$(basename "$sel")" \; \
  run-shell "tmux split-window -h -l 20% -c \"$sel\" && tmux split-window -h -l 50% -c \"$sel\" && tmux select-pane -t 1"'

# Leader → e: edit last changed file
bind e run-shell '\
  f=$(cd "#{pane_current_path}" && git diff --name-only HEAD 2>/dev/null | head -1); \
  [ -z "$f" ] && f=$(cd "#{pane_current_path}" && ls -tp | grep -v "/$" | head -1); \
  tmux send-keys "nvim ${f:-.}" Enter'

# Leader → /: search in copy mode
bind / copy-mode \; send-keys /

# Leader → Space: quick file finder
bind Space display-popup -E -w 80% -h 80% \
  'sel=$(fd --type f | fzf --layout=reverse --prompt="Find > "); [ -n "$sel" ] && tmux send-keys "nvim $sel" Enter'

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: t → Tabs
# │   t:new  n:next  p:prev  1-6:goto
# └──────────────────────────────────────────────────────────────────

bind t switch-client -T tmax_tab \; display-message " [t]ab: t:new  n:next  p:prev  1-6:goto"

bind -T tmax_tab t new-window \; run-shell \
  'tmux split-window -h -l 20% && tmux split-window -h -l 50% && tmux select-pane -t 1'
bind -T tmax_tab n next-window
bind -T tmax_tab p previous-window
bind -T tmax_tab 1 select-window -t 1
bind -T tmax_tab 2 select-window -t 2
bind -T tmax_tab 3 select-window -t 3
bind -T tmax_tab 4 select-window -t 4
bind -T tmax_tab 5 select-window -t 5
bind -T tmax_tab 6 select-window -t 6

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: f → Find
# │   f:files  g:grep
# └──────────────────────────────────────────────────────────────────

bind f switch-client -T tmax_find \; display-message " [f]ind: f:files  g:grep"

bind -T tmax_find f display-popup -E -w 80% -h 80% \
  'sel=$(fd --type f | fzf --layout=reverse --prompt="Files > "); [ -n "$sel" ] && tmux send-keys "nvim $sel" Enter'
bind -T tmax_find g display-popup -E -w 80% -h 80% \
  'sel=$(rg --line-number . | fzf --layout=reverse --prompt="Grep > " | cut -d: -f1-2); [ -n "$sel" ] && tmux send-keys "nvim $sel" Enter'

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: r → Reset
# │   r:respawn  c:reload-config
# └──────────────────────────────────────────────────────────────────

bind r switch-client -T tmax_reset \; display-message " [r]eset: r:respawn  c:reload-config"

bind -T tmax_reset r respawn-window -k
bind -T tmax_reset c source-file ~/.tmux.conf \; display-message "Config reloaded"

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: c → Clear/Copy
# │   c:clear-all  y:copy-mode
# └──────────────────────────────────────────────────────────────────

bind c switch-client -T tmax_clear \; display-message " [c]lear: c:clear-all  y:copy-mode"

bind -T tmax_clear c run-shell \
  'for p in $(tmux list-panes -F "#{pane_id}"); do tmux send-keys -t "$p" C-l; done'
bind -T tmax_clear y copy-mode

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: w → Window/Pane management
# │   h:left  l:right  v:vsplit  s:hsplit  z:zoom  x:close
# └──────────────────────────────────────────────────────────────────

bind w switch-client -T tmax_window \; display-message " [w]indow: h:←  l:→  v:vsplit  s:hsplit  z:zoom  x:close"

bind -T tmax_window h select-pane -L
bind -T tmax_window l select-pane -R
bind -T tmax_window k select-pane -U
bind -T tmax_window j select-pane -D
bind -T tmax_window v split-window -h -c "#{pane_current_path}"
bind -T tmax_window s split-window -v -c "#{pane_current_path}"
bind -T tmax_window z resize-pane -Z
bind -T tmax_window x kill-pane

# ┌──────────────────────────────────────────────────────────────────
# │ Level 1 Branch: g → Git
# │   s:status  l:log  d:diff  b:branches  p:push  f:fetch
# └──────────────────────────────────────────────────────────────────

bind g switch-client -T tmax_git \; display-message " [g]it: s:status  l:log  d:diff  b:branches  p:push  f:fetch"

bind -T tmax_git s send-keys "git status" Enter
bind -T tmax_git l display-popup -E -w 80% -h 80% 'git log --oneline --graph --all | less -R'
bind -T tmax_git d send-keys "git diff" Enter
bind -T tmax_git b display-popup -E -w 60% -h 60% \
  'branch=$(git branch -a --format="%(refname:short)" | fzf --layout=reverse --prompt="Branch > "); \
  [ -n "$branch" ] && tmux send-keys "git checkout $branch" Enter'
bind -T tmax_git p send-keys "git push" Enter
bind -T tmax_git f send-keys "git fetch --all" Enter

# ── Non-prefix bindings ──────────────────────────────────────────

# Ctrl+_: cycle panes (no prefix needed)
bind -n C-_ select-pane -t :.+
