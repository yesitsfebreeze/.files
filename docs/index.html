ontains 4 modules: modules/pattern-syntax.md - Complete pattern syntax reference Meta-variable types Wildcard patterns String and regex matching Language-specific syntax modules/security-rules.md - Security scanning rule templates SQL injection detection XSS vulnerability patterns Hardcoded secret detection Insecure dependency checks OWASP Top 10 coverage modules/refactoring-patterns.md - Common refactoring patterns API migration patterns Function/method renaming Code modernization Design pattern applications Multi-file transformations modules/language-specific.md - Language-specific patterns Python patterns (decorators, context managers, etc.) JavaScript/TypeScript patterns (React hooks, async/await, etc.) Go patterns (error handling, interfaces, etc.) Rust patterns (macros, traits, etc.) the machine Integration Tool Registry Registration : internal/hook/registry.go as AST_ANALYZER type Permissions : Auto-allowed for Bash(sg:*) and Bash(ast-grep:*) Hooks : PostToolUse hook for automatic security scanning Running Scans # Scan with the machine rules sg scan --config sgconfig.yml # Scan specific directory sg scan --config sgconfig.yml src/ # JSON output for CI/CD sg scan --config sgconfig.yml --json > results.json Community & Support GitHub Discussions : https://github.com/ast-grep/ast-grep/discussions Q&A threads Pattern sharing Community rules Discord Server : https://discord.gg/HuWxGYW6Pc Real-time chat Pattern help Feature discussions Twitter : https://twitter.com/ast_grep Updates and tips Pattern examples Community highlights Related Tools Complementary Tools ripgrep (rg) : https://github.com/BurntSushi/ripgrep Fast text search Regex-based filtering grep.app : https://grep.app Code search across GitHub Pattern discovery GitHub Code Search : https://cs.github.com Large-scale code search Cross-repository patterns Related Skills workflow-testing - DDD integration, test pattern detection foundation-quality - five-dimension quality gate, code quality rust-best-practices - idiomatic Rust patterns for structural rules Related Agents expert-refactoring - AST-based large-scale refactoring expert-security - Security vulnerability scanning manager-quality - Code complexity analysis expert-debug - Pattern-based debugging Books & Resources Refactoring : Martin Fowler Classic refactoring patterns Code smells identification Clean Code : Robert C. Martin Code quality principles Best practices Design Patterns : Gang of Four Pattern implementations Structural improvements Last Updated : 2026-01-06 Skill Version : 1.0.0 Total Modules : 4 Supported Languages : 40+"},{"id":".claude/skills/trello/SKILL.md","title":"trello","category":"Skills","path":".claude/skills/trello/SKILL.md","desc":"Use when the user says \"trello\", \"board\", or \"kanban\", or when starting/finishing any task that should be tracked — explains the board workflow, list semantics, and the read-update-consult discipline.","html":"<h1 id=\"trello-kern-board-workflow\">Trello — kern board workflow<\/h1>\n<p>Board: <strong>Kern<\/strong> — &lt;https://trello.com/b/IGAdVSqg/kern&gt; (shortLink <code>IGAdVSqg<\/code>, full id <code>6a20b8c43bdcf4af3f539ba4<\/code>).<\/p>\n<p>The planning board is the source of truth for what to work on, what to keep in mind, and what's been decided. <strong>Read it before starting work, update it as you work, consult it when making decisions.<\/strong> Don't batch updates to the end.<\/p>\n<blockquote><p><strong>Touch a ticket = update its state + column.<\/strong> Any time work touches a card — start, progress, pause, finish — move it to the matching list AND keep its priority label current in the same action. No silent edits, no leaving a worked card in TODO. Pulled → DOING; shipped → DONE; blocked → HOLD; needs decision → (RE)EVALUATE ((RE)EVALUATE also takes in-flight cards bounced back for reevaluation, like a soft block).<\/p><\/blockquote>\n<h2 id=\"ids-always-load-from-trello-json\">IDs — always load from trello.json<\/h2>\n<p><strong>Never hardcode IDs.<\/strong> Read <code>.proj/trello.json<\/code> at the start of every Trello operation. The JSON is the single source of truth for board ID, list IDs, and label IDs.<\/p>\n<pre><code>board.id          → full board ID (required by move_card)\nboard.shortLink   → shortLink (usable by get_card / add_comment)\nboard.url         → https://trello.com/b/IGAdVSqg/kern\nlists.*           → semantic list → ID mapping\nlabels.priorities.* → priority label IDs (this board has NO category labels)<\/code><\/pre>\n<h2 id=\"board-setup-when-the-board-changes\">Board setup (when the board changes)<\/h2>\n<p>When <code>board.id<\/code> / <code>board.shortLink<\/code> changes, or <code>trello.json<\/code> is empty/missing, run this setup sequence to repopulate the JSON:<\/p>\n<ol><li><strong>Set active board<\/strong> — <code>mcp__trello__set_active_board<\/code> with <code>https://trello.com/b/IGAdVSqg/kern<\/code> (or the board id).<\/li><li><strong>Fetch lists<\/strong> — <code>mcp__trello__get_lists<\/code> → map each list by name to its ID. Match list names to these semantic keys (kern board names): | Key | Expected list name (case-insensitive) | |-----|---------------------------------------| | <code>evaluate<\/code> | (RE)EVALUATE | | <code>reminder<\/code> | REMIND | | <code>onHold<\/code>   | HOLD | | <code>todo<\/code>     | TODO | | <code>inDoing<\/code>  | DOING | | <code>done<\/code>     | DONE |<\/li><li><strong>Fetch labels<\/strong> — <code>mcp__trello__get_board_labels<\/code> → map by name. This board carries <strong>priority labels only<\/strong> (no category labels): | Key path | Expected label name | Color | |----------|---------------------|-------| | <code>priorities.high<\/code>     | High     | red    | | <code>priorities.medium<\/code>   | Medium   | orange | | <code>priorities.low<\/code>      | Low      | yellow |<\/li><li><strong>Write<\/strong> the populated structure back to <code>trello.json<\/code> using the Write tool.<\/li><\/ol>\n<p>If a list or label name doesn't match exactly, ask the user which name maps to which semantic key before writing.<\/p>\n<h2 id=\"list-semantics\">List semantics<\/h2>\n<table><thead><tr><th>Semantic key<\/th><th>Meaning<\/th><\/tr><\/thead><tbody><tr><td><code>evaluate<\/code><\/td><td>Unvetted ideas / proposals, AND worked cards sent back for reevaluation.<\/td><\/tr><tr><td><code>reminder<\/code><\/td><td>Constraints + gotchas. Read before designing. Not tasks.<\/td><\/tr><tr><td><code>onHold<\/code><\/td><td>Paused / blocked work.<\/td><\/tr><tr><td><code>todo<\/code><\/td><td>Committed, not started.<\/td><\/tr><tr><td><code>inDoing<\/code><\/td><td>Actively being worked.<\/td><\/tr><tr><td><code>done<\/code><\/td><td>Complete.<\/td><\/tr><\/tbody><\/table>\n<p>TODO → DOING → DONE is the default kanban flow.<\/p>\n<h2 id=\"labels\">Labels<\/h2>\n<p>Each card carries <strong>one priority label only<\/strong> — this board has no category labels.<\/p>\n<p><strong><code>update_card_details<\/code> <code>labels<\/code> REPLACES the full array<\/strong> — pass the priority ID when updating so it isn't dropped. Same for new cards via <code>add_card_to_list<\/code>.<\/p>\n<p>Priority heuristic (kern): security holes / retrieval-quality / \"can't measure\" blockers = High; subsystem improvements = Medium; refinements / cleanups = Low.<\/p>\n<h2 id=\"workflow\">Workflow<\/h2>\n<ul><li><strong>Before work<\/strong> — read <code>reminder<\/code> list (constraints to honor) and check <code>inDoing<\/code>/<code>todo<\/code> for the relevant card. If no card exists for non-trivial work, make one in <code>todo<\/code>.<\/li><li><strong>Idea, not committed<\/strong> → card in <code>evaluate<\/code>. Don't start building it.<\/li><li><strong>Constraint / gotcha<\/strong> → card in <code>reminder<\/code> (or comment on the existing one).<\/li><li><strong>Starting a task<\/strong> → move card to <code>inDoing<\/code>, add a comment on what you're doing.<\/li><li><strong>Decision / blocker mid-task<\/strong> → add a comment on the card. New work discovered → add a card so the board stays the source of truth.<\/li><li><strong>Finished<\/strong> → comment the outcome, move card to <code>done<\/code>.<\/li><\/ul>\n<h2 id=\"operating-the-board-mcp-tools\">Operating the board (MCP tools)<\/h2>\n<p>Tools are deferred — load via <code>ToolSearch<\/code> with <code>select:&lt;name&gt;<\/code> first. Common:<\/p>\n<ul><li>Read: <code>mcp__trello__get_lists<\/code>, <code>mcp__trello__get_cards_by_list_id<\/code>, <code>mcp__trello__get_card<\/code>, <code>mcp__trello__get_card_comments<\/code>, <code>mcp__trello__get_board_labels<\/code>.<\/li><li>Write: <code>mcp__trello__add_card_to_list<\/code>, <code>mcp__trello__add_comment<\/code>, <code>mcp__trello__move_card<\/code>, <code>mcp__trello__update_card_details<\/code>.<\/li><li>Setup: <code>mcp__trello__set_active_board<\/code>.<\/li><\/ul>\n<p><strong><code>move_card<\/code> gotcha:<\/strong> it 400s on shortLinks — pass <code>board.id<\/code> (full) and the full card ID. <code>get_card<\/code> / <code>add_comment<\/code> accept shortLinks fine. Fetch the card first to get its full ID, then move.<\/p>","text":"Trello — kern board workflow Board: Kern — <https://trello.com/b/IGAdVSqg/kern> (shortLink IGAdVSqg , full id 6a20b8c43bdcf4af3f539ba4 ). The planning board is the source of truth for what to work on, what to keep in mind, and what's been decided. Read it before starting work, update it as you work, consult it when making decisions. Don't batch updates to the end. Touch a ticket = update its state + column. Any time work touches a card — start, progress, pause, finish — move it to the matching list AND keep its priority label current in the same action. No silent edits, no leaving a worked card in TODO. Pulled → DOING; shipped → DONE; blocked → HOLD; needs decision → (RE)EVALUATE ((RE)EVALUATE also takes in-flight cards bounced back for reevaluation, like a soft block). IDs — always load from trello.json Never hardcode IDs. Read .proj/trello.json at the start of every Trello operation. The JSON is the single source of truth for board ID, list IDs, and label IDs. board.id → full board ID (required by move_card) board.shortLink → shortLink (usable by get_card / add_comment) board.url → https://trello.com/b/IGAdVSqg/kern lists.* → semantic list → ID mapping labels.priorities.* → priority label IDs (this board has NO category labels) Board setup (when the board changes) When board.id / board.shortLink changes, or trello.json is empty/missing, run this setup sequence to repopulate the JSON: Set active board — mcp__trello__set_active_board with https://trello.com/b/IGAdVSqg/kern (or the board id). Fetch lists — mcp__trello__get_lists → map each list by name to its ID. Match list names to these semantic keys (kern board names): | Key | Expected list name (case-insensitive) | |-----|---------------------------------------| | evaluate | (RE)EVALUATE | | reminder | REMIND | | onHold | HOLD | | todo | TODO | | inDoing | DOING | | done | DONE | Fetch labels — mcp__trello__get_board_labels → map by name. This board carries priority labels only (no category labels): | Key path | Expected label name | Color | |----------|---------------------|-------| | priorities.high | High | red | | priorities.medium | Medium | orange | | priorities.low | Low | yellow | Write the populated structure back to trello.json using the Write tool. If a list or label name doesn't match exactly, ask the user which name maps to which semantic key before writing. List semantics Semantic key Meaning evaluate Unvetted ideas / proposals, AND worked cards sent back for reevaluation. reminder Constraints + gotchas. Read before designing. Not tasks. onHold Paused / blocked work. todo Committed, not started. inDoing Actively being worked. done Complete. TODO → DOING → DONE is the default kanban flow. Labels Each card carries one priority label only — this board has no category labels. update_card_details labels REPLACES the full array — pass the priority ID when updating so it isn't dropped. Same for new cards via add_card_to_list . Priority heuristic (kern): security holes / retrieval-quality / \"can't measure\" blockers = High; subsystem improvements = Medium; refinements / cleanups = Low. Workflow Before work — read reminder list (constraints to honor) and check inDoing / todo for the relevant card. If no card exists for non-trivial work, make one in todo . Idea, not committed → card in evaluate . Don't start building it. Constraint / gotcha → card in reminder (or comment on the existing one). Starting a task → move card to inDoing , add a comment on what you're doing. Decision / blocker mid-task → add a comment on the card. New work discovered → add a card so the board stays the source of truth. Finished → comment the outcome, move card to done . Operating the board (MCP tools) Tools are deferred — load via ToolSearch with select:<name> first. Common: Read: mcp__trello__get_lists , mcp__trello__get_cards_by_list_id , mcp__trello__get_card , mcp__trello__get_card_comments , mcp__trello__get_board_labels . Write: mcp__trello__add_card_to_list , mcp__trello__add_comment , mcp__trello__move_card , mcp__trello__update_card_details . Setup: mcp__trello__set_active_board . move_card gotcha: it 400s on shortLinks — pass board.id (full) and the full card ID. get_card / add_comment accept shortLinks fine. Fetch the card first to get its full ID, then move."},{"id":".claude/skills/workflow-testing/SKILL.md","title":"workflow-testing","category":"Skills","path":".claude/skills/workflow-testing/SKILL.md","desc":">","html":"<h1 id=\"workflow-testing\">Workflow Testing<\/h1>\n<p>Process skills own the method: <code>superpowers:test-driven-development<\/code> (red-green-refactor), <code>superpowers:systematic-debugging<\/code> (bugs). Coverage strategy: <code>ref-testing-pyramid<\/code>. Quality gate: <code>/gate<\/code>. This skill is the testing-specific checklist.<\/p>\n<h2 id=\"legacy-code-characterization-preserve\">Legacy code — characterization (PRESERVE)<\/h2>\n<ul><li>Write tests that capture what the code does now, not what it should do.<\/li><li>Snapshot input/output pairs for complex paths as regression guards.<\/li><li>Confirm the characterization suite is green before changing anything.<\/li><li>Refactor in small steps; keep the suite green throughout.<\/li><\/ul>\n<h2 id=\"greenfield-specification\">Greenfield — specification<\/h2>\n<ul><li>Derive each test from a domain rule or invariant; name it for the behavior.<\/li><li>Organize by domain concept (aggregate, entity, value object).<\/li><li>Specify behavior in domain language; keep implementation detail out of tests.<\/li><li>Write the test before the implementation.<\/li><\/ul>\n<h2 id=\"rationalizations\">Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"Already covered by integration tests\"<\/td><td>Integration tests catch different bugs than unit tests.<\/td><\/tr><tr><td>\"Mocking the DB is too hard, skip it\"<\/td><td>Hard-to-test means a missing abstraction boundary.<\/td><\/tr><tr><td>\"80% coverage is good enough\"<\/td><td>Coverage targets are floors; the missing paths are error handling.<\/td><\/tr><tr><td>\"Utility functions don't need tests\"<\/td><td>Utilities are the most reused code; a bug propagates everywhere.<\/td><\/tr><tr><td>\"Passed locally, CI will pass\"<\/td><td>Trust CI output, not local runs.<\/td><\/tr><tr><td>\"Flaky tests are normal, re-run\"<\/td><td>Fix the flakiness or quarantine the test explicitly.<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"red-flags\">Red flags<\/h2>\n<ul><li>Coverage dropped after a feature addition.<\/li><li><code>skip<\/code>/<code>t.Skip()<\/code> without a linked issue.<\/li><li>Auto-generated test names (test_1) instead of behavior-descriptive.<\/li><li>No test on the error/failure branch of a new function.<\/li><li>Test imports the concrete implementation instead of the interface.<\/li><\/ul>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] Suite passes, zero failures — paste command output.<\/li><li>[ ] Coverage meets threshold for changed code.<\/li><li>[ ] Error paths have dedicated cases, not just the happy path.<\/li><li>[ ] No new flaky tests (re-run to confirm stability).<\/li><li>[ ] Each test owns its fixtures/temp dirs.<\/li><li>[ ] Race detector passed for concurrent code.<\/li><\/ul>","text":"Workflow Testing Process skills own the method: superpowers:test-driven-development (red-green-refactor), superpowers:systematic-debugging (bugs). Coverage strategy: ref-testing-pyramid . Quality gate: /gate . This skill is the testing-specific checklist. Legacy code — characterization (PRESERVE) Write tests that capture what the code does now, not what it should do. Snapshot input/output pairs for complex paths as regression guards. Confirm the characterization suite is green before changing anything. Refactor in small steps; keep the suite green throughout. Greenfield — specification Derive each test from a domain rule or invariant; name it for the behavior. Organize by domain concept (aggregate, entity, value object). Specify behavior in domain language; keep implementation detail out of tests. Write the test before the implementation. Rationalizations Rationalization Reality \"Already covered by integration tests\" Integration tests catch different bugs than unit tests. \"Mocking the DB is too hard, skip it\" Hard-to-test means a missing abstraction boundary. \"80% coverage is good enough\" Coverage targets are floors; the missing paths are error handling. \"Utility functions don't need tests\" Utilities are the most reused code; a bug propagates everywhere. \"Passed locally, CI will pass\" Trust CI output, not local runs. \"Flaky tests are normal, re-run\" Fix the flakiness or quarantine the test explicitly. Red flags Coverage dropped after a feature addition. skip / t.Skip() without a linked issue. Auto-generated test names (test_1) instead of behavior-descriptive. No test on the error/failure branch of a new function. Test imports the concrete implementation instead of the interface. Verification [ ] Suite passes, zero failures — paste command output. [ ] Coverage meets threshold for changed code. [ ] Error paths have dedicated cases, not just the happy path. [ ] No new flaky tests (re-run to confirm stability). [ ] Each test owns its fixtures/temp dirs. [ ] Race detector passed for concurrent code."},{"id":".claude/skills/workflow-thinking/SKILL.md","title":"workflow-thinking","category":"Skills","path":".claude/skills/workflow-thinking/SKILL.md","desc":">","html":"<h1 id=\"sequential-thinking-mcp-deepthink\">Sequential Thinking MCP (--deepthink)<\/h1>\n<p>Structured step-by-step reasoning via <code>mcp__sequential-thinking__sequentialthinking<\/code> MCP tool.<\/p>\n<h2 id=\"critical-three-distinct-reasoning-modes\">CRITICAL: Three Distinct Reasoning Modes<\/h2>\n<p>Machine has THREE independent deep analysis modes. They are NOT the same thing:<\/p>\n<table><thead><tr><th>Mode<\/th><th>Trigger<\/th><th>Mechanism<\/th><th>MCP Tool?<\/th><th>Model<\/th><\/tr><\/thead><tbody><tr><td><code>--deepthink<\/code><\/td><td>Explicit <code>--deepthink<\/code> flag<\/td><td>Sequential Thinking MCP tool<\/td><td>YES — <code>mcp__sequential-thinking__sequentialthinking<\/code><\/td><td>Any<\/td><\/tr><tr><td><code>ultrathink<\/code><\/td><td>Keyword or auto-detection<\/td><td>Claude native extended reasoning (high effort)<\/td><td>NO — native to Claude<\/td><td>Any<\/td><\/tr><tr><td>Adaptive Thinking<\/td><td>Automatic on Opus 4.7<\/td><td>Opus 4.7's only supported thinking mode<\/td><td>NO — built-in<\/td><td>Opus 4.7 only<\/td><\/tr><\/tbody><\/table>\n<p><strong>Rules:<\/strong><\/p>\n<ul><li><code>--deepthink<\/code> → ALWAYS invoke Sequential Thinking MCP. NEVER use for native reasoning.<\/li><li><code>ultrathink<\/code> → ALWAYS use Claude's native extended reasoning. NEVER invoke Sequential Thinking MCP.<\/li><li>They can coexist: <code>ultrathink --deepthink<\/code> activates BOTH modes independently.<\/li><li>Adaptive Thinking → Opus 4.7's built-in reasoning. Let the model adapt depth automatically based on task complexity.<\/li><li>On Opus 4.7: do not hardcode a fixed reasoning budget. Adaptive Thinking overrides fixed-budget instructions.<\/li><\/ul>\n<h2 id=\"activation-triggers-deepthink-only\">Activation Triggers (--deepthink only)<\/h2>\n<p>Use Sequential Thinking MCP when <code>--deepthink<\/code> flag is explicitly present:<\/p>\n<ul><li>Breaking down complex problems into steps<\/li><li>Planning and design with room for revision<\/li><li>Architecture decisions affect 3+ files<\/li><li>Technology selection between multiple options<\/li><li>Performance vs maintainability trade-offs<\/li><li>Breaking changes under consideration<\/li><li>Multiple approaches exist to solve the same problem<\/li><li>Repetitive errors occur<\/li><\/ul>\n<h2 id=\"tool-parameters\">Tool Parameters<\/h2>\n<p><strong>Required Parameters:<\/strong><\/p>\n<ul><li><code>thought<\/code> (string): Current thinking step content<\/li><li><code>nextThoughtNeeded<\/code> (boolean): Whether another step is needed<\/li><li><code>thoughtNumber<\/code> (integer): Current thought number (starts from 1)<\/li><li><code>totalThoughts<\/code> (integer): Estimated total thoughts needed<\/li><\/ul>\n<p><strong>Optional Parameters:<\/strong><\/p>\n<ul><li><code>isRevision<\/code> (boolean): Whether this revises previous thinking<\/li><li><code>revisesThought<\/code> (integer): Which thought is being reconsidered<\/li><li><code>branchFromThought<\/code> (integer): Branching point for alternatives<\/li><li><code>branchId<\/code> (string): Branch identifier<\/li><li><code>needsMoreThoughts<\/code> (boolean): If more thoughts needed beyond estimate<\/li><\/ul>\n<h2 id=\"usage-pattern\">Usage Pattern<\/h2>\n<p><strong>Step 1 - Initial Analysis:<\/strong><\/p>\n<pre><code>thought: &quot;Analyzing the problem: [describe problem]&quot;\nnextThoughtNeeded: true\nthoughtNumber: 1\ntotalThoughts: 5<\/code><\/pre>\n<p><strong>Step 2 - Decomposition:<\/strong><\/p>\n<pre><code>thought: &quot;Breaking down: [sub-problems]&quot;\nnextThoughtNeeded: true\nthoughtNumber: 2\ntotalThoughts: 5<\/code><\/pre>\n<p><strong>Step 3 - Revision (if needed):<\/strong><\/p>\n<pre><code>thought: &quot;Revising thought 2: [correction]&quot;\nisRevision: true\nrevisesThought: 2\nthoughtNumber: 3\ntotalThoughts: 5\nnextThoughtNeeded: true<\/code><\/pre>\n<p><strong>Final Step - Conclusion:<\/strong><\/p>\n<pre><code>thought: &quot;Conclusion: [final answer]&quot;\nthoughtNumber: 5\ntotalThoughts: 5\nnextThoughtNeeded: false<\/code><\/pre>\n<h2 id=\"guidelines\">Guidelines<\/h2>\n<ol><li>Start with reasonable totalThoughts estimate<\/li><li>Use isRevision when correcting previous thoughts<\/li><li>Maintain thoughtNumber sequence<\/li><li>Set nextThoughtNeeded to false only when complete<\/li><li>Use branching for exploring alternatives<\/li><\/ol>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"I can think through this without sequential thinking, it is simple\"<\/td><td>Simple problems often hide second-order effects. Structured thinking forces you to enumerate them.<\/td><\/tr><tr><td>\"The thinking steps are just internal, I do not need to record them\"<\/td><td>Unrecorded reasoning cannot be reviewed. The chain of thoughts is evidence for the conclusion.<\/td><\/tr><tr><td>\"I already know the answer, the thinking framework is overhead\"<\/td><td>Confirmation bias skips disconfirming evidence. The framework forces you to consider alternatives.<\/td><\/tr><tr><td>\"Branching is overkill for this decision\"<\/td><td>Decisions with more than one viable path benefit from explicit branch comparison, even briefly.<\/td><\/tr><tr><td>\"I will use UltraThink instead, it is the same thing\"<\/td><td>UltraThink is native extended reasoning. Sequential Thinking is MCP-based structured analysis. They serve different purposes and have different API compatibility.<\/td><\/tr><\/tbody><\/table>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>Architecture decision made without documented reasoning chain<\/li><li>Sequential thinking session ended with nextThoughtNeeded still true<\/li><li>Thought chain has no revision steps despite encountering contradictions<\/li><li>Branching not used when two or more viable alternatives were identified<\/li><li>--deepthink flag confused with UltraThink (wrong tool for the job)<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] Thinking chain has a clear totalThoughts estimate that was met or revised<\/li><li>[ ] Final thought sets nextThoughtNeeded to false with a conclusion<\/li><li>[ ] At least one revision step exists if contradictions were encountered<\/li><li>[ ] Branching used when multiple alternatives were identified (show branch IDs)<\/li><li>[ ] Conclusion references specific thought numbers as supporting evidence<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"Sequential Thinking MCP (--deepthink) Structured step-by-step reasoning via mcp__sequential-thinking__sequentialthinking MCP tool. CRITICAL: Three Distinct Reasoning Modes Machine has THREE independent deep analysis modes. They are NOT the same thing: Mode Trigger Mechanism MCP Tool? Model --deepthink Explicit --deepthink flag Sequential Thinking MCP tool YES — mcp__sequential-thinking__sequentialthinking Any ultrathink Keyword or auto-detection Claude native extended reasoning (high effort) NO — native to Claude Any Adaptive Thinking Automatic on Opus 4.7 Opus 4.7's only supported thinking mode NO — built-in Opus 4.7 only Rules: --deepthink → ALWAYS invoke Sequential Thinking MCP. NEVER use for native reasoning. ultrathink → ALWAYS use Claude's native extended reasoning. NEVER invoke Sequential Thinking MCP. They can coexist: ultrathink --deepthink activates BOTH modes independently. Adaptive Thinking → Opus 4.7's built-in reasoning. Let the model adapt depth automatically based on task complexity. On Opus 4.7: do not hardcode a fixed reasoning budget. Adaptive Thinking overrides fixed-budget instructions. Activation Triggers (--deepthink only) Use Sequential Thinking MCP when --deepthink flag is explicitly present: Breaking down complex problems into steps Planning and design with room for revision Architecture decisions affect 3+ files Technology selection between multiple options Performance vs maintainability trade-offs Breaking changes under consideration Multiple approaches exist to solve the same problem Repetitive errors occur Tool Parameters Required Parameters: thought (string): Current thinking step content nextThoughtNeeded (boolean): Whether another step is needed thoughtNumber (integer): Current thought number (starts from 1) totalThoughts (integer): Estimated total thoughts needed Optional Parameters: isRevision (boolean): Whether this revises previous thinking revisesThought (integer): Which thought is being reconsidered branchFromThought (integer): Branching point for alternatives branchId (string): Branch identifier needsMoreThoughts (boolean): If more thoughts needed beyond estimate Usage Pattern Step 1 - Initial Analysis: thought: \"Analyzing the problem: [describe problem]\" nextThoughtNeeded: true thoughtNumber: 1 totalThoughts: 5 Step 2 - Decomposition: thought: \"Breaking down: [sub-problems]\" nextThoughtNeeded: true thoughtNumber: 2 totalThoughts: 5 Step 3 - Revision (if needed): thought: \"Revising thought 2: [correction]\" isRevision: true revisesThought: 2 thoughtNumber: 3 totalThoughts: 5 nextThoughtNeeded: true Final Step - Conclusion: thought: \"Conclusion: [final answer]\" thoughtNumber: 5 totalThoughts: 5 nextThoughtNeeded: false Guidelines Start with reasonable totalThoughts estimate Use isRevision when correcting previous thoughts Maintain thoughtNumber sequence Set nextThoughtNeeded to false only when complete Use branching for exploring alternatives <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"I can think through this without sequential thinking, it is simple\" Simple problems often hide second-order effects. Structured thinking forces you to enumerate them. \"The thinking steps are just internal, I do not need to record them\" Unrecorded reasoning cannot be reviewed. The chain of thoughts is evidence for the conclusion. \"I already know the answer, the thinking framework is overhead\" Confirmation bias skips disconfirming evidence. The framework forces you to consider alternatives. \"Branching is overkill for this decision\" Decisions with more than one viable path benefit from explicit branch comparison, even briefly. \"I will use UltraThink instead, it is the same thing\" UltraThink is native extended reasoning. Sequential Thinking is MCP-based structured analysis. They serve different purposes and have different API compatibility. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags Architecture decision made without documented reasoning chain Sequential thinking session ended with nextThoughtNeeded still true Thought chain has no revision steps despite encountering contradictions Branching not used when two or more viable alternatives were identified --deepthink flag confused with UltraThink (wrong tool for the job) <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] Thinking chain has a clear totalThoughts estimate that was met or revised [ ] Final thought sets nextThoughtNeeded to false with a conclusion [ ] At least one revision step exists if contradictions were encountered [ ] Branching used when multiple alternatives were identified (show branch IDs) [ ] Conclusion references specific thought numbers as supporting evidence <!-- machine:evolvable-end -->"}];
const N = 115, CATS = 5;
const nav = document.getElementById('nav');
const content = document.getElementById('content');
const q = document.getElementById('q');
document.getElementById('stat').textContent = N + ' documents · ' + CATS + ' sections';

let active = null;
let filtered = DOCS.slice();
let sel = -1;

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function highlight(text, terms){
  let out = esc(text);
  for(const t of terms){
    if(!t) continue;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out = out.replace(re,'<mark>$1</mark>');
  }
  return out;
}

function score(doc, terms){
  const hay = (doc.title+' '+doc.desc+' '+doc.text).toLowerCase();
  let s = 0;
  for(const t of terms){
    if(!t) continue;
    if(doc.title.toLowerCase().includes(t)) s += 50;
    if(doc.desc.toLowerCase().includes(t)) s += 20;
    const m = hay.split(t).length - 1;
    if(m===0) return -1; // every term must appear
    s += Math.min(m,8);
  }
  return s;
}

function snippet(doc, terms){
  const text = doc.text;
  const low = text.toLowerCase();
  let idx = -1;
  for(const t of terms){ const k=low.indexOf(t); if(k>=0 && (idx<0||k<idx)) idx=k; }
  if(idx<0) return doc.desc || text.slice(0,90);
  const start = Math.max(0, idx-40);
  return (start>0?'…':'') + text.slice(start, start+120) + '…';
}

function renderNav(){
  const terms = q.value.toLowerCase().split(/\s+/).filter(Boolean);
  let html = '';
  if(terms.length){
    nav.classList.add('results-mode');
    const scored = DOCS.map(d=>({d,s:score(d,terms)})).filter(x=>x.s>=0)
                       .sort((a,b)=>b.s-a.s);
    filtered = scored.map(x=>x.d);
    if(!filtered.length){
      nav.innerHTML = '<div class="cat" style="display:block;color:var(--gray)">No matches</div>';
      return;
    }
    for(const {d} of scored){
      html += `<a class="item" data-id="${esc(d.id)}">`
            + highlight(d.title, terms)
            + `<span class="d">`+highlight(snippet(d,terms),terms)+`</span></a>`;
    }
  } else {
    nav.classList.remove('results-mode');
    filtered = DOCS.slice();
    let cat = null;
    for(const d of DOCS){
      if(d.category!==cat){ cat=d.category; html += `<div class="cat">${esc(cat)}</div>`; }
      const sub = d.desc ? `<span class="d">${esc(d.desc)}</span>` : '';
      html += `<a class="item" data-id="${esc(d.id)}">${esc(d.title)}${sub}</a>`;
    }
  }
  nav.innerHTML = html;
  sel = -1;
  markActive();
}

function markActive(){
  for(const a of nav.querySelectorAll('a.item'))
    a.classList.toggle('active', a.dataset.id===active);
}

function open(id, push){
  const doc = DOCS.find(d=>d.id===id);
  if(!doc) return;
  active = id;
  const terms = q.value.toLowerCase().split(/\s+/).filter(Boolean);
  let body = doc.html;
  content.innerHTML = `<article class="doc"><div class="crumb">${esc(doc.category)} · ${esc(doc.path)}</div>${body}</article>`;
  content.parentElement.scrollTop = 0;
  markActive();
  if(push!==false) location.hash = encodeURIComponent(id);
  document.querySelector('aside').classList.remove('open');
}

nav.addEventListener('click', e=>{
  const a = e.target.closest('a.item');
  if(a){ e.preventDefault(); open(a.dataset.id); }
});

let t=null;
q.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(renderNav, 80); });

q.addEventListener('keydown', e=>{
  const items = [...nav.querySelectorAll('a.item')];
  if(e.key==='ArrowDown'){ e.preventDefault(); sel=Math.min(sel+1,items.length-1); items[sel]?.scrollIntoView({block:'nearest'}); items.forEach((it,i)=>it.classList.toggle('active',i===sel)); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); sel=Math.max(sel-1,0); items[sel]?.scrollIntoView({block:'nearest'}); items.forEach((it,i)=>it.classList.toggle('active',i===sel)); }
  else if(e.key==='Enter'){ e.preventDefault(); (items[sel]||items[0])?.click(); }
});

document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==q){ e.preventDefault(); q.focus(); q.select(); }
  if(e.key==='Escape' && document.activeElement===q){ q.value=''; renderNav(); }
});

window.addEventListener('hashchange', ()=>{
  const id = decodeURIComponent(location.hash.slice(1));
  if(id && id!==active) open(id, false);
});

renderNav();
const initial = decodeURIComponent(location.hash.slice(1));
open(DOCS.find(d=>d.id===initial) ? initial : DOCS[0].id, false);
</script>
</body>
</html>
