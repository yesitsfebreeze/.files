ed-on-analysis-results\">Route based on analysis results<\/h1>\n<p>if analysis.has_database_issues: result = Agent( subagent_type=\"expert-backend\", prompt=\"Optimize database\", context={\"issues\": analysis.database_issues} ) elif analysis.has_api_issues: result = Agent( subagent_type=\"expert-backend\", prompt=\"Fix API issues\", context={\"issues\": analysis.api_issues} ) else: result = Agent( subagent_type=\"manager-quality\", prompt=\"General quality check\", context={\"analysis\": analysis} )<\/p>\n<pre><code>\n## Command Examples\n\n### Simple Validation Command\n\nConfiguration Validator:\n<\/code><\/pre>\n<hr>\n<p>name: validate-config description: Validate configuration files against schema and best practices usage: | /validate-config &lt;file&gt; [options] Examples: /validate-config app.yaml /validate-config @production-config.json --strict parameters:<\/p>\n<ul><li>name: file<\/li><\/ul>\n<p>description: Configuration file to validate required: true type: string allowFileReference: true<\/p>\n<ul><li>name: strict<\/li><\/ul>\n<p>description: Enable strict validation mode required: false type: boolean default: false<\/p>\n<hr>\n<h1 id=\"configuration-validator\">Configuration Validator<\/h1>\n<h2 id=\"quick-reference\">Quick Reference<\/h2>\n<p>Validates YAML/JSON configuration files against schemas and best practices.<\/p>\n<h2 id=\"implementation\">Implementation<\/h2>\n<h3 id=\"input-processing\">Input Processing<\/h3>\n<pre><code class=\"language-bash\">config_file=&quot;$1&quot;\nstrict_mode=&quot;$2&quot;\n\n# Handle file reference\nif [[ &quot;$config_file&quot; == @* ]]; then\n config_file=&quot;${config_file#@}&quot;\nfi\n\n# Validate file exists\nif [ ! -f &quot;$config_file&quot; ]; then\n echo &quot;Error: Configuration file not found: $config_file&quot;\n exit 1\nfi<\/code><\/pre>\n<pre><code class=\"language-`\">\n### Validation Execution\n<\/code><\/pre>\n<h1 id=\"determine-validation-strategy\">Determine validation strategy<\/h1>\n<p>if [[ \"$config_file\" == <em>.yaml ]] || [[ \"$config_file\" == <\/em>.yml ]]; then validator = \"yaml-validator\" elif [[ \"$config_file\" == *.json ]]; then validator = \"json-validator\" else echo \"Error: Unsupported file format\" exit 1 fi<\/p>\n<h1 id=\"execute-validation\">Execute validation<\/h1>\n<p>Agent( subagent_type=\"manager-quality\", prompt=\"Validate $config_file using $validator\" + (\" --strict\" if strict_mode else \"\"), context={ \"file_path\": config_file, \"validator\": validator, \"strict_mode\": strict_mode == \"--strict\" } )<\/p>\n<pre><code><\/code><\/pre>\n<h3 id=\"complex-multi-phase-command\">Complex Multi-Phase Command<\/h3>\n<p>Feature Implementation Workflow:<\/p>\n<pre><code class=\"language-markdown\">---\nname: implement-feature\ndescription: Complete feature implementation workflow from spec to deployment\nusage: |\n /implement-feature &quot;Feature description&quot; [options]\n Examples:\n /implement-feature &quot;Add user authentication with JWT&quot;\n /implement-feature &quot;Create API endpoints&quot; --skip-tests\nparameters:\n - name: description\n description: Feature description to implement\n required: true\n type: string\n - name: skip_tests\n description: Skip test implementation phase\n required: false\n type: boolean\n default: false\n - name: environment\n description: Target environment\n required: false\n type: string\n values: [development, staging, production]\n default: development\n---\n\n# Feature Implementation Workflow\n\n## Quick Reference\nComplete DDD-based feature implementation from specification to deployment.\n\n## Implementation\n\n### Phase 1: Specification Generation<\/code><\/pre>\n<h1 id=\"generate-comprehensive-specification\">Generate comprehensive specification<\/h1>\n<p>spec_result = Agent( subagent_type=\"manager-spec\", prompt=\"Create detailed specification for: $1\", context={ \"feature_description\": \"$1\", \"environment\": \"$3\" } )<\/p>\n<p>spec_id = spec_result.spec_id echo \"Specification created: $spec_id\"<\/p>\n<pre><code class=\"language-`\">\n### Phase 2: Implementation Planning\n<\/code><\/pre>\n<h1 id=\"plan-implementation-approach\">Plan implementation approach<\/h1>\n<p>plan_result = Agent( subagent_type=\"plan\", prompt=\"Create implementation plan for $spec_id\", context={ \"spec_id\": spec_id, \"skip_tests\": \"$2\" } )<\/p>\n<pre><code>\n### Phase 3: Test Implementation (if not skipped)\n<\/code><\/pre>\n<p>if [ \"$2\" != \"--skip-tests\" ]; then<\/p>\n<h1 id=\"red-phase-write-failing-tests\">RED phase: Write failing tests<\/h1>\n<p>test_result = Agent( subagent_type=\"expert-testing\", prompt=\"Write comprehensive tests for $spec_id\", context={\"spec_id\": spec_id} ) fi<\/p>\n<pre><code>\n### Phase 4: Feature Implementation\n<\/code><\/pre>\n<h1 id=\"improve-phase-implement-feature\">IMPROVE phase: Implement feature<\/h1>\n<p>implementation_result = Agent( subagent_type=\"manager-ddd\", prompt=\"Implement feature for $spec_id\", context={ \"spec_id\": spec_id, \"tests_available\": \"$2\" != \"--skip-tests\" } )<\/p>\n<pre><code>\n### Phase 5: Quality Assurance\n<\/code><\/pre>\n<h1 id=\"refactor-and-validation\">REFACTOR and validation<\/h1>\n<p>quality_result = Agent( subagent_type=\"manager-quality\", prompt=\"Validate implementation for $spec_id\", context={ \"implementation\": implementation_result, \"test_coverage\": \"90%\" if \"$2\" != \"--skip-tests\" else \"0%\" } )<\/p>\n<pre><code>\n### Phase 6: Documentation\n<\/code><\/pre>\n<h1 id=\"generate-documentation\">Generate documentation<\/h1>\n<p>docs_result = Agent( subagent_type=\"docs-manager\", prompt=\"Create documentation for $spec_id\", context={\"spec_id\": spec_id} )<\/p>\n<pre><code>\n### Results Summary\n<\/code><\/pre>\n<p>echo \"Feature implementation completed!\" echo \"Specification: $spec_id\" echo \"Implementation: $(echo $implementation_result | jq .status)\" echo \"Quality Score: $(echo $quality_result | jq .score)\" echo \"Documentation: $(echo $docs_result | jq .generated_files)\"<\/p>\n<pre><code><\/code><\/pre>\n<h3 id=\"integration-command\">Integration Command<\/h3>\n<p>CI/CD Pipeline Integration:<\/p>\n<pre><code class=\"language-markdown\">---\nname: deploy\ndescription: Deploy application with comprehensive validation and rollback capability\nusage: |\n /deploy [environment] [options]\n Examples:\n /deploy staging\n /deploy production --skip-tests --dry-run\nparameters:\n - name: environment\n description: Target deployment environment\n required: false\n type: string\n values: [staging, production]\n default: staging\n - name: skip_tests\n description: Skip pre-deployment tests\n required: false\n type: boolean\n default: false\n - name: dry_run\n description: Perform dry-run deployment\n required: false\n type: boolean\n default: false\n---\n\n# Deployment Pipeline\n\n## Quick Reference\nSafe deployment with validation, testing, and rollback capabilities.\n\n## Implementation\n\n### Pre-Deployment Validation<\/code><\/pre>\n<h1 id=\"environment-validation\">Environment validation<\/h1>\n<p>env_result = Agent( subagent_type=\"devops-expert\", prompt=\"Validate $1 environment configuration\", context={\"environment\": \"$1\"} )<\/p>\n<h1 id=\"security-validation\">Security validation<\/h1>\n<p>security_result = Agent( subagent_type=\"expert-security\", prompt=\"Perform security pre-deployment check\", context={\"environment\": \"$1\"} )<\/p>\n<pre><code class=\"language-`\">\n### Testing Phase\n<\/code><\/pre>\n<p>if [ \"$2\" != \"--skip-tests\" ]; then<\/p>\n<h1 id=\"run-comprehensive-test-suite\">Run comprehensive test suite<\/h1>\n<p>test_result = Agent( subagent_type=\"expert-testing\", prompt=\"Execute deployment test suite\", context={\"environment\": \"$1\"} ) fi<\/p>\n<pre><code>\n### Deployment Execution\n<\/code><\/pre>\n<p>if [ \"$3\" != \"--dry-run\" ]; then<\/p>\n<h1 id=\"actual-deployment\">Actual deployment<\/h1>\n<p>deploy_result = Agent( subagent_type=\"devops-expert\", prompt=\"Deploy to $1 environment\", context={ \"environment\": \"$1\", \"rollback_plan\": true } ) else echo \"Dry-run mode: Deployment simulated\" deploy_result = {\"status\": \"simulated\", \"environment\": \"$1\"} fi<\/p>\n<pre><code>\n### Post-Deployment Validation\n<\/code><\/pre>\n<h1 id=\"health-check-and-validation\">Health check and validation<\/h1>\n<p>health_result = Agent( subagent_type=\"monitoring-expert\", prompt=\"Validate deployment health in $1\", context={\"environment\": \"$1\"} )<\/p>\n<h1 id=\"generate-deployment-report\">Generate deployment report<\/h1>\n<p>report_result = Agent( subagent_type=\"docs-manager\", prompt=\"Generate deployment report\", context={ \"environment\": \"$1\", \"deployment\": deploy_result, \"health\": health_result } )<\/p>\n<pre><code><\/code><\/pre>\n<h2 id=\"command-distribution-and-sharing\">Command Distribution and Sharing<\/h2>\n<h3 id=\"team-command-distribution\">Team Command Distribution<\/h3>\n<p>Git-Based Distribution:<\/p>\n<pre><code class=\"language-bash\"># Store commands in version control\ngit add .claude/commands/\ngit commit -m &quot;Add custom commands for team workflow&quot;\n\n# Team members clone and update\ngit pull origin main\nclaude commands reload<\/code><\/pre>\n<p>Package Distribution:<\/p>\n<pre><code class=\"language-bash\"># Create command package\nclaude commands package --name &quot;team-workflows&quot; --version &quot;1.0.0&quot;\n\n# Install command package\nclaude commands install team-workflows@1.0.0<\/code><\/pre>\n<h3 id=\"command-documentation\">Command Documentation<\/h3>\n<p>Command Index Generation:<\/p>\n<pre><code class=\"language-markdown\"># .claude/commands/README.md\n\n## Team Command Library\n\n### Development Commands\n\n- `/implement-feature` - Complete feature implementation workflow\n- `/validate-config` - Configuration file validation\n- `/create-component` - Component scaffolding and setup\n\n### Deployment Commands\n\n- `/deploy` - Safe deployment with rollback\n- `/rollback` - Emergency rollback procedure\n- `/health-check` - System health validation\n\n### Analysis Commands\n\n- `/analyze-performance` - Performance bottleneck analysis\n- `/security-audit` - Security vulnerability assessment\n- `/code-review` - Automated code review<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"command-design\">Command Design<\/h3>\n<p>Naming Conventions:<\/p>\n<ul><li>Use kebab-case for command names: <code>implement-feature<\/code>, <code>validate-config<\/code><\/li><li>Keep names descriptive and action-oriented<\/li><li>Avoid abbreviations and jargon<\/li><li>Use consistent prefixes for related commands<\/li><\/ul>\n<p>Parameter Design:<\/p>\n<ul><li>Required parameters come first<\/li><li>Use descriptive parameter names<\/li><li>Provide clear validation and error messages<\/li><li>Support common patterns (file references, boolean flags)<\/li><\/ul>\n<p>Error Handling:<\/p>\n<ul><li>Validate all inputs before processing<\/li><li>Provide helpful error messages with suggestions<\/li><li>Implement graceful degradation<\/li><li>Support dry-run modes for destructive operations<\/li><\/ul>\n<h3 id=\"performance-optimization\">Performance Optimization<\/h3>\n<p>Efficient Agent Usage:<\/p>\n<ul><li>Batch related operations in single agent calls<\/li><li>Use parallel execution for independent tasks<\/li><li>Cache results when appropriate<\/li><li>Minimize context passing between agents<\/li><\/ul>\n<p>User Experience:<\/p>\n<ul><li>Provide progress feedback for long-running commands<\/li><li>Use clear, consistent output formatting<\/li><li>Support interactive confirmation for critical operations<\/li><li>Include usage examples and help text<\/li><\/ul>\n<h3 id=\"security-considerations\">Security Considerations<\/h3>\n<p>Security Best Practices:<\/p>\n<ul><li>Validate all file paths and inputs<\/li><li>Implement principle of least privilege<\/li><li>Never expose sensitive credentials in command output<\/li><li>Use secure parameter handling for passwords and tokens<\/li><\/ul>\n<p>Audit and Logging:<\/p>\n<ul><li>Log all command executions with parameters<\/li><li>Track success/failure rates<\/li><li>Monitor for unusual usage patterns<\/li><li>Provide audit trails for compliance<\/li><\/ul>\n<p>This comprehensive reference provides all the information needed to create powerful, secure, and user-friendly custom slash commands for Claude Code.<\/p>","text":"Claude Code Custom Slash Commands - Official Documentation Reference Source: https://code.claude.com/docs/en/slash-commands#custom-slash-commands Key Concepts What are Custom Slash Commands? Custom slash commands are user-defined commands that extend Claude Code's functionality with specialized workflows, automations, and integrations. They follow a specific file structure and syntax, enabling powerful command→agent→skill orchestration patterns. Command Architecture Command Execution Flow: User Input → Command File → Parameter Parsing → Agent Delegation → Skill Execution Command Components: Command File: Markdown file with frontmatter and implementation Parameter System: Argument parsing and validation Agent Orchestration: Multi-agent workflow coordination Skill Integration: Specialized knowledge and capabilities Result Processing: Output formatting and user feedback Command File Structure Storage Locations Command Directory Priority: Personal Commands: ~/.claude/commands/ (highest priority) Project Commands: .claude/commands/ (team-shared) Plugin Commands: Bundled with installed packages (lowest priority) Directory Structure: .claude/commands/ category1/ my-command.md related-command.md category2/ specialized-command.md README.md # Command index and documentation Command Naming Convention IMPORTANT: Command name is automatically derived from file path structure: .claude/commands/{namespace}/{command-name}.md → /{namespace}:{command-name} .claude/commands/my-command.md → /my-command Example: .claude/commandsthe machine/fix.md → the machine:fix DO NOT include a name field in frontmatter - it is not officially supported. Command File Format Official Frontmatter Fields (per Claude Code documentation): --- description: Brief description of what the command does argument-hint: [action] [target] [options] allowed-tools: Bash, Read, Write model: haiku --- Supported Frontmatter Fields: description - Command description shown in /help (recommended) argument-hint - Argument syntax hint for autocomplete allowed-tools - Tools this command can invoke model - Override default model (haiku, sonnet, opus) hooks - Hook definitions for command execution disable-model-invocation - Prevent Skill tool invocation All frontmatter options are optional; commands work without frontmatter. Complete Command Template: --- description: Brief description of what the command does and when to use it argument-hint: [action] [target] [options] allowed-tools: Bash(git add:*), Bash(git status:*), Read, Write model: haiku --- # Command Implementation ## Quick Reference Purpose: One-line summary of command purpose Usage: `/my-command <action> <target> [options]` Examples: 2-3 common usage patterns ## Implementation ### Phase 1: Input Validation Validate required parameters if [ -z \"$1\" ]; then echo \"Error: Action parameter is required\" echo \"Usage: /my-command <action> <target> [options]\" exit 1 fi Phase 2: Agent Delegation # Delegate to appropriate agents action=\"$1\" target=\"$2\" case \"$action\" in \"create\") Agent( subagent_type=\"manager-spec\", prompt=\"Create specification for $target\", context={\"user_input\": \"$ARGUMENTS\"} ) ;; \"validate\") Agent( subagent_type=\"manager-quality\", prompt=\"Validate configuration in $target\", context={\"config_file\": \"$target\"} ) ;; esac Phase 3: Result Processing # Process agent results and format output results = await Promise.all(agent_tasks) # Format results for user formatted_output = format_command_output(results, action) # Provide user feedback echo \"Command completed successfully\" echo \"Results: $formatted_output\" ## Parameter System ### Parameter Types String Parameters: parameters: name: feature_name description: Name of the feature to implement required: true type: string validation: pattern: \"^[a-z][a-z0-9-]*$\" minLength: 3 maxLength: 50 File Reference Parameters: parameters: name: config_file description: Configuration file to process required: false type: string allowFileReference: true validation: fileExists: true fileExtensions: [\".yaml\", \".json\", \".toml\"] Boolean Parameters: parameters: name: verbose description: Enable verbose output required: false type: boolean default: false shortFlag: \"-v\" longFlag: \"--verbose\" Choice Parameters: parameters: name: environment description: Target environment required: false type: string values: [development, staging, production] default: development Object Parameters: parameters: name: options description: Additional options object required: false type: object properties: timeout: type: number default: 300 retries: type: number default: 3 additionalProperties: true ### Parameter Access Patterns Positional Arguments: $1, $2, $3... for positional arguments action=\"$1\" # First argument target=\"$2\" # Second argument options=\"$3\" # Third argument All arguments as single string all_args=\"$ARGUMENTS\" Named Arguments: Parse named arguments using getopts while getopts \":f:t:v\" opt; do case $opt in f) file=\"$OPTARG\" ;; t) timeout=\"$OPTARG\" ;; v) verbose=true ;; esac done File References: File reference handling with @ prefix if [[ \"$target\" == @* ]]; then file_path=\"${target#@}\" if [ -f \"$file_path\" ]; then file_content=$(cat \"$file_path\") else echo \"Error: File not found: $file_path\" exit 1 fi fi ## Agent Orchestration Patterns ### Sequential Agent Workflow Linear Execution Pattern: Phase 1: Analysis analysis = Agent( subagent_type=\"manager-spec\", prompt=\"Analyze requirements for $ARGUMENTS\", context={\"user_input\": \"$ARGUMENTS\"} ) Phase 2: Implementation (passes analysis results) implementation = Agent( subagent_type=\"manager-ddd\", prompt=\"Implement based on analysis\", context={\"analysis\": analysis, \"spec_id\": analysis.spec_id} ) Phase 3: Quality Validation validation = Agent( subagent_type=\"manager-quality\", prompt=\"Validate implementation\", context={\"implementation\": implementation} ) ### Parallel Agent Workflow Concurrent Execution Pattern: Independent parallel execution results = await Promise.all([ Agent( subagent_type=\"expert-backend\", prompt=\"Backend implementation for $1\" ), Agent( subagent_type=\"expert-frontend\", prompt=\"Frontend implementation for $1\" ), Agent( subagent_type=\"docs-manager\", prompt=\"Documentation for $1\" ) ]) Integration phase integration = Agent( subagent_type=\"manager-quality\", prompt=\"Integrate all components\", context={\"components\": results} ) ### Conditional Agent Workflow Dynamic Agent Selection: Route based on analysis results if analysis.has_database_issues: result = Agent( subagent_type=\"expert-backend\", prompt=\"Optimize database\", context={\"issues\": analysis.database_issues} ) elif analysis.has_api_issues: result = Agent( subagent_type=\"expert-backend\", prompt=\"Fix API issues\", context={\"issues\": analysis.api_issues} ) else: result = Agent( subagent_type=\"manager-quality\", prompt=\"General quality check\", context={\"analysis\": analysis} ) ## Command Examples ### Simple Validation Command Configuration Validator: name: validate-config description: Validate configuration files against schema and best practices usage: | /validate-config <file> [options] Examples: /validate-config app.yaml /validate-config @production-config.json --strict parameters: name: file description: Configuration file to validate required: true type: string allowFileReference: true name: strict description: Enable strict validation mode required: false type: boolean default: false Configuration Validator Quick Reference Validates YAML/JSON configuration files against schemas and best practices. Implementation Input Processing config_file=\"$1\" strict_mode=\"$2\" # Handle file reference if [[ \"$config_file\" == @* ]]; then config_file=\"${config_file#@}\" fi # Validate file exists if [ ! -f \"$config_file\" ]; then echo \"Error: Configuration file not found: $config_file\" exit 1 fi ### Validation Execution Determine validation strategy if [[ \"$config_file\" == .yaml ]] || [[ \"$config_file\" == .yml ]]; then validator = \"yaml-validator\" elif [[ \"$config_file\" == *.json ]]; then validator = \"json-validator\" else echo \"Error"},{"id":".claude/skills/foundation-cc/reference/claude-code-devcontainers-official.md","title":"Claude Code Dev Containers - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-devcontainers-official.md","desc":"","html":"<h1 id=\"claude-code-dev-containers-official-documentation-reference\">Claude Code Dev Containers - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/devcontainer Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>Claude Code dev containers provide security-hardened development environments using container technology. They enable isolated, reproducible, and secure Claude Code sessions.<\/p>\n<h2 id=\"architecture\">Architecture<\/h2>\n<h3 id=\"base-configuration\">Base Configuration<\/h3>\n<p>Dev containers are built on:<\/p>\n<ul><li>Node.js 20 with essential development tools<\/li><li>Custom security firewall<\/li><li>VS Code Dev Containers integration<\/li><\/ul>\n<h3 id=\"components\">Components<\/h3>\n<ol><li>devcontainer.json: Container configuration and settings<\/li><li>Dockerfile: Image definition and tool installation<\/li><li>init-firewall.sh: Network security rule initialization<\/li><\/ol>\n<h2 id=\"security-features\">Security Features<\/h2>\n<h3 id=\"network-isolation\">Network Isolation<\/h3>\n<p>Default-deny policy with whitelisted outbound connections:<\/p>\n<p>Allowed by default:<\/p>\n<ul><li>npm registry (registry.npmjs.org)<\/li><li>GitHub (github.com, api.github.com)<\/li><li>Claude API (api.anthropic.com)<\/li><li>DNS services<\/li><li>SSH for git operations<\/li><\/ul>\n<p>All other external connections are blocked.<\/p>\n<h3 id=\"firewall-configuration\">Firewall Configuration<\/h3>\n<p>The init-firewall.sh script establishes:<\/p>\n<ul><li>Outbound whitelist rules<\/li><li>Default-deny for unlisted domains<\/li><li>Startup verification of firewall status<\/li><\/ul>\n<h3 id=\"customizing-network-access\">Customizing Network Access<\/h3>\n<p>Modify init-firewall.sh to add custom allowed domains:<\/p>\n<pre><code class=\"language-bash\"># Add custom domain to whitelist\niptables -A OUTPUT -d custom.example.com -j ACCEPT<\/code><\/pre>\n<h2 id=\"vs-code-integration\">VS Code Integration<\/h2>\n<h3 id=\"required-extensions\">Required Extensions<\/h3>\n<p>The devcontainer.json can specify VS Code extensions:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;customizations&quot;: {\n    &quot;vscode&quot;: {\n      &quot;extensions&quot;: [\n        &quot;ms-python.python&quot;,\n        &quot;esbenp.prettier-vscode&quot;\n      ]\n    }\n  }\n}<\/code><\/pre>\n<h3 id=\"settings-override\">Settings Override<\/h3>\n<p>Container-specific VS Code settings:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;customizations&quot;: {\n    &quot;vscode&quot;: {\n      &quot;settings&quot;: {\n        &quot;editor.formatOnSave&quot;: true\n      }\n    }\n  }\n}<\/code><\/pre>\n<h2 id=\"volume-mounts\">Volume Mounts<\/h2>\n<h3 id=\"default-mounts\">Default Mounts<\/h3>\n<p>Typical dev container mounts:<\/p>\n<ul><li>Workspace directory<\/li><li>Git credentials<\/li><li>SSH keys (optional)<\/li><\/ul>\n<h3 id=\"custom-mounts\">Custom Mounts<\/h3>\n<p>Add custom mounts in devcontainer.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mounts&quot;: [\n    &quot;source=${localWorkspaceFolder},target=/workspace,type=bind&quot;,\n    &quot;source=${localEnv:HOME}/.npm,target=/home/node/.npm,type=bind&quot;\n  ]\n}<\/code><\/pre>\n<h2 id=\"unattended-operation\">Unattended Operation<\/h2>\n<h3 id=\"skip-permissions-flag\">Skip Permissions Flag<\/h3>\n<p>For fully automated environments:<\/p>\n<pre><code class=\"language-bash\">claude --dangerously-skip-permissions<\/code><\/pre>\n<p>This bypasses all permission prompts.<\/p>\n<h3 id=\"security-warning\">Security Warning<\/h3>\n<p>When using --dangerously-skip-permissions:<\/p>\n<ul><li>Container has full access to mounted volumes<\/li><li>Malicious code can access Claude Code credentials<\/li><li>Only use with fully trusted repositories<\/li><li>Never expose container to untrusted input<\/li><\/ul>\n<h3 id=\"recommended-use-cases\">Recommended Use Cases<\/h3>\n<p>Safe usage scenarios:<\/p>\n<ul><li>Controlled CI/CD pipelines<\/li><li>Isolated testing environments<\/li><li>Trusted internal repositories<\/li><\/ul>\n<p>Unsafe scenarios:<\/p>\n<ul><li>Public code execution<\/li><li>Untrusted repository analysis<\/li><li>User-facing automation<\/li><\/ul>\n<h2 id=\"resource-configuration\">Resource Configuration<\/h2>\n<h3 id=\"cpu-and-memory\">CPU and Memory<\/h3>\n<p>Configure resource limits in devcontainer.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;hostRequirements&quot;: {\n    &quot;cpus&quot;: 4,\n    &quot;memory&quot;: &quot;8gb&quot;,\n    &quot;storage&quot;: &quot;32gb&quot;\n  }\n}<\/code><\/pre>\n<h3 id=\"gpu-access\">GPU Access<\/h3>\n<p>For AI/ML workloads:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;hostRequirements&quot;: {\n    &quot;gpu&quot;: &quot;optional&quot;\n  }\n}<\/code><\/pre>\n<h2 id=\"shell-configuration\">Shell Configuration<\/h2>\n<h3 id=\"default-shell\">Default Shell<\/h3>\n<p>Set default shell in Dockerfile:<\/p>\n<pre><code class=\"language-dockerfile\">RUN chsh -s /bin/zsh node<\/code><\/pre>\n<h3 id=\"shell-customization\">Shell Customization<\/h3>\n<p>Add custom shell configuration:<\/p>\n<pre><code class=\"language-dockerfile\">COPY .zshrc /home/node/.zshrc<\/code><\/pre>\n<h2 id=\"tool-installation\">Tool Installation<\/h2>\n<h3 id=\"system-packages\">System Packages<\/h3>\n<p>In Dockerfile:<\/p>\n<pre><code class=\"language-dockerfile\">RUN apt-get update &amp;&amp; apt-get install -y \\\n    git \\\n    curl \\\n    jq \\\n    &amp;&amp; rm -rf /var/lib/apt/lists/*<\/code><\/pre>\n<h3 id=\"development-tools\">Development Tools<\/h3>\n<pre><code class=\"language-dockerfile\">RUN npm install -g \\\n    typescript \\\n    eslint \\\n    prettier<\/code><\/pre>\n<h3 id=\"language-runtimes\">Language Runtimes<\/h3>\n<pre><code class=\"language-dockerfile\"># Python\nRUN apt-get install -y python3 python3-pip\n\n# Go\nRUN wget https://go.dev/dl/go1.21.0.linux-amd64.tar.gz &amp;&amp; \\\n    tar -xzf go1.21.0.linux-amd64.tar.gz -C /usr/local<\/code><\/pre>\n<h2 id=\"use-cases\">Use Cases<\/h2>\n<h3 id=\"client-project-isolation\">Client Project Isolation<\/h3>\n<p>Isolate client work:<\/p>\n<ul><li>Separate container per client<\/li><li>Independent credentials<\/li><li>No cross-contamination risk<\/li><\/ul>\n<h3 id=\"team-onboarding\">Team Onboarding<\/h3>\n<p>Standardized setup:<\/p>\n<ul><li>Consistent tool versions<\/li><li>Pre-configured environment<\/li><li>Reduced setup time<\/li><\/ul>\n<h3 id=\"ci-cd-mirroring\">CI/CD Mirroring<\/h3>\n<p>Match production:<\/p>\n<ul><li>Same dependencies<\/li><li>Same security policies<\/li><li>Reproducible builds<\/li><\/ul>\n<h3 id=\"development-standardization\">Development Standardization<\/h3>\n<p>Team consistency:<\/p>\n<ul><li>Shared configurations<\/li><li>Common tooling<\/li><li>Unified workflows<\/li><\/ul>\n<h2 id=\"creating-a-dev-container\">Creating a Dev Container<\/h2>\n<h3 id=\"step-1-create-directory\">Step 1: Create Directory<\/h3>\n<pre><code class=\"language-bash\">mkdir -p .devcontainer<\/code><\/pre>\n<h3 id=\"step-2-create-devcontainer-json\">Step 2: Create devcontainer.json<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;Claude Code Development&quot;,\n  &quot;build&quot;: {\n    &quot;dockerfile&quot;: &quot;Dockerfile&quot;\n  },\n  &quot;customizations&quot;: {\n    &quot;vscode&quot;: {\n      &quot;extensions&quot;: [&quot;anthropic.claude-code&quot;]\n    }\n  },\n  &quot;postCreateCommand&quot;: &quot;npm install&quot;\n}<\/code><\/pre>\n<h3 id=\"step-3-create-dockerfile\">Step 3: Create Dockerfile<\/h3>\n<pre><code class=\"language-dockerfile\">FROM node:20-slim\n\n# Install essential tools\nRUN apt-get update &amp;&amp; apt-get install -y \\\n    git \\\n    curl \\\n    &amp;&amp; rm -rf /var/lib/apt/lists/*\n\n# Install Claude Code\nRUN npm install -g @anthropic-ai/claude-code\n\n# Set up non-root user\nUSER node\nWORKDIR /workspace<\/code><\/pre>\n<h3 id=\"step-4-create-firewall-script\">Step 4: Create Firewall Script<\/h3>\n<pre><code class=\"language-bash\">#!/bin/bash\n# init-firewall.sh\n\n# Default deny\niptables -P OUTPUT DROP\n\n# Allow established connections\niptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT\n\n# Allow localhost\niptables -A OUTPUT -o lo -j ACCEPT\n\n# Allow DNS\niptables -A OUTPUT -p udp --dport 53 -j ACCEPT\n\n# Allow HTTPS\niptables -A OUTPUT -p tcp --dport 443 -j ACCEPT\n\n# Allow specific domains (resolve IPs)\n# Add your domain allowlist here<\/code><\/pre>\n<h3 id=\"step-5-open-in-container\">Step 5: Open in Container<\/h3>\n<p>In VS Code:<\/p>\n<ol><li>Install Remote - Containers extension<\/li><li>Command Palette: \"Dev Containers: Reopen in Container\"<\/li><\/ol>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"security\">Security<\/h3>\n<ul><li>Review firewall rules regularly<\/li><li>Minimize allowed domains<\/li><li>Audit tool installations<\/li><li>Use specific image versions<\/li><\/ul>\n<h3 id=\"performance\">Performance<\/h3>\n<ul><li>Use volume caching for dependencies<\/li><li>Pre-build images for common configurations<\/li><li>Optimize Dockerfile layers<\/li><\/ul>\n<h3 id=\"maintenance\">Maintenance<\/h3>\n<ul><li>Document customizations<\/li><li>Version control devcontainer configs<\/li><li>Test container builds regularly<\/li><li>Update base images periodically<\/li><\/ul>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"container-build-fails\">Container Build Fails<\/h3>\n<p>Check:<\/p>\n<ul><li>Dockerfile syntax<\/li><li>Network access during build<\/li><li>Base image availability<\/li><\/ul>\n<h3 id=\"network-issues\">Network Issues<\/h3>\n<p>If connectivity problems occur:<\/p>\n<ul><li>Verify firewall rules<\/li><li>Check DNS resolution<\/li><li>Test allowed domains manually<\/li><\/ul>\n<h3 id=\"permission-issues\">Permission Issues<\/h3>\n<p>If permission denied errors:<\/p>\n<ul><li>Check user configuration<\/li><li>Verify volume mount permissions<\/li><li>Review file ownership<\/li><\/ul>\n<h3 id=\"vs-code-connection-issues\">VS Code Connection Issues<\/h3>\n<p>If VS Code cannot connect:<\/p>\n<ul><li>Verify Docker is running<\/li><li>Check extension installation<\/li><li>Review devcontainer.json syntax<\/li><\/ul>","text":"Claude Code Dev Containers - Official Documentation Reference Source: https://code.claude.com/docs/en/devcontainer Updated: 2026-01-06 Overview Claude Code dev containers provide security-hardened development environments using container technology. They enable isolated, reproducible, and secure Claude Code sessions. Architecture Base Configuration Dev containers are built on: Node.js 20 with essential development tools Custom security firewall VS Code Dev Containers integration Components devcontainer.json: Container configuration and settings Dockerfile: Image definition and tool installation init-firewall.sh: Network security rule initialization Security Features Network Isolation Default-deny policy with whitelisted outbound connections: Allowed by default: npm registry (registry.npmjs.org) GitHub (github.com, api.github.com) Claude API (api.anthropic.com) DNS services SSH for git operations All other external connections are blocked. Firewall Configuration The init-firewall.sh script establishes: Outbound whitelist rules Default-deny for unlisted domains Startup verification of firewall status Customizing Network Access Modify init-firewall.sh to add custom allowed domains: # Add custom domain to whitelist iptables -A OUTPUT -d custom.example.com -j ACCEPT VS Code Integration Required Extensions The devcontainer.json can specify VS Code extensions: { \"customizations\": { \"vscode\": { \"extensions\": [ \"ms-python.python\", \"esbenp.prettier-vscode\" ] } } } Settings Override Container-specific VS Code settings: { \"customizations\": { \"vscode\": { \"settings\": { \"editor.formatOnSave\": true } } } } Volume Mounts Default Mounts Typical dev container mounts: Workspace directory Git credentials SSH keys (optional) Custom Mounts Add custom mounts in devcontainer.json: { \"mounts\": [ \"source=${localWorkspaceFolder},target=/workspace,type=bind\", \"source=${localEnv:HOME}/.npm,target=/home/node/.npm,type=bind\" ] } Unattended Operation Skip Permissions Flag For fully automated environments: claude --dangerously-skip-permissions This bypasses all permission prompts. Security Warning When using --dangerously-skip-permissions: Container has full access to mounted volumes Malicious code can access Claude Code credentials Only use with fully trusted repositories Never expose container to untrusted input Recommended Use Cases Safe usage scenarios: Controlled CI/CD pipelines Isolated testing environments Trusted internal repositories Unsafe scenarios: Public code execution Untrusted repository analysis User-facing automation Resource Configuration CPU and Memory Configure resource limits in devcontainer.json: { \"hostRequirements\": { \"cpus\": 4, \"memory\": \"8gb\", \"storage\": \"32gb\" } } GPU Access For AI/ML workloads: { \"hostRequirements\": { \"gpu\": \"optional\" } } Shell Configuration Default Shell Set default shell in Dockerfile: RUN chsh -s /bin/zsh node Shell Customization Add custom shell configuration: COPY .zshrc /home/node/.zshrc Tool Installation System Packages In Dockerfile: RUN apt-get update && apt-get install -y \\ git \\ curl \\ jq \\ && rm -rf /var/lib/apt/lists/* Development Tools RUN npm install -g \\ typescript \\ eslint \\ prettier Language Runtimes # Python RUN apt-get install -y python3 python3-pip # Go RUN wget https://go.dev/dl/go1.21.0.linux-amd64.tar.gz && \\ tar -xzf go1.21.0.linux-amd64.tar.gz -C /usr/local Use Cases Client Project Isolation Isolate client work: Separate container per client Independent credentials No cross-contamination risk Team Onboarding Standardized setup: Consistent tool versions Pre-configured environment Reduced setup time CI/CD Mirroring Match production: Same dependencies Same security policies Reproducible builds Development Standardization Team consistency: Shared configurations Common tooling Unified workflows Creating a Dev Container Step 1: Create Directory mkdir -p .devcontainer Step 2: Create devcontainer.json { \"name\": \"Claude Code Development\", \"build\": { \"dockerfile\": \"Dockerfile\" }, \"customizations\": { \"vscode\": { \"extensions\": [\"anthropic.claude-code\"] } }, \"postCreateCommand\": \"npm install\" } Step 3: Create Dockerfile FROM node:20-slim # Install essential tools RUN apt-get update && apt-get install -y \\ git \\ curl \\ && rm -rf /var/lib/apt/lists/* # Install Claude Code RUN npm install -g @anthropic-ai/claude-code # Set up non-root user USER node WORKDIR /workspace Step 4: Create Firewall Script #!/bin/bash # init-firewall.sh # Default deny iptables -P OUTPUT DROP # Allow established connections iptables -A OUTPUT -m state --state ESTABLISHED,RELATED -j ACCEPT # Allow localhost iptables -A OUTPUT -o lo -j ACCEPT # Allow DNS iptables -A OUTPUT -p udp --dport 53 -j ACCEPT # Allow HTTPS iptables -A OUTPUT -p tcp --dport 443 -j ACCEPT # Allow specific domains (resolve IPs) # Add your domain allowlist here Step 5: Open in Container In VS Code: Install Remote - Containers extension Command Palette: \"Dev Containers: Reopen in Container\" Best Practices Security Review firewall rules regularly Minimize allowed domains Audit tool installations Use specific image versions Performance Use volume caching for dependencies Pre-build images for common configurations Optimize Dockerfile layers Maintenance Document customizations Version control devcontainer configs Test container builds regularly Update base images periodically Troubleshooting Container Build Fails Check: Dockerfile syntax Network access during build Base image availability Network Issues If connectivity problems occur: Verify firewall rules Check DNS resolution Test allowed domains manually Permission Issues If permission denied errors: Check user configuration Verify volume mount permissions Review file ownership VS Code Connection Issues If VS Code cannot connect: Verify Docker is running Check extension installation Review devcontainer.json syntax"},{"id":".claude/skills/foundation-cc/reference/claude-code-discover-plugins-official.md","title":"Claude Code Plugin Discovery and Installation - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-discover-plugins-official.md","desc":"","html":"<h1 id=\"claude-code-plugin-discovery-and-installation-official-documentation-reference\">Claude Code Plugin Discovery and Installation - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/discover-plugins Related: https://code.claude.com/docs/en/plugins Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>Plugin marketplaces are catalogs of pre-built plugins that extend Claude Code with custom commands, agents, hooks, and MCP servers. Discovery and installation is a two-step process:<\/p>\n<p>Step 1: Add the marketplace to register the catalog with Claude Code for browsing available plugins<\/p>\n<p>Step 2: Install individual plugins by selecting specific plugins you want to use<\/p>\n<p>Think of it like adding an app store: adding the store gives you access to browse its collection, but you still choose which apps to download individually.<\/p>\n<h2 id=\"official-anthropic-marketplace\">Official Anthropic Marketplace<\/h2>\n<p>The official marketplace (claude-plugins-official) is automatically available when you start Claude Code. No manual registration required.<\/p>\n<h3 id=\"installation-command\">Installation Command<\/h3>\n<pre><code>/plugin install plugin-name@claude-plugins-official<\/code><\/pre>\n<h3 id=\"code-intelligence-plugins-lsp-based\">Code Intelligence Plugins (LSP-based)<\/h3>\n<p>These plugins provide deep codebase understanding with jump-to-definition, find references, and type error detection. Each requires the corresponding language server binary to be installed.<\/p>\n<p>C/C++ Plugin:<\/p>\n<ul><li>Plugin name: clangd-lsp<\/li><li>Required binary: clangd<\/li><\/ul>\n<p>C# Plugin:<\/p>\n<ul><li>Plugin name: csharp-lsp<\/li><li>Required binary: csharp-ls<\/li><\/ul>\n<p>Go Plugin:<\/p>\n<ul><li>Plugin name: gopls-lsp<\/li><li>Required binary: gopls<\/li><\/ul>\n<p>Java Plugin:<\/p>\n<ul><li>Plugin name: jdtls-lsp<\/li><li>Required binary: jdtls<\/li><\/ul>\n<p>Lua Plugin:<\/p>\n<ul><li>Plugin name: lua-lsp<\/li><li>Required binary: lua-language-server<\/li><\/ul>\n<p>PHP Plugin:<\/p>\n<ul><li>Plugin name: php-lsp<\/li><li>Required binary: intelephense<\/li><\/ul>\n<p>Python Plugin:<\/p>\n<ul><li>Plugin name: pyright-lsp<\/li><li>Required binary: pyright-langserver<\/li><\/ul>\n<p>Rust Plugin:<\/p>\n<ul><li>Plugin name: rust-analyzer-lsp<\/li><li>Required binary: rust-analyzer<\/li><\/ul>\n<p>Swift Plugin:<\/p>\n<ul><li>Plugin name: swift-lsp<\/li><li>Required binary: sourcekit-lsp<\/li><\/ul>\n<p>TypeScript Plugin:<\/p>\n<ul><li>Plugin name: typescript-lsp<\/li><li>Required binary: typescript-language-server<\/li><\/ul>\n<h3 id=\"external-integrations-mcp-servers\">External Integrations (MCP Servers)<\/h3>\n<p>Pre-configured MCP servers for connecting to external services:<\/p>\n<p>Source Control:<\/p>\n<ul><li>github: GitHub integration<\/li><li>gitlab: GitLab integration<\/li><\/ul>\n<p>Project Management:<\/p>\n<ul><li>atlassian: Jira and Confluence integration<\/li><li>asana: Asana project management<\/li><li>linear: Linear issue tracking<\/li><li>notion: Notion workspace integration<\/li><\/ul>\n<p>Design Tools:<\/p>\n<ul><li>figma: Figma design platform integration<\/li><\/ul>\n<p>Infrastructure:<\/p>\n<ul><li>vercel: Vercel deployment platform<\/li><li>firebase: Google Firebase services<\/li><li>supabase: Supabase backend services<\/li><\/ul>\n<p>Communication:<\/p>\n<ul><li>slack: Slack messaging integration<\/li><\/ul>\n<p>Monitoring:<\/p>\n<ul><li>sentry: Sentry error monitoring<\/li><\/ul>\n<h3 id=\"development-workflow-plugins\">Development Workflow Plugins<\/h3>\n<ul><li>commit-commands: Git commit workflows including commit, push, and PR creation<\/li><li>pr-review-toolkit: Specialized pull request review agents<\/li><li>agent-sdk-dev: Tools for Claude Agent SDK development<\/li><li>plugin-dev: Toolkit for creating plugins<\/li><\/ul>\n<h3 id=\"output-style-plugins\">Output Style Plugins<\/h3>\n<ul><li>explanatory-output-style: Educational insights about implementation choices<\/li><li>learning-output-style: Interactive learning mode for skill building<\/li><\/ul>\n<h2 id=\"adding-marketplaces\">Adding Marketplaces<\/h2>\n<h3 id=\"from-github\">From GitHub<\/h3>\n<p>Basic format using owner/repo notation:<\/p>\n<pre><code>/plugin marketplace add owner/repo<\/code><\/pre>\n<p>Example:<\/p>\n<pre><code>/plugin marketplace add anthropics/claude-code<\/code><\/pre>\n<h3 id=\"from-other-git-hosts\">From Other Git Hosts<\/h3>\n<p>HTTPS URL format:<\/p>\n<pre><code>/plugin marketplace add https://gitlab.com/company/plugins.git<\/code><\/pre>\n<p>SSH URL format:<\/p>\n<pre><code>/plugin marketplace add [email protected]:company/plugins.git<\/code><\/pre>\n<p>With specific branch or tag:<\/p>\n<pre><code>/plugin marketplace add https://gitlab.com/company/plugins.git#v1.0.0<\/code><\/pre>\n<h3 id=\"from-local-paths\">From Local Paths<\/h3>\n<p>From local directory:<\/p>\n<pre><code>/plugin marketplace add ./my-marketplace<\/code><\/pre>\n<p>From direct marketplace.json file path:<\/p>\n<pre><code>/plugin marketplace add ./path/to/marketplace.json<\/code><\/pre>\n<h3 id=\"from-remote-url\">From Remote URL<\/h3>\n<p>Direct URL to marketplace.json:<\/p>\n<pre><code>/plugin marketplace add https://example.com/marketplace.json<\/code><\/pre>\n<h2 id=\"installing-plugins\">Installing Plugins<\/h2>\n<h3 id=\"command-line-installation\">Command Line Installation<\/h3>\n<p>Default installation to user scope:<\/p>\n<pre><code>/plugin install plugin-name@marketplace-name<\/code><\/pre>\n<p>Installation with specific scope:<\/p>\n<pre><code>claude plugin install formatter@your-org --scope project<\/code><\/pre>\n<h3 id=\"installation-scopes\">Installation Scopes<\/h3>\n<p>User Scope (default):<\/p>\n<ul><li>Install for yourself across all projects<\/li><li>Files stored in user configuration<\/li><\/ul>\n<p>Project Scope:<\/p>\n<ul><li>Install for all collaborators on the repository<\/li><li>Configuration added to .claude/settings.json<\/li><li>Shared via version control<\/li><\/ul>\n<p>Local Scope:<\/p>\n<ul><li>Install for yourself in this repository only<\/li><li>Not shared with collaborators<\/li><\/ul>\n<p>Managed Scope:<\/p>\n<ul><li>Enterprise admin-installed plugins<\/li><li>Read-only for users<\/li><\/ul>\n<h3 id=\"interactive-installation\">Interactive Installation<\/h3>\n<p>Open plugin manager:<\/p>\n<pre><code>/plugin<\/code><\/pre>\n<p>Navigate to Discover tab, press Enter on a plugin to see scope options.<\/p>\n<h2 id=\"managing-installed-plugins\">Managing Installed Plugins<\/h2>\n<h3 id=\"disable-without-uninstalling\">Disable Without Uninstalling<\/h3>\n<pre><code>/plugin disable plugin-name@marketplace-name<\/code><\/pre>\n<h3 id=\"re-enable-a-disabled-plugin\">Re-enable a Disabled Plugin<\/h3>\n<pre><code>/plugin enable plugin-name@marketplace-name<\/code><\/pre>\n<h3 id=\"uninstall-a-plugin\">Uninstall a Plugin<\/h3>\n<pre><code>/plugin uninstall plugin-name@marketplace-name<\/code><\/pre>\n<h3 id=\"target-specific-scope\">Target Specific Scope<\/h3>\n<pre><code>claude plugin uninstall formatter@your-org --scope project<\/code><\/pre>\n<h2 id=\"managing-marketplaces\">Managing Marketplaces<\/h2>\n<h3 id=\"list-all-marketplaces\">List All Marketplaces<\/h3>\n<pre><code>/plugin marketplace list<\/code><\/pre>\n<h3 id=\"refresh-plugin-listings\">Refresh Plugin Listings<\/h3>\n<pre><code>/plugin marketplace update marketplace-name<\/code><\/pre>\n<h3 id=\"remove-a-marketplace\">Remove a Marketplace<\/h3>\n<pre><code>/plugin marketplace remove marketplace-name<\/code><\/pre>\n<h3 id=\"command-shortcuts\">Command Shortcuts<\/h3>\n<ul><li>Use /plugin market instead of /plugin marketplace<\/li><li>Use rm instead of remove<\/li><\/ul>\n<h3 id=\"auto-update-configuration\">Auto-Update Configuration<\/h3>\n<p>Enable or disable auto-updates via interactive manager:<\/p>\n<ol><li>Run /plugin<\/li><li>Select Marketplaces tab<\/li><li>Choose a marketplace<\/li><li>Select Enable auto-update or Disable auto-update<\/li><\/ol>\n<p>Default behavior:<\/p>\n<ul><li>Official Anthropic marketplaces: auto-update enabled<\/li><li>Third-party and local marketplaces: auto-update disabled<\/li><\/ul>\n<p>Disable all auto-updates globally:<\/p>\n<pre><code>export DISABLE_AUTOUPDATER=true<\/code><\/pre>\n<h2 id=\"interactive-plugin-manager\">Interactive Plugin Manager<\/h2>\n<p>The /plugin command opens a tabbed interface. Use Tab to cycle forward and Shift+Tab to cycle backward.<\/p>\n<p>Discover Tab:<\/p>\n<ul><li>Browse available plugins from all added marketplaces<\/li><li>View plugin descriptions and details<\/li><li>Install plugins with scope selection<\/li><\/ul>\n<p>Installed Tab:<\/p>\n<ul><li>View installed plugins grouped by scope<\/li><li>Enable, disable, or uninstall plugins<\/li><li>Check plugin status<\/li><\/ul>\n<p>Marketplaces Tab:<\/p>\n<ul><li>View all registered marketplaces<\/li><li>Add new marketplaces<\/li><li>Update or remove existing marketplaces<\/li><li>Configure auto-update settings<\/li><\/ul>\n<p>Errors Tab:<\/p>\n<ul><li>View plugin loading errors<\/li><li>Diagnose installation issues<\/li><li>Check for missing dependencies<\/li><\/ul>\n<h2 id=\"team-configuration\">Team Configuration<\/h2>\n<p>Team admins can configure automatic marketplace and plugin installation via .claude/settings.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;extraKnownMarketplaces&quot;: [\n    {\n      &quot;source&quot;: &quot;https://github.com/company/plugins&quot;,\n      &quot;name&quot;: &quot;company-plugins&quot;\n    }\n  ],\n  &quot;enabledPlugins&quot;: [\n    {\n      &quot;name&quot;: &quot;plugin-name&quot;,\n      &quot;marketplaceId&quot;: &quot;marketplace-name&quot;,\n      &quot;scope&quot;: &quot;project&quot;\n    }\n  ]\n}<\/code><\/pre>\n<p>When team members trust the repository, Claude Code prompts them to install configured marketplaces and plugins automatically.<\/p>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<p>/plugin Command Not Recognized:<\/p>\n<ul><li>Check version with: claude --version (requires 1.0.33+)<\/li><li>Update via: brew upgrade claude-code or npm update -g @anthropic-ai/claude-code<\/li><li>Restart terminal after updating<\/li><\/ul>\n<p>Marketplace Not Loading:<\/p>\n<ul><li>Verify URL is accessible and .claude-plugin/marketplace.json exists at repository root<\/li><\/ul>\n<p>Plugin Installation Failures:<\/p>\n<ul><li>Check plugin source URLs are accessible<\/li><li>Verify repositories are public or you have access credentials<\/li><\/ul>\n<p>Files Not Found After Installation:<\/p>\n<ul><li>Plugins are copied to cache; paths outside plugin directory will not work<\/li><\/ul>\n<p>Executable Not Found in PATH:<\/p>\n<ul><li>Install required language server binary from Code Intelligence section<\/li><\/ul>\n<p>Skills Not Appearing:<\/p>\n<ul><li>Clear cache: rm -rf ~/.claude/plugins/cache<\/li><li>Restart Claude Code and reinstall affected plugins<\/li><\/ul>\n<h2 id=\"quick-start-example\">Quick Start Example<\/h2>\n<pre><code>/plugin marketplace add anthropics/claude-code\n/plugin\n/plugin install commit-commands@anthropics-claude-code\n/commit-commands:commit<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<p>For Individual Users:<\/p>\n<ul><li>Start with official marketplace plugins matching your development stack<\/li><li>Install LSP plugins for primary languages to enable code intelligence<\/li><li>Use project scope for plugins shared with team members<\/li><li>Keep plugins updated by periodically running marketplace updates<\/li><\/ul>\n<p>For Teams:<\/p>\n<ul><li>Configure extraKnownMarketplaces in project settings for team-wide access<\/li><li>Use enabledPlugins to auto-install required plugins for new members<\/li><li>Document plugin requirements in project README<\/li><li>Consider custom marketplace for organization-specific plugins<\/li><\/ul>\n<p>For Plugin Developers:<\/p>\n<ul><li>Test plugins locally before publishing to marketplace<\/li><li>Use plugin-dev from official marketplace for development tooling<\/li><li>Follow plugin structure conventions from plugins reference<\/li><li>Version plugins semantically and maintain changelogs<\/li><\/ul>\n<h2 id=\"related-documentation\">Related Documentation<\/h2>\n<ul><li>Plugin Development: https://code.claude.com/docs/en/plugins<\/li><li>Plugin Marketplaces: https://code.claude.com/docs/en/plugin-marketplaces<\/li><li>Plugins Reference: https://code.claude.com/docs/en/plugins-reference<\/li><\/ul>","text":"Claude Code Plugin Discovery and Installation - Official Documentation Reference Source: https://code.claude.com/docs/en/discover-plugins Related: https://code.claude.com/docs/en/plugins Updated: 2026-01-06 Overview Plugin marketplaces are catalogs of pre-built plugins that extend Claude Code with custom commands, agents, hooks, and MCP servers. Discovery and installation is a two-step process: Step 1: Add the marketplace to register the catalog with Claude Code for browsing available plugins Step 2: Install individual plugins by selecting specific plugins you want to use Think of it like adding an app store: adding the store gives you access to browse its collection, but you still choose which apps to download individually. Official Anthropic Marketplace The official marketplace (claude-plugins-official) is automatically available when you start Claude Code. No manual registration required. Installation Command /plugin install plugin-name@claude-plugins-official Code Intelligence Plugins (LSP-based) These plugins provide deep codebase understanding with jump-to-definition, find references, and type error detection. Each requires the corresponding language server binary to be installed. C/C++ Plugin: Plugin name: clangd-lsp Required binary: clangd C# Plugin: Plugin name: csharp-lsp Required binary: csharp-ls Go Plugin: Plugin name: gopls-lsp Required binary: gopls Java Plugin: Plugin name: jdtls-lsp Required binary: jdtls Lua Plugin: Plugin name: lua-lsp Required binary: lua-language-server PHP Plugin: Plugin name: php-lsp Required binary: intelephense Python Plugin: Plugin name: pyright-lsp Required binary: pyright-langserver Rust Plugin: Plugin name: rust-analyzer-lsp Required binary: rust-analyzer Swift Plugin: Plugin name: swift-lsp Required binary: sourcekit-lsp TypeScript Plugin: Plugin name: typescript-lsp Required binary: typescript-language-server External Integrations (MCP Servers) Pre-configured MCP servers for connecting to external services: Source Control: github: GitHub integration gitlab: GitLab integration Project Management: atlassian: Jira and Confluence integration asana: Asana project management linear: Linear issue tracking notion: Notion workspace integration Design Tools: figma: Figma design platform integration Infrastructure: vercel: Vercel deployment platform firebase: Google Firebase services supabase: Supabase backend services Communication: slack: Slack messaging integration Monitoring: sentry: Sentry error monitoring Development Workflow Plugins commit-commands: Git commit workflows including commit, push, and PR creation pr-review-toolkit: Specialized pull request review agents agent-sdk-dev: Tools for Claude Agent SDK development plugin-dev: Toolkit for creating plugins Output Style Plugins explanatory-output-style: Educational insights about implementation choices learning-output-style: Interactive learning mode for skill building Adding Marketplaces From GitHub Basic format using owner/repo notation: /plugin marketplace add owner/repo Example: /plugin marketplace add anthropics/claude-code From Other Git Hosts HTTPS URL format: /plugin marketplace add https://gitlab.com/company/plugins.git SSH URL format: /plugin marketplace add [email protected]:company/plugins.git With specific branch or tag: /plugin marketplace add https://gitlab.com/company/plugins.git#v1.0.0 From Local Paths From local directory: /plugin marketplace add ./my-marketplace From direct marketplace.json file path: /plugin marketplace add ./path/to/marketplace.json From Remote URL Direct URL to marketplace.json: /plugin marketplace add https://example.com/marketplace.json Installing Plugins Command Line Installation Default installation to user scope: /plugin install plugin-name@marketplace-name Installation with specific scope: claude plugin install formatter@your-org --scope project Installation Scopes User Scope (default): Install for yourself across all projects Files stored in user configuration Project Scope: Install for all collaborators on the repository Configuration added to .claude/settings.json Shared via version control Local Scope: Install for yourself in this repository only Not shared with collaborators Managed Scope: Enterprise admin-installed plugins Read-only for users Interactive Installation Open plugin manager: /plugin Navigate to Discover tab, press Enter on a plugin to see scope options. Managing Installed Plugins Disable Without Uninstalling /plugin disable plugin-name@marketplace-name Re-enable a Disabled Plugin /plugin enable plugin-name@marketplace-name Uninstall a Plugin /plugin uninstall plugin-name@marketplace-name Target Specific Scope claude plugin uninstall formatter@your-org --scope project Managing Marketplaces List All Marketplaces /plugin marketplace list Refresh Plugin Listings /plugin marketplace update marketplace-name Remove a Marketplace /plugin marketplace remove marketplace-name Command Shortcuts Use /plugin market instead of /plugin marketplace Use rm instead of remove Auto-Update Configuration Enable or disable auto-updates via interactive manager: Run /plugin Select Marketplaces tab Choose a marketplace Select Enable auto-update or Disable auto-update Default behavior: Official Anthropic marketplaces: auto-update enabled Third-party and local marketplaces: auto-update disabled Disable all auto-updates globally: export DISABLE_AUTOUPDATER=true Interactive Plugin Manager The /plugin command opens a tabbed interface. Use Tab to cycle forward and Shift+Tab to cycle backward. Discover Tab: Browse available plugins from all added marketplaces View plugin descriptions and details Install plugins with scope selection Installed Tab: View installed plugins grouped by scope Enable, disable, or uninstall plugins Check plugin status Marketplaces Tab: View all registered marketplaces Add new marketplaces Update or remove existing marketplaces Configure auto-update settings Errors Tab: View plugin loading errors Diagnose installation issues Check for missing dependencies Team Configuration Team admins can configure automatic marketplace and plugin installation via .claude/settings.json: { \"extraKnownMarketplaces\": [ { \"source\": \"https://github.com/company/plugins\", \"name\": \"company-plugins\" } ], \"enabledPlugins\": [ { \"name\": \"plugin-name\", \"marketplaceId\": \"marketplace-name\", \"scope\": \"project\" } ] } When team members trust the repository, Claude Code prompts them to install configured marketplaces and plugins automatically. Troubleshooting /plugin Command Not Recognized: Check version with: claude --version (requires 1.0.33+) Update via: brew upgrade claude-code or npm update -g @anthropic-ai/claude-code Restart terminal after updating Marketplace Not Loading: Verify URL is accessible and .claude-plugin/marketplace.json exists at repository root Plugin Installation Failures: Check plugin source URLs are accessible Verify repositories are public or you have access credentials Files Not Found After Installation: Plugins are copied to cache; paths outside plugin directory will not work Executable Not Found in PATH: Install required language server binary from Code Intelligence section Skills Not Appearing: Clear cache: rm -rf ~/.claude/plugins/cache Restart Claude Code and reinstall affected plugins Quick Start Example /plugin marketplace add anthropics/claude-code /plugin /plugin install commit-commands@anthropics-claude-code /commit-commands:commit Best Practices For Individual Users: Start with official marketplace plugins matching your development stack Install LSP plugins for primary languages to enable code intelligence Use project scope for plugins shared with team members Keep plugins updated by periodically running marketplace updates For Teams: Configure extraKnownMarketplaces in project settings for team-wide access Use enabledPlugins to auto-install required plugins for new members Document plugin requirements in project README Consider custom marketplace for organization-specific plugins For Plugin Develo"},{"id":".claude/skills/foundation-cc/reference/claude-code-headless-official.md","title":"Claude Code Headless Mode - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-headless-official.md","desc":"","html":"<h1 id=\"claude-code-headless-mode-official-documentation-reference\">Claude Code Headless Mode - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/headless Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>Headless mode allows programmatic interaction with Claude Code without an interactive terminal interface. This enables CI/CD integration, automated workflows, and script-based usage.<\/p>\n<h2 id=\"basic-usage\">Basic Usage<\/h2>\n<h3 id=\"simple-prompt\">Simple Prompt<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Your prompt here&quot;<\/code><\/pre>\n<p>The -p flag runs Claude with the given prompt and exits after completion.<\/p>\n<h3 id=\"continue-previous-conversation\">Continue Previous Conversation<\/h3>\n<pre><code class=\"language-bash\">claude -c &quot;Follow-up question&quot;<\/code><\/pre>\n<p>The -c flag continues the most recent conversation.<\/p>\n<h3 id=\"resume-specific-session\">Resume Specific Session<\/h3>\n<pre><code class=\"language-bash\">claude -r session_id &quot;Continue this task&quot;<\/code><\/pre>\n<p>The -r flag resumes a specific session by ID.<\/p>\n<h2 id=\"output-formats\">Output Formats<\/h2>\n<h3 id=\"plain-text-default\">Plain Text (default)<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Explain this code&quot; --output-format text<\/code><\/pre>\n<p>Returns response as plain text.<\/p>\n<h3 id=\"json-output\">JSON Output<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Analyze this&quot; --output-format json<\/code><\/pre>\n<p>Returns structured JSON:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;result&quot;: &quot;Response text&quot;,\n  &quot;session_id&quot;: &quot;abc123&quot;,\n  &quot;usage&quot;: {\n    &quot;input_tokens&quot;: 100,\n    &quot;output_tokens&quot;: 200\n  },\n  &quot;structured_output&quot;: null\n}<\/code><\/pre>\n<h3 id=\"streaming-json\">Streaming JSON<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Long task&quot; --output-format stream-json<\/code><\/pre>\n<p>Returns JSON objects as they are generated, useful for real-time processing.<\/p>\n<h2 id=\"structured-output\">Structured Output<\/h2>\n<h3 id=\"json-schema-validation\">JSON Schema Validation<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Extract data&quot; --json-schema &#x27;{&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {&quot;name&quot;: {&quot;type&quot;: &quot;string&quot;}}}&#x27;<\/code><\/pre>\n<p>Claude validates output against the provided JSON schema.<\/p>\n<h3 id=\"schema-from-file\">Schema from File<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Process this&quot; --json-schema-file schema.json<\/code><\/pre>\n<p>Loads schema from a file for complex structures.<\/p>\n<h2 id=\"tool-management\">Tool Management<\/h2>\n<h3 id=\"allow-specific-tools\">Allow Specific Tools<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Build the project&quot; --allowedTools &quot;Bash,Read,Write&quot;<\/code><\/pre>\n<p>Auto-approves the specified tools without prompts.<\/p>\n<h3 id=\"tool-pattern-matching\">Tool Pattern Matching<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Check git status&quot; --allowedTools &quot;Bash(git:*)&quot;<\/code><\/pre>\n<p>Allow only specific command patterns.<\/p>\n<h3 id=\"multiple-patterns\">Multiple Patterns<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Review changes&quot; --allowedTools &quot;Bash(git diff:*),Bash(git status:*),Read&quot;<\/code><\/pre>\n<p>Combine multiple tool patterns.<\/p>\n<h3 id=\"disallow-specific-tools\">Disallow Specific Tools<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Analyze code&quot; --disallowedTools &quot;Bash,Write&quot;<\/code><\/pre>\n<p>Prevent Claude from using specified tools.<\/p>\n<h2 id=\"system-prompt-configuration\">System Prompt Configuration<\/h2>\n<h3 id=\"replace-system-prompt\">Replace System Prompt<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --system-prompt &quot;You are a code reviewer&quot;<\/code><\/pre>\n<p>Completely replaces the default system prompt.<\/p>\n<p>Warning: This removes Claude Code capabilities. Use --append-system-prompt instead unless you have specific requirements.<\/p>\n<h3 id=\"append-to-system-prompt\">Append to System Prompt<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --append-system-prompt &quot;Focus on security issues&quot;<\/code><\/pre>\n<p>Adds instructions while preserving Claude Code functionality.<\/p>\n<h3 id=\"system-prompt-from-file\">System Prompt from File<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --system-prompt-file prompt.txt<\/code><\/pre>\n<p>Loads system prompt from a file.<\/p>\n<h2 id=\"session-management\">Session Management<\/h2>\n<h3 id=\"get-session-id\">Get Session ID<\/h3>\n<p>JSON output includes session_id for later reference:<\/p>\n<pre><code class=\"language-bash\">result=$(claude -p &quot;Start task&quot; --output-format json)\nsession_id=$(echo $result | jq -r &#x27;.session_id&#x27;)<\/code><\/pre>\n<h3 id=\"fork-session\">Fork Session<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Alternative approach&quot; --fork-session abc123<\/code><\/pre>\n<p>Creates a new conversation branch from an existing session.<\/p>\n<h2 id=\"advanced-options\">Advanced Options<\/h2>\n<h3 id=\"maximum-turns\">Maximum Turns<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Complex task&quot; --max-turns 10<\/code><\/pre>\n<p>Limits the number of conversation turns.<\/p>\n<h3 id=\"custom-agents\">Custom Agents<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Review code&quot; --agent code-reviewer<\/code><\/pre>\n<p>Uses a specific sub-agent for the task.<\/p>\n<h3 id=\"dynamic-agent-definition\">Dynamic Agent Definition<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --agents &#x27;{\n  &quot;reviewer&quot;: {\n    &quot;description&quot;: &quot;Code review specialist&quot;,\n    &quot;prompt&quot;: &quot;You are an expert code reviewer&quot;,\n    &quot;tools&quot;: [&quot;Read&quot;, &quot;Grep&quot;, &quot;Glob&quot;],\n    &quot;model&quot;: &quot;sonnet&quot;\n  }\n}&#x27;<\/code><\/pre>\n<p>Defines sub-agents dynamically via JSON.<\/p>\n<h3 id=\"settings-override\">Settings Override<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --settings &#x27;{&quot;model&quot;: &quot;opus&quot;}&#x27;<\/code><\/pre>\n<p>Overrides settings for this invocation.<\/p>\n<h3 id=\"show-setting-sources\">Show Setting Sources<\/h3>\n<pre><code class=\"language-bash\">claude --setting-sources<\/code><\/pre>\n<p>Displays where each setting value comes from.<\/p>\n<h2 id=\"browser-integration\">Browser Integration<\/h2>\n<h3 id=\"enable-chrome-integration\">Enable Chrome Integration<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Browse this page&quot; --chrome<\/code><\/pre>\n<p>Enables browser automation capabilities.<\/p>\n<h3 id=\"disable-chrome-integration\">Disable Chrome Integration<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Code task&quot; --no-chrome<\/code><\/pre>\n<p>Explicitly disables browser features.<\/p>\n<h2 id=\"ci-cd-integration-examples\">CI/CD Integration Examples<\/h2>\n<h3 id=\"github-actions\">GitHub Actions<\/h3>\n<pre><code class=\"language-yaml\">- name: Code Review\n  run: |\n    claude -p &quot;Review the changes in this PR&quot; \\\n      --allowedTools &quot;Read,Grep,Glob&quot; \\\n      --output-format json &gt; review.json<\/code><\/pre>\n<h3 id=\"automated-commit-messages\">Automated Commit Messages<\/h3>\n<pre><code class=\"language-bash\">git diff --staged | claude -p &quot;Generate commit message for these changes&quot; \\\n  --allowedTools &quot;Read&quot; \\\n  --append-system-prompt &quot;Output only the commit message, no explanation&quot;<\/code><\/pre>\n<h3 id=\"pr-description-generation\">PR Description Generation<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Generate PR description&quot; \\\n  --allowedTools &quot;Bash(git diff:*),Bash(git log:*),Read&quot; \\\n  --output-format json<\/code><\/pre>\n<h3 id=\"structured-data-extraction\">Structured Data Extraction<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Extract API endpoints from this codebase&quot; \\\n  --allowedTools &quot;Read,Grep,Glob&quot; \\\n  --json-schema &#x27;{&quot;type&quot;: &quot;array&quot;, &quot;items&quot;: {&quot;type&quot;: &quot;object&quot;, &quot;properties&quot;: {&quot;path&quot;: {&quot;type&quot;: &quot;string&quot;}, &quot;method&quot;: {&quot;type&quot;: &quot;string&quot;}}}}&#x27;<\/code><\/pre>\n<h2 id=\"agent-sdk\">Agent SDK<\/h2>\n<p>For more programmatic control, use the Agent SDK:<\/p>\n<h3 id=\"python\">Python<\/h3>\n<pre><code class=\"language-python\">from anthropic import Claude\n\nagent = Claude()\nresult = agent.run(&quot;Your task&quot;, tools=[&quot;Read&quot;, &quot;Write&quot;])<\/code><\/pre>\n<h3 id=\"typescript\">TypeScript<\/h3>\n<pre><code class=\"language-typescript\">import { Claude } from &#x27;@anthropic-ai/sdk&#x27;;\n\nconst agent = new Claude();\nconst result = await agent.run(&quot;Your task&quot;, { tools: [&quot;Read&quot;, &quot;Write&quot;] });<\/code><\/pre>\n<h3 id=\"sdk-features\">SDK Features<\/h3>\n<ul><li>Native structured outputs<\/li><li>Tool approval callbacks<\/li><li>Stream-based real-time output<\/li><li>Full programmatic control<\/li><li>Error handling and retry logic<\/li><\/ul>\n<h2 id=\"environment-variables\">Environment Variables<\/h2>\n<h3 id=\"configuration-via-environment\">Configuration via Environment<\/h3>\n<pre><code class=\"language-bash\">export CLAUDE_MODEL=opus\nexport CLAUDE_OUTPUT_FORMAT=json\nclaude -p &quot;Task&quot;<\/code><\/pre>\n<h3 id=\"available-variables\">Available Variables<\/h3>\n<ul><li>CLAUDE_MODEL: Default model selection<\/li><li>CLAUDE_OUTPUT_FORMAT: Default output format<\/li><li>CLAUDE_TIMEOUT: Request timeout in seconds<\/li><li>CLAUDE_API_KEY: API authentication<\/li><\/ul>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"use-append-for-system-prompts\">Use Append for System Prompts<\/h3>\n<p>Prefer --append-system-prompt over --system-prompt to retain Claude Code capabilities.<\/p>\n<h3 id=\"specify-tool-restrictions\">Specify Tool Restrictions<\/h3>\n<p>Always use --allowedTools in CI/CD to prevent unintended actions.<\/p>\n<h3 id=\"handle-errors\">Handle Errors<\/h3>\n<p>Check exit codes and parse JSON output for error handling:<\/p>\n<pre><code class=\"language-bash\">result=$(claude -p &quot;Task&quot; --output-format json 2&gt;&amp;1)\nif [ $? -ne 0 ]; then\n  echo &quot;Error: $result&quot;\n  exit 1\nfi<\/code><\/pre>\n<h3 id=\"use-structured-output\">Use Structured Output<\/h3>\n<p>For data extraction, use --json-schema to ensure consistent output format.<\/p>\n<h3 id=\"log-sessions\">Log Sessions<\/h3>\n<p>Store session IDs for debugging and continuity:<\/p>\n<pre><code class=\"language-bash\">session_id=$(claude -p &quot;Task&quot; --output-format json | jq -r &#x27;.session_id&#x27;)\necho &quot;Session: $session_id&quot; &gt;&gt; sessions.log<\/code><\/pre>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"command-hangs\">Command Hangs<\/h3>\n<p>If headless mode appears to hang:<\/p>\n<ul><li>Check for permission prompts (use --allowedTools)<\/li><li>Verify network connectivity<\/li><li>Check API key configuration<\/li><\/ul>\n<h3 id=\"unexpected-output-format\">Unexpected Output Format<\/h3>\n<p>If output format is wrong:<\/p>\n<ul><li>Verify --output-format flag spelling<\/li><li>Check for conflicting environment variables<\/li><li>Ensure JSON schema is valid if using --json-schema<\/li><\/ul>\n<h3 id=\"tool-permission-denied\">Tool Permission Denied<\/h3>\n<p>If tools are blocked:<\/p>\n<ul><li>Verify tool names in --allowedTools<\/li><li>Check pattern syntax for command restrictions<\/li><li>Review enterprise policy restrictions<\/li><\/ul>","text":"Claude Code Headless Mode - Official Documentation Reference Source: https://code.claude.com/docs/en/headless Updated: 2026-01-06 Overview Headless mode allows programmatic interaction with Claude Code without an interactive terminal interface. This enables CI/CD integration, automated workflows, and script-based usage. Basic Usage Simple Prompt claude -p \"Your prompt here\" The -p flag runs Claude with the given prompt and exits after completion. Continue Previous Conversation claude -c \"Follow-up question\" The -c flag continues the most recent conversation. Resume Specific Session claude -r session_id \"Continue this task\" The -r flag resumes a specific session by ID. Output Formats Plain Text (default) claude -p \"Explain this code\" --output-format text Returns response as plain text. JSON Output claude -p \"Analyze this\" --output-format json Returns structured JSON: { \"result\": \"Response text\", \"session_id\": \"abc123\", \"usage\": { \"input_tokens\": 100, \"output_tokens\": 200 }, \"structured_output\": null } Streaming JSON claude -p \"Long task\" --output-format stream-json Returns JSON objects as they are generated, useful for real-time processing. Structured Output JSON Schema Validation claude -p \"Extract data\" --json-schema '{\"type\": \"object\", \"properties\": {\"name\": {\"type\": \"string\"}}}' Claude validates output against the provided JSON schema. Schema from File claude -p \"Process this\" --json-schema-file schema.json Loads schema from a file for complex structures. Tool Management Allow Specific Tools claude -p \"Build the project\" --allowedTools \"Bash,Read,Write\" Auto-approves the specified tools without prompts. Tool Pattern Matching claude -p \"Check git status\" --allowedTools \"Bash(git:*)\" Allow only specific command patterns. Multiple Patterns claude -p \"Review changes\" --allowedTools \"Bash(git diff:*),Bash(git status:*),Read\" Combine multiple tool patterns. Disallow Specific Tools claude -p \"Analyze code\" --disallowedTools \"Bash,Write\" Prevent Claude from using specified tools. System Prompt Configuration Replace System Prompt claude -p \"Task\" --system-prompt \"You are a code reviewer\" Completely replaces the default system prompt. Warning: This removes Claude Code capabilities. Use --append-system-prompt instead unless you have specific requirements. Append to System Prompt claude -p \"Task\" --append-system-prompt \"Focus on security issues\" Adds instructions while preserving Claude Code functionality. System Prompt from File claude -p \"Task\" --system-prompt-file prompt.txt Loads system prompt from a file. Session Management Get Session ID JSON output includes session_id for later reference: result=$(claude -p \"Start task\" --output-format json) session_id=$(echo $result | jq -r '.session_id') Fork Session claude -p \"Alternative approach\" --fork-session abc123 Creates a new conversation branch from an existing session. Advanced Options Maximum Turns claude -p \"Complex task\" --max-turns 10 Limits the number of conversation turns. Custom Agents claude -p \"Review code\" --agent code-reviewer Uses a specific sub-agent for the task. Dynamic Agent Definition claude -p \"Task\" --agents '{ \"reviewer\": { \"description\": \"Code review specialist\", \"prompt\": \"You are an expert code reviewer\", \"tools\": [\"Read\", \"Grep\", \"Glob\"], \"model\": \"sonnet\" } }' Defines sub-agents dynamically via JSON. Settings Override claude -p \"Task\" --settings '{\"model\": \"opus\"}' Overrides settings for this invocation. Show Setting Sources claude --setting-sources Displays where each setting value comes from. Browser Integration Enable Chrome Integration claude -p \"Browse this page\" --chrome Enables browser automation capabilities. Disable Chrome Integration claude -p \"Code task\" --no-chrome Explicitly disables browser features. CI/CD Integration Examples GitHub Actions - name: Code Review run: | claude -p \"Review the changes in this PR\" \\ --allowedTools \"Read,Grep,Glob\" \\ --output-format json > review.json Automated Commit Messages git diff --staged | claude -p \"Generate commit message for these changes\" \\ --allowedTools \"Read\" \\ --append-system-prompt \"Output only the commit message, no explanation\" PR Description Generation claude -p \"Generate PR description\" \\ --allowedTools \"Bash(git diff:*),Bash(git log:*),Read\" \\ --output-format json Structured Data Extraction claude -p \"Extract API endpoints from this codebase\" \\ --allowedTools \"Read,Grep,Glob\" \\ --json-schema '{\"type\": \"array\", \"items\": {\"type\": \"object\", \"properties\": {\"path\": {\"type\": \"string\"}, \"method\": {\"type\": \"string\"}}}}' Agent SDK For more programmatic control, use the Agent SDK: Python from anthropic import Claude agent = Claude() result = agent.run(\"Your task\", tools=[\"Read\", \"Write\"]) TypeScript import { Claude } from '@anthropic-ai/sdk'; const agent = new Claude(); const result = await agent.run(\"Your task\", { tools: [\"Read\", \"Write\"] }); SDK Features Native structured outputs Tool approval callbacks Stream-based real-time output Full programmatic control Error handling and retry logic Environment Variables Configuration via Environment export CLAUDE_MODEL=opus export CLAUDE_OUTPUT_FORMAT=json claude -p \"Task\" Available Variables CLAUDE_MODEL: Default model selection CLAUDE_OUTPUT_FORMAT: Default output format CLAUDE_TIMEOUT: Request timeout in seconds CLAUDE_API_KEY: API authentication Best Practices Use Append for System Prompts Prefer --append-system-prompt over --system-prompt to retain Claude Code capabilities. Specify Tool Restrictions Always use --allowedTools in CI/CD to prevent unintended actions. Handle Errors Check exit codes and parse JSON output for error handling: result=$(claude -p \"Task\" --output-format json 2>&1) if [ $? -ne 0 ]; then echo \"Error: $result\" exit 1 fi Use Structured Output For data extraction, use --json-schema to ensure consistent output format. Log Sessions Store session IDs for debugging and continuity: session_id=$(claude -p \"Task\" --output-format json | jq -r '.session_id') echo \"Session: $session_id\" >> sessions.log Troubleshooting Command Hangs If headless mode appears to hang: Check for permission prompts (use --allowedTools) Verify network connectivity Check API key configuration Unexpected Output Format If output format is wrong: Verify --output-format flag spelling Check for conflicting environment variables Ensure JSON schema is valid if using --json-schema Tool Permission Denied If tools are blocked: Verify tool names in --allowedTools Check pattern syntax for command restrictions Review enterprise policy restrictions"},{"id":".claude/skills/foundation-cc/reference/claude-code-hooks-official.md","title":"Claude Code Hooks - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-hooks-official.md","desc":"","html":"<h1 id=\"claude-code-hooks-official-documentation-reference\">Claude Code Hooks - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/hooks<\/p>\n<h2 id=\"key-concepts\">Key Concepts<\/h2>\n<h3 id=\"what-are-claude-code-hooks\">What are Claude Code Hooks?<\/h3>\n<p>Hooks are powerful automation tools that extend Claude Code functionality by executing commands or prompts in response to specific events. They provide deterministic control over Claude Code's behavior through event-driven automation.<\/p>\n<p>Security Warning: Hooks execute arbitrary shell commands with system credentials. Use with extreme caution.<\/p>\n<h3 id=\"hook-system-architecture\">Hook System Architecture<\/h3>\n<p>Event Flow:<\/p>\n<pre><code>User Action → Event Trigger → Hook Execution → Result Processing<\/code><\/pre>\n<p>Hook Types:<\/p>\n<ul><li>Command Hooks: Execute shell commands<\/li><li>Prompt Hooks: Generate and execute prompts<\/li><li>Validation Hooks: Validate inputs and outputs<\/li><li>Notification Hooks: Send notifications or logs<\/li><\/ul>\n<h2 id=\"core-hook-events\">Core Hook Events<\/h2>\n<h3 id=\"tool-related-events\">Tool-Related Events<\/h3>\n<p>PreToolUse: Before tool execution<\/p>\n<ul><li>Can block tool execution<\/li><li>Perfect for validation and security checks<\/li><li>Receives tool name and parameters<\/li><\/ul>\n<p>PostToolUse: After successful tool use<\/p>\n<ul><li>Cannot block (post-execution)<\/li><li>Ideal for logging and cleanup<\/li><li>Receives execution results<\/li><\/ul>\n<p>PermissionRequest: When permission dialogs appear<\/p>\n<ul><li>Can auto-approve or deny<\/li><li>Useful for automation workflows<\/li><li>Receives permission details<\/li><\/ul>\n<h3 id=\"session-related-events\">Session-Related Events<\/h3>\n<p>SessionStart: When new session begins<\/p>\n<ul><li>Initialize session state<\/li><li>Set up environment variables<\/li><li>Configure session-specific settings<\/li><\/ul>\n<p>SessionEnd: When session terminates<\/p>\n<ul><li>Cleanup temporary files<\/li><li>Save session state<\/li><li>Generate session reports<\/li><\/ul>\n<p>SubagentStop: When sub-agent tasks complete<\/p>\n<ul><li>Process sub-agent results<\/li><li>Trigger follow-up actions<\/li><li>Log completion status<\/li><\/ul>\n<p>Stop: When main agent finishes<\/p>\n<ul><li>Final cleanup operations<\/li><li>Generate completion reports<\/li><li>Prepare for next session<\/li><\/ul>\n<h3 id=\"user-interaction-events\">User Interaction Events<\/h3>\n<p>UserPromptSubmit: When user submits prompts<\/p>\n<ul><li>Validate user input<\/li><li>Modify prompts programmatically<\/li><li>Add contextual information<\/li><\/ul>\n<h2 id=\"hook-configuration-locations\">Hook Configuration Locations<\/h2>\n<p>Hooks can be configured in three locations with
