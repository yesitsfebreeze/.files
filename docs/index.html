configuration-2026-01\">Hooks Configuration (2026-01)<\/h3>\n<p>Agents can define hooks in their frontmatter that only run when the agent is active:<\/p>\n<pre><code class=\"language-yaml\">---\nname: code-reviewer\ndescription: Review code changes with quality checks\ntools: Read, Grep, Glob, Bash\nmodel: inherit\nhooks:\n  PreToolUse:\n    - matcher: &quot;Edit&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/pre-edit-check.sh&quot;\n  PostToolUse:\n    - matcher: &quot;Edit|Write&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/run-linter.sh&quot;\n          timeout: 45\n---<\/code><\/pre>\n<p>Hook Fields:<\/p>\n<ul><li>matcher: Regex pattern to match tool names (e.g., \"Edit\", \"Write|Edit\", \"Bash\")<\/li><li>hooks: Array of hook definitions<ul><li>type: \"command\" (shell) or \"prompt\" (LLM)<\/li><li>command: Shell command to execute<\/li><li>timeout: Timeout in seconds (default: 60)<\/li><\/ul><\/li><\/ul>\n<p>IMPORTANT: The <code>once<\/code> field is NOT supported in agent hooks. Use skill hooks if you need one-time execution.<\/p>\n<h3 id=\"storage-locations-and-priority\">Storage Locations and Priority<\/h3>\n<p>Sub-agents are stored as markdown files with YAML frontmatter:<\/p>\n<ol><li>Project Level: .claude/agents/ (highest priority)<\/li><li>User Level: ~/.claude/agents/ (lower priority)<\/li><\/ol>\n<p>Project-level definitions take precedence over user-level definitions with the same name.<\/p>\n<h2 id=\"using-sub-agents\">Using Sub-agents<\/h2>\n<h3 id=\"automatic-delegation\">Automatic Delegation<\/h3>\n<p>Claude proactively delegates tasks based on:<\/p>\n<ul><li>Request description matching sub-agent descriptions<\/li><li>Sub-agent's description field content<\/li><li>Current context and available tools<\/li><\/ul>\n<p>Tip: Include phrases like \"use PROACTIVELY\" or \"MUST BE USED\" in descriptions to encourage automatic invocation.<\/p>\n<h3 id=\"explicit-invocation\">Explicit Invocation<\/h3>\n<p>Request specific sub-agents directly:<\/p>\n<ul><li>\"Use the code-reviewer subagent to check my recent changes\"<\/li><li>\"Have the debugger subagent investigate this error\"<\/li><\/ul>\n<h3 id=\"sub-agent-chaining\">Sub-agent Chaining<\/h3>\n<p>Chain multiple sub-agents for complex workflows:<\/p>\n<p>\"First use the code-analyzer subagent to find performance issues, then use the optimizer subagent to fix them\"<\/p>\n<h2 id=\"model-selection\">Model Selection<\/h2>\n<p>Available model options:<\/p>\n<ul><li>sonnet: Balanced performance and quality (default)<\/li><li>opus: Highest quality, higher cost<\/li><li>haiku: Fastest, most cost-effective<\/li><li>inherit: Use same model as main conversation<\/li><\/ul>\n<p>If model field is omitted, uses the configured default (usually sonnet).<\/p>\n<h2 id=\"built-in-sub-agents\">Built-in Sub-agents<\/h2>\n<h3 id=\"plan-sub-agent\">Plan Sub-agent<\/h3>\n<p>Purpose: Used during plan mode to research codebases Model: Sonnet (for stronger analysis) Tools: Read, Glob, Grep, Bash Auto-invoked: When in plan mode and codebase investigation is needed Behavior: Prevents infinite nesting of sub-agents while enabling context gathering<\/p>\n<h2 id=\"resumable-agents\">Resumable Agents<\/h2>\n<p>Each sub-agent execution gets a unique agentId. Conversations are stored in agent-{agentId}.jsonl format. You can resume previous agent context with full context preserved:<\/p>\n<p>\"Resume agent abc123 and now analyze the authorization logic\"<\/p>\n<p>Use Cases for Resumable Agents:<\/p>\n<ul><li>Long-running research tasks<\/li><li>Iterative improvements<\/li><li>Multi-step workflows spanning multiple sessions<\/li><\/ul>\n<h2 id=\"cli-based-configuration\">CLI-based Configuration<\/h2>\n<p>Define sub-agents dynamically via --agents flag:<\/p>\n<pre><code class=\"language-bash\">claude --agents &#x27;{\n  &quot;code-reviewer&quot;: {\n    &quot;description&quot;: &quot;Expert code reviewer. Use proactively after code changes.&quot;,\n    &quot;prompt&quot;: &quot;You are a senior code reviewer. Focus on code quality, security, and best practices.&quot;,\n    &quot;tools&quot;: [&quot;Read&quot;, &quot;Grep&quot;, &quot;Glob&quot;, &quot;Bash&quot;],\n    &quot;model&quot;: &quot;sonnet&quot;\n  }\n}&#x27;<\/code><\/pre>\n<p>Priority Order: CLI definitions have lowest priority, followed by User-level, then Project-level (highest).<\/p>\n<h2 id=\"managing-sub-agents-with-agents-command\">Managing Sub-agents with /agents Command<\/h2>\n<p>The /agents command provides an interactive menu to:<\/p>\n<ul><li>View all available sub-agents (built-in, user, project)<\/li><li>Create new sub-agents with guided setup<\/li><li>Edit existing custom sub-agents and tool access<\/li><li>Delete custom sub-agents<\/li><li>Manage tool permissions with full available tools list<\/li><\/ul>\n<h2 id=\"practical-examples\">Practical Examples<\/h2>\n<h3 id=\"code-reviewer\">Code Reviewer<\/h3>\n<pre><code class=\"language-yaml\">---\nname: code-reviewer\ndescription: Expert code review specialist. Proactively reviews code for quality, security, and maintainability. Use immediately after writing or modifying code.\ntools: Read, Grep, Glob, Bash\nmodel: inherit\n---\n\nYou are a senior code reviewer ensuring high standards of code quality and security.\n\nWhen invoked:\n1. Run git diff to see recent changes\n2. Focus on modified files\n3. Begin review immediately\n\nReview checklist:\n- Code is simple and readable\n- Functions and variables are well-named\n- No duplicated code\n- Proper error handling\n- No exposed secrets or API keys\n- Input validation implemented\n- Good test coverage\n- Performance considerations adddessed<\/code><\/pre>\n<h3 id=\"debugger\">Debugger<\/h3>\n<pre><code class=\"language-yaml\">---\nname: debugger\ndescription: Debugging specialist for errors, test failures, and unexpected behavior. Use proactively when encountering any issues.\ntools: Read, Edit, Bash, Grep, Glob\n---\n\nYou are an expert debugger specializing in root cause analysis.\n\nDebugging process:\n- Analyze error messages and logs\n- Check recent code changes\n- Form and test hypotheses\n- Add strategic debug logging\n- Inspect variable states\n\nFor each issue, provide:\n- Root cause explanation\n- Evidence supporting the diagnosis\n- Specific code fix\n- Testing approach\n- Prevention recommendations<\/code><\/pre>\n<h3 id=\"data-scientist\">Data Scientist<\/h3>\n<pre><code class=\"language-yaml\">---\nname: data-scientist\ndescription: Data analysis expert for SQL queries and data insights. Use proactively for data analysis tasks.\ntools: Bash, Read, Write\nmodel: sonnet\n---\n\nYou are a data scientist specializing in SQL and BigQuery analysis.\n\nKey practices:\n- Write optimized SQL queries with proper filters\n- Use appropriate aggregations and joins\n- Include comments explaining complex logic\n- Format results for readability\n- Provide data-driven recommendations<\/code><\/pre>\n<h2 id=\"integration-patterns\">Integration Patterns<\/h2>\n<h3 id=\"sequential-delegation\">Sequential Delegation<\/h3>\n<p>Execute tasks in order, passing results between agents:<\/p>\n<p>Phase 1 Analysis: Invoke manager-spec subagent to analyze requirements Phase 2 Implementation: Invoke expert-backend subagent with analysis results Phase 3 Validation: Invoke manager-quality subagent to validate implementation<\/p>\n<h3 id=\"parallel-delegation\">Parallel Delegation<\/h3>\n<p>Execute independent tasks simultaneously:<\/p>\n<p>Invoke expert-backend, expert-frontend, and expert-testing subagents in parallel for independent implementation tasks<\/p>\n<h3 id=\"conditional-delegation\">Conditional Delegation<\/h3>\n<p>Route based on analysis results:<\/p>\n<p>Based on analysis findings, route to expert-backend for database or API issues, expert-debug for crashes<\/p>\n<h2 id=\"context-management\">Context Management<\/h2>\n<h3 id=\"efficient-data-passing\">Efficient Data Passing<\/h3>\n<ul><li>Pass only essential information between agents<\/li><li>Use structured data formats for complex information<\/li><li>Minimize context size for performance optimization<\/li><li>Include validation metadata when appropriate<\/li><\/ul>\n<h3 id=\"context-size-guidelines\">Context Size Guidelines<\/h3>\n<ul><li>Each Agent() creates independent context window<\/li><li>Each sub-agent operates in its own 200K token session<\/li><li>Recommended context size: 20K-50K tokens maximum for passed data<\/li><li>Large datasets should be referenced rather than embedded<\/li><\/ul>\n<h2 id=\"tool-permissions\">Tool Permissions<\/h2>\n<p>Security Principle: Apply least privilege by only granting tools necessary for the agent's domain.<\/p>\n<p>Common Tool Categories:<\/p>\n<p>Read Tools: Read, Grep, Glob (file system access) Write Tools: Write, Edit, MultiEdit (file modification) System Tools: Bash (command execution) Communication Tools: AskUserQuestion, WebFetch (interaction)<\/p>\n<p>Available tools include Claude Code's internal tool set plus any connected MCP server tools.<\/p>\n<h2 id=\"critical-limitations\">Critical Limitations<\/h2>\n<p>Sub-agents Cannot Spawn Other Sub-agents: This is a fundamental limitation to prevent infinite recursion. All delegation must flow from the main conversation or command.<\/p>\n<p>Sub-agents Cannot Use AskUserQuestion Effectively: Sub-agents operate in isolated, stateless contexts and cannot interact with users directly. All user interaction must happen in the main conversation before delegating to sub-agents.<\/p>\n<p>Required Pattern: All sub-agent delegation must use the Agent() function.<\/p>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"1-start-with-claude\">1. Start with Claude<\/h3>\n<p>Have Claude generate initial sub-agents, then customize based on your needs.<\/p>\n<h3 id=\"2-single-responsibility\">2. Single Responsibility<\/h3>\n<p>Design focused sub-agents with clear, single purposes. Each agent should excel at one domain.<\/p>\n<h3 id=\"3-detailed-prompts\">3. Detailed Prompts<\/h3>\n<p>Include specific instructions, examples, and constraints in the system prompt.<\/p>\n<h3 id=\"4-limit-tool-access\">4. Limit Tool Access<\/h3>\n<p>Grant only necessary tools for the sub-agent's role following least privilege principle.<\/p>\n<h3 id=\"5-version-control\">5. Version Control<\/h3>\n<p>Check in project sub-agents to enable team collaboration through git.<\/p>\n<h3 id=\"6-clear-descriptions\">6. Clear Descriptions<\/h3>\n<p>Make description specific and action-oriented. Include trigger scenarios.<\/p>\n<h2 id=\"testing-and-validation\">Testing and Validation<\/h2>\n<p>Test Categories:<\/p>\n<ol><li>Functionality Testing: Agent performs expected tasks correctly<\/li><li>Integration Testing: Agent works properly with other agents<\/li><li>Security Testing: Agent respects security boundaries<\/li><li>Performance Testing: Agent operates efficiently within token limits<\/li><\/ol>\n<p>Validation Steps:<\/p>\n<ol><li>Test agent behavior with various inputs<\/li><li>Verify tool usage respects permissions<\/li><li>Validate error handling and recovery<\/li><li>Check integration with other agents or skills<\/li><\/ol>\n<h2 id=\"error-handling\">Error Handling<\/h2>\n<p>Common Error Types:<\/p>\n<ul><li>Agent Not Found: Incorrect agent name or file not found<\/li><li>Permission Denied: Insufficient tool permissions<\/li><li>Context Overflow: Too much context passed between agents<\/li><li>Infinite Recursion Attempt: Agent tries to spawn another sub-agent<\/li><\/ul>\n<p>Recovery Strategies:<\/p>\n<ul><li>Fallback to basic functionality<\/li><li>User notification with clear error messages<\/li><li>Graceful degradation of complex features<\/li><li>Context optimization for retry attempts<\/li><\/ul>\n<h2 id=\"security-considerations\">Security Considerations<\/h2>\n<p>Access Control:<\/p>\n<ul><li>Apply principle of least privilege<\/li><li>Validate all external inputs<\/li><li>Restrict file system access where appropriate<\/li><li>Audit tool usage regularly<\/li><\/ul>\n<p>Data Protection:<\/p>\n<ul><li>Never pass sensitive credentials between agents<\/li><li>Sanitize inputs before processing<\/li><li>Use secure communication channels<\/li><li>Log agent activities appropriately<\/li><\/ul>","text":"Claude Code Sub-agents - Official Documentation Reference Source: https://code.claude.com/docs/ko/sub-agents Updated: 2026-01-06 What are Sub-agents? Sub-agents are specialized AI assistants that Claude Code can delegate tasks to. Each sub-agent has: A specific purpose and domain expertise Its own separate context window Configurable tools with granular access control A custom system prompt that guides behavior When Claude encounters a task matching a sub-agent's specialty, it can delegate work to that specialized assistant while the main conversation remains focused on high-level goals. Key Benefits Context Preservation: Each sub-agent operates in isolation, preventing main conversation pollution Specialized Expertise: Fine-tuned with detailed domain instructions for higher success rates Reusability: Created once, used across projects and shareable with teams Flexible Permissions: Each can have different tool access levels for security Creating Sub-agents Quick Start Using /agents Command (Recommended) Step 1: Open the agents interface by typing /agents Step 2: Select \"Create New Agent\" (project or user level) Step 3: Define the sub-agent: Describe its purpose and when to use it Select tools (or leave blank to inherit all) Press e to edit the system prompt in your editor Recommended: Have Claude generate it first, then customize Direct File Creation Create markdown files with YAML frontmatter in the appropriate location: Project Sub-agents: .claude/agents/agent-name.md Personal Sub-agents: ~/.claude/agents/agent-name.md Configuration File Format --- name: your-sub-agent-name description: Description of when this subagent should be invoked tools: tool1, tool2, tool3 model: sonnet --- Your subagent's system prompt goes here. This can be multiple paragraphs and should clearly define the subagent's role, capabilities, and approach to solving problems. Configuration Fields Required Fields: name: Unique identifier using lowercase letters and hyphens description: Natural language explanation of purpose. Include phrases like \"use PROACTIVELY\" or \"MUST BE USED\" to encourage automatic invocation. Optional Fields: tools: Comma-separated tool list. If omitted, inherits all available tools. model: Model alias (sonnet, opus, haiku) or 'inherit' to use same model as main conversation. If omitted, uses configured default (usually sonnet). permissionMode: Controls permission handling. Valid values: default , acceptEdits , dontAsk , bypassPermissions , plan , ignore . skills: Comma-separated list of skill names to auto-load when agent is invoked. Skills are NOT inherited from parent. hooks: Define lifecycle hooks scoped to this agent. Supports PreToolUse, PostToolUse, Stop events. Note: once field is NOT supported in agent hooks. Hooks Configuration (2026-01) Agents can define hooks in their frontmatter that only run when the agent is active: --- name: code-reviewer description: Review code changes with quality checks tools: Read, Grep, Glob, Bash model: inherit hooks: PreToolUse: - matcher: \"Edit\" hooks: - type: command command: \"./scripts/pre-edit-check.sh\" PostToolUse: - matcher: \"Edit|Write\" hooks: - type: command command: \"./scripts/run-linter.sh\" timeout: 45 --- Hook Fields: matcher: Regex pattern to match tool names (e.g., \"Edit\", \"Write|Edit\", \"Bash\") hooks: Array of hook definitions type: \"command\" (shell) or \"prompt\" (LLM) command: Shell command to execute timeout: Timeout in seconds (default: 60) IMPORTANT: The once field is NOT supported in agent hooks. Use skill hooks if you need one-time execution. Storage Locations and Priority Sub-agents are stored as markdown files with YAML frontmatter: Project Level: .claude/agents/ (highest priority) User Level: ~/.claude/agents/ (lower priority) Project-level definitions take precedence over user-level definitions with the same name. Using Sub-agents Automatic Delegation Claude proactively delegates tasks based on: Request description matching sub-agent descriptions Sub-agent's description field content Current context and available tools Tip: Include phrases like \"use PROACTIVELY\" or \"MUST BE USED\" in descriptions to encourage automatic invocation. Explicit Invocation Request specific sub-agents directly: \"Use the code-reviewer subagent to check my recent changes\" \"Have the debugger subagent investigate this error\" Sub-agent Chaining Chain multiple sub-agents for complex workflows: \"First use the code-analyzer subagent to find performance issues, then use the optimizer subagent to fix them\" Model Selection Available model options: sonnet: Balanced performance and quality (default) opus: Highest quality, higher cost haiku: Fastest, most cost-effective inherit: Use same model as main conversation If model field is omitted, uses the configured default (usually sonnet). Built-in Sub-agents Plan Sub-agent Purpose: Used during plan mode to research codebases Model: Sonnet (for stronger analysis) Tools: Read, Glob, Grep, Bash Auto-invoked: When in plan mode and codebase investigation is needed Behavior: Prevents infinite nesting of sub-agents while enabling context gathering Resumable Agents Each sub-agent execution gets a unique agentId. Conversations are stored in agent-{agentId}.jsonl format. You can resume previous agent context with full context preserved: \"Resume agent abc123 and now analyze the authorization logic\" Use Cases for Resumable Agents: Long-running research tasks Iterative improvements Multi-step workflows spanning multiple sessions CLI-based Configuration Define sub-agents dynamically via --agents flag: claude --agents '{ \"code-reviewer\": { \"description\": \"Expert code reviewer. Use proactively after code changes.\", \"prompt\": \"You are a senior code reviewer. Focus on code quality, security, and best practices.\", \"tools\": [\"Read\", \"Grep\", \"Glob\", \"Bash\"], \"model\": \"sonnet\" } }' Priority Order: CLI definitions have lowest priority, followed by User-level, then Project-level (highest). Managing Sub-agents with /agents Command The /agents command provides an interactive menu to: View all available sub-agents (built-in, user, project) Create new sub-agents with guided setup Edit existing custom sub-agents and tool access Delete custom sub-agents Manage tool permissions with full available tools list Practical Examples Code Reviewer --- name: code-reviewer description: Expert code review specialist. Proactively reviews code for quality, security, and maintainability. Use immediately after writing or modifying code. tools: Read, Grep, Glob, Bash model: inherit --- You are a senior code reviewer ensuring high standards of code quality and security. When invoked: 1. Run git diff to see recent changes 2. Focus on modified files 3. Begin review immediately Review checklist: - Code is simple and readable - Functions and variables are well-named - No duplicated code - Proper error handling - No exposed secrets or API keys - Input validation implemented - Good test coverage - Performance considerations adddessed Debugger --- name: debugger description: Debugging specialist for errors, test failures, and unexpected behavior. Use proactively when encountering any issues. tools: Read, Edit, Bash, Grep, Glob --- You are an expert debugger specializing in root cause analysis. Debugging process: - Analyze error messages and logs - Check recent code changes - Form and test hypotheses - Add strategic debug logging - Inspect variable states For each issue, provide: - Root cause explanation - Evidence supporting the diagnosis - Specific code fix - Testing approach - Prevention recommendations Data Scientist --- name: data-scientist description: Data analysis expert for SQL queries and data insights. Use proactively for data analysis tasks. tools: Bash, Read, Write model: sonnet --- You are a data scientist specializing in SQL and BigQuery analysis. Key practices: - Write optimized SQL queries with proper filters - Use appropriate aggregations and joins - Include comments explaining complex logic - Format results for readab"},{"id":".claude/skills/foundation-core/SKILL.md","title":"foundation-core","category":"Skills","path":".claude/skills/foundation-core/SKILL.md","desc":">","html":"<h1 id=\"foundation-core\">Foundation Core<\/h1>\n<p>The principles that keep work in the machine correct, delegated, and verifiable. The canonical authority is <code>.claude/agents/default.md<\/code> (Machine law) plus the project layer in <code>/.proj/<\/code>; this skill explains the <em>why<\/em> behind four recurring decisions. It never overrides Machine law or project law.<\/p>\n<h2 id=\"1-delegate-to-the-right-specialist\">1. Delegate to the right specialist<\/h2>\n<p>The default agent is an orchestrator, not a do-everything implementer. Route domain work to the specialist that owns it rather than executing it inline — delegation buys an independent context and domain focus.<\/p>\n<ul><li>Agents resolve by their <code>name:<\/code> frontmatter, not by path. The dispatch table lives in <code>default.md<\/code>; the catalog of who-does-what is there and in <code>/.proj/project.md<\/code>.<\/li><li>Spawn specialists with the Agent tool. When several pieces of work are independent, dispatch them in one message so they run in parallel (see <code>superpowers:dispatching-parallel-agents<\/code>).<\/li><li>Direct execution is appropriate for typo/format fixes, single-file config edits, result synthesis, git operations, and scratch work — anything where a specialist adds no independence or expertise.<\/li><\/ul>\n<h2 id=\"2-pass-a-quality-gate-before-done\">2. Pass a quality gate before \"done\"<\/h2>\n<p>Every non-trivial change answers five questions before it is called complete. The dimensions are language-agnostic; the concrete commands come from the project's own toolchain via <code>/gate<\/code> (it detects fmt/lint/test/build, or reads the exact commands from <code>/.proj/project.md<\/code>).<\/p>\n<ul><li><strong>Tested<\/strong> — the behavior is covered and the suite passes.<\/li><li><strong>Readable<\/strong> — names and structure make intent obvious; the linter is clean.<\/li><li><strong>Unified<\/strong> — formatting and imports match the project; one clean implementation, no leftover duplicate.<\/li><li><strong>Secured<\/strong> — no introduced vulnerability, unbounded input, or concurrency hazard; escalate to <code>expert-security<\/code> when in doubt.<\/li><li><strong>Trackable<\/strong> — a clear commit message; the change is traceable to its reason.<\/li><\/ul>\n<p>Verify by evidence, not by feeling: run the check and quote the output (<code>superpowers:verification-before-completion<\/code>). In this repo \"build\" means configuration integrity — hooks pass <code>node --check<\/code>, <code>settings.json<\/code> parses, and every agent/skill reference resolves.<\/p>\n<h2 id=\"3-progressive-disclosure\">3. Progressive disclosure<\/h2>\n<p>Deliver knowledge in tiers so context budget is spent on what the task needs.<\/p>\n<ul><li>A <code>SKILL.md<\/code> is the entry point: a quick reference plus an implementation guide, kept compact. Deep material moves to <code>modules/&lt;topic&gt;.md<\/code>, reached only when the task demands it.<\/li><li><code>examples.md<\/code> holds working samples; <code>references/<\/code> holds external links and API detail. Cross-reference instead of inlining.<\/li><\/ul>\n<h2 id=\"4-modular-skill-structure\">4. Modular skill structure<\/h2>\n<p>Keep each skill self-describing and small.<\/p>\n<ul><li>Directory <code>name<\/code> must match the <code>name:<\/code> frontmatter, or dispatch loads the wrong (or no) skill.<\/li><li>One responsibility per skill; split overflow into <code>modules/<\/code> rather than growing one file unboundedly.<\/li><li>Single source of truth: each fact lives in exactly one file; reference with <code>@file<\/code> instead of copying.<\/li><\/ul>\n<h2 id=\"works-well-with\">Works well with<\/h2>\n<ul><li><code>default.md<\/code> — Machine law and the live dispatch table (authority).<\/li><li><code>/.proj/project.md<\/code>, <code>/.proj/agent.md<\/code> — project facts, paths, and project law.<\/li><li><code>foundation-cc<\/code> — Claude Code authoring detail for skills, agents, hooks, plugins, and settings.<\/li><li><code>foundation-quality<\/code> — the quality-gate mechanics in depth.<\/li><li><code>/gate<\/code> — the stack-detecting pre-commit check.<\/li><\/ul>\n<h2 id=\"red-flags\">Red flags<\/h2>\n<ul><li>The default agent implementing specialist-domain code instead of delegating.<\/li><li>Claiming \"done\" without running the gate and quoting its output.<\/li><li>A skill directory whose <code>name:<\/code> frontmatter no longer matches its path.<\/li><li>The same fact copied into two files instead of referenced once.<\/li><\/ul>","text":"Foundation Core The principles that keep work in the machine correct, delegated, and verifiable. The canonical authority is .claude/agents/default.md (Machine law) plus the project layer in /.proj/ ; this skill explains the why behind four recurring decisions. It never overrides Machine law or project law. 1. Delegate to the right specialist The default agent is an orchestrator, not a do-everything implementer. Route domain work to the specialist that owns it rather than executing it inline — delegation buys an independent context and domain focus. Agents resolve by their name: frontmatter, not by path. The dispatch table lives in default.md ; the catalog of who-does-what is there and in /.proj/project.md . Spawn specialists with the Agent tool. When several pieces of work are independent, dispatch them in one message so they run in parallel (see superpowers:dispatching-parallel-agents ). Direct execution is appropriate for typo/format fixes, single-file config edits, result synthesis, git operations, and scratch work — anything where a specialist adds no independence or expertise. 2. Pass a quality gate before \"done\" Every non-trivial change answers five questions before it is called complete. The dimensions are language-agnostic; the concrete commands come from the project's own toolchain via /gate (it detects fmt/lint/test/build, or reads the exact commands from /.proj/project.md ). Tested — the behavior is covered and the suite passes. Readable — names and structure make intent obvious; the linter is clean. Unified — formatting and imports match the project; one clean implementation, no leftover duplicate. Secured — no introduced vulnerability, unbounded input, or concurrency hazard; escalate to expert-security when in doubt. Trackable — a clear commit message; the change is traceable to its reason. Verify by evidence, not by feeling: run the check and quote the output ( superpowers:verification-before-completion ). In this repo \"build\" means configuration integrity — hooks pass node --check , settings.json parses, and every agent/skill reference resolves. 3. Progressive disclosure Deliver knowledge in tiers so context budget is spent on what the task needs. A SKILL.md is the entry point: a quick reference plus an implementation guide, kept compact. Deep material moves to modules/<topic>.md , reached only when the task demands it. examples.md holds working samples; references/ holds external links and API detail. Cross-reference instead of inlining. 4. Modular skill structure Keep each skill self-describing and small. Directory name must match the name: frontmatter, or dispatch loads the wrong (or no) skill. One responsibility per skill; split overflow into modules/ rather than growing one file unboundedly. Single source of truth: each fact lives in exactly one file; reference with @file instead of copying. Works well with default.md — Machine law and the live dispatch table (authority). /.proj/project.md , /.proj/agent.md — project facts, paths, and project law. foundation-cc — Claude Code authoring detail for skills, agents, hooks, plugins, and settings. foundation-quality — the quality-gate mechanics in depth. /gate — the stack-detecting pre-commit check. Red flags The default agent implementing specialist-domain code instead of delegating. Claiming \"done\" without running the gate and quoting its output. A skill directory whose name: frontmatter no longer matches its path. The same fact copied into two files instead of referenced once."},{"id":".claude/skills/foundation-quality/SKILL.md","title":"foundation-quality","category":"Skills","path":".claude/skills/foundation-quality/SKILL.md","desc":">","html":"<h1 id=\"foundation-quality\">Foundation Quality<\/h1>\n<p>How the machine keeps quality high: one gate, reviewed proactively, verified by evidence. The runnable check is <code>/gate<\/code> (it detects the project's fmt/lint/test/build, or reads the exact commands from <code>/.proj/project.md<\/code>); the five dimensions below are the language-agnostic standard <code>/gate<\/code> enforces, shared with <code>foundation-core<\/code>.<\/p>\n<h2 id=\"the-quality-gate-five-dimensions\">The quality gate — five dimensions<\/h2>\n<p>Every non-trivial change must satisfy all five before completion:<\/p>\n<ul><li><strong>Tested<\/strong> — behavior is covered and the suite passes; new functionality ships with a test. Uncovered new code is the riskiest code.<\/li><li><strong>Readable<\/strong> — names and structure make intent obvious; the linter is clean, with any remaining warning suppressed per-line and justified, never globally.<\/li><li><strong>Unified<\/strong> — formatting and imports match the project; exactly one current implementation, no leftover duplicate.<\/li><li><strong>Secured<\/strong> — user input and auth paths checked against the OWASP top ten (<code>ref-owasp-checklist<\/code>); no unbounded input or concurrency hazard. Escalate to <code>expert-security<\/code> when unsure.<\/li><li><strong>Trackable<\/strong> — a clear, conventional commit message; the change is traceable to its reason.<\/li><\/ul>\n<p>For a deeper review of an existing diff use <code>/code-review<\/code>; for cleanup-only passes use <code>/simplify<\/code>. Coverage strategy lives in <code>ref-testing-pyramid<\/code>.<\/p>\n<h2 id=\"review-proactively\">Review proactively<\/h2>\n<ul><li><strong>Shift left<\/strong> — the earlier a defect is found, the cheaper it is. Quality checks belong in the development loop, not bolted on before release.<\/li><li><strong>Chesterton's fence<\/strong> — before removing a check or guard, understand why it was added. Removing it blind repeats the failure it was built to prevent.<\/li><li>Automation catches syntax and known patterns; a human-style review pass catches design flaws, naming confusion, and missing abstractions. Do both.<\/li><\/ul>\n<h2 id=\"common-rationalizations\">Common rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"The linter warnings are false positives\"<\/td><td>Suppress them per-line with a reason. Ignoring them trains the team to ignore real issues.<\/td><\/tr><tr><td>\"Security scanning can wait until before release\"<\/td><td>Vulnerabilities compound; late discovery means expensive rework. Check continuously.<\/td><\/tr><tr><td>\"Coverage is high enough, the rest is edge cases\"<\/td><td>Edge cases are where production bugs live. The uncovered code is the riskiest code.<\/td><\/tr><tr><td>\"Code review is subjective, automation is sufficient\"<\/td><td>Automation catches patterns; review catches design flaws and missing abstractions.<\/td><\/tr><tr><td>\"The gate is too bureaucratic for a hotfix\"<\/td><td>A hotfix without the gate breeds the next hotfix. The gate is the minimum, not the maximum.<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"red-flags\">Red flags<\/h2>\n<ul><li>Linter or type-checker warnings suppressed globally instead of per-line.<\/li><li>OWASP checklist not consulted when handling user input or authentication.<\/li><li>No coverage for a commit that adds new functionality.<\/li><li>A gate dimension skipped as \"not applicable\" without justification.<\/li><li>A quality finding identified but left with no action.<\/li><\/ul>\n<h2 id=\"verification-before-done\">Verification before \"done\"<\/h2>\n<ul><li>[ ] Linter clean, or remaining warnings carry inline suppression with reasons.<\/li><li>[ ] OWASP checklist reviewed for security-relevant changes.<\/li><li>[ ] Coverage generated and threshold met — quote the tool output.<\/li><li>[ ] All five gate dimensions assessed.<\/li><li>[ ] Findings triaged with a resolution for each.<\/li><li>[ ] No global rule disabling in the linter config.<\/li><\/ul>\n<p>Claim completion only after running the checks and quoting the output (<code>superpowers:verification-before-completion<\/code>).<\/p>","text":"Foundation Quality How the machine keeps quality high: one gate, reviewed proactively, verified by evidence. The runnable check is /gate (it detects the project's fmt/lint/test/build, or reads the exact commands from /.proj/project.md ); the five dimensions below are the language-agnostic standard /gate enforces, shared with foundation-core . The quality gate — five dimensions Every non-trivial change must satisfy all five before completion: Tested — behavior is covered and the suite passes; new functionality ships with a test. Uncovered new code is the riskiest code. Readable — names and structure make intent obvious; the linter is clean, with any remaining warning suppressed per-line and justified, never globally. Unified — formatting and imports match the project; exactly one current implementation, no leftover duplicate. Secured — user input and auth paths checked against the OWASP top ten ( ref-owasp-checklist ); no unbounded input or concurrency hazard. Escalate to expert-security when unsure. Trackable — a clear, conventional commit message; the change is traceable to its reason. For a deeper review of an existing diff use /code-review ; for cleanup-only passes use /simplify . Coverage strategy lives in ref-testing-pyramid . Review proactively Shift left — the earlier a defect is found, the cheaper it is. Quality checks belong in the development loop, not bolted on before release. Chesterton's fence — before removing a check or guard, understand why it was added. Removing it blind repeats the failure it was built to prevent. Automation catches syntax and known patterns; a human-style review pass catches design flaws, naming confusion, and missing abstractions. Do both. Common rationalizations Rationalization Reality \"The linter warnings are false positives\" Suppress them per-line with a reason. Ignoring them trains the team to ignore real issues. \"Security scanning can wait until before release\" Vulnerabilities compound; late discovery means expensive rework. Check continuously. \"Coverage is high enough, the rest is edge cases\" Edge cases are where production bugs live. The uncovered code is the riskiest code. \"Code review is subjective, automation is sufficient\" Automation catches patterns; review catches design flaws and missing abstractions. \"The gate is too bureaucratic for a hotfix\" A hotfix without the gate breeds the next hotfix. The gate is the minimum, not the maximum. Red flags Linter or type-checker warnings suppressed globally instead of per-line. OWASP checklist not consulted when handling user input or authentication. No coverage for a commit that adds new functionality. A gate dimension skipped as \"not applicable\" without justification. A quality finding identified but left with no action. Verification before \"done\" [ ] Linter clean, or remaining warnings carry inline suppression with reasons. [ ] OWASP checklist reviewed for security-relevant changes. [ ] Coverage generated and threshold met — quote the tool output. [ ] All five gate dimensions assessed. [ ] Findings triaged with a resolution for each. [ ] No global rule disabling in the linter config. Claim completion only after running the checks and quoting the output ( superpowers:verification-before-completion )."},{"id":".claude/skills/gate/SKILL.md","title":"gate","category":"Skills","path":".claude/skills/gate/SKILL.md","desc":">","html":"<h1 id=\"gate-pre-commit-quality-gate\">Gate — pre-commit quality gate<\/h1>\n<p>Lightweight, fast validation before a commit. One pass, report a table. This is the cheap gate; it does <strong>not<\/strong> replace deep review (<code>/personas<\/code>, <code>/code-review<\/code>) or any domain sign-off (e.g. real-time/safety, security).<\/p>\n<h2 id=\"where-the-commands-come-from\">Where the commands come from<\/h2>\n<p>Use the project's own commands, in this priority order:<\/p>\n<ol><li><strong><code>/.proj/project.md<\/code><\/strong> — if it lists a \"Quality gate\" / build / test line, use exactly those. This is the source of truth per repo.<\/li><li><strong>CI<\/strong> — mirror <code>.github/workflows/*<\/code> (or other CI config) so a green local gate means green CI.<\/li><li><strong>Detect from the manifest<\/strong> — first match wins: | Manifest | Format | Lint | Test | Build | |----------|--------|------|------|-------| | <code>Cargo.toml<\/code> | <code>cargo fmt --all -- --check<\/code> | <code>cargo clippy --all-targets -- -D warnings<\/code> | <code>cargo test<\/code> | <code>cargo build<\/code> | | <code>package.json<\/code> | <code>prettier --check .<\/code> | <code>eslint .<\/code> | <code>npm test<\/code> | <code>tsc --noEmit<\/code> / <code>npm run build<\/code> | | <code>pyproject.toml<\/code> | <code>ruff format --check<\/code> | <code>ruff check<\/code> | <code>pytest<\/code> | — | | <code>go.mod<\/code> | <code>gofmt -l .<\/code> | <code>go vet ./...<\/code> | <code>go test ./...<\/code> | <code>go build ./...<\/code> | | <code>CMakeLists.txt<\/code> | — | — | <code>ctest<\/code> | <code>cmake --build build<\/code> | No recognized manifest → report \"unknown toolchain\" and ask the user for the commands (then suggest adding them to <code>/.proj/project.md<\/code>).<\/li><\/ol>\n<p>Honor any <strong>extra project-specific check<\/strong> named in <code>/.proj/project.md<\/code> (e.g. an embedded/<code>no_std<\/code> build, a wasm target, a schema validation) — those catch what the generic checks miss; never skip them.<\/p>\n<h2 id=\"run\">Run<\/h2>\n<p>Run the checks from the repo root. Launch the read-only ones concurrently (separate Bash calls in one message) and collect results.<\/p>\n<ul><li><strong><code>--fix<\/code><\/strong> — apply safe auto-fixes first (formatter, lint <code>--fix<\/code>), then re-run. Never auto-\"fix\" failing tests or a broken build — those need diagnosis (<code>superpowers:systematic-debugging<\/code>).<\/li><\/ul>\n<h2 id=\"report\">Report<\/h2>\n<pre><code>## Gate: PASS\n| Check   | Status | Time  |\n|---------|--------|-------|\n| Format  | PASS   | 0.4s  |\n| Lint    | PASS   | 6.1s  |\n| Tests   | PASS   | 14.2s |\n| Build   | PASS   | 3.0s  |<\/code><\/pre>\n<p>On failure, list the concrete offenders under the table (file:line for lint, test names for failures) — never just \"lint failed\".<\/p>\n<h2 id=\"boundaries-after-a-failure\">Boundaries &amp; after a failure<\/h2>\n<ul><li>Gate proves the tree compiles, formats, lints, and tests pass. It does <strong>not<\/strong> prove domain correctness, real-time safety, or security — follow with <code>/personas<\/code> / <code>/code-review<\/code> for those.<\/li><li><code>--fix<\/code> clears formatting + mechanical lints. Test/build failures: stop and find the root cause — never silence a test or <code>#[allow]<\/code>/eslint-disable a lint to go green. Green gate → clear to commit.<\/li><\/ul>","text":"Gate — pre-commit quality gate Lightweight, fast validation before a commit. One pass, report a table. This is the cheap gate; it does not replace deep review ( /personas , /code-review ) or any domain sign-off (e.g. real-time/safety, security). Where the commands come from Use the project's own commands, in this priority order: /.proj/project.md — if it lists a \"Quality gate\" / build / test line, use exactly those. This is the source of truth per repo. CI — mirror .github/workflows/* (or other CI config) so a green local gate means green CI. Detect from the manifest — first match wins: | Manifest | Format | Lint | Test | Build | |----------|--------|------|------|-------| | Cargo.toml | cargo fmt --all -- --check | cargo clippy --all-targets -- -D warnings | cargo test | cargo build | | package.json | prettier --check . | eslint . | npm test | tsc --noEmit / npm run build | | pyproject.toml | ruff format --check | ruff check | pytest | — | | go.mod | gofmt -l . | go vet ./... | go test ./... | go build ./... | | CMakeLists.txt | — | — | ctest | cmake --build build | No recognized manifest → report \"unknown toolchain\" and ask the user for the commands (then suggest adding them to /.proj/project.md ). Honor any extra project-specific check named in /.proj/project.md (e.g. an embedded/ no_std build, a wasm target, a schema validation) — those catch what the generic checks miss; never skip them. Run Run the checks from the repo root. Launch the read-only ones concurrently (separate Bash calls in one message) and collect results. --fix — apply safe auto-fixes first (formatter, lint --fix ), then re-run. Never auto-\"fix\" failing tests or a broken build — those need diagnosis ( superpowers:systematic-debugging ). Report ## Gate: PASS | Check | Status | Time | |---------|--------|-------| | Format | PASS | 0.4s | | Lint | PASS | 6.1s | | Tests | PASS | 14.2s | | Build | PASS | 3.0s | On failure, list the concrete offenders under the table (file:line for lint, test names for failures) — never just \"lint failed\". Boundaries & after a failure Gate proves the tree compiles, formats, lints, and tests pass. It does not prove domain correctness, real-time safety, or security — follow with /personas / /code-review for those. --fix clears formatting + mechanical lints. Test/build failures: stop and find the root cause — never silence a test or #[allow] /eslint-disable a lint to go green. Green gate → clear to commit."},{"id":".claude/skills/improve/SKILL.md","title":"improve","category":"Skills","path":".claude/skills/improve/SKILL.md","desc":"Rates each code file 1-10 across quality categories, rolls those ratings up into a folder tree so the parts of the app needing the most work surface, then improves worst→best. Uses compute (bash/analysis tools) to measure objective categories when it sharpens a rating. Accepts an optional target (path, module, or concern) to scope the sweep. Manual invocation only. Triggers on `/improve`, \"improve code\", \"code review\", \"refactor\", \"optimize\".","html":"<h1 id=\"overarching-goal\">Overarching Goal<\/h1>\n<p>Create as little and as small files as possible while keeping functionality and readability intact. You leave the codebase cleaner, clearer, and more maintainable than you found it. You do not add features, only polish existing code. You do not delete code unless it's dead or redundant.<\/p>\n<h1 id=\"artifacts\">Artifacts<\/h1>\n<p>json -&gt; @.proj/improve.json<\/p>\n<h1 id=\"target-optional\">Target (optional)<\/h1>\n<p>A target may be supplied as the skill argument (e.g. <code>/improve src/gnn<\/code>, <code>/improve error handling<\/code>).<\/p>\n<ul><li><strong>Given<\/strong> → resolve to a concrete file set (path prefix / subsystem dir / files where the concern applies), rate only those, record it under <code>&quot;target&quot;<\/code>, prune the tree to that subtree.<\/li><li><strong>None<\/strong> → sweep every integrated part of the app.<\/li><\/ul>\n<h1 id=\"compute-use\">Compute-use<\/h1>\n<p>Measure, don't guess, for objective categories when a tool exists and the file is big/important enough to warrant it. Detect the project's toolchain first; use what's there, install only if cheap; degrade to a judged rating if a tool is missing (and note it in <code>&quot;measured&quot;<\/code>). Skip tooling on trivial files. Re-run the same checks when re-rating.<\/p>\n<ul><li>LOC → <code>cloc<\/code>/<code>tokei<\/code>/<code>wc -l<\/code> · Complexity → <code>lizard<\/code>/<code>radon<\/code>/eslint · Coverage → project test runner · Duplication → <code>jscpd<\/code> · Security → <code>bandit<\/code>/<code>npm audit<\/code>/<code>semgrep<\/code> ·<\/li><\/ul>\n<p>Style → project linter<\/p>\n<h1 id=\"folder-rollup\">Folder rollup<\/h1>\n<p>After every file is rated, aggregate <strong>bottom-up<\/strong>: a folder's per-category score = mean of its subtree's files (LOC-weighted), overall <code>score<\/code> = weighted mean of those (lower = more work), <code>weakest<\/code> = lowest category. Then rank folders + files worst→best — that's the \"where's the debt\" answer and the improvement order.<\/p>\n<h1 id=\"workflow\">Workflow<\/h1>\n<ol><li>Resolve scope → file set.<\/li><li>Rate each file 1-10 per category (measure where it helps). Write <code>rating<\/code>, <code>score<\/code>, <code>measured<\/code>, top-3 <code>todos<\/code>.<\/li><li>Build the folder <code>tree<\/code> + <code>ranking<\/code>.<\/li><li>Set <code>&quot;indexed&quot;: true<\/code>.<\/li><li>Improve worst→best (worst folder, its worst file first): fix, then <strong>delete that file's entry from <code>files<\/code><\/strong> (drop it from <code>tree<\/code>/<code>ranking<\/code> too). Re-rate only if you leave it unfinished — otherwise it's gone.<\/li><li>Small commit per file improved, on a dedicated branch per the git-workflow rule (<code>.claude/rules/git-workflow.md<\/code>) — branch first if on the default branch, use a worktree for any isolated testing, clean it up when done. Repeat until budget exhausted.<\/li><\/ol>\n<p><strong>The json only holds outstanding work.<\/strong> A finished file is deleted, not marked done — so the file shrinks over time and a clean codebase converges to an empty <code>files<\/code> list. Never accumulate <code>status:&quot;done&quot;<\/code> records or completed-work logs.<\/p>\n<p>Set a goal via <code>/goal<\/code>, or hand the user this:<\/p>\n<pre><code>/loop 10m Go over &lt;TARGET&gt;. Rate each code file 1-10 per category, measuring LOC/complexity/coverage/duplication/security/style with tools where it sharpens the rating (skip on trivial files). Write rating, score, and top-3 todos to the json. Roll up into a folder tree with per-category aggregates; rank folders+files worst→best. Once everything is indexed, set &quot;indexed&quot;:true and improve from worst folder to best, worst file first. After improving a file, delete its entry from the json (and from tree+ranking) so the file shrinks toward empty, then move on. Commit after each iteration.<\/code><\/pre>\n<h2 id=\"the-json\">The json<\/h2>\n<pre><code class=\"language-json\">{\n &quot;target&quot;: null,            // null = whole-codebase sweep\n &quot;indexed&quot;: false,          // true once every in-scope file is rated AND the tree built\n &quot;rating&quot;: {\n  &quot;min&quot;: 0, &quot;max&quot;: 10,\n  &quot;categories&quot;: [&quot;loc&quot;, &quot;complexity&quot;, &quot;...&quot;],\n  &quot;weights&quot;: { &quot;security&quot;: 2 }   // optional per-category; default 1\n },\n &quot;files&quot;: [{                // outstanding work ONLY; delete an entry once its file is improved\n  &quot;path&quot;: &quot;src/gnn/fusion.ts&quot;,\n  &quot;rating&quot;: [0.5, 1, &quot;...&quot;],     // one per category, SAME ORDER as categories\n  &quot;score&quot;: 3.2,                  // weighted mean; lower = more work\n  &quot;measured&quot;: [&quot;loc&quot;, &quot;complexity&quot;], // computed vs. judged\n  &quot;todos&quot;: [&quot;...&quot;, &quot;...&quot;]        // max 3, by impact\n }],\n &quot;tree&quot;: {                  // aggregated bottom-up\n  &quot;path&quot;: &quot;.&quot;, &quot;score&quot;: 4.1,\n  &quot;categories&quot;: { &quot;loc&quot;: 5.0, &quot;complexity&quot;: 3.4 },\n  &quot;weakest&quot;: &quot;complexity&quot;, &quot;fileCount&quot;: 42,\n  &quot;files&quot;: [&quot;src/index.ts&quot;],\n  &quot;children&quot;: [ /* same shape */ ]\n },\n &quot;ranking&quot;: { &quot;folders&quot;: [&quot;src/gnn&quot;, &quot;...&quot;], &quot;files&quot;: [&quot;src/gnn/fusion.ts&quot;, &quot;...&quot;] } // worst→best\n}<\/code><\/pre>\n<h2 id=\"categories\">Categories<\/h2>\n<p>Pick the ones that apply; keep <code>categories<\/code> consistent across the run so arrays and the rollup line up:<\/p>\n<ul><li>LOC (lines of code)<\/li><li>Complexity (cyclomatic complexity)<\/li><li>Clarity (subjective, based on readability, naming, structure)<\/li><li>Comments (presence and quality of comments)<\/li><li>Single responsibility (does the file have one clear purpose?)<\/li><li>Adherence to requirements (does the file meet the specified requirements?)<\/li><li>Test coverage (are there sufficient tests for the file?)<\/li><li>Performance (are there any performance issues in the file?)<\/li><li>Security (are there any security vulnerabilities in the file?)<\/li><li>Maintainability (how easy is it to maintain and update the file?)<\/li><li>Modularity (is the file modular and reusable?)<\/li><li>Documentation (is there sufficient documentation for the file?)<\/li><li>Code style (does the file adhere to the project's coding style guidelines?)<\/li><li>Dependency management (does the file manage its dependencies effectively?)<\/li><li>Error handling (does the file handle errors gracefully?)<\/li><li>Code duplication (is there any duplicated code in the file?)<\/li><li>Scalability (can the file handle increased load or complexity?)<\/li><li>Extensibility (can the file be easily extended with new features or functionality?)<\/li><li>Testability (is the file designed in a way that makes it easy to test?)<\/li><li>Code smells (are there any code smells present in the file?)<\/li><li>Best practices (does the file follow best practices for the language and framework?)<\/li><\/ul>","text":"Overarching Goal Create as little and as small files as possible while keeping functionality and readability intact. You leave the codebase cleaner, clearer, and more maintainable than you found it. You do not add features, only polish existing code. You do not delete code unless it's dead or redundant. Artifacts json -> @.proj/improve.json Target (optional) A target may be supplied as the skill argument (e.g. /improve src/gnn , /improve error handling ). Given → resolve to a concrete file set (path prefix / subsystem dir / files where the concern applies), rate only those, record it under \"target\" , prune the tree to that subtree. None → sweep every integrated part of the app. Compute-use Measure, don't guess, for objective categories when a tool exists and the file is big/important enough to warrant it. Detect the project's toolchain first; use what's there, install only if cheap; degrade to a judged rating if a tool is missing (and note it in \"measured\" ). Skip tooling on trivial files. Re-run the same checks when re-rating. LOC → cloc / tokei / wc -l · Complexity → lizard / radon /eslint · Coverage → project test runner · Duplication → jscpd · Security → bandit / npm audit / semgrep · Style → project linter Folder rollup After every file is rated, aggregate bottom-up : a folder's per-category score = mean of its subtree's files (LOC-weighted), overall score = weighted mean of those (lower = more work), weakest = lowest category. Then rank folders + files worst→best — that's the \"where's the debt\" answer and the improvement order. Workflow Resolve scope → file set. Rate each file 1-10 per category (measure where it helps). Write rating , score , measured , top-3 todos . Build the folder tree + ranking . Set \"indexed\": true . Improve worst→best (worst folder, its worst file first): fix, then delete that file's entry from files (drop it from tree / ranking too). Re-rate only if you leave it unfinished — otherwise it's gone. Small commit per file improved, on a dedicated branch per the git-workflow rule ( .claude/rules/git-workflow.md ) — branch first if on the default branch, use a worktree for any isolated testing, clean it up when done. Repeat until budget exhausted. The json only holds outstanding work. A finished file is deleted, not marked done — so the file shrinks over time and a clean codebase converges to an empty files list. Never accumulate status:\"done\" records or completed-work logs. Set a goal via /goal , or hand the user this: /loop 10m Go over <TARGET>. Rate each code file 1-10 per category, measuring LOC/complexity/coverage/duplication/security/style with tools where it sharpens the rating (skip on trivial files). Write rating, score, and top-3 todos to the json. Roll up into a folder tree with per-category aggregates; rank folders+files worst→best. Once everything is indexed, set \"indexed\":true and improve from worst folder to best, worst file first. After improving a file, delete its entry from the json (and from tree+ranking) so the file shrinks toward empty, then move on. Commit after each iteration. The json { \"target\": null, // null = whole-codebase sweep \"indexed\": false, // true once every in-scope file is rated AND the tree built \"rating\": { \"min\": 0, \"max\": 10, \"categories\": [\"loc\", \"complexity\", \"...\"], \"weights\": { \"security\": 2 } // optional per-category; default 1 }, \"files\": [{ // outstanding work ONLY; delete an entry once its file is improved \"path\": \"src/gnn/fusion.ts\", \"rating\": [0.5, 1, \"...\"], // one per category, SAME ORDER as categories \"score\": 3.2, // weighted mean; lower = more work \"measured\": [\"loc\", \"complexity\"], // computed vs. judged \"todos\": [\"...\", \"...\"] // max 3, by impact }], \"tree\": { // aggregated bottom-up \"path\": \".\", \"score\": 4.1, \"categories\": { \"loc\": 5.0, \"complexity\": 3.4 }, \"weakest\": \"complexity\", \"fileCount\": 42, \"files\": [\"src/index.ts\"], \"children\": [ /* same shape */ ] }, \"ranking\": { \"folders\": [\"src/gnn\", \"...\"], \"files\": [\"src/gnn/fusion.ts\", \"...\"] } // worst→best } Categories Pick the ones that apply; keep categories consistent across the run so arrays and the rollup line up: LOC (lines of code) Complexity (cyclomatic complexity) Clarity (subjective, based on readability, naming, structure) Comments (presence and quality of comments) Single responsibility (does the file have one clear purpose?) Adherence to requirements (does the file meet the specified requirements?) Test coverage (are there sufficient tests for the file?) Performance (are there any performance issues in the file?) Security (are there any security vulnerabilities in the file?) Maintainability (how easy is it to maintain and update the file?) Modularity (is the file modular and reusable?) Documentation (is there sufficient documentation for the file?) Code style (does the file adhere to the project's coding style guidelines?) Dependency management (does the file manage its dependencies effectively?) Error handling (does the file handle errors gracefully?) Code duplication (is there any duplicated code in the file?) Scalability (can the file handle increased load or complexity?) Extensibility (can the file be easily extended with new features or functionality?) Testability (is the file designed in a way that makes it easy to test?) Code smells (are there any code smells present in the file?) Best practices (does the file follow best practices for the language and framework?)"},{"id":".claude/skills/learn/SKILL.md","title":"learn","category":"Skills","path":".claude/skills/learn/SKILL.md","desc":"Capture durable lessons from the current session — corrections, gotchas, decisions, term definitions — into kern and the project glossary. Use after a user correction, a surprising failure, or at the end of non-trivial work.","html":"<h1 id=\"learn-lesson-capture\">Learn — lesson capture<\/h1>\n<p>Follow references/learn.md.<\/p>","text":"Learn — lesson capture Follow references/learn.md."},{"id":".claude/skills/learn/references/learn.md","title":"Lesson Capture","category":"Skills","path":".claude/skills/learn/references/learn.md","desc":"","html":"<h1 id=\"lesson-capture\">Lesson Capture<\/h1>\n<h2 id=\"goal\">Goal<\/h2>\n<p>Nothing durable learned in a session is lost. Lessons land in the right store: kern for knowledge, glossary for vocabulary, project law for binding rules.<\/p>\n<h2 id=\"what-counts-as-a-lesson\">What counts as a lesson<\/h2>\n<ul><li>A user correction (\"no, X works like Y\") — highest priority, capture verbatim intent<\/li><li>A surprising failure and its root cause<\/li><li>A decision made and its rationale<\/li><li>A term defined, renamed, or disambiguated<\/li><li>A constraint discovered (platform limit, API quirk, project invariant)<\/li><\/ul>\n<h2 id=\"flow-per-lesson\">Flow (per lesson)<\/h2>\n<ol><li><strong>Dedup first.<\/strong> <code>mcp__kern__query<\/code> the lesson's topic; if kern already holds it accurately, skip. If it holds it wrongly, this is an update — reuse the existing <code>object_id<\/code>.<\/li><li><strong>Route by kind:<\/strong><ul><li>Vocabulary → add/fix a row in <code>/.proj/glossary.csv<\/code> (category,term,definition)<\/li><li>Binding rule candidate → propose an addition to <code>/.proj/agent.md<\/code> to the user; never add law silently<\/li><li>Everything else → <code>mcp__kern__ingest<\/code>: one coherent excerpt per lesson, with <code>title<\/code>, <code>descriptor<\/code>, stable <code>object_id<\/code>. Many small well-titled excerpts beat one dump.<\/li><\/ul><\/li><li><strong>Verify.<\/strong> Re-query kern for the ingested title; confirm it returns. Quote the confirmation.<\/li><\/ol>\n<h2 id=\"hard-rules\">Hard rules<\/h2>\n<ul><li>Kern down (<code>mcp__kern__health<\/code> unresponsive) → capture glossary/law items anyway, list the kern-bound lessons in the reply so the user can re-run /learn later. Never write lesson files as a kern substitute (machine law: no file-memory for durable knowledge).<\/li><li>Never duplicate a lesson into CLAUDE.md or skill bodies — single source of truth.<\/li><li>Lessons are facts, not narratives: one excerpt = one claim + its why.<\/li><\/ul>\n<h2 id=\"done-when\">Done when<\/h2>\n<p>Every lesson from the session is either captured (and verified by re-query), routed to glossary/law, or explicitly skipped as already-known.<\/p>","text":"Lesson Capture Goal Nothing durable learned in a session is lost. Lessons land in the right store: kern for knowledge, glossary for vocabulary, project law for binding rules. What counts as a lesson A user correction (\"no, X works like Y\") — highest priority, capture verbatim intent A surprising failure and its root cause A decision made and its rationale A term defined, renamed, or disambiguated A constraint discovered (platform limit, API quirk, project invariant) Flow (per lesson) Dedup first. mcp__kern__query the lesson's topic; if kern already holds it accurately, skip. If it holds it wrongly, this is an update — reuse the existing object_id . Route by kind: Vocabulary → add/fix a row in /.proj/glossary.csv (category,term,definition) Binding rule candidate → propose an addition to /.proj/agent.md to the user; never add law silently Everything else → mcp__kern__ingest : one coherent excerpt per lesson, with title , descriptor , stable object_id . Many small well-titled excerpts beat one dump. Verify. Re-query kern for the ingested title; confirm it returns. Quote the confirmation. Hard rules Kern down ( mcp__kern__health unresponsive) → capture glossary/law items anyway, list the kern-bound lessons in the reply so the user can re-run /learn later. Never write lesson files as a kern substitute (machine law: no file-memory for durable knowledge). Never duplicate a lesson into CLAUDE.md or skill bodies — single source of truth. Lessons are facts, not narratives: one excerpt = one claim + its why. Done when Every lesson from the session is either captured (and verified by re-query), routed to glossary/law, or explicitly skipped as already-known."},{"id":".claude/skills/parallel/SKILL.md","title":"parallel","category":"Skills","path":".claude/skills/parallel/SKILL.md","desc":"Use when executing a superpowers spec or implementation plan and you want it finished as fast as possible by fanning the work across concurrent subagents instead of one task at a time. Triggers on \"/parallel\", \"run this plan in parallel\", \"parallelize this execution\", \"do all these tasks at once\".","html":"<h1 id=\"parallel-plan-execution\">Parallel Plan Execution<\/h1>\n<h2 id=\"overview\">Overview<\/h2>\n<p>Take the spec/plan currently being executed and run its independent tasks <strong>concurrently<\/strong> across isolated subagents, then converge with a single <code>/simplify<\/code> and a single <code>/code-review<\/code>.<\/p>\n<p><strong>Core principle:<\/strong> Maximum throughput WITHOUT correctness loss. Parallelism is only safe between tasks that do not share files or have ordering dependencies — so the whole job is building correct dependency batches, dispatching each batch wide, and gating each batch on a clean merge before the next.<\/p>\n<p>This skill REPLACES the one-task-at-a-time loop of superpowers:subagent-driven-development for the current execution. It does not replace the per-task quality bar — every parallel task still implements with tests and self-reviews.<\/p>\n<p><strong>REQUIRED BACKGROUND:<\/strong><\/p>\n<ul><li>superpowers:dispatching-parallel-agents — how to scope and fan out concurrent agents<\/li><li>superpowers:using-git-worktrees — the isolation that makes parallel writes safe<\/li><\/ul>\n<h2 id=\"when-to-use\">When to Use<\/h2>\n<ul><li>A written plan/spec is mid-execution (or about to start) and the user wants speed.<\/li><li>The plan has 2+ tasks that touch <strong>different files / subsystems<\/strong>.<\/li><\/ul>\n<p><strong>Do NOT parallelize (run sequentially) when:<\/strong><\/p>\n<ul><li>Tasks edit the same file or the same function.<\/li><li>Task B's input is Task A's output (real ordering dependency).<\/li><li>There is only one task. Then just execute it; the converge step still applies.<\/li><\/ul>\n<p>When unsure whether two tasks are independent, treat them as dependent. A wrong parallel guess corrupts the tree; a wrong sequential guess only costs time.<\/p>\n<h2 id=\"the-process\">The Process<\/h2>\n<pre><code class=\"language-dot\">digraph parallel_exec {\n    rankdir=TB;\n    &quot;Read plan once, extract ALL tasks + full text&quot; [shape=box];\n    &quot;Build dependency graph (file/subsystem overlap)&quot; [shape=box];\n    &quot;Group into batches: tasks in a batch are mutually independent&quot; [shape=box];\n    &quot;For each batch: dispatch one isolated subagent per task, CONCURRENTLY&quot; [shape=box];\n    &quot;Each subagent: own worktree/branch, TDD, commit, self-review, return summary&quot; [shape=box];\n    &quot;Batch done: review summaries, merge branches, resolve conflicts, run full tests&quot; [shape=diamond];\n    &quot;More batches?&quot; [shape=diamond];\n    &quot;Run /simplify ONCE over the whole change&quot; [shape=box];\n    &quot;Run /code-review ONCE over the whole change&quot; [shape=box];\n    &quot;superpowers:finishing-a-development-branch&quot; [shape=box style=filled fillcolor=lightgreen];\n\n    &quot;Read plan once, extract ALL tasks + full text&quot; -&gt; &quot;Build dependency graph (file/subsystem overlap)&quot;;\n    &quot;Build dependency graph (file/subsystem overlap)&quot; -&gt; &quot;Group into batches: tasks in a batch are mutually independent&quot;;\n    &quot;Group into batches: tasks in a batch are mutually independent&quot; -&gt; &quot;For each batch: dispatch one isolated subagent per task, CONCURRENTLY&quot;;\n    &quot;For each batch: dispatch one isolated subagent per task, CONCURRENTLY&quot; -&gt; &quot;Each subagent: own worktree/branch, TDD, commit, self-review, return summary&quot;;\n    &quot;Each subagent: own worktree/branch, TDD, commit, self-review, return summary&quot; -&gt; &quot;Batch done: review summaries, merge branches, resolve conflicts, run full tests&quot;;\n    &quot;Batch done: review summaries, merge branches, resolve conflicts, run full tests&quot; -&gt; &quot;More batches?&quot;;\n    &quot;More batches?&quot; -&gt; &quot;For each batch: dispatch one isolated subagent per task, CONCURRENTLY&quot; [label=&quot;yes - next batch&quot;];\n    &quot;More batches?&quot; -&gt; &quot;Run /simplify ONCE over the whole change&quot; [label=&quot;no&quot;];\n    &quot;Run /simplify ONCE over the whole change&quot; -&gt; &quot;Run /code-review ONCE over the whole change&quot;;\n    &quot;Run /code-review ONCE over the whole change&quot; -&gt; &quot;superpowers:finishing-a-development-branch&quot;;\n}<\/code><\/pre>\n<h2 id=\"steps\">Steps<\/h2>\n<ol><li><strong>Extract all tasks.<\/strong> Read the plan ONCE. Pull every task's full text + context into a TodoWrite list. Subagents never read the plan file — you hand them exactly the text and context they need.<\/li><li><strong>Batch by independence.<\/strong> For each pair of tasks, ask: do they write the same files or depend on each other's output? Independent tasks go in the same batch. Dependent tasks go in later batches. A batch of size 1 is allowed.<\/li><li><strong>Dispatch the batch concurrently.<\/strong> Send all subagent calls for a batch <strong>in a single message<\/strong> so they run at once. Each subagent gets:<ul><li>Its own worktree/branch (isolation — required for parallel writes; see superpowers:using-git-worktrees).<\/li><li>Full task text + scene-setting context.<\/li><li>Constraints: touch only its assigned files; do NOT edit other tasks' files.<\/li><li>Mandate: write tests, implement, run tests, commit, self-review.<\/li><li>Required return: summary of root cause/approach, files changed, test result.<\/li><\/ul><\/li><li><strong>Converge the batch (barrier).<\/strong> Wait for ALL subagents in the batch. Read each summary, merge branches into the working branch, resolve any conflicts, run the FULL test suite. Only then start the next batch — its tasks may depend on this batch's merged result.<\/li><li><strong>Handle subagent status<\/strong> exactly as superpowers:subagent-driven-development prescribes (DONE / DONE_WITH_CONCERNS / NEEDS_CONTEXT / BLOCKED). Re-dispatch with more context or a stronger model; never silently drop a blocked task.<\/li><li><strong>Simplify once.<\/strong> After the LAST batch merges clean, run <code>/simplify<\/code> a single time across the entire combined change — not per task. One pass catches cross-task duplication that per-task passes miss.<\/li><li><strong>Code-review once.<\/strong> Then run <code>/code-review<\/code> a single time over the whole change. Address findings, then proceed to superpowers:finishing-a-development-branch.<\/li><\/ol>\n<h2 id=\"quick-reference\">Quick Reference<\/h2>\n<table><thead><tr><th>Thing<\/th><th>Rule<\/th><\/tr><\/thead><tbody><tr><td>What runs in parallel<\/td><td>Tasks in the same batch (mutually independent)<\/td><\/tr><tr><td>What forces sequencing<\/td><td>Shared files OR output dependency → separate batches<\/td><\/tr><tr><td>Isolation<\/td><td>One worktree/branch per concurrent subagent<\/td><\/tr><tr><td>Dispatch<\/td><td>All of a batch's agents in ONE message (true concurrency)<\/td><\/tr><tr><td>Barrier<\/td><td>Merge + full test suite between batches<\/td><\/tr><tr><td><code>/simplify<\/code><\/td><td>Exactly ONCE, after all batches merge<\/td><\/tr><tr><td><code>/code-review<\/code><\/td><td>Exactly ONCE, after <code>/simplify<\/code><\/td><\/tr><tr><td>Per-task quality<\/td><td>Still TDD + self-review inside every subagent<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"common-mistakes\">Common Mistakes<\/h2>\n<ul><li><strong>Parallelizing dependent tasks.<\/strong> Two agents editing the same file in separate worktrees → merge conflict or lost work. Batch them sequentially instead.<\/li><li><strong>Dispatching agents across multiple messages.<\/strong> They serialize. Put a batch's calls in one message.<\/li><li><strong>Skipping the merge/test barrier between batches.<\/strong> A later batch built on an unmerged, untested earlier batch compounds errors.<\/li><li><strong>Running <code>/simplify<\/code> or <code>/code-review<\/code> per task.<\/strong> The point of converging is ONE simplify and ONE review over the whole change. Per-task runs miss cross-task issues and waste passes.<\/li><li><strong>Letting subagents read the plan or each other's work.<\/strong> Controller curates context. Subagents stay isolated.<\/li><\/ul>\n<h2 id=\"red-flags-stop\">Red Flags — STOP<\/h2>\n<ul><li>About to send two agents that both write <code>foo.go<\/code> concurrently → re-batch.<\/li><li>About to start batch N+1 before batch N is merged + tests green → halt, converge first.<\/li><li>About to run <code>/simplify<\/code> while batches remain → finish all batches first.<\/li><li>Tempted to skip <code>/code-review<\/code> because \"agents self-reviewed\" → self-review ≠ final review. Run it.<\/li><\/ul>","text":"Parallel Plan Execution Overview Take the spec/plan currently being executed and run its independent tasks concurrently across isolated subagents, then converge with a single /simplify and a single /code-review . Core principle: Maximum throughput WITHOUT correctness loss. Parallelism is only safe between tasks that do not share files or have ordering dependencies — so the whole job is building correct dependency batches, dispatching each batch wide, and gating each batch on a clean merge before the next. This skill REPLACES the one-task-at-a-time loop of superpowers:subagent-driven-development for the current execution. It does not replace the per-task quality bar — every parallel task still implements with tests and self-reviews. REQUIRED BACKGROUND: superpowers:dispatching-parallel-agents — how to scope and fan out concurrent agents superpowers:using-git-worktrees — the isolation that makes parallel writes safe When to Use A written plan/spec is mid-execution (or about to start) and the user wants speed. The plan has 2+ tasks that touch different files / subsystems . Do NOT parallelize (run sequentially) when: Tasks edit the same file or the same function. Task B's input is Task A's output (real ordering dependency). There is only one task. Then just execute it; the converge step still applies. When unsure whether two tasks are independent, treat them as dependent. A wrong parallel guess corrupts the tree; a wrong sequential guess only costs time. The Process digraph parallel_exec { rankdir=TB; \"Read plan once, extract ALL tasks + full text\" [shape=box]; \"Build dependency graph (file/subsystem overlap)\" [shape=box]; \"Group into batches: tasks in a batch are mutually independent\" [shape=box]; \"For each batch: dispatch one isolated subagent per task, CONCURRENTLY\" [shape=box]; \"Each subagent: own worktree/branch, TDD, commit, self-review, return summary\" [shape=box]; \"Batch done: review summaries, merge branches, resolve conflicts, run full tests\" [shape=diamond]; \"More batches?\" [shape=diamond]; \"Run /simplify ONCE over the whole change\" [shape=box]; \"Run /code-review ONCE over the whole change\" [shape=box]; \"superpowers:finishing-a-development-branch\" [shape=box style=filled fillcolor=lightgreen]; \"Read plan once, extract ALL tasks + full text\" -> \"Build dependency graph (file/subsystem overlap)\"; \"Build dependency graph (file/subsystem overlap)\" -> \"Group into batches: tasks in a batch are mutually independent\"; \"Group into batches: tasks in a batch are mutually independent\" -> \"For each batch: dispatch one isolated subagent per task, CONCURRENTLY\"; \"For each batch: dispatch one isolated subagent per task, CONCURRENTLY\" -> \"Each subagent: own worktree/branch, TDD, commit, self-review, return summary\"; \"Each subagent: own worktree/branch, TDD, commit, self-review, return summary\" -> \"Batch done: review summaries, merge branches, resolve conflicts, run full tests\"; \"Batch done: review summaries, merge branches, resolve conflicts, run full tests\" -> \"More batches?\"; \"More batches?\" -> \"For each batch: dispatch one isolated subagent per task, CONCURRENTLY\" [label=\"yes - next batch\"]; \"More batches?\" -> \"Run /simplify ONCE over the whole change\" [label=\"no\"]; \"Run /simplify ONCE over the whole change\" -> \"Run /code-review ONCE over the whole change\"; \"Run /code-review ONCE over the whole change\" -> \"superpowers:finishing-a-development-branch\"; } Steps Extract all tasks. Read the plan ONCE. Pull every task's full text + context into a TodoWrite list. Subagents never read the plan file — you hand them exactly the text and context they need. Batch by independence. For each pair of tasks, ask: do they write the same files or depend on each other's output? Independent tasks go in the same batch. Dependent tasks go in later batches. A batch of size 1 is allowed. Dispatch the batch concurrently. Send all subagent calls for a batch in a single message so they run at once. Each subagent gets: Its own worktree/branch (isolation — required for parallel writes; see superpowers:using-git-worktrees). Full task text + scene-setting context. Constraints: touch only its assigned files; do NOT edit other tasks' files. Mandate: write tests, implement, run tests, commit, self-review. Required return: summary of root cause/approach, files changed, test result. Converge the batch (barrier). Wait for ALL subagents in the batch. Read each summary, merge branches into the working branch, resolve any conflicts, run the FULL test suite. Only then start the next batch — its tasks may depend on this batch's merged result. Handle subagent status exactly as superpowers:subagent-driven-development prescribes (DONE / DONE_WITH_CONCERNS / NEEDS_CONTEXT / BLOCKED). Re-dispatch with more context or a stronger model; never silently drop a blocked task. Simplify once. After the LAST batch merges clean, run /simplify a single time across the entire combined change — not per task. One pass catches cross-task duplication that per-task passes miss. Code-review once. Then run /code-review a single time over the whole change. Address findings, then proceed to superpowers:finishing-a-development-branch. Quick Reference Thing Rule What runs in parallel Tasks in the same batch (mutually independent) What forces sequencing Shared files OR output dependency → separate batches Isolation One worktree/branch per concurrent subagent Dispatch All of a batch's agents in ONE message (true concurrency) Barrier Merge + full test suite between batches /simplify Exactly ONCE, after all batches merge /code-review Exactly ONCE, after /simplify Per-task quality Still TDD + self-review inside every subagent Common Mistakes Parallelizing dependent tasks. Two agents editing the same file in separate worktrees → merge conflict or lost work. Batch them sequentially instead. Dispatching agents across multiple messages. They serialize. Put a batch's calls in one message. Skipping the merge/test barrier between batches. A later batch built on an unmerged, untested earlier batch compounds errors. Running /simplify or /code-review per task. The point of converging is ONE simplify and ONE review over the whole change. Per-task runs miss cross-task issues and waste passes. Letting subagents read the plan or each other's work. Controller curates context. Subagents stay isolated. Red Flags — STOP About to send two agents that both write foo.go concurrently → re-batch. About to start batch N+1 before batch N is merged + tests green → halt, converge first. About to run /simplify while batches remain → finish all batches first. Tempted to skip /code-review because \"agents self-reviewed\" → self-review ≠ final review. Run it."},{"id":".claude/skills/perf-gate/SKILL.md","title":"perf-gate","category":"Skills","path":".claude/skills/perf-gate/SKILL.md","desc":"Performance gate for gfx/shader work. Capture baseline, change, capture after, report delta. Use before any non-trivial rendering change.","html":"<h1 id=\"performance-gate\">Performance Gate<\/h1>\n<h2 id=\"contract\">Contract<\/h2>\n<p>Every rendering/shader task:<\/p>\n<ol><li>Capture <strong>before<\/strong> baseline<\/li><li>Implement change<\/li><li>Capture <strong>after<\/strong> baseline<\/li><li>Report delta<\/li><\/ol>\n<p>Done requires: app run check + compile check + screenshot artifact + perf artifact.<\/p>\n<h2 id=\"pre-work\">Pre-work<\/h2>\n<pre><code class=\"language-bash\">cargo check\ncargo run -- --perf      # stops frame 6000, writes profiler CSV, screenshot, exits\npython skills/perf-gate/scripts/update_baseline.py<\/code><\/pre>\n<p><code>update_baseline.py<\/code> writes <code>profiling/perf_baseline.csv<\/code> — two rows: <code>latest<\/code> (newest avg), <code>previous<\/code> (prior avg). Screenshot → <code>screenshots/frame-6000-*.png<\/code>.<\/p>\n<p>Custom stop frame (early-frame regressions): <code>cargo run -- --stop-frame=1200<\/code>.<\/p>\n<h2 id=\"decision-rule\">Decision rule<\/h2>\n<p>Read <code>profiling/perf_baseline.csv<\/code>, call out: <code>full_ms<\/code>, <code>lighting_ms<\/code>, <code>shadow_ms<\/code>, <code>displacement_ms<\/code>, <code>avg_step_ms<\/code>. Verify newest screenshot valid + clean exit. Pick dominant cost first (highest ms).<\/p>\n<h2 id=\"during-optimization\">During optimization<\/h2>\n<ul><li>Narrow scope: one bottleneck at a time<\/li><li>After each meaningful change: compile + perf run + baseline update<\/li><li>Report delta vs <code>previous<\/code> (ms + %)<\/li><\/ul>\n<h2 id=\"done-criteria\">Done criteria<\/h2>\n<ul><li>Latest improves target without major regression elsewhere<\/li><li><code>perf_baseline.csv<\/code> updated, attached in summary<\/li><li>Before/after screenshot paths in summary<\/li><\/ul>","text":"Performance Gate Contract Every rendering/shader task: Capture before baseline Implement change Capture after baseline Report delta Done requires: app run check + compile check + screenshot artifact + perf artifact. Pre-work cargo check cargo run -- --perf # stops frame 6000, writes profiler CSV, screenshot, exits python skills/perf-gate/scripts/update_baseline.py update_baseline.py writes profiling/perf_baseline.csv — two rows: latest (newest avg), previous (prior avg). Screenshot → screenshots/frame-6000-*.png . Custom stop frame (early-frame regressions): cargo run -- --stop-frame=1200 . Decision rule Read profiling/perf_baseline.csv , call out: full_ms , lighting_ms , shadow_ms , displacement_ms , avg_step_ms . Verify newest screenshot valid + clean exit. Pick dominant cost first (highest ms). During optimization Narrow scope: one bottleneck at a time After each meaningful change: compile + perf run + baseline update Report delta vs previous (ms + %) Done criteria Latest improves target without major regression elsewhere perf_baseline.csv updated, attached in summary Before/after screenshot paths in summary"},{"id":".claude/skills/personas/SKILL.md","title":"personas","category":"Skills","path":".claude/skills/personas/SKILL.md","desc":"Run the project's persona review panel in parallel against the last completed feature or fix. The panel is defined by /.proj/personas/ — each reviewer critiques from their own lens, then a synthesis pass identifies the top cross-cutting concerns and a ship verdict.","html":"<h1 id=\"persona-panel-review\">Persona Panel Review<\/h1>\n<p>You are orchestrating the project's review panel. The user just completed a feature or fix. Run every persona in parallel, then synthesize. The panel is <strong>data-driven<\/str
