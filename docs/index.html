g> every module change names module/interface/behavior added/test that proves it. User confirmed.<\/p>\n<p><strong>Anti-pattern:<\/strong> PRD names files but not interfaces. Interfaces = contract; files = scaffolding.<\/p>\n<hr>\n<h2 id=\"phase-5-design-interfaces-delegate-implementation\">Phase 5 — Design interfaces, delegate implementation<\/h2>\n<p><strong>Symptom prevented:<\/strong> brain fatigue, code shipping faster than holdable. <strong>Cause:<\/strong> reviewing implementations doesn't scale; designing interfaces does.<\/p>\n<ol><li>For new modules from phase 3-4, design interface deliberately:<ul><li>Accepts what?<\/li><li>Returns what?<\/li><li>Invariants guaranteed?<\/li><li>Explicitly <em>not<\/em> doing what?<\/li><\/ul><\/li><li>Treat impl as <strong>gray box<\/strong>: trust contract, test from outside. Review inside only for high-stakes (auth, payment, security, financial).<\/li><li>For shallow-module thickets blocking phase 4: identify clusters, wrap behind one deep-module interface, move tests to new boundary, delete obsolete inner interfaces.<\/li><li>Beck: <strong>invest in design every day<\/strong>. Every commit invests or divests.<\/li><li>Update persistence after non-trivial architectural changes: record new module purpose+interface, link to PRD/design concept, forget stale notes.<\/li><\/ol>\n<p><strong>Stop:<\/strong> new modules expose simple interfaces, hide impl, testable from outside, compose without leaking dependencies.<\/p>\n<p><strong>Anti-pattern:<\/strong> line-by-line review of deep module you trust. Time sink.<\/p>\n<hr>\n<h2 id=\"loop-when-to-revisit\">Loop — when to revisit<\/h2>\n<table><thead><tr><th>Symptom<\/th><th>Phase<\/th><\/tr><\/thead><tbody><tr><td>AI built wrong thing<\/td><td>1 align<\/td><\/tr><tr><td>Terms drift, AI verbose<\/td><td>2 glossary<\/td><\/tr><tr><td>Ships code not matching plan<\/td><td>3 PRD<\/td><\/tr><tr><td>Big diffs, late tests, type errors<\/td><td>4 TDD<\/td><\/tr><tr><td>Brain fatigue, can't hold system<\/td><td>5 design+delegate<\/td><\/tr><tr><td>AI contradicts prior decisions<\/td><td>0 orient<\/td><\/tr><\/tbody><\/table>\n<p>After every phase: record decision so next session starts with more context.<\/p>\n<h2 id=\"greenfield-checklist\">Greenfield checklist<\/h2>\n<table><thead><tr><th>Phase<\/th><th>Query<\/th><th>Record<\/th><\/tr><\/thead><tbody><tr><td>0 orient<\/td><td>2-3 phrasings, full text top-3<\/td><td>—<\/td><\/tr><tr><td>1 align<\/td><td>prior design concepts, architecture<\/td><td>design concept<\/td><\/tr><tr><td>2 glossary<\/td><td>prior glossary<\/td><td>each term<\/td><\/tr><tr><td>3 PRD<\/td><td>architecture for affected modules<\/td><td>PRD summary<\/td><\/tr><tr><td>4 TDD<\/td><td>(commits cite decision IDs)<\/td><td>—<\/td><\/tr><tr><td>5 design+delegate<\/td><td>stale architecture<\/td><td>new module interface; forget stale<\/td><\/tr><\/tbody><\/table>","text":"Phases 0-3, 5 Phase 4 (TDD) → tdd.md . Phase 6 (adversarial) → adversarial.md . Phase 7 (push) → push.md . Tool-agnostic. Use whatever persistence the project provides (wiki MCP, knids, ADRs, docs/, none). Phase 0 — Orient Goal: establish what's known before drafting. Identify persistence layer (knowledge store, docs/ , ADRs, prior PRs, none). Query 2-3 phrasings of intent. Read top hits in full. Codebase search for prior implementations of same concept. Identify load-bearing prior decisions. Surface inline: \"Project knows X. Top sources: A, B, C. Open: D, E.\" Stop: can describe what's known + what isn't. User confirms framing. If nothing on topic, say so. No fabrication. Phase 1 — Align (design concept) Symptom prevented: AI builds wrong thing. Cause: no shared design concept (Brooks). Draft candidate design concept: what/why/scope/non-goals/constraints. Cite sources per claim. Walk design tree (Brooks): list major decisions + dependencies. Recommend each, citing prior decisions. Surface: \"Is this the plan? Layout match your mental model?\" Resolve disagreements one branch at a time. No moving on with unresolved branches. If answerable from codebase, read it; don't ask. On convergence: record design concept (commit note, knowledge store, issue). Stop: user + AI describe same thing in different words, including boundaries + non-goals. Decision tree resolved. Recorded. Anti-pattern: jumping to PRD before user confirms design concept. Phase 2 — Glossary (ubiquitous language) Symptom prevented: verbose AI, term drift. Cause: no shared vocabulary (Evans, DDD). Query for prior glossary. Scan phase 0+1 for domain nouns/verbs/concepts. Identify problems: same word/different concepts (flag), different words/same concept (canonicalize), vague/overloaded (sharpen). Draft UBIQUITOUS_LANGUAGE.md : `` md ## <topic> | Term | Definition | Aliases to avoid | |------|------------|------------------| | **CanonicalTerm** | one-line | synonym1, synonym2 | `` Surface: \"Canonical terms. Anything missing or wrong?\" On confirm: write file + record terms in persistence. Reference glossary in phase 3+ (PRDs, prompts, review). Stop: every load-bearing term has one canonical definition. File written. Anti-pattern: glossary as afterthought — wrong vocab cements into code. Phase 3 — PRD (modules, interfaces, tests) Symptom prevented: code ships not matching plan. Cause: no module-level plan; AI invents structure that drifts. Query for related architecture notes. Read relevant code paths — confirm current state, don't assume. Draft PRD: Goal — one sentence Non-goals — what stays out Modules touched — name, current interface, proposed change, rationale (glossary terms) New modules — name, interface signature, behaviors, deep-module hierarchy slot Test plan — per behavior: which interface boundary, what assertion Open questions — anything unresolvable from prior context/code Only canonical glossary terms. No synonyms, no inventions. Surface: \"Modules + interfaces match your model?\" Resolve open questions one at a time. Cycle to phase 1/2 if PRD reveals missing decision/term. On confirm: write PRD-<topic>.md , record summary. Small changes: skip file, write GitHub issues with same module/interface/test specificity. Stop: every module change names module/interface/behavior added/test that proves it. User confirmed. Anti-pattern: PRD names files but not interfaces. Interfaces = contract; files = scaffolding. Phase 5 — Design interfaces, delegate implementation Symptom prevented: brain fatigue, code shipping faster than holdable. Cause: reviewing implementations doesn't scale; designing interfaces does. For new modules from phase 3-4, design interface deliberately: Accepts what? Returns what? Invariants guaranteed? Explicitly not doing what? Treat impl as gray box : trust contract, test from outside. Review inside only for high-stakes (auth, payment, security, financial). For shallow-module thickets blocking phase 4: identify clusters, wrap behind one deep-module interface, move tests to new boundary, delete obsolete inner interfaces. Beck: invest in design every day . Every commit invests or divests. Update persistence after non-trivial architectural changes: record new module purpose+interface, link to PRD/design concept, forget stale notes. Stop: new modules expose simple interfaces, hide impl, testable from outside, compose without leaking dependencies. Anti-pattern: line-by-line review of deep module you trust. Time sink. Loop — when to revisit Symptom Phase AI built wrong thing 1 align Terms drift, AI verbose 2 glossary Ships code not matching plan 3 PRD Big diffs, late tests, type errors 4 TDD Brain fatigue, can't hold system 5 design+delegate AI contradicts prior decisions 0 orient After every phase: record decision so next session starts with more context. Greenfield checklist Phase Query Record 0 orient 2-3 phrasings, full text top-3 — 1 align prior design concepts, architecture design concept 2 glossary prior glossary each term 3 PRD architecture for affected modules PRD summary 4 TDD (commits cite decision IDs) — 5 design+delegate stale architecture new module interface; forget stale"},{"id":".claude/skills/coder/references/principles.md","title":"Principles — KISS, DRY, YAGNI","category":"Skills","path":".claude/skills/coder/references/principles.md","desc":"","html":"<h1 id=\"principles-kiss-dry-yagni\">Principles — KISS, DRY, YAGNI<\/h1>\n<p>Three rules for keeping code small and changeable.<\/p>\n<h2 id=\"kiss-keep-it-simple\">KISS — Keep It Simple<\/h2>\n<p>Simplest design that works. Short functions, shallow nesting, plain control flow.<\/p>\n<h2 id=\"dry-don-t-repeat-yourself\">DRY — Don't Repeat Yourself<\/h2>\n<blockquote><p>Every piece of <em>knowledge<\/em> must have a single, unambiguous, authoritative representation. — Hunt &amp; Thomas<\/p><\/blockquote>\n<p>DRY = knowledge, not character duplication. Same shape + different reasons-to-change ≠ violation.<\/p>\n<h2 id=\"yagni-you-aren-t-gonna-need-it\">YAGNI — You Aren't Gonna Need It<\/h2>\n<p>Don't build until required. Four costs of speculative features (Fowler 2015):<\/p>\n<ol><li><strong>Build<\/strong> — time on unused capability<\/li><li><strong>Delay<\/strong> — work pushed back<\/li><li><strong>Carry<\/strong> — code mass slowing every future change<\/li><li><strong>Repair<\/strong> — fix when wrong (⅔ of speculative features are — Kohavi)<\/li><\/ol>\n<h2 id=\"rules-of-thumb\">Rules of thumb<\/h2>\n<ul><li><strong>Rule of three.<\/strong> First: write. Second: notice. Third: extract.<\/li><li><strong>Imagine the refactor.<\/strong> Picture the diff to introduce later. Usually no worse than now.<\/li><li><strong>Early returns over nested else.<\/strong> Guard clauses flatten.<\/li><li><strong>Composition &gt; inheritance.<\/strong> Inheritance couples; composition combines.<\/li><li><strong>Validate at boundaries, trust internals.<\/strong> Edges = user input + external APIs.<\/li><li><strong>Three similar lines beat premature abstraction.<\/strong> Wait for third.<\/li><li><strong>No half-finished implementations.<\/strong> Ship slice or don't start.<\/li><\/ul>\n<h2 id=\"don-t-add\">Don't add<\/h2>\n<ul><li>Error handling for impossible cases<\/li><li>Fallbacks outside system boundaries<\/li><li>Validation of internal callers<\/li><li>Feature flags / backwards-compat shims (just change the code)<\/li><li>Comments explaining <em>what<\/em> well-named code shows<\/li><li>References to current task/PR/issue (rot)<\/li><\/ul>\n<h2 id=\"add\">Add<\/h2>\n<ul><li>Comment when <em>why<\/em> non-obvious: hidden constraint, subtle invariant, workaround for specific bug, surprising behavior<\/li><\/ul>\n<p>If removing a comment wouldn't confuse reader, don't write it.<\/p>","text":"Principles — KISS, DRY, YAGNI Three rules for keeping code small and changeable. KISS — Keep It Simple Simplest design that works. Short functions, shallow nesting, plain control flow. DRY — Don't Repeat Yourself Every piece of knowledge must have a single, unambiguous, authoritative representation. — Hunt & Thomas DRY = knowledge, not character duplication. Same shape + different reasons-to-change ≠ violation. YAGNI — You Aren't Gonna Need It Don't build until required. Four costs of speculative features (Fowler 2015): Build — time on unused capability Delay — work pushed back Carry — code mass slowing every future change Repair — fix when wrong (⅔ of speculative features are — Kohavi) Rules of thumb Rule of three. First: write. Second: notice. Third: extract. Imagine the refactor. Picture the diff to introduce later. Usually no worse than now. Early returns over nested else. Guard clauses flatten. Composition > inheritance. Inheritance couples; composition combines. Validate at boundaries, trust internals. Edges = user input + external APIs. Three similar lines beat premature abstraction. Wait for third. No half-finished implementations. Ship slice or don't start. Don't add Error handling for impossible cases Fallbacks outside system boundaries Validation of internal callers Feature flags / backwards-compat shims (just change the code) Comments explaining what well-named code shows References to current task/PR/issue (rot) Add Comment when why non-obvious: hidden constraint, subtle invariant, workaround for specific bug, surprising behavior If removing a comment wouldn't confuse reader, don't write it."},{"id":".claude/skills/coder/references/push.md","title":"Phase 7 — Incremental pushes","category":"Skills","path":".claude/skills/coder/references/push.md","desc":"","html":"<h1 id=\"phase-7-incremental-pushes\">Phase 7 — Incremental pushes<\/h1>\n<p>Keep remote in lockstep with local. Don't hoard.<\/p>\n<p>Push = upstream counterpart of bounded commits. Same discipline: small, frequent, traceable.<\/p>\n<h2 id=\"cadence\">Cadence<\/h2>\n<p>Push after every meaningful checkpoint:<\/p>\n<ul><li>Each green-refactor cycle completing a coherent slice<\/li><li>Before stepping away (lunch, EOD, context switch)<\/li><li>Before any operation that could lose work (rebase, branch surgery, reboot)<\/li><\/ul>\n<p>Rule: <strong>local &gt;5 commits ahead of origin → push.<\/strong><\/p>\n<h2 id=\"why\">Why<\/h2>\n<ul><li><strong>Backup.<\/strong> Local-only = one disk failure from gone.<\/li><li><strong>CI early signal.<\/strong> Each push exercises pipeline; catch breakage on the causing commit.<\/li><li><strong>Visibility.<\/strong> Reviewers see direction without waiting.<\/li><li><strong>Bisect on origin works.<\/strong> Mega-pushes collapse history.<\/li><li><strong>Rollback granularity.<\/strong> Reverting one pushed commit = cheap.<\/li><\/ul>\n<h2 id=\"don-t\">Don't<\/h2>\n<ul><li>Hoard until \"feature done\" — defeats backup, CI, visibility<\/li><li>Push and force-push casually — destructive on shared branches<\/li><li>Push broken/half-typed without marking — others may pull. WIP → <code>wip/&lt;topic&gt;<\/code> or <code>[WIP]<\/code> PR title<\/li><li>Mix branches in one push session — one branch, one push, one outcome<\/li><\/ul>\n<h2 id=\"force-push-rules\">Force-push rules<\/h2>\n<p>Never force-push to <code>main<\/code>/<code>master<\/code> or shared branch. Confirm with user before any force-push.<\/p>\n<p>Acceptable on own feature branch:<\/p>\n<ul><li>Rewriting history before review (squash typos, reword subjects)<\/li><li>Rebase onto updated base<\/li><\/ul>\n<p>Use <code>--force-with-lease<\/code>, never blind <code>--force<\/code>. Lease aborts if someone pushed in between.<\/p>\n<h2 id=\"after-push\">After push<\/h2>\n<ul><li>Watch CI. Pipeline break → fix forward in new commit, don't amend-and-force.<\/li><li>Review finding → fresh commit on same branch.<\/li><\/ul>\n<h2 id=\"stop\">Stop<\/h2>\n<p>Local + remote agree. CI green on latest pushed. No work older than last push exists only on disk.<\/p>\n<h2 id=\"anti-patterns\">Anti-patterns<\/h2>\n<ul><li>Push-once-at-end — defeats every purpose<\/li><li>Silent force-push to shared — overwrites others<\/li><li>Pushing without watching CI — failures compound<\/li><li>Pushing broken <code>main<\/code> — use topic branch for WIP<\/li><\/ul>","text":"Phase 7 — Incremental pushes Keep remote in lockstep with local. Don't hoard. Push = upstream counterpart of bounded commits. Same discipline: small, frequent, traceable. Cadence Push after every meaningful checkpoint: Each green-refactor cycle completing a coherent slice Before stepping away (lunch, EOD, context switch) Before any operation that could lose work (rebase, branch surgery, reboot) Rule: local >5 commits ahead of origin → push. Why Backup. Local-only = one disk failure from gone. CI early signal. Each push exercises pipeline; catch breakage on the causing commit. Visibility. Reviewers see direction without waiting. Bisect on origin works. Mega-pushes collapse history. Rollback granularity. Reverting one pushed commit = cheap. Don't Hoard until \"feature done\" — defeats backup, CI, visibility Push and force-push casually — destructive on shared branches Push broken/half-typed without marking — others may pull. WIP → wip/<topic> or [WIP] PR title Mix branches in one push session — one branch, one push, one outcome Force-push rules Never force-push to main / master or shared branch. Confirm with user before any force-push. Acceptable on own feature branch: Rewriting history before review (squash typos, reword subjects) Rebase onto updated base Use --force-with-lease , never blind --force . Lease aborts if someone pushed in between. After push Watch CI. Pipeline break → fix forward in new commit, don't amend-and-force. Review finding → fresh commit on same branch. Stop Local + remote agree. CI green on latest pushed. No work older than last push exists only on disk. Anti-patterns Push-once-at-end — defeats every purpose Silent force-push to shared — overwrites others Pushing without watching CI — failures compound Pushing broken main — use topic branch for WIP"},{"id":".claude/skills/coder/references/tdd.md","title":"Phase 4 — TDD with deep modules","category":"Skills","path":".claude/skills/coder/references/tdd.md","desc":"","html":"<h1 id=\"phase-4-tdd-with-deep-modules\">Phase 4 — TDD with deep modules<\/h1>\n<p><strong>Symptom prevented:<\/strong> large diffs then \"remember\" to type-check or test. <strong>Cause:<\/strong> outrunning headlights. Feedback rate = speed limit.<\/p>\n<h2 id=\"red-green-refactor\">RED → GREEN → Refactor<\/h2>\n<p>Per behavior in PRD test plan:<\/p>\n<h3 id=\"4-1-red-failing-test-first\">4.1 RED — failing test first<\/h3>\n<p>Test for behavior that doesn't exist. Run — MUST fail. Test passing pre-impl tests nothing.<\/p>\n<p>Test at <strong>interface boundary<\/strong> from PRD. Use canonical glossary terms in test names + assertions.<\/p>\n<p>Naming: <code>process_should_return_error_when_input_empty()<\/code>.<\/p>\n<h3 id=\"4-2-green-minimal-impl\">4.2 GREEN — minimal impl<\/h3>\n<p>Min code to pass test. No gold-plating. No \"while I'm here\".<\/p>\n<h3 id=\"4-3-refactor-deepen-module\">4.3 Refactor — deepen module<\/h3>\n<p>Hide complexity, simplify interface, reduce surface. After green, before next RED.<\/p>\n<h2 id=\"mutation-testing-mindset\">Mutation testing mindset<\/h2>\n<ul><li>Don't just assert success — assert specific values, counts, state changes<\/li><li>Boundary conditions: <code>&gt; 0<\/code> → test 0, 1, -1<\/li><li>Side effects: method updates multiple fields → assert ALL<\/li><li>One assertion per test when possible<\/li><li>If <code>&gt;<\/code> → <code>&gt;=<\/code> mutation, test catch it? If not, add one<\/li><\/ul>\n<h2 id=\"feedback-loop-after-each-cycle\">Feedback loop after each cycle<\/h2>\n<ul><li>Static types<\/li><li>Automated tests<\/li><li>Browser (frontend), real DB (integration) where applicable<\/li><\/ul>\n<p>UI/frontend: dev server + exercise feature in browser. Type checks + test suites verify code correctness, not feature correctness.<\/p>\n<h2 id=\"deep-modules-not-shallow-ousterhout\">Deep modules, not shallow (Ousterhout)<\/h2>\n<ul><li><strong>Deep:<\/strong> lots of functionality, simple interface, complexity hidden<\/li><li><strong>Shallow:<\/strong> little functionality, complex interface, deps leak<\/li><\/ul>\n<p>Test at deep-module interfaces, not every shallow function.<\/p>\n<p>If shallow-module sprawl in area you're touching, <strong>stop and run phase 5 first<\/strong> on the slice. Cannot extend shallow thicket correctly.<\/p>\n<h2 id=\"test-strategy-by-complexity\">Test strategy by complexity<\/h2>\n<table><thead><tr><th>Change<\/th><th>Strategy<\/th><\/tr><\/thead><tbody><tr><td>Single file fix &lt;20 lines<\/td><td>Related test class only<\/td><\/tr><tr><td>Single file 20-50 lines<\/td><td>Related tests + sanity<\/td><\/tr><tr><td>Multi files, same feature<\/td><td>Feature suite<\/td><\/tr><tr><td>Cross-cutting<\/td><td>All affected modules<\/td><\/tr><tr><td>DB/schema<\/td><td>All affected modules<\/td><\/tr><tr><td>Auth/security<\/td><td>All affected modules<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"commit-cadence\">Commit cadence<\/h2>\n<p>After each green-refactor. See <code>commits.md<\/code>. Reference PRD ID + decision IDs in body when <em>why<\/em> not obvious.<\/p>\n<p>If tests fail: analyze (don't guess), fix root cause (not symptom), re-run, repeat to 0.<\/p>\n<p><strong>Never commit failing tests.<\/strong><\/p>\n<h2 id=\"stop\">Stop<\/h2>\n<p>All PRD behaviors have passing tests at right boundary. Static types pass. No new shallow modules.<\/p>\n<h2 id=\"anti-pattern\">Anti-pattern<\/h2>\n<p>Big-batch impl + \"let me add tests now\". = implementation-driven dev with test suffix.<\/p>","text":"Phase 4 — TDD with deep modules Symptom prevented: large diffs then \"remember\" to type-check or test. Cause: outrunning headlights. Feedback rate = speed limit. RED → GREEN → Refactor Per behavior in PRD test plan: 4.1 RED — failing test first Test for behavior that doesn't exist. Run — MUST fail. Test passing pre-impl tests nothing. Test at interface boundary from PRD. Use canonical glossary terms in test names + assertions. Naming: process_should_return_error_when_input_empty() . 4.2 GREEN — minimal impl Min code to pass test. No gold-plating. No \"while I'm here\". 4.3 Refactor — deepen module Hide complexity, simplify interface, reduce surface. After green, before next RED. Mutation testing mindset Don't just assert success — assert specific values, counts, state changes Boundary conditions: > 0 → test 0, 1, -1 Side effects: method updates multiple fields → assert ALL One assertion per test when possible If > → >= mutation, test catch it? If not, add one Feedback loop after each cycle Static types Automated tests Browser (frontend), real DB (integration) where applicable UI/frontend: dev server + exercise feature in browser. Type checks + test suites verify code correctness, not feature correctness. Deep modules, not shallow (Ousterhout) Deep: lots of functionality, simple interface, complexity hidden Shallow: little functionality, complex interface, deps leak Test at deep-module interfaces, not every shallow function. If shallow-module sprawl in area you're touching, stop and run phase 5 first on the slice. Cannot extend shallow thicket correctly. Test strategy by complexity Change Strategy Single file fix <20 lines Related test class only Single file 20-50 lines Related tests + sanity Multi files, same feature Feature suite Cross-cutting All affected modules DB/schema All affected modules Auth/security All affected modules Commit cadence After each green-refactor. See commits.md . Reference PRD ID + decision IDs in body when why not obvious. If tests fail: analyze (don't guess), fix root cause (not symptom), re-run, repeat to 0. Never commit failing tests. Stop All PRD behaviors have passing tests at right boundary. Static types pass. No new shallow modules. Anti-pattern Big-batch impl + \"let me add tests now\". = implementation-driven dev with test suffix."},{"id":".claude/skills/foundation-cc/SKILL.md","title":"foundation-cc","category":"Skills","path":".claude/skills/foundation-cc/SKILL.md","desc":">","html":"<h1 id=\"claude-code-authoring-kit\">Claude Code Authoring Kit<\/h1>\n<p>Reference set for authoring Claude Code Skills, sub-agents, plugins, slash commands, hooks, memory, settings, sandboxing, and headless usage. The detail lives in reference/ — this file is the index plus the facts needed for routing.<\/p>\n<h2 id=\"documentation-index\">Documentation Index<\/h2>\n<p>Core Features:<\/p>\n<ul><li>reference/claude-code-skills-official.md - Agent Skills creation and management<\/li><li>reference/claude-code-sub-agents-official.md - Sub-agent development and delegation<\/li><li>reference/claude-code-plugins-official.md - Plugin architecture and distribution<\/li><li>reference/claude-code-discover-plugins-official.md - Finding and installing plugins<\/li><li>reference/claude-code-plugin-marketplaces-official.md - Marketplace setup and distribution<\/li><li>reference/claude-code-custom-slash-commands-official.md - Command creation and orchestration<\/li><\/ul>\n<p>Configuration:<\/p>\n<ul><li>reference/claude-code-settings-official.md - Configuration hierarchy and management<\/li><li>reference/claude-code-memory-official.md - Context and knowledge persistence<\/li><li>reference/claude-code-hooks-official.md - Event-driven automation<\/li><li>reference/claude-code-iam-official.md - Permissions and access control<\/li><\/ul>\n<p>Advanced:<\/p>\n<ul><li>reference/claude-code-sandboxing-official.md - Security isolation<\/li><li>reference/claude-code-headless-official.md - Programmatic and CI/CD usage<\/li><li>reference/claude-code-devcontainers-official.md - Containerized environments<\/li><li>reference/claude-code-cli-reference-official.md - Command-line interface<\/li><li>reference/claude-code-statusline-official.md - Custom status display<\/li><li>reference/advanced-agent-patterns.md - Orchestration and context engineering<\/li><\/ul>\n<h2 id=\"quick-reference\">Quick Reference<\/h2>\n<ul><li>Skills: model-invoked, <code>.claude/skills/&lt;name&gt;/SKILL.md<\/code> (project) or <code>~/.claude/skills/<\/code> (personal). Three-level progressive disclosure: metadata (~100 tokens) → body (&lt;5K tokens) → on-demand resources. Keep under 500 lines; third-person description with trigger terms.<\/li><li>Sub-agents: markdown in <code>.claude/agents/<\/code>, invoked via <code>Agent(subagent_type=...)<\/code>. Own 200K context; cannot spawn sub-agents; do user interaction before delegation. Frontmatter: name, description (use PROACTIVELY for auto-delegation), tools CSV, model.<\/li><li>Plugins: bundles with <code>.claude-plugin/plugin.json<\/code>; can ship commands, agents, skills, hooks, MCP servers. Manage via <code>/plugin<\/code>.<\/li><li>Commands: user-invoked <code>/name<\/code>; <code>$ARGUMENTS<\/code>, <code>$1<\/code>, <code>$2<\/code>, <code>@file<\/code> refs. Thin routing wrappers per coding-standards.<\/li><li>Hooks: events in settings.json (see hooks doc for the full event list and handler types).<\/li><li>Memory: CLAUDE.md hierarchy + <code>.claude/rules/*.md<\/code> + @imports (see memory doc).<\/li><li>Settings: precedence enterprise-managed &gt; CLI &gt; local &gt; project &gt; user (see settings doc).<\/li><li>Headless: <code>claude -p<\/code> with <code>--allowedTools<\/code>; always restrict tools in CI.<\/li><\/ul>\n<h2 id=\"the-machine-s-authoring-conventions\">The Machine's Authoring Conventions<\/h2>\n<ul><li>Agents resolve by <code>name:<\/code> frontmatter (must be unique); <code>skills:<\/code> refs must resolve to real skill dirs — verify after every rename.<\/li><li>Validate settings.json JSON after every edit; every registered hook needs an existing script file.<\/li><li>Use <code>$CLAUDE_PROJECT_DIR<\/code> in hook commands, never absolute paths.<\/li><li>Core builder agents: builder-skill (skills), builder-agent (sub-agents), builder-plugin (plugins). manager-spec / manager-ddd / manager-quality for spec-driven work.<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"I will use Bash sed instead of Edit, it is faster\"<\/td><td>Edit is the preferred tool for accuracy and review. Bash sed errors are silent and hard to trace.<\/td><\/tr><tr><td>\"This hook does not need a timeout, it finishes quickly\"<\/td><td>Hooks without timeouts can hang the entire session. Always set an explicit timeout.<\/td><\/tr><tr><td>\"I can put all logic in CLAUDE.md, rules are overkill\"<\/td><td>CLAUDE.md has a 40K character limit. Rules load conditionally and scale without bloating the prompt.<\/td><\/tr><tr><td>\"Settings.json changes are low risk\"<\/td><td>Incorrect settings.json breaks hooks, permissions, and model routing. Validate the JSON after every edit.<\/td><\/tr><tr><td>\"I will skip progressive disclosure, all content is needed\"<\/td><td>Loading 5K tokens for every skill wastes 67% of context. Level 1 metadata is sufficient for routing.<\/td><\/tr><tr><td>\"This skill does not need allowed-tools, Claude will figure it out\"<\/td><td>Missing allowed-tools means the skill silently inherits all tools. Explicit is safer than implicit.<\/td><\/tr><\/tbody><\/table>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>CLAUDE.md exceeds 40,000 characters<\/li><li>Hook registered in settings.json without a corresponding script file<\/li><li>Skill frontmatter uses space-separated allowed-tools instead of comma-separated<\/li><li>Agent definition uses YAML array for tools instead of CSV string<\/li><li>settings.json contains hardcoded absolute paths instead of $CLAUDE_PROJECT_DIR<\/li><li>Progressive disclosure disabled for a skill that exceeds 3000 tokens<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] CLAUDE.md character count is under 40,000 (show wc -c output)<\/li><li>[ ] settings.json is valid JSON (show json validation output)<\/li><li>[ ] Every hook in settings.json has a matching script file in .claude/hooks/<\/li><li>[ ] All skill frontmatter uses CSV format for allowed-tools<\/li><li>[ ] Agent frontmatter uses CSV for tools and YAML array for skills<\/li><li>[ ] All metadata values in skill frontmatter are quoted strings<\/li><li>[ ] $CLAUDE_PROJECT_DIR used instead of absolute paths in hook commands<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"Claude Code Authoring Kit Reference set for authoring Claude Code Skills, sub-agents, plugins, slash commands, hooks, memory, settings, sandboxing, and headless usage. The detail lives in reference/ — this file is the index plus the facts needed for routing. Documentation Index Core Features: reference/claude-code-skills-official.md - Agent Skills creation and management reference/claude-code-sub-agents-official.md - Sub-agent development and delegation reference/claude-code-plugins-official.md - Plugin architecture and distribution reference/claude-code-discover-plugins-official.md - Finding and installing plugins reference/claude-code-plugin-marketplaces-official.md - Marketplace setup and distribution reference/claude-code-custom-slash-commands-official.md - Command creation and orchestration Configuration: reference/claude-code-settings-official.md - Configuration hierarchy and management reference/claude-code-memory-official.md - Context and knowledge persistence reference/claude-code-hooks-official.md - Event-driven automation reference/claude-code-iam-official.md - Permissions and access control Advanced: reference/claude-code-sandboxing-official.md - Security isolation reference/claude-code-headless-official.md - Programmatic and CI/CD usage reference/claude-code-devcontainers-official.md - Containerized environments reference/claude-code-cli-reference-official.md - Command-line interface reference/claude-code-statusline-official.md - Custom status display reference/advanced-agent-patterns.md - Orchestration and context engineering Quick Reference Skills: model-invoked, .claude/skills/<name>/SKILL.md (project) or ~/.claude/skills/ (personal). Three-level progressive disclosure: metadata (~100 tokens) → body (<5K tokens) → on-demand resources. Keep under 500 lines; third-person description with trigger terms. Sub-agents: markdown in .claude/agents/ , invoked via Agent(subagent_type=...) . Own 200K context; cannot spawn sub-agents; do user interaction before delegation. Frontmatter: name, description (use PROACTIVELY for auto-delegation), tools CSV, model. Plugins: bundles with .claude-plugin/plugin.json ; can ship commands, agents, skills, hooks, MCP servers. Manage via /plugin . Commands: user-invoked /name ; $ARGUMENTS , $1 , $2 , @file refs. Thin routing wrappers per coding-standards. Hooks: events in settings.json (see hooks doc for the full event list and handler types). Memory: CLAUDE.md hierarchy + .claude/rules/*.md + @imports (see memory doc). Settings: precedence enterprise-managed > CLI > local > project > user (see settings doc). Headless: claude -p with --allowedTools ; always restrict tools in CI. The Machine's Authoring Conventions Agents resolve by name: frontmatter (must be unique); skills: refs must resolve to real skill dirs — verify after every rename. Validate settings.json JSON after every edit; every registered hook needs an existing script file. Use $CLAUDE_PROJECT_DIR in hook commands, never absolute paths. Core builder agents: builder-skill (skills), builder-agent (sub-agents), builder-plugin (plugins). manager-spec / manager-ddd / manager-quality for spec-driven work. <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"I will use Bash sed instead of Edit, it is faster\" Edit is the preferred tool for accuracy and review. Bash sed errors are silent and hard to trace. \"This hook does not need a timeout, it finishes quickly\" Hooks without timeouts can hang the entire session. Always set an explicit timeout. \"I can put all logic in CLAUDE.md, rules are overkill\" CLAUDE.md has a 40K character limit. Rules load conditionally and scale without bloating the prompt. \"Settings.json changes are low risk\" Incorrect settings.json breaks hooks, permissions, and model routing. Validate the JSON after every edit. \"I will skip progressive disclosure, all content is needed\" Loading 5K tokens for every skill wastes 67% of context. Level 1 metadata is sufficient for routing. \"This skill does not need allowed-tools, Claude will figure it out\" Missing allowed-tools means the skill silently inherits all tools. Explicit is safer than implicit. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags CLAUDE.md exceeds 40,000 characters Hook registered in settings.json without a corresponding script file Skill frontmatter uses space-separated allowed-tools instead of comma-separated Agent definition uses YAML array for tools instead of CSV string settings.json contains hardcoded absolute paths instead of $CLAUDE_PROJECT_DIR Progressive disclosure disabled for a skill that exceeds 3000 tokens <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] CLAUDE.md character count is under 40,000 (show wc -c output) [ ] settings.json is valid JSON (show json validation output) [ ] Every hook in settings.json has a matching script file in .claude/hooks/ [ ] All skill frontmatter uses CSV format for allowed-tools [ ] Agent frontmatter uses CSV for tools and YAML array for skills [ ] All metadata values in skill frontmatter are quoted strings [ ] $CLAUDE_PROJECT_DIR used instead of absolute paths in hook commands <!-- machine:evolvable-end -->"},{"id":".claude/skills/foundation-cc/reference/advanced-agent-patterns.md","title":"Advanced Agent Patterns - Anthropic Engineering Insights","category":"Skills","path":".claude/skills/foundation-cc/reference/advanced-agent-patterns.md","desc":"","html":"<h1 id=\"advanced-agent-patterns-anthropic-engineering-insights\">Advanced Agent Patterns - Anthropic Engineering Insights<\/h1>\n<p>Sources:<\/p>\n<ul><li>https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents<\/li><li>https://www.anthropic.com/engineering/advanced-tool-use<\/li><li>https://www.anthropic.com/engineering/code-execution-with-mcp<\/li><li>https://www.anthropic.com/engineering/building-agents-with-the-claude-agent-sdk<\/li><li>https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents<\/li><li>https://www.anthropic.com/engineering/writing-tools-for-agents<\/li><li>https://www.anthropic.com/engineering/multi-agent-research-system<\/li><li>https://www.anthropic.com/engineering/claude-code-best-practices<\/li><li>https://www.anthropic.com/engineering/claude-think-tool<\/li><li>https://www.anthropic.com/engineering/building-effective-agents<\/li><li>https://www.anthropic.com/engineering/contextual-retrieval<\/li><\/ul>\n<p>Updated: 2026-01-06<\/p>\n<h2 id=\"long-running-agent-architecture\">Long-Running Agent Architecture<\/h2>\n<h3 id=\"two-agent-pattern\">Two-Agent Pattern<\/h3>\n<p>For complex, multi-session tasks, use a two-agent system:<\/p>\n<p>Initializer Agent (runs once):<\/p>\n<ul><li>Sets up project structure and environment<\/li><li>Creates feature registry tracking completion status<\/li><li>Establishes progress documentation patterns<\/li><li>Generates initialization scripts for future sessions<\/li><\/ul>\n<p>Executor Agent (runs repeatedly):<\/p>\n<ul><li>Consumes environment created by initializer<\/li><li>Works on single features per session<\/li><li>Updates progress documentation<\/li><li>Maintains feature registry state<\/li><\/ul>\n<h3 id=\"feature-registry-pattern\">Feature Registry Pattern<\/h3>\n<p>Maintain a JSON file tracking all functionality:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;features&quot;: [\n    {&quot;id&quot;: &quot;auth-login&quot;, &quot;status&quot;: &quot;complete&quot;, &quot;tested&quot;: true},\n    {&quot;id&quot;: &quot;auth-logout&quot;, &quot;status&quot;: &quot;in-progress&quot;, &quot;tested&quot;: false},\n    {&quot;id&quot;: &quot;user-profile&quot;, &quot;status&quot;: &quot;pending&quot;, &quot;tested&quot;: false}\n  ]\n}<\/code><\/pre>\n<p>This enables:<\/p>\n<ul><li>Clear work boundaries per session<\/li><li>Progress tracking across sessions<\/li><li>Prioritization of incomplete features<\/li><\/ul>\n<h3 id=\"progress-documentation\">Progress Documentation<\/h3>\n<p>Create persistent progress logs (claude-progress.txt):<\/p>\n<ul><li>Summary of completed work<\/li><li>Current feature status<\/li><li>Blockers and decisions made<\/li><li>Next steps for future sessions<\/li><\/ul>\n<p>Commit progress with git for history preservation.<\/p>\n<h3 id=\"session-initialization-protocol\">Session Initialization Protocol<\/h3>\n<p>At start of each session:<\/p>\n<ol><li>Verify correct directory<\/li><li>Review progress logs<\/li><li>Select priority feature from registry<\/li><li>Test existing baseline functionality<\/li><li>Begin focused work on single feature<\/li><\/ol>\n<h2 id=\"dynamic-tool-discovery\">Dynamic Tool Discovery<\/h2>\n<h3 id=\"tool-search-pattern\">Tool Search Pattern<\/h3>\n<p>For large tool libraries, implement discovery mechanism:<\/p>\n<p>Benefits:<\/p>\n<ul><li>85% reduction in token consumption<\/li><li>Tools loaded only when needed<\/li><li>Reduced context pollution<\/li><\/ul>\n<p>Implementation approach:<\/p>\n<ul><li>Register tools with metadata including name, description, and keywords<\/li><li>Provide search tool that queries registry<\/li><li>Use defer_loading parameter to hide tools until searched<\/li><li>Agent searches for relevant tools before use<\/li><\/ul>\n<h3 id=\"programmatic-tool-orchestration\">Programmatic Tool Orchestration<\/h3>\n<p>For complex multi-step workflows:<\/p>\n<p>Benefits:<\/p>\n<ul><li>37% token reduction on complex tasks<\/li><li>Elimination of repeated inference passes<\/li><li>Parallel operation execution<\/li><\/ul>\n<p>Pattern:<\/p>\n<ul><li>Agent generates code orchestrating multiple tool calls<\/li><li>Code executes in sandbox environment<\/li><li>Results returned to agent in single response<\/li><\/ul>\n<h3 id=\"usage-examples-for-tool-clarity\">Usage Examples for Tool Clarity<\/h3>\n<p>JSON schemas alone are insufficient. Provide 3-5 concrete examples:<\/p>\n<p>Minimal invocation: Required parameters only Partial invocation: Common optional parameters Complete invocation: All parameters with edge cases<\/p>\n<p>Examples teach API conventions without token overhead.<\/p>\n<h2 id=\"code-execution-efficiency\">Code Execution Efficiency<\/h2>\n<h3 id=\"data-processing-in-sandbox\">Data Processing in Sandbox<\/h3>\n<p>Process data before model sees results:<\/p>\n<p>Benefits:<\/p>\n<ul><li>98.7% token reduction possible (150K to 2K tokens)<\/li><li>Deterministic operations executed reliably<\/li><li>Complex transformations handled efficiently<\/li><\/ul>\n<p>Pattern:<\/p>\n<ul><li>Agent writes filtering and aggregation code<\/li><li>Code executes in sandboxed environment<\/li><li>Only relevant results returned to model<\/li><li>Intermediate results persisted for resumable workflows<\/li><\/ul>\n<h3 id=\"reusable-skills-pattern\">Reusable Skills Pattern<\/h3>\n<p>Save working code as functions:<\/p>\n<ul><li>Extract successful patterns into reusable modules<\/li><li>Reference modules in future sessions<\/li><li>Build library of proven implementations<\/li><\/ul>\n<h2 id=\"multi-agent-coordination\">Multi-Agent Coordination<\/h2>\n<h3 id=\"orchestrator-worker-architecture\">Orchestrator-Worker Architecture<\/h3>\n<p>Lead Agent (higher capability model):<\/p>\n<ul><li>Analyzes incoming queries<\/li><li>Decomposes into parallel subtasks<\/li><li>Spawns specialized worker agents<\/li><li>Synthesizes results into final output<\/li><\/ul>\n<p>Worker Agents (cost-effective models):<\/p>\n<ul><li>Execute specific, focused tasks<\/li><li>Return condensed summaries (1K-2K tokens)<\/li><li>Operate with isolated context windows<\/li><li>Use specialized prompts and tool access<\/li><\/ul>\n<h3 id=\"hierarchical-communication\">Hierarchical Communication<\/h3>\n<p>Lead to workers:<\/p>\n<ul><li>Clear task boundaries<\/li><li>Specific output format requirements<\/li><li>Guidance on tools and sources<\/li><li>Prevention of duplicate work<\/li><\/ul>\n<p>Workers to lead:<\/p>\n<ul><li>Condensed findings summary<\/li><li>Source attribution<\/li><li>Quality indicators<\/li><li>Error or blocker reports<\/li><\/ul>\n<h3 id=\"scaling-rules\">Scaling Rules<\/h3>\n<p>Simple queries: Single agent with 3-10 tool calls Complex research: 10+ workers with parallel execution State persistence: Prevent disruption during updates Error resilience: Adapt when tools fail rather than restart<\/p>\n<h2 id=\"context-engineering\">Context Engineering<\/h2>\n<h3 id=\"core-principle\">Core Principle<\/h3>\n<p>Find the smallest possible set of high-signal tokens that maximize likelihood of desired outcome. Treat context as finite, precious resource.<\/p>\n<h3 id=\"information-prioritization\">Information Prioritization<\/h3>\n<p>LLMs lose focus as context grows (context rot). Every token depletes attention budget.<\/p>\n<p>Strategies:<\/p>\n<ul><li>Place critical information at start and end of context<\/li><li>Use clear section markers (XML tags or Markdown headers)<\/li><li>Remove redundant or low-signal content<\/li><li>Summarize when precision not required<\/li><\/ul>\n<h3 id=\"context-compaction\">Context Compaction<\/h3>\n<p>For long-running tasks:<\/p>\n<ul><li>Summarize conversation history automatically<\/li><li>Reinitiate with compressed context<\/li><li>Preserve architectural decisions and key findings<\/li><li>Maintain external memory files outside context window<\/li><\/ul>\n<h3 id=\"just-in-time-retrieval\">Just-In-Time Retrieval<\/h3>\n<p>Maintain lightweight identifiers and load data dynamically:<\/p>\n<ul><li>Store file paths, URLs, and IDs<\/li><li>Load content only when needed<\/li><li>Combine upfront retrieval for speed with autonomous exploration<\/li><li>Progressive disclosure mirrors human cognition<\/li><\/ul>\n<h2 id=\"tool-design-best-practices\">Tool Design Best Practices<\/h2>\n<h3 id=\"consolidation-over-proliferation\">Consolidation Over Proliferation<\/h3>\n<p>Combine related functionality into single tools:<\/p>\n<p>Instead of: list_users, list_events, create_event, delete_event Use: manage_events with action parameter<\/p>\n<p>Benefits:<\/p>\n<ul><li>Reduced tool selection complexity<\/li><li>Clearer mental model for agent<\/li><li>Lower probability of incorrect tool choice<\/li><\/ul>\n<h3 id=\"context-aware-responses\">Context-Aware Responses<\/h3>\n<p>Return high-signal information:<\/p>\n<ul><li>Use natural language names rather than cryptic IDs<\/li><li>Include relevant metadata in responses<\/li><li>Format for agent consumption, not human reading<\/li><\/ul>\n<h3 id=\"parameter-specification\">Parameter Specification<\/h3>\n<p>Clear parameter naming:<\/p>\n<ul><li>user_id not user<\/li><li>start_date not start<\/li><li>include_archived not archived<\/li><\/ul>\n<p>Enable response format control:<\/p>\n<ul><li>Optional enum for concise or detailed responses<\/li><li>Agent specifies verbosity based on task needs<\/li><\/ul>\n<h3 id=\"error-handling\">Error Handling<\/h3>\n<p>Replace opaque error codes with instructive feedback:<\/p>\n<ul><li>Explain what went wrong<\/li><li>Suggest correct usage<\/li><li>Provide examples of valid parameters<\/li><li>Encourage token-efficient strategies<\/li><\/ul>\n<h3 id=\"poka-yoke-design\">Poka-Yoke Design<\/h3>\n<p>Make incorrect usage harder than correct usage:<\/p>\n<ul><li>Validate parameters before execution<\/li><li>Return helpful errors for invalid combinations<\/li><li>Design APIs that guide toward success<\/li><\/ul>\n<h2 id=\"think-tool-integration\">Think Tool Integration<\/h2>\n<h3 id=\"when-to-use-think-tool\">When to Use Think Tool<\/h3>\n<p>High-value scenarios:<\/p>\n<ul><li>Processing complex tool outputs before proceeding<\/li><li>Compliance verification with detailed guidelines<\/li><li>Sequential decision-making where errors are consequential<\/li><li>Multi-step domains requiring careful consideration<\/li><\/ul>\n<h3 id=\"performance-characteristics\">Performance Characteristics<\/h3>\n<p>Measured improvements:<\/p>\n<ul><li>Airline domain: 54% relative improvement with targeted examples<\/li><li>Retail scenarios: 81.2% pass-rate<\/li><li>SWE-bench: 1.6% average improvement<\/li><\/ul>\n<h3 id=\"implementation-strategy\">Implementation Strategy<\/h3>\n<p>Pair with optimized domain-specific prompts Place comprehensive instructions in system prompts Avoid for non-sequential or simple tasks Use for reflecting on tool outputs mid-response<\/p>\n<h2 id=\"verification-patterns\">Verification Patterns<\/h2>\n<h3 id=\"quality-assurance-approaches\">Quality Assurance Approaches<\/h3>\n<p>Code verification: Linting and static analysis most effective Visual feedback: Screenshot outputs for UI tasks LLM judgment: Fuzzy criteria evaluation (tone, quality) Human evaluation: Edge cases automation misses<\/p>\n<h3 id=\"diagnostic-questions\">Diagnostic Questions<\/h3>\n<p>When agents underperform:<\/p>\n<p>Missing context? Restructure search APIs for discoverability Repeated failures? Add formal validation rules in tool definitions Error-prone approach? Provide alternative tools enabling different strategies Variable performance? Build representative test sets for programmatic evaluation<\/p>\n<h2 id=\"workflow-pattern-explore-plan-code-commit\">Workflow Pattern: Explore-Plan-Code-Commit<\/h2>\n<h3 id=\"phase-1-explore\">Phase 1: Explore<\/h3>\n<p>Start with exploration without coding:<\/p>\n<ul><li>Read files to understand structure<\/li><li>Identify relevant components<\/li><li>Map dependencies and interfaces<\/li><\/ul>\n<h3 id=\"phase-2-plan\">Phase 2: Plan<\/h3>\n<p>Use extended thinking prompts:<\/p>\n<ul><li>Outline approach before implementation<\/li><li>Consider alternatives and tradeoffs<\/li><li>Define clear success criteria<\/li><\/ul>\n<h3 id=\"phase-3-code\">Phase 3: Code<\/h3>\n<p>Implement iteratively:<\/p>\n<ul><li>Small, testable changes<\/li><li>Verify each step before proceeding<\/li><li>Handle edge cases explicitly<\/li><\/ul>\n<h3 id=\"phase-4-commit\">Phase 4: Commit<\/h3>\n<p>Meaningful commits:<\/p>\n<ul><li>Descriptive messages explaining why<\/li><li>Logical groupings of related changes<\/li><li>Clean history for future reference<\/li><\/ul>\n<h2 id=\"hybrid-context-retrieval\">Hybrid Context Retrieval<\/h2>\n<h3 id=\"combined-approach\">Combined Approach<\/h3>\n<p>Semantic embeddings: Capture meaning relationships BM25 keyword search: Handle exact phrases and error codes<\/p>\n<h3 id=\"context-prepending\">Context Prepending<\/h3>\n<p>Enrich chunks with metadata before encoding:<\/p>\n<ul><li>Transform isolated statements into fully-contextualized information<\/li><li>Include surrounding context and relationships<\/li><li>Improves retrieval precision by 49-67%<\/li><\/ul>\n<h3 id=\"configuration\">Configuration<\/h3>\n<p>Optimal settings from research:<\/p>\n<ul><li>Top-20 chunks outperform smaller selections<\/li><li>Domain-specific prompts improve quality<\/li><li>Reranking adds significant precision gains<\/li><\/ul>\n<h2 id=\"security-considerations\">Security Considerations<\/h2>\n<h3 id=\"credential-handling\">Credential Handling<\/h3>\n<p>Web-based execution:<\/p>\n<ul><li>Credentials never enter sandbox<\/li><li>Proxy services handle authenticated operations<\/li><li>Branch-level restrictions enforced externally<\/li><\/ul>\n<h3 id=\"sandboxing-architecture\">Sandboxing Architecture<\/h3>\n<p>Dual-layer protection:<\/p>\n<ul><li>Filesystem isolation: Read/write boundaries<\/li><li>Network isolation: Domain allowlists via proxy<\/li><\/ul>\n<p>OS-level enforcement using kernel security features.<\/p>\n<h3 id=\"permission-boundaries\">Permission Boundaries<\/h3>\n<p>84% reduction in permission prompts through:<\/p>\n<ul><li>Defined operation boundaries<\/li><li>Automatic allowlisting of safe operations<\/li><li>Clear separation of privileged actions<\/li><\/ul>","text":"Advanced Agent Patterns - Anthropic Engineering Insights Sources: https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents https://www.anthropic.com/engineering/advanced-tool-use https://www.anthropic.com/engineering/code-execution-with-mcp https://www.anthropic.com/engineering/building-agents-with-the-claude-agent-sdk https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents https://www.anthropic.com/engineering/writing-  for concise or detailed responses Agent specifies verbosity based on task needs Error Handling Replace opaque error codes with instructive feedback: Explain what went wrong Suggest correct usage Provide examples of valid parameters Encourage token-efficient strategies Poka-Yoke Design Make incorrect usage harder than correct usage: Validate parameters before execution Return helpful errors for invalid combinations Design APIs that guide toward success Think Tool Integration When to Use Think Tool High-value scenarios: Processing complex tool outputs before proceeding Compliance verification with detailed guidelines Sequential decision-making where errors are consequential Multi-step domains requiring careful consideration Performance Characteristics Measured improvements: Airline domain: 54% relative improvement with targeted examples Retail scenarios: 81.2% pass-rate SWE-bench: 1.6% average improvement Implementation Strategy Pair with optimized domain-specific prompts Place comprehensive instructions in system prompts Avoid for non-sequential or simple tasks Use for reflecting on tool outputs mid-response Verification Patterns Quality Assurance Approaches Code verification: Linting and static analysis most effective Visual feedback: Screenshot outputs for UI tasks LLM judgment: Fuzzy criteria evaluation (tone, quality) Human evaluation: Edge cases automation misses Diagnostic Questions When agents underperform: Missing context? Restructure search APIs for discoverability Repeated failures? Add formal validation rules in tool defi"},{"id":".claude/skills/foundation-cc/reference/claude-code-cli-reference-official.md","title":"Claude Code CLI Reference - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-cli-reference-official.md","desc":"","html":"<h1 id=\"claude-code-cli-reference-official-documentation-reference\">Claude Code CLI Reference - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/cli-reference Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>The Claude Code CLI provides command-line access to Claude's capabilities with comprehensive options for customization, automation, and integration.<\/p>\n<h2 id=\"basic-commands\">Basic Commands<\/h2>\n<h3 id=\"interactive-mode\">Interactive Mode<\/h3>\n<pre><code class=\"language-bash\">claude<\/code><\/pre>\n<p>Starts Claude Code in interactive terminal mode.<\/p>\n<h3 id=\"direct-query\">Direct Query<\/h3>\n<pre><code class=\"language-bash\">claude &quot;Your question or task&quot;<\/code><\/pre>\n<p>Sends a single query and enters interactive mode.<\/p>\n<h3 id=\"prompt-mode\">Prompt Mode<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Your prompt&quot;<\/code><\/pre>\n<p>Runs prompt, outputs response, and exits.<\/p>\n<h3 id=\"continue-conversation\">Continue Conversation<\/h3>\n<pre><code class=\"language-bash\">claude -c &quot;Follow-up&quot;<\/code><\/pre>\n<p>Continues the most recent conversation.<\/p>\n<h3 id=\"resume-session\">Resume Session<\/h3>\n<pre><code class=\"language-bash\">claude -r session_id &quot;Continue task&quot;<\/code><\/pre>\n<p>Resumes a specific session by ID.<\/p>\n<h3 id=\"update-cli\">Update CLI<\/h3>\n<pre><code class=\"language-bash\">claude update<\/code><\/pre>\n<p>Updates Claude Code to the latest version.<\/p>\n<h2 id=\"system-prompt-options\">System Prompt Options<\/h2>\n<h3 id=\"replace-system-prompt\">Replace System Prompt<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --system-prompt &quot;Custom instructions&quot;<\/code><\/pre>\n<p>Warning: Removes Claude Code default capabilities.<\/p>\n<h3 id=\"append-to-system-prompt\">Append to System Prompt<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --append-system-prompt &quot;Additional context&quot;<\/code><\/pre>\n<p>Recommended: Preserves Claude Code functionality.<\/p>\n<h3 id=\"load-from-file\">Load from File<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --system-prompt-file prompt.txt<\/code><\/pre>\n<p>Loads system prompt from external file.<\/p>\n<h2 id=\"tool-management\">Tool Management<\/h2>\n<h3 id=\"specify-tools\">Specify Tools<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --tools &quot;Read,Write,Bash&quot;<\/code><\/pre>\n<p>Explicitly lists available tools.<\/p>\n<h3 id=\"allow-tools-auto-approve\">Allow Tools (Auto-approve)<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --allowedTools &quot;Read,Grep,Glob&quot;<\/code><\/pre>\n<p>Auto-approves specified tools without prompts.<\/p>\n<h3 id=\"tool-pattern-matching\">Tool Pattern Matching<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --allowedTools &quot;Bash(git:*)&quot;<\/code><\/pre>\n<p>Allow specific command patterns only.<\/p>\n<h3 id=\"multiple-patterns\">Multiple Patterns<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --allowedTools &quot;Bash(npm:*),Bash(git:*),Read&quot;<\/code><\/pre>\n<h3 id=\"disallow-tools\">Disallow Tools<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --disallowedTools &quot;Bash,Write&quot;<\/code><\/pre>\n<p>Prevents Claude from using specified tools.<\/p>\n<h2 id=\"output-options\">Output Options<\/h2>\n<h3 id=\"output-format\">Output Format<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --output-format text\nclaude -p &quot;Task&quot; --output-format json\nclaude -p &quot;Task&quot; --output-format stream-json<\/code><\/pre>\n<p>Available formats: text (default), json, stream-json<\/p>\n<h3 id=\"json-schema-validation\">JSON Schema Validation<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Extract data&quot; --json-schema &#x27;{&quot;type&quot;: &quot;object&quot;}&#x27;<\/code><\/pre>\n<p>Validates output against JSON schema.<\/p>\n<h3 id=\"schema-from-file\">Schema from File<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --json-schema-file schema.json<\/code><\/pre>\n<h2 id=\"session-management\">Session Management<\/h2>\n<h3 id=\"fork-session\">Fork Session<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Alternative approach&quot; --fork-session session_id<\/code><\/pre>\n<p>Creates a new branch from existing session.<\/p>\n<h3 id=\"maximum-turns\">Maximum Turns<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Complex task&quot; --max-turns 15<\/code><\/pre>\n<p>Limits conversation turns.<\/p>\n<h2 id=\"agent-configuration\">Agent Configuration<\/h2>\n<h3 id=\"use-specific-agent\">Use Specific Agent<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Review code&quot; --agent code-reviewer<\/code><\/pre>\n<p>Uses defined sub-agent.<\/p>\n<h3 id=\"dynamic-agent-definition\">Dynamic Agent Definition<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --agents &#x27;{\n  &quot;my-agent&quot;: {\n    &quot;description&quot;: &quot;Agent purpose&quot;,\n    &quot;prompt&quot;: &quot;System prompt&quot;,\n    &quot;tools&quot;: [&quot;Read&quot;, &quot;Grep&quot;],\n    &quot;model&quot;: &quot;sonnet&quot;\n  }\n}&#x27;<\/code><\/pre>\n<p>Defines agents inline via JSON.<\/p>\n<h2 id=\"settings\">Settings<\/h2>\n<h3 id=\"override-settings\">Override Settings<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Task&quot; --settings &#x27;{&quot;model&quot;: &quot;opus&quot;}&#x27;<\/code><\/pre>\n<p>Overrides settings for this invocation.<\/p>\n<h3 id=\"show-setting-sources\">Show Setting Sources<\/h3>\n<pre><code class=\"language-bash\">claude --setting-sources<\/code><\/pre>\n<p>Displays origin of each setting value.<\/p>\n<h2 id=\"browser-integration\">Browser Integration<\/h2>\n<h3 id=\"enable-chrome\">Enable Chrome<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Browse task&quot; --chrome<\/code><\/pre>\n<p>Enables browser automation.<\/p>\n<h3 id=\"disable-chrome\">Disable Chrome<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Code task&quot; --no-chrome<\/code><\/pre>\n<p>Disables browser features.<\/p>\n<h2 id=\"mcp-server-commands\">MCP Server Commands<\/h2>\n<h3 id=\"add-mcp-server\">Add MCP Server<\/h3>\n<p>HTTP transport:<\/p>\n<pre><code class=\"language-bash\">claude mcp add --transport http server-name https://url<\/code><\/pre>\n<p>Stdio transport:<\/p>\n<pre><code class=\"language-bash\">claude mcp add --transport stdio server-name command args<\/code><\/pre>\n<p>SSE transport (deprecated):<\/p>\n<pre><code class=\"language-bash\">claude mcp add --transport sse server-name https://url<\/code><\/pre>\n<h3 id=\"list-mcp-servers\">List MCP Servers<\/h3>\n<pre><code class=\"language-bash\">claude mcp list<\/code><\/pre>\n<h3 id=\"get-server-details\">Get Server Details<\/h3>\n<pre><code class=\"language-bash\">claude mcp get server-name<\/code><\/pre>\n<h3 id=\"remove-mcp-server\">Remove MCP Server<\/h3>\n<pre><code class=\"language-bash\">claude mcp remove server-name<\/code><\/pre>\n<h2 id=\"plugin-commands\">Plugin Commands<\/h2>\n<h3 id=\"install-plugin\">Install Plugin<\/h3>\n<pre><code class=\"language-bash\">claude plugin install plugin-name\nclaude plugin install owner/repo\nclaude plugin install https://github.com/owner/repo.git\nclaude plugin install plugin-name --scope project<\/code><\/pre>\n<h3 id=\"uninstall-plugin\">Uninstall Plugin<\/h3>\n<pre><code class=\"language-bash\">claude plugin uninstall plugin-name<\/code><\/pre>\n<h3 id=\"enable-disable-plugin\">Enable/Disable Plugin<\/h3>\n<pre><code class=\"language-bash\">claude plugin enable plugin-name\nclaude plugin disable plugin-name<\/code><\/pre>\n<h3 id=\"update-plugin\">Update Plugin<\/h3>\n<pre><code class=\"language-bash\">claude plugin update plugin-name\nclaude plugin update  # Update all<\/code><\/pre>\n<h3 id=\"list-plugins\">List Plugins<\/h3>\n<pre><code class=\"language-bash\">claude plugin list<\/code><\/pre>\n<h3 id=\"validate-plugin\">Validate Plugin<\/h3>\n<pre><code class=\"language-bash\">claude plugin validate .<\/code><\/pre>\n<h2 id=\"environment-variables\">Environment Variables<\/h2>\n<h3 id=\"configuration-variables\">Configuration Variables<\/h3>\n<ul><li>CLAUDE_API_KEY: API authentication key<\/li><li>CLAUDE_MODEL: Default model selection<\/li><li>CLAUDE_OUTPUT_FORMAT: Default output format<\/li><li>CLAUDE_TIMEOUT: Request timeout in seconds<\/li><\/ul>\n<h3 id=\"runtime-variables\">Runtime Variables<\/h3>\n<ul><li>CLAUDE_PROJECT_DIR: Current project directory<\/li><li>CLAUDE_CODE_REMOTE: Indicates remote execution<\/li><li>CLAUDE_ENV_FILE: Path to environment file<\/li><\/ul>\n<h3 id=\"mcp-variables\">MCP Variables<\/h3>\n<ul><li>MAX_MCP_OUTPUT_TOKENS: Maximum MCP output (default: 25000)<\/li><li>MCP_TIMEOUT: MCP server timeout in milliseconds<\/li><\/ul>\n<h3 id=\"update-control\">Update Control<\/h3>\n<ul><li>DISABLE_AUTOUPDATER: Disable automatic updates<\/li><\/ul>\n<h2 id=\"exit-codes\">Exit Codes<\/h2>\n<ul><li>0: Success<\/li><li>1: General error<\/li><li>2: Permission denied or blocked operation<\/li><\/ul>\n<h2 id=\"complete-examples\">Complete Examples<\/h2>\n<h3 id=\"ci-cd-code-review\">CI/CD Code Review<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Review this PR for security issues&quot; \\\n  --allowedTools &quot;Read,Grep,Glob&quot; \\\n  --append-system-prompt &quot;Focus on OWASP Top 10 vulnerabilities&quot; \\\n  --output-format json \\\n  --max-turns 5<\/code><\/pre>\n<h3 id=\"automated-documentation\">Automated Documentation<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Generate API documentation for src/&quot; \\\n  --allowedTools &quot;Read,Glob,Write&quot; \\\n  --json-schema-file docs-schema.json<\/code><\/pre>\n<h3 id=\"structured-data-extraction\">Structured Data Extraction<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Extract all function signatures from codebase&quot; \\\n  --allowedTools &quot;Read,Grep,Glob&quot; \\\n  --json-schema &#x27;{&quot;type&quot;:&quot;array&quot;,&quot;items&quot;:{&quot;type&quot;:&quot;object&quot;,&quot;properties&quot;:{&quot;name&quot;:{&quot;type&quot;:&quot;string&quot;},&quot;params&quot;:{&quot;type&quot;:&quot;array&quot;},&quot;returns&quot;:{&quot;type&quot;:&quot;string&quot;}}}}&#x27;<\/code><\/pre>\n<h3 id=\"git-commit-message\">Git Commit Message<\/h3>\n<pre><code class=\"language-bash\">git diff --staged | claude -p &quot;Generate commit message&quot; \\\n  --allowedTools &quot;Read&quot; \\\n  --output-format text<\/code><\/pre>\n<h3 id=\"multi-agent-workflow\">Multi-Agent Workflow<\/h3>\n<pre><code class=\"language-bash\">claude -p &quot;Analyze and refactor this module&quot; \\\n  --agents &#x27;{\n    &quot;analyzer&quot;: {\n      &quot;description&quot;: &quot;Code analyzer&quot;,\n      &quot;tools&quot;: [&quot;Read&quot;, &quot;Grep&quot;],\n      &quot;model&quot;: &quot;haiku&quot;\n    },\n    &quot;refactorer&quot;: {\n      &quot;description&quot;: &quot;Code refactorer&quot;,\n      &quot;tools&quot;: [&quot;Read&quot;, &quot;Write&quot;, &quot;Edit&quot;],\n      &quot;model&quot;: &quot;sonnet&quot;\n    }\n  }&#x27;<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"security\">Security<\/h3>\n<ul><li>Use --allowedTools to restrict capabilities<\/li><li>Avoid --dangerously-skip-permissions in untrusted environments<\/li><li>Validate input before passing to Claude<\/li><\/ul>\n<h3 id=\"performance\">Performance<\/h3>\n<ul><li>Use appropriate --max-turns for task complexity<\/li><li>Consider haiku model for simple tasks<\/li><li>Use --output-format json for programmatic parsing<\/li><\/ul>\n<h3 id=\"debugging\">Debugging<\/h3>\n<ul><li>Use --setting-sources to troubleshoot configuration<\/li><li>Check exit codes for error handling<\/li><li>Use --output-format json for detailed response metadata<\/li><\/ul>\n<h3 id=\"automation\">Automation<\/h3>\n<ul><li>Always specify --allowedTools in scripts<\/li><li>Use --output-format json for reliable parsing<\/li><li>Handle errors with exit code checks<\/li><li>Log session IDs for debugging<\/li><\/ul>","text":"Claude Code CLI Reference - Official Documentation Reference Source: https://code.claude.com/docs/en/cli-reference Updated: 2026-01-06 Overview The Claude Code CLI provides command-line access to Claude's capabilities with comprehensive options for customization, automation, and integration. Basic Commands Interactive Mode claude Starts Claude Code in interactive terminal mode. Direct Query claude \"Your question or task\" Sends a single query and enters interactive mode. Prompt Mode claude -p \"Your prompt\" Runs prompt, outputs response, and exits. Continue Conversation claude -c \"Follow-up\" Continues the most recent conversation. Resume Session claude -r session_id \"Continue task\" Resumes a specific session by ID. Update CLI claude update Updates Claude Code to the latest version. System Prompt Options Replace System Prompt claude -p \"Task\" --system-prompt \"Custom instructions\" Warning: Removes Claude Code default capabilities. Append to System Prompt claude -p \"Task\" --append-system-prompt \"Additional context\" Recommended: Preserves Claude Code functionality. Load from File claude -p \"Task\" --system-prompt-file prompt.txt Loads system prompt from external file. Tool Management Specify Tools claude -p \"Task\" --tools \"Read,Write,Bash\" Explicitly lists available tools. Allow Tools (Auto-approve) claude -p \"Task\" --allowedTools \"Read,Grep,Glob\" Auto-approves specified tools without prompts. Tool Pattern Matching claude -p \"Task\" --allowedTools \"Bash(git:*)\" Allow specific command patterns only. Multiple Patterns claude -p \"Task\" --allowedTools \"Bash(npm:*),Bash(git:*),Read\" Disallow Tools claude -p \"Task\" --disallowedTools \"Bash,Write\" Prevents Claude from using specified tools. Output Options Output Format claude -p \"Task\" --output-format text claude -p \"Task\" --output-format json claude -p \"Task\" --output-format stream-json Available formats: text (default), json, stream-json JSON Schema Validation claude -p \"Extract data\" --json-schema '{\"type\": \"object\"}' Validates output against JSON schema. Schema from File claude -p \"Task\" --json-schema-file schema.json Session Management Fork Session claude -p \"Alternative approach\" --fork-session session_id Creates a new branch from existing session. Maximum Turns claude -p \"Complex task\" --max-turns 15 Limits conversation turns. Agent Configuration Use Specific Agent claude -p \"Review code\" --agent code-reviewer Uses defined sub-agent. Dynamic Agent Definition claude -p \"Task\" --agents '{ \"my-agent\": { \"description\": \"Agent purpose\", \"prompt\": \"System prompt\", \"tools\": [\"Read\", \"Grep\"], \"model\": \"sonnet\" } }' Defines agents inline via JSON. Settings Override Settings claude -p \"Task\" --settings '{\"model\": \"opus\"}' Overrides settings for this invocation. Show Setting Sources claude --setting-sources Displays origin of each setting value. Browser Integration Enable Chrome claude -p \"Browse task\" --chrome Enables browser automation. Disable Chrome claude -p \"Code task\" --no-chrome Disables browser features. MCP Server Commands Add MCP Server HTTP transport: claude mcp add --transport http server-name https://url Stdio transport: claude mcp add --transport stdio server-name command args SSE transport (deprecated): claude mcp add --transport sse server-name https://url List MCP Servers claude mcp list Get Server Details claude mcp get server-name Remove MCP Server claude mcp remove server-name Plugin Commands Install Plugin claude plugin install plugin-name claude plugin install owner/repo claude plugin install https://github.com/owner/repo.git claude plugin install plugin-name --scope project Uninstall Plugin claude plugin uninstall plugin-name Enable/Disable Plugin claude plugin enable plugin-name claude plugin disable plugin-name Update Plugin claude plugin update plugin-name claude plugin update # Update all List Plugins claude plugin list Validate Plugin claude plugin validate . Environment Variables Configuration Variables CLAUDE_API_KEY: API authentication key CLAUDE_MODEL: Default model selection CLAUDE_OUTPUT_FORMAT: Default output format CLAUDE_TIMEOUT: Request timeout in seconds Runtime Variables CLAUDE_PROJECT_DIR: Current project directory CLAUDE_CODE_REMOTE: Indicates remote execution CLAUDE_ENV_FILE: Path to environment file MCP Variables MAX_MCP_OUTPUT_TOKENS: Maximum MCP output (default: 25000) MCP_TIMEOUT: MCP server timeout in milliseconds Update Control DISABLE_AUTOUPDATER: Disable automatic updates Exit Codes 0: Success 1: General error 2: Permission denied or blocked operation Complete Examples CI/CD Code Review claude -p \"Review this PR for security issues\" \\ --allowedTools \"Read,Grep,Glob\" \\ --append-system-prompt \"Focus on OWASP Top 10 vulnerabilities\" \\ --output-format json \\ --max-turns 5 Automated Documentation claude -p \"Generate API documentation for src/\" \\ --allowedTools \"Read,Glob,Write\" \\ --json-schema-file docs-schema.json Structured Data Extraction claude -p \"Extract all function signatures from codebase\" \\ --allowedTools \"Read,Grep,Glob\" \\ --json-schema '{\"type\":\"array\",\"items\":{\"type\":\"object\",\"properties\":{\"name\":{\"type\":\"string\"},\"params\":{\"type\":\"array\"},\"returns\":{\"type\":\"string\"}}}}' Git Commit Message git diff --staged | claude -p \"Generate commit message\" \\ --allowedTools \"Read\" \\ --output-format text Multi-Agent Workflow claude -p \"Analyze and refactor this module\" \\ --agents '{ \"analyzer\": { \"description\": \"Code analyzer\", \"tools\": [\"Read\", \"Grep\"], \"model\": \"haiku\" }, \"refactorer\": { \"description\": \"Code refactorer\", \"tools\": [\"Read\", \"Write\", \"Edit\"], \"model\": \"sonnet\" } }' Best Practices Security Use --allowedTools to restrict capabilities Avoid --dangerously-skip-permissions in untrusted environments Validate input before passing to Claude Performance Use appropriate --max-turns for task complexity Consider haiku model for simple tasks Use --output-format json for programmatic parsing Debugging Use --setting-sources to troubleshoot configuration Check exit codes for error handling Use --output-format json for detailed response metadata Automation Always specify --allowedTools in scripts Use --output-format json for reliable parsing Handle errors with exit code checks Log session IDs for debugging"},{"id":".claude/skills/foundation-cc/reference/claude-code-custom-slash-commands-official.md","title":"Claude Code Custom Slash Commands - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-custom-slash-commands-official.md","desc":"","html":"<h1 id=\"claude-code-custom-slash-commands-official-documentation-reference\">Claude Code Custom Slash Commands - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/slash-commands#custom-slash-commands<\/p>\n<h2 id=\"key-concepts\">Key Concepts<\/h2>\n<h3 id=\"what-are-custom-slash-commands\">What are Custom Slash Commands?<\/h3>\n<p>Custom slash commands are user-defined commands that extend Claude Code's functionality with specialized workflows, automations, and integrations. They follow a specific file structure and syntax, enabling powerful command→agent→skill orchestration patterns.<\/p>\n<h3 id=\"command-architecture\">Command Architecture<\/h3>\n<p>Command Execution Flow:<\/p>\n<pre><code>User Input → Command File → Parameter Parsing → Agent Delegation → Skill Execution<\/code><\/pre>\n<p>Command Components:<\/p>\n<ol><li>Command File: Markdown file with frontmatter and implementation<\/li><li>Parameter System: Argument parsing and validation<\/li><li>Agent Orchestration: Multi-agent workflow coordination<\/li><li>Skill Integration: Specialized knowledge and capabilities<\/li><li>Result Processing: Output formatting and user feedback<\/li><\/ol>\n<h2 id=\"command-file-structure\">Command File Structure<\/h2>\n<h3 id=\"storage-locations\">Storage Locations<\/h3>\n<p>Command Directory Priority:<\/p>\n<ol><li>Personal Commands: <code>~/.claude/commands/<\/code> (highest priority)<\/li><li>Project Commands: <code>.claude/commands/<\/code> (team-shared)<\/li><li>Plugin Commands: Bundled with installed packages (lowest priority)<\/li><\/ol>\n<p>Directory Structure:<\/p>\n<pre><code>.claude/commands/\n category1/\n my-command.md\n related-command.md\n category2/\n specialized-command.md\n README.md # Command index and documentation<\/code><\/pre>\n<h3 id=\"command-naming-convention\">Command Naming Convention<\/h3>\n<p>IMPORTANT: Command name is automatically derived from file path structure:<\/p>\n<ul><li><code>.claude/commands/{namespace}/{command-name}.md<\/code> → <code>/{namespace}:{command-name}<\/code><\/li><li><code>.claude/commands/my-command.md<\/code> → <code>/my-command<\/code><\/li><li>Example: <code>.claude/commandsthe machine/fix.md<\/code> → <code>the machine:fix<\/code><\/li><\/ul>\n<p>DO NOT include a <code>name<\/code> field in frontmatter - it is not officially supported.<\/p>\n<h3 id=\"command-file-format\">Command File Format<\/h3>\n<p>Official Frontmatter Fields (per Claude Code documentation):<\/p>\n<pre><code class=\"language-markdown\">---\ndescription: Brief description of what the command does\nargument-hint: [action] [target] [options]\nallowed-tools: Bash, Read, Write\nmodel: haiku\n---<\/code><\/pre>\n<p>Supported Frontmatter Fields:<\/p>\n<ul><li><code>description<\/code> - Command description shown in /help (recommended)<\/li><li><code>argument-hint<\/code> - Argument syntax hint for autocomplete<\/li><li><code>allowed-tools<\/code> - Tools this command can invoke<\/li><li><code>model<\/code> - Override default model (haiku, sonnet, opus)<\/li><li><code>hooks<\/code> - Hook definitions for command execution<\/li><li><code>disable-model-invocation<\/code> - Prevent Skill tool invocation<\/li><\/ul>\n<p>All frontmatter options are optional; commands work without frontmatter.<\/p>\n<p>Complete Command Template:<\/p>\n<pre><code class=\"language-`markdown\">---\ndescription: Brief description of what the command does and when to use it\nargument-hint: [action] [target] [options]\nallowed-tools: Bash(git add:*), Bash(git status:*), Read, Write\nmodel: haiku\n---\n\n# Command Implementation\n\n## Quick Reference\n\nPurpose: One-line summary of command purpose\nUsage: `/my-command &lt;action&gt; &lt;target&gt; [options]`\nExamples: 2-3 common usage patterns\n\n## Implementation\n\n### Phase 1: Input Validation\n<\/code><\/pre>\n<h1 id=\"validate-required-parameters\">Validate required parameters<\/h1>\n<p>if [ -z \"$1\" ]; then echo \"Error: Action parameter is required\" echo \"Usage: /my-command &lt;action&gt; &lt;target&gt; [options]\" exit 1 fi<\/p>\n<pre><code><\/code><\/pre>\n<h3 id=\"phase-2-agent-delegation\">Phase 2: Agent Delegation<\/h3>\n<pre><code class=\"language-python\"># Delegate to appropriate agents\naction=&quot;$1&quot;\ntarget=&quot;$2&quot;\n\ncase &quot;$action&quot; in\n &quot;create&quot;)\n Agent(\n subagent_type=&quot;manager-spec&quot;,\n prompt=&quot;Create specification for $target&quot;,\n context={&quot;user_input&quot;: &quot;$ARGUMENTS&quot;}\n )\n ;;\n &quot;validate&quot;)\n Agent(\n subagent_type=&quot;manager-quality&quot;,\n prompt=&quot;Validate configuration in $target&quot;,\n context={&quot;config_file&quot;: &quot;$target&quot;}\n )\n ;;\nesac<\/code><\/pre>\n<h3 id=\"phase-3-result-processing\">Phase 3: Result Processing<\/h3>\n<pre><code class=\"language-python\"># Process agent results and format output\nresults = await Promise.all(agent_tasks)\n\n# Format results for user\nformatted_output = format_command_output(results, action)\n\n# Provide user feedback\necho &quot;Command completed successfully&quot;\necho &quot;Results: $formatted_output&quot;<\/code><\/pre>\n<pre><code class=\"language-`\">\n## Parameter System\n\n### Parameter Types\n\nString Parameters:<\/code><\/pre>\n<p>parameters:<\/p>\n<ul><li>name: feature_name<\/li><\/ul>\n<p>description: Name of the feature to implement required: true type: string validation: pattern: \"^[a-z][a-z0-9-]*$\" minLength: 3 maxLength: 50<\/p>\n<pre><code class=\"language-`\">\nFile Reference Parameters:\n<\/code><\/pre>\n<p>parameters:<\/p>\n<ul><li>name: config_file<\/li><\/ul>\n<p>description: Configuration file to process required: false type: string allowFileReference: true validation: fileExists: true fileExtensions: [\".yaml\", \".json\", \".toml\"]<\/p>\n<pre><code>\nBoolean Parameters:\n<\/code><\/pre>\n<p>parameters:<\/p>\n<ul><li>name: verbose<\/li><\/ul>\n<p>description: Enable verbose output required: false type: boolean default: false shortFlag: \"-v\" longFlag: \"--verbose\"<\/p>\n<pre><code>\nChoice Parameters:\n<\/code><\/pre>\n<p>parameters:<\/p>\n<ul><li>name: environment<\/li><\/ul>\n<p>description: Target environment required: false type: string values: [development, staging, production] default: development<\/p>\n<pre><code>\nObject Parameters:\n<\/code><\/pre>\n<p>parameters:<\/p>\n<ul><li>name: options<\/li><\/ul>\n<p>description: Additional options object required: false type: object properties: timeout: type: number default: 300 retries: type: number default: 3 additionalProperties: true<\/p>\n<pre><code>\n### Parameter Access Patterns\n\nPositional Arguments:\n<\/code><\/pre>\n<h1 id=\"1-2-3-for-positional-arguments\">$1, $2, $3... for positional arguments<\/h1>\n<p>action=\"$1\" # First argument target=\"$2\" # Second argument options=\"$3\" # Third argument<\/p>\n<h1 id=\"all-arguments-as-single-string\">All arguments as single string<\/h1>\n<p>all_args=\"$ARGUMENTS\"<\/p>\n<pre><code>\nNamed Arguments:\n<\/code><\/pre>\n<h1 id=\"parse-named-arguments-using-getopts\">Parse named arguments using getopts<\/h1>\n<p>while getopts \":f:t:v\" opt; do case $opt in f) file=\"$OPTARG\" ;; t) timeout=\"$OPTARG\" ;; v) verbose=true ;; esac done<\/p>\n<pre><code>\nFile References:\n<\/code><\/pre>\n<h1 id=\"file-reference-handling-with-prefix\">File reference handling with @ prefix<\/h1>\n<p>if [[ \"$target\" == @* ]]; then file_path=\"${target#@}\" if [ -f \"$file_path\" ]; then file_content=$(cat \"$file_path\") else echo \"Error: File not found: $file_path\" exit 1 fi fi<\/p>\n<pre><code>\n## Agent Orchestration Patterns\n\n### Sequential Agent Workflow\n\nLinear Execution Pattern:\n<\/code><\/pre>\n<h1 id=\"phase-1-analysis\">Phase 1: Analysis<\/h1>\n<p>analysis = Agent( subagent_type=\"manager-spec\", prompt=\"Analyze requirements for $ARGUMENTS\", context={\"user_input\": \"$ARGUMENTS\"} )<\/p>\n<h1 id=\"phase-2-implementation-passes-analysis-results\">Phase 2: Implementation (passes analysis results)<\/h1>\n<p>implementation = Agent( subagent_type=\"manager-ddd\", prompt=\"Implement based on analysis\", context={\"analysis\": analysis, \"spec_id\": analysis.spec_id} )<\/p>\n<h1 id=\"phase-3-quality-validation\">Phase 3: Quality Validation<\/h1>\n<p>validation = Agent( subagent_type=\"manager-quality\", prompt=\"Validate implementation\", context={\"implementation\": implementation} )<\/p>\n<pre><code>\n### Parallel Agent Workflow\n\nConcurrent Execution Pattern:\n<\/code><\/pre>\n<h1 id=\"independent-parallel-execution\">Independent parallel execution<\/h1>\n<p>results = await Promise.all([ Agent( subagent_type=\"expert-backend\", prompt=\"Backend implementation for $1\" ), Agent( subagent_type=\"expert-frontend\", prompt=\"Frontend implementation for $1\" ), Agent( subagent_type=\"docs-manager\", prompt=\"Documentation for $1\" ) ])<\/p>\n<h1 id=\"integration-phase\">Integration phase<\/h1>\n<p>integration = Agent( subagent_type=\"manager-quality\", prompt=\"Integrate all components\", context={\"components\": results} )<\/p>\n<pre><code>\n### Conditional Agent Workflow\n\nDynamic Agent Selection:\n<\/code><\/pre>\n<h1 id=\"route-bas
