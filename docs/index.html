<style>
:root{
  --bg0h:#1d2021; --bg0:#282828; --bg1:#3c3836; --bg2:#504945; --bg3:#665c54;
  --fg:#ebdbb2; --fg2:#d5c4a1; --fg4:#a89984; --gray:#928374;

  --purple:#d3869b; --aqua:#8ec07c; --orange:#fe8019;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg0h); color:var(--fg);
  font:15px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  display:grid; grid-template-columns:300px 1fr; height:100vh; overflow:hidden;
}
aside{
  background:var(--bg0); border-right:1px solid var(--bg2);
  display:flex; flex-direction:column; min-height:0;
}
.brand{padding:16px 18px 12px;border-bottom:1px solid var(--bg2)}
.brand h1{margin:0;font-size:16px;color:var(--yellow);letter-spacing:.3px}
.brand .sub{font-size:11px;color:var(--gray);margin-top:3px}
.searchwrap{padding:12px 14px;border-bottom:1px solid var(--bg2)}
#q{
  width:100%;padding:9px 11px;background:var(--bg0h);color:var(--fg);
  border:1px solid var(--bg3);border-radius:7px;outline:none;font-size:13px;
}
#q:focus{border-color:var(--yellow)}
.hint{font-size:10.5px;color:var(--gray);margin-top:6px}
nav{overflow-y:auto;padding:8px 0 24px;flex:1;min-height:0}
.cat{padding:12px 18px 4px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange)}
a.item{
  display:block;padding:5px 18px;color:var(--fg2);text-decoration:none;
  font-size:13px;border-left:2px solid transparent;cursor:pointer;
}
a.item:hover{background:var(--bg1);color:var(--fg)}
a.item.active{background:var(--bg1);border-left-color:var(--yellow);color:var(--yellow)}
a.item .d{display:block;font-size:10.5px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
a.item mark{background:var(--yellow);color:var(--bg0h);border-radius:2px}
main{overflow-y:auto;padding:0;min-height:0}
.doc{max-width:860px;margin:0 auto;padding:38px 48px 120px}
.crumb{font-size:11.5px;color:var(--gray);margin-bottom:6px;font-family:ui-monospace,monospace}
.doc h1,.doc h2,.doc h3,.doc h4{color:var(--yellow);line-height:1.25;margin:1.5em 0 .5em}
.doc h1{font-size:1.9em;margin-top:.2em;border-bottom:1px solid var(--bg2);padding-bottom:.3em}
.doc h2{font-size:1.4em;color:var(--aqua)}
.doc h3{font-size:1.15em;color:var(--blue)}
.doc h4{font-size:1em;color:var(--fg2)}
.doc a{color:var(--blue)}
.doc code{background:var(--bg1);color:var(--orange);padding:1.5px 5px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.88em}
.doc pre{background:var(--bg0);border:1px solid var(--bg2);border-radius:8px;padding:14px 16px;overflow-x:auto}
.doc pre code{background:none;color:var(--fg);padding:0;font-size:.85em;line-height:1.55}
.doc blockquote{border-left:3px solid var(--bg3);margin:1em 0;padding:.2em 1em;color:var(--fg4);background:var(--bg0)}
.doc table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9em}
.doc th,.doc td{border:1px solid var(--bg2);padding:7px 11px;text-align:left}
.doc th{background:var(--bg1);color:var(--yellow)}
.doc tr:nth-child(even) td{background:var(--bg0)}
.doc ul,.doc ol{padding-left:1.5em}
.doc li{margin:.2em 0}
.doc hr{border:none;border-top:1px solid var(--bg2);margin:1.6em 0}
.doc img{max-width:100%}
.empty{color:var(--gray);text-align:center;margin-top:80px;font-size:14px}
.results-mode .cat{display:none}
mark.hit{background:var(--yellow);color:var(--bg0h)}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:6px;border:2px solid var(--bg0)}
::-webkit-scrollbar-track{background:transparent}

const DOCS = [{"id":"README.md","title":"Dotfiles","category":"Guide","path":"README.md","desc":"","html":"<h1 id=\"dotfiles\">Dotfiles<\/h1>\n<p>A Linux dev environment — native, inside WSL on Windows, or on macOS — managed with <a href=\"https://chezmoi.io\">chezmoi<\/a>. One command installs the tools and writes every config into place.<\/p>\n<h2 id=\"components\">Components<\/h2>\n<ul><li><strong>WezTerm<\/strong> — terminal (plain host; no multiplexing)<\/li><li><strong>burrito<\/strong> — multiplexer (daemon-backed sessions, 9×9 grid navigation, tool overlays); auto-starts in the shell<\/li><li><strong>Nushell<\/strong> — shell<\/li><li><strong>Neovim<\/strong> — editor (Lua, lazy.nvim, LSP, Treesitter, Telescope)<\/li><li><strong>Starship<\/strong> — prompt<\/li><li><strong>Git<\/strong> — git + delta + lazygit + gh<\/li><li><strong>pass<\/strong> — password manager (GPG-backed <code>password-store<\/code>), with Nushell completion for subcommands and entry names. One-time setup below<\/li><li><strong>CLI core<\/strong> — ripgrep, fd, fzf, bat, zoxide, jq<\/li><li><strong>Television<\/strong> — fuzzy finder (<code>tv<\/code>); interactive shell finder (Ctrl-R history, Ctrl-T autocomplete) and the <code>ff<\/code>/<code>fcd<\/code>/<code>fg<\/code> helpers<\/li><li><strong>Theme<\/strong> — Gruvbox Dark Hard, live-switchable via <a href=\"https://github.com/tinted-theming/tinty\">tinty<\/a> (base16). The terminal palette and Neovim follow your pick; ANSI-aware tools (Starship, lazygit, delta) ride the terminal palette; bat, Television, and WezTerm ship the gruvbox theme themselves. Switch live with <strong><code>theme<\/code><\/strong> (see below)<\/li><\/ul>\n<p>Run from a normal (non-admin) shell in your home directory.<\/p>\n<h2 id=\"install\">Install<\/h2>\n<p>One command. It installs chezmoi, then pulls and applies the dotfiles. Run it on <strong>Linux, WSL, or macOS<\/strong>:<\/p>\n<pre><code class=\"language-sh\">sh -c &quot;$(curl -fsLS get.chezmoi.io)&quot; -- -b &quot;$HOME/.local/bin&quot; init --apply yesitsfebreeze/.files<\/code><\/pre>\n<p>Already have chezmoi? Just <code>chezmoi init --apply yesitsfebreeze/.files<\/code>.<\/p>\n<blockquote><p><strong>Linux requirement:<\/strong> the Claude CLI needs <code>bubblewrap<\/code> (<code>bwrap<\/code>) for subprocess sandboxing. It is installed automatically with the package set; on macOS the built-in Seatbelt sandbox is used instead, so no extra package.<\/p><\/blockquote>\n<blockquote><p><strong>Windows:<\/strong> there is no native Windows setup. Install WezTerm on Windows, then run the command above inside WSL Ubuntu (<code>wsl -d Ubuntu<\/code>). WezTerm boots straight into that WSL session, so everything you use lives in Linux.<\/p><\/blockquote>\n<h2 id=\"commands\">Commands<\/h2>\n<pre><code class=\"language-sh\">chezmoi update    # pull latest + re-apply\nchezmoi apply     # re-apply current source\nchezmoi diff      # preview pending changes\nchezmoi cd        # enter source dir (exit returns)<\/code><\/pre>\n<h2 id=\"theme-switcher\">Theme switcher<\/h2>\n<p>Each tool ships the Gruvbox Dark Hard default — builtin themes (bat, Television, WezTerm) or ANSI colors that ride the terminal palette (Starship, lazygit, delta). To change theme live, without editing files:<\/p>\n<pre><code class=\"language-sh\">theme             # fuzzy-pick from tinty&#x27;s official base16/base24 catalog<\/code><\/pre>\n<p>Scroll to preview each theme (terminal + shell retint via <a href=\"https://github.com/tinted-theming/tinty\">tinty<\/a> OSC sequences); <strong>Enter<\/strong> applies and persists it into new shells, <strong>Esc<\/strong> reverts to where you started. The picker lists tinty's prebuilt tinted-shell schemes (~314 base16 + ~187 base24), so every entry applies cleanly; the live pick is runtime state, layered on top of each tool's gruvbox default.<\/p>\n<p>Known limit: inside burrito, live palette passthrough to WezTerm depends on the multiplexer (the OSC retint may be intercepted by the mux before WezTerm sees it).<\/p>\n<h2 id=\"password-manager\">Password manager<\/h2>\n<p><a href=\"https://www.passwordstore.org/\"><code>pass<\/code><\/a> stores each secret as a GPG-encrypted file under <code>~/.password-store<\/code>. Installing the tool does <strong>not<\/strong> create the store — that is a one-time step tied to your GPG key, so <code>chezmoi apply<\/code> prints a reminder pointing here until it is done. The store itself is private and lives in your home dir; it is never tracked by these dotfiles.<\/p>\n<p>Set it up once per machine:<\/p>\n<pre><code class=\"language-sh\"># 1. Need a GPG key? Create one (skip if `gpg --list-secret-keys` already lists one).\ngpg --full-generate-key\n\n# 2. Find the key&#x27;s id (or use the email you gave it).\ngpg --list-secret-keys --keyid-format=long\n\n# 3. Initialise the store for that key. This writes ~/.password-store/.gpg-id.\npass init &lt;gpg-id-or-email&gt;\n\n# 4. (Optional) version the store with git, then add your own private remote.\npass git init<\/code><\/pre>\n<p>Daily use:<\/p>\n<pre><code class=\"language-sh\">pass insert email/personal     # add a secret (prompts; nested paths allowed)\npass generate email/personal 24  # create a random 24-char password\npass                           # list the store as a tree\npass show email/personal       # print a secret\npass -c email/personal         # copy it to the clipboard (clears after ~45s)\npass edit email/personal       # edit in $EDITOR\npass rm email/personal         # remove<\/code><\/pre>\n<p><code>PASSWORD_STORE_DIR<\/code> is pinned to the default in <code>env.nu<\/code>; change it there to relocate the store. Nushell tab-completion offers the subcommands and your live entry names (sourced from <code>pass.nu<\/code>).<\/p>\n<h2 id=\"develop\">Develop<\/h2>\n<pre><code class=\"language-sh\">git clone https://github.com/yesitsfebreeze/.files\nchezmoi execute-template &lt; home/&lt;file&gt;.tmpl   # render a template to check it\nchezmoi apply --source &lt;path-to-checkout&gt;     # apply local WIP without pushing\ngit commit -am &quot;...&quot; &amp;&amp; git push              # push; machines pick it up on update<\/code><\/pre>\n<p>Add/remove tools by editing <code>home/.chezmoidata/packages.yaml<\/code>; the next <code>chezmoi apply<\/code> installs the difference.<\/p>\n<h2 id=\"keys\">Keys<\/h2>\n<p>burrito leader <code>Ctrl-Space<\/code> (tap twice for the grid navigator), Neovim leader <code>Space<\/code>. WezTerm itself is a plain host — only clipboard shortcuts (<code>Ctrl-V<\/code> paste, <code>Ctrl-C<\/code> smart copy/interrupt), no leader. Full keymaps in <code>home/dot_config/burrito/config.toml<\/code> and <code>home/dot_config/nvim/<\/code>.<\/p>","text":"Dotfiles A Linux dev environment — native, inside WSL on Windows, or on macOS — managed with chezmoi . One command installs the tools and writes every config into place. Components WezTerm — terminal (plain host; no multiplexing) burrito — multiplexer (daemon-backed sessions, 9×9 grid navigation, tool overlays); auto-starts in the shell Nushell — shell Neovim — editor (Lua, lazy.nvim, LSP, Treesitter, Telescope) Starship — prompt Git — git + delta + lazygit + gh pass — password manager (GPG-backed password-store ), with Nushell completion for subcommands and entry names. One-time setup below CLI core — ripgrep, fd, fzf, bat, zoxide, jq Television — fuzzy finder ( tv ); interactive shell finder (Ctrl-R history, Ctrl-T autocomplete) and the ff / fcd / fg helpers Theme — Gruvbox Dark Hard, live-switchable via tinty (base16). The terminal palette and Neovim follow your pick; ANSI-aware tools (Starship, lazygit, delta) ride the terminal palette; bat, Television, and WezTerm ship the gruvbox theme themselves. Switch live with theme (see below) Run from a normal (non-admin) shell in your home directory. Install One command. It installs chezmoi, then pulls and applies the dotfiles. Run it on Linux, WSL, or macOS : sh -c \"$(curl -fsLS get.chezmoi.io)\" -- -b \"$HOME/.local/bin\" init --apply yesitsfebreeze/.files Already have chezmoi? Just chezmoi init --apply yesitsfebreeze/.files . Linux requirement: the Claude CLI needs bubblewrap ( bwrap ) for subprocess sandboxing. It is installed automatically with the package set; on macOS the built-in Seatbelt sandbox is used instead, so no extra package. Windows: there is no native Windows setup. Install WezTerm on Windows, then run the command above inside WSL Ubuntu ( wsl -d Ubuntu ). WezTerm boots straight into that WSL session, so everything you use lives in Linux. Commands chezmoi update # pull latest + re-apply chezmoi apply # re-apply current source chezmoi diff # preview pending changes chezmoi cd # enter source dir (exit returns) Theme switcher Each tool ships the Gruvbox Dark Hard default — builtin themes (bat, Television, WezTerm) or ANSI colors that ride the terminal palette (Starship, lazygit, delta). To change theme live, without editing files: theme # fuzzy-pick from tinty's official base16/base24 catalog Scroll to preview each theme (terminal + shell retint via tinty OSC sequences); Enter applies and persists it into new shells, Esc reverts to where you started. The picker lists tinty's prebuilt tinted-shell schemes (~314 base16 + ~187 base24), so every entry applies cleanly; the live pick is runtime state, layered on top of each tool's gruvbox default. Known limit: inside burrito, live palette passthrough to WezTerm depends on the multiplexer (the OSC retint may be intercepted by the mux before WezTerm sees it). Password manager pass stores each secret as a GPG-encrypted file under ~/.password-store . Installing the tool does not create the store — that is a one-time step tied to your GPG key, so chezmoi apply prints a reminder pointing here until it is done. The store itself is private and lives in your home dir; it is never tracked by these dotfiles. Set it up once per machine: # 1. Need a GPG key? Create one (skip if `gpg --list-secret-keys` already lists one). gpg --full-generate-key # 2. Find the key's id (or use the email you gave it). gpg --list-secret-keys --keyid-format=long # 3. Initialise the store for that key. This writes ~/.password-store/.gpg-id. pass init <gpg-id-or-email> # 4. (Optional) version the store with git, then add your own private remote. pass git init Daily use: pass insert email/personal # add a secret (prompts; nested paths allowed) pass generate email/personal 24 # create a random 24-char password pass # list the store as a tree pass show email/personal # print a secret pass -c email/personal # copy it to the clipboard (clears after ~45s) pass edit email/personal # edit in $EDITOR pass rm email/personal # remove PASSWORD_STORE_DIR is pinned to the default in env.nu ; change it there to relocate the store. Nushell tab-completion offers the subcommands and your live entry names (sourced from pass.nu ). Develop git clone https://github.com/yesitsfebreeze/.files chezmoi execute-template < home/<file>.tmpl # render a template to check it chezmoi apply --source <path-to-checkout> # apply local WIP without pushing git commit -am \"...\" && git push # push; machines pick it up on update Add/remove tools by editing home/.chezmoidata/packages.yaml ; the next chezmoi apply installs the difference. Keys burrito leader Ctrl-Space (tap twice for the grid navigator), Neovim leader Space . WezTerm itself is a plain host — only clipboard shortcuts ( Ctrl-V paste, Ctrl-C smart copy/interrupt), no leader. Full keymaps in home/dot_config/burrito/config.toml and home/dot_config/nvim/ ."},{"id":"docs/concepts/finder.md","title":"finder — concept & design","category":"Concepts","path":"docs/concepts/finder.md","desc":"","html":"<h1 id=\"finder-concept-design\">finder — concept &amp; design<\/h1>\n<p><code>finder<\/code> is a composable, <strong>typed<\/strong> fuzzy finder for Nushell built on top of <code>tv<\/code> (television). It lives in <code>home/dot_config/nushell/finder.nu<\/code> and is sourced by <code>config.nu<\/code>. This document explains the model; the code comments cover the line-level mechanics, and <code>tests/nushell/finder-test.nu<\/code> pins the behaviour.<\/p>\n<h2 id=\"the-one-idea\">The one idea<\/h2>\n<p><strong>Don't hand-code pickers. Treat <code>tv<\/code>'s channels as data, and let Nushell orchestrate them into a typed pipeline.<\/strong><\/p>\n<p><code>tv<\/code> already ships dozens of channels (<code>files<\/code>, <code>text<\/code>, <code>git-log<\/code>, …), each a TOML prototype describing a source command. Rather than reimplement a fuzzy UI per search, finder:<\/p>\n<ol><li>lets you pick a channel by typing its unique prefix (autofires),<\/li><li>runs that channel through <code>tv<\/code> to get a selection,<\/li><li><strong>decodes the selection into real Nushell values<\/strong> typed by the channel, and<\/li><li>lets you <strong>pipe<\/strong> one channel's selection into the next, scoped automatically.<\/li><\/ol>\n<p>The payoff over raw <code>tv<\/code> is the last two: structured output you can pipe in nu, and typed chaining that only ever offers sensible next steps.<\/p>\n<h2 id=\"vocabulary\">Vocabulary<\/h2>\n<table><thead><tr><th>Term<\/th><th>Meaning<\/th><\/tr><\/thead><tbody><tr><td><strong>channel<\/strong><\/td><td>A <code>tv<\/code> source (<code>files<\/code>, <code>text<\/code>, <code>git-log<\/code>, …). The unit you pick.<\/td><\/tr><tr><td><strong>stage<\/strong><\/td><td>One committed step: <code>{ channel, results, produces }<\/code>.<\/td><\/tr><tr><td><strong>carry<\/strong><\/td><td>The stage flowing <em>into<\/em> the current pick — the upstream selection.<\/td><\/tr><tr><td><strong>chain<\/strong><\/td><td>The list of committed stages, newest last. Rendered as a breadcrumb.<\/td><\/tr><tr><td><strong>produces / accepts<\/strong><\/td><td>The type a channel emits, and the upstream types it can scope on.<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"the-type-graph\">The type graph<\/h2>\n<p>Only channels with a declared type can chain. The table (<code>_finder_type<\/code>):<\/p>\n<table><thead><tr><th>channel<\/th><th>produces<\/th><th>accepts (can scope on)<\/th><\/tr><\/thead><tbody><tr><td><code>files<\/code><\/td><td><code>FileList<\/code><\/td><td><code>DirList<\/code><\/td><\/tr><tr><td><code>dirs<\/code><\/td><td><code>DirList<\/code><\/td><td><code>DirList<\/code><\/td><\/tr><tr><td><code>text<\/code><\/td><td><code>GrepList<\/code><\/td><td><code>FileList<\/code>, <code>DirList<\/code><\/td><\/tr><tr><td><code>git-log<\/code><\/td><td><code>Commits<\/code><\/td><td><code>FileList<\/code><\/td><\/tr><\/tbody><\/table>\n<p>Anything else is <code>Any<\/code> with no accepts → it runs fresh and is a chain dead-end.<\/p>\n<p>A directed <strong>scope edge<\/strong> exists from carry → channel when the carry's <code>produces<\/code> is in the channel's <code>accepts<\/code>. <code>_finder_scope<\/code> turns an edge into a concrete, path-scoped source command (e.g. <code>files → text<\/code> becomes <code>rg … -- &#x27;&lt;paths&gt;&#x27;<\/code>). <code>_finder_compatible<\/code> derives the chainable channels <em>from the edges themselves<\/em>, so the picker list and the scoping can never drift apart.<\/p>\n<h2 id=\"the-flow\">The flow<\/h2>\n<pre><code>            ┌──────────────────────────────────────────────┐\n   pick ───▶│ _finder_pick_channel   (nu, prefix-autofire)  │\n            └───────────────┬──────────────────────────────┘\n                            ▼\n            ┌──────────────────────────────────────────────┐\n   run  ───▶│ _finder_run_channel    (tv, scoped by carry)  │\n            └───────────────┬──────────────────────────────┘\n                            ▼ confirm key + entries\n            ┌──────────────────────────────────────────────┐\n branch ───▶│ enter → commit &amp; finish                       │\n            │ ctrl-p → pipe: commit, re-pick (scoped)       │\n            │ ctrl-b → back: pop, re-run upstream           │\n            └───────────────┬──────────────────────────────┘\n                            ▼\n            ┌──────────────────────────────────────────────┐\n decode ───▶│ _finder_decode   (typed nu values out)        │\n            └──────────────────────────────────────────────┘<\/code><\/pre>\n<h3 id=\"pick-prefix-autofire\">Pick — prefix-autofire<\/h3>\n<p>The channel is chosen by <strong>typing its name's unique prefix<\/strong>, not a fuzzy multiselect. The instant exactly one channel still matches, it fires (<code>f<\/code> → <code>files<\/code>). A keystroke that would match nothing is rejected, so the buffer always resolves to ≥1 channel. On the first pick the candidates are <em>all<\/em> tv channels; on a chain pick they are only the channels the carry can flow into.<\/p>\n<h3 id=\"pipe-chaining-with-ctrl-p\">Pipe — chaining with <code>ctrl-p<\/code><\/h3>\n<p>Inside the result list, <code>ctrl-p<\/code> <strong>commits the current selection as a stage and re-opens the picker<\/strong>, now filtered to channels that accept this stage's type and scoped to its paths. So <code>files<\/code> → <code>ctrl-p<\/code> → <code>text<\/code> greps <em>only the files you selected<\/em>. <code>ctrl-b<\/code> steps back one stage. <code>enter<\/code> ends the chain. The whole input chain is shown as a breadcrumb (<code>files[3] &gt; text[1] &gt;<\/code>) in every header.<\/p>\n<h3 id=\"decode-the-payoff\">Decode — the payoff<\/h3>\n<p><code>_finder_decode<\/code> maps the final stage's raw lines into real values keyed by what the channel <code>produces<\/code>:<\/p>\n<table><thead><tr><th>produces<\/th><th>decoded value<\/th><\/tr><\/thead><tbody><tr><td><code>FileList<\/code> / <code>DirList<\/code><\/td><td><code>list&lt;string&gt;<\/code> of expanded, existing paths<\/td><\/tr><tr><td><code>GrepList<\/code><\/td><td><code>list&lt;{ file, line, text }&gt;<\/code> (split on the first two colons; text keeps the rest)<\/td><\/tr><tr><td><code>Commits<\/code><\/td><td><code>list&lt;{ hash, subject }&gt;<\/code> (graph-art rows dropped)<\/td><\/tr><tr><td>anything else<\/td><td>the raw lines<\/td><\/tr><\/tbody><\/table>\n<p>This is what makes finder <em>composable in nu<\/em>: <code>finder | each { … }<\/code> gets typed records, not strings to re-parse.<\/p>\n<h2 id=\"persistence-resume\">Persistence &amp; resume<\/h2>\n<p>A committed chain is saved as versioned NUON under <code>$XDG_STATE_HOME/finder/<\/code>. <code>finder --resume<\/code> re-enters the saved chain — it re-runs the last channel scoped by the stage below it, dropping you back <em>into<\/em> that search rather than just reprinting its result (tv cannot restore a live query, so \"resume\" means \"re-open that channel with the same scope\").<\/p>\n<h2 id=\"hard-constraints-tv-0-15-8\">Hard constraints (tv 0.15.8)<\/h2>\n<ul><li>Capture tv's stdout <strong>directly<\/strong>, never <code>| complete<\/code> — <code>complete<\/code> also grabs stderr, detaching tv's controlling terminal (it then panics, os error 6).<\/li><li><code>--keybindings<\/code> uses <code>key=&quot;action&quot;<\/code>; <code>--expect<\/code> takes a <strong>semicolon<\/strong>-separated key list. The pipe/back keys are <code>ctrl-p<\/code> / <code>ctrl-b<\/code>.<\/li><li>Scoped paths are <strong>POSIX single-quoted<\/strong> before splicing into a source command (tv runs it through a POSIX shell on Linux/WSL2/macOS).<\/li><li>finder is <strong>interactive-only<\/strong> — it drives a TUI and must not be called non-interactively.<\/li><\/ul>\n<h2 id=\"extending\">Extending<\/h2>\n<ul><li><strong>Add a typed, chainable channel:<\/strong> add a row to <code>_finder_type<\/code> (its <code>produces<\/code><ul><li><code>accepts<\/code>) and a scope arm to <code>_finder_scope<\/code>. <code>_finder_compatible<\/code> and the<\/li><\/ul>picker pick it up automatically.<\/li><li><strong>Add a decode shape:<\/strong> add a <code>produces<\/code> arm to <code>_finder_decode<\/code>.<\/li><\/ul>\n<h2 id=\"testing\">Testing<\/h2>\n<p>Pure functions (<code>_finder_decode<\/code>, <code>_finder_scope<\/code>, <code>_finder_type<\/code>, <code>_finder_compatible<\/code>, <code>_finder_shquote*<\/code>, <code>_finder_breadcrumb<\/code>, <code>_finder_mk_stage<\/code>) are covered headless in <code>tests/nushell/finder-test.nu<\/code> — run <code>just test<\/code>. The interactive layer (tv, <code>input listen<\/code>, the prefix overlay render) needs a tty and is verified by hand.<\/p>","text":"finder — concept & design finder is a composable, typed fuzzy finder for Nushell built on top of tv (television). It lives in home/dot_config/nushell/finder.nu and is sourced by config.nu . This document explains the model; the code comments cover the line-level mechanics, and tests/nushell/finder-test.nu pins the behaviour. The one idea Don't hand-code pickers. Treat tv 's channels as data, and let Nushell orchestrate them into a typed pipeline. tv already ships dozens of channels ( files , text , git-log , …), each a TOML prototype describing a source command. Rather than reimplement a fuzzy UI per search, finder: lets you pick a channel by typing its unique prefix (autofires), runs that channel through tv to get a selection, decodes the selection into real Nushell values typed by the channel, and lets you pipe one channel's selection into the next, scoped automatically. The payoff over raw tv is the last two: structured output you can pipe in nu, and typed chaining that only ever offers sensible next steps. Vocabulary Term Meaning channel A tv source ( files , text , git-log , …). The unit you pick. stage One committed step: { channel, results, produces } . carry The stage flowing into the current pick — the upstream selection. chain The list of committed stages, newest last. Rendered as a breadcrumb. produces / accepts The type a channel emits, and the upstream types it can scope on. The type graph Only channels with a declared type can chain. The table ( _finder_type ): channel produces accepts (can scope on) files FileList DirList dirs DirList DirList text GrepList FileList , DirList git-log Commits FileList Anything else is Any with no accepts → it runs fresh and is a chain dead-end. A directed scope edge exists from carry → channel when the carry's produces is in the channel's accepts . _finder_scope turns an edge into a concrete, path-scoped source command (e.g. files → text becomes rg … -- '<paths>' ). _finder_compatible derives the chainable channels from the edges themselves , so the picker list and the scoping can never drift apart. The flow ┌──────────────────────────────────────────────┐ pick ───▶│ _finder_pick_channel (nu, prefix-autofire) │ └───────────────┬──────────────────────────────┘ ▼ ┌──────────────────────────────────────────────┐ run ───▶│ _finder_run_channel (tv, scoped by carry) │ └───────────────┬──────────────────────────────┘ ▼ confirm key + entries ┌──────────────────────────────────────────────┐ branch ───▶│ enter → commit & finish │ │ ctrl-p → pipe: commit, re-pick (scoped) │ │ ctrl-b → back: pop, re-run upstream │ └───────────────┬──────────────────────────────┘ ▼ ┌──────────────────────────────────────────────┐ decode ───▶│ _finder_decode (typed nu values out) │ └──────────────────────────────────────────────┘ Pick — prefix-autofire The channel is chosen by typing its name's unique prefix , not a fuzzy multiselect. The instant exactly one channel still matches, it fires ( f → files ). A keystroke that would match nothing is rejected, so the buffer always resolves to ≥1 channel. On the first pick the candidates are all tv channels; on a chain pick they are only the channels the carry can flow into. Pipe — chaining with ctrl-p Inside the result list, ctrl-p commits the current selection as a stage and re-opens the picker , now filtered to channels that accept this stage's type and scoped to its paths. So files → ctrl-p → text greps only the files you selected . ctrl-b steps back one stage. enter ends the chain. The whole input chain is shown as a breadcrumb ( files[3] > text[1] > ) in every header. Decode — the payoff _finder_decode maps the final stage's raw lines into real values keyed by what the channel produces : produces decoded value FileList / DirList list<string> of expanded, existing paths GrepList list<{ file, line, text }> (split on the first two colons; text keeps the rest) Commits list<{ hash, subject }> (graph-art rows dropped) anything else the raw lines This is what makes finder composable in nu : finder | each { … } gets typed records, not strings to re-parse. Persistence & resume A committed chain is saved as versioned NUON under $XDG_STATE_HOME/finder/ . finder --resume re-enters the saved chain — it re-runs the last channel scoped by the stage below it, dropping you back into that search rather than just reprinting its result (tv cannot restore a live query, so \"resume\" means \"re-open that channel with the same scope\"). Hard constraints (tv 0.15.8) Capture tv's stdout directly , never | complete — complete also grabs stderr, detaching tv's controlling terminal (it then panics, os error 6). --keybindings uses key=\"action\" ; --expect takes a semicolon -separated key list. The pipe/back keys are ctrl-p / ctrl-b . Scoped paths are POSIX single-quoted before splicing into a source command (tv runs it through a POSIX shell on Linux/WSL2/macOS). finder is interactive-only — it drives a TUI and must not be called non-interactively. Extending Add a typed, chainable channel: add a row to _finder_type (its produces accepts ) and a scope arm to _finder_scope . _finder_compatible and the picker pick it up automatically. Add a decode shape: add a produces arm to _finder_decode . Testing Pure functions ( _finder_decode , _finder_scope , _finder_type , _finder_compatible , _finder_shquote* , _finder_breadcrumb , _finder_mk_stage ) are covered headless in tests/nushell/finder-test.nu — run just test . The interactive layer (tv, input listen , the prefix overlay render) needs a tty and is verified by hand."}];
const N = 2, CATS = 2;
const nav = document.getElementById('nav');
const content = document.getElementById('content');
const q = document.getElementById('q');
document.getElementById('stat').textContent = N + ' documents · ' + CATS + ' sections';

let active = null;
let filtered = DOCS.slice();
let sel = -1;

function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function highlight(text, terms){
  let out = esc(text);
  for(const t of terms){
    if(!t) continue;
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    out = out.replace(re,'<mark>$1</mark>');
  }
  return out;
}

function score(doc, terms){
  const hay = (doc.title+' '+doc.desc+' '+doc.text).toLowerCase();
  let s = 0;
  for(const t of terms){
    if(!t) continue;
    if(doc.title.toLowerCase().includes(t)) s += 50;
    if(doc.desc.toLowerCase().includes(t)) s += 20;
    const m = hay.split(t).length - 1;
    if(m===0) return -1; // every term must appear
    s += Math.min(m,8);
  }
  return s;
}

function snippet(doc, terms){
  const text = doc.text;
  const low = text.toLowerCase();
  let idx = -1;
  for(const t of terms){ const k=low.indexOf(t); if(k>=0 && (idx<0||k<idx)) idx=k; }
  if(idx<0) return doc.desc || text.slice(0,90);
  const start = Math.max(0, idx-40);
  return (start>0?'…':'') + text.slice(start, start+120) + '…';
}

function renderNav(){
  const terms = q.value.toLowerCase().split(/\s+/).filter(Boolean);
  let html = '';
  if(terms.length){
    nav.classList.add('results-mode');
    const scored = DOCS.map(d=>({d,s:score(d,terms)})).filter(x=>x.s>=0)
                       .sort((a,b)=>b.s-a.s);
    filtered = scored.map(x=>x.d);
    if(!filtered.length){
      nav.innerHTML = '<div class="cat" style="display:block;color:var(--gray)">No matches</div>';
      return;
    }
    for(const {d} of scored){
      html += `<a class="item" data-id="${esc(d.id)}">`
            + highlight(d.title, terms)
            + `<span class="d">`+highlight(snippet(d,terms),terms)+`</span></a>`;
    }
  } else {
    nav.classList.remove('results-mode');
    filtered = DOCS.slice();
    let cat = null;
    for(const d of DOCS){
      if(d.category!==cat){ cat=d.category; html += `<div class="cat">${esc(cat)}</div>`; }
      const sub = d.desc ? `<span class="d">${esc(d.desc)}</span>` : '';
      html += `<a class="item" data-id="${esc(d.id)}">${esc(d.title)}${sub}</a>`;
    }
  }
  nav.innerHTML = html;
  sel = -1;
  markActive();
}

function markActive(){
  for(const a of nav.querySelectorAll('a.item'))
    a.classList.toggle('active', a.dataset.id===active);
}

function open(id, push){
  const doc = DOCS.find(d=>d.id===id);
  if(!doc) return;
  active = id;
  const terms = q.value.toLowerCase().split(/\s+/).filter(Boolean);
  let body = doc.html;
  content.innerHTML = `<article class="doc"><div class="crumb">${esc(doc.category)} · ${esc(doc.path)}</div>${body}</article>`;
  content.parentElement.scrollTop = 0;
  markActive();
  if(push!==false) location.hash = encodeURIComponent(id);
  document.querySelector('aside').classList.remove('open');
}

nav.addEventListener('click', e=>{
  const a = e.target.closest('a.item');
  if(a){ e.preventDefault(); open(a.dataset.id); }
});

let t=null;
q.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(renderNav, 80); });

q.addEventListener('keydown', e=>{
  const items = [...nav.querySelectorAll('a.item')];
  if(e.key==='ArrowDown'){ e.preventDefault(); sel=Math.min(sel+1,items.length-1); items[sel]?.scrollIntoView({block:'nearest'}); items.forEach((it,i)=>it.classList.toggle('active',i===sel)); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); sel=Math.max(sel-1,0); items[sel]?.scrollIntoView({block:'nearest'}); items.forEach((it,i)=>it.classList.toggle('active',i===sel)); }
  else if(e.key==='Enter'){ e.preventDefault(); (items[sel]||items[0])?.click(); }
});

document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement!==q){ e.preventDefault(); q.focus(); q.select(); }
  if(e.key==='Escape' && document.activeElement===q){ q.value=''; renderNav(); }
});

window.addEventListener('hashchange', ()=>{
  const id = decodeURIComponent(location.hash.slice(1));
  if(id && id!==active) open(id, false);
});

renderNav();
const initial = decodeURIComponent(location.hash.slice(1));
open(DOCS.find(d=>d.id===initial) ? initial : DOCS[0].id, false);
</script>
</body>
</html>
