 marketplace add https://...<\/code><\/li><li>Local testing: <code>/plugin marketplace add ./path/to/marketplace<\/code><\/li><\/ul>\n<h2 id=\"security-best-practices\">Security Best Practices<\/h2>\n<h3 id=\"path-security\">Path Security<\/h3>\n<ul><li>Always use <code>${CLAUDE_PLUGIN_ROOT}<\/code> for plugin-relative paths<\/li><li>Never hardcode absolute paths<\/li><li>Validate all inputs in hook scripts<\/li><li>Prevent path traversal attacks<\/li><\/ul>\n<h3 id=\"permission-guidelines\">Permission Guidelines<\/h3>\n<ul><li>Apply least privilege for tool access<\/li><li>Limit agent permissions to required operations<\/li><li>Validate hook command inputs<\/li><li>Sanitize environment variables<\/li><\/ul>\n<h2 id=\"related-reference-files\">Related Reference Files<\/h2>\n<p>For comprehensive plugin ecosystem documentation, see:<\/p>\n<ul><li>claude-code-discover-plugins-official.md - Plugin discovery and installation guide<\/li><li>claude-code-plugin-marketplaces-official.md - Creating and hosting custom marketplaces<\/li><\/ul>","text":"Claude Code Plugins - Official Documentation Reference Source: https://code.claude.com/docs/en/plugins Related: https://code.claude.com/docs/en/plugins-reference Related: https://code.claude.com/docs/en/discover-plugins Related: https://code.claude.com/docs/en/plugin-marketplaces Updated: 2026-01-06 What are Claude Code Plugins? Plugins are reusable extensions that bundle Claude Code configurations for distribution across projects. Unlike standalone configurations in .claude/ directories, plugins can be installed via marketplaces, shared across teams, and version-controlled independently. Plugin vs Standalone Configuration Standalone Configuration ( .claude/ directory): Scope: Single project only Sharing: Manual copy or git submodules Updates: Manual synchronization Best for: Project-specific customizations Plugin Configuration: Scope: Reusable across multiple projects Sharing: Installable via marketplaces or git URLs Updates: Automatic or manual via plugin manager Best for: Team standards, reusable workflows, community tools Plugin Directory Structure A plugin is a directory with the following structure: my-plugin/ - .claude-plugin/ - plugin.json (ONLY file in this directory) - commands/ (slash commands, markdown files) - agents/ (custom sub-agents, markdown files) - skills/ (agent skills with SKILL.md) - hooks/ - hooks.json (hook definitions) - .mcp.json (MCP server configurations) - .lsp.json (LSP server configurations) - settings.json (plugin-specific settings, v2.1.49+) Critical Rule: Only plugin.json belongs in the .claude-plugin/ directory. All other components are at the plugin root level. Plugin Manifest (plugin.json) The plugin manifest defines metadata and component locations. Required Fields name: Unique identifier in kebab-case format Recommended Fields description: Shown in plugin manager and marketplaces version: Semantic versioning (MAJOR.MINOR.PATCH) author: Object with name field, optionally email and url homepage: URL to plugin documentation or landing page repository: Git URL for source code license: SPDX license identifier Optional Path Overrides commands: Path to commands directory (default: commands/) agents: Path to agents directory (default: agents/) skills: Path to skills directory (default: skills/) hooks: Path to hooks configuration mcpServers: Path to MCP server configuration lspServers: Path to LSP server configuration outputStyles: Path to output styles directory settings: Path to plugin settings file (v2.1.49+) Discovery Keywords keywords: Array of discovery tags for finding plugins in marketplaces Example: { \"keywords\": [\"deployment\", \"ci-cd\", \"automation\", \"devops\"] } Keywords help users discover plugins through search. Use relevant, descriptive terms that reflect the plugin's functionality and domain. Example Plugin Manifest { \"name\": \"my-team-plugin\", \"description\": \"Team development standards and workflows\", \"version\": \"1.0.0\", \"author\": { \"name\": \"Development Team\" }, \"homepage\": \"https://github.com/org/my-team-plugin\", \"repository\": \"https://github.com/org/my-team-plugin.git\", \"license\": \"MIT\", \"keywords\": [\"team-standards\", \"workflow\", \"development\"] } Plugin Components Commands Slash commands are markdown files in the commands/ directory: commands/ - review.md (becomes /my-plugin:review) - deploy/ - staging.md (becomes /my-plugin:deploy/staging) - production.md (becomes /my-plugin:deploy/production) Plugin commands use the namespace prefix pattern: /plugin-name:command-name Command File Structure: --- description: Command description for discovery --- Command instructions and prompt content. Arguments: $ARGUMENTS (all), $1, $2 (positional) File references: @path/to/file.md Frontmatter Fields: description (required): Command purpose for help display Argument Handling: $ARGUMENTS - All arguments as single string $1 , $2 , $3 - Individual positional arguments @file.md - File content injection Agents Custom sub-agents with markdown definitions: agents/ - code-reviewer.md - security-analyst.md Agent File Structure: --- name: my-agent description: Agent purpose and capabilities tools: Read, Write, Edit, Grep, Glob, Bash model: sonnet permissionMode: default skills: - skill-name-one - skill-name-two --- Agent system prompt and instructions. Frontmatter Fields: name (required): Agent identifier description: Agent purpose tools: Comma-separated tool list model: sonnet, opus, haiku, inherit permissionMode: default, bypassPermissions, plan, passthrough skills: Array of skill names to load Available Tools: Read, Write, Edit - File operations Grep, Glob - Search operations Bash - Command execution WebFetch, WebSearch - Web access Agent - Sub-agent delegation TodoWrite - Task management Skills Agent skills following the standard SKILL.md structure: skills/ - my-skill/ - SKILL.md - reference.md - examples.md Hooks Hook definitions in hooks/hooks.json: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Write\", \"hooks\": [ { \"type\": \"command\", \"command\": \"${CLAUDE_PLUGIN_ROOT}/scripts/validate.sh\" } ] } ] } } Use ${CLAUDE_PLUGIN_ROOT} for absolute paths within the plugin. Available Hook Events: PreToolUse, PostToolUse, PostToolUseFailure - Tool execution lifecycle PermissionRequest, UserPromptSubmit, Notification, Stop - User interaction SubagentStart, SubagentStop - Sub-agent lifecycle SessionStart, SessionEnd, PreCompact - Session lifecycle Hook Types: command: Execute bash command prompt: Send prompt to LLM agent: Invoke custom agent Matcher Patterns: Exact name (\"Write\"), wildcard (\"\\*\"), tool-specific filtering MCP Servers MCP server configurations in .mcp.json: { \"mcpServers\": { \"my-server\": { \"command\": \"${CLAUDE_PLUGIN_ROOT}/mcp-server/run.sh\", \"args\": [\"--config\", \"${CLAUDE_PLUGIN_ROOT}/config.json\"] } } } LSP Servers Language server configurations in .lsp.json for code intelligence features. LSP Server Structure: { \"lspServers\": { \"python\": { \"command\": \"pylsp\", \"args\": [], \"extensionToLanguage\": { \".py\": \"python\", \".pyi\": \"python\" }, \"env\": { \"PYTHONPATH\": \"${CLAUDE_PROJECT_DIR}\" } } } } Required Fields: command: LSP server executable extensionToLanguage: File extension to language mapping Optional Fields: args, env, transport, initializationOptions, settings, workspaceFolder, startupTimeout, shutdownTimeout, restartOnCrash, maxRestarts, loggingConfig Plugin Settings Plugin-specific settings can be defined in settings.json at the plugin root (v2.1.49+): { \"env\": { \"PLUGIN_API_URL\": \"https://api.example.com\" }, \"permissions\": { \"allow\": [\"Read\", \"Grep\", \"WebFetch\"] } } Plugin settings are merged with project and user settings, allowing plugins to: Define required environment variables Set default tool permissions Provide configuration defaults that users can override Installation Scopes Plugins can be installed at different scopes: User Scope (default) Location: ~/.claude/plugins/ Availability: All projects for current user Use case: Personal productivity tools Project Scope Location: .claude/settings.json (reference only, not copied) Availability: Current project only Version controlled: Yes, shareable via git Use case: Project-specific requirements Local Scope Location: Interactive selection via /plugin command Availability: Current session only Version controlled: No Use case: Testing and evaluation Managed Scope Location: Enterprise configuration Availability: Enforced across organization Use case: Compliance and security requirements Official Anthropic Marketplace Anthropic maintains an official plugin marketplace with curated, verified plugins. Marketplace Name: claude-plugins-official Availability: Automatically available in Claude Code without additional configuration. Installation Syntax: /plugin install plugin-name@claude-plugins-official The official marketplace contains plugins that have been reviewed for quality and security. For a complete catalog of available plugins, see the discover-plugins reference documentation. Interactive Plugin Manager Access the interactive plugin manager using the /plugin command. T"},{"id":".claude/skills/foundation-cc/reference/claude-code-sandboxing-official.md","title":"Claude Code Sandboxing - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-sandboxing-official.md","desc":"","html":"<h1 id=\"claude-code-sandboxing-official-documentation-reference\">Claude Code Sandboxing - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/sandboxing Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>Claude Code provides OS-level sandboxing to restrict file system and network access during code execution. This creates a security boundary that limits potential damage from malicious or buggy code.<\/p>\n<h2 id=\"sandbox-implementation\">Sandbox Implementation<\/h2>\n<h3 id=\"operating-system-support\">Operating System Support<\/h3>\n<p>Linux: Uses bubblewrap (bwrap) for namespace-based isolation macOS: Uses Seatbelt (sandbox-exec) for profile-based restrictions<\/p>\n<h3 id=\"default-behavior\">Default Behavior<\/h3>\n<p>When sandboxing is enabled:<\/p>\n<ul><li>File writes are restricted to the current working directory<\/li><li>Network access is limited to allowed domains<\/li><li>System resources are protected from modification<\/li><\/ul>\n<h2 id=\"filesystem-isolation\">Filesystem Isolation<\/h2>\n<h3 id=\"default-write-restrictions\">Default Write Restrictions<\/h3>\n<p>By default, sandboxed commands can only write to:<\/p>\n<ul><li>Current working directory<\/li><li>Subdirectories of current working directory<\/li><\/ul>\n<p>Reads are generally unrestricted within user-accessible paths.<\/p>\n<h3 id=\"configuring-allowed-paths\">Configuring Allowed Paths<\/h3>\n<p>Additional write paths can be configured in settings.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;allowedPaths&quot;: [\n      &quot;/tmp/build-output&quot;,\n      &quot;~/project-cache&quot;\n    ],\n    &quot;deniedPaths&quot;: [\n      &quot;~/.ssh&quot;,\n      &quot;~/.aws&quot;\n    ]\n  }\n}<\/code><\/pre>\n<h2 id=\"network-isolation\">Network Isolation<\/h2>\n<h3 id=\"domain-based-restrictions\">Domain-Based Restrictions<\/h3>\n<p>Network access is filtered by domain. Configure allowed domains:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;allowedDomains&quot;: [\n      &quot;api.example.com&quot;,\n      &quot;registry.npmjs.org&quot;\n    ],\n    &quot;deniedDomains&quot;: [\n      &quot;*.internal.corp&quot;\n    ]\n  }\n}<\/code><\/pre>\n<h3 id=\"default-allowed-domains\">Default Allowed Domains<\/h3>\n<p>Common development services are typically allowed:<\/p>\n<ul><li>npm registry (registry.npmjs.org)<\/li><li>GitHub (github.com, api.github.com)<\/li><li>Claude API (api.anthropic.com)<\/li><li>DNS services<\/li><\/ul>\n<h3 id=\"port-configuration\">Port Configuration<\/h3>\n<p>Configure network port access:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;allowedPorts&quot;: [80, 443, 8080],\n    &quot;deniedPorts&quot;: [22, 3306]\n  }\n}<\/code><\/pre>\n<h2 id=\"auto-allow-mode\">Auto-Allow Mode<\/h2>\n<p>When sandbox is enabled, bash commands that operate within sandbox restrictions can run without permission prompts.<\/p>\n<h3 id=\"how-auto-allow-works\">How Auto-Allow Works<\/h3>\n<p>If a command only:<\/p>\n<ul><li>Reads from allowed paths<\/li><li>Writes to allowed paths<\/li><li>Accesses allowed network domains<\/li><\/ul>\n<p>Then it executes automatically without user confirmation.<\/p>\n<h3 id=\"commands-excluded-from-sandbox\">Commands Excluded from Sandbox<\/h3>\n<p>Some commands bypass sandbox restrictions:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;excludedCommands&quot;: [\n      &quot;docker&quot;,\n      &quot;kubectl&quot;\n    ]\n  }\n}<\/code><\/pre>\n<p>Excluded commands require explicit user permission.<\/p>\n<h2 id=\"security-limitations\">Security Limitations<\/h2>\n<h3 id=\"domain-only-filtering\">Domain-Only Filtering<\/h3>\n<p>Network filtering operates at the domain level only:<\/p>\n<ul><li>Cannot inspect traffic content<\/li><li>Cannot filter by URL path<\/li><li>Cannot decrypt HTTPS traffic<\/li><\/ul>\n<h3 id=\"unix-socket-access\">Unix Socket Access<\/h3>\n<p>Unix sockets can grant system access:<\/p>\n<ul><li>Docker socket provides host system access<\/li><li>Some sockets bypass network restrictions<\/li><li>Configure socket permissions carefully<\/li><\/ul>\n<h3 id=\"permission-implications\">Permission Implications<\/h3>\n<p>Certain permissions grant broader access:<\/p>\n<ul><li>Docker socket access equals root-equivalent access<\/li><li>Some build tools require expanded permissions<\/li><li>Evaluate security tradeoffs carefully<\/li><\/ul>\n<h2 id=\"configuration-examples\">Configuration Examples<\/h2>\n<h3 id=\"restrictive-configuration\">Restrictive Configuration<\/h3>\n<p>For maximum security:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;enabled&quot;: true,\n    &quot;allowedPaths&quot;: [],\n    &quot;allowedDomains&quot;: [],\n    &quot;excludedCommands&quot;: []\n  }\n}<\/code><\/pre>\n<h3 id=\"development-configuration\">Development Configuration<\/h3>\n<p>For typical development workflows:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;enabled&quot;: true,\n    &quot;allowedPaths&quot;: [\n      &quot;/tmp&quot;,\n      &quot;~/.npm&quot;,\n      &quot;~/.cache&quot;\n    ],\n    &quot;allowedDomains&quot;: [\n      &quot;registry.npmjs.org&quot;,\n      &quot;github.com&quot;,\n      &quot;api.github.com&quot;\n    ]\n  }\n}<\/code><\/pre>\n<h3 id=\"ci-cd-configuration\">CI/CD Configuration<\/h3>\n<p>For automated pipelines:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;sandbox&quot;: {\n    &quot;enabled&quot;: true,\n    &quot;allowedPaths&quot;: [\n      &quot;/workspace&quot;,\n      &quot;/build-cache&quot;\n    ],\n    &quot;allowedDomains&quot;: [\n      &quot;registry.npmjs.org&quot;,\n      &quot;docker.io&quot;\n    ],\n    &quot;excludedCommands&quot;: [\n      &quot;docker&quot;\n    ]\n  }\n}<\/code><\/pre>\n<h2 id=\"monitoring-sandbox-violations\">Monitoring Sandbox Violations<\/h2>\n<h3 id=\"identifying-blocked-operations\">Identifying Blocked Operations<\/h3>\n<p>When sandbox blocks an operation:<\/p>\n<ol><li>Permission dialog appears (if not in auto-allow mode)<\/li><li>Operation is logged<\/li><li>User can choose to allow or deny<\/li><\/ol>\n<h3 id=\"reviewing-sandbox-logs\">Reviewing Sandbox Logs<\/h3>\n<p>Check sandbox violation patterns:<\/p>\n<ul><li>Repeated blocks may indicate configuration gaps<\/li><li>Unexpected blocks may indicate security issues<\/li><li>Review and adjust configuration as needed<\/li><\/ul>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"start-restrictive\">Start Restrictive<\/h3>\n<p>Begin with minimal permissions:<\/p>\n<ol><li>Enable sandbox with default restrictions<\/li><li>Monitor for violations<\/li><li>Add specific allowances as needed<\/li><\/ol>\n<h3 id=\"document-exceptions\">Document Exceptions<\/h3>\n<p>When adding exclusions:<\/p>\n<ul><li>Document why each exception is needed<\/li><li>Review exceptions periodically<\/li><li>Remove unnecessary exceptions<\/li><\/ul>\n<h3 id=\"combine-with-iam\">Combine with IAM<\/h3>\n<p>Use sandbox as one layer of defense:<\/p>\n<ul><li>Sandbox provides OS-level isolation<\/li><li>IAM provides Claude-level permissions<\/li><li>Together they create defense-in-depth<\/li><\/ul>\n<h3 id=\"test-configuration\">Test Configuration<\/h3>\n<p>Before deploying:<\/p>\n<ul><li>Test common workflows with sandbox enabled<\/li><li>Verify necessary operations succeed<\/li><li>Confirm sensitive operations are blocked<\/li><\/ul>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"command-fails-in-sandbox\">Command Fails in Sandbox<\/h3>\n<p>If a legitimate command is blocked:<\/p>\n<ol><li>Check if command needs excluded commands list<\/li><li>Verify path is in allowed paths<\/li><li>Check domain is in allowed domains<\/li><\/ol>\n<h3 id=\"network-request-blocked\">Network Request Blocked<\/h3>\n<p>If network request fails:<\/p>\n<ol><li>Verify domain spelling<\/li><li>Check for subdomain requirements<\/li><li>Review port restrictions<\/li><\/ol>\n<h3 id=\"performance-impact\">Performance Impact<\/h3>\n<p>Sandbox adds minimal overhead:<\/p>\n<ul><li>Namespace creation is fast<\/li><li>File checks are cached<\/li><li>Network filtering is lightweight<\/li><\/ul>\n<p>If experiencing slowdowns, check:<\/p>\n<ul><li>Large allowed paths lists<\/li><li>Complex domain patterns<\/li><li>Excessive sandbox violations<\/li><\/ul>","text":"Claude Code Sandboxing - Official Documentation Reference Source: https://code.claude.com/docs/en/sandboxing Updated: 2026-01-06 Overview Claude Code provides OS-level sandboxing to restrict file system and network access during code execution. This creates a security boundary that limits potential damage from malicious or buggy code. Sandbox Implementation Operating System Support Linux: Uses bubblewrap (bwrap) for namespace-based isolation macOS: Uses Seatbelt (sandbox-exec) for profile-based restrictions Default Behavior When sandboxing is enabled: File writes are restricted to the current working directory Network access is limited to allowed domains System resources are protected from modification Filesystem Isolation Default Write Restrictions By default, sandboxed commands can only write to: Current working directory Subdirectories of current working directory Reads are generally unrestricted within user-accessible paths. Configuring Allowed Paths Additional write paths can be configured in settings.json: { \"sandbox\": { \"allowedPaths\": [ \"/tmp/build-output\", \"~/project-cache\" ], \"deniedPaths\": [ \"~/.ssh\", \"~/.aws\" ] } } Network Isolation Domain-Based Restrictions Network access is filtered by domain. Configure allowed domains: { \"sandbox\": { \"allowedDomains\": [ \"api.example.com\", \"registry.npmjs.org\" ], \"deniedDomains\": [ \"*.internal.corp\" ] } } Default Allowed Domains Common development services are typically allowed: npm registry (registry.npmjs.org) GitHub (github.com, api.github.com) Claude API (api.anthropic.com) DNS services Port Configuration Configure network port access: { \"sandbox\": { \"allowedPorts\": [80, 443, 8080], \"deniedPorts\": [22, 3306] } } Auto-Allow Mode When sandbox is enabled, bash commands that operate within sandbox restrictions can run without permission prompts. How Auto-Allow Works If a command only: Reads from allowed paths Writes to allowed paths Accesses allowed network domains Then it executes automatically without user confirmation. Commands Excluded from Sandbox Some commands bypass sandbox restrictions: { \"sandbox\": { \"excludedCommands\": [ \"docker\", \"kubectl\" ] } } Excluded commands require explicit user permission. Security Limitations Domain-Only Filtering Network filtering operates at the domain level only: Cannot inspect traffic content Cannot filter by URL path Cannot decrypt HTTPS traffic Unix Socket Access Unix sockets can grant system access: Docker socket provides host system access Some sockets bypass network restrictions Configure socket permissions carefully Permission Implications Certain permissions grant broader access: Docker socket access equals root-equivalent access Some build tools require expanded permissions Evaluate security tradeoffs carefully Configuration Examples Restrictive Configuration For maximum security: { \"sandbox\": { \"enabled\": true, \"allowedPaths\": [], \"allowedDomains\": [], \"excludedCommands\": [] } } Development Configuration For typical development workflows: { \"sandbox\": { \"enabled\": true, \"allowedPaths\": [ \"/tmp\", \"~/.npm\", \"~/.cache\" ], \"allowedDomains\": [ \"registry.npmjs.org\", \"github.com\", \"api.github.com\" ] } } CI/CD Configuration For automated pipelines: { \"sandbox\": { \"enabled\": true, \"allowedPaths\": [ \"/workspace\", \"/build-cache\" ], \"allowedDomains\": [ \"registry.npmjs.org\", \"docker.io\" ], \"excludedCommands\": [ \"docker\" ] } } Monitoring Sandbox Violations Identifying Blocked Operations When sandbox blocks an operation: Permission dialog appears (if not in auto-allow mode) Operation is logged User can choose to allow or deny Reviewing Sandbox Logs Check sandbox violation patterns: Repeated blocks may indicate configuration gaps Unexpected blocks may indicate security issues Review and adjust configuration as needed Best Practices Start Restrictive Begin with minimal permissions: Enable sandbox with default restrictions Monitor for violations Add specific allowances as needed Document Exceptions When adding exclusions: Document why each exception is needed Review exceptions periodically Remove unnecessary exceptions Combine with IAM Use sandbox as one layer of defense: Sandbox provides OS-level isolation IAM provides Claude-level permissions Together they create defense-in-depth Test Configuration Before deploying: Test common workflows with sandbox enabled Verify necessary operations succeed Confirm sensitive operations are blocked Troubleshooting Command Fails in Sandbox If a legitimate command is blocked: Check if command needs excluded commands list Verify path is in allowed paths Check domain is in allowed domains Network Request Blocked If network request fails: Verify domain spelling Check for subdomain requirements Review port restrictions Performance Impact Sandbox adds minimal overhead: Namespace creation is fast File checks are cached Network filtering is lightweight If experiencing slowdowns, check: Large allowed paths lists Complex domain patterns Excessive sandbox violations"},{"id":".claude/skills/foundation-cc/reference/claude-code-settings-official.md","title":"Claude Code Settings - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-settings-official.md","desc":"","html":"<h1 id=\"claude-code-settings-official-documentation-reference\">Claude Code Settings - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/settings<\/p>\n<h2 id=\"settings-hierarchy\">Settings Hierarchy<\/h2>\n<p>Precedence (highest to lowest):<\/p>\n<ol><li>Enterprise managed settings (<code>managed-settings.json<\/code> — Windows: <code>C:\\ProgramData\\ClaudeCode\\<\/code>, macOS: <code>/Library/Application Support/ClaudeCode/<\/code>, Linux: <code>/etc/claude-code/<\/code>)<\/li><li>Command-line arguments<\/li><li>Local project settings: <code>.claude/settings.local.json<\/code> (personal, gitignored)<\/li><li>Shared project settings: <code>.claude/settings.json<\/code> (team, version-controlled)<\/li><li>User settings: <code>~/.claude/settings.json<\/code> (personal, all projects)<\/li><\/ol>\n<h2 id=\"valid-top-level-fields\">Valid Top-Level Fields<\/h2>\n<pre><code class=\"language-json\">{\n &quot;model&quot;: &quot;claude-sonnet-4-5-20250929&quot;,\n &quot;permissions&quot;: {},\n &quot;hooks&quot;: {},\n &quot;disableAllHooks&quot;: false,\n &quot;env&quot;: {},\n &quot;statusLine&quot;: {},\n &quot;outputStyle&quot;: &quot;&quot;,\n &quot;cleanupPeriodDays&quot;: 30,\n &quot;sandbox&quot;: {},\n &quot;enabledPlugins&quot;: {},\n &quot;enableAllProjectMcpServers&quot;: false,\n &quot;enabledMcpjsonServers&quot;: [],\n &quot;disabledMcpjsonServers&quot;: [],\n &quot;includeCoAuthoredBy&quot;: true,\n &quot;apiKeyHelper&quot;: &quot;&quot;,\n &quot;forceLoginMethod&quot;: &quot;&quot;,\n &quot;effortLevel&quot;: &quot;high&quot;,\n &quot;disableBypassPermissionsMode&quot;: false\n}<\/code><\/pre>\n<p>Version compatibility for newer fields lives in <code>.claude/rules/coding-standards.md<\/code>.<\/p>\n<h2 id=\"permissions\">Permissions<\/h2>\n<p>Modes: <code>default<\/code>, <code>plan<\/code>, <code>acceptEdits<\/code>, <code>dontAsk<\/code>, <code>bypassPermissions<\/code>.<\/p>\n<pre><code class=\"language-json\">{\n &quot;permissions&quot;: {\n &quot;defaultMode&quot;: &quot;default&quot;,\n &quot;allow&quot;: [&quot;Read&quot;, &quot;Glob&quot;, &quot;Grep&quot;, &quot;Bash(git status:*)&quot;, &quot;Bash(git log:*)&quot;],\n &quot;ask&quot;: [&quot;Bash(rm:*)&quot;, &quot;Bash(sudo:*)&quot;],\n &quot;deny&quot;: [&quot;Read(~/.ssh/**)&quot;, &quot;Bash(rm -rf /:*)&quot;],\n &quot;additionalDirectories&quot;: []\n }\n}<\/code><\/pre>\n<p>Rule shape: <code>Tool<\/code> or <code>Tool(pattern)<\/code>. <code>deny<\/code> beats <code>ask<\/code> beats <code>allow<\/code>.<\/p>\n<h2 id=\"environment-variables\">Environment Variables<\/h2>\n<pre><code class=\"language-json\">{\n &quot;env&quot;: {\n &quot;NODE_ENV&quot;: &quot;development&quot;,\n &quot;PYTHONPATH&quot;: &quot;./src&quot;,\n &quot;DEBUG&quot;: &quot;true&quot;\n }\n}<\/code><\/pre>\n<h2 id=\"mcp-servers\">MCP Servers<\/h2>\n<p>MCP servers are configured in <code>.mcp.json<\/code> at the project root (NOT in settings.json):<\/p>\n<pre><code class=\"language-json\">{\n &quot;mcpServers&quot;: {\n &quot;kern&quot;: { &quot;command&quot;: &quot;kern&quot;, &quot;args&quot;: [&quot;mcp&quot;] },\n &quot;context7&quot;: {\n &quot;command&quot;: &quot;npx&quot;,\n &quot;args&quot;: [&quot;@upstash/context7-mcp&quot;],\n &quot;env&quot;: { &quot;CONTEXT7_API_KEY&quot;: &quot;$CONTEXT7_KEY&quot; }\n }\n }\n}<\/code><\/pre>\n<p>settings.json controls which apply: <code>enableAllProjectMcpServers<\/code>, <code>enabledMcpjsonServers<\/code>, <code>disabledMcpjsonServers<\/code>. MCP tool permissions use the standard permissions lists with <code>mcp__server__tool<\/code> names.<\/p>\n<h2 id=\"hooks\">Hooks<\/h2>\n<p>Hook events: SessionStart, UserPromptSubmit, PreToolUse, PermissionRequest, PostToolUse, PostToolUseFailure, Notification, SubagentStart, SubagentStop, Stop, PreCompact, SessionEnd.<\/p>\n<p>Hook handler types: \"command\" (shell command), \"prompt\" (LLM evaluation), \"agent\" (subagent with tool access).<\/p>\n<p>Timeout unit: seconds. Defaults: 600 for command, 30 for prompt, 60 for agent.<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n { &quot;type&quot;: &quot;command&quot;, &quot;command&quot;: &quot;.claude/hooks/block-rm.sh&quot;, &quot;timeout&quot;: 10 }\n ]\n }\n ],\n &quot;PostToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Write|Edit&quot;,\n &quot;hooks&quot;: [\n { &quot;type&quot;: &quot;command&quot;, &quot;command&quot;: &quot;\\&quot;$CLAUDE_PROJECT_DIR\\&quot;/.claude/hooks/lint-check.sh&quot;, &quot;timeout&quot;: 30 }\n ]\n }\n ],\n &quot;Stop&quot;: [\n {\n &quot;hooks&quot;: [\n { &quot;type&quot;: &quot;prompt&quot;, &quot;prompt&quot;: &quot;Check if all tasks are complete: $ARGUMENTS&quot;, &quot;timeout&quot;: 30 }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<p>Use <code>$CLAUDE_PROJECT_DIR<\/code> in hook commands, never absolute paths.<\/p>\n<h2 id=\"sub-agents-and-plugins\">Sub-agents and Plugins<\/h2>\n<p>There is NO <code>subagents<\/code> or <code>plugins<\/code> settings block. Sub-agents are markdown files in <code>.claude/agents/<\/code>; plugins are enabled per-plugin via <code>enabledPlugins<\/code> and managed with the <code>/plugin<\/code> command.<\/p>\n<h2 id=\"management\">Management<\/h2>\n<ul><li><code>/config<\/code> — interactive settings UI in the REPL<\/li><li><code>claude config get|set|add|remove|list<\/code> — CLI (user scope with <code>--global<\/code>, else project)<\/li><li>Edit the JSON files directly; validate JSON after every edit<\/li><\/ul>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<ul><li>Version-control <code>.claude/settings.json<\/code>; keep <code>.claude/settings.local.json<\/code> gitignored<\/li><li>Never commit secrets — use <code>env<\/code> indirection or apiKeyHelper<\/li><li>Principle of least privilege in <code>allow<\/code> lists<\/li><\/ul>","text":"Claude Code Settings - Official Documentation Reference Source: https://code.claude.com/docs/en/settings Settings Hierarchy Precedence (highest to lowest): Enterprise managed settings ( managed-settings.json — Windows: C:\\ProgramData\\ClaudeCode\\ , macOS: /Library/Application Support/ClaudeCode/ , Linux: /etc/claude-code/ ) Command-line arguments Local project settings: .claude/settings.local.json (personal, gitignored) Shared project settings: .claude/settings.json (team, version-controlled) User settings: ~/.claude/settings.json (personal, all projects) Valid Top-Level Fields { \"model\": \"claude-sonnet-4-5-20250929\", \"permissions\": {}, \"hooks\": {}, \"disableAllHooks\": false, \"env\": {}, \"statusLine\": {}, \"outputStyle\": \"\", \"cleanupPeriodDays\": 30, \"sandbox\": {}, \"enabledPlugins\": {}, \"enableAllProjectMcpServers\": false, \"enabledMcpjsonServers\": [], \"disabledMcpjsonServers\": [], \"includeCoAuthoredBy\": true, \"apiKeyHelper\": \"\", \"forceLoginMethod\": \"\", \"effortLevel\": \"high\", \"disableBypassPermissionsMode\": false } Version compatibility for newer fields lives in .claude/rules/coding-standards.md . Permissions Modes: default , plan , acceptEdits , dontAsk , bypassPermissions . { \"permissions\": { \"defaultMode\": \"default\", \"allow\": [\"Read\", \"Glob\", \"Grep\", \"Bash(git status:*)\", \"Bash(git log:*)\"], \"ask\": [\"Bash(rm:*)\", \"Bash(sudo:*)\"], \"deny\": [\"Read(~/.ssh/**)\", \"Bash(rm -rf /:*)\"], \"additionalDirectories\": [] } } Rule shape: Tool or Tool(pattern) . deny beats ask beats allow . Environment Variables { \"env\": { \"NODE_ENV\": \"development\", \"PYTHONPATH\": \"./src\", \"DEBUG\": \"true\" } } MCP Servers MCP servers are configured in .mcp.json at the project root (NOT in settings.json): { \"mcpServers\": { \"kern\": { \"command\": \"kern\", \"args\": [\"mcp\"] }, \"context7\": { \"command\": \"npx\", \"args\": [\"@upstash/context7-mcp\"], \"env\": { \"CONTEXT7_API_KEY\": \"$CONTEXT7_KEY\" } } } } settings.json controls which apply: enableAllProjectMcpServers , enabledMcpjsonServers , disabledMcpjsonServers . MCP tool permissions use the standard permissions lists with mcp__server__tool names. Hooks Hook events: SessionStart, UserPromptSubmit, PreToolUse, PermissionRequest, PostToolUse, PostToolUseFailure, Notification, SubagentStart, SubagentStop, Stop, PreCompact, SessionEnd. Hook handler types: \"command\" (shell command), \"prompt\" (LLM evaluation), \"agent\" (subagent with tool access). Timeout unit: seconds. Defaults: 600 for command, 30 for prompt, 60 for agent. { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \".claude/hooks/block-rm.sh\", \"timeout\": 10 } ] } ], \"PostToolUse\": [ { \"matcher\": \"Write|Edit\", \"hooks\": [ { \"type\": \"command\", \"command\": \"\\\"$CLAUDE_PROJECT_DIR\\\"/.claude/hooks/lint-check.sh\", \"timeout\": 30 } ] } ], \"Stop\": [ { \"hooks\": [ { \"type\": \"prompt\", \"prompt\": \"Check if all tasks are complete: $ARGUMENTS\", \"timeout\": 30 } ] } ] } } Use $CLAUDE_PROJECT_DIR in hook commands, never absolute paths. Sub-agents and Plugins There is NO subagents or plugins settings block. Sub-agents are markdown files in .claude/agents/ ; plugins are enabled per-plugin via enabledPlugins and managed with the /plugin command. Management /config — interactive settings UI in the REPL claude config get|set|add|remove|list — CLI (user scope with --global , else project) Edit the JSON files directly; validate JSON after every edit Best Practices Version-control .claude/settings.json ; keep .claude/settings.local.json gitignored Never commit secrets — use env indirection or apiKeyHelper Principle of least privilege in allow lists"},{"id":".claude/skills/foundation-cc/reference/claude-code-skills-official.md","title":"Claude Code Skills - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-skills-official.md","desc":"","html":"<h1 id=\"claude-code-skills-official-documentation-reference\">Claude Code Skills - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/skills Related: https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview Updated: 2026-01-06<\/p>\n<h2 id=\"what-are-agent-skills\">What are Agent Skills?<\/h2>\n<p>Agent Skills are modular extensions that expand Claude's capabilities. They consist of a SKILL.md file with YAML frontmatter and Markdown instructions, plus optional supporting files (scripts, templates, documentation).<\/p>\n<p>Key Characteristic: Skills are model-invoked, meaning Claude autonomously decides when to use them based on user requests and skill descriptions. This differs from slash commands which are user-invoked.<\/p>\n<h2 id=\"skill-types\">Skill Types<\/h2>\n<p>Three categories of Skills exist:<\/p>\n<ol><li>Personal Skills: Located at <code>~/.claude/skills/skill-name/<\/code>, available across all projects<\/li><li>Project Skills: Located at <code>.claude/skills/skill-name/<\/code>, shared via git with team members<\/li><li>Plugin Skills: Bundled within Claude Code plugins<\/li><\/ol>\n<h2 id=\"progressive-disclosure-architecture\">Progressive Disclosure Architecture<\/h2>\n<p>Skills leverage Claude's VM environment with a three-level loading system that optimizes context window usage:<\/p>\n<h3 id=\"level-1-metadata-always-loaded\">Level 1: Metadata (Always Loaded)<\/h3>\n<p>The Skill's YAML frontmatter provides discovery information and is pre-loaded into the system prompt at startup. This lightweight approach means many Skills can be installed without context penalty.<\/p>\n<p>Content: <code>name<\/code> and <code>description<\/code> fields from YAML frontmatter Token Cost: Approximately 100 tokens per Skill<\/p>\n<h3 id=\"level-2-instructions-loaded-when-triggered\">Level 2: Instructions (Loaded When Triggered)<\/h3>\n<p>The main body of SKILL.md contains procedural knowledge including workflows, best practices, and guidance. When a request matches a Skill's description, Claude reads SKILL.md from the filesystem via bash, only then loading this content into the context window.<\/p>\n<p>Content: SKILL.md body with instructions and guidance Token Cost: Under 5K tokens recommended<\/p>\n<h3 id=\"level-3-resources-and-code-loaded-as-needed\">Level 3: Resources and Code (Loaded As Needed)<\/h3>\n<p>Skills can bundle additional materials that Claude accesses only when referenced:<\/p>\n<ul><li>Instructions: Additional markdown files (FORMS.md, REFERENCE.md) containing specialized guidance<\/li><li>Code: Executable scripts (fill_form.py, validate.py) that Claude runs via bash<\/li><li>Resources: Reference materials like database schemas, API documentation, templates, or examples<\/li><\/ul>\n<p>Content: Bundled files executed via bash without loading contents into context Token Cost: Effectively unlimited since they are accessed on-demand<\/p>\n<h2 id=\"skill-md-structure-and-format\">SKILL.md Structure and Format<\/h2>\n<h3 id=\"directory-organization\">Directory Organization<\/h3>\n<p>skill-name/<\/p>\n<ul><li>SKILL.md (required, main file, 500 lines or less)<\/li><li>reference.md (optional, extended documentation)<\/li><li>examples.md (optional, code examples)<\/li><li>scripts/ (optional, utility scripts)<\/li><li>templates/ (optional, file templates)<\/li><\/ul>\n<h3 id=\"yaml-frontmatter-requirements\">YAML Frontmatter Requirements<\/h3>\n<p>Required Fields:<\/p>\n<ul><li>name: Skill identifier (max 64 characters, lowercase letters, numbers, and hyphens only, no XML tags, no reserved words like \"anthropic\" or \"claude\")<\/li><li>description: What the Skill does and when to use it (max 1024 characters, non-empty, no XML tags)<\/li><\/ul>\n<p>Optional Fields:<\/p>\n<ul><li>allowed-tools: Tool names to restrict access. Supports comma-separated string or YAML list format. If not specified, Claude follows standard permission model.<\/li><li>model: Model to use when Skill is active (e.g., <code>claude-sonnet-4-20250514<\/code>). Defaults to the current model.<\/li><li>context: Set to <code>fork<\/code> to run Skill in isolated sub-agent context with separate conversation history.<\/li><li>agent: Agent type when <code>context: fork<\/code> is set. Options: <code>Explore<\/code>, <code>Plan<\/code>, <code>general-purpose<\/code>. Defaults to <code>general-purpose<\/code>.<\/li><li>hooks: Define lifecycle hooks (PreToolUse, PostToolUse, Stop) scoped to the Skill. See Hooks section below.<\/li><li>user-invocable: Boolean to control slash command menu visibility. Default is <code>true<\/code>. Set to <code>false<\/code> to hide internal Skills from the menu.<\/li><\/ul>\n<h3 id=\"advanced-frontmatter-examples-2026-01\">Advanced Frontmatter Examples (2026-01)<\/h3>\n<h4 id=\"allowed-tools-as-yaml-list\">allowed-tools as YAML List<\/h4>\n<pre><code class=\"language-yaml\">---\nname: reading-files-safely\ndescription: Read files without making changes. Use for read-only file access.\nallowed-tools:\n  - Read\n  - Grep\n  - Glob\n---<\/code><\/pre>\n<h4 id=\"forked-context-with-agent-type\">Forked Context with Agent Type<\/h4>\n<pre><code class=\"language-yaml\">---\nname: code-analysis\ndescription: Analyze code quality and generate detailed reports. Use for comprehensive code review.\ncontext: fork\nagent: Explore\nallowed-tools:\n  - Read\n  - Grep\n  - Glob\n---<\/code><\/pre>\n<h4 id=\"with-lifecycle-hooks\">With Lifecycle Hooks<\/h4>\n<pre><code class=\"language-yaml\">---\nname: secure-operations\ndescription: Perform operations with additional security checks.\nhooks:\n  PreToolUse:\n    - matcher: &quot;Bash&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/security-check.sh $TOOL_INPUT&quot;\n          once: true\n  PostToolUse:\n    - matcher: &quot;Write|Edit&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/verify-write.sh&quot;\n---<\/code><\/pre>\n<p>Hook Configuration Fields:<\/p>\n<ul><li>type: \"command\" (bash) or \"prompt\" (LLM evaluation)<\/li><li>command: Bash command to execute (for type: command)<\/li><li>prompt: LLM prompt for evaluation (for type: prompt)<\/li><li>timeout: Timeout in seconds (default: 60)<\/li><li>matcher: Pattern to match tool names (regex supported)<\/li><li>once: Boolean, run hook only once per session (Skills only)<\/li><\/ul>\n<h4 id=\"hidden-from-menu\">Hidden from Menu<\/h4>\n<pre><code class=\"language-yaml\">---\nname: internal-helper\ndescription: Internal Skill used by other Skills. Not for direct user invocation.\nuser-invocable: false\nallowed-tools:\n  - Read\n  - Grep\n---<\/code><\/pre>\n<h3 id=\"example-skill-md-structure\">Example SKILL.md Structure<\/h3>\n<pre><code class=\"language-yaml\">---\nname: your-skill-name\ndescription: Brief description of what this Skill does and when to use it. Include both what it does AND specific triggers for when Claude should use it.\nallowed-tools: Read, Grep, Glob\n---\n\n# Your Skill Name\n\n## Instructions\nClear, step-by-step guidance for Claude to follow.\n\n## Examples\nConcrete examples of using this Skill.<\/code><\/pre>\n<h2 id=\"tool-restrictions-with-allowed-tools\">Tool Restrictions with allowed-tools<\/h2>\n<p>The <code>allowed-tools<\/code> field restricts which tools Claude can use when a skill is active.<\/p>\n<p>Use Cases for Tool Restrictions:<\/p>\n<ul><li>Read-only Skills that should not modify files (allowed-tools: Read, Grep, Glob)<\/li><li>Limited-scope Skills for data analysis only<\/li><li>Security-sensitive workflows<\/li><\/ul>\n<p>If <code>allowed-tools<\/code> is not specified, Claude follows the standard permission model and may request tool access as needed.<\/p>\n<h2 id=\"writing-effective-descriptions\">Writing Effective Descriptions<\/h2>\n<p>The description field enables Skill discovery and should include both what the Skill does and when to use it.<\/p>\n<p>Critical Rules:<\/p>\n<ul><li>Always write in third person. The description is injected into the system prompt, and inconsistent point-of-view can cause discovery problems.<\/li><li>Good: \"Processes Excel files and generates reports\"<\/li><li>Avoid: \"I can help you process Excel files\"<\/li><li>Avoid: \"You can use this to process Excel files\"<\/li><\/ul>\n<p>Be Specific and Include Key Terms:<\/p>\n<p>Effective examples:<\/p>\n<ul><li>PDF Processing: \"Extract text and tables from PDF files, fill forms, merge documents. Use when working with PDF files or when the user mentions PDFs, forms, or document extraction.\"<\/li><li>Git Commit Helper: \"Generate descriptive commit messages by analyzing git diffs. Use when the user asks for help writing commit messages or reviewing staged changes.\"<\/li><\/ul>\n<p>Avoid vague descriptions:<\/p>\n<ul><li>\"Helps with documents\" (too vague)<\/li><li>\"Processes data\" (not specific)<\/li><li>\"Does stuff with files\" (unclear triggers)<\/li><\/ul>\n<h2 id=\"naming-conventions\">Naming Conventions<\/h2>\n<p>Recommended format uses gerund form (verb + -ing) for Skill names as this clearly describes the activity or capability:<\/p>\n<p>Good Naming Examples:<\/p>\n<ul><li>processing-pdfs<\/li><li>analyzing-spreadsheets<\/li><li>managing-databases<\/li><li>testing-code<\/li><li>writing-documentation<\/li><\/ul>\n<p>Acceptable Alternatives:<\/p>\n<ul><li>Noun phrases: pdf-processing, spreadsheet-analysis<\/li><li>Action-oriented: process-pdfs, analyze-spreadsheets<\/li><\/ul>\n<p>Avoid:<\/p>\n<ul><li>Vague names: helper, utils, tools<\/li><li>Overly generic: documents, data, files<\/li><li>Reserved words: anthropic-helper, claude-tools<\/li><li>Inconsistent patterns within skill collection<\/li><\/ul>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"core-principle-concise-is-key\">Core Principle: Concise is Key<\/h3>\n<p>The context window is a shared resource. Your Skill competes with system prompt, conversation history, other Skills' metadata, and the actual request.<\/p>\n<p>Default Assumption: Claude is already very smart. Only add context Claude does not already have. Challenge each piece of information by asking:<\/p>\n<ul><li>Does Claude really need this explanation?<\/li><li>Can I assume Claude knows this?<\/li><li>Does this paragraph justify its token cost?<\/li><\/ul>\n<h3 id=\"set-appropriate-degrees-of-freedom\">Set Appropriate Degrees of Freedom<\/h3>\n<p>Match the level of specificity to the task's fragility and variability.<\/p>\n<p>High Freedom (Text-based instructions):<\/p>\n<p>Use when multiple approaches are valid, decisions depend on context, or heuristics guide the approach.<\/p>\n<p>Medium Freedom (Pseudocode or scripts with parameters):<\/p>\n<p>Use when a preferred pattern exists, some variation is acceptable, or configuration affects behavior.<\/p>\n<p>Low Freedom (Specific scripts, few or no parameters):<\/p>\n<p>Use when operations are fragile and error-prone, consistency is critical, or a specific sequence must be followed.<\/p>\n<h3 id=\"test-with-all-models-you-plan-to-use\">Test With All Models You Plan to Use<\/h3>\n<p>Skills act as additions to models, so effectiveness depends on the underlying model:<\/p>\n<ul><li>Claude Haiku (fast, economical): Does the Skill provide enough guidance?<\/li><li>Claude Sonnet (balanced): Is the Skill clear and efficient?<\/li><li>Claude Opus (powerful reasoning): Does the Skill avoid over-explaining?<\/li><\/ul>\n<h3 id=\"build-evaluations-first\">Build Evaluations First<\/h3>\n<p>Create evaluations BEFORE writing extensive documentation to ensure your Skill solves real problems:<\/p>\n<ol><li>Identify gaps: Run Claude on representative tasks without a Skill, document specific failures<\/li><li>Create evaluations: Build three scenarios that test these gaps<\/li><li>Establish baseline: Measure Claude's performance without the Skill<\/li><li>Write minimal instructions: Create just enough content to adddess gaps and pass evaluations<\/li><li>Iterate: Execute evaluations, compare against baseline, refine<\/li><\/ol>\n<h3 id=\"develop-skills-iteratively-with-claude\">Develop Skills Iteratively with Claude<\/h3>\n<p>Work with one instance of Claude (\"Claude A\") to create a Skill that will be used by other instances (\"Claude B\"):<\/p>\n<ol><li>Complete a task without a Skill using normal prompting<\/li><li>Identify the reusable pattern from the context you provided<\/li><li>Ask Claude A to create a Skill capturing that pattern<\/li><li>Review for conciseness<\/li><li>Improve information architecture<\/li><li>Test on similar tasks with Claude B<\/li><li>Iterate based on observation<\/li><\/ol>\n<h2 id=\"progressive-disclosure-patterns\">Progressive Disclosure Patterns<\/h2>\n<h3 id=\"pattern-1-high-level-guide-with-references\">Pattern 1: High-level Guide with References<\/h3>\n<p>Keep SKILL.md as overview pointing Claude to detailed materials:<\/p>\n<pre><code class=\"language-markdown\"># PDF Processing\n\n## Quick start\nExtract text with pdfplumber (brief example)\n\n## Advanced features\n**Form filling**: See [FORMS.md](FORMS.md) for complete guide\n**API reference**: See [REFERENCE.md](REFERENCE.md) for all methods\n**Examples**: See [EXAMPLES.md](EXAMPLES.md) for common patterns<\/code><\/pre>\n<p>Claude loads additional files only when needed.<\/p>\n<h3 id=\"pattern-2-domain-specific-organization\">Pattern 2: Domain-specific Organization<\/h3>\n<p>For Skills with multiple domains, organize content by domain to avoid loading irrelevant context:<\/p>\n<pre><code>bigquery-skill/\n- SKILL.md (overview and navigation)\n- reference/\n  - finance.md (revenue metrics)\n  - sales.md (pipeline data)\n  - product.md (usage analytics)<\/code><\/pre>\n<p>When user asks about revenue, Claude reads only reference/finance.md.<\/p>\n<h3 id=\"pattern-3-conditional-details\">Pattern 3: Conditional Details<\/h3>\n<p>Show basic content, link to advanced content:<\/p>\n<pre><code class=\"language-markdown\">## Creating documents\nUse docx-js for new documents. See [DOCX-JS.md](DOCX-JS.md).\n\n## Editing documents\nFor simple edits, modify the XML directly.\n**For tracked changes**: See [REDLINING.md](REDLINING.md)<\/code><\/pre>\n<h3 id=\"important-avoid-deeply-nested-references\">Important: Avoid Deeply Nested References<\/h3>\n<p>Keep references one level deep from SKILL.md. Claude may partially read files when they are referenced from other referenced files, resulting in incomplete information.<\/p>\n<p>Bad: SKILL.md references advanced.md which references details.md Good: SKILL.md directly references all files (advanced.md, reference.md, examples.md)<\/p>\n<h2 id=\"where-skills-work\">Where Skills Work<\/h2>\n<p>Skills are available across Claude's agent products with different behaviors:<\/p>\n<h3 id=\"claude-code\">Claude Code<\/h3>\n<p>Custom Skills only. Create Skills as directories with SKILL.md files. Claude discovers and uses them automatically. Skills are filesystem-based and do not require API uploads.<\/p>\n<h3 id=\"claude-api\">Claude API<\/h3>\n<p>Supports both pre-built Agent Skills and custom Skills. Specify the relevant <code>skill_id<\/code> in the <code>container<\/code> parameter. Custom Skills are shared organization-wide.<\/p>\n<h3 id=\"claude-ai\">Claude.ai<\/h3>\n<p>Supports both pre-built Agent Skills and custom Skills. Upload custom Skills as zip files through Settings, Features. Custom Skills are individual to each user and not shared organization-wide.<\/p>\n<h3 id=\"claude-agent-sdk\">Claude Agent SDK<\/h3>\n<p>Supports custom Skills through filesystem-based configuration. Create Skills in <code>.claude/skills/<\/code> and enable by including \"Skill\" in <code>allowed_tools<\/code> configuration.<\/p>\n<h2 id=\"security-considerations\">Security Considerations<\/h2>\n<p>We strongly recommend using Skills only from trusted sources: those you created yourself or obtained from Anthropic. Skills provide Claude with new capabilities through instructions and code, and a malicious Skill can direct Claude to invoke tools or execute code in ways that do not match the Skill's stated purpose.<\/p>\n<p>Key Security Considerations:<\/p>\n<ul><li>Audit thoroughly: Review all files bundled in the Skill including SKILL.md, scripts, images, and other resources<\/li><li>External sources are risky: Skills that fetch data from external URLs pose particular risk<\/li><li>Tool misuse: Malicious Skills can invoke tools in harmful ways<\/li><li>Data exposure: Skills with access to sensitive data could leak information to external systems<\/li><li>Treat like installing software: Only use Skills from trusted sources<\/li><\/ul>\n<h2 id=\"managing-skills\">Managing Skills<\/h2>\n<h3 id=\"view-available-skills\">View Available Skills<\/h3>\n<p>Ask Claude directly: \"What Skills are available?\"<\/p>\n<p>Or check file system:<\/p>\n<ul><li>Personal Skills: ls ~/.claude/skills/<\/li><li>Project Skills: ls .claude/skills/<\/li><\/ul>\n<h3 id=\"update-a-skill\">Update a Skill<\/h3>\n<p>Edit SKILL.md directly. Changes apply on next Claude Code startup.<\/p>\n<h3 id=\"remove-a-skill\">Remove a Skill<\/h3>\n<p>Personal: rm -rf ~/.claude/skills/my-skill Project: rm -rf .claude/skills/my-skill &amp;&amp; git commit -m \"Remove unused Skill\"<\/p>\n<h2 id=\"debugging-skills\">Debugging Skills<\/h2>\n<h3 id=\"claude-not-using-the-skill\">Claude Not Using the Skill<\/h3>\n<p>Check if description is specific enough:<\/p>\n<ul><li>Include what it does AND when to use it<\/li><li>Add key trigger terms users will mention<\/li><\/ul>\n<p>Check YAML syntax validity:<\/p>\n<ul><li>Opening and closing --- markers<\/li><li>Proper indentation<\/li><li>No tabs (use spaces)<\/li><\/ul>\n<p>Check correct file location:<\/p>\n<ul><li>Personal: ~/.claude/skills/*/SKILL.md<\/li><li>Project: .claude/skills/*/SKILL.md<\/li><\/ul>\n<h3 id=\"multiple-skills-conflicting\">Multiple Skills Conflicting<\/h3>\n<p>Use distinct trigger terms in descriptions:<\/p>\n<p>Instead of two skills both having \"For data analysis\" and \"For analyzing data\", use specific triggers:<\/p>\n<ul><li>Skill 1: \"Analyze sales data in Excel files and CRM exports. Use for sales reports, pipeline analysis, and revenue tracking.\"<\/li><li>Skill 2: \"Analyze log files and system metrics data. Use for performance monitoring, debugging, and system diagnostics.\"<\/li><\/ul>\n<h2 id=\"anti-patterns-to-avoid\">Anti-patterns to Avoid<\/h2>\n<h3 id=\"avoid-windows-style-paths\">Avoid Windows-style Paths<\/h3>\n<p>Always use forward slashes in file paths, even on Windows:<\/p>\n<ul><li>Good: scripts/helper.py, reference/guide.md<\/li><li>Avoid: scripts\\helper.py, reference\\guide.md<\/li><\/ul>\n<h3 id=\"avoid-offering-too-many-options\">Avoid Offering Too Many Options<\/h3>\n<p>Do not present multiple approaches unless necessary. Provide a default with an escape hatch for special cases.<\/p>\n<h3 id=\"avoid-time-sensitive-information\">Avoid Time-sensitive Information<\/h3>\n<p>Do not include information that will become outdated. Use \"old patterns\" section for deprecated approaches instead of date-based conditions.<\/p>\n<h2 id=\"checklist-for-effective-skills\">Checklist for Effective Skills<\/h2>\n<p>Before sharing a Skill, verify:<\/p>\n<p>Core Quality:<\/p>\n<ul><li>Description is specific and includes key terms<\/li><li>Description includes both what the Skill does and when to use it<\/li><li>SKILL.md body is under 500 lines<\/li><li>Additional details are in separate files if needed<\/li><li>No time-sensitive information<\/li><li>Consistent terminology throughout<\/li><li>Examples are concrete, not abstract<\/li><li>File references are one level deep<\/li><li>Progressive disclosure used appropriately<\/li><li>Workflows have clear steps<\/li><\/ul>\n<p>Testing:<\/p>\n<ul><li>At least three evaluations created<\/li><li>Tested with Haiku, Sonnet, and Opus<\/li><li>Tested with real usage scenarios<\/li><li>Team feedback incorporated if applicable<\/li><\/ul>","text":"Claude Code Skills - Official Documentation Reference Source: https://code.claude.com/docs/en/skills Related: https://platform.claude.com/docs/en/agents-and-tools/agent-skills/overview Updated: 2026-01-06 What are Agent Skills? Agent Skills are modular extensions that expand Claude's capabilities. They consist of a SKILL.md file with YAML frontmatter and Markdown instructions, plus optional supporting files (scripts, templates, documentation). Key Characteristic: Skills are model-invoked, meaning Claude autonomously decides when to use them based on user requests and skill descriptions. This differs from slash commands which are user-invoked. Skill Types Three categories of Skills exist: Personal Skills: Located at ~/.claude/skills/skill-name/ , available across all projects Project Skills: Located at .claude/skills/skill-name/ , shared via git with team members Plugin Skills: Bundled within Claude Code plugins Progressive Disclosure Architecture Skills leverage Claude's VM environment with a three-level loading system that optimizes context window usage: Level 1: Metadata (Always Loaded) The Skill's YAML frontmatter provides discovery information and is pre-loaded into the system prompt at startup. This lightweight approach means many Skills can be installed without context penalty. Content: name and description fields from YAML frontmatter Token Cost: Approximately 100 tokens per Skill Level 2: Instructions (Loaded When Triggered) The main body of SKILL.md contains procedural knowledge including workflows, best practices, and guidance. When a request matches a Skill's description, Claude reads SKILL.md from the filesystem via bash, only then loading this content into the context window. Content: SKILL.md body with instructions and guidance Token Cost: Under 5K tokens recommended Level 3: Resources and Code (Loaded As Needed) Skills can bundle additional materials that Claude accesses only when referenced: Instructions: Additional markdown files (FORMS.md, REFERENCE.md) containing specialized guidance Code: Executable scripts (fill_form.py, validate.py) that Claude runs via bash Resources: Reference materials like database schemas, API documentation, templates, or examples Content: Bundled files executed via bash without loading contents into context Token Cost: Effectively unlimited since they are accessed on-demand SKILL.md Structure and Format Directory Organization skill-name/ SKILL.md (required, main file, 500 lines or less) reference.md (optional, extended documentation) examples.md (optional, code examples) scripts/ (optional, utility scripts) templates/ (optional, file templates) YAML Frontmatter Requirements Required Fields: name: Skill identifier (max 64 characters, lowercase letters, numbers, and hyphens only, no XML tags, no reserved words like \"anthropic\" or \"claude\") description: What the Skill does and when to use it (max 1024 characters, non-empty, no XML tags) Optional Fields: allowed-tools: Tool names to restrict access. Supports comma-separated string or YAML list format. If not specified, Claude follows standard permission model. model: Model to use when Skill is active (e.g., claude-sonnet-4-20250514 ). Defaults to the current model. context: Set to fork to run Skill in isolated sub-agent context with separate conversation history. agent: Agent type when context: fork is set. Options: Explore , Plan , general-purpose . Defaults to general-purpose . hooks: Define lifecycle hooks (PreToolUse, PostToolUse, Stop) scoped to the Skill. See Hooks section below. user-invocable: Boolean to control slash command menu visibility. Default is true . Set to false to hide internal Skills from the menu. Advanced Frontmatter Examples (2026-01) allowed-tools as YAML List --- name: reading-files-safely description: Read files without making changes. Use for read-only file access. allowed-tools: - Read - Grep - Glob --- Forked Context with Agent Type --- name: code-analysis description: Analyze code quality and generate detailed reports. Use for comprehensive code review. context: fork agent: Explore allowed-tools: - Read - Grep - Glob --- With Lifecycle Hooks --- name: secure-operations description: Perform operations with additional security checks. hooks: PreToolUse: - matcher: \"Bash\" hooks: - type: command command: \"./scripts/security-check.sh $TOOL_INPUT\" once: true PostToolUse: - matcher: \"Write|Edit\" hooks: - type: command command: \"./scripts/verify-write.sh\" --- Hook Configuration Fields: type: \"command\" (bash) or \"prompt\" (LLM evaluation) command: Bash command to execute (for type: command) prompt: LLM prompt for evaluation (for type: prompt) timeout: Timeout in seconds (default: 60) matcher: Pattern to match tool names (regex supported) once: Boolean, run hook only once per session (Skills only) Hidden from Menu --- name: internal-helper description: Internal Skill used by other Skills. Not for direct user invocation. user-invocable: false allowed-tools: - Read - Grep --- Example SKILL.md Structure --- name: your-skill-name description: Brief description of what this Skill does and when to use it. Include both what it does AND specific triggers for when Claude should use it. allowed-tools: Read, Grep, Glob --- # Your Skill Name ## Instructions Clear, step-by-step guidance for Claude to follow. ## Examples Concrete examples of using this Skill. Tool Restrictions with allowed-tools The allowed-tools field restricts which tools Claude can use when a skill is active. Use Cases for Tool Restrictions: Read-only Skills that should not modify files (allowed-tools: Read, Grep, Glob) Limited-scope Skills for data analysis only Security-sensitive workflows If allowed-tools is not specified, Claude follows the standard permission model and may request tool access as needed. Writing Effective Descriptions The description field enables Skill discovery and should include both what the Skill does and when to use it. Critical Rules: Always write in third person. The description is injected into the system prompt, and inconsistent point-of-view can cause discovery problems. Good: \"Processes Excel files and generates reports\" Avoid: \"I can help you process Excel files\" Avoid: \"You can use this to process Excel files\" Be Specific and Include Key Terms: Effective examples: PDF Processing: \"Extract text and tables from PDF files, fill forms, merge documents. Use when working with PDF files or when the user mentions PDFs, forms, or document extraction.\" Git Commit Helper: \"Generate descriptive commit messages by analyzing git diffs. Use when the user asks for help writing commit messages or reviewing staged changes.\" Avoid vague descriptions: \"Helps with documents\" (too vague) \"Processes data\" (not specific) \"Does stuff with files\" (unclear triggers) Naming Conventions Recommended format uses gerund form (verb + -ing) for Skill names as this clearly describes the activity or capability: Good Naming Examples: processing-pdfs analyzing-spreadsheets managing-databases testing-code writing-documentation Acceptable Alternatives: Noun phrases: pdf-processing, spreadsheet-analysis Action-oriented: process-pdfs, analyze-spreadsheets Avoid: Vague names: helper, utils, tools Overly generic: documents, data, files Reserved words: anthropic-helper, claude-tools Inconsistent patterns within skill collection Best Practices Core Principle: Concise is Key The context window is a shared resource. Your Skill competes with system prompt, conversation history, other Skills' metadata, and the actual request. Default Assumption: Claude is already very smart. Only add context Claude does not already have. Challenge each piece of information by asking: Does Claude really need this explanation? Can I assume Claude knows this? Does this paragraph justify its token cost? Set Appropriate Degrees of Freedom Match the level of specificity to the task's fragility and variability. High Freedom (Text-based instructions): Use when multiple approaches are valid, decisions depend on context, or"},{"id":".claude/skills/foundation-cc/reference/claude-code-statusline-official.md","title":"Claude Code Statusline - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-statusline-official.md","desc":"","html":"<h1 id=\"claude-code-statusline-official-documentation-reference\">Claude Code Statusline - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/statusline Updated: 2026-01-06<\/p>\n<h2 id=\"overview\">Overview<\/h2>\n<p>The statusline provides a customizable display area in Claude Code's interface for showing dynamic information such as project status, resource usage, and custom metrics.<\/p>\n<h2 id=\"setup\">Setup<\/h2>\n<h3 id=\"interactive-setup\">Interactive Setup<\/h3>\n<p>Use the /statusline command to configure via interactive interface.<\/p>\n<h3 id=\"manual-configuration\">Manual Configuration<\/h3>\n<p>Add statusline configuration to .claude/settings.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;statusLine&quot;: {\n    &quot;command&quot;: &quot;path/to/statusline-script.sh&quot;\n  }\n}<\/code><\/pre>\n<h2 id=\"how-statusline-works\">How Statusline Works<\/h2>\n<h3 id=\"execution-model\">Execution Model<\/h3>\n<ol><li>Claude Code invokes the statusline command<\/li><li>Script receives JSON input via stdin<\/li><li>First line of stdout becomes the status display<\/li><li>Updates occur at most every 300ms<\/li><\/ol>\n<h3 id=\"input-format\">Input Format<\/h3>\n<p>The statusline script receives JSON via stdin:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;hook_event_name&quot;: &quot;statusLine&quot;,\n  &quot;session_id&quot;: &quot;abc123&quot;,\n  &quot;cwd&quot;: &quot;/path/to/project&quot;,\n  &quot;model&quot;: &quot;claude-sonnet-4&quot;,\n  &quot;workspace&quot;: &quot;/path/to/workspace&quot;,\n  &quot;cost&quot;: {\n    &quot;total_usd&quot;: 0.05,\n    &quot;input_tokens&quot;: 1000,\n    &quot;output_tokens&quot;: 500\n  },\n  &quot;context_window&quot;: {\n    &quot;used&quot;: 50000,\n    &quot;total&quot;: 200000\n  }\n}<\/code><\/pre>\n<h3 id=\"available-input-fields\">Available Input Fields<\/h3>\n<ul><li>hook_event_name: Always \"statusLine\"<\/li><li>session_id: Current session identifier<\/li><li>cwd: Current working directory<\/li><li>model: Active Claude model name<\/li><li>workspace: Workspace root path<\/li><li>cost: Usage cost information<ul><li>total_usd: Total cost in USD<\/li><li>input_tokens: Input token count<\/li><li>output_tokens: Output token count<\/li><\/ul><\/li><li>context_window: Context usage<ul><li>used: Tokens currently used<\/li><li>total: Maximum available tokens<\/li><\/ul><\/li><\/ul>\n<h2 id=\"ansi-color-support\">ANSI Color Support<\/h2>\n<p>Statusline supports ANSI escape codes for styling:<\/p>\n<h3 id=\"color-examples\">Color Examples<\/h3>\n<ul><li>Red: \\033[31m<\/li><li>Green: \\033[32m<\/li><li>Yellow: \\033[33m<\/li><li>Blue: \\033[34m<\/li><li>Reset: \\033[0m<\/li><\/ul>\n<h2 id=\"implementation-examples\">Implementation Examples<\/h2>\n<h3 id=\"bash-script\">Bash Script<\/h3>\n<pre><code class=\"language-bash\">#!/bin/bash\nread -r input\nmodel=$(echo &quot;$input&quot; | jq -r &#x27;.model&#x27;)\ncost=$(echo &quot;$input&quot; | jq -r &#x27;.cost.total_usd&#x27;)\nused=$(echo &quot;$input&quot; | jq -r &#x27;.context_window.used&#x27;)\ntotal=$(echo &quot;$input&quot; | jq -r &#x27;.context_window.total&#x27;)\npct=$((used * 100 / total))\necho &quot;Model: $model | Cost: \\$$cost | Context: ${pct}%&quot;<\/code><\/pre>\n<h3 id=\"python-script\">Python Script<\/h3>\n<pre><code class=\"language-python\">#!/usr/bin/env python3\nimport sys\nimport json\n\ndata = json.loads(sys.stdin.read())\nmodel = data.get(&#x27;model&#x27;, &#x27;unknown&#x27;)\ncost = data.get(&#x27;cost&#x27;, {}).get(&#x27;total_usd&#x27;, 0)\nctx = data.get(&#x27;context_window&#x27;, {})\nused = ctx.get(&#x27;used&#x27;, 0)\ntotal = ctx.get(&#x27;total&#x27;, 1)\npct = int(used * 100 / total)\n\nprint(f&quot;Model: {model} | ${cost:.2f} | Ctx: {pct}%&quot;)<\/code><\/pre>\n<h3 id=\"node-js-script\">Node.js Script<\/h3>\n<pre><code class=\"language-javascript\">#!/usr/bin/env node\nlet data = &#x27;&#x27;;\nprocess.stdin.on(&#x27;data&#x27;, chunk =&gt; data += chunk);\nprocess.stdin.on(&#x27;end&#x27;, () =&gt; {\n  const input = JSON.parse(data);\n  const model = input.model || &#x27;unknown&#x27;;\n  const cost = input.cost?.total_usd || 0;\n  const used = input.context_window?.used || 0;\n  const total = input.context_window?.total || 1;\n  const pct = Math.round(used * 100 / total);\n  console.log(`${model} | $${cost.toFixed(2)} | ${pct}%`);\n});<\/code><\/pre>\n<h2 id=\"context-window-usage-display\">Context Window Usage Display<\/h2>\n<h3 id=\"calculating-percentage\">Calculating Percentage<\/h3>\n<pre><code class=\"language-bash\">used=$(echo &quot;$input&quot; | jq -r &#x27;.context_window.used&#x27;)\ntotal=$(echo &quot;$input&quot; | jq -r &#x27;.context_window.total&#x27;)\npercentage=$((used * 100 / total))<\/code><\/pre>\n<h3 id=\"color-coded-display\">Color-Coded Display<\/h3>\n<pre><code class=\"language-bash\">if [ $percentage -lt 50 ]; then\n  color=&quot;\\033[32m&quot;  # Green\nelif [ $percentage -lt 80 ]; then\n  color=&quot;\\033[33m&quot;  # Yellow\nelse\n  color=&quot;\\033[31m&quot;  # Red\nfi\necho -e &quot;${color}Context: ${percentage}%\\033[0m&quot;<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"keep-output-concise\">Keep Output Concise<\/h3>\n<p>Status line has limited space. Prioritize essential information:<\/p>\n<ul><li>Model name (abbreviated if needed)<\/li><li>Cost or token usage<\/li><li>Context percentage<\/li><li>Custom project indicators<\/li><\/ul>\n<h3 id=\"use-visual-indicators\">Use Visual Indicators<\/h3>\n<p>Employ emojis and colors for quick scanning:<\/p>\n<ul><li>Green checkmark for healthy status<\/li><li>Yellow warning for approaching limits<\/li><li>Red alert for critical conditions<\/li><\/ul>\n<h3 id=\"handle-missing-data\">Handle Missing Data<\/h3>\n<p>Always provide fallbacks for missing fields:<\/p>\n<pre><code class=\"language-bash\">model=$(echo &quot;$input&quot; | jq -r &#x27;.model // &quot;unknown&quot;&#x27;)\ncost=$(echo &quot;$input&quot; | jq -r &#x27;.cost.total_usd // 0&#x27;)<\/code><\/pre>\n<h3 id=\"test-with-jq\">Test with jq<\/h3>\n<p>Validate JSON parsing before deployment:<\/p>\n<pre><code class=\"language-bash\">echo &#x27;{&quot;model&quot;:&quot;sonnet&quot;}&#x27; | jq -r &#x27;.model&#x27;<\/code><\/pre>\n<h3 id=\"update-frequency-considerations\">Update Frequency Considerations<\/h3>\n<p>Statusline updates at most every 300ms:<\/p>\n<ul><li>Avoid expensive computations<\/li><li>Cache values when possible<\/li><li>Use efficient JSON parsing<\/li><\/ul>\n<h2 id=\"configuration-options\">Configuration Options<\/h2>\n<h3 id=\"custom-script-path\">Custom Script Path<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;statusLine&quot;: {\n    &quot;command&quot;: &quot;~/.claude/scripts/my-statusline.sh&quot;\n  }\n}<\/code><\/pre>\n<h3 id=\"script-with-arguments\">Script with Arguments<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;statusLine&quot;: {\n    &quot;command&quot;: &quot;python3 ~/.claude/scripts/status.py --format=minimal&quot;\n  }\n}<\/code><\/pre>\n<h3 id=\"disable-statusline\">Disable Statusline<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;statusLine&quot;: null\n}<\/code><\/pre>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"statusline-not-updating\">Statusline Not Updating<\/h3>\n<p>Check that:<\/p>\n<ul><li>Script is executable (chmod +x)<\/li><li>Script outputs to stdout (not stderr)<\/li><li>JSON parsing is correct<\/li><li>No infinite loops in script<\/li><\/ul>\n<h3 id=\"display-issues\">Display Issues<\/h3>\n<p>If output appears garbled:<\/p>\n<ul><li>Verify ANSI codes are correct<\/li><li>Ensure single-line output<\/li><li>Check for trailing newlines<\/li><li>Test script manually<\/li><\/ul>\n<h3 id=\"performance-issues\">Performance Issues<\/h3>\n<p>If statusline causes slowdown:<\/p>\n<ul><li>Simplify JSON parsing<\/li><li>Remove external command calls<\/li><li>Use lightweight scripting language<\/li><li>Cache computed values<\/li><\/ul>\n<h2 id=\"advanced-patterns\">Advanced Patterns<\/h2>\n<h3 id=\"project-specific-status\">Project-Specific Status<\/h3>\n<p>Detect project type and show relevant info:<\/p>\n<pre><code class=\"language-bash\">if [ -f &quot;package.json&quot; ]; then\n  echo &quot;Node.js Project&quot;\nelif [ -f &quot;pyproject.toml&quot; ]; then\n  echo &quot;Python Project&quot;\nelse\n  echo &quot;Generic Project&quot;\nfi<\/code><\/pre>\n<h3 id=\"git-integration\">Git Integration<\/h3>\n<p>Show git branch in status:<\/p>\n<pre><code class=\"language-bash\">branch=$(git branch --show-current 2&gt;/dev/null || echo &quot;no-git&quot;)\necho &quot;Branch: $branch&quot;<\/code><\/pre>\n<h3 id=\"cost-alerts\">Cost Alerts<\/h3>\n<p>Highlight when cost exceeds threshold:<\/p>\n<pre><code class=\"language-bash\">cost=$(echo &quot;$input&quot; | jq -r &#x27;.cost.total_usd&#x27;)\nif (( $(echo &quot;$cost &gt; 1.00&quot; | bc -l) )); then\n  echo -e &quot;\\033[31mCost Alert: \\$$cost\\033[0m&quot;\nelse\n  echo &quot;Cost: \\$$cost&quot;\nfi<\/code><\/pre>","text":"Claude Code Statusline - Official Documentation Reference Source: https://code.claude.com/docs/en/statusline Updated: 2026-01-06 Overview The statusline provides a customizable display area in Claude Code's interface for showing dynamic information such as project status, resource usage, and custom metrics. Setup Interactive Setup Use the /statusline command to configure via interactive interface. Manual Configuration Add statusline configuration to .claude/settings.json: { \"statusLine\": { \"command\": \"path/to/statusline-script.sh\" } } How Statusline Works Execution Model Claude Code invokes the statusline command Script receives JSON input via stdin First line of stdout becomes the status display Updates occur at most every 300ms Input Format The statusline script receives JSON via stdin: { \"hook_event_name\": \"statusLine\", \"session_id\": \"abc123\", \"cwd\": \"/path/to/project\", \"model\": \"claude-sonnet-4\", \"workspace\": \"/path/to/workspace\", \"cost\": { \"total_usd\": 0.05, \"input_tokens\": 1000, \"output_tokens\": 500 }, \"context_window\": { \"used\": 50000, \"total\": 200000 } } Available Input Fields hook_event_name: Always \"statusLine\" session_id: Current session identifier cwd: Current working directory model: Active Claude model name workspace: Workspace root path cost: Usage cost information total_usd: Total cost in USD input_tokens: Input token count output_tokens: Output token count context_window: Context usage used: Tokens currently used total: Maximum available tokens ANSI Color Support Statusline supports ANSI escape codes for styling: Color Examples Red: \\033[31m Green: \\033[32m Yellow: \\033[33m Blue: \\033[34m Reset: \\033[0m Implementation Examples Bash Script #!/bin/bash read -r input model=$(echo \"$input\" | jq -r '.model') cost=$(echo \"$input\" | jq -r '.cost.total_usd') used=$(echo \"$input\" | jq -r '.context_window.used') total=$(echo \"$input\" | jq -r '.context_window.total') pct=$((used * 100 / total)) echo \"Model: $model | Cost: \\$$cost | Context: ${pct}%\" Python Script #!/usr/bin/env python3 import sys import json data = json.loads(sys.stdin.read()) model = data.get('model', 'unknown') cost = data.get('cost', {}).get('total_usd', 0) ctx = data.get('context_window', {}) used = ctx.get('used', 0) total = ctx.get('total', 1) pct = int(used * 100 / total) print(f\"Model: {model} | ${cost:.2f} | Ctx: {pct}%\") Node.js Script #!/usr/bin/env node let data = ''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const input = JSON.parse(data); const model = input.model || 'unknown'; const cost = input.cost?.total_usd || 0; const used = input.context_window?.used || 0; const total = input.context_window?.total || 1; const pct = Math.round(used * 100 / total); console.log(`${model} | $${cost.toFixed(2)} | ${pct}%`); }); Context Window Usage Display Calculating Percentage used=$(echo \"$input\" | jq -r '.context_window.used') total=$(echo \"$input\" | jq -r '.context_window.total') percentage=$((used * 100 / total)) Color-Coded Display if [ $percentage -lt 50 ]; then color=\"\\033[32m\" # Green elif [ $percentage -lt 80 ]; then color=\"\\033[33m\" # Yellow else color=\"\\033[31m\" # Red fi echo -e \"${color}Context: ${percentage}%\\033[0m\" Best Practices Keep Output Concise Status line has limited space. Prioritize essential information: Model name (abbreviated if needed) Cost or token usage Context percentage Custom project indicators Use Visual Indicators Employ emojis and colors for quick scanning: Green checkmark for healthy status Yellow warning for approaching limits Red alert for critical conditions Handle Missing Data Always provide fallbacks for missing fields: model=$(echo \"$input\" | jq -r '.model // \"unknown\"') cost=$(echo \"$input\" | jq -r '.cost.total_usd // 0') Test with jq Validate JSON parsing before deployment: echo '{\"model\":\"sonnet\"}' | jq -r '.model' Update Frequency Considerations Statusline updates at most every 300ms: Avoid expensive computations Cache values when possible Use efficient JSON parsing Configuration Options Custom Script Path { \"statusLine\": { \"command\": \"~/.claude/scripts/my-statusline.sh\" } } Script with Arguments { \"statusLine\": { \"command\": \"python3 ~/.claude/scripts/status.py --format=minimal\" } } Disable Statusline { \"statusLine\": null } Troubleshooting Statusline Not Updating Check that: Script is executable (chmod +x) Script outputs to stdout (not stderr) JSON parsing is correct No infinite loops in script Display Issues If output appears garbled: Verify ANSI codes are correct Ensure single-line output Check for trailing newlines Test script manually Performance Issues If statusline causes slowdown: Simplify JSON parsing Remove external command calls Use lightweight scripting language Cache computed values Advanced Patterns Project-Specific Status Detect project type and show relevant info: if [ -f \"package.json\" ]; then echo \"Node.js Project\" elif [ -f \"pyproject.toml\" ]; then echo \"Python Project\" else echo \"Generic Project\" fi Git Integration Show git branch in status: branch=$(git branch --show-current 2>/dev/null || echo \"no-git\") echo \"Branch: $branch\" Cost Alerts Highlight when cost exceeds threshold: cost=$(echo \"$input\" | jq -r '.cost.total_usd') if (( $(echo \"$cost > 1.00\" | bc -l) )); then echo -e \"\\033[31mCost Alert: \\$$cost\\033[0m\" else echo \"Cost: \\$$cost\" fi"},{"id":".claude/skills/foundation-cc/reference/claude-code-sub-agents-official.md","title":"Claude Code Sub-agents - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-sub-agents-official.md","desc":"","html":"<h1 id=\"claude-code-sub-agents-official-documentation-reference\">Claude Code Sub-agents - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/ko/sub-agents Updated: 2026-01-06<\/p>\n<h2 id=\"what-are-sub-agents\">What are Sub-agents?<\/h2>\n<p>Sub-agents are specialized AI assistants that Claude Code can delegate tasks to. Each sub-agent has:<\/p>\n<ul><li>A specific purpose and domain expertise<\/li><li>Its own separate context window<\/li><li>Configurable tools with granular access control<\/li><li>A custom system prompt that guides behavior<\/li><\/ul>\n<p>When Claude encounters a task matching a sub-agent's specialty, it can delegate work to that specialized assistant while the main conversation remains focused on high-level goals.<\/p>\n<h2 id=\"key-benefits\">Key Benefits<\/h2>\n<p>Context Preservation: Each sub-agent operates in isolation, preventing main conversation pollution<\/p>\n<p>Specialized Expertise: Fine-tuned with detailed domain instructions for higher success rates<\/p>\n<p>Reusability: Created once, used across projects and shareable with teams<\/p>\n<p>Flexible Permissions: Each can have different tool access levels for security<\/p>\n<h2 id=\"creating-sub-agents\">Creating Sub-agents<\/h2>\n<h3 id=\"quick-start-using-agents-command-recommended\">Quick Start Using /agents Command (Recommended)<\/h3>\n<p>Step 1: Open the agents interface by typing /agents<\/p>\n<p>Step 2: Select \"Create New Agent\" (project or user level)<\/p>\n<p>Step 3: Define the sub-agent:<\/p>\n<ul><li>Describe its purpose and when to use it<\/li><li>Select tools (or leave blank to inherit all)<\/li><li>Press <code>e<\/code> to edit the system prompt in your editor<\/li><li>Recommended: Have Claude generate it first, then customize<\/li><\/ul>\n<h3 id=\"direct-file-creation\">Direct File Creation<\/h3>\n<p>Create markdown files with YAML frontmatter in the appropriate location:<\/p>\n<p>Project Sub-agents: .claude/agents/agent-name.md Personal Sub-agents: ~/.claude/agents/agent-name.md<\/p>\n<h2 id=\"configuration\">Configuration<\/h2>\n<h3 id=\"file-format\">File Format<\/h3>\n<pre><code class=\"language-yaml\">---\nname: your-sub-agent-name\ndescription: Description of when this subagent should be invoked\ntools: tool1, tool2, tool3\nmodel: sonnet\n---\n\nYour subagent&#x27;s system prompt goes here. This can be multiple paragraphs\nand should clearly define the subagent&#x27;s role, capabilities, and approach\nto solving problems.<\/code><\/pre>\n<h3 id=\"configuration-fields\">Configuration Fields<\/h3>\n<p>Required Fields:<\/p>\n<ul><li>name: Unique identifier using lowercase letters and hyphens<\/li><li>description: Natural language explanation of purpose. Include phrases like \"use PROACTIVELY\" or \"MUST BE USED\" to encourage automatic invocation.<\/li><\/ul>\n<p>Optional Fields:<\/p>\n<ul><li>tools: Comma-separated tool list. If omitted, inherits all available tools.<\/li><li>model: Model alias (sonnet, opus, haiku) or 'inherit' to use same model as main conversation. If omitted, uses configured default (usually sonnet).<\/li><li>permissionMode: Controls permission handling. Valid values: <code>default<\/code>, <code>acceptEdits<\/code>, <code>dontAsk<\/code>, <code>bypassPermissions<\/code>, <code>plan<\/code>, <code>ignore<\/code>.<\/li><li>skills: Comma-separated list of skill names to auto-load when agent is invoked. Skills are NOT inherited from parent.<\/li><li>hooks: Define lifecycle hooks scoped to this agent. Supports PreToolUse, PostToolUse, Stop events. Note: <code>once<\/code> field is NOT supported in agent hooks.<\/li><\/ul>\n<h3 id=\"hooks-
