ong> — it is defined by the files in <code>.proj/personas/<\/code>, not hard-coded here, so it stays in sync as personas are added or revised.<\/p>\n<h2 id=\"step-1-load-the-panel-the-work-under-review\">Step 1: Load the panel + the work under review<\/h2>\n<ol><li>Read <code>.proj/personas.md<\/code> (the index) and <strong>every<\/strong> file in <code>.proj/personas/<\/code>. Each file is one reviewer: its name, role, what it scrutinizes, its standing concerns, and the question it always asks.<\/li><li>Read the project identity line and overarching goal from <code>/.proj/project.md<\/code> (and <code>/.proj/agent.md<\/code> if present). Capture as <code>{PROJECT_IDENTITY}<\/code> and <code>{PROJECT_GOAL}<\/code>.<\/li><li>Identify the feature/fix just completed from conversation context (the last major assistant response describing finished work). Capture it as <code>{WORK_DESCRIPTION}<\/code> — include the files touched and the user-visible effect.<\/li><\/ol>\n<p>If <code>.proj/personas/<\/code> is empty or <code>/.proj/<\/code> is missing, tell the user to run <code>/bootstrap<\/code> (or author personas) and stop — do not invent personas.<\/p>\n<h2 id=\"step-2-spawn-one-subagent-per-persona-in-parallel\">Step 2: Spawn one subagent per persona, in parallel<\/h2>\n<p>For each persona file loaded in Step 1, spawn a subagent with this prompt, substituting the persona's own definition and the work under review:<\/p>\n<pre><code>You are &quot;{PERSONA_NAME}&quot;, {PERSONA_ROLE} on this project ({PROJECT_IDENTITY};\noverarching goal: {PROJECT_GOAL}).\n\nYour lens — what you scrutinize and the standing concerns you carry:\n{PERSONA_BODY}\n\nWork just completed:\n{WORK_DESCRIPTION}\n\nReview it strictly from your lens. Give exactly 4 bullets, most urgent first.\nCite real files/mechanisms (not generic advice). Where the change touches the\noverarching goal, say how. End with the one direct question your persona always\nasks. No praise — flag real problems only.<\/code><\/pre>\n<p>All personas run simultaneously.<\/p>\n<h2 id=\"step-3-synthesize\">Step 3: Synthesize<\/h2>\n<p>After every persona responds, run a synthesis subagent:<\/p>\n<pre><code>You are synthesizing the project&#x27;s persona panel. Each reviewer critiqued a\ncompleted change from their lens:\n\n{FOR EACH PERSONA: - {PERSONA_NAME} ({PERSONA_ROLE}): {PERSONA_OUTPUT}}\n\nProduce:\n1. **Top 3 concerns** — issues multiple reviewers flagged or that carry the\n   highest risk on the project&#x27;s own quality axes.\n2. **Quick wins** — easy fixes multiple personas agree on.\n3. **Unresolved questions** — genuine disagreements worth a decision.\n4. **Ship verdict** — SHIP / SHIP WITH CAVEATS / DO NOT SHIP, one-line reason.\n\nBe direct. No praise. Real problems only.<\/code><\/pre>\n<h2 id=\"output-format\">Output Format<\/h2>\n<pre><code>=== PERSONA PANEL ===\n\n[{PERSONA_NAME}] {PERSONA_ROLE}\n• ...\n? ...\n\n(one block per persona file, in the order listed in personas.md)\n\n=== SYNTHESIS ===\nTop concerns: ...\nQuick wins: ...\nOpen questions: ...\nVerdict: SHIP / SHIP WITH CAVEATS / DO NOT SHIP — reason<\/code><\/pre>\n<p>Keep each persona block under 8 lines, synthesis under 12. Scannable in 60s.<\/p>","text":"Persona Panel Review You are orchestrating the project's review panel. The user just completed a feature or fix. Run every persona in parallel, then synthesize. The panel is data-driven — it is defined by the files in .proj/personas/ , not hard-coded here, so it stays in sync as personas are added or revised. Step 1: Load the panel + the work under review Read .proj/personas.md (the index) and every file in .proj/personas/ . Each file is one reviewer: its name, role, what it scrutinizes, its standing concerns, and the question it always asks. Read the project identity line and overarching goal from /.proj/project.md (and /.proj/agent.md if present). Capture as {PROJECT_IDENTITY} and {PROJECT_GOAL} . Identify the feature/fix just completed from conversation context (the last major assistant response describing finished work). Capture it as {WORK_DESCRIPTION} — include the files touched and the user-visible effect. If .proj/personas/ is empty or /.proj/ is missing, tell the user to run /bootstrap (or author personas) and stop — do not invent personas. Step 2: Spawn one subagent per persona, in parallel For each persona file loaded in Step 1, spawn a subagent with this prompt, substituting the persona's own definition and the work under review: You are \"{PERSONA_NAME}\", {PERSONA_ROLE} on this project ({PROJECT_IDENTITY}; overarching goal: {PROJECT_GOAL}). Your lens — what you scrutinize and the standing concerns you carry: {PERSONA_BODY} Work just completed: {WORK_DESCRIPTION} Review it strictly from your lens. Give exactly 4 bullets, most urgent first. Cite real files/mechanisms (not generic advice). Where the change touches the overarching goal, say how. End with the one direct question your persona always asks. No praise — flag real problems only. All personas run simultaneously. Step 3: Synthesize After every persona responds, run a synthesis subagent: You are synthesizing the project's persona panel. Each reviewer critiqued a completed change from their lens: {FOR EACH PERSONA: - {PERSONA_NAME} ({PERSONA_ROLE}): {PERSONA_OUTPUT}} Produce: 1. **Top 3 concerns** — issues multiple reviewers flagged or that carry the highest risk on the project's own quality axes. 2. **Quick wins** — easy fixes multiple personas agree on. 3. **Unresolved questions** — genuine disagreements worth a decision. 4. **Ship verdict** — SHIP / SHIP WITH CAVEATS / DO NOT SHIP, one-line reason. Be direct. No praise. Real problems only. Output Format === PERSONA PANEL === [{PERSONA_NAME}] {PERSONA_ROLE} • ... ? ... (one block per persona file, in the order listed in personas.md) === SYNTHESIS === Top concerns: ... Quick wins: ... Open questions: ... Verdict: SHIP / SHIP WITH CAVEATS / DO NOT SHIP — reason Keep each persona block under 8 lines, synthesis under 12. Scannable in 60s."},{"id":".claude/skills/ref-git-workflow/SKILL.md","title":"ref-git-workflow","category":"Skills","path":".claude/skills/ref-git-workflow/SKILL.md","desc":">","html":"<h1 id=\"git-workflow-reference\">Git Workflow Reference<\/h1>\n<h2 id=\"target-agent\">Target Agent<\/h2>\n<p><code>manager-git<\/code> - Applies these patterns directly to git operations, branch management, and PR creation.<\/p>\n<h2 id=\"branch-strategy-patterns\">Branch Strategy Patterns<\/h2>\n<h3 id=\"github-flow-default-for-most-projects\">GitHub Flow (Default for Most Projects)<\/h3>\n<pre><code>main ─────────────────────────────────────────\n  └── feat/SPEC-XXX-description ──── PR ──→ merge<\/code><\/pre>\n<p>Rules:<\/p>\n<ul><li><code>main<\/code> is always deployable<\/li><li>Feature branches from <code>main<\/code><\/li><li>PR required for all merges<\/li><li>Delete branch after merge<\/li><\/ul>\n<h3 id=\"gitflow-complex-release-cycles\">GitFlow (Complex Release Cycles)<\/h3>\n<pre><code>main ──────────────────────────────────────────\n  └── develop ─────────────────────────────────\n        ├── feature/SPEC-XXX ──── PR ──→ develop\n        └── release/v1.2.0 ────── PR ──→ main + develop<\/code><\/pre>\n<h3 id=\"trunk-based-ci-cd-heavy\">Trunk-Based (CI/CD Heavy)<\/h3>\n<pre><code>main ──────────────────────────────────────────\n  └── short-lived branch (&lt; 1 day) ──→ merge<\/code><\/pre>\n<h2 id=\"branch-naming-convention\">Branch Naming Convention<\/h2>\n<table><thead><tr><th>Pattern<\/th><th>Example<\/th><th>Use Case<\/th><\/tr><\/thead><tbody><tr><td><code>feat/SPEC-{ID}-{slug}<\/code><\/td><td><code>feat/SPEC-AUTH-001-jwt-auth<\/code><\/td><td>New feature<\/td><\/tr><tr><td><code>fix/SPEC-{ID}-{slug}<\/code><\/td><td><code>fix/SPEC-BUG-042-null-check<\/code><\/td><td>Bug fix<\/td><\/tr><tr><td><code>refactor/{slug}<\/code><\/td><td><code>refactor/extract-auth-middleware<\/code><\/td><td>Refactoring<\/td><\/tr><tr><td><code>docs/{slug}<\/code><\/td><td><code>docs/api-reference-update<\/code><\/td><td>Documentation<\/td><\/tr><tr><td><code>chore/{slug}<\/code><\/td><td><code>chore/upgrade-dependencies<\/code><\/td><td>Maintenance<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"conventional-commits-reference\">Conventional Commits Reference<\/h2>\n<table><thead><tr><th>Type<\/th><th>When<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td><code>feat<\/code><\/td><td>New feature<\/td><td><code>feat(auth): add JWT refresh token flow<\/code><\/td><\/tr><tr><td><code>fix<\/code><\/td><td>Bug fix<\/td><td><code>fix(api): handle null user in profile endpoint<\/code><\/td><\/tr><tr><td><code>refactor<\/code><\/td><td>Code restructure<\/td><td><code>refactor(db): extract query builder<\/code><\/td><\/tr><tr><td><code>test<\/code><\/td><td>Test changes<\/td><td><code>test(auth): add login edge case tests<\/code><\/td><\/tr><tr><td><code>docs<\/code><\/td><td>Documentation<\/td><td><code>docs(api): update endpoint descriptions<\/code><\/td><\/tr><tr><td><code>chore<\/code><\/td><td>Maintenance<\/td><td><code>chore(deps): upgrade Go to 1.23<\/code><\/td><\/tr><tr><td><code>perf<\/code><\/td><td>Performance<\/td><td><code>perf(query): add index for user lookup<\/code><\/td><\/tr><tr><td><code>style<\/code><\/td><td>Formatting<\/td><td><code>style: apply gofmt formatting<\/code><\/td><\/tr><tr><td><code>ci<\/code><\/td><td>CI/CD changes<\/td><td><code>ci: add GitHub Actions workflow<\/code><\/td><\/tr><tr><td><code>revert<\/code><\/td><td>Revert commit<\/td><td><code>revert: undo feat(auth) commit abc123<\/code><\/td><\/tr><\/tbody><\/table>\n<h3 id=\"commit-message-structure\">Commit Message Structure<\/h3>\n<pre><code>&lt;type&gt;(&lt;scope&gt;): &lt;description&gt;    # max 72 chars\n\n[optional body]                    # what and why, not how\n\n[optional footer]                  # Breaking changes, issue refs\nBREAKING CHANGE: &lt;description&gt;\nRefs: #123, SPEC-AUTH-001<\/code><\/pre>\n<h2 id=\"pull-request-template\">Pull Request Template<\/h2>\n<pre><code class=\"language-markdown\">## Summary\n- [1-3 bullet points describing what this PR does]\n\n## Changes\n- [ ] File 1: description of change\n- [ ] File 2: description of change\n\n## Test Plan\n- [ ] Unit tests added/updated\n- [ ] Integration tests pass\n- [ ] Manual testing completed\n\n## SPEC Reference\n- SPEC-{ID}: {title}\n\n## Checklist\n- [ ] Tests pass (`go test ./...`)\n- [ ] Linting pass (`golangci-lint run`)\n- [ ] No secrets committed\n- [ ] Documentation updated if needed<\/code><\/pre>\n<h2 id=\"merge-strategy-selection\">Merge Strategy Selection<\/h2>\n<table><thead><tr><th>Strategy<\/th><th>When<\/th><th>Command<\/th><\/tr><\/thead><tbody><tr><td>Squash merge<\/td><td>Feature branches (clean history)<\/td><td><code>gh pr merge --squash<\/code><\/td><\/tr><tr><td>Merge commit<\/td><td>Release branches (preserve history)<\/td><td><code>gh pr merge --merge<\/code><\/td><\/tr><tr><td>Rebase<\/td><td>Small, clean commits<\/td><td><code>gh pr merge --rebase<\/code><\/td><\/tr><\/tbody><\/table>\n<h2 id=\"git-safety-rules\">Git Safety Rules<\/h2>\n<table><thead><tr><th>Action<\/th><th>Risk<\/th><th>Rule<\/th><\/tr><\/thead><tbody><tr><td><code>git push --force<\/code><\/td><td>Overwrites remote<\/td><td>NEVER on main/master, ask user first<\/td><\/tr><tr><td><code>git reset --hard<\/code><\/td><td>Loses local changes<\/td><td>Confirm with user first<\/td><\/tr><tr><td><code>git checkout .<\/code><\/td><td>Discards changes<\/td><td>Confirm with user first<\/td><\/tr><tr><td><code>git branch -D<\/code><\/td><td>Deletes branch<\/td><td>Only after merge confirmed<\/td><\/tr><tr><td><code>--no-verify<\/code><\/td><td>Skips hooks<\/td><td>NEVER unless user explicitly requests<\/td><\/tr><tr><td><code>git rebase -i<\/code><\/td><td>Interactive (not supported)<\/td><td>NEVER use (requires interactive input)<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"context-memory-in-commits\">Context Memory in Commits<\/h2>\n<p>Embed decision context in commit messages for future session continuity:<\/p>\n<pre><code>feat(auth): implement JWT refresh token rotation\n\nDecision: Chose rotation over sliding window for security\nPattern: Middleware chain: RateLimit -&gt; Auth -&gt; Authz -&gt; Handler\nGotcha: Token blacklist requires Redis, not just in-memory cache\n\nRefs: SPEC-AUTH-001<\/code><\/pre>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"I will clean up the commit messages before merging\"<\/td><td>Interactive rebase is error-prone under pressure. Write clean commits from the start.<\/td><\/tr><tr><td>\"Force push is fine on my feature branch\"<\/td><td>Collaborators or CI may have fetched the branch. Force push destroys their reference. Use --force-with-lease.<\/td><\/tr><tr><td>\"This commit is too small to need a conventional format\"<\/td><td>Changelog generators, bisect, and blame all depend on consistent commit formats. Every commit matters.<\/td><\/tr><tr><td>\"I will push directly to main, it is a small fix\"<\/td><td>Direct pushes bypass code review and CI. Even small fixes can break production.<\/td><\/tr><tr><td>\"Merge commits are messy, I always squash\"<\/td><td>Squash loses individual commit context. Merge commits preserve the development narrative for future debugging.<\/td><\/tr><\/tbody><\/table>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>Commit message does not follow conventional format (type(scope): description)<\/li><li>Force push to main or shared release branch<\/li><li>PR merged without CI passing<\/li><li>Branch name does not indicate feature, fix, or SPEC reference<\/li><li>Merge conflict markers found in committed files<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] All commit messages follow conventional format (show git log --oneline)<\/li><li>[ ] Branch name follows convention (feature/, fix/, chore/ prefix)<\/li><li>[ ] No force pushes to main or protected branches (check reflog or CI)<\/li><li>[ ] PR has passing CI checks before merge<\/li><li>[ ] No merge conflict markers in committed files (grep for &lt;&lt;&lt;&lt;&lt;&lt;&lt;)<\/li><li>[ ] SPEC-ID referenced in commit message or PR description when applicable<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"Git Workflow Reference Target Agent manager-git - Applies these patterns directly to git operations, branch management, and PR creation. Branch Strategy Patterns GitHub Flow (Default for Most Projects) main ───────────────────────────────────────── └── feat/SPEC-XXX-description ──── PR ──→ merge Rules: main is always deployable Feature branches from main PR required for all merges Delete branch after merge GitFlow (Complex Release Cycles) main ────────────────────────────────────────── └── develop ───────────────────────────────── ├── feature/SPEC-XXX ──── PR ──→ develop └── release/v1.2.0 ────── PR ──→ main + develop Trunk-Based (CI/CD Heavy) main ────────────────────────────────────────── └── short-lived branch (< 1 day) ──→ merge Branch Naming Convention Pattern Example Use Case feat/SPEC-{ID}-{slug} feat/SPEC-AUTH-001-jwt-auth New feature fix/SPEC-{ID}-{slug} fix/SPEC-BUG-042-null-check Bug fix refactor/{slug} refactor/extract-auth-middleware Refactoring docs/{slug} docs/api-reference-update Documentation chore/{slug} chore/upgrade-dependencies Maintenance Conventional Commits Reference Type When Example feat New feature feat(auth): add JWT refresh token flow fix Bug fix fix(api): handle null user in profile endpoint refactor Code restructure refactor(db): extract query builder test Test changes test(auth): add login edge case tests docs Documentation docs(api): update endpoint descriptions chore Maintenance chore(deps): upgrade Go to 1.23 perf Performance perf(query): add index for user lookup style Formatting style: apply gofmt formatting ci CI/CD changes ci: add GitHub Actions workflow revert Revert commit revert: undo feat(auth) commit abc123 Commit Message Structure <type>(<scope>): <description> # max 72 chars [optional body] # what and why, not how [optional footer] # Breaking changes, issue refs BREAKING CHANGE: <description> Refs: #123, SPEC-AUTH-001 Pull Request Template ## Summary - [1-3 bullet points describing what this PR does] ## Changes - [ ] File 1: description of change - [ ] File 2: description of change ## Test Plan - [ ] Unit tests added/updated - [ ] Integration tests pass - [ ] Manual testing completed ## SPEC Reference - SPEC-{ID}: {title} ## Checklist - [ ] Tests pass (`go test ./...`) - [ ] Linting pass (`golangci-lint run`) - [ ] No secrets committed - [ ] Documentation updated if needed Merge Strategy Selection Strategy When Command Squash merge Feature branches (clean history) gh pr merge --squash Merge commit Release branches (preserve history) gh pr merge --merge Rebase Small, clean commits gh pr merge --rebase Git Safety Rules Action Risk Rule git push --force Overwrites remote NEVER on main/master, ask user first git reset --hard Loses local changes Confirm with user first git checkout . Discards changes Confirm with user first git branch -D Deletes branch Only after merge confirmed --no-verify Skips hooks NEVER unless user explicitly requests git rebase -i Interactive (not supported) NEVER use (requires interactive input) Context Memory in Commits Embed decision context in commit messages for future session continuity: feat(auth): implement JWT refresh token rotation Decision: Chose rotation over sliding window for security Pattern: Middleware chain: RateLimit -> Auth -> Authz -> Handler Gotcha: Token blacklist requires Redis, not just in-memory cache Refs: SPEC-AUTH-001 <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"I will clean up the commit messages before merging\" Interactive rebase is error-prone under pressure. Write clean commits from the start. \"Force push is fine on my feature branch\" Collaborators or CI may have fetched the branch. Force push destroys their reference. Use --force-with-lease. \"This commit is too small to need a conventional format\" Changelog generators, bisect, and blame all depend on consistent commit formats. Every commit matters. \"I will push directly to main, it is a small fix\" Direct pushes bypass code review and CI. Even small fixes can break production. \"Merge commits are messy, I always squash\" Squash loses individual commit context. Merge commits preserve the development narrative for future debugging. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags Commit message does not follow conventional format (type(scope): description) Force push to main or shared release branch PR merged without CI passing Branch name does not indicate feature, fix, or SPEC reference Merge conflict markers found in committed files <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] All commit messages follow conventional format (show git log --oneline) [ ] Branch name follows convention (feature/, fix/, chore/ prefix) [ ] No force pushes to main or protected branches (check reflog or CI) [ ] PR has passing CI checks before merge [ ] No merge conflict markers in committed files (grep for <<<<<<<) [ ] SPEC-ID referenced in commit message or PR description when applicable <!-- machine:evolvable-end -->"},{"id":".claude/skills/ref-owasp-checklist/SKILL.md","title":"ref-owasp-checklist","category":"Skills","path":".claude/skills/ref-owasp-checklist/SKILL.md","desc":">","html":"<h1 id=\"owasp-security-checklist-reference\">OWASP Security Checklist Reference<\/h1>\n<h2 id=\"target-agents\">Target Agents<\/h2>\n<ul><li><code>expert-security<\/code> - Primary: applies checklist during security audits<\/li><li><code>expert-backend<\/code> - Secondary: applies during API implementation<\/li><\/ul>\n<h2 id=\"owasp-api-security-top-10\">OWASP API Security Top 10<\/h2>\n<table><thead><tr><th>Rank<\/th><th>Vulnerability<\/th><th>Check<\/th><th>Defense<\/th><\/tr><\/thead><tbody><tr><td>A1<\/td><td><strong>BOLA<\/strong> (Broken Object Level Authorization)<\/td><td>Can user A access user B's resources?<\/td><td>Verify object ownership at every endpoint<\/td><\/tr><tr><td>A2<\/td><td><strong>Broken Authentication<\/strong><\/td><td>Weak passwords, unlimited login attempts?<\/td><td>bcrypt (cost 12+), rate limit, MFA<\/td><\/tr><tr><td>A3<\/td><td><strong>Broken Object Property Level Authorization<\/strong><\/td><td>Are hidden fields exposed in responses?<\/td><td>Response DTOs, field-level filtering<\/td><\/tr><tr><td>A4<\/td><td><strong>Unrestricted Resource Consumption<\/strong><\/td><td>Can mass requests crash the server?<\/td><td>Rate limiting, enforce pagination limits<\/td><\/tr><tr><td>A5<\/td><td><strong>Broken Function Level Authorization<\/strong><\/td><td>Can regular users call admin APIs?<\/td><td>RBAC middleware, permission checks<\/td><\/tr><tr><td>A6<\/td><td><strong>SSRF<\/strong> (Server-Side Request Forgery)<\/td><td>Can URL input access internal resources?<\/td><td>URL whitelist, block internal IPs<\/td><\/tr><tr><td>A7<\/td><td><strong>Security Misconfiguration<\/strong><\/td><td>Debug mode, default accounts exposed?<\/td><td>Separate prod config, inspect headers<\/td><\/tr><tr><td>A8<\/td><td><strong>Lack of Automated Threat Protection<\/strong><\/td><td>Can APIs be called in abnormal sequences?<\/td><td>State machine validation, business rules<\/td><\/tr><tr><td>A9<\/td><td><strong>Improper Asset Management<\/strong><\/td><td>Unused APIs, old versions exposed?<\/td><td>API inventory, version deprecation<\/td><\/tr><tr><td>A10<\/td><td><strong>Unsafe API Consumption<\/strong><\/td><td>Are external API responses trusted blindly?<\/td><td>Validate external responses, set timeouts<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"authentication-checklist\">Authentication Checklist<\/h2>\n<h3 id=\"password-policy\">Password Policy<\/h3>\n<ul><li>Minimum 8 characters, show strength meter (not strict rules)<\/li><li>bcrypt (cost factor 12+) or Argon2id<\/li><li>Temporary lock after 5 failed attempts (15 min) or CAPTCHA<\/li><li>Prevent reuse of last 5 passwords<\/li><\/ul>\n<h3 id=\"jwt-configuration\">JWT Configuration<\/h3>\n<table><thead><tr><th>Setting<\/th><th>Recommended Value<\/th><\/tr><\/thead><tbody><tr><td>Access Token Expiry<\/td><td>15-30 minutes<\/td><\/tr><tr><td>Refresh Token Expiry<\/td><td>7-14 days<\/td><\/tr><tr><td>Algorithm<\/td><td>RS256 (asymmetric) or HS256<\/td><\/tr><tr><td>Storage<\/td><td>httpOnly + secure + sameSite cookie<\/td><\/tr><tr><td>Payload<\/td><td>Minimal: userId, role only (no PII)<\/td><\/tr><tr><td>Renewal<\/td><td>Silent refresh or token rotation<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"session-security\">Session Security<\/h3>\n<ul><li>Regenerate session ID after login<\/li><li>Invalidate session on logout (server-side)<\/li><li>Set session timeout (30 min idle)<\/li><li>Bind session to IP/User-Agent (optional, strict)<\/li><\/ul>\n<h2 id=\"http-security-headers\">HTTP Security Headers<\/h2>\n<table><thead><tr><th>Header<\/th><th>Value<\/th><th>Purpose<\/th><\/tr><\/thead><tbody><tr><td><code>Strict-Transport-Security<\/code><\/td><td><code>max-age=31536000; includeSubDomains<\/code><\/td><td>Force HTTPS<\/td><\/tr><tr><td><code>X-Content-Type-Options<\/code><\/td><td><code>nosniff<\/code><\/td><td>Prevent MIME sniffing<\/td><\/tr><tr><td><code>X-Frame-Options<\/code><\/td><td><code>DENY<\/code> or <code>SAMEORIGIN<\/code><\/td><td>Prevent clickjacking<\/td><\/tr><tr><td><code>Content-Security-Policy<\/code><\/td><td><code>default-src &#x27;self&#x27;<\/code><\/td><td>Prevent XSS<\/td><\/tr><tr><td><code>Referrer-Policy<\/code><\/td><td><code>strict-origin-when-cross-origin<\/code><\/td><td>Limit referrer<\/td><\/tr><tr><td><code>Permissions-Policy<\/code><\/td><td><code>camera=(), microphone=()<\/code><\/td><td>Restrict browser features<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"input-validation-checklist\">Input Validation Checklist<\/h2>\n<table><thead><tr><th>Type<\/th><th>Method<\/th><th>Tool<\/th><\/tr><\/thead><tbody><tr><td>Schema validation<\/td><td>Type + structure check<\/td><td>Zod, Joi, pydantic, Go validator<\/td><\/tr><tr><td>Length limits<\/td><td>Min/max constraints<\/td><td>Schema definitions<\/td><\/tr><tr><td>SQL Injection<\/td><td>Parameterized queries<\/td><td>ORM (Prisma, GORM, SQLAlchemy)<\/td><\/tr><tr><td>XSS Prevention<\/td><td>HTML escaping<\/td><td>DOMPurify (client), server escape<\/td><\/tr><tr><td>Path Traversal<\/td><td>Path normalization<\/td><td>filepath.Clean + whitelist<\/td><\/tr><tr><td>File Upload<\/td><td>Type + size validation<\/td><td>MIME type + magic number check<\/td><\/tr><tr><td>CORS<\/td><td>Origin whitelist<\/td><td>Never <code>origin: &#x27;*&#x27;<\/code> with credentials<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"sensitive-data-handling\">Sensitive Data Handling<\/h2>\n<table><thead><tr><th>Data Type<\/th><th>Storage<\/th><th>Transmission<\/th><th>Logging<\/th><\/tr><\/thead><tbody><tr><td>Passwords<\/td><td>bcrypt hash only<\/td><td>HTTPS only<\/td><td>NEVER<\/td><\/tr><tr><td>API Keys<\/td><td>Environment variables<\/td><td>Header (Authorization)<\/td><td>Masked (first 4 chars)<\/td><\/tr><tr><td>PII<\/td><td>Encrypted (AES-256)<\/td><td>HTTPS only<\/td><td>Masked<\/td><\/tr><tr><td>Credit Cards<\/td><td>Tokenized (payment provider)<\/td><td>Provider SDK<\/td><td>NEVER<\/td><\/tr><tr><td>Sessions<\/td><td>httpOnly cookie<\/td><td>HTTPS only<\/td><td>NEVER<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"security-review-severity-levels\">Security Review Severity Levels<\/h2>\n<table><thead><tr><th>Level<\/th><th>Label<\/th><th>Action<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>P0<\/td><td>CRITICAL<\/td><td>Block release<\/td><td>SQL injection, auth bypass<\/td><\/tr><tr><td>P1<\/td><td>HIGH<\/td><td>Fix before merge<\/td><td>Missing authorization check<\/td><\/tr><tr><td>P2<\/td><td>MEDIUM<\/td><td>Fix within sprint<\/td><td>Weak password policy<\/td><\/tr><tr><td>P3<\/td><td>LOW<\/td><td>Track in backlog<\/td><td>Missing security header<\/td><\/tr><\/tbody><\/table>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"This is an internal application, OWASP does not apply\"<\/td><td>Internal applications are reachable from compromised internal services. OWASP applies to all web applications.<\/td><\/tr><tr><td>\"The framework handles XSS protection\"<\/td><td>Frameworks protect default rendering paths. Dynamic HTML insertion, innerHTML, and template literals bypass the protection.<\/td><\/tr><tr><td>\"We do not store sensitive data, so encryption is unnecessary\"<\/td><td>Session tokens, API keys, and PII are sensitive data. If the application has users, it has sensitive data.<\/td><\/tr><tr><td>\"Security headers are just defense-in-depth, not critical\"<\/td><td>Each security header blocks a specific attack class. Missing CSP enables XSS even when output is escaped.<\/td><\/tr><tr><td>\"I will do a security review before release\"<\/td><td>Late security reviews find issues that are expensive to fix. Secure coding practices prevent them from the start.<\/td><\/tr><\/tbody><\/table>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>User input rendered in HTML without escaping or sanitization<\/li><li>SQL query built with string concatenation instead of parameterized queries<\/li><li>Authentication token stored in localStorage instead of httpOnly cookie<\/li><li>Missing Content-Security-Policy header on response<\/li><li>Secrets (API keys, passwords) found in source code or configuration files committed to git<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] OWASP Top 10 checklist reviewed for the change (show which items were evaluated)<\/li><li>[ ] User input sanitized before rendering in HTML output<\/li><li>[ ] All database queries use parameterized statements<\/li><li>[ ] Security headers present (CSP, X-Frame-Options, X-Content-Type-Options)<\/li><li>[ ] No secrets found in source code (show grep results for common secret patterns)<\/li><li>[ ] Authentication tokens use httpOnly, Secure, SameSite cookie attributes<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"OWASP Security Checklist Reference Target Agents expert-security - Primary: applies checklist during security audits expert-backend - Secondary: applies during API implementation OWASP API Security Top 10 Rank Vulnerability Check Defense A1 BOLA (Broken Object Level Authorization) Can user A access user B's resources? Verify object ownership at every endpoint A2 Broken Authentication Weak passwords, unlimited login attempts? bcrypt (cost 12+), rate limit, MFA A3 Broken Object Property Level Authorization Are hidden fields exposed in responses? Response DTOs, field-level filtering A4 Unrestricted Resource Consumption Can mass requests crash the server? Rate limiting, enforce pagination limits A5 Broken Function Level Authorization Can regular users call admin APIs? RBAC middleware, permission checks A6 SSRF (Server-Side Request Forgery) Can URL input access internal resources? URL whitelist, block internal IPs A7 Security Misconfiguration Debug mode, default accounts exposed? Separate prod config, inspect headers A8 Lack of Automated Threat Protection Can APIs be called in abnormal sequences? State machine validation, business rules A9 Improper Asset Management Unused APIs, old versions exposed? API inventory, version deprecation A10 Unsafe API Consumption Are external API responses trusted blindly? Validate external responses, set timeouts Authentication Checklist Password Policy Minimum 8 characters, show strength meter (not strict rules) bcrypt (cost factor 12+) or Argon2id Temporary lock after 5 failed attempts (15 min) or CAPTCHA Prevent reuse of last 5 passwords JWT Configuration Setting Recommended Value Access Token Expiry 15-30 minutes Refresh Token Expiry 7-14 days Algorithm RS256 (asymmetric) or HS256 Storage httpOnly + secure + sameSite cookie Payload Minimal: userId, role only (no PII) Renewal Silent refresh or token rotation Session Security Regenerate session ID after login Invalidate session on logout (server-side) Set session timeout (30 min idle) Bind session to IP/User-Agent (optional, strict) HTTP Security Headers Header Value Purpose Strict-Transport-Security max-age=31536000; includeSubDomains Force HTTPS X-Content-Type-Options nosniff Prevent MIME sniffing X-Frame-Options DENY or SAMEORIGIN Prevent clickjacking Content-Security-Policy default-src 'self' Prevent XSS Referrer-Policy strict-origin-when-cross-origin Limit referrer Permissions-Policy camera=(), microphone=() Restrict browser features Input Validation Checklist Type Method Tool Schema validation Type + structure check Zod, Joi, pydantic, Go validator Length limits Min/max constraints Schema definitions SQL Injection Parameterized queries ORM (Prisma, GORM, SQLAlchemy) XSS Prevention HTML escaping DOMPurify (client), server escape Path Traversal Path normalization filepath.Clean + whitelist File Upload Type + size validation MIME type + magic number check CORS Origin whitelist Never origin: '*' with credentials Sensitive Data Handling Data Type Storage Transmission Logging Passwords bcrypt hash only HTTPS only NEVER API Keys Environment variables Header (Authorization) Masked (first 4 chars) PII Encrypted (AES-256) HTTPS only Masked Credit Cards Tokenized (payment provider) Provider SDK NEVER Sessions httpOnly cookie HTTPS only NEVER Security Review Severity Levels Level Label Action Example P0 CRITICAL Block release SQL injection, auth bypass P1 HIGH Fix before merge Missing authorization check P2 MEDIUM Fix within sprint Weak password policy P3 LOW Track in backlog Missing security header <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"This is an internal application, OWASP does not apply\" Internal applications are reachable from compromised internal services. OWASP applies to all web applications. \"The framework handles XSS protection\" Frameworks protect default rendering paths. Dynamic HTML insertion, innerHTML, and template literals bypass the protection. \"We do not store sensitive data, so encryption is unnecessary\" Session tokens, API keys, and PII are sensitive data. If the application has users, it has sensitive data. \"Security headers are just defense-in-depth, not critical\" Each security header blocks a specific attack class. Missing CSP enables XSS even when output is escaped. \"I will do a security review before release\" Late security reviews find issues that are expensive to fix. Secure coding practices prevent them from the start. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags User input rendered in HTML without escaping or sanitization SQL query built with string concatenation instead of parameterized queries Authentication token stored in localStorage instead of httpOnly cookie Missing Content-Security-Policy header on response Secrets (API keys, passwords) found in source code or configuration files committed to git <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] OWASP Top 10 checklist reviewed for the change (show which items were evaluated) [ ] User input sanitized before rendering in HTML output [ ] All database queries use parameterized statements [ ] Security headers present (CSP, X-Frame-Options, X-Content-Type-Options) [ ] No secrets found in source code (show grep results for common secret patterns) [ ] Authentication tokens use httpOnly, Secure, SameSite cookie attributes <!-- machine:evolvable-end -->"},{"id":".claude/skills/ref-testing-pyramid/SKILL.md","title":"ref-testing-pyramid","category":"Skills","path":".claude/skills/ref-testing-pyramid/SKILL.md","desc":">","html":"<h1 id=\"testing-pyramid-reference\">Testing Pyramid Reference<\/h1>\n<h2 id=\"target-agents\">Target Agents<\/h2>\n<ul><li><code>expert-testing<\/code> - Primary: applies patterns during test creation and coverage analysis<\/li><li><code>manager-tdd<\/code> - Secondary: applies during RED-GREEN-REFACTOR cycles<\/li><\/ul>\n<h2 id=\"test-pyramid-ratios\">Test Pyramid Ratios<\/h2>\n<pre><code>       /  E2E  \\        10% — Critical user journeys only\n      /----------\\\n     / Integration \\    20% — API endpoints, DB queries, service boundaries\n    /----------------\\\n   /    Unit Tests    \\  70% — Functions, hooks, utilities, pure logic\n  /--------------------\\<\/code><\/pre>\n<table><thead><tr><th>Level<\/th><th>Speed<\/th><th>Reliability<\/th><th>Maintenance<\/th><th>Coverage Target<\/th><\/tr><\/thead><tbody><tr><td>Unit<\/td><td>Fast (&lt;100ms)<\/td><td>High<\/td><td>Low<\/td><td>70% of tests<\/td><\/tr><tr><td>Integration<\/td><td>Medium (1-5s)<\/td><td>Medium<\/td><td>Medium<\/td><td>20% of tests<\/td><\/tr><tr><td>E2E<\/td><td>Slow (10-60s)<\/td><td>Lower<\/td><td>High<\/td><td>10% of tests<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"coverage-targets-by-context\">Coverage Targets by Context<\/h2>\n<table><thead><tr><th>Context<\/th><th>Target<\/th><th>Rationale<\/th><\/tr><\/thead><tbody><tr><td>Critical business logic<\/td><td>95%+<\/td><td>Revenue/security impact<\/td><\/tr><tr><td>API endpoints<\/td><td>90%+<\/td><td>Contract compliance<\/td><\/tr><tr><td>Utility functions<\/td><td>85%+<\/td><td>Reuse reliability<\/td><\/tr><tr><td>UI components<\/td><td>80%+<\/td><td>Rendering correctness<\/td><\/tr><tr><td>Configuration/glue code<\/td><td>60%+<\/td><td>Low complexity<\/td><\/tr><tr><td>Generated code<\/td><td>0%<\/td><td>Don't test generated code<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"test-pattern-aaa-arrange-act-assert\">Test Pattern: AAA (Arrange-Act-Assert)<\/h2>\n<pre><code>// Arrange: Set up test data and preconditions\ninput := CreateTestUser(&quot;test@example.com&quot;)\n\n// Act: Execute the function under test\nresult, err := service.CreateUser(ctx, input)\n\n// Assert: Verify the outcome\nassert.NoError(t, err)\nassert.Equal(t, &quot;test@example.com&quot;, result.Email)<\/code><\/pre>\n<h2 id=\"unit-test-patterns\">Unit Test Patterns<\/h2>\n<table><thead><tr><th>Pattern<\/th><th>When<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>Table-Driven<\/td><td>Multiple input/output combinations<\/td><td>Go: <code>tests := []struct{...}<\/code><\/td><\/tr><tr><td>Mock/Stub<\/td><td>External dependencies (DB, API)<\/td><td>Interface injection, mock frameworks<\/td><\/tr><tr><td>Snapshot<\/td><td>Complex output comparison<\/td><td>Jest snapshots, golden files<\/td><\/tr><tr><td>Property-Based<\/td><td>Mathematical properties<\/td><td>quickcheck, hypothesis<\/td><\/tr><tr><td>Boundary Value<\/td><td>Edge cases<\/td><td>0, -1, MAX_INT, empty string, nil<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"integration-test-patterns\">Integration Test Patterns<\/h2>\n<table><thead><tr><th>Pattern<\/th><th>When<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>Testcontainers<\/td><td>Real DB needed<\/td><td>Docker-based PostgreSQL for tests<\/td><\/tr><tr><td>HTTP Test Server<\/td><td>API endpoint testing<\/td><td>httptest.NewServer (Go), supertest (Node)<\/td><\/tr><tr><td>In-Memory DB<\/td><td>Fast DB tests<\/td><td>SQLite for development<\/td><\/tr><tr><td>Fixture Loading<\/td><td>Consistent test data<\/td><td>Factory functions, seed files<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"what-to-test-vs-what-not-to-test\">What to Test vs What NOT to Test<\/h2>\n<h3 id=\"always-test\">ALWAYS Test<\/h3>\n<ul><li>Business logic and calculations<\/li><li>Input validation and error handling<\/li><li>Authentication and authorization flows<\/li><li>Data transformations and mappings<\/li><li>Edge cases and boundary conditions<\/li><li>Race conditions (with -race flag in Go)<\/li><\/ul>\n<h3 id=\"never-test\">NEVER Test<\/h3>\n<ul><li>Framework internals (React rendering, Express routing)<\/li><li>Third-party library behavior<\/li><li>Simple getters/setters with no logic<\/li><li>Private methods directly (test via public API)<\/li><li>Generated code (protobuf, swagger)<\/li><li>CSS styling and layout (use visual regression tools instead)<\/li><\/ul>\n<h2 id=\"test-quality-metrics\">Test Quality Metrics<\/h2>\n<table><thead><tr><th>Metric<\/th><th>Target<\/th><th>Tool<\/th><\/tr><\/thead><tbody><tr><td>Line Coverage<\/td><td>85%+<\/td><td>go test -cover, istanbul, coverage.py<\/td><\/tr><tr><td>Branch Coverage<\/td><td>75%+<\/td><td>go test -covermode=count<\/td><\/tr><tr><td>Mutation Score<\/td><td>70%+<\/td><td>go-mutesting, Stryker<\/td><\/tr><tr><td>Test Execution Time<\/td><td>&lt;2 min (unit), &lt;10 min (all)<\/td><td>CI timer<\/td><\/tr><tr><td>Flaky Test Rate<\/td><td>&lt;1%<\/td><td>CI history analysis<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"test-file-conventions\">Test File Conventions<\/h2>\n<table><thead><tr><th>Language<\/th><th>Test File<\/th><th>Location<\/th><\/tr><\/thead><tbody><tr><td>Go<\/td><td><code>*_test.go<\/code><\/td><td>Same package<\/td><\/tr><tr><td>TypeScript<\/td><td><code>*.test.ts<\/code> / <code>*.spec.ts<\/code><\/td><td><code>__tests__/<\/code> or co-located<\/td><\/tr><tr><td>Python<\/td><td><code>test_*.py<\/code><\/td><td><code>tests/<\/code> directory<\/td><\/tr><tr><td>Java<\/td><td><code>*Test.java<\/code><\/td><td><code>src/test/<\/code> mirror<\/td><\/tr><tr><td>Rust<\/td><td><code>#[cfg(test)] mod tests<\/code><\/td><td>Same file or <code>tests/<\/code><\/td><\/tr><\/tbody><\/table>\n<h2 id=\"tdd-red-green-refactor-quick-reference\">TDD RED-GREEN-REFACTOR Quick Reference<\/h2>\n<pre><code>RED:     Write a failing test that defines expected behavior\nGREEN:   Write minimal code to make the test pass\nREFACTOR: Clean up while keeping tests green<\/code><\/pre>\n<p>Rules:<\/p>\n<ul><li>Never write production code without a failing test<\/li><li>Write the smallest test that fails<\/li><li>Write the simplest code that passes<\/li><li>Refactor only when all tests are green<\/li><li>One assertion per test (when practical)<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"E2E tests cover everything, unit tests are redundant\"<\/td><td>E2E tests are slow and flaky. Unit tests provide fast, precise feedback. The pyramid exists because each level serves a different purpose.<\/td><\/tr><tr><td>\"Integration tests are more realistic than unit tests\"<\/td><td>Realism comes at the cost of speed and isolation. A balanced pyramid gives both fast feedback and realistic validation.<\/td><\/tr><tr><td>\"100% code coverage means the code is well tested\"<\/td><td>Coverage measures execution, not correctness. A test that executes code without meaningful assertions provides zero value.<\/td><\/tr><tr><td>\"Mocking is bad, I prefer real dependencies\"<\/td><td>Real dependencies make tests slow and non-deterministic. Mock at boundaries, test business logic in isolation.<\/td><\/tr><tr><td>\"This test is flaky, but it catches real bugs sometimes\"<\/td><td>Flaky tests erode trust in the entire suite. Fix the flakiness or quarantine the test with a tracking issue.<\/td><\/tr><\/tbody><\/table>\n<p><strong>DAMP over DRY<\/strong>: Test code should be descriptive and self-contained. A reader should understand the test without reading shared fixtures or helper methods.<\/p>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>Test pyramid inverted: more E2E tests than unit tests<\/li><li>Unit tests depend on external services (databases, APIs, file systems)<\/li><li>Test assertions check implementation details instead of behavior<\/li><li>No integration tests between unit and E2E layers<\/li><li>Flaky test present without a quarantine label or tracking issue<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] Test distribution follows the pyramid: unit &gt; integration &gt; E2E (show test counts per category)<\/li><li>[ ] Unit tests run in under 30 seconds total<\/li><li>[ ] Integration tests mock external dependencies at the boundary<\/li><li>[ ] No flaky tests in the active suite (run 3x to verify stability)<\/li><li>[ ] Test names describe behavior, not implementation (review naming convention)<\/li><li>[ ] Coverage report shows meaningful assertions, not just line execution<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"Testing Pyramid Reference Target Agents expert-testing - Primary: applies patterns during test creation and coverage analysis manager-tdd - Secondary: applies during RED-GREEN-REFACTOR cycles Test Pyramid Ratios / E2E \\ 10% — Critical user journeys only /----------\\ / Integration \\ 20% — API endpoints, DB queries, service boundaries /----------------\\ / Unit Tests \\ 70% — Functions, hooks, utilities, pure logic /--------------------\\ Level Speed Reliability Maintenance Coverage Target Unit Fast (<100ms) High Low 70% of tests Integration Medium (1-5s) Medium Medium 20% of tests E2E Slow (10-60s) Lower High 10% of tests Coverage Targets by Context Context Target Rationale Critical business logic 95%+ Revenue/security impact API endpoints 90%+ Contract compliance Utility functions 85%+ Reuse reliability UI components 80%+ Rendering correctness Configuration/glue code 60%+ Low complexity Generated code 0% Don't test generated code Test Pattern: AAA (Arrange-Act-Assert) // Arrange: Set up test data and preconditions input := CreateTestUser(\"test@example.com\") // Act: Execute the function under test result, err := service.CreateUser(ctx, input) // Assert: Verify the outcome assert.NoError(t, err) assert.Equal(t, \"test@example.com\", result.Email) Unit Test Patterns Pattern When Example Table-Driven Multiple input/output combinations Go: tests := []struct{...} Mock/Stub External dependencies (DB, API) Interface injection, mock frameworks Snapshot Complex output comparison Jest snapshots, golden files Property-Based Mathematical properties quickcheck, hypothesis Boundary Value Edge cases 0, -1, MAX_INT, empty string, nil Integration Test Patterns Pattern When Example Testcontainers Real DB needed Docker-based PostgreSQL for tests HTTP Test Server API endpoint testing httptest.NewServer (Go), supertest (Node) In-Memory DB Fast DB tests SQLite for development Fixture Loading Consistent test data Factory functions, seed files What to Test vs What NOT to Test ALWAYS Test Business logic and calculations Input validation and error handling Authentication and authorization flows Data transformations and mappings Edge cases and boundary conditions Race conditions (with -race flag in Go) NEVER Test Framework internals (React rendering, Express routing) Third-party library behavior Simple getters/setters with no logic Private methods directly (test via public API) Generated code (protobuf, swagger) CSS styling and layout (use visual regression tools instead) Test Quality Metrics Metric Target Tool Line Coverage 85%+ go test -cover, istanbul, coverage.py Branch Coverage 75%+ go test -covermode=count Mutation Score 70%+ go-mutesting, Stryker Test Execution Time <2 min (unit), <10 min (all) CI timer Flaky Test Rate <1% CI history analysis Test File Conventions Language Test File Location Go *_test.go Same package TypeScript *.test.ts / *.spec.ts __tests__/ or co-located Python test_*.py tests/ directory Java *Test.java src/test/ mirror Rust #[cfg(test)] mod tests Same file or tests/ TDD RED-GREEN-REFACTOR Quick Reference RED: Write a failing test that defines expected behavior GREEN: Write minimal code to make the test pass REFACTOR: Clean up while keeping tests green Rules: Never write production code without a failing test Write the smallest test that fails Write the simplest code that passes Refactor only when all tests are green One assertion per test (when practical) <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"E2E tests cover everything, unit tests are redundant\" E2E tests are slow and flaky. Unit tests provide fast, precise feedback. The pyramid exists because each level serves a different purpose. \"Integration tests are more realistic than unit tests\" Realism comes at the cost of speed and isolation. A balanced pyramid gives both fast feedback and realistic validation. \"100% code coverage means the code is well tested\" Coverage measures execution, not correctness. A test that executes code without meaningful assertions provides zero value. \"Mocking is bad, I prefer real dependencies\" Real dependencies make tests slow and non-deterministic. Mock at boundaries, test business logic in isolation. \"This test is flaky, but it catches real bugs sometimes\" Flaky tests erode trust in the entire suite. Fix the flakiness or quarantine the test with a tracking issue. DAMP over DRY : Test code should be descriptive and self-contained. A reader should understand the test without reading shared fixtures or helper methods. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags Test pyramid inverted: more E2E tests than unit tests Unit tests depend on external services (databases, APIs, file systems) Test assertions check implementation details instead of behavior No integration tests between unit and E2E layers Flaky test present without a quarantine label or tracking issue <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] Test distribution follows the pyramid: unit > integration > E2E (show test counts per category) [ ] Unit tests run in under 30 seconds total [ ] Integration tests mock external dependencies at the boundary [ ] No flaky tests in the active suite (run 3x to verify stability) [ ] Test names describe behavior, not implementation (review naming convention) [ ] Coverage report shows meaningful assertions, not just line execution <!-- machine:evolvable-end -->"},{"id":".claude/skills/rust-best-practices/SKILL.md","title":"rust-best-practices","category":"Skills","path":".claude/skills/rust-best-practices/SKILL.md","desc":"Idiomatic Rust per Apollo GraphQL handbook. Use when (1) writing new Rust, (2) reviewing/refactoring, (3) borrow vs clone, (4) error handling, (5) perf, (6) tests/docs.","html":"<h1 id=\"rust-best-practices\">Rust Best Practices<\/h1>\n<p>Apollo handbook: https://github.com/apollographql/rust-best-practices<\/p>\n<h2 id=\"chapter-index-load-on-demand-parallel-reads-ok\">Chapter index (load on demand, parallel reads OK)<\/h2>\n<ul><li><code>references/chapter_01.md<\/code> — Styles &amp; idioms: borrow vs clone, Copy, Option/Result, iterators, comments<\/li><li><code>references/chapter_02.md<\/code> — Clippy &amp; linting: config, lints, workspace setup<\/li><li><code>references/chapter_03.md<\/code> — Perf mindset: profiling, redundant clones, stack vs heap, zero-cost<\/li><li><code>references/chapter_04.md<\/code> — Errors: Result vs panic, thiserror vs anyhow, hierarchies<\/li><li><code>references/chapter_05.md<\/code> — Tests: naming, one assertion, snapshots<\/li><li><code>references/chapter_06.md<\/code> — Generics &amp; dispatch: static vs dyn, trait objects<\/li><li><code>references/chapter_07.md<\/code> — Type-state pattern<\/li><li><code>references/chapter_08.md<\/code> — Comments vs docs<\/li><li><code>references/chapter_09.md<\/code> — Pointers, Send/Sync, thread safety<\/li><\/ul>\n<h2 id=\"quick-reference\">Quick reference<\/h2>\n<p><strong>Borrow &amp; ownership<\/strong>: prefer <code>&amp;T<\/code> over <code>.clone()<\/code>. <code>&amp;str<\/code> over <code>String<\/code>, <code>&amp;[T]<\/code> over <code>Vec&lt;T&gt;<\/code> in params. Small Copy types (≤24B) by value. <code>Cow&lt;&#x27;_, T&gt;<\/code> when ambiguous.<\/p>\n<p><strong>Errors<\/strong>: <code>Result&lt;T,E&gt;<\/code> for fallible. No <code>panic!<\/code> in prod. No <code>unwrap()<\/code>/<code>expect()<\/code> outside tests. <code>thiserror<\/code> for libs, <code>anyhow<\/code> for binaries. <code>?<\/code> over match chains.<\/p>\n<p><strong>Perf<\/strong>: bench with <code>--release<\/code>. <code>cargo clippy -- -D clippy::perf<\/code>. No clone in loops. <code>.iter()<\/code> over <code>.into_iter()<\/code> for Copy. Iterators over manual loops, avoid intermediate <code>.collect()<\/code>.<\/p>\n<p><strong>Lint<\/strong>: <code>cargo clippy --all-targets --all-features --locked -- -D warnings<\/code>. Watch <code>redundant_clone<\/code>, <code>large_enum_variant<\/code>, <code>needless_collect<\/code>. Use <code>#[expect(clippy::lint)]<\/code> over <code>#[allow]<\/code> with justification.<\/p>\n<p><strong>Tests<\/strong>: descriptive names (<code>process_should_return_error_when_input_empty<\/code>). One assertion when possible. Doc tests for public API. <code>cargo insta<\/code> for snapshots.<\/p>\n<p><strong>Generics<\/strong>: prefer generics (static dispatch) for hot paths. <code>dyn Trait<\/code> only for heterogeneous. Box at API boundaries, not internally.<\/p>\n<p><strong>Type-state<\/strong>: encode states in types to catch invalid ops at compile time:<\/p>\n<pre><code class=\"language-rust\">struct Connection&lt;State&gt; { _state: PhantomData&lt;State&gt; }\nstruct Disconnected; struct Connected;\nimpl Connection&lt;Connected&gt; { fn send(&amp;self, data: &amp;[u8]) {} }<\/code><\/pre>\n<p><strong>Docs<\/strong>: <code>//<\/code> = <em>why<\/em> (safety, workarounds, rationale). <code>///<\/code> = <em>what/how<\/em> for public APIs. Every TODO links issue: <code>// TODO(#42): ...<\/code>. Libs: <code>#![deny(missing_docs)]<\/code>.<\/p>","text":"Rust Best Practices Apollo handbook: https://github.com/apollographql/rust-best-practices Chapter index (load on demand, parallel reads OK) references/chapter_01.md — Styles & idioms: borrow vs clone, Copy, Option/Result, iterators, comments references/chapter_02.md — Clippy & linting: config, lints, workspace setup references/chapter_03.md — Perf mindset: profiling, redundant clones, stack vs heap, zero-cost references/chapter_04.md — Errors: Result vs panic, thiserror vs anyhow, hierarchies references/chapter_05.md — Tests: naming, one assertion, snapshots references/chapter_06.md — Generics & dispatch: static vs dyn, trait objects references/chapter_07.md — Type-state pattern references/chapter_08.md — Comments vs docs references/chapter_09.md — Pointers, Send/Sync, thread safety Quick reference Borrow & ownership : prefer &T over .clone() . &str over String , &[T] over Vec<T> in params. Small Copy types (≤24B) by value. Cow<'_, T> when ambiguous. Errors : Result<T,E> for fallible. No panic! in prod. No unwrap() / expect() outside tests. thiserror for libs, anyhow for binaries. ? over match chains. Perf : bench with --release . cargo clippy -- -D clippy::perf . No clone in loops. .iter() over .into_iter() for Copy. Iterators over manual loops, avoid intermediate .collect() . Lint : cargo clippy --all-targets --all-features --locked -- -D warnings . Watch redundant_clone , large_enum_variant , needless_collect . Use #[expect(clippy::lint)] over #[allow] with justification. Tests : descriptive names ( process_should_return_error_when_input_empty ). One assertion when possible. Doc tests for public API. cargo insta for snapshots. Generics : prefer generics (static dispatch) for hot paths. dyn Trait only for heterogeneous. Box at API boundaries, not internally. Type-state : encode states in types to catch invalid ops at compile time: struct Connection<State> { _state: PhantomData<State> } struct Disconnected; struct Connected; impl Connection<Connected> { fn send(&self, data: &[u8]) {} } Docs : // = why (safety, workarounds, rationale). /// = what/how for public APIs. Every TODO links issue: // TODO(#42): ... . Libs: #![deny(missing_docs)] ."},{"id":".claude/skills/rust-best-practices/references/chapter_01.md","title":"Chapter 1 — Coding Styles & Idioms","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_01.md","desc":"","html":"<h1 id=\"chapter-1-coding-styles-idioms\">Chapter 1 — Coding Styles &amp; Idioms<\/h1>\n<h2 id=\"1-1-borrow-clone\">1.1 Borrow &gt; Clone<\/h2>\n<p>Prefer <code>&amp;T<\/code> over <code>T.clone()<\/code>. Performance recommendation.<\/p>\n<h3 id=\"when-to-clone\">When to clone<\/h3>\n<ul><li>Need owned copy AND preserve original (immutable snapshot)<\/li><li><code>Arc<\/code>/<code>Rc<\/code> pointers<\/li><li>Cross-thread share (usually <code>Arc<\/code>)<\/li><li>API expects owned data<\/li><li>Avoid massive refactor of non-perf-critical code<\/li><li>Cached return: <code>fn get_config(&amp;self) -&gt; Config { self.cached_config.clone() }<\/code><\/li><\/ul>\n<h3 id=\"clone-traps\">Clone traps<\/h3>\n<ul><li>Auto-clone in loops <code>.map(|x| x.clone())<\/code> — use <code>.cloned()<\/code> / <code>.copied()<\/code> at end<\/li><li>Cloning large <code>Vec&lt;T&gt;<\/code> / <code>HashMap&lt;K,V&gt;<\/code><\/li><li>Clone due to bad API — fix lifetimes<\/li><li>Prefer <code>&amp;[T]<\/code> over <code>Vec&lt;T&gt;<\/code> / <code>&amp;Vec&lt;T&gt;<\/code><\/li><li>Prefer <code>&amp;str<\/code> over <code>String<\/code> / <code>&amp;String<\/code><\/li><li>Clone of reference arg → caller should pass ownership instead<\/li><\/ul>\n<pre><code class=\"language-rust\">// ✅ borrow\nfn process(name: &amp;str) { println!(&quot;Hello {name}&quot;); }\nlet user = String::from(&quot;foo&quot;);\nprocess(&amp;user);\n\n// ❌ redundant clone\nfn process_string(name: String) { ... }\nprocess(user.clone());<\/code><\/pre>\n<h2 id=\"1-2-pass-by-value-copy\">1.2 Pass by value (Copy)<\/h2>\n<p>Small + cheap-to-copy types pass by value. <code>Copy<\/code> trait makes explicit.<\/p>\n<h3 id=\"pass-by-value-when\">Pass by value when<\/h3>\n<ul><li>Type implements <code>Copy<\/code> (<code>u32<\/code>, <code>bool<\/code>, <code>f32<\/code>, small structs)<\/li><li>Move cost negligible<\/li><\/ul>\n<h3 id=\"derive-copy-on-own-types-when\">Derive <code>Copy<\/code> on own types when<\/h3>\n<ul><li>All fields <code>Copy<\/code><\/li><li>Small (≤24 bytes / 2-3 words)<\/li><li>Plain data, no heap (no <code>Vec<\/code>/<code>String<\/code>)<\/li><\/ul>\n<p>❗ Rust arrays stack-allocated. Copyable if inner is <code>Copy<\/code>, but stack overflow risk. See chapter 3.<\/p>\n<p>Primitive sizes: <code>i8/u8<\/code>=1B, <code>i16/u16<\/code>=2B, <code>i32/u32/f32/char<\/code>=4B, <code>i64/u64/f64<\/code>=8B, <code>i128/u128<\/code>=16B, <code>bool<\/code>=1B.<\/p>\n<pre><code class=\"language-rust\">// ✅\n#[derive(Debug, Copy, Clone)]\nstruct Point { x: f32, y: f32, z: f32 }\n\n// ❌\n#[derive(Debug, Clone)]\nstruct BadIdea { age: i32, name: String }  // String not Copy<\/code><\/pre>\n<p>Enums: <code>Copy<\/code> if tags + atoms + all payloads <code>Copy<\/code>. ❗ Enum size = largest variant.<\/p>\n<h2 id=\"1-3-option-t-result-t-e-patterns\">1.3 <code>Option&lt;T&gt;<\/code> &amp; <code>Result&lt;T,E&gt;<\/code> patterns<\/h2>\n<p>Rust 1.65: <code>let Some(x) = … else { … }<\/code> for early returns when missing case is expected.<\/p>\n<h3 id=\"use-match-when\">Use <code>match<\/code> when<\/h3>\n<ul><li>Pattern match against inner <code>T<\/code> and <code>E<\/code><\/li><li>Type transformed to something complex (e.g. <code>Result&lt;T,E&gt;<\/code> → <code>Result&lt;Option&lt;T&gt;, E&gt;<\/code>)<\/li><\/ul>\n<h3 id=\"use-let-pattern-expr-else-diverge-when\">Use <code>let PATTERN = EXPR else { DIVERGE; }<\/code> when<\/h3>\n<ul><li>Diverging code doesn't need failed pattern info<\/li><li>Want to break/continue inside loop<\/li><\/ul>\n<h3 id=\"use-if-let-pattern-expr-else-diverge-when\">Use <code>if let PATTERN = EXPR else { DIVERGE; }<\/code> when<\/h3>\n<ul><li>Diverging code needs extra computation<\/li><\/ul>\n<p>❗ Don't care about <code>Err<\/code> value → use <code>?<\/code> to propagate.<\/p>\n<h3 id=\"bad\">Bad<\/h3>\n<ul><li><code>match { Ok(t) =&gt; Some(t), Err(_) =&gt; None }<\/code> — use <code>.ok()<\/code> / <code>.ok_or()<\/code> / <code>.ok_or_else()<\/code><\/li><li><code>if let<\/code> when divergent is default/precomputed → use <code>let … else<\/code><\/li><li><code>unwrap()<\/code> / <code>expect()<\/code> outside tests<\/li><\/ul>\n<h2 id=\"1-4-prevent-early-allocation\">1.4 Prevent early allocation<\/h2>\n<p>Functions like <code>or<\/code>, <code>map_or<\/code>, <code>unwrap_or<\/code>, <code>ok_or<\/code> evaluate args eagerly. If allocation needed, use <code>_else<\/code> variant.<\/p>\n<pre><code class=\"language-rust\">// ✅\nx.ok_or_else(|| ParseError::ValueAbsent(format!(&quot;val {x}&quot;)))\nx.map_or_else(|e| format!(&quot;Error: {e}&quot;), |v| v.len())\nx.parse_to_option_vec.unwrap_or_else(Vec::new)\n\n// ❌\nx.ok_or(ParseError::ValueAbsent(format!(&quot;val {x}&quot;)))  // formats every call\nx.map_or(format!(&quot;Error&quot;), |v| v.len())<\/code><\/pre>\n<h3 id=\"map-err\">Map err<\/h3>\n<pre><code class=\"language-rust\">x.inspect_err(|err| tracing::error!(&quot;fn: {err}&quot;))\n .map_err(|err| GeneralError::from((&quot;fn&quot;, err)))?;<\/code><\/pre>\n<h2 id=\"1-5-iter-vs-for\">1.5 <code>iter()<\/code> vs <code>for<\/code><\/h2>\n<pre><code class=\"language-rust\">// for\nlet mut sum = 0;\nfor x in 0..=10 { if x % 2 == 0 { sum += x + 1; } }\n\n// iter\nlet sum: i32 = (0..=10).filter(|x| x % 2 == 0).map(|x| x + 1).sum();<\/code><\/pre>\n<h3 id=\"prefer-for-when\">Prefer <code>for<\/code> when<\/h3>\n<ul><li>Early exits (<code>break<\/code>, <code>continue<\/code>, <code>return<\/code>)<\/li><li>Simple iteration with side-effects (logging, IO — though <code>inspect<\/code>/<code>inspect_err<\/code> exist)<\/li><li>Readability beats chaining<\/li><\/ul>\n<h3 id=\"prefer-iterators-when\">Prefer iterators when<\/h3>\n<ul><li>Transforming collections / <code>Option<\/code>/<code>Result<\/code><\/li><li>Compose multiple steps elegantly<\/li><li>No early exit<\/li><li>Need <code>.enumerate<\/code>, <code>.windows<\/code>, <code>.chunks<\/code><\/li><li>Combine multi-source data without intermediate collections<\/li><\/ul>\n<p>❗ Iterators are LAZY. <code>.iter<\/code>, <code>.map<\/code>, <code>.filter<\/code> do nothing until consumer (<code>.collect<\/code>, <code>.sum<\/code>, <code>.for_each<\/code>). Lazy = fused into one loop at compile time.<\/p>\n<h3 id=\"anti-patterns\">Anti-patterns<\/h3>\n<ul><li>Don't chain unformatted (rustfmt handles)<\/li><li>Don't chain if unreadable<\/li><li>Avoid needless <code>.collect<\/code>/allocate just to throw away<\/li><li>Prefer <code>iter<\/code> over <code>into_iter<\/code> unless ownership needed<\/li><li>Prefer <code>iter<\/code> over <code>into_iter<\/code> when inner is <code>Copy<\/code> (<code>Vec&lt;i32&gt;<\/code>)<\/li><li>Prefer <code>.sum()<\/code> over <code>.fold()<\/code> for summing — specialized + optimized<\/li><\/ul>\n<h2 id=\"1-6-comments-context-not-clutter\">1.6 Comments: context, not clutter<\/h2>\n<blockquote><p>Context is for <em>why<\/em>, not <em>what<\/em> or <em>how<\/em>.<\/p><\/blockquote>\n<p>Well-named code speaks for itself. Few/no comments common in good codebases.<\/p>\n<h3 id=\"good\">Good<\/h3>\n<ul><li>Safety: <code>// SAFETY: ptr is valid and non-null per @fn xyz<\/code><\/li><li>Perf: <code>// Fast inverse square root approximation<\/code><\/li><li>ADR/Design link: <code>// PERF: Generating per-subgraph caused TLS startup latency on macOS. See [ADR-123](link)<\/code><\/li><\/ul>\n<h3 id=\"bad\">Bad<\/h3>\n<ul><li>Wall-of-text explanations → use <code>///<\/code> doc instead<\/li><li>Obvious narration <code>// increment i by 1<\/code><\/li><\/ul>\n<h3 id=\"break-long-functions-over-commenting-them\">Break long functions over commenting them<\/h3>\n<p>Long comment explaining \"what/how/each step\" → split function. Better readability + testability.<\/p>\n<pre><code class=\"language-rust\">// ✅\nfn process_request(request: T) -&gt; Result&lt;(), Error&gt; {\n    validate_request_headers(&amp;request)?;\n    let payload = decode_payload(&amp;request);\n    authorize(&amp;payload)?;\n    dispatch_to_handler(payload)\n}<\/code><\/pre>\n<h3 id=\"todos-as-issues-not-comments\">TODOs as issues, not comments<\/h3>\n<p>Filed in Github/Jira. Reference issue in code: <code>// See issue #123: support hyper 2.0<\/code>.<\/p>\n<h3 id=\"comments-rot\">Comments rot<\/h3>\n<p>Don't trust blindly. Read in context. Wrong/outdated → fix or remove. Misleading comment worse than none.<\/p>\n<p>Prefer: link ADR/Design Doc, move to <code>/// doc<\/code> (testable via <code>cargo doc<\/code>), break into named functions.<\/p>\n<h2 id=\"1-7-use-declarations-imports\">1.7 Use declarations (imports)<\/h2>\n<p>Standard order:<\/p>\n<ol><li><code>std<\/code> (<code>core<\/code>, <code>alloc<\/code>)<\/li><li>External crates (Cargo.toml <code>[dependencies]<\/code>)<\/li><li>Workspace crates<\/li><li><code>super::<\/code><\/li><li><code>crate::<\/code><\/li><\/ol>\n<pre><code class=\"language-rust\">use std::sync::Arc;\n\nuse chrono::Utc;\nuse juniper::{FieldError, FieldResult};\n\nuse broker::database::PooledConnection;\n\nuse super::schema::{Context, Payload};\nuse crate::models::Event;<\/code><\/pre>\n<p><code>rustfmt.toml<\/code>:<\/p>\n<pre><code class=\"language-toml\">reorder_imports = true\nimports_granularity = &quot;Crate&quot;\ngroup_imports = &quot;StdExternalCrate&quot;<\/code><\/pre>\n<p>❗ Rust 1.88: needs nightly rustfmt for reorder — <code>cargo +nightly fmt<\/code>.<\/p>","text":"Chapter 1 — Coding Styles & Idioms 1.1 Borrow > Clone Prefer &T over T.clone() . Performance recommendation. When to clone Need owned copy AND preserve original (immutable snapshot) Arc / Rc pointers Cross-thread share (usually Arc ) API expects owned data Avoid massive refactor of non-perf-critical code Cached return: fn get_config(&self) -> Config { self.cached_config.clone() } Clone traps Auto-clone in loops .map(|x| x.clone()) — use .cloned() / .copied() at end Cloning large Vec<T> / HashMap<K,V> Clone due to bad API — fix lifetimes Prefer &[T] over Vec<T> / &Vec<T> Prefer &str over String / &String Clone of reference arg → caller should pass ownership instead // ✅ borrow fn process(name: &str) { println!(\"Hello {name}\"); } let user = String::from(\"foo\"); process(&user); // ❌ redundant clone fn process_string(name: String) { ... } process(user.clone()); 1.2 Pass by value (Copy) Small + cheap-to-copy types pass by value. Copy trait makes explicit. Pass by value when Type implements Copy ( u32 , bool , f32 , small structs) Move cost negligible Derive Copy on own types when All fields Copy Small (≤24 bytes / 2-3 words) Plain data, no heap (no Vec / String ) ❗ Rust arrays stack-allocated. Copyable if inner is Copy , but stack overflow risk. See chapter 3. Primitive sizes: i8/u8 =1B, i16/u16 =2B, i32/u32/f32/char =4B, i64/u64/f64 =8B, i128/u128 =16B, bool =1B. // ✅ #[derive(Debug, Copy, Clone)] struct Point { x: f32, y: f32, z: f32 } // ❌ #[derive(Debug, Clone)] struct BadIdea { age: i32, name: String } // String not Copy Enums: Copy if tags + atoms + all payloads Copy . ❗ Enum size = largest variant. 1.3 Option<T> & Result<T,E> patterns Rust 1.65: let Some(x) = … else { … } for early returns when missing case is expected. Use match when Pattern match against inner T and E Type transformed to something complex (e.g. Result<T,E> → Result<Option<T>, E> ) Use let PATTERN = EXPR else { DIVERGE; } when Diverging code doesn't need failed pattern info Want to break/continue inside loop Use if let PATTERN = EXPR else { DIVERGE; } when Diverging code needs extra computation ❗ Don't care about Err value → use ? to propagate. Bad match { Ok(t) => Some(t), Err(_) => None } — use .ok() / .ok_or() / .ok_or_else() if let when divergent is default/precomputed → use let … else unwrap() / expect() outside tests 1.4 Prevent early allocation Functions like or , map_or , unwrap_or , ok_or evaluate args eagerly. If allocation needed, use _else variant. // ✅ x.ok_or_else(|| ParseError::ValueAbsent(format!(\"val {x}\"))) x.map_or_else(|e| format!(\"Error: {e}\"), |v| v.len()) x.parse_to_option_vec.unwrap_or_else(Vec::new) // ❌ x.ok_or(ParseError::ValueAbsent(format!(\"val {x}\"))) // formats every call x.map_or(format!(\"Error\"), |v| v.len()) Map err x.inspect_err(|err| tracing::error!(\"fn: {err}\")) .map_err(|err| GeneralError::from((\"fn\", err)))?; 1.5 iter() vs for // for let mut sum = 0; for x in 0..=10 { if x % 2 == 0 { sum += x + 1; } } // iter let sum: i32 = (0..=10).filter(|x| x % 2 == 0).map(|x| x + 1).sum(); Prefer for when Early exits ( break , continue , return ) Simple iteration with side-effects (logging, IO — though inspect / inspect_err exist) Readability beats chaining Prefer iterators when Transforming collections / Option / Result Compose multiple steps elegantly No early exit Need .enumerate , .windows , .chunks Combine multi-source data without intermediate collections ❗ Iterators are LAZY. .iter , .map , .filter do nothing until consumer ( .collect , .sum , .for_each ). Lazy = fused into one loop at compile time. Anti-patterns Don't chain unformatted (rustfmt handles) Don't chain if unreadable Avoid needless .collect /allocate just to throw away Prefer iter over into_iter unless ownership needed Prefer iter over into_iter when inner is Copy ( Vec<i32> ) Prefer .sum() over .fold() for summing — specialized + optimized 1.6 Comments: context, not clutter Context is for why , not what or how . Well-named code speaks for itself. Few/no comments common in good codebases. Good Safety: // SAFETY: ptr is valid and non-null per @fn xyz Perf: // Fast inverse square root approximation ADR/Design link: // PERF: Generating per-subgraph caused TLS startup latency on macOS. See [ADR-123](link) Bad Wall-of-text explanations → use /// doc instead Obvious narration // increment i by 1 Break long functions over commenting them Long comment explaining \"what/how/each step\" → split function. Better readability + testability. // ✅ fn process_request(request: T) -> Result<(), Error> { validate_request_headers(&request)?; let payload = decode_payload(&request); authorize(&payload)?; dispatch_to_handler(payload) } TODOs as issues, not comments Filed in Github/Jira. Reference issue in code: // See issue #123: support hyper 2.0 . Comments rot Don't trust blindly. Read in context. Wrong/outdated → fix or remove. Misleading comment worse than none. Prefer: link ADR/Design Doc, move to /// doc (testable via cargo doc ), break into named functions. 1.7 Use declarations (imports) Standard order: std ( core , alloc ) External crates (Cargo.toml [dependencies] ) Workspace crates super:: crate:: use std::sync::Arc; use chrono::Utc; use juniper::{FieldError, FieldResult}; use broker::database::PooledConnection; use super::schema::{Context, Payload}; use crate::models::Event; rustfmt.toml : reorder_imports = true imports_granularity = \"Crate\" group_imports = \"StdExternalCrate\" ❗ Rust 1.88: needs nightly rustfmt for reorder — cargo +nightly fmt ."},{"id":".claude/skills/rust-best-practices/references/chapter_02.md","title":"Chapter 2 — Clippy & Linting","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_02.md","desc":"","html":"<h1 id=\"chapter-2-clippy-linting\">Chapter 2 — Clippy &amp; Linting<\/h1>\n<p>Install: <code>rustup update &amp;&amp; rustup component add clippy<\/code>. Verify: <code>cargo clippy -V<\/code>. Docs: https://doc.rust-lang.org/clippy/usage.html<\/p>\n<h2 id=\"2-1-why-lint\">2.1 Why lint<\/h2>\n<p>Clippy catches: perf pitfalls, style, redundancy, potential bugs, non-idiomatic Rust.<\/p>\n<h2 id=\"2-2-standard-command\">2.2 Standard command<\/h2>\n<pre><code class=\"language-bash\">cargo clippy --all-targets --all-features --locked -- -D warnings<\/code><\/pre>\n<ul><li><code>--all-targets<\/code>: lib, tests, benches, examples<\/li><li><code>--all-features<\/code>: enable all, auto-resolve conflicts<\/li><li><code>--locked<\/code>: requires Cargo.lock current; fix with <code>cargo update<\/code><\/li><li><code>-D warnings<\/code>: warnings → errors<\/li><\/ul>\n<p>Optional: <code>-W clippy::pedantic<\/code> (strict, occasional false positives), <code>-W clippy::nursery<\/code> (in-development lints).<\/p>\n<p>❗ Add to Makefile/Justfile/xtask/CI.<\/p>\n<h2 id=\"2-3-important-lints\">2.3 Important lints<\/h2>\n<table><thead><tr><th>Lint<\/th><th>Why<\/th><\/tr><\/thead><tbody><tr><td><code>redundant_clone<\/code><\/td><td>Unnecessary clones, perf impact<\/td><\/tr><tr><td><code>needless_borrow<\/code><\/td><td>Redundant <code>&amp;<\/code><\/td><\/tr><tr><td><code>map_unwrap_or<\/code> / <code>map_or<\/code><\/td><td>Simplify nested Option/Result<\/td><\/tr><tr><td><code>manual_ok_or<\/code><\/td><td>Use <code>.ok_or_else<\/code> over <code>match<\/code><\/td><\/tr><tr><td><code>large_enum_variant<\/code><\/td><td>Variant too big → suggests <code>Box<\/code><\/td><\/tr><tr><td><code>unnecessary_wraps<\/code><\/td><td>Always-Ok/Some fn shouldn't return Result/Option<\/td><\/tr><tr><td><code>clone_on_copy<\/code><\/td><td><code>.clone()<\/code> on Copy type (<code>u32<\/code>, <code>bool<\/code>)<\/td><\/tr><tr><td><code>needless_collect<\/code><\/td><td>Allocating iterator unnecessarily<\/td><\/tr><\/tbody><\/table>\n<p>Full: https://rust-lang.github.io/rust-clippy/master/<\/p>\n<h2 id=\"2-4-fix-don-t-silence\">2.4 Fix, don't silence<\/h2>\n<p>NEVER <code>#[allow(clippy::lint)]<\/code> unless:<\/p>\n<ul><li>Truly understand why + reason it's better<\/li><li>Document why ignored<\/li><li>❗ Use <code>#[expect(clippy::lint)]<\/code> not <code>#[allow]<\/code> — warns when lint no longer applies<\/li><\/ul>\n<pre><code class=\"language-rust\">// Faster matching preferred over size efficiency\n#[expect(clippy::large_enum_variant)]\nenum Message { Code(u8), Content([u8; 1024]) }<\/code><\/pre>\n<h3 id=\"false-positives\">False positives<\/h3>\n<ol><li>Refactor to silence<\/li><li><strong>Local<\/strong> override <code>#[expect(clippy::lint)]<\/code> + reason comment<\/li><li>Avoid global overrides (except core crate issues like Bevy)<\/li><\/ol>\n<h2 id=\"2-5-workspace-package-lints-in-cargo-toml\">2.5 Workspace / package lints in Cargo.toml<\/h2>\n<pre><code class=\"language-toml\">[lints.rust]\nfuture-incompatible = &quot;warn&quot;\nnonstandard_style = &quot;deny&quot;\n\n[lints.clippy]\nall = { level = &quot;deny&quot;, priority = 10 }\nredundant_clone = { level = &quot;deny&quot;, priority = 9 }\nmanual_while_let_some = { level = &quot;deny&quot;, priority = 4 }\npedantic = { level = &quot;warn&quot;, priority = 3 }<\/code><\/pre>\n<p>Same shape under <code>[workspace.lints.rust]<\/code> / <code>[workspace.lints.clippy]<\/code> for workspace-wide.<\/p>","text":"Chapter 2 — Clippy & Linting Install: rustup update && rustup component add clippy . Verify: cargo clippy -V . Docs: https://doc.rust-lang.org/clippy/usage.html 2.1 Why lint Clippy catches: perf pitfalls, style, redundancy, potential bugs, non-idiomatic Rust. 2.2 Standard command cargo clippy --all-targets --all-features --locked -- -D warnings --all-targets : lib, tests, benches, examples --all-features : enable all, auto-resolve conflicts --locked : requires Cargo.lock current; fix with cargo update -D warnings : warnings → errors Optional: -W clippy::pedantic (strict, occasional false positives), -W clippy::nursery (in-development lints). ❗ Add to Makefile/Justfile/xtask/CI. 2.3 Important lints Lint Why redundant_clone Unnecessary clones, perf impact needless_borrow Redundant & map_unwrap_or / map_or Simplify nested Option/Result manual_ok_or Use .ok_or_else over match large_enum_variant Variant too big → suggests Box unnecessary_wraps Always-Ok/Some fn shouldn't return Result/Option clone_on_copy .clone() on Copy type ( u32 , bool ) needless_collect Allocating iterator unnecessarily Full: https://rust-lang.github.io/rust-clippy/master/ 2.4 Fix, don't silence NEVER #[allow(clippy::lint)] unless: Truly understand why + reason it's better Document why ignored ❗ Use #[expect(clippy::lint)] not #[allow] — warns when lint no longer applies // Faster matching preferred over size efficiency #[expect(clippy::large_enum_variant)] enum Message { Code(u8), Content([u8; 1024]) } False positives Refactor to silence Local override #[expect(clippy::lint)] + reason comment Avoid global overrides (except core crate issues like Bevy) 2.5 Workspace / package lints in Cargo.toml [lints.rust] future-incompatible = \"warn\" nonstandard_style = \"deny\" [lints.clippy] all = { level = \"deny\", priority = 10 } redundant_clone = { level = \"deny\", priority = 9 } manual_while_let_some = { level = \"deny\", priority = 4 } pedantic = { level = \"warn\", priority = 3 } Same shape under [workspace.lints.rust] / [workspace.lints.clippy] for workspace-wide."},{"id":".claude/skills/rust-best-practices/references/chapter_03.md","title":"Chapter 3 — Performance Mindset","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_03.md","desc":"","html":"<h1 id=\"chapter-3-performance-mindset\">Chapter 3 — Performance Mindset<\/h1>\n<blockquote><p>Don't guess, measure.<\/p><\/blockquote>\n<p>Rust is fast. Don't optimize without evidence.<\/p>\n<h2 id=\"first-steps\">First steps<\/h2>\n<ul><li>Build with <code>--release<\/code> (#1 cause of \"Rust slow\" complaints = forgot release flag)<\/li><li><code>cargo clippy -- -D clippy::perf<\/code><\/li><li><code>cargo bench<\/code> — micro-benchmarks; bench against original; &gt;5% improvement = worth it<\/li><li><code>cargo flamegraph<\/code> (Linux); <code>samply<\/code> better DX on macOS<\/li><\/ul>\n<h2 id=\"3-1-flamegraph\">3.1 Flamegraph<\/h2>\n<pre><code class=\"language-bash\">cargo install flamegraph\ncargo flamegraph                          # defaults to release\ncargo flamegraph --bin=stress2\ncargo flamegraph --unit-test crate -- test::path\ncargo flamegraph --test test_name         # integration tests\ncargo flamegraph --bench bench_name --features f -- --bench<\/code><\/pre>\n<p>❗ Always profile with <code>--release<\/code>. <code>--dev<\/code> lacks optimizations and is unrealistic.<\/p>\n<p>Reading:<\/p>\n<ul><li>y-axis = stack depth (main near bottom, called fns above)<\/li><li>box width = total CPU time (wider = more cycles or more calls)<\/li><li>color = random, not significant<\/li><\/ul>\n<p>Thick stacks = heavy CPU. Thin = cheap.<\/p>\n<h2 id=\"3-2-avoid-redundant-cloning\">3.2 Avoid redundant cloning<\/h2>\n<p>Cloning is cheap... until it isn't.<\/p>\n<h3 id=\"when-ownership-is-warranted\">When ownership IS warranted<\/h3>\n<ul><li>API requires owned data<\/li><li>Overloaded <code>std::ops<\/code> but need original (e.g. <code>Add for Point<\/code> consumes self)<\/li><li>Comparison snapshots (clone before mutation, compare after)<\/li><li><code>Arc<\/code>/<code>Rc<\/code> ref counters<\/li><li>Builder requires owned mutation<\/li><li>Model business state (e.g. <code>Validate::try_from(raw)<\/code> consumes raw to mark validated)<\/li><\/ul>\n<h3 id=\"when-not\">When NOT<\/h3>\n<ul><li>Prefer ref-taking APIs (<code>fn process(values: &amp;[T])<\/code>) over owned (<code>Vec&lt;T&gt;<\/code>)<\/li><li>Read-only iteration: <code>.iter()<\/code> / slices<\/li><li>Mutate from another thread → <code>&amp;mut MyStruct<\/code><\/li><\/ul>\n<h3 id=\"cow-for-maybe-owned\"><code>Cow<\/code> for \"maybe owned\"<\/h3>\n<pre><code class=\"language-rust\">use std::borrow::Cow;\nfn hello_greet(name: Cow&lt;&#x27;_, str&gt;) { println!(&quot;Hello {name}&quot;); }\nhello_greet(Cow::Borrowed(&quot;Julia&quot;));\nhello_greet(Cow::Owned(&quot;Naomi&quot;.to_string()));<\/code><\/pre>\n<h2 id=\"3-3-stack-vs-heap\">3.3 Stack vs heap<\/h2>\n<h3 id=\"good\">Good<\/h3>\n<ul><li>Small types (<code>Copy<\/code>, <code>usize<\/code>, <code>bool<\/code>) on stack<\/li><li>Pass huge types (<code>&gt;512B<\/code>) by reference, not value<\/li><li>Heap-allocate recursive structures: ``<code>rust enum OctreeNode&lt;T&gt; { Node(T), Children(Box&lt;[Node&lt;T&gt;; 8]&gt;) } <\/code>``<\/li><li>Return small types by value (Copy or cheap-clone)<\/li><\/ul>\n<h3 id=\"mind\">Mind<\/h3>\n<ul><li><code>#[inline]<\/code> only when bench proves benefit — Rust inlines well already<\/li><li>Avoid massive stack alloc; box: <code>Box&lt;[u8; 65536]&gt;<\/code> allocs on stack first then boxes. Better: <code>vec![0; 65536].into_boxed_slice()<\/code><\/li><li>Large const arrays → <code>smallvec<\/code> crate<\/li><\/ul>\n<h2 id=\"3-4-iterators-zero-cost\">3.4 Iterators = zero-cost<\/h2>\n<p>Lazy, compiled to tight loops. Chained <code>.filter().map().rev().skip().take().collect()<\/code> doesn't cost extra.<\/p>\n<ul><li>Prefer iterators over manual <code>for<\/code> on collections<\/li><li><code>.iter()<\/code> creates reference — multiple iterators share original<\/li><\/ul>\n<p>❗ Avoid intermediate collections:<\/p>\n<pre><code class=\"language-rust\">// ❌\nlet doubled:
