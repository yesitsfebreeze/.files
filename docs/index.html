 Vec&lt;_&gt; = items.iter().map(|x| x * 2).collect();\nprocess(doubled);\n\n// ✅ — process accepts impl Iterator\nlet doubled_iter = items.iter().map(|x| x * 2);\nprocess(doubled_iter);<\/code><\/pre>","text":"Chapter 3 — Performance Mindset Don't guess, measure. Rust is fast. Don't optimize without evidence. First steps Build with --release (#1 cause of \"Rust slow\" complaints = forgot release flag) cargo clippy -- -D clippy::perf cargo bench — micro-benchmarks; bench against original; >5% improvement = worth it cargo flamegraph (Linux); samply better DX on macOS 3.1 Flamegraph cargo install flamegraph cargo flamegraph # defaults to release cargo flamegraph --bin=stress2 cargo flamegraph --unit-test crate -- test::path cargo flamegraph --test test_name # integration tests cargo flamegraph --bench bench_name --features f -- --bench ❗ Always profile with --release . --dev lacks optimizations and is unrealistic. Reading: y-axis = stack depth (main near bottom, called fns above) box width = total CPU time (wider = more cycles or more calls) color = random, not significant Thick stacks = heavy CPU. Thin = cheap. 3.2 Avoid redundant cloning Cloning is cheap... until it isn't. When ownership IS warranted API requires owned data Overloaded std::ops but need original (e.g. Add for Point consumes self) Comparison snapshots (clone before mutation, compare after) Arc / Rc ref counters Builder requires owned mutation Model business state (e.g. Validate::try_from(raw) consumes raw to mark validated) When NOT Prefer ref-taking APIs ( fn process(values: &[T]) ) over owned ( Vec<T> ) Read-only iteration: .iter() / slices Mutate from another thread → &mut MyStruct Cow for \"maybe owned\" use std::borrow::Cow; fn hello_greet(name: Cow<'_, str>) { println!(\"Hello {name}\"); } hello_greet(Cow::Borrowed(\"Julia\")); hello_greet(Cow::Owned(\"Naomi\".to_string())); 3.3 Stack vs heap Good Small types ( Copy , usize , bool ) on stack Pass huge types ( >512B ) by reference, not value Heap-allocate recursive structures: `` rust enum OctreeNode<T> { Node(T), Children(Box<[Node<T>; 8]>) } `` Return small types by value (Copy or cheap-clone) Mind #[inline] only when bench proves benefit — Rust inlines well already Avoid massive stack alloc; box: Box<[u8; 65536]> allocs on stack first then boxes. Better: vec![0; 65536].into_boxed_slice() Large const arrays → smallvec crate 3.4 Iterators = zero-cost Lazy, compiled to tight loops. Chained .filter().map().rev().skip().take().collect() doesn't cost extra. Prefer iterators over manual for on collections .iter() creates reference — multiple iterators share original ❗ Avoid intermediate collections: // ❌ let doubled: Vec<_> = items.iter().map(|x| x * 2).collect(); process(doubled); // ✅ — process accepts impl Iterator let doubled_iter = items.iter().map(|x| x * 2); process(doubled_iter);"},{"id":".claude/skills/rust-best-practices/references/chapter_04.md","title":"Chapter 4 — Error Handling","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_04.md","desc":"","html":"<h1 id=\"chapter-4-error-handling\">Chapter 4 — Error Handling<\/h1>\n<p>Rust forces explicit fallibility. Even <code>unwrap<\/code>/<code>expect<\/code> is opt-in.<\/p>\n<h2 id=\"4-1-prefer-result-avoid-panic\">4.1 Prefer <code>Result<\/code>, avoid <code>panic!<\/code><\/h2>\n<pre><code class=\"language-rust\">fn divide(x: f64, y: f64) -&gt; Result&lt;f64, DivisionError&gt; {\n    if y == 0.0 { Err(DivisionError::DividedByZero) } else { Ok(x / y) }\n}<\/code><\/pre>\n<p><code>panic!<\/code> only for unrecoverable: tests, assertions, bugs, explicit crash. Better macros:<\/p>\n<ul><li><code>todo!<\/code> — alerts compiler code is missing<\/li><li><code>unreachable!<\/code> — reasoned + sure condition impossible; alerts if it ever happens<\/li><li><code>unimplemented!<\/code> — block deferred with reason<\/li><\/ul>\n<h2 id=\"4-2-avoid-unwrap-expect-in-prod\">4.2 Avoid <code>unwrap<\/code>/<code>expect<\/code> in prod<\/h2>\n<p><code>expect<\/code> &gt; <code>unwrap<\/code> (has context). Use only in:<\/p>\n<ul><li>Tests / test helpers<\/li><li>Failure impossible<\/li><li>Smart alternatives don't fit<\/li><\/ul>\n<h3 id=\"alternatives\">Alternatives<\/h3>\n<ul><li>Predefined early return → <code>let Ok(json) = serde_json::from_str(&amp;input) else { return Err(MyError::InvalidJson); }<\/code><\/li><li>Recovery branch → <code>if let Ok(json) = … else { … } else { Err(do_something(&amp;input)) }<\/code><\/li><li><code>Option::None<\/code> cases → return <code>Result&lt;T, E&gt;<\/code> with module-level error<\/li><li><code>unwrap_or<\/code> / <code>unwrap_or_else<\/code> / <code>unwrap_or_default<\/code> for default values<\/li><\/ul>\n<h2 id=\"4-3-thiserror-for-crate-level-errors\">4.3 <code>thiserror<\/code> for crate-level errors<\/h2>\n<pre><code class=\"language-rust\">#[derive(Debug, thiserror::Error)]\npub enum MyError {\n    #[error(&quot;Network Timeout&quot;)]\n    Timeout,\n    #[error(&quot;Invalid data: {0}&quot;)]\n    InvalidData(String),\n    #[error(transparent)]\n    Serialization(#[from] serde_json::Error),\n    #[error(&quot;Invalid request. Header: {headers}, Metadata: {metadata}&quot;)]\n    InvalidRequest { headers: Headers, metadata: Metadata }\n}<\/code><\/pre>\n<h3 id=\"hierarchies-wrapping\">Hierarchies / wrapping<\/h3>\n<pre><code class=\"language-rust\">#[derive(Debug, thiserror::Error)]\npub enum ServiceError {\n    #[error(&quot;DB error: {0}&quot;)]\n    Db(#[from] DbError),\n    #[error(&quot;External services error: {0}&quot;)]\n    ExternalServices(#[from] ExternalHttpError)\n}<\/code><\/pre>\n<h2 id=\"4-4-anyhow-for-binaries-only\">4.4 <code>anyhow<\/code> for binaries only<\/h2>\n<p>Ergonomic but erases types. Use in <strong>binaries<\/strong>, not libraries.<\/p>\n<pre><code class=\"language-rust\">use anyhow::{Context, Result, anyhow};\n\nfn main() -&gt; Result&lt;()&gt; {\n    let content = std::fs::read_to_string(&quot;config.json&quot;)\n        .context(&quot;Failed to read config&quot;)?;\n    Config::from_str(&amp;content)\n        .map_err(|err| anyhow!(&quot;Config parse: {err}&quot;))\n}<\/code><\/pre>\n<h3 id=\"gotchas\">Gotchas<\/h3>\n<ul><li>Context strings hard to keep updated codebase-wide vs single thiserror types<\/li><li><code>anyhow::Result<\/code> erases type — never in libraries<\/li><li>Test helpers OK to use anyhow<\/li><\/ul>\n<h2 id=\"4-5-to-bubble\">4.5 <code>?<\/code> to bubble<\/h2>\n<pre><code class=\"language-rust\">fn handle_request(req: &amp;Request) -&gt; Result&lt;ValidatedRequest, MyError&gt; {\n    validate_headers(req)?;\n    validate_body_format(req)?;\n    validate_credentials(req)?;\n    let body = Body::try_from(req)?;\n    Ok(ValidatedRequest::try_from((req, body))?)\n}<\/code><\/pre>\n<p>Recovery: <code>or_else<\/code>, <code>map_err<\/code>, <code>if let Ok(..) else<\/code>. Inspect/log: <code>inspect_err<\/code>.<\/p>\n<h2 id=\"4-6-test-errors\">4.6 Test errors<\/h2>\n<p>Many errors don't impl <code>PartialEq<\/code>. Compare via <code>to_string()<\/code> / <code>format!<\/code>:<\/p>\n<pre><code class=\"language-rust\">#[test]\nfn err_no_partial_eq() {\n    let err = divide(10., 0.0).unwrap_err();\n    assert_eq!(err.to_string(), &quot;division by zero&quot;);\n}<\/code><\/pre>\n<h2 id=\"4-7-other\">4.7 Other<\/h2>\n<h3 id=\"custom-error-structs-single-error-modules\">Custom error structs (single-error modules)<\/h3>\n<pre><code class=\"language-rust\">#[derive(Debug, thiserror::Error, PartialEq)]\n#[error(&quot;Request failed with code `{code}`: {message}&quot;)]\nstruct HttpError { code: u16, message: String }<\/code><\/pre>\n<h3 id=\"async-errors\">Async errors<\/h3>\n<p>In Tokio etc., errors must be <code>Send + Sync + &#x27;static<\/code> across <code>.await<\/code>:<\/p>\n<pre><code class=\"language-rust\">#[tokio::main]\nasync fn main() -&gt; Result&lt;(), Box&lt;dyn std::error::Error + Send + Sync&gt;&gt; { Ok(()) }<\/code><\/pre>\n<p>❗ Avoid <code>Box&lt;dyn std::error::Error&gt;<\/code> in libraries.<\/p>","text":"Chapter 4 — Error Handling Rust forces explicit fallibility. Even unwrap / expect is opt-in. 4.1 Prefer Result , avoid panic! fn divide(x: f64, y: f64) -> Result<f64, DivisionError> { if y == 0.0 { Err(DivisionError::DividedByZero) } else { Ok(x / y) } } panic! only for unrecoverable: tests, assertions, bugs, explicit crash. Better macros: todo! — alerts compiler code is missing unreachable! — reasoned + sure condition impossible; alerts if it ever happens unimplemented! — block deferred with reason 4.2 Avoid unwrap / expect in prod expect > unwrap (has context). Use only in: Tests / test helpers Failure impossible Smart alternatives don't fit Alternatives Predefined early return → let Ok(json) = serde_json::from_str(&input) else { return Err(MyError::InvalidJson); } Recovery branch → if let Ok(json) = … else { … } else { Err(do_something(&input)) } Option::None cases → return Result<T, E> with module-level error unwrap_or / unwrap_or_else / unwrap_or_default for default values 4.3 thiserror for crate-level errors #[derive(Debug, thiserror::Error)] pub enum MyError { #[error(\"Network Timeout\")] Timeout, #[error(\"Invalid data: {0}\")] InvalidData(String), #[error(transparent)] Serialization(#[from] serde_json::Error), #[error(\"Invalid request. Header: {headers}, Metadata: {metadata}\")] InvalidRequest { headers: Headers, metadata: Metadata } } Hierarchies / wrapping #[derive(Debug, thiserror::Error)] pub enum ServiceError { #[error(\"DB error: {0}\")] Db(#[from] DbError), #[error(\"External services error: {0}\")] ExternalServices(#[from] ExternalHttpError) } 4.4 anyhow for binaries only Ergonomic but erases types. Use in binaries , not libraries. use anyhow::{Context, Result, anyhow}; fn main() -> Result<()> { let content = std::fs::read_to_string(\"config.json\") .context(\"Failed to read config\")?; Config::from_str(&content) .map_err(|err| anyhow!(\"Config parse: {err}\")) } Gotchas Context strings hard to keep updated codebase-wide vs single thiserror types anyhow::Result erases type — never in libraries Test helpers OK to use anyhow 4.5 ? to bubble fn handle_request(req: &Request) -> Result<ValidatedRequest, MyError> { validate_headers(req)?; validate_body_format(req)?; validate_credentials(req)?; let body = Body::try_from(req)?; Ok(ValidatedRequest::try_from((req, body))?) } Recovery: or_else , map_err , if let Ok(..) else . Inspect/log: inspect_err . 4.6 Test errors Many errors don't impl PartialEq . Compare via to_string() / format! : #[test] fn err_no_partial_eq() { let err = divide(10., 0.0).unwrap_err(); assert_eq!(err.to_string(), \"division by zero\"); } 4.7 Other Custom error structs (single-error modules) #[derive(Debug, thiserror::Error, PartialEq)] #[error(\"Request failed with code `{code}`: {message}\")] struct HttpError { code: u16, message: String } Async errors In Tokio etc., errors must be Send + Sync + 'static across .await : #[tokio::main] async fn main() -> Result<(), Box<dyn std::error::Error + Send + Sync>> { Ok(()) } ❗ Avoid Box<dyn std::error::Error> in libraries."},{"id":".claude/skills/rust-best-practices/references/chapter_05.md","title":"Chapter 5 — Automated Testing","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_05.md","desc":"","html":"<h1 id=\"chapter-5-automated-testing\">Chapter 5 — Automated Testing<\/h1>\n<blockquote><p>Tests are the first place people read to understand how code works.<\/p><\/blockquote>\n<p>Tests use <code>#[test]<\/code>. Test-only compilation flags: <code>#[cfg(test)]<\/code>.<\/p>\n<h2 id=\"5-1-tests-as-living-docs\">5.1 Tests as living docs<\/h2>\n<h3 id=\"descriptive-names\">Descriptive names<\/h3>\n<p>Components: <code>unit_of_work<\/code> (function tested) + <code>expected_behavior<\/code> (assertions) + <code>state<\/code> (arrangement).<\/p>\n<pre><code class=\"language-rust\">// ❌\n#[test] fn test_add_happy_path() { assert_eq!(add(2, 2), 4); }\n\n// ✅\n#[test]\nfn process_should_return_blob_when_larger_than_b() { … }\n\n// ✅ alternative — group in mod\nmod process {\n    #[test]\n    fn should_return_blob_when_larger_than_b() { … }\n}<\/code><\/pre>\n<h3 id=\"module-organization\">Module organization<\/h3>\n<p>Group related tests; IDEs run modules together; module name appears in test output.<\/p>\n<pre><code class=\"language-rust\">#[cfg(test)]\nmod test {\n    mod process {\n        #[test]\n        fn returns_error_xyz_when_b_is_negative() { … }\n        #[test]\n        fn returns_invalid_input_error_when_a_and_b_not_present() { … }\n    }\n}<\/code><\/pre>\n<h3 id=\"one-behavior-per-test\">One behavior per test<\/h3>\n<pre><code class=\"language-rust\">// ❌\nfn test_thing_parser() {\n    assert!(Thing::parse(&quot;abcd&quot;).is_ok());\n    assert!(Thing::parse(&quot;ABCD&quot;).is_err());\n}\n\n// ✅\nmod test_thing_parser {\n    #[test] fn lowercase_letters_are_valid() {\n        assert!(Thing::parse(&quot;abcd&quot;).is_ok(), &quot;parse err: {:?}&quot;, Thing::parse(&quot;abcd&quot;).unwrap_err());\n    }\n    #[test] fn capital_letters_are_invalid() { assert!(Thing::parse(&quot;ABCD&quot;).is_err()); }\n}<\/code><\/pre>\n<p>Ok scenarios: include <code>eprintln<\/code>-style msg of <code>Err<\/code> case.<\/p>\n<h3 id=\"few-one-assertion-per-test\">Few/one assertion per test<\/h3>\n<p>Multi-assertion tests obscure intent + require iterations to fix. Use shared setup or <code>rstest<\/code> cases:<\/p>\n<pre><code class=\"language-rust\">#[rstest]\n#[case::single(&quot;a&quot;)]\n#[case::first_letter(&quot;ab&quot;)]\n#[case::last_letter(&quot;ba&quot;)]\n#[case::in_the_middle(&quot;bab&quot;)]\nfn the_function_accepts_all_strings_with_a(#[case] input: &amp;str) {\n    assert!(the_function(input).is_ok());\n}<\/code><\/pre>\n<p><code>rstest<\/code> caveats: harder to navigate, expectation/condition naming inverted.<\/p>\n<h2 id=\"5-2-doc-tests\">5.2 Doc tests<\/h2>\n<p><code>///<\/code> examples become executable tests.<\/p>\n<ul><li>Run with <code>cargo test<\/code>, NOT <code>cargo nextest run<\/code> (use <code>cargo t --doc<\/code> separately).<\/li><li>Doc + correctness check, kept fresh by compiler.<\/li><li>Hide setup with <code>#<\/code>:<\/li><\/ul>\n<pre><code class=\"language-rust\">/// # Examples\n/// ```rust\n/// # use crate_name::generic_add;\n/// # assert_eq!(\n/// generic_add(5.2, 4) // =&gt; 9.2\n/// # , 9.2)\n/// ```<\/code><\/pre>\n<p>❗ OK to duplicate between doc-tests and unit tests.<\/p>\n<h2 id=\"5-3-unit-integration-doc\">5.3 Unit / integration / doc<\/h2>\n<h3 id=\"unit\">Unit<\/h3>\n<p>Same module as tested unit. Sees private + <code>pub(crate)<\/code>. Focus: implementation + edge cases.<\/p>\n<ul><li>KISS — one state, one behavior<\/li><li>Test errors + edges<\/li><li>Combine under <code>#[cfg(test)] mod test_unit { … }<\/code><\/li><li>Minimize external state to public API; focus those on <code>mod.rs<\/code><\/li><li><code>#[ignore = &quot;msg&quot;]<\/code> for unfinished<\/li><li><code>#[should_panic]<\/code> for intentional panic<\/li><\/ul>\n<pre><code class=\"language-rust\">#[cfg(test)]\nmod unit_of_work_tests {\n    use super::*;\n    #[test]\n    fn unit_state_behavior() {\n        assert_eq!(result, expected, &quot;Failed: {}&quot;, result - expected);\n    }\n}<\/code><\/pre>\n<h3 id=\"integration\">Integration<\/h3>\n<p><code>tests/<\/code> directory, external — only public API. Tests interaction between units.<\/p>\n<ul><li>Happy paths + common cases<\/li><li>Allow external state (<a href=\"https://rust.testcontainers.org/\">testcontainers<\/a> helps)<\/li><li>Binaries: split <code>src/main.rs<\/code> (executable) + <code>src/lib.rs<\/code> (functions)<\/li><\/ul>\n<pre><code>├── Cargo.toml\n├── src/lib.rs\n└── tests/\n    ├── mod.rs\n    ├── common/mod.rs\n    └── integration_test.rs<\/code><\/pre>\n<h3 id=\"doc\">Doc<\/h3>\n<p>Happy paths, public API usage, attribute-rich examples.<\/p>\n<h3 id=\"attributes\">Attributes<\/h3>\n<ul><li><code>ignore<\/code> — skip; for plain text use <code>text<\/code><\/li><li><code>should_panic<\/code> — example expected to panic<\/li><li><code>no_run<\/code> — compile, don't execute (side effects)<\/li><li><code>compile_fail<\/code> — must fail compile (demo wrong usage)<\/li><\/ul>\n<h2 id=\"5-4-asserting\">5.4 Asserting<\/h2>\n<ul><li><code>assert!(value.is_ok(), &quot;value not Ok: {value:?}&quot;)<\/code><\/li><li><code>assert_eq!(result, expected, &quot;diff: {}&quot;, result.diff(expected))<\/code><\/li><\/ul>\n<p>Reminders:<\/p>\n<ul><li>Use formatted strings — printed on failure<\/li><li>For pattern match: <code>assert!(matches!(error, MyError::BadInput(_)), &quot;Expected BadInput, got {error}&quot;)<\/code><\/li><li><code>#[should_panic]<\/code> only when panic is desired<\/li><li>Crates: <code>rstest<\/code>, <code>pretty_assertions<\/code> (colorful diffs)<\/li><\/ul>\n<h2 id=\"5-5-snapshot-testing-cargo-insta\">5.5 Snapshot testing — <code>cargo insta<\/code><\/h2>\n<blockquote><p>When correctness is visual or structural, snapshots beat asserts.<\/p><\/blockquote>\n<pre><code class=\"language-toml\">insta = { version = &quot;1.42.2&quot;, features = [&quot;yaml&quot;] }<\/code><\/pre>\n<p>YAML preferred (clean diffs, supports redaction). Install CLI: <code>cargo install cargo-insta<\/code>.<\/p>\n<pre><code class=\"language-rust\">#[test]\nfn test_split_words() {\n    let words = split_words(&quot;hello from the other side&quot;);\n    insta::assert_yaml_snapshot!(words);\n}<\/code><\/pre>\n<p>Run <code>cargo insta test<\/code> then <code>cargo insta review<\/code>.<\/p>\n<h3 id=\"use-for\">Use for<\/h3>\n<ul><li>Generated code, complex serialized data, rendered HTML, CLI output<\/li><\/ul>\n<h3 id=\"don-t-use-for\">Don't use for<\/h3>\n<ul><li>Stable numeric/small structured data → <code>assert_eq!<\/code><\/li><li>Critical path logic → precise unit tests<\/li><li>Flaky/random output (unless redacted)<\/li><li>External resources → mocks/stubs<\/li><\/ul>\n<h2 id=\"5-6-snapshot-best-practices\">5.6 Snapshot best practices<\/h2>\n<ul><li>Name them: <code>assert_snapshot!(&quot;named&quot;, output)<\/code> → <code>snapshots/named.snap<\/code><\/li><li>Keep small + clear: ``<code>rust // ✅ assert_snapshot!(&quot;app_config/http&quot;, whole_app_config.http); // ❌ assert_snapshot!(&quot;app_config&quot;, whole_app_config); // huge <\/code>``<\/li><li>Don't snapshot primitives → <code>assert_eq!<\/code><\/li><li>Redact unstable fields: ``<code>rust assert_json_snapshot!(&quot;get_user_data&quot;, data, &quot;.created_at&quot; =&gt; &quot;[timestamp]&quot;, &quot;.id&quot; =&gt; &quot;[uuid]&quot;); <\/code>``<\/li><li>Commit snapshots to git<\/li><li>Review carefully before accepting<\/li><\/ul>","text":"Chapter 5 — Automated Testing Tests are the first place people read to understand how code works. Tests use #[test] . Test-only compilation flags: #[cfg(test)] . 5.1 Tests as living docs Descriptive names Components: unit_of_work (function tested) + expected_behavior (assertions) + state (arrangement). // ❌ #[test] fn test_add_happy_path() { assert_eq!(add(2, 2), 4); } // ✅ #[test] fn process_should_return_blob_when_larger_than_b() { … } // ✅ alternative — group in mod mod process { #[test] fn should_return_blob_when_larger_than_b() { … } } Module organization Group related tests; IDEs run modules together; module name appears in test output. #[cfg(test)] mod test { mod process { #[test] fn returns_error_xyz_when_b_is_negative() { … } #[test] fn returns_invalid_input_error_when_a_and_b_not_present() { … } } } One behavior per test // ❌ fn test_thing_parser() { assert!(Thing::parse(\"abcd\").is_ok()); assert!(Thing::parse(\"ABCD\").is_err()); } // ✅ mod test_thing_parser { #[test] fn lowercase_letters_are_valid() { assert!(Thing::parse(\"abcd\").is_ok(), \"parse err: {:?}\", Thing::parse(\"abcd\").unwrap_err()); } #[test] fn capital_letters_are_invalid() { assert!(Thing::parse(\"ABCD\").is_err()); } } Ok scenarios: include eprintln -style msg of Err case. Few/one assertion per test Multi-assertion tests obscure intent + require iterations to fix. Use shared setup or rstest cases: #[rstest] #[case::single(\"a\")] #[case::first_letter(\"ab\")] #[case::last_letter(\"ba\")] #[case::in_the_middle(\"bab\")] fn the_function_accepts_all_strings_with_a(#[case] input: &str) { assert!(the_function(input).is_ok()); } rstest caveats: harder to navigate, expectation/condition naming inverted. 5.2 Doc tests /// examples become executable tests. Run with cargo test , NOT cargo nextest run (use cargo t --doc separately). Doc + correctness check, kept fresh by compiler. Hide setup with # : /// # Examples /// ```rust /// # use crate_name::generic_add; /// # assert_eq!( /// generic_add(5.2, 4) // => 9.2 /// # , 9.2) /// ``` ❗ OK to duplicate between doc-tests and unit tests. 5.3 Unit / integration / doc Unit Same module as tested unit. Sees private + pub(crate) . Focus: implementation + edge cases. KISS — one state, one behavior Test errors + edges Combine under #[cfg(test)] mod test_unit { … } Minimize external state to public API; focus those on mod.rs #[ignore = \"msg\"] for unfinished #[should_panic] for intentional panic #[cfg(test)] mod unit_of_work_tests { use super::*; #[test] fn unit_state_behavior() { assert_eq!(result, expected, \"Failed: {}\", result - expected); } } Integration tests/ directory, external — only public API. Tests interaction between units. Happy paths + common cases Allow external state ( testcontainers helps) Binaries: split src/main.rs (executable) + src/lib.rs (functions) ├── Cargo.toml ├── src/lib.rs └── tests/ ├── mod.rs ├── common/mod.rs └── integration_test.rs Doc Happy paths, public API usage, attribute-rich examples. Attributes ignore — skip; for plain text use text should_panic — example expected to panic no_run — compile, don't execute (side effects) compile_fail — must fail compile (demo wrong usage) 5.4 Asserting assert!(value.is_ok(), \"value not Ok: {value:?}\") assert_eq!(result, expected, \"diff: {}\", result.diff(expected)) Reminders: Use formatted strings — printed on failure For pattern match: assert!(matches!(error, MyError::BadInput(_)), \"Expected BadInput, got {error}\") #[should_panic] only when panic is desired Crates: rstest , pretty_assertions (colorful diffs) 5.5 Snapshot testing — cargo insta When correctness is visual or structural, snapshots beat asserts. insta = { version = \"1.42.2\", features = [\"yaml\"] } YAML preferred (clean diffs, supports redaction). Install CLI: cargo install cargo-insta . #[test] fn test_split_words() { let words = split_words(\"hello from the other side\"); insta::assert_yaml_snapshot!(words); } Run cargo insta test then cargo insta review . Use for Generated code, complex serialized data, rendered HTML, CLI output Don't use for Stable numeric/small structured data → assert_eq! Critical path logic → precise unit tests Flaky/random output (unless redacted) External resources → mocks/stubs 5.6 Snapshot best practices Name them: assert_snapshot!(\"named\", output) → snapshots/named.snap Keep small + clear: `` rust // ✅ assert_snapshot!(\"app_config/http\", whole_app_config.http); // ❌ assert_snapshot!(\"app_config\", whole_app_config); // huge `` Don't snapshot primitives → assert_eq! Redact unstable fields: `` rust assert_json_snapshot!(\"get_user_data\", data, \".created_at\" => \"[timestamp]\", \".id\" => \"[uuid]\"); `` Commit snapshots to git Review carefully before accepting"},{"id":".claude/skills/rust-best-practices/references/chapter_06.md","title":"Chapter 6 — Generics, Static & Dynamic Dispatch","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_06.md","desc":"","html":"<h1 id=\"chapter-6-generics-static-dynamic-dispatch\">Chapter 6 — Generics, Static &amp; Dynamic Dispatch<\/h1>\n<blockquote><p>Static where you can, dynamic where you must.<\/p><\/blockquote>\n<p>Two polymorphism options:<\/p>\n<ul><li><strong>Generics / Static dispatch<\/strong> — compile-time, monomorphized per use<\/li><li><strong>Trait objects / Dynamic dispatch<\/strong> — runtime vtable, single impl<\/li><\/ul>\n<h2 id=\"6-1-generics\">6.1 Generics<\/h2>\n<p>Abstract stand-ins for concrete types. Compiler <strong>monomorphizes<\/strong> at compile time → no runtime cost. Generates specialized code per concrete type.<\/p>\n<p>Used for fns, structs, enums, methods, type-state pattern (chapter 7).<\/p>\n<h2 id=\"6-2-static-dispatch-impl-trait-t-trait\">6.2 Static dispatch — <code>impl Trait<\/code> / <code>&lt;T: Trait&gt;<\/code><\/h2>\n<p>Trait-bounded generic. Compile-time check.<\/p>\n<h3 id=\"best-when\">Best when<\/h3>\n<ul><li>Zero runtime cost (pay compile time)<\/li><li>Tight loops / perf-critical<\/li><li>Types known at compile time<\/li><li>Single-use impl (monomorphized)<\/li><\/ul>\n<pre><code class=\"language-rust\">fn specialized_sum&lt;T: MyTrait&gt;(iter: impl Iterator&lt;Item = T&gt;) -&gt; T {\n    iter.map(|x| x.random_mapping()).sum()\n}<\/code><\/pre>\n<p>Compiles to specialized inlined machine code per call site.<\/p>\n<h2 id=\"6-3-dynamic-dispatch-dyn-trait\">6.3 Dynamic dispatch — <code>dyn Trait<\/code><\/h2>\n<p>Used with pointer: <code>Box&lt;dyn Trait&gt;<\/code>, <code>Arc&lt;dyn Trait&gt;<\/code>, <code>&amp;dyn Trait<\/code>.<\/p>\n<h3 id=\"best-when\">Best when<\/h3>\n<ul><li>Runtime polymorphism actually needed<\/li><li>Heterogeneous impls in one collection<\/li><li>Abstract internals behind stable interface<\/li><li>Plugin-style architecture<\/li><\/ul>\n<pre><code class=\"language-rust\">trait Animal { fn greet(&amp;self) -&gt; String; }\nstruct Dog; impl Animal for Dog { fn greet(&amp;self) -&gt; String { &quot;woof&quot;.into() } }\nstruct Cat; impl Animal for Cat { fn greet(&amp;self) -&gt; String { &quot;meow&quot;.into() } }\n\nfn all_greet(animals: Vec&lt;Box&lt;dyn Animal&gt;&gt;) {\n    for a in animals { println!(&quot;{}&quot;, a.greet()); }\n}<\/code><\/pre>\n<h2 id=\"6-4-trade-offs\">6.4 Trade-offs<\/h2>\n<table><thead><tr><th><\/th><th>Static (<code>impl Trait<\/code>)<\/th><th>Dynamic (<code>dyn Trait<\/code>)<\/th><\/tr><\/thead><tbody><tr><td>Performance<\/td><td>✅ Faster, inlined<\/td><td>❌ Vtable indirection<\/td><\/tr><tr><td>Compile time<\/td><td>❌ Slower (monomorphization)<\/td><td>✅ Faster (shared code)<\/td><\/tr><tr><td>Binary size<\/td><td>❌ Larger (per-type codegen)<\/td><td>✅ Smaller<\/td><\/tr><tr><td>Flexibility<\/td><td>❌ Rigid, one type<\/td><td>✅ Mix types in collections<\/td><\/tr><tr><td>Trait fns<\/td><td>❌ Must be object-safe<\/td><td>✅ Works with trait objects<\/td><\/tr><tr><td>Errors<\/td><td>✅ Clearer<\/td><td>❌ Erased types confuse<\/td><\/tr><\/tbody><\/table>\n<ul><li>Prefer generics when controlling call site + perf matters<\/li><li>Use dyn when abstraction/plugins/mixed types needed (runtime cost)<\/li><li>Unsure → start generic + bound; switch to <code>Box&lt;dyn&gt;<\/code> when flexibility wins<\/li><\/ul>\n<blockquote><p>Favor static dispatch until trait must live behind a pointer.<\/p><\/blockquote>\n<h2 id=\"6-5-when-dynamic-dispatch\">6.5 When dynamic dispatch<\/h2>\n<h3 id=\"use-when\">✅ Use when<\/h3>\n<ul><li>Heterogeneous types in collection<\/li><li>Runtime plugins / hot-swappable<\/li><li>Abstract internals from caller (library design)<\/li><\/ul>\n<h3 id=\"avoid-when\">❌ Avoid when<\/h3>\n<ul><li>You control concrete types<\/li><li>Perf-critical paths<\/li><li>Same logic expressible via generics<\/li><\/ul>\n<h2 id=\"6-6-trait-object-ergonomics\">6.6 Trait object ergonomics<\/h2>\n<ul><li>Prefer <code>&amp;dyn Trait<\/code> over <code>Box&lt;dyn Trait&gt;<\/code> when no ownership needed<\/li><li><code>Arc&lt;dyn Trait&gt;<\/code> for cross-thread shared<\/li><li>Don't <code>dyn Trait<\/code> if trait has methods returning <code>Self<\/code><\/li><li>Avoid premature boxing inside structs: ``<code>rust // ✅ struct Renderer&lt;B: Backend&gt; { backend: B } // ❌ struct Renderer { backend: Box&lt;dyn Backend&gt; } <\/code>``<\/li><li>If public API must expose <code>dyn<\/code>, box at boundary, not internally<\/li><\/ul>\n<h3 id=\"object-safety\">Object safety<\/h3>\n<p><code>dyn<\/code> requires:<\/p>\n<ul><li>No generic methods<\/li><li>No <code>Self: Sized<\/code><\/li><li>Methods use <code>&amp;self<\/code> / <code>&amp;mut self<\/code> / <code>self<\/code><\/li><\/ul>\n<pre><code class=\"language-rust\">// ✅ trait Runnable { fn run(&amp;self); }\n// ❌ trait Factory { fn create&lt;T&gt;() -&gt; T; }  // generic method<\/code><\/pre>","text":"Chapter 6 — Generics, Static & Dynamic Dispatch Static where you can, dynamic where you must. Two polymorphism options: Generics / Static dispatch — compile-time, monomorphized per use Trait objects / Dynamic dispatch — runtime vtable, single impl 6.1 Generics Abstract stand-ins for concrete types. Compiler monomorphizes at compile time → no runtime cost. Generates specialized code per concrete type. Used for fns, structs, enums, methods, type-state pattern (chapter 7). 6.2 Static dispatch — impl Trait / <T: Trait> Trait-bounded generic. Compile-time check. Best when Zero runtime cost (pay compile time) Tight loops / perf-critical Types known at compile time Single-use impl (monomorphized) fn specialized_sum<T: MyTrait>(iter: impl Iterator<Item = T>) -> T { iter.map(|x| x.random_mapping()).sum() } Compiles to specialized inlined machine code per call site. 6.3 Dynamic dispatch — dyn Trait Used with pointer: Box<dyn Trait> , Arc<dyn Trait> , &dyn Trait . Best when Runtime polymorphism actually needed Heterogeneous impls in one collection Abstract internals behind stable interface Plugin-style architecture trait Animal { fn greet(&self) -> String; } struct Dog; impl Animal for Dog { fn greet(&self) -> String { \"woof\".into() } } struct Cat; impl Animal for Cat { fn greet(&self) -> String { \"meow\".into() } } fn all_greet(animals: Vec<Box<dyn Animal>>) { for a in animals { println!(\"{}\", a.greet()); } } 6.4 Trade-offs Static ( impl Trait ) Dynamic ( dyn Trait ) Performance ✅ Faster, inlined ❌ Vtable indirection Compile time ❌ Slower (monomorphization) ✅ Faster (shared code) Binary size ❌ Larger (per-type codegen) ✅ Smaller Flexibility ❌ Rigid, one type ✅ Mix types in collections Trait fns ❌ Must be object-safe ✅ Works with trait objects Errors ✅ Clearer ❌ Erased types confuse Prefer generics when controlling call site + perf matters Use dyn when abstraction/plugins/mixed types needed (runtime cost) Unsure → start generic + bound; switch to Box<dyn> when flexibility wins Favor static dispatch until trait must live behind a pointer. 6.5 When dynamic dispatch ✅ Use when Heterogeneous types in collection Runtime plugins / hot-swappable Abstract internals from caller (library design) ❌ Avoid when You control concrete types Perf-critical paths Same logic expressible via generics 6.6 Trait object ergonomics Prefer &dyn Trait over Box<dyn Trait> when no ownership needed Arc<dyn Trait> for cross-thread shared Don't dyn Trait if trait has methods returning Self Avoid premature boxing inside structs: `` rust // ✅ struct Renderer<B: Backend> { backend: B } // ❌ struct Renderer { backend: Box<dyn Backend> } `` If public API must expose dyn , box at boundary, not internally Object safety dyn requires: No generic methods No Self: Sized Methods use &self / &mut self / self // ✅ trait Runnable { fn run(&self); } // ❌ trait Factory { fn create<T>() -> T; } // generic method"},{"id":".claude/skills/rust-best-practices/references/chapter_07.md","title":"Chapter 7 — Type State Pattern","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_07.md","desc":"","html":"<h1 id=\"chapter-7-type-state-pattern\">Chapter 7 — Type State Pattern<\/h1>\n<p>States as types, not runtime flags. Compiler enforces transitions; illegal ops = compile error.<\/p>\n<blockquote><p>Invalid states become compile errors instead of runtime bugs.<\/p><\/blockquote>\n<p>Available in <a href=\"https://swiftology.io/articles/typestate/\">Swift<\/a>, <a href=\"https://catchts.com/type-state\">TypeScript<\/a> too.<\/p>\n<h2 id=\"7-1-why\">7.1 Why<\/h2>\n<ul><li>Avoid runtime state validity checks<\/li><li>Model state transitions as type transitions (compile-time state machine)<\/li><li>Prevent misuse (e.g. uninitialized objects)<\/li><li>Better API safety + DX (only available methods exposed per state)<\/li><li><code>PhantomData<\/code> removed at compile — zero memory cost<\/li><\/ul>\n<h2 id=\"7-2-simple-example-file-state\">7.2 Simple example: file state<\/h2>\n<pre><code class=\"language-rust\">struct FileNotOpened;\nstruct FileOpened;\n\nstruct File&lt;State&gt; {\n    path: PathBuf,\n    handle: Option&lt;std::fs::File&gt;,\n    _state: std::marker::PhantomData&lt;State&gt;,\n}\n\nimpl File&lt;FileNotOpened&gt; {\n    fn open(path: &amp;Path) -&gt; io::Result&lt;File&lt;FileOpened&gt;&gt; {\n        let file = std::fs::File::open(path)?;\n        Ok(File {\n            path: path.to_path_buf(),\n            handle: Some(file),\n            _state: std::marker::PhantomData::&lt;FileOpened&gt;,\n        })\n    }\n}\n\nimpl File&lt;FileOpened&gt; {\n    fn read(&amp;mut self) -&gt; io::Result&lt;String&gt; {\n        use io::Read;\n        let mut content = String::new();\n        let Some(handle) = self.handle.as_mut() else {\n            unreachable!(&quot;state guarantees handle set&quot;);\n        };\n        handle.read_to_string(&amp;mut content)?;\n        Ok(content)\n    }\n    fn path(&amp;self) -&gt; &amp;PathBuf { &amp;self.path }\n}<\/code><\/pre>\n<p><code>open<\/code> is the only entry — produces <code>File&lt;FileOpened&gt;<\/code> with valid handle. <code>read<\/code> only callable from <code>FileOpened<\/code> state.<\/p>\n<h2 id=\"7-3-real-example-builder-with-required-fields\">7.3 Real example: builder with required fields<\/h2>\n<p>Forces required fields before <code>.build()<\/code>. Multiple state markers chained:<\/p>\n<pre><code class=\"language-rust\">struct MissingName; struct NameSet;\nstruct MissingAge;  struct AgeSet;\n\nstruct Builder&lt;NameState, AgeState&gt; {\n    name: Option&lt;String&gt;,\n    age: u8,\n    email: Option&lt;String&gt;,\n    _name_marker: PhantomData&lt;NameState&gt;,\n    _age_marker: PhantomData&lt;AgeState&gt;,\n}\n\nimpl Builder&lt;MissingName, MissingAge&gt; {\n    fn new() -&gt; Self { … }\n    fn name(self, name: String) -&gt; Builder&lt;NameSet, MissingAge&gt; { … }\n    fn age(self, age: u8) -&gt; Builder&lt;MissingName, AgeSet&gt; { … }\n}\n\nimpl Builder&lt;NameSet, MissingAge&gt; {\n    fn age(self, age: u8) -&gt; Builder&lt;NameSet, AgeSet&gt; { … }\n}\n\nimpl Builder&lt;NameSet, AgeSet&gt; {\n    fn build(self) -&gt; Person {\n        Person { name: self.name.unwrap(), age: self.age, email: self.email }\n    }\n}<\/code><\/pre>\n<pre><code class=\"language-rust\">// ✅\nBuilder::new().name(&quot;n&quot;.into()).age(30).build();\nBuilder::new().age(30).name(&quot;n&quot;.into()).email(&quot;e@x&quot;.into()).build();\n\n// ❌ compile errors\nBuilder::new().name(&quot;n&quot;.into()).build();          // missing age\nBuilder::new().age(30).build();                   // missing name\nBuilder::new().build();                           // missing both<\/code><\/pre>\n<h2 id=\"7-4-real-example-network-protocol-state\">7.4 Real example: network protocol state<\/h2>\n<p>Sending pre-connect = won't compile.<\/p>\n<pre><code class=\"language-rust\">struct Disconnected; struct Connected;\n\nstruct Client&lt;State&gt; {\n    stream: Option&lt;std::net::TcpStream&gt;,\n    _state: std::marker::PhantomData&lt;State&gt;,\n}\n\nimpl Client&lt;Disconnected&gt; {\n    fn connect(addr: &amp;str) -&gt; std::io::Result&lt;Client&lt;Connected&gt;&gt; {\n        let stream = std::net::TcpStream::connect(addr)?;\n        Ok(Client { stream: Some(stream), _state: PhantomData::&lt;Connected&gt; })\n    }\n}\n\nimpl Client&lt;Connected&gt; {\n    fn send(&amp;mut self, msg: &amp;str) {\n        use std::io::Write;\n        let Some(s) = self.stream.as_mut() else { unreachable!() };\n        s.write_all(msg.as_bytes())\n    }\n}<\/code><\/pre>\n<h2 id=\"7-5-pros-cons\">7.5 Pros/cons<\/h2>\n<h3 id=\"use-when\">Use when<\/h3>\n<ul><li>Compile-time state safety needed<\/li><li>Enforce API constraints<\/li><li>Library/crate variant-heavy<\/li><li>Replace runtime bools/enums with type-safe paths<\/li><li>Compile-time correctness<\/li><\/ul>\n<h3 id=\"avoid-when\">Avoid when<\/h3>\n<ul><li>Trivial states (use enums)<\/li><li>No type-safety need<\/li><li>Leads to overcomplicated generics<\/li><li>Runtime flexibility required<\/li><\/ul>\n<h3 id=\"downsides\">Downsides<\/h3>\n<ul><li>Verbose<\/li><li>Complex type signatures<\/li><li>May need <code>unsafe<\/code> for variant outputs<\/li><li>Field duplication<\/li><li><code>PhantomData<\/code> unintuitive for beginners<\/li><\/ul>\n<blockquote><p>Use when it saves bugs, increases safety, or simplifies logic — not for cleverness.<\/p><\/blockquote>","text":"Chapter 7 — Type State Pattern States as types, not runtime flags. Compiler enforces transitions; illegal ops = compile error. Invalid states become compile errors instead of runtime bugs. Available in Swift , TypeScript too. 7.1 Why Avoid runtime state validity checks Model state transitions as type transitions (compile-time state machine) Prevent misuse (e.g. uninitialized objects) Better API safety + DX (only available methods exposed per state) PhantomData removed at compile — zero memory cost 7.2 Simple example: file state struct FileNotOpened; struct FileOpened; struct File<State> { path: PathBuf, handle: Option<std::fs::File>, _state: std::marker::PhantomData<State>, } impl File<FileNotOpened> { fn open(path: &Path) -> io::Result<File<FileOpened>> { let file = std::fs::File::open(path)?; Ok(File { path: path.to_path_buf(), handle: Some(file), _state: std::marker::PhantomData::<FileOpened>, }) } } impl File<FileOpened> { fn read(&mut self) -> io::Result<String> { use io::Read; let mut content = String::new(); let Some(handle) = self.handle.as_mut() else { unreachable!(\"state guarantees handle set\"); }; handle.read_to_string(&mut content)?; Ok(content) } fn path(&self) -> &PathBuf { &self.path } } open is the only entry — produces File<FileOpened> with valid handle. read only callable from FileOpened state. 7.3 Real example: builder with required fields Forces required fields before .build() . Multiple state markers chained: struct MissingName; struct NameSet; struct MissingAge; struct AgeSet; struct Builder<NameState, AgeState> { name: Option<String>, age: u8, email: Option<String>, _name_marker: PhantomData<NameState>, _age_marker: PhantomData<AgeState>, } impl Builder<MissingName, MissingAge> { fn new() -> Self { … } fn name(self, name: String) -> Builder<NameSet, MissingAge> { … } fn age(self, age: u8) -> Builder<MissingName, AgeSet> { … } } impl Builder<NameSet, MissingAge> { fn age(self, age: u8) -> Builder<NameSet, AgeSet> { … } } impl Builder<NameSet, AgeSet> { fn build(self) -> Person { Person { name: self.name.unwrap(), age: self.age, email: self.email } } } // ✅ Builder::new().name(\"n\".into()).age(30).build(); Builder::new().age(30).name(\"n\".into()).email(\"e@x\".into()).build(); // ❌ compile errors Builder::new().name(\"n\".into()).build(); // missing age Builder::new().age(30).build(); // missing name Builder::new().build(); // missing both 7.4 Real example: network protocol state Sending pre-connect = won't compile. struct Disconnected; struct Connected; struct Client<State> { stream: Option<std::net::TcpStream>, _state: std::marker::PhantomData<State>, } impl Client<Disconnected> { fn connect(addr: &str) -> std::io::Result<Client<Connected>> { let stream = std::net::TcpStream::connect(addr)?; Ok(Client { stream: Some(stream), _state: PhantomData::<Connected> }) } } impl Client<Connected> { fn send(&mut self, msg: &str) { use std::io::Write; let Some(s) = self.stream.as_mut() else { unreachable!() }; s.write_all(msg.as_bytes()) } } 7.5 Pros/cons Use when Compile-time state safety needed Enforce API constraints Library/crate variant-heavy Replace runtime bools/enums with type-safe paths Compile-time correctness Avoid when Trivial states (use enums) No type-safety need Leads to overcomplicated generics Runtime flexibility required Downsides Verbose Complex type signatures May need unsafe for variant outputs Field duplication PhantomData unintuitive for beginners Use when it saves bugs, increases safety, or simplifies logic — not for cleverness."},{"id":".claude/skills/rust-best-practices/references/chapter_08.md","title":"Chapter 8 — Comments vs Documentation","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_08.md","desc":"","html":"<h1 id=\"chapter-8-comments-vs-documentation\">Chapter 8 — Comments vs Documentation<\/h1>\n<blockquote><p>Clear code beats clear comments. When <em>why<\/em> isn't obvious, comment plainly or link.<\/p><\/blockquote>\n<h2 id=\"8-1-difference\">8.1 Difference<\/h2>\n<table><thead><tr><th>Purpose<\/th><th><code>// comment<\/code><\/th><th><code>/// doc<\/code> / <code>//! crate doc<\/code><\/th><\/tr><\/thead><tbody><tr><td>Describe <em>why<\/em><\/td><td>✅ tricky reasoning<\/td><td>❌<\/td><\/tr><tr><td>Describe API<\/td><td>❌<\/td><td>✅ public interfaces, usage, errors, panics<\/td><\/tr><tr><td>Maintainable<\/td><td>🚨 rots<\/td><td>✅ tied to code, in <code>cargo doc<\/code>, runs tests<\/td><\/tr><tr><td>Visibility<\/td><td>local<\/td><td>exported<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"8-2-when-to-use\">8.2 When to use <code>//<\/code><\/h2>\n<p>For things code can't express:<\/p>\n<ul><li>Safety guarantees (start with <code>// SAFETY:<\/code>)<\/li><li>Workarounds / optimizations<\/li><li>Legacy / platform-specific (some replaceable with <code>#[cfg(..)]<\/code>)<\/li><li>Links to ADRs / Design Docs<\/li><li>Non-obvious gotchas / assumptions<\/li><\/ul>\n<pre><code class=\"language-rust\">// SAFETY: ptr is non-null + aligned by caller\nunsafe { std::ptr::copy_nonoverlapping(src, dst, len); }\n\n// CONTEXT: Reuse root cert store across subgraphs to avoid duplicate OS calls.\n// See [ADR-12](link/to/adr-12)<\/code><\/pre>\n<h2 id=\"8-3-bad-comments\">8.3 Bad comments<\/h2>\n<ul><li>Restate obvious (<code>// increment by 1<\/code>)<\/li><li>Stale-prone<\/li><li><code>TODO<\/code>s without action (no linked issue)<\/li><li>Replaceable by better naming or smaller fns<\/li><li>Outdated/ancient<\/li><\/ul>\n<h2 id=\"8-4-don-t-write-living-documentation\">8.4 Don't write \"living documentation\"<\/h2>\n<p>Comments rot, mislead, go stale, clutter. If something deserves to live beyond a PR:<\/p>\n<ul><li>ADR (perf tradeoffs, architectural decisions)<\/li><li>Design doc (business logic)<\/li><li>Code itself (types, doc comments, examples, smaller functions)<\/li><li>Tests covering the change<\/li><\/ul>\n<blockquote><p>Comments should bother you — re-verify like stale tests.<\/p><\/blockquote>\n<h2 id=\"8-5-replace-comments-with-code\">8.5 Replace comments with code<\/h2>\n<pre><code class=\"language-rust\">// ❌\nfn save_user(&amp;self) -&gt; Result&lt;(), MyError&gt; {\n    // check if authenticated\n    if self.is_authenticated() {\n        // serialize\n        let data = serde_json::to_string(self)?;\n        // write to file\n        std::fs::write(self.path(), data)?;\n    }\n}\n\n// ✅\nfn save_auth_user(&amp;self) -&gt; Result&lt;PathBuf, MyError&gt; {\n    if !self.is_authenticated() { return Err(MyError::UserNotAuthenticated); }\n    let path = self.path();\n    let serialized = serde_json::to_string(self)?;\n    std::fs::write(&amp;path, serialized)?;\n    Ok(path)\n}<\/code><\/pre>\n<h2 id=\"8-6-todos-issues\">8.6 TODOs → issues<\/h2>\n<p>Don't leave naked <code>// TODO:<\/code>. File issue, link:<\/p>\n<pre><code class=\"language-rust\">// TODO(issue #42): Remove workaround after bugfix<\/code><\/pre>\n<h2 id=\"8-7-when-to\">8.7 When to <code>///<\/code><\/h2>\n<p>Document all public functions, structs, traits, enums. Cover purpose, usage, behaviors. Add <code># Errors<\/code>, <code># Panics<\/code>, <code># Safety<\/code> sections + plenty examples.<\/p>\n<pre><code class=\"language-rust\">/// Loads [`User`] from disk.\n///\n/// # Errors\n/// - [`MyError::FileNotFound`] if missing\n/// - [`MyError::InvalidJson`] if invalid\nfn load_user(path: &amp;Path) -&gt; Result&lt;User, MyError&gt; { … }<\/code><\/pre>\n<p>Examples in doc-tests:<\/p>\n<pre><code class=\"language-rust\">/// # Examples\n/// ```rust\n/// assert_eq!(square(4.3), 16)\n/// ```\nfn square(x: impl ToInt) -&gt; u128 { … }<\/code><\/pre>\n<h2 id=\"8-8-rustdoc-lints\">8.8 rustdoc lints<\/h2>\n<table><thead><tr><th>Lint<\/th><th>Description<\/th><\/tr><\/thead><tbody><tr><td><code>missing_docs<\/code><\/td><td>Public items missing doc<\/td><\/tr><tr><td><code>broken_intra_doc_links<\/code><\/td><td>Broken <code>[<\/code>refs<code>]<\/code> (catch on rename)<\/td><\/tr><tr><td><code>empty_docs<\/code><\/td><td>Empty doc blocks bypassing <code>missing_docs<\/code><\/td><\/tr><tr><td><code>missing_panics_doc<\/code><\/td><td>Fn can panic but no <code># Panics<\/code> section<\/td><\/tr><tr><td><code>missing_errors_doc<\/code><\/td><td>Returns <code>Result<\/code> but no <code># Errors<\/code><\/td><\/tr><tr><td><code>missing_safety_doc<\/code><\/td><td>Public unsafe block without <code># Safety<\/code><\/td><\/tr><\/tbody><\/table>\n<h3 id=\"vs\"><code>///<\/code> vs <code>//!<\/code><\/h3>\n<table><thead><tr><th>Style<\/th><th>Used for<\/th><th>Scope<\/th><\/tr><\/thead><tbody><tr><td><code>///<\/code><\/td><td>Item doc (fn, struct, enum, const)<\/td><td>Public items<\/td><\/tr><tr><td><code>//!<\/code><\/td><td>Module/crate doc<\/td><td>At top of <code>lib.rs<\/code> / <code>mod.rs<\/code><\/td><\/tr><\/tbody><\/table>\n<pre><code class=\"language-rust\">//! Custom chess engine.\n//! Handles board state, move generation, check detection.\n//! # Example\n//! ```\n//! let board = chess::engine::Board::default();\n//! ```<\/code><\/pre>\n<h2 id=\"8-9-coverage-checklist\">8.9 Coverage checklist<\/h2>\n<p>📦 <strong>Crate (<code>lib.rs<\/code>)<\/strong>: <code>//!<\/code> explains what crate does + problems solved + crate-level <code># Examples<\/code><\/p>\n<p>📁 <strong>Modules<\/strong>: <code>//!<\/code> explains purpose, exports, invariants. Don't repeat re-exported docs unless clarification needed.<\/p>\n<p>🧱 <strong>Structs/enums/traits<\/strong>: <code>///<\/code> covers role, invariants, example. Consider <code>#[non_exhaustive]<\/code> if external matches.<\/p>\n<p>🔧 <strong>Functions/methods<\/strong>: <code>///<\/code> covers what, params, return, edges (<code># Panics<\/code>/<code># Errors<\/code>), <code># Examples<\/code>.<\/p>\n<p>📑 <strong>Traits<\/strong>: explain purpose (marker? dispatch?). Doc each method (when/why to impl). Document default methods + override conditions.<\/p>\n<p>📦 <strong>Public consts<\/strong>: what they configure + when used.<\/p>\n<h3 id=\"best-practices\">Best practices<\/h3>\n<ul><li>Examples = test cases (free testing)<\/li><li>Clarity &gt; formality<\/li><li><code>///<\/code> for usage; <code>//<\/code> for impl details<\/li><li><code>cargo doc --open<\/code> often<\/li><li>Enforce via <code>#![deny(missing_docs)]<\/code> at top-level<\/li><\/ul>","text":"Chapter 8 — Comments vs Documentation Clear code beats clear comments. When why isn't obvious, comment plainly or link. 8.1 Difference Purpose // comment /// doc / //! crate doc Describe why ✅ tricky reasoning ❌ Describe API ❌ ✅ public interfaces, usage, errors, panics Maintainable 🚨 rots ✅ tied to code, in cargo doc , runs tests Visibility local exported 8.2 When to use // For things code can't express: Safety guarantees (start with // SAFETY: ) Workarounds / optimizations Legacy / platform-specific (some replaceable with #[cfg(..)] ) Links to ADRs / Design Docs Non-obvious gotchas / assumptions // SAFETY: ptr is non-null + aligned by caller unsafe { std::ptr::copy_nonoverlapping(src, dst, len); } // CONTEXT: Reuse root cert store across subgraphs to avoid duplicate OS calls. // See [ADR-12](link/to/adr-12) 8.3 Bad comments Restate obvious ( // increment by 1 ) Stale-prone TODO s without action (no linked issue) Replaceable by better naming or smaller fns Outdated/ancient 8.4 Don't write \"living documentation\" Comments rot, mislead, go stale, clutter. If something deserves to live beyond a PR: ADR (perf tradeoffs, architectural decisions) Design doc (business logic) Code itself (types, doc comments, examples, smaller functions) Tests covering the change Comments should bother you — re-verify like stale tests. 8.5 Replace comments with code // ❌ fn save_user(&self) -> Result<(), MyError> { // check if authenticated if self.is_authenticated() { // serialize let data = serde_json::to_string(self)?; // write to file std::fs::write(self.path(), data)?; } } // ✅ fn save_auth_user(&self) -> Result<PathBuf, MyError> { if !self.is_authenticated() { return Err(MyError::UserNotAuthenticated); } let path = self.path(); let serialized = serde_json::to_string(self)?; std::fs::write(&path, serialized)?; Ok(path) } 8.6 TODOs → issues Don't leave naked // TODO: . File issue, link: // TODO(issue #42): Remove workaround after bugfix 8.7 When to /// Document all public functions, structs, traits, enums. Cover purpose, usage, behaviors. Add # Errors , # Panics , # Safety sections + plenty examples. /// Loads [`User`] from disk. /// /// # Errors /// - [`MyError::FileNotFound`] if missing /// - [`MyError::InvalidJson`] if invalid fn load_user(path: &Path) -> Result<User, MyError> { … } Examples in doc-tests: /// # Examples /// ```rust /// assert_eq!(square(4.3), 16) /// ``` fn square(x: impl ToInt) -> u128 { … } 8.8 rustdoc lints Lint Description missing_docs Public items missing doc broken_intra_doc_links Broken [ refs ] (catch on rename) empty_docs Empty doc blocks bypassing missing_docs missing_panics_doc Fn can panic but no # Panics section missing_errors_doc Returns Result but no # Errors missing_safety_doc Public unsafe block without # Safety /// vs //! Style Used for Scope /// Item doc (fn, struct, enum, const) Public items //! Module/crate doc At top of lib.rs / mod.rs //! Custom chess engine. //! Handles board state, move generation, check detection. //! # Example //! ``` //! let board = chess::engine::Board::default(); //! ``` 8.9 Coverage checklist 📦 Crate ( lib.rs ) : //! explains what crate does + problems solved + crate-level # Examples 📁 Modules : //! explains purpose, exports, invariants. Don't repeat re-exported docs unless clarification needed. 🧱 Structs/enums/traits : /// covers role, invariants, example. Consider #[non_exhaustive] if external matches. 🔧 Functions/methods : /// covers what, params, return, edges ( # Panics / # Errors ), # Examples . 📑 Traits : explain purpose (marker? dispatch?). Doc each method (when/why to impl). Document default methods + override conditions. 📦 Public consts : what they configure + when used. Best practices Examples = test cases (free testing) Clarity > formality /// for usage; // for impl details cargo doc --open often Enforce via #![deny(missing_docs)] at top-level"},{"id":".claude/skills/rust-best-practices/references/chapter_09.md","title":"Chapter 9 — Pointers","category":"Skills","path":".claude/skills/rust-best-practices/references/chapter_09.md","desc":"","html":"<h1 id=\"chapter-9-pointers\">Chapter 9 — Pointers<\/h1>\n<p>Rust makes memory management explicit. Pointer table:<\/p>\n<table><thead><tr><th>Type<\/th><th>Description<\/th><th><code>Send + Sync<\/code><\/th><th>Use<\/th><\/tr><\/thead><tbody><tr><td><code>&amp;T<\/code><\/td><td>Shared reference<\/td><td>Yes<\/td><td>Shared read<\/td><\/tr><tr><td><code>&amp;mut T<\/code><\/td><td>Exclusive mutable ref<\/td><td>Not Send<\/td><td>Exclusive mutate<\/td><\/tr><tr><td><code>Box&lt;T&gt;<\/code><\/td><td>Heap-owned<\/td><td>If T: Send+Sync<\/td><td>Heap alloc<\/td><\/tr><tr><td><code>Rc&lt;T&gt;<\/code><\/td><td>Single-thread refcount<\/td><td>Neither<\/td><td>Multi-owner single-thread<\/td><\/tr><tr><td><code>Arc&lt;T&gt;<\/code><\/td><td>Atomic refcount<\/td><td>Yes<\/td><td>Multi-owner multi-thread<\/td><\/tr><tr><td><code>Cell&lt;T&gt;<\/code><\/td><td>Interior mut for Copy types<\/td><td>Not Sync<\/td><td>Shared mut, non-threaded<\/td><\/tr><tr><td><code>RefCell&lt;T&gt;<\/code><\/td><td>Interior mut (runtime borrow check)<\/td><td>Not Sync<\/td><td>Shared mut, non-threaded<\/td><\/tr><tr><td><code>Mutex&lt;T&gt;<\/code><\/td><td>Thread-safe interior mut, exclusive<\/td><td>Yes<\/td><td>Shared mut, threaded<\/td><\/tr><tr><td><code>RwLock&lt;T&gt;<\/code><\/td><td>Thread-safe shared-read OR exclusive-write<\/td><td>Yes<\/td><td>Shared mut, threaded<\/td><\/tr><tr><td><code>OnceCell&lt;T&gt;<\/code><\/td><td>Single-thread one-time init<\/td><td>Not Sync<\/td><td>Lazy value init<\/td><\/tr><tr><td><code>LazyCell&lt;T&gt;<\/code><\/td><td><code>OnceCell<\/code> with closure init<\/td><td>Not Sync<\/td><td>Complex lazy init<\/td><\/tr><tr><td><code>OnceLock&lt;T&gt;<\/code><\/td><td>Thread-safe <code>OnceCell<\/code><\/td><td>Yes<\/td><td>Multi-thread single init<\/td><\/tr><tr><td><code>LazyLock&lt;T&gt;<\/code><\/td><td>Thread-safe <code>LazyCell<\/code><\/td><td>Yes<\/td><td>Multi-thread complex init<\/td><\/tr><tr><td><code>*const T<\/code> / <code>*mut T<\/code><\/td><td>Raw pointer<\/td><td>User-managed<\/td><td>FFI / raw memory<\/td><\/tr><\/tbody><\/table>\n<p><code>Send<\/code> = data movable across threads. <code>Sync<\/code> = data referenceable from multiple threads.<\/p>\n<h2 id=\"when-to-use\">When to use<\/h2>\n<h3 id=\"t-shared-borrow\"><code>&amp;T<\/code> — shared borrow<\/h3>\n<p>Most common. Safe, no mutation, multiple readers.<\/p>\n<pre><code class=\"language-rust\">let data = String::from(&quot;foo&quot;);\nprint_len(&amp;data); print_capacity(&amp;data);\nfn print_len(s: &amp;str) { println!(&quot;{}&quot;, s.len()); }<\/code><\/pre>\n<h3 id=\"mut-t-exclusive-borrow\"><code>&amp;mut T<\/code> — exclusive borrow<\/h3>\n<p>Most common mutable. One mutable borrow at a time.<\/p>\n<pre><code class=\"language-rust\">let mut data = String::from(&quot;foo&quot;);\nmark_update(&amp;mut data);\nfn mark_update(s: &amp;mut String) { s.push_str(&quot;_update&quot;); }<\/code><\/pre>\n<h3 id=\"box-t-heap-allocated\"><code>Box&lt;T&gt;<\/code> — heap-allocated<\/h3>\n<p>Single-owner heap. Recursive types, large structs.<\/p>\n<pre><code class=\"language-rust\">enum BoxedTree&lt;T&gt; {\n    Single(T),\n    Double(Box&lt;BoxedTree&lt;T&gt;&gt;, Box&lt;BoxedTree&lt;T&gt;&gt;),\n}<\/code><\/pre>\n<h3 id=\"rc-t-single-thread-refcount\"><code>Rc&lt;T&gt;<\/code> — single-thread refcount<\/h3>\n<p>Multiple references in single thread. Linked lists.<\/p>\n<h3 id=\"arc-t-atomic-refcount\"><code>Arc&lt;T&gt;<\/code> — atomic refcount<\/h3>\n<p>Multi-thread share. Common: <code>Arc&lt;[T]&gt;<\/code> (read-only), <code>Arc&lt;Mutex&lt;T&gt;&gt;<\/code> (mutable share).<\/p>\n<h3 id=\"refcell-t-runtime-borrow-check\"><code>RefCell&lt;T&gt;<\/code> — runtime borrow check<\/h3>\n<p>Shared access + mutation, runtime-enforced. <strong>May panic.<\/strong><\/p>\n<pre><code class=\"language-rust\">let x = RefCell::new(42);\n*x.borrow_mut() += 1;\n// Don&#x27;t:\nlet _b = x.borrow();\nlet _m = x.borrow_mut();  // PANIC<\/code><\/pre>\n<h3 id=\"cell-t-copy-only-interior-mut\"><code>Cell&lt;T&gt;<\/code> — Copy-only interior mut<\/h3>\n<p>Faster, safer than <code>RefCell<\/code>, but only for <code>Copy<\/code>:<\/p>\n<pre><code class=\"language-rust\">struct S { regular: u8, special: Cell&lt;u8&gt; }\nlet s = S { regular: 0, special: Cell::new(1) };\ns.special.set(100);  // OK even though `s` immutable<\/code><\/pre>\n<h3 id=\"mutex-t-thread-safe-mutate\"><code>Mutex&lt;T&gt;<\/code> — thread-safe mutate<\/h3>\n<p>Exclusive access. Usually <code>Arc&lt;Mutex&lt;T&gt;&gt;<\/code> to share.<\/p>\n<h3 id=\"rwlock-t-multi-read-or-single-write\"><code>RwLock&lt;T&gt;<\/code> — multi-read OR single-write<\/h3>\n<p>Like Mutex but multiple readers concurrent. <code>Arc&lt;RwLock&lt;T&gt;&gt;<\/code>.<\/p>\n<h3 id=\"const-t-mut-t-raw\"><code>*const T<\/code> / <code>*mut T<\/code> — raw<\/h3>\n<p><strong>Unsafe<\/strong>, FFI only. Explicit.<\/p>\n<pre><code class=\"language-rust\">let x = 5;\nlet ptr = &amp;x as *const i32;\nunsafe { println!(&quot;{}&quot;, *ptr) }<\/code><\/pre>\n<h3 id=\"oncecell-single-thread-one-time-init\"><code>OnceCell<\/code> — single-thread one-time init<\/h3>\n<p>Share configs between data structures.<\/p>\n<pre><code class=\"language-rust\">struct MyStruct { distance: usize, root: Option&lt;Rc&lt;OnceCell&lt;MyStruct&gt;&gt;&gt; }<\/code><\/pre>\n<h3 id=\"lazycell-oncecell-with-init-closure\"><code>LazyCell<\/code> — <code>OnceCell<\/code> with init closure<\/h3>\n<p>Init delayed until first access.<\/p>\n<h3 id=\"oncelock-thread-safe-oncecell\"><code>OnceLock<\/code> — thread-safe <code>OnceCell<\/code><\/h3>\n<p>For static values:<\/p>\n<pre><code class=\"language-rust\">static CELL: OnceLock&lt;u32&gt; = OnceLock::new();\nlet val = CELL.get_or_init(|| 12345);<\/code><\/pre>\n<h3 id=\"lazylock-thread-safe-lazycell\"><code>LazyLock<\/code> — thread-safe <code>LazyCell<\/code><\/h3>\n<p>Static values with complex init:<\/p>\n<pre><code class=\"language-rust\">static CONFIG: LazyLock&lt;HashMap&lt;&amp;str, T&gt;&gt; = LazyLock::new(|| {\n    let mut config: HashMap&lt;&amp;str, T&gt; = read_config().into();\n    config.insert(&quot;special_case&quot;, T::default());\n    config\n});<\/code><\/pre>\n<h2 id=\"references\">References<\/h2>\n<ul><li>Mara Bos — <em>Rust Atomics and Locks<\/em>: https://marabos.nl/atomics/<\/li><\/ul>","text":"Chapter 9 — Pointers Rust makes memory management explicit. Pointer table: Type Description Send + Sync Use &T Shared reference Yes Shared read &mut T Exclusive mutable ref Not Send Exclusive mutate Box<T> Heap-owned If T: Send+Sync Heap alloc Rc<T> Single-thread refcount Neither Multi-owner single-thread Arc<T> Atomic refcount Yes Multi-owner multi-thread Cell<T> Interior mut for Copy types Not Sync Shared mut, non-threaded RefCell<T> Interior mut (runtime borrow check) Not Sync Shared mut, non-threaded Mutex<T> Thread-safe interior mut, exclusive Yes Shared mut, threaded RwLock<T> Thread-safe shared-read OR exclusive-write Yes Shared mut, threaded OnceCell<T> Single-thread one-time init Not Sync Lazy value init LazyCell<T> OnceCell with closure init Not Sync Complex lazy init OnceLock<T> Thread-safe OnceCell Yes Multi-thread single init LazyLock<T> Thread-safe LazyCell Yes Multi-thread complex init *const T / *mut T Raw pointer User-managed FFI / raw memory Send = data movable across threads. Sync = data referenceable from multiple threads. When to use &T — shared borrow Most common. Safe, no mutation, multiple readers. let data = String::from(\"foo\"); print_len(&data); print_capacity(&data); fn print_len(s: &str) { println!(\"{}\", s.len()); } &mut T — exclusive borrow Most common mutable. One mutable borrow at a time. let mut data = String::from(\"foo\"); mark_update(&mut data); fn mark_update(s: &mut String) { s.push_str(\"_update\"); } Box<T> — heap-allocated Single-owner heap. Recursive types, large structs. enum BoxedTree<T> { Single(T), Double(Box<BoxedTree<T>>, Box<BoxedTree<T>>), } Rc<T> — single-thread refcount Multiple references in single thread. Linked lists. Arc<T> — atomic refcount Multi-thread share. Common: Arc<[T]> (read-only), Arc<Mutex<T>> (mutable share). RefCell<T> — runtime borrow check Shared access + mutation, runtime-enforced. May panic. let x = RefCell::new(42); *x.borrow_mut() += 1; // Don't: let _b = x.borrow(); let _m = x.borrow_mut(); // PANIC Cell<T> — Copy-only interior mut Faster, safer than RefCell , but only for Copy : struct S { regular: u8, special: Cell<u8> } let s = S { regular: 0, special: Cell::new(1) }; s.special.set(100); // OK even though `s` immutable Mutex<T> — thread-safe mutate Exclusive access. Usually Arc<Mutex<T>> to share. RwLock<T> — multi-read OR single-write Like Mutex but multiple readers concurrent. Arc<RwLock<T>> . *const T / *mut T — raw Unsafe , FFI only. Explicit. let x = 5; let ptr = &x as *const i32; unsafe { println!(\"{}\", *ptr) } OnceCell — single-thread one-time init Share configs between data structures. struct MyStruct { distance: usize, root: Option<Rc<OnceCell<MyStruct>>> } LazyCell — OnceCell with init closure Init delayed until first access. OnceLock — thread-safe OnceCell For static values: static CELL: OnceLock<u32> = OnceLock::new(); let val = CELL.get_or_init(|| 12345); LazyLock — thread-safe LazyCell Static values with complex init: static CONFIG: LazyLock<HashMap<&str, T>> = LazyLock::new(|| { let mut config: HashMap<&str, T> = read_config().into(); config.insert(\"special_case\", T::default()); config }); References Mara Bos — Rust Atomics and Locks : https://marabos.nl/atomics/"},{"id":".claude/skills/specialists/SKILL.md","title":"specialists","category":"Skills","path":".claude/skills/specialists/SKILL.md","desc":"Sub-loader for domain specialists (Rust, agent infra, terminal, harness, perf, security, speed). Each entry captures the WHY and decision tree only — not implementation details. Trigger via `/specialists` or whenever a decision in one of these domains is on the table.","html":"<h1 id=\"specialists\">Specialists<\/h1>\n<p>Index of domain specialists. Each file answers <strong>why<\/strong> to pick an approach and <strong>when<\/strong> — never <strong>how<\/strong>. Implementation details (APIs, constants, syntax) stay in code and library docs (context7).<\/p>\n<h2 id=\"when-to-consult\">When to consult<\/h2>\n<ul><li>Before a non-trivial design decision in the listed domain.<\/li><li>During review when a choice feels arbitrary — load the specialist to check the why.<\/li><li>When unsure which approach fits — read the decision tree first, then commit.<\/li><\/ul>\n<h2 id=\"index\">Index<\/h2>\n<h3 id=\"rust-systems\">Rust systems<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"rust-ownership.md\">rust-ownership<\/a><\/td><td>Choosing borrow vs clone vs Arc/Rc/Cow; refactor away from <code>Arc&lt;Mutex&lt;T&gt;&gt;<\/code> smell<\/td><\/tr><tr><td><a href=\"rust-async.md\">rust-async<\/a><\/td><td>Picking a runtime, sync↔async boundary, <code>Send<\/code> bound problems, blocking inside async<\/td><\/tr><tr><td><a href=\"rust-errors.md\">rust-errors<\/a><\/td><td>Designing error types, library vs app style, where to <code>?<\/code> vs handle<\/td><\/tr><tr><td><a href=\"rust-traits.md\">rust-traits<\/a><\/td><td>Static vs dynamic dispatch, type-state, sealed traits, generic-vs-<code>dyn<\/code><\/td><\/tr><\/tbody><\/table>\n<h3 id=\"agent-ai-infra\">Agent / AI infra<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"mcp-design.md\">mcp-design<\/a><\/td><td>Building MCP servers, tool granularity, MCP vs in-process<\/td><\/tr><tr><td><a href=\"prompt-caching.md\">prompt-caching<\/a><\/td><td>Structuring prompts for reuse, cache breakpoints, invalidation reasons<\/td><\/tr><tr><td><a href=\"agent-memory.md\">agent-memory<\/a><\/td><td>What to persist across sessions, retrieval triggers, memory shape<\/td><\/tr><tr><td><a href=\"tool-routing.md\">tool-routing<\/a><\/td><td>Eager vs deferred tool loading, large catalogs, dispatch accuracy<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"terminal-tui-no-tauri\">Terminal / TUI (no Tauri)<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"ratatui-arch.md\">ratatui-arch<\/a><\/td><td>Structuring a ratatui app, state ownership, blocking work<\/td><\/tr><tr><td><a href=\"ansi-pty.md\">ansi-pty<\/a><\/td><td>Escape sequences, capability detection, PTY semantics<\/td><\/tr><tr><td><a href=\"terminal-input.md\">terminal-input<\/a><\/td><td>Kitty protocol, mouse, bracketed paste, raw mode safety<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"agent-harness\">Agent harness<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"agent-sandbox.md\">agent-sandbox<\/a><\/td><td>Running model-generated commands, fs/net scoping, blast radius<\/td><\/tr><tr><td><a href=\"harness-hooks.md\">harness-hooks<\/a><\/td><td>Pre/Post tool hooks, SessionStart, enforcing invariants<\/td><\/tr><tr><td><a href=\"parallel-subagents.md\">parallel-subagents<\/a><\/td><td>Fan-out decisions, context isolation, when sequential wins<\/td><\/tr><tr><td><a href=\"context-mgmt.md\">context-mgmt<\/a><\/td><td>Compaction, deferred tools, summarization triggers<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"performance\">Performance<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"profiling.md\">profiling<\/a><\/td><td>Picking a profiler, baselines, measurement discipline<\/td><\/tr><tr><td><a href=\"cache-locality.md\">cache-locality<\/a><\/td><td>Data layout in hot loops, SoA/AoS, false sharing<\/td><\/tr><tr><td><a href=\"allocator.md\">allocator<\/a><\/td><td>Arena/slab/system choice, lifetime-based reasoning<\/td><\/tr><tr><td><a href=\"contention.md\">contention<\/a><\/td><td>Lock-free vs mutex vs sharding, RwLock pitfalls<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"security\">Security<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"supply-chain.md\">supply-chain<\/a><\/td><td>New deps, lockfile policy, audit cadence<\/td><\/tr><tr><td><a href=\"secrets.md\">secrets<\/a><\/td><td>Storing credentials, rotation, blast radius<\/td><\/tr><tr><td><a href=\"capability-sandbox.md\">capability-sandbox<\/a><\/td><td>Permission model for tools/plugins/agents<\/td><\/tr><tr><td><a href=\"input-validation.md\">input-validation<\/a><\/td><td>Trust boundaries, parse-don't-validate<\/td><\/tr><\/tbody><\/table>\n<h3 id=\"speed-latency-first-vs-perf-throughput-first\">Speed (latency-first vs perf throughput-first)<\/h3>\n<table><thead><tr><th>Specialist<\/th><th>When to load<\/th><\/tr><\/thead><tbody><tr><td><a href=\"startup-latency.md\">startup-latency<\/a><\/td><td>CLI cold start, lazy init, daemonization<\/td><\/tr><tr><td><a href=\"tail-latency.md\">tail-latency<\/a><\/td><td>p99/p999 SLOs, fan-out, hedging<\/td><\/tr><tr><td><a href=\"streaming-batch.md\">streaming-batch<\/a><\/td><td>Stream vs micro-batch vs full batch, backpressure<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"format-contract\">Format contract<\/h2>\n<p>Every specialist file follows:<\/p>\n<ul><li><strong>When<\/strong> (trigger)<\/li><li><strong>Why care<\/strong> (consequence of getting it wrong)<\/li><li><strong>Decision tree<\/strong> (if X → Y, <em>because reason<\/em>)<\/li><li><strong>Tradeoffs<\/strong> (A vs B, what each pays)<\/li><li><strong>Anti-patterns<\/strong> (why each is bad, not how to write the good version)<\/li><\/ul>\n<p>No code, no constants, no syntax. If a file accumulates implementation details, refactor — that content belongs in the relevant library doc (use context7) or the source itself.<\/p>\n<h2 id=\"maintenance\">Maintenance<\/h2>\n<ul><li>When the user gives feedback that contradicts a specialist, update the file (not memory).<\/li><li>Adding a new specialist: drop a file here, add a table row.<\/li><\/ul>","text":"Specialists Index of domain specialists. Each file answers why to pick an approach and when — never how . Implementation details (APIs, constants, syntax) stay in code and library docs (context7). When to consult Before a non-trivial design decision in the listed domain. During review when a choice feels arbitrary — load the specialist to check the why. When unsure which approach fits — read the decision tree first, then commit. Index Rust systems Specialist When to load rust-ownership Choosing borrow vs clone vs Arc/Rc/Cow; refactor away from Arc<Mutex<T>> smell rust-async Picking a runtime, sync↔async boundary, Send bound problems, blocking inside async rust-errors Designing error types, library vs app style, where to ? vs handle rust-traits Static vs dynamic dispatch, type-state, sealed traits, generic-vs- dyn Agent / AI infra Specialist When to load mcp-design Building MCP servers, tool granularity, MCP vs in-process prompt-caching Structuring prompts for reuse, cache breakpoints, invalidation reasons agent-memory What to persist across sessions, retrieval triggers, memory shape tool-routing Eager vs deferred tool loading, large catalogs, dispatch accuracy Terminal / TUI (no Tauri) Specialist When to load ratatui-arch Structuring a ratatui app, state ownership, blocking work ansi-pty Escape sequences, capability detection, PTY semantics terminal-input Kitty protocol, mouse, bracketed paste, raw mode safety Agent harness Specialist When to load agent-sandbox Running model-generated commands, fs/net scoping, blast radius harness-hooks Pre/Post tool hooks, SessionStart, enforcing invariants parallel-subagents Fan-out decisions, context isolation, when sequential wins context-mgmt Compaction, deferred tools, summarization triggers Performance Specialist When to load profiling Picking a profiler, baselines, measurement discipline cache-locality Data layout in hot loops, SoA/AoS, false sharing allocator Arena/slab/system choice, lifetime-based reasoning contention Lock-free vs mutex vs sharding, RwLock pitfalls Security Specialist When to load supply-chain New deps, lockfile policy, audit cadence secrets Storing credentials, rotation, blast radius capability-sandbox Permission model for tools/plugins/agents input-validation Trust boundaries, parse-don't-validate Speed (latency-first vs perf throughput-first) Specialist When to load startup-latency CLI cold start, lazy init, daemonization tail-latency p99/p999 SLOs, fan-out, hedging streaming-batch Stream vs micro-batch vs full batch, backpressure Format contract Every specialist file follows: When (trigger) Why care (consequence of getting it wrong) Decision tree (if X → Y, because reason ) Tradeoffs (A vs B, what each pays) Anti-patterns (why each is bad, not how to write the good version) No code, no constants, no syntax. If a file accumulates implementation details, refactor — that content belongs in the relevant library doc (use context7) or the source itself. Maintenance When the user gives feedback that contradicts a specialist, update the file (not memory). Adding a new specialist: drop a file here, add a table row."},{"id":".claude/skills/specialists/agent-memory.md","title":"agent-memory","category":"Skills","path":".claude/skills/specialists/agent-memory.md","desc":"","html":"<h1 id=\"agent-memory\">agent-memory<\/h1>\n<p><strong>When<\/strong>: deciding what to persist across sessions, designing retrieval, choosing memory shape. <strong>Why care<\/strong>: memory bloat poisons future context; missing memory makes the agent stateless and frustrating.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Fact about the user/project that future sessions need → persist. Reason: avoids re-asking.<\/li><li>Solution to a specific bug → don't persist; the code/commit holds it. Reason: code is authoritative.<\/li><li>Surprising preference or constraint → persist with reason. Reason: future sessions can apply nuanced judgment.<\/li><li>Snapshot of state (file list, activity) → persist sparingly; verify before use. Reason: stale fast.<\/li><\/ul>\n<h2 id=\"memory-types-why-each\">Memory types (why each)<\/h2>\n<ul><li>Episodic: what happened, when. Useful for \"what did we try last time?\"<\/li><li>Semantic: facts about user/project. Useful for tailoring style.<\/li><li>Procedural: how-to recipes. Useful when the user repeats a workflow.<\/li><\/ul>\n<h2 id=\"retrieval-triggers\">Retrieval triggers<\/h2>\n<ul><li>User references past work → query memory.<\/li><li>Behavioral drift risk → load feedback memories at session start.<\/li><li>Conflict with current state → trust current, update memory.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Saving everything: high recall, low precision; context drowns in noise.<\/li><li>Saving fix recipes that the code already encodes: duplication that rots.<\/li><li>Index files growing without bound: load cost dominates value.<\/li><\/ul>","text":"agent-memory When : deciding what to persist across sessions, designing retrieval, choosing memory shape. Why care : memory bloat poisons future context; missing memory makes the agent stateless and frustrating. Decision tree Fact about the user/project that future sessions need → persist. Reason: avoids re-asking. Solution to a specific bug → don't persist; the code/commit holds it. Reason: code is authoritative. Surprising preference or constraint → persist with reason. Reason: future sessions can apply nuanced judgment. Snapshot of state (file list, activity) → persist sparingly; verify before use. Reason: stale fast. Memory types (why each) Episodic: what happened, when. Useful for \"what did we try last time?\" Semantic: facts about user/project. Useful for tailoring style. Procedural: how-to recipes. Useful when the user repeats a workflow. Retrieval triggers User references past work → query memory. Behavioral drift risk → load feedback memories at session start. Conflict with current state → trust current, update memory. Anti-patterns (why) Saving everything: high recall, low precision; context drowns in noise. Saving fix recipes that the code already encodes: duplication that rots. Index files growing without bound: load cost dominates value."},{"id":".claude/skills/specialists/agent-sandbox.md","title":"agent-sandbox","category":"Skills","path":".claude/skills/specialists/agent-sandbox.md","desc":"","html":"<h1 id=\"agent-sandbox\">agent-sandbox<\/h1>\n<p><strong>When<\/strong>: running model-generated code/commands, choosing isolation level, scoping fs/net access. <strong>Why care<\/strong>: agent tools execute attacker-influenced input; default-deny on capabilities is the only safe baseline.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Code from the model → run in a sandbox process. Reason: prompt injection can craft arbitrary commands.<\/li><li>File access → scope to project root + explicit allowlist. Reason: stray reads can exfiltrate secrets.<\/li><li>Network → default deny; allowlist known endpoints. Reason: exfil channels are the highest-impact failure.<\/li><li>Long-lived state → ephemeral by default, opt-in persistence. Reason: blast radius shrinks.<\/li><\/ul>\n<h2 id=\"layers-why-each\">Layers (why each)<\/h2>\n<ul><li>Process isolation: kernel-enforced; survives bugs in your code.<\/li><li>Filesystem scoping: limits read+write blast radius.<\/li><li>Network policy: limits exfil and remote command-and-control.<\/li><li>Time/CPU limits: bound runaway agent loops.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Stronger sandbox: more friction, occasional false denials.<\/li><li>Capability prompts: user-in-the-loop safety, interrupts flow.<\/li><li>Trust-on-first-use: low friction, weak posture.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Running tools as the user with no scope: full host compromise on prompt injection.<\/li><li>\"Read anywhere, write nowhere\" without enforcement: relies on the model behaving.<\/li><li>Permission once == permission forever: scope creep without audit.<\/li><\/ul>","text":"agent-sandbox When : running model-generated code/commands, choosing isolation level, scoping fs/net access. Why care : agent tools execute attacker-influenced input; default-deny on capabilities is the only safe baseline. Decision tree Code from the model → run in a sandbox process. Reason: prompt injection can craft arbitrary commands. File access → scope to project root + explicit allowlist. Reason: stray reads can exfiltrate secrets. Network → default deny; allowlist known endpoints. Reason: exfil channels are the highest-impact failure. Long-lived state → ephemeral by default, opt-in persistence. Reason: blast radius shrinks. Layers (why each) Process isolation: kernel-enforced; survives bugs in your code. Filesystem scoping: limits read+write blast radius. Network policy: limits exfil and remote command-and-control. Time/CPU limits: bound runaway agent loops. Tradeoffs Stronger sandbox: more friction, occasional false denials. Capability prompts: user-in-the-loop safety, interrupts flow. Trust-on-first-use: low friction, weak posture. Anti-patterns (why) Running tools as the user with no scope: full host compromise on prompt injection. \"Read anywhere, write nowhere\" without enforcement: relies on the model behaving. Permission once == permission forever: scope creep without audit."},{"id":".claude/skills/specialists/allocator.md","title":"allocator","category":"Skills","path":".claude/skills/specialists/allocator.md","desc":"","html":"<h1 id=\"allocator\">allocator<\/h1>\n<p><strong>When<\/strong>: many small allocations, latency-sensitive paths, choosing an allocator strategy. <strong>Why care<\/strong>: malloc/free overhead and fragmentation dominate workloads with churn; global allocator contention bottlenecks multithread.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Many short-lived allocations sharing a lifetime → arena/bump. Reason: bulk free, no per-alloc bookkeeping.<\/li><li>Many same-sized allocations → slab/pool. Reason: O(1) alloc, no fragmentation.<\/li><li>Cross-thread heavy allocation → thread-cached allocator (jemalloc/mimalloc). Reason: per-thread caches avoid global lock.<\/li><li>Mostly long-lived → system allocator is fine. Reason: extra machinery doesn't pay back.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Arena: blazing fast, can't free individual items.<\/li><li>Slab: tight memory, fixed shape only.<\/li><li>Custom allocator: precise control, ownership of bugs (UB if wrong).<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Arena per request <em>and<\/em> freeing items inside: defeats the arena.<\/li><li>Switching global allocator for the perf myth without measuring: variance, sometimes regression.<\/li><li>Allocating in a hot loop where reuse would work: GC-like churn even in non-GC languages.<\/li><\/ul>","text":"allocator When : many small allocations, latency-sensitive paths, choosing an allocator strategy. Why care : malloc/free overhead and fragmentation dominate workloads with churn; global allocator contention bottlenecks multithread. Decision tree Many short-lived allocations sharing a lifetime → arena/bump. Reason: bulk free, no per-alloc bookkeeping. Many same-sized allocations → slab/pool. Reason: O(1) alloc, no fragmentation. Cross-thread heavy allocation → thread-cached allocator (jemalloc/mimalloc). Reason: per-thread caches avoid global lock. Mostly long-lived → system allocator is fine. Reason: extra machinery doesn't pay back. Tradeoffs Arena: blazing fast, can't free individual items. Slab: tight memory, fixed shape only. Custom allocator: precise control, ownership of bugs (UB if wrong). Anti-patterns (why) Arena per request and freeing items inside: defeats the arena. Switching global allocator for the perf myth without measuring: variance, sometimes regression. Allocating in a hot loop where reuse would work: GC-like churn even in non-GC languages."},{"id":".claude/skills/specialists/ansi-pty.md","title":"ansi-pty","category":"Skills","path":".claude/skills/specialists/ansi-pty.md","desc":"","html":"<h1 id=\"ansi-pty\">ansi-pty<\/h1>\n<p><strong>When<\/strong>: emitting escape sequences, parsing terminal output, deciding capability detection strategy. <strong>Why care<\/strong>: wrong sequence garbles the terminal; capability assumptions break on minority terminals.<\/p>\n<
