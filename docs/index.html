s() or check for null&#x27;\nfix: &#x27;Objects.equals($STR, $OTHER)&#x27;<\/code><\/pre>\n<h2 id=\"language-detection\">Language Detection<\/h2>\n<p>AST-Grep auto-detects language from file extension:<\/p>\n<pre><code class=\"language-bash\"># Explicit language specification\nsg run --pattern &#x27;$PATTERN&#x27; --lang python\n\n# Auto-detection (uses file extension)\nsg run --pattern &#x27;$PATTERN&#x27; src/main.py\n\n# Multiple languages\nsg run --pattern &#x27;$PATTERN&#x27; --lang python --lang javascript<\/code><\/pre>\n<p>Supported language identifiers:<\/p>\n<ul><li><code>python<\/code>, <code>javascript<\/code>, <code>typescript<\/code>, <code>typescriptreact<\/code><\/li><li><code>go<\/code>, <code>rust<\/code>, <code>java<\/code>, <code>kotlin<\/code>, <code>scala<\/code><\/li><li><code>c<\/code>, <code>cpp<\/code>, <code>csharp<\/code>, <code>swift<\/code><\/li><li><code>ruby<\/code>, <code>php<\/code>, <code>elixir<\/code>, <code>lua<\/code><\/li><li><code>html<\/code>, <code>css<\/code>, <code>json<\/code>, <code>yaml<\/code><\/li><\/ul>","text":"Language-Specific AST-Grep Patterns Optimized patterns for specific programming languages. Python Type Hints id: missing-return-type language: python rule: pattern: 'def $FUNC($$$ARGS):' not: pattern: 'def $FUNC($$$ARGS) -> $TYPE:' message: 'Function missing return type annotation' --- id: missing-param-types language: python rule: pattern: 'def $FUNC($PARAM):' constraints: PARAM: not: regex: '.*:.*' # No type annotation message: 'Parameter missing type annotation' Async Patterns id: sync-in-async language: python rule: pattern: 'time.sleep($DURATION)' inside: pattern: 'async def $FUNC($$$ARGS): $$$BODY' fix: 'await asyncio.sleep($DURATION)' message: 'Use asyncio.sleep in async functions' --- id: blocking-io-in-async language: python rule: any: - pattern: 'open($PATH)' - pattern: 'requests.get($URL)' inside: pattern: 'async def $FUNC($$$ARGS): $$$BODY' message: 'Blocking I/O in async function. Use aiofiles or aiohttp.' Exception Handling id: bare-except language: python severity: warning rule: pattern: | except: $$$BODY fix: | except Exception as e: $$$BODY message: 'Avoid bare except clauses' --- id: exception-pass language: python rule: pattern: | except $EXC: pass message: 'Silent exception handling - consider logging' TypeScript Type Safety id: any-type-usage language: typescript severity: warning rule: any: - pattern: 'const $NAME: any = $VALUE' - pattern: 'let $NAME: any = $VALUE' - pattern: 'function $FUNC($$$ARGS): any' message: 'Avoid using \"any\" type - be more specific' --- id: type-assertion-warning language: typescript rule: pattern: '$EXPR as any' message: 'Type assertion to \"any\" bypasses type checking' React Best Practices id: missing-key-prop language: typescriptreact rule: pattern: '$ARR.map($ITEM => <$COMPONENT $$$PROPS />)' not: has: pattern: 'key={$KEY}' message: 'Missing key prop in list rendering' --- id: inline-function-in-jsx language: typescriptreact rule: pattern: '<$COMPONENT onClick={() => $$$BODY} />' message: 'Avoid inline functions in JSX - may cause unnecessary re-renders' --- id: direct-state-mutation language: typescriptreact rule: pattern: '$STATE.$PROP = $VALUE' inside: has: pattern: 'useState($INIT)' message: 'Do not mutate state directly - use setState' Next.js Patterns id: use-next-image language: typescriptreact rule: pattern: '<img $$$ATTRS />' fix: '<Image $$$ATTRS />' message: 'Use next/image for optimized images' --- id: use-next-link language: typescriptreact rule: pattern: '<a href=\"$URL\">$$$CHILDREN<\/a>' constraints: URL: not: regex: '^https?://.*' # External links are OK fix: '<Link href=\"$URL\">$$$CHILDREN<\/Link>' message: 'Use next/link for internal navigation' Go Error Handling id: unchecked-error language: go severity: error rule: pattern: '$RESULT, _ := $FUNC($$$ARGS)' message: 'Error ignored - handle or explicitly ignore with comment' --- id: error-string-comparison language: go rule: pattern: 'err.Error() == \"$MSG\"' message: 'Use errors.Is() or errors.As() for error comparison' Concurrency id: goroutine-leak language: go rule: pattern: 'go $FUNC($$$ARGS)' not: inside: has: any: - pattern: 'ctx.Done()' - pattern: 'select { $$$CASES }' message: 'Goroutine may leak - ensure proper cancellation' --- id: mutex-not-deferred language: go rule: pattern: '$MU.Lock()' not: follows: pattern: 'defer $MU.Unlock()' message: 'Consider using defer for Unlock()' Context Usage id: context-first-param language: go rule: pattern: 'func $FUNC($$$BEFORE, ctx context.Context, $$$AFTER)' message: 'Context should be the first parameter' fix: 'func $FUNC(ctx context.Context, $$$BEFORE, $$$AFTER)' Rust Memory Safety id: unsafe-block language: rust severity: warning rule: pattern: 'unsafe { $$$BODY }' message: 'Unsafe block - ensure memory safety is manually verified' --- id: unwrap-usage language: rust rule: any: - pattern: '$RESULT.unwrap()' - pattern: '$OPTION.unwrap()' message: 'Consider using ? operator or expect() with message' Ownership Patterns id: clone-in-loop language: rust rule: pattern: '$VAR.clone()' inside: any: - pattern: 'for $ITEM in $ITER { $$$BODY }' - pattern: 'while $COND { $$$BODY }' message: 'Clone in loop may be inefficient - consider borrowing' Java Resource Management id: resource-not-closed language: java rule: pattern: '$TYPE $VAR = new $RESOURCE($$$ARGS)' not: any: - inside: pattern: 'try ($TYPE $VAR = new $RESOURCE($$$ARGS)) { $$$BODY }' - follows: pattern: '$VAR.close()' message: 'Resource may not be closed - use try-with-resources' Null Safety id: null-check-pattern language: java rule: pattern: 'if ($OBJ != null) { $$$BODY }' message: 'Consider using Optional for null handling' --- id: string-equals language: java rule: pattern: '$STR.equals($OTHER)' not: precedes: pattern: 'if ($STR != null)' message: 'Potential NPE - use Objects.equals() or check for null' fix: 'Objects.equals($STR, $OTHER)' Language Detection AST-Grep auto-detects language from file extension: # Explicit language specification sg run --pattern '$PATTERN' --lang python # Auto-detection (uses file extension) sg run --pattern '$PATTERN' src/main.py # Multiple languages sg run --pattern '$PATTERN' --lang python --lang javascript Supported language identifiers: python , javascript , typescript , typescriptreact go , rust , java , kotlin , scala c , cpp , csharp , swift ruby , php , elixir , lua html , css , json , yaml"},{"id":".claude/skills/tool-ast-grep/modules/pattern-syntax.md","title":"AST-Grep Pattern Syntax Reference","category":"Skills","path":".claude/skills/tool-ast-grep/modules/pattern-syntax.md","desc":"","html":"<h1 id=\"ast-grep-pattern-syntax-reference\">AST-Grep Pattern Syntax Reference<\/h1>\n<p>Complete guide to AST-Grep pattern matching syntax.<\/p>\n<h2 id=\"meta-variables\">Meta-Variables<\/h2>\n<h3 id=\"single-node-capture-name\">Single Node Capture ($NAME)<\/h3>\n<p>Captures exactly one AST node.<\/p>\n<pre><code class=\"language-yaml\"># Match any function call with one argument\npattern: &#x27;$FUNC($ARG)&#x27;\n\n# Examples matched:\n# - print(&quot;hello&quot;)\n# - len(items)\n# - calculate(100)<\/code><\/pre>\n<h3 id=\"variadic-capture-name\">Variadic Capture ($$$NAME)<\/h3>\n<p>Captures zero or more AST nodes.<\/p>\n<pre><code class=\"language-yaml\"># Match function with any number of arguments\npattern: &#x27;function $NAME($$$ARGS) { $$$BODY }&#x27;\n\n# Examples matched:\n# - function foo() { return 1; }\n# - function bar(a, b, c) { console.log(a); return b + c; }<\/code><\/pre>\n<h3 id=\"anonymous-capture\">Anonymous Capture ($$_)<\/h3>\n<p>Matches any single node without capturing.<\/p>\n<pre><code class=\"language-yaml\"># Match if statement regardless of condition\npattern: &#x27;if ($$_) { return $VALUE }&#x27;\n\n# Useful when you don&#x27;t need the matched value<\/code><\/pre>\n<h3 id=\"underscore-wildcard\">Underscore Wildcard ($_)<\/h3>\n<p>Shorthand for anonymous single capture.<\/p>\n<pre><code class=\"language-yaml\">pattern: &#x27;$_.$METHOD($$$ARGS)&#x27;\n# Matches any method call on any object<\/code><\/pre>\n<h2 id=\"relational-rules\">Relational Rules<\/h2>\n<h3 id=\"inside\">inside<\/h3>\n<p>Match pattern only within another pattern.<\/p>\n<pre><code class=\"language-yaml\">id: useState-in-component\nrule:\n  pattern: &#x27;useState($INIT)&#x27;\n  inside:\n    pattern: &#x27;function $COMPONENT($$$PROPS) { $$$BODY }&#x27;\n    stopBy: end  # Don&#x27;t search nested functions<\/code><\/pre>\n<h3 id=\"has\">has<\/h3>\n<p>Pattern must contain another pattern.<\/p>\n<pre><code class=\"language-yaml\">id: class-with-constructor\nrule:\n  pattern: &#x27;class $NAME { $$$BODY }&#x27;\n  has:\n    pattern: &#x27;constructor($$$ARGS) { $$$IMPL }&#x27;<\/code><\/pre>\n<h3 id=\"follows\">follows<\/h3>\n<p>Pattern must be followed by another pattern.<\/p>\n<pre><code class=\"language-yaml\">id: error-handling-required\nrule:\n  pattern: &#x27;$ERR := $CALL($$$ARGS)&#x27;\n  follows:\n    pattern: &#x27;if $ERR != nil { $$$BODY }&#x27;<\/code><\/pre>\n<h3 id=\"precedes\">precedes<\/h3>\n<p>Pattern must be preceded by another pattern.<\/p>\n<pre><code class=\"language-yaml\">id: declaration-before-use\nrule:\n  pattern: &#x27;$VAR&#x27;\n  precedes:\n    pattern: &#x27;const $VAR = $VALUE&#x27;<\/code><\/pre>\n<h2 id=\"composite-rules\">Composite Rules<\/h2>\n<h3 id=\"all\">all<\/h3>\n<p>All conditions must match.<\/p>\n<pre><code class=\"language-yaml\">rule:\n  all:\n    - pattern: &#x27;fetch($URL)&#x27;\n    - inside:\n        pattern: &#x27;async function $NAME() { $$$BODY }&#x27;\n    - not:\n        has:\n          pattern: &#x27;try { $$$TRY } catch { $$$CATCH }&#x27;<\/code><\/pre>\n<h3 id=\"any\">any<\/h3>\n<p>At least one condition must match.<\/p>\n<pre><code class=\"language-yaml\">rule:\n  any:\n    - pattern: &#x27;console.log($$$ARGS)&#x27;\n    - pattern: &#x27;console.warn($$$ARGS)&#x27;\n    - pattern: &#x27;console.error($$$ARGS)&#x27;<\/code><\/pre>\n<h3 id=\"not\">not<\/h3>\n<p>Negates a condition.<\/p>\n<pre><code class=\"language-yaml\">rule:\n  pattern: &#x27;async function $NAME() { $$$BODY }&#x27;\n  not:\n    has:\n      pattern: &#x27;await $EXPR&#x27;<\/code><\/pre>\n<h2 id=\"stop-by-modifiers\">Stop-By Modifiers<\/h2>\n<p>Control how deeply rules search.<\/p>\n<pre><code class=\"language-yaml\">rule:\n  pattern: &#x27;$VAR&#x27;\n  inside:\n    pattern: &#x27;function $NAME() { $$$BODY }&#x27;\n    stopBy:\n      rule:\n        pattern: &#x27;function $NESTED() { $$$INNER }&#x27;<\/code><\/pre>\n<p>Options:<\/p>\n<ul><li><code>end<\/code> - Stop at the end of matched node<\/li><li><code>neighbor<\/code> - Stop at immediate children<\/li><li><code>rule<\/code> - Stop when a specific rule matches<\/li><\/ul>\n<h2 id=\"regex-in-patterns\">Regex in Patterns<\/h2>\n<p>Use regex for identifier matching.<\/p>\n<pre><code class=\"language-yaml\">rule:\n  pattern: &#x27;$FUNC($$$ARGS)&#x27;\n  constraints:\n    FUNC:\n      regex: &#x27;^(get|fetch|load).*&#x27;<\/code><\/pre>\n<h2 id=\"fix-transformations\">Fix Transformations<\/h2>\n<h3 id=\"simple-fix\">Simple Fix<\/h3>\n<pre><code class=\"language-yaml\">fix: &#x27;newFunction($ARGS)&#x27;<\/code><\/pre>\n<h3 id=\"multi-line-fix\">Multi-line Fix<\/h3>\n<pre><code class=\"language-yaml\">fix: |\n  try {\n    $ORIGINAL\n  } catch (error) {\n    console.error(error);\n  }<\/code><\/pre>\n<h3 id=\"conditional-fix-via-separate-rules\">Conditional Fix (via separate rules)<\/h3>\n<p>Create separate rules with different severity levels for different fixes.<\/p>\n<h2 id=\"examples\">Examples<\/h2>\n<h3 id=\"detect-deprecated-api\">Detect Deprecated API<\/h3>\n<pre><code class=\"language-yaml\">id: deprecated-substr\nlanguage: javascript\nrule:\n  pattern: &#x27;$STR.substr($$$ARGS)&#x27;\nfix: &#x27;$STR.slice($$$ARGS)&#x27;\nmessage: &#x27;substr is deprecated, use slice instead&#x27;<\/code><\/pre>\n<h3 id=\"enforce-error-handling\">Enforce Error Handling<\/h3>\n<pre><code class=\"language-yaml\">id: unhandled-promise\nlanguage: typescript\nrule:\n  pattern: &#x27;$PROMISE.then($CALLBACK)&#x27;\n  not:\n    has:\n      pattern: &#x27;.catch($HANDLER)&#x27;\nmessage: &#x27;Promise should have error handling&#x27;<\/code><\/pre>\n<h3 id=\"security-pattern\">Security Pattern<\/h3>\n<pre><code class=\"language-yaml\">id: no-eval\nlanguage: javascript\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;eval($CODE)&#x27;\n    - pattern: &#x27;new Function($$$ARGS)&#x27;\nmessage: &#x27;Avoid eval() and new Function() - potential code injection&#x27;<\/code><\/pre>","text":"AST-Grep Pattern Syntax Reference Complete guide to AST-Grep pattern matching syntax. Meta-Variables Single Node Capture ($NAME) Captures exactly one AST node. # Match any function call with one argument pattern: '$FUNC($ARG)' # Examples matched: # - print(\"hello\") # - len(items) # - calculate(100) Variadic Capture ($$$NAME) Captures zero or more AST nodes. # Match function with any number of arguments pattern: 'function $NAME($$$ARGS) { $$$BODY }' # Examples matched: # - function foo() { return 1; } # - function bar(a, b, c) { console.log(a); return b + c; } Anonymous Capture ($$_) Matches any single node without capturing. # Match if statement regardless of condition pattern: 'if ($$_) { return $VALUE }' # Useful when you don't need the matched value Underscore Wildcard ($_) Shorthand for anonymous single capture. pattern: '$_.$METHOD($$$ARGS)' # Matches any method call on any object Relational Rules inside Match pattern only within another pattern. id: useState-in-component rule: pattern: 'useState($INIT)' inside: pattern: 'function $COMPONENT($$$PROPS) { $$$BODY }' stopBy: end # Don't search nested functions has Pattern must contain another pattern. id: class-with-constructor rule: pattern: 'class $NAME { $$$BODY }' has: pattern: 'constructor($$$ARGS) { $$$IMPL }' follows Pattern must be followed by another pattern. id: error-handling-required rule: pattern: '$ERR := $CALL($$$ARGS)' follows: pattern: 'if $ERR != nil { $$$BODY }' precedes Pattern must be preceded by another pattern. id: declaration-before-use rule: pattern: '$VAR' precedes: pattern: 'const $VAR = $VALUE' Composite Rules all All conditions must match. rule: all: - pattern: 'fetch($URL)' - inside: pattern: 'async function $NAME() { $$$BODY }' - not: has: pattern: 'try { $$$TRY } catch { $$$CATCH }' any At least one condition must match. rule: any: - pattern: 'console.log($$$ARGS)' - pattern: 'console.warn($$$ARGS)' - pattern: 'console.error($$$ARGS)' not Negates a condition. rule: pattern: 'async function $NAME() { $$$BODY }' not: has: pattern: 'await $EXPR' Stop-By Modifiers Control how deeply rules search. rule: pattern: '$VAR' inside: pattern: 'function $NAME() { $$$BODY }' stopBy: rule: pattern: 'function $NESTED() { $$$INNER }' Options: end - Stop at the end of matched node neighbor - Stop at immediate children rule - Stop when a specific rule matches Regex in Patterns Use regex for identifier matching. rule: pattern: '$FUNC($$$ARGS)' constraints: FUNC: regex: '^(get|fetch|load).*' Fix Transformations Simple Fix fix: 'newFunction($ARGS)' Multi-line Fix fix: | try { $ORIGINAL } catch (error) { console.error(error); } Conditional Fix (via separate rules) Create separate rules with different severity levels for different fixes. Examples Detect Deprecated API id: deprecated-substr language: javascript rule: pattern: '$STR.substr($$$ARGS)' fix: '$STR.slice($$$ARGS)' message: 'substr is deprecated, use slice instead' Enforce Error Handling id: unhandled-promise language: typescript rule: pattern: '$PROMISE.then($CALLBACK)' not: has: pattern: '.catch($HANDLER)' message: 'Promise should have error handling' Security Pattern id: no-eval language: javascript severity: error rule: any: - pattern: 'eval($CODE)' - pattern: 'new Function($$$ARGS)' message: 'Avoid eval() and new Function() - potential code injection'"},{"id":".claude/skills/tool-ast-grep/modules/refactoring-patterns.md","title":"AST-Grep Refactoring Patterns","category":"Skills","path":".claude/skills/tool-ast-grep/modules/refactoring-patterns.md","desc":"","html":"<h1 id=\"ast-grep-refactoring-patterns\">AST-Grep Refactoring Patterns<\/h1>\n<p>Common code transformation patterns for large-scale refactoring.<\/p>\n<h2 id=\"api-migration\">API Migration<\/h2>\n<h3 id=\"function-rename\">Function Rename<\/h3>\n<pre><code class=\"language-bash\"># Simple rename\nsg run --pattern &#x27;oldFunction($$$ARGS)&#x27; --rewrite &#x27;newFunction($$$ARGS)&#x27; --lang python\n\n# With method chain\nsg run --pattern &#x27;$OBJ.oldMethod($$$ARGS)&#x27; --rewrite &#x27;$OBJ.newMethod($$$ARGS)&#x27; --lang javascript<\/code><\/pre>\n<h3 id=\"library-migration\">Library Migration<\/h3>\n<pre><code class=\"language-yaml\"># axios to fetch\nid: axios-to-fetch-get\nlanguage: typescript\nrule:\n  pattern: &#x27;axios.get($URL)&#x27;\nfix: &#x27;fetch($URL).then(res =&gt; res.json())&#x27;\n\n---\nid: axios-to-fetch-post\nlanguage: typescript\nrule:\n  pattern: &#x27;axios.post($URL, $DATA)&#x27;\nfix: |\n  fetch($URL, {\n    method: &#x27;POST&#x27;,\n    headers: { &#x27;Content-Type&#x27;: &#x27;application/json&#x27; },\n    body: JSON.stringify($DATA)\n  }).then(res =&gt; res.json())<\/code><\/pre>\n<h3 id=\"import-statement-update\">Import Statement Update<\/h3>\n<pre><code class=\"language-yaml\">id: update-import-path\nlanguage: typescript\nrule:\n  pattern: &quot;import { $$$IMPORTS } from &#x27;old-package&#x27;&quot;\nfix: &quot;import { $$$IMPORTS } from &#x27;@new-scope/new-package&#x27;&quot;<\/code><\/pre>\n<h2 id=\"code-modernization\">Code Modernization<\/h2>\n<h3 id=\"var-to-const-let\">var to const/let<\/h3>\n<pre><code class=\"language-yaml\">id: var-to-const\nlanguage: javascript\nrule:\n  pattern: &#x27;var $NAME = $VALUE&#x27;\n  not:\n    has:\n      pattern: &#x27;$NAME = $OTHER&#x27;\n      inside:\n        not:\n          pattern: &#x27;var $NAME = $VALUE&#x27;\nfix: &#x27;const $NAME = $VALUE&#x27;\nmessage: &#x27;Prefer const for variables that are never reassigned&#x27;<\/code><\/pre>\n<h3 id=\"callback-to-async-await\">Callback to Async/Await<\/h3>\n<pre><code class=\"language-yaml\">id: callback-to-async\nlanguage: javascript\nrule:\n  pattern: |\n    $FUNC($$$ARGS, function($ERR, $DATA) {\n      $$$BODY\n    })\nfix: |\n  const $DATA = await $FUNC($$$ARGS)\n  $$$BODY\nmessage: &#x27;Consider using async/await instead of callbacks&#x27;<\/code><\/pre>\n<h3 id=\"promise-then-to-async-await\">Promise.then to Async/Await<\/h3>\n<pre><code class=\"language-yaml\">id: then-to-await\nlanguage: typescript\nrule:\n  pattern: &#x27;$PROMISE.then($CALLBACK)&#x27;\n  inside:\n    pattern: &#x27;async function $NAME($$$ARGS) { $$$BODY }&#x27;\nfix: &#x27;await $PROMISE&#x27;<\/code><\/pre>\n<h2 id=\"react-patterns\">React Patterns<\/h2>\n<h3 id=\"class-to-functional-component\">Class to Functional Component<\/h3>\n<pre><code class=\"language-yaml\">id: class-to-functional-state\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;this.state.$PROP&#x27;\n  inside:\n    pattern: &#x27;class $NAME extends $$$BASE { $$$BODY }&#x27;\nmessage: &#x27;Consider converting to functional component with useState&#x27;<\/code><\/pre>\n<h3 id=\"componentdidmount-to-useeffect\">componentDidMount to useEffect<\/h3>\n<pre><code class=\"language-yaml\">id: componentDidMount-to-useEffect\nlanguage: typescriptreact\nrule:\n  pattern: |\n    componentDidMount() {\n      $$$BODY\n    }\nfix: |\n  useEffect(() =&gt; {\n    $$$BODY\n  }, [])<\/code><\/pre>\n<h3 id=\"proptypes-to-typescript\">PropTypes to TypeScript<\/h3>\n<pre><code class=\"language-yaml\">id: proptypes-to-typescript\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;$COMPONENT.propTypes = { $$$PROPS }&#x27;\nmessage: &#x27;Consider using TypeScript interfaces instead of PropTypes&#x27;<\/code><\/pre>\n<h2 id=\"python-patterns\">Python Patterns<\/h2>\n<h3 id=\"string-format-to-f-string\">String Format to f-string<\/h3>\n<pre><code class=\"language-yaml\">id: format-to-fstring\nlanguage: python\nrule:\n  pattern: &#x27;&quot;$$$STR&quot;.format($ARG)&#x27;\nfix: &#x27;f&quot;$$$STR&quot;&#x27;  # Note: requires manual adjustment of placeholders\nmessage: &#x27;Consider using f-strings for cleaner formatting&#x27;<\/code><\/pre>\n<h3 id=\"dict-comprehension\">Dict Comprehension<\/h3>\n<pre><code class=\"language-yaml\">id: loop-to-dict-comprehension\nlanguage: python\nrule:\n  pattern: |\n    $DICT = {}\n    for $KEY in $ITER:\n        $DICT[$KEY] = $VALUE\nfix: &#x27;$DICT = {$KEY: $VALUE for $KEY in $ITER}&#x27;<\/code><\/pre>\n<h3 id=\"context-manager\">Context Manager<\/h3>\n<pre><code class=\"language-yaml\">id: file-to-context-manager\nlanguage: python\nrule:\n  pattern: |\n    $FILE = open($PATH)\n    $$$BODY\n    $FILE.close()\nfix: |\n  with open($PATH) as $FILE:\n      $$$BODY<\/code><\/pre>\n<h2 id=\"go-patterns\">Go Patterns<\/h2>\n<h3 id=\"error-handling\">Error Handling<\/h3>\n<pre><code class=\"language-yaml\">id: error-wrap\nlanguage: go\nrule:\n  pattern: &#x27;return $ERR&#x27;\n  inside:\n    pattern: &#x27;if $ERR != nil { $$$BODY }&#x27;\nfix: &#x27;return fmt.Errorf(&quot;$FUNC: %w&quot;, $ERR)&#x27;\nmessage: &#x27;Wrap errors with context&#x27;<\/code><\/pre>\n<h3 id=\"defer-pattern\">Defer Pattern<\/h3>\n<pre><code class=\"language-yaml\">id: close-without-defer\nlanguage: go\nrule:\n  pattern: &#x27;$RESOURCE.Close()&#x27;\n  not:\n    inside:\n      pattern: &#x27;defer $RESOURCE.Close()&#x27;\nmessage: &#x27;Consider using defer for resource cleanup&#x27;<\/code><\/pre>\n<h2 id=\"typescript-patterns\">TypeScript Patterns<\/h2>\n<h3 id=\"type-assertion\">Type Assertion<\/h3>\n<pre><code class=\"language-yaml\">id: type-assertion-style\nlanguage: typescript\nrule:\n  pattern: &#x27;&lt;$TYPE&gt;$EXPR&#x27;\nfix: &#x27;$EXPR as $TYPE&#x27;\nmessage: &#x27;Prefer &quot;as&quot; syntax for type assertions&#x27;<\/code><\/pre>\n<h3 id=\"optional-chaining\">Optional Chaining<\/h3>\n<pre><code class=\"language-yaml\">id: use-optional-chaining\nlanguage: typescript\nrule:\n  pattern: &#x27;$OBJ &amp;&amp; $OBJ.$PROP&#x27;\nfix: &#x27;$OBJ?.$PROP&#x27;<\/code><\/pre>\n<h3 id=\"nullish-coalescing\">Nullish Coalescing<\/h3>\n<pre><code class=\"language-yaml\">id: use-nullish-coalescing\nlanguage: typescript\nrule:\n  pattern: &#x27;$VAR !== null &amp;&amp; $VAR !== undefined ? $VAR : $DEFAULT&#x27;\nfix: &#x27;$VAR ?? $DEFAULT&#x27;<\/code><\/pre>\n<h2 id=\"batch-refactoring\">Batch Refactoring<\/h2>\n<h3 id=\"multi-file-transformation\">Multi-file Transformation<\/h3>\n<pre><code class=\"language-bash\"># Find all files\nsg run --pattern &#x27;$OLD($$$ARGS)&#x27; --lang python src/\n\n# Preview changes\nsg run --pattern &#x27;$OLD($$$ARGS)&#x27; --rewrite &#x27;$NEW($$$ARGS)&#x27; --lang python src/ --interactive\n\n# Apply changes\nsg run --pattern &#x27;$OLD($$$ARGS)&#x27; --rewrite &#x27;$NEW($$$ARGS)&#x27; --lang python src/ --update-all<\/code><\/pre>\n<h3 id=\"json-output-for-review\">JSON Output for Review<\/h3>\n<pre><code class=\"language-bash\">sg scan --config rules.yml --json &gt; changes.json\n# Review changes before applying\ncat changes.json | jq &#x27;.[] | {file: .path, line: .range.start.line, fix: .fix}&#x27;<\/code><\/pre>","text":"AST-Grep Refactoring Patterns Common code transformation patterns for large-scale refactoring. API Migration Function Rename # Simple rename sg run --pattern 'oldFunction($$$ARGS)' --rewrite 'newFunction($$$ARGS)' --lang python # With method chain sg run --pattern '$OBJ.oldMethod($$$ARGS)' --rewrite '$OBJ.newMethod($$$ARGS)' --lang javascript Library Migration # axios to fetch id: axios-to-fetch-get language: typescript rule: pattern: 'axios.get($URL)' fix: 'fetch($URL).then(res => res.json())' --- id: axios-to-fetch-post language: typescript rule: pattern: 'axios.post($URL, $DATA)' fix: | fetch($URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify($DATA) }).then(res => res.json()) Import Statement Update id: update-import-path language: typescript rule: pattern: \"import { $$$IMPORTS } from 'old-package'\" fix: \"import { $$$IMPORTS } from '@new-scope/new-package'\" Code Modernization var to const/let id: var-to-const language: javascript rule: pattern: 'var $NAME = $VALUE' not: has: pattern: '$NAME = $OTHER' inside: not: pattern: 'var $NAME = $VALUE' fix: 'const $NAME = $VALUE' message: 'Prefer const for variables that are never reassigned' Callback to Async/Await id: callback-to-async language: javascript rule: pattern: | $FUNC($$$ARGS, function($ERR, $DATA) { $$$BODY }) fix: | const $DATA = await $FUNC($$$ARGS) $$$BODY message: 'Consider using async/await instead of callbacks' Promise.then to Async/Await id: then-to-await language: typescript rule: pattern: '$PROMISE.then($CALLBACK)' inside: pattern: 'async function $NAME($$$ARGS) { $$$BODY }' fix: 'await $PROMISE' React Patterns Class to Functional Component id: class-to-functional-state language: typescriptreact rule: pattern: 'this.state.$PROP' inside: pattern: 'class $NAME extends $$$BASE { $$$BODY }' message: 'Consider converting to functional component with useState' componentDidMount to useEffect id: componentDidMount-to-useEffect language: typescriptreact rule: pattern: | componentDidMount() { $$$BODY } fix: | useEffect(() => { $$$BODY }, []) PropTypes to TypeScript id: proptypes-to-typescript language: typescriptreact rule: pattern: '$COMPONENT.propTypes = { $$$PROPS }' message: 'Consider using TypeScript interfaces instead of PropTypes' Python Patterns String Format to f-string id: format-to-fstring language: python rule: pattern: '\"$$$STR\".format($ARG)' fix: 'f\"$$$STR\"' # Note: requires manual adjustment of placeholders message: 'Consider using f-strings for cleaner formatting' Dict Comprehension id: loop-to-dict-comprehension language: python rule: pattern: | $DICT = {} for $KEY in $ITER: $DICT[$KEY] = $VALUE fix: '$DICT = {$KEY: $VALUE for $KEY in $ITER}' Context Manager id: file-to-context-manager language: python rule: pattern: | $FILE = open($PATH) $$$BODY $FILE.close() fix: | with open($PATH) as $FILE: $$$BODY Go Patterns Error Handling id: error-wrap language: go rule: pattern: 'return $ERR' inside: pattern: 'if $ERR != nil { $$$BODY }' fix: 'return fmt.Errorf(\"$FUNC: %w\", $ERR)' message: 'Wrap errors with context' Defer Pattern id: close-without-defer language: go rule: pattern: '$RESOURCE.Close()' not: inside: pattern: 'defer $RESOURCE.Close()' message: 'Consider using defer for resource cleanup' TypeScript Patterns Type Assertion id: type-assertion-style language: typescript rule: pattern: '<$TYPE>$EXPR' fix: '$EXPR as $TYPE' message: 'Prefer \"as\" syntax for type assertions' Optional Chaining id: use-optional-chaining language: typescript rule: pattern: '$OBJ && $OBJ.$PROP' fix: '$OBJ?.$PROP' Nullish Coalescing id: use-nullish-coalescing language: typescript rule: pattern: '$VAR !== null && $VAR !== undefined ? $VAR : $DEFAULT' fix: '$VAR ?? $DEFAULT' Batch Refactoring Multi-file Transformation # Find all files sg run --pattern '$OLD($$$ARGS)' --lang python src/ # Preview changes sg run --pattern '$OLD($$$ARGS)' --rewrite '$NEW($$$ARGS)' --lang python src/ --interactive # Apply changes sg run --pattern '$OLD($$$ARGS)' --rewrite '$NEW($$$ARGS)' --lang python src/ --update-all JSON Output for Review sg scan --config rules.yml --json > changes.json # Review changes before applying cat changes.json | jq '.[] | {file: .path, line: .range.start.line, fix: .fix}'"},{"id":".claude/skills/tool-ast-grep/modules/security-rules.md","title":"AST-Grep Security Rules","category":"Skills","path":".claude/skills/tool-ast-grep/modules/security-rules.md","desc":"","html":"<h1 id=\"ast-grep-security-rules\">AST-Grep Security Rules<\/h1>\n<p>Security vulnerability detection patterns for common attack vectors.<\/p>\n<h2 id=\"sql-injection\">SQL Injection<\/h2>\n<h3 id=\"python\">Python<\/h3>\n<pre><code class=\"language-yaml\">id: sql-injection-python-format\nlanguage: python\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;cursor.execute($QUERY % $ARGS)&#x27;\n    - pattern: &#x27;cursor.execute($QUERY.format($$$ARGS))&#x27;\n    - pattern: &#x27;cursor.execute(f&quot;$$$SQL&quot;)&#x27;\n    - pattern: &#x27;execute($QUERY + $ARGS)&#x27;\nmessage: &#x27;Potential SQL injection. Use parameterized queries.&#x27;\nfix: &#x27;cursor.execute($QUERY, ($ARGS,))&#x27;<\/code><\/pre>\n<h3 id=\"javascript-typescript\">JavaScript/TypeScript<\/h3>\n<pre><code class=\"language-yaml\">id: sql-injection-js\nlanguage: javascript\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;$DB.query(`$$$SQL ${$VAR} $$$REST`)&#x27;\n    - pattern: &#x27;$DB.query($SQL + $VAR)&#x27;\n    - pattern: &#x27;$DB.raw($SQL + $VAR)&#x27;\nmessage: &#x27;Potential SQL injection. Use parameterized queries.&#x27;<\/code><\/pre>\n<h2 id=\"xss-cross-site-scripting\">XSS (Cross-Site Scripting)<\/h2>\n<h3 id=\"react\">React<\/h3>\n<pre><code class=\"language-yaml\">id: xss-dangerouslySetInnerHTML\nlanguage: typescriptreact\nseverity: warning\nrule:\n  pattern: &#x27;dangerouslySetInnerHTML={{ __html: $CONTENT }}&#x27;\n  not:\n    has:\n      pattern: &#x27;DOMPurify.sanitize($CONTENT)&#x27;\nmessage: &#x27;XSS risk: sanitize content before using dangerouslySetInnerHTML&#x27;<\/code><\/pre>\n<h3 id=\"javascript-dom\">JavaScript DOM<\/h3>\n<pre><code class=\"language-yaml\">id: xss-innerHTML\nlanguage: javascript\nseverity: warning\nrule:\n  any:\n    - pattern: &#x27;$EL.innerHTML = $CONTENT&#x27;\n    - pattern: &#x27;document.write($CONTENT)&#x27;\nmessage: &#x27;Potential XSS vulnerability. Sanitize user input.&#x27;<\/code><\/pre>\n<h2 id=\"secrets-detection\">Secrets Detection<\/h2>\n<h3 id=\"hardcoded-credentials\">Hardcoded Credentials<\/h3>\n<pre><code class=\"language-yaml\">id: hardcoded-password\nlanguage: python\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;password = &quot;$$$VALUE&quot;&#x27;\n    - pattern: &#x27;PASSWORD = &quot;$$$VALUE&quot;&#x27;\n    - pattern: &#x27;secret = &quot;$$$VALUE&quot;&#x27;\n    - pattern: &#x27;api_key = &quot;$$$VALUE&quot;&#x27;\nconstraints:\n  VALUE:\n    regex: &#x27;.{8,}&#x27;  # At least 8 characters\nmessage: &#x27;Hardcoded credential detected. Use environment variables.&#x27;<\/code><\/pre>\n<h3 id=\"api-keys\">API Keys<\/h3>\n<pre><code class=\"language-yaml\">id: exposed-api-key\nlanguage: javascript\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;apiKey: &quot;$$$KEY&quot;&#x27;\n    - pattern: &#x27;API_KEY = &quot;$$$KEY&quot;&#x27;\n    - pattern: &#x27;Authorization: &quot;Bearer $$$TOKEN&quot;&#x27;\nmessage: &#x27;API key should not be hardcoded. Use environment variables.&#x27;<\/code><\/pre>\n<h2 id=\"command-injection\">Command Injection<\/h2>\n<h3 id=\"python\">Python<\/h3>\n<pre><code class=\"language-yaml\">id: command-injection-python\nlanguage: python\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;os.system($CMD)&#x27;\n    - pattern: &#x27;subprocess.call($CMD, shell=True)&#x27;\n    - pattern: &#x27;subprocess.run($CMD, shell=True)&#x27;\n    - pattern: &#x27;os.popen($CMD)&#x27;\nmessage: &#x27;Potential command injection. Avoid shell=True and use subprocess with list arguments.&#x27;\nfix: &#x27;subprocess.run(shlex.split($CMD), shell=False)&#x27;<\/code><\/pre>\n<h3 id=\"javascript\">JavaScript<\/h3>\n<pre><code class=\"language-yaml\">id: command-injection-js\nlanguage: javascript\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;exec($CMD)&#x27;\n    - pattern: &#x27;execSync($CMD)&#x27;\n    - pattern: &#x27;spawn($CMD, { shell: true })&#x27;\nmessage: &#x27;Potential command injection. Use spawn with shell: false.&#x27;<\/code><\/pre>\n<h2 id=\"path-traversal\">Path Traversal<\/h2>\n<pre><code class=\"language-yaml\">id: path-traversal\nlanguage: python\nseverity: error\nrule:\n  any:\n    - pattern: &#x27;open($PATH + $USER_INPUT)&#x27;\n    - pattern: &#x27;open(f&quot;$$$PATH{$USER_INPUT}$$$REST&quot;)&#x27;\n    - pattern: &#x27;os.path.join($BASE, $USER_INPUT)&#x27;\n  not:\n    precedes:\n      any:\n        - pattern: &#x27;os.path.realpath($$$ARGS)&#x27;\n        - pattern: &#x27;os.path.abspath($$$ARGS)&#x27;\nmessage: &#x27;Path traversal risk. Validate and sanitize file paths.&#x27;<\/code><\/pre>\n<h2 id=\"insecure-cryptography\">Insecure Cryptography<\/h2>\n<h3 id=\"weak-hashing\">Weak Hashing<\/h3>\n<pre><code class=\"language-yaml\">id: weak-hash-algorithm\nlanguage: python\nseverity: warning\nrule:\n  any:\n    - pattern: &#x27;hashlib.md5($$$ARGS)&#x27;\n    - pattern: &#x27;hashlib.sha1($$$ARGS)&#x27;\nmessage: &#x27;Weak hash algorithm. Use SHA-256 or stronger.&#x27;\nfix: &#x27;hashlib.sha256($$$ARGS)&#x27;<\/code><\/pre>\n<h3 id=\"insecure-random\">Insecure Random<\/h3>\n<pre><code class=\"language-yaml\">id: insecure-random\nlanguage: python\nseverity: warning\nrule:\n  pattern: &#x27;random.random()&#x27;\n  inside:\n    any:\n      - pattern: &#x27;def $FUNC($$$ARGS): $$$BODY&#x27;\n        constraints:\n          FUNC:\n            regex: &#x27;.*(token|secret|key|password).*&#x27;\nmessage: &#x27;Use secrets module for security-sensitive random values.&#x27;\nfix: &#x27;secrets.token_hex(16)&#x27;<\/code><\/pre>\n<h2 id=\"csrf-protection\">CSRF Protection<\/h2>\n<pre><code class=\"language-yaml\">id: missing-csrf-token\nlanguage: html\nseverity: warning\nrule:\n  pattern: &#x27;&lt;form $$$ATTRS&gt;&#x27;\n  not:\n    has:\n      pattern: &#x27;csrf_token&#x27;\nmessage: &#x27;Form may be missing CSRF token.&#x27;<\/code><\/pre>\n<h2 id=\"authentication-issues\">Authentication Issues<\/h2>\n<h3 id=\"hardcoded-jwt-secret\">Hardcoded JWT Secret<\/h3>\n<pre><code class=\"language-yaml\">id: hardcoded-jwt-secret\nlanguage: javascript\nseverity: error\nrule:\n  pattern: &#x27;jwt.sign($PAYLOAD, &quot;$SECRET&quot;)&#x27;\nmessage: &#x27;JWT secret should not be hardcoded.&#x27;<\/code><\/pre>\n<h3 id=\"missing-token-verification\">Missing Token Verification<\/h3>\n<pre><code class=\"language-yaml\">id: jwt-no-verification\nlanguage: javascript\nseverity: error\nrule:\n  pattern: &#x27;jwt.decode($TOKEN)&#x27;\n  not:\n    inside:\n      has:\n        pattern: &#x27;jwt.verify($TOKEN, $SECRET)&#x27;\nmessage: &#x27;Use jwt.verify() instead of jwt.decode() for security.&#x27;<\/code><\/pre>\n<h2 id=\"usage\">Usage<\/h2>\n<p>Run security scan:<\/p>\n<pre><code class=\"language-bash\">sg scan --config sgconfig.yml --severity error<\/code><\/pre>\n<p>JSON output for CI:<\/p>\n<pre><code class=\"language-bash\">sg scan --config sgconfig.yml --json | jq &#x27;.[] | select(.severity == &quot;error&quot;)&#x27;<\/code><\/pre>","text":"AST-Grep Security Rules Security vulnerability detection patterns for common attack vectors. SQL Injection Python id: sql-injection-python-format language: python severity: error rule: any: - pattern: 'cursor.execute($QUERY % $ARGS)' - pattern: 'cursor.execute($QUERY.format($$$ARGS))' - pattern: 'cursor.execute(f\"$$$SQL\")' - pattern: 'execute($QUERY + $ARGS)' message: 'Potential SQL injection. Use parameterized queries.' fix: 'cursor.execute($QUERY, ($ARGS,))' JavaScript/TypeScript id: sql-injection-js language: javascript severity: error rule: any: - pattern: '$DB.query(`$$$SQL ${$VAR} $$$REST`)' - pattern: '$DB.query($SQL + $VAR)' - pattern: '$DB.raw($SQL + $VAR)' message: 'Potential SQL injection. Use parameterized queries.' XSS (Cross-Site Scripting) React id: xss-dangerouslySetInnerHTML language: typescriptreact severity: warning rule: pattern: 'dangerouslySetInnerHTML={{ __html: $CONTENT }}' not: has: pattern: 'DOMPurify.sanitize($CONTENT)' message: 'XSS risk: sanitize content before using dangerouslySetInnerHTML' JavaScript DOM id: xss-innerHTML language: javascript severity: warning rule: any: - pattern: '$EL.innerHTML = $CONTENT' - pattern: 'document.write($CONTENT)' message: 'Potential XSS vulnerability. Sanitize user input.' Secrets Detection Hardcoded Credentials id: hardcoded-password language: python severity: error rule: any: - pattern: 'password = \"$$$VALUE\"' - pattern: 'PASSWORD = \"$$$VALUE\"' - pattern: 'secret = \"$$$VALUE\"' - pattern: 'api_key = \"$$$VALUE\"' constraints: VALUE: regex: '.{8,}' # At least 8 characters message: 'Hardcoded credential detected. Use environment variables.' API Keys id: exposed-api-key language: javascript severity: error rule: any: - pattern: 'apiKey: \"$$$KEY\"' - pattern: 'API_KEY = \"$$$KEY\"' - pattern: 'Authorization: \"Bearer $$$TOKEN\"' message: 'API key should not be hardcoded. Use environment variables.' Command Injection Python id: command-injection-python language: python severity: error rule: any: - pattern: 'os.system($CMD)' - pattern: 'subprocess.call($CMD, shell=True)' - pattern: 'subprocess.run($CMD, shell=True)' - pattern: 'os.popen($CMD)' message: 'Potential command injection. Avoid shell=True and use subprocess with list arguments.' fix: 'subprocess.run(shlex.split($CMD), shell=False)' JavaScript id: command-injection-js language: javascript severity: error rule: any: - pattern: 'exec($CMD)' - pattern: 'execSync($CMD)' - pattern: 'spawn($CMD, { shell: true })' message: 'Potential command injection. Use spawn with shell: false.' Path Traversal id: path-traversal language: python severity: error rule: any: - pattern: 'open($PATH + $USER_INPUT)' - pattern: 'open(f\"$$$PATH{$USER_INPUT}$$$REST\")' - pattern: 'os.path.join($BASE, $USER_INPUT)' not: precedes: any: - pattern: 'os.path.realpath($$$ARGS)' - pattern: 'os.path.abspath($$$ARGS)' message: 'Path traversal risk. Validate and sanitize file paths.' Insecure Cryptography Weak Hashing id: weak-hash-algorithm language: python severity: warning rule: any: - pattern: 'hashlib.md5($$$ARGS)' - pattern: 'hashlib.sha1($$$ARGS)' message: 'Weak hash algorithm. Use SHA-256 or stronger.' fix: 'hashlib.sha256($$$ARGS)' Insecure Random id: insecure-random language: python severity: warning rule: pattern: 'random.random()' inside: any: - pattern: 'def $FUNC($$$ARGS): $$$BODY' constraints: FUNC: regex: '.*(token|secret|key|password).*' message: 'Use secrets module for security-sensitive random values.' fix: 'secrets.token_hex(16)' CSRF Protection id: missing-csrf-token language: html severity: warning rule: pattern: '<form $$$ATTRS>' not: has: pattern: 'csrf_token' message: 'Form may be missing CSRF token.' Authentication Issues Hardcoded JWT Secret id: hardcoded-jwt-secret language: javascript severity: error rule: pattern: 'jwt.sign($PAYLOAD, \"$SECRET\")' message: 'JWT secret should not be hardcoded.' Missing Token Verification id: jwt-no-verification language: javascript severity: error rule: pattern: 'jwt.decode($TOKEN)' not: inside: has: pattern: 'jwt.verify($TOKEN, $SECRET)' message: 'Use jwt.verify() instead of jwt.decode() for security.' Usage Run security scan: sg scan --config sgconfig.yml --severity error JSON output for CI: sg scan --config sgconfig.yml --json | jq '.[] | select(.severity == \"error\")'"},{"id":".claude/skills/tool-ast-grep/references/examples.md","title":"AST-Grep Examples — Workflows and Integration","category":"Skills","path":".claude/skills/tool-ast-grep/references/examples.md","desc":"","html":"<h1 id=\"ast-grep-examples-workflows-and-integration\">AST-Grep Examples — Workflows and Integration<\/h1>\n<p>Pattern/rule examples live in the modules — this file holds only what they don't cover: end-to-end workflows, CI/CD recipes, performance, troubleshooting.<\/p>\n<table><thead><tr><th>Looking for<\/th><th>Go to<\/th><\/tr><\/thead><tbody><tr><td>Meta-variables, relational/composite rules, fix syntax<\/td><td>modules/pattern-syntax.md<\/td><\/tr><tr><td>Rename, API migration, modernization codemods<\/td><td>modules/refactoring-patterns.md<\/td><\/tr><tr><td>OWASP security rules (SQLi, XSS, secrets, ...)<\/td><td>modules/security-rules.md<\/td><\/tr><tr><td>Per-language patterns (Python, TS, Go, Rust, Java)<\/td><td>modules/language-specific.md<\/td><\/tr><tr><td>Installation, docs links, module map<\/td><td>references/reference.md<\/td><\/tr><\/tbody><\/table>\n<h2 id=\"common-workflows\">Common Workflows<\/h2>\n<h3 id=\"find-and-replace-a-function-name\">Find and replace a function name<\/h3>\n<pre><code class=\"language-bash\">sg -p &#x27;oldFunctionName($$$ARGS)&#x27; src/                                  # 1. find usages\nsg -p &#x27;oldFunctionName($$$ARGS)&#x27; -r &#x27;newFunctionName($$$ARGS)&#x27; src/    # 2. preview (interactive)\nsg -p &#x27;oldFunctionName($$$ARGS)&#x27; -r &#x27;newFunctionName($$$ARGS)&#x27; src/ -U # 3. apply (update all)<\/code><\/pre>\n<h3 id=\"security-audit\">Security audit<\/h3>\n<pre><code class=\"language-bash\">sg scan --config sgconfig.yml --severity error          # scan\nsg scan --config sgconfig.yml --format sarif &gt; out.sarif # SARIF for GitHub Security tab<\/code><\/pre>\n<h3 id=\"refactoring-session\">Refactoring session<\/h3>\n<pre><code class=\"language-bash\">sg -p &#x27;&lt;pattern&gt;&#x27; src/          # 1. identify sites\n# 2. write rule yml with fix:\nsg test rules/                  # 3. test the rule\nsg scan -r my-rule.yml -U src/  # 4. apply\n# 5. run the project&#x27;s tests (/gate)<\/code><\/pre>\n<h2 id=\"ci-cd-integration\">CI/CD Integration<\/h2>\n<h3 id=\"github-actions\">GitHub Actions<\/h3>\n<pre><code class=\"language-yaml\">name: ast-grep scan\non: [push, pull_request]\njobs:\n  scan:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - run: npm install -g @ast-grep/cli\n      - run: sg scan --config sgconfig.yml --format github<\/code><\/pre>\n<h3 id=\"pre-commit-hook\">Pre-commit hook<\/h3>\n<pre><code class=\"language-bash\">#!/bin/sh\n# .git/hooks/pre-commit\nsg scan --config sgconfig.yml --severity error || {\n  echo &quot;ast-grep scan failed — fix errors before committing&quot;; exit 1; }<\/code><\/pre>\n<p>GitLab/Jenkins: same single <code>sg scan --config sgconfig.yml<\/code> invocation inside the platform's job syntax.<\/p>\n<h2 id=\"cli-quick-reference\">CLI Quick Reference<\/h2>\n<pre><code class=\"language-bash\">sg -p &#x27;&lt;pattern&gt;&#x27; [path] --lang &lt;lang&gt;   # search\nsg -p &#x27;&lt;old&gt;&#x27; -r &#x27;&lt;new&gt;&#x27; [path]          # transform (add -U to write)\nsg scan --config sgconfig.yml [path]     # rule scan (--format json|sarif|github)\nsg test rules/                           # test rules\nsg --help / sg &lt;cmd&gt; --help              # help<\/code><\/pre>\n<h2 id=\"performance\">Performance<\/h2>\n<pre><code class=\"language-bash\">sg -p &#x27;&lt;pattern&gt;&#x27; --lang python src/     # language filter narrows parsing\nsg -p &#x27;&lt;pattern&gt;&#x27; --globs &#x27;!node_modules&#x27; --globs &#x27;!dist&#x27;  # exclude dirs<\/code><\/pre>\n<p>Parallel execution is the default; scope by path to cut wall time.<\/p>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<ul><li>Pattern not matching → inspect the AST: <code>sg -p &#x27;&lt;pattern&gt;&#x27; --debug-query<\/code>; patterns match AST nodes, not text — whitespace is irrelevant, node kinds are not.<\/li><li>Transformation wrong → preview without <code>-U<\/code> first; check meta-variable names match between pattern and rewrite.<\/li><li>Rule file rejected → <code>sg test rules/<\/code> reports the failing rule; YAML <code>id<\/code>, <code>language<\/code>, and <code>rule<\/code> keys are mandatory.<\/li><\/ul>","text":"AST-Grep Examples — Workflows and Integration Pattern/rule examples live in the modules — this file holds only what they don't cover: end-to-end workflows, CI/CD recipes, performance, troubleshooting. Looking for Go to Meta-variables, relational/composite rules, fix syntax modules/pattern-syntax.md Rename, API migration, modernization codemods modules/refactoring-patterns.md OWASP security rules (SQLi, XSS, secrets, ...) modules/security-rules.md Per-language patterns (Python, TS, Go, Rust, Java) modules/language-specific.md Installation, docs links, module map references/reference.md Common Workflows Find and replace a function name sg -p 'oldFunctionName($$$ARGS)' src/ # 1. find usages sg -p 'oldFunctionName($$$ARGS)' -r 'newFunctionName($$$ARGS)' src/ # 2. preview (interactive) sg -p 'oldFunctionName($$$ARGS)' -r 'newFunctionName($$$ARGS)' src/ -U # 3. apply (update all) Security audit sg scan --config sgconfig.yml --severity error # scan sg scan --config sgconfig.yml --format sarif > out.sarif # SARIF for GitHub Security tab Refactoring session sg -p '<pattern>' src/ # 1. identify sites # 2. write rule yml with fix: sg test rules/ # 3. test the rule sg scan -r my-rule.yml -U src/ # 4. apply # 5. run the project's tests (/gate) CI/CD Integration GitHub Actions name: ast-grep scan on: [push, pull_request] jobs: scan: runs-on: ubuntu-latest steps: - uses: actions/checkout@v4 - run: npm install -g @ast-grep/cli - run: sg scan --config sgconfig.yml --format github Pre-commit hook #!/bin/sh # .git/hooks/pre-commit sg scan --config sgconfig.yml --severity error || { echo \"ast-grep scan failed — fix errors before committing\"; exit 1; } GitLab/Jenkins: same single sg scan --config sgconfig.yml invocation inside the platform's job syntax. CLI Quick Reference sg -p '<pattern>' [path] --lang <lang> # search sg -p '<old>' -r '<new>' [path] # transform (add -U to write) sg scan --config sgconfig.yml [path] # rule scan (--format json|sarif|github) sg test rules/ # test rules sg --help / sg <cmd> --help # help Performance sg -p '<pattern>' --lang python src/ # language filter narrows parsing sg -p '<pattern>' --globs '!node_modules' --globs '!dist' # exclude dirs Parallel execution is the default; scope by path to cut wall time. Troubleshooting Pattern not matching → inspect the AST: sg -p '<pattern>' --debug-query ; patterns match AST nodes, not text — whitespace is irrelevant, node kinds are not. Transformation wrong → preview without -U first; check meta-variable names match between pattern and rewrite. Rule file rejected → sg test rules/ reports the failing rule; YAML id , language , and rule keys are mandatory."},{"id":".claude/skills/tool-ast-grep/references/reference.md","title":"AST-Grep Tool - Reference Documentation","category":"Skills","path":".claude/skills/tool-ast-grep/references/reference.md","desc":"","html":"<h1 id=\"ast-grep-tool-reference-documentation\">AST-Grep Tool - Reference Documentation<\/h1>\n<h2 id=\"official-resources\">Official Resources<\/h2>\n<h3 id=\"core-documentation\">Core Documentation<\/h3>\n<ul><li><strong>AST-Grep Official Site<\/strong>: https://ast-grep.github.io/<ul><li>Main documentation hub<\/li><li>Getting started guide<\/li><li>Feature overview<\/li><\/ul><\/li><li><strong>GitHub Repository<\/strong>: https://github.com/ast-grep/ast-grep<ul><li>Source code<\/li><li>Issue tracker<\/li><li>Contributing guide<\/li><li>Release notes<\/li><\/ul><\/li><li><strong>Playground<\/strong>: https://ast-grep.github.io/playground.html<ul><li>Interactive pattern testing<\/li><li>Live rule validation<\/li><li>Multi-language support<\/li><\/ul><\/li><\/ul>\n<h3 id=\"installation\">Installation<\/h3>\n<h4 id=\"package-managers\">Package Managers<\/h4>\n<ul><li><strong>Homebrew (macOS/Linux)<\/strong>: https://ast-grep.github.io/guide/install.html#homebrew ``<code>bash brew install ast-grep <\/code>``<\/li><li><strong>npm (Cross-platform)<\/strong>: https://www.npmjs.com/package/@ast-grep/cli ``<code>bash npm install -g @ast-grep/cli <\/code>``<\/li><li><strong>Cargo (Rust)<\/strong>: https://crates.io/crates/ast-grep ``<code>bash cargo install ast-grep <\/code>``<\/li><li><strong>Pre-built Binaries<\/strong>: https://github.com/ast-grep/ast-grep/releases<ul><li>Linux, macOS, Windows<\/li><li>No installation required<\/li><\/ul><\/li><\/ul>\n<h3 id=\"core-documentation\">Core Documentation<\/h3>\n<h4 id=\"getting-started\">Getting Started<\/h4>\n<ul><li><strong>Quick Start<\/strong>: https://ast-grep.github.io/guide/quick-start.html<ul><li>Basic pattern search<\/li><li>First rule creation<\/li><li>Common use cases<\/li><\/ul><\/li><li><strong>Pattern Syntax<\/strong>: https://ast-grep.github.io/reference/pattern.html<ul><li>Meta-variables ($VAR)<\/li><li>Variadic variables ($$$ARGS)<\/li><li>Anonymous variables ($$_)<\/li><li>Wildcards and quantifiers<\/li><\/ul><\/li><\/ul>\n<h4 id=\"rule-configuration\">Rule Configuration<\/h4>\n<ul><li><strong>YAML Rule Reference<\/strong>: https://ast-grep.github.io/reference/yaml.html<ul><li>Rule structure<\/li><li>Composite rules (all/any/not)<\/li><li>Relational rules (inside/has/follows)<\/li><li>Fix patterns<\/li><li>Severity levels<\/li><\/ul><\/li><li><strong>Configuration Files<\/strong>: https://ast-grep.github.io/reference/config.html<ul><li>sgconfig.yml structure<\/li><li>Rule directory organization<\/li><li>Test configuration<\/li><li>Language glob patterns<\/li><\/ul><\/li><\/ul>\n<h3 id=\"advanced-features\">Advanced Features<\/h3>\n<h4 id=\"pattern-matching\">Pattern Matching<\/h4>\n<ul><li><strong>Advanced Patterns<\/strong>: https://ast-grep.github.io/guide/pattern-syntax.html<ul><li>String matching<\/li><li>Regular expressions in patterns<\/li><li>Node type matching<\/li><li>Field constraints<\/li><\/ul><\/li><\/ul>\n<h4 id=\"relational-rules\">Relational Rules<\/h4>\n<ul><li><strong>Inside Rule<\/strong>: https://ast-grep.github.io/reference/rule.html#inside<ul><li>Scoped search within parent nodes<\/li><li>Nested context matching<\/li><\/ul><\/li><li><strong>Has Rule<\/strong>: https://ast-grep.github.io/reference/rule.html#has<ul><li>Contains check<\/li><li>Descendant node matching<\/li><\/ul><\/li><li><strong>Follows/Precedes Rules<\/strong>: https://ast-grep.github.io/reference/rule.html#follows-precedes<ul><li>Sequential pattern matching<\/li><li>Order-based validation<\/li><\/ul><\/li><\/ul>\n<h4 id=\"composite-rules\">Composite Rules<\/h4>\n<ul><li><strong>All/Any/Not<\/strong>: https://ast-grep.github.io/reference/rule.html#all-any-not<ul><li>Logical combinations<\/li><li>Complex conditionals<\/li><li>Negation patterns<\/li><\/ul><\/li><\/ul>\n<h3 id=\"language-support\">Language Support<\/h3>\n<h4 id=\"supported-languages\">Supported Languages<\/h4>\n<ul><li><strong>Full Language List<\/strong>: https://ast-grep.github.io/languages.html<ul><li>Python, JavaScript, TypeScript<\/li><li>Go, Rust, Java, Kotlin<\/li><li>C, C++, C#, Swift<\/li><li>Ruby, PHP, Scala, Elixir<\/li><li>HTML, CSS, Vue, Svelte<\/li><li>And 30+ more<\/li><\/ul><\/li><\/ul>\n<h4 id=\"language-specific-guides\">Language-Specific Guides<\/h4>\n<ul><li><strong>Python Patterns<\/strong>: https://ast-grep.github.io/languages/python.html<\/li><li><strong>JavaScript Patterns<\/strong>: https://ast-grep.github.io/languages/javascript.html<\/li><li><strong>TypeScript Patterns<\/strong>: https://ast-grep.github.io/languages/typescript.html<\/li><li><strong>Go Patterns<\/strong>: https://ast-grep.github.io/languages/go.html<\/li><\/ul>\n<h3 id=\"security-scanning\">Security Scanning<\/h3>\n<h4 id=\"security-rules\">Security Rules<\/h4>\n<ul><li><strong>Security Templates<\/strong>: https://ast-grep.github.io/guide/security.html<ul><li>SQL injection detection<\/li><li>XSS vulnerability scanning<\/li><li>Hardcoded credential detection<\/li><li>Insecure dependency checks<\/li><\/ul><\/li><\/ul>\n<h4 id=\"owasp-integration\">OWASP Integration<\/h4>\n<ul><li><strong>OWASP Top 10<\/strong>: https://ast-grep.github.io/guide/security.html#owasp-top-10<ul><li>Injection attacks<\/li><li>Broken authentication<\/li><li>Sensitive data exposure<\/li><li>Security misconfigurations<\/li><\/ul><\/li><\/ul>\n<h3 id=\"refactoring-transformation\">Refactoring &amp; Transformation<\/h3>\n<h4 id=\"code-transformation\">Code Transformation<\/h4>\n<ul><li><strong>Rewrite Rules<\/strong>: https://ast-grep.github.io/reference/rule.html#fix<ul><li>Pattern-to-pattern mapping<\/li><li>Variable substitution<\/li><li>Multi-file transformations<\/li><\/ul><\/li><\/ul>\n<h4 id=\"refactoring-patterns\">Refactoring Patterns<\/h4>\n<ul><li><strong>Common Refactorings<\/strong>: https://ast-grep.github.io/guide/refactoring.html<ul><li>API migration<\/li><li>Function renaming<\/li><li>Code modernization<\/li><li>Design pattern application<\/li><\/ul><\/li><\/ul>\n<h3 id=\"testing-validation\">Testing &amp; Validation<\/h3>\n<h4 id=\"rule-testing\">Rule Testing<\/h4>\n<ul><li><strong>Test Framework<\/strong>: https://ast-grep.github.io/guide/test.html<ul><li>Snapshot testing<\/li><li>Inline test cases<\/li><li>Test organization<\/li><\/ul><\/li><\/ul>\n<h4 id=\"ci-cd-integration\">CI/CD Integration<\/h4>\n<ul><li><strong>GitHub Actions<\/strong>: https://ast-grep.github.io/guide/ci.html#github-actions<ul><li>Workflow examples<\/li><li>Automated scanning<\/li><li>PR integration<\/li><\/ul><\/li><li><strong>Pre-commit Hooks<\/strong>: https://ast-grep.github.io/guide/ci.html#pre-commit<ul><li>Local validation<\/li><li>Fast feedback<\/li><li>Configuration examples<\/li><\/ul><\/li><\/ul>\n<h3 id=\"context7-integration\">Context7 Integration<\/h3>\n<ul><li><strong>Library Resolution<\/strong>: Use <code>mcp__context7__resolve-library-id<\/code> with query \"ast-grep\"<\/li><li><strong>Documentation Fetch<\/strong>: Use <code>mcp__context7__get-library-docs<\/code> for latest docs<\/li><\/ul>\n<h3 id=\"module-organization\">Module Organization<\/h3>\n<p>This skill contains 4 modules:<\/p>\n<ul><li><strong>modules/pattern-syntax.md<\/strong> - Complete pattern syntax reference<ul><li>Meta-variable types<\/li><li>Wildcard patterns<\/li><li>String and regex matching<\/li><li>Language-specific syntax<\/li><\/ul><\/li><li><strong>modules/security-rules.md<\/strong> - Security scanning rule templates<ul><li>SQL injection detection<\/li><li>XSS vulnerability patterns<\/li><li>Hardcoded secret detection<\/li><li>Insecure dependency checks<\/li><li>OWASP Top 10 coverage<\/li><\/ul><\/li><li><strong>modules/refactoring-patterns.md<\/strong> - Common refactoring patterns<ul><li>API migration patterns<\/li><li>Function/method renaming<\/li><li>Code modernization<\/li><li>Design pattern applications<\/li><li>Multi-file transformations<\/li><\/ul><\/li><li><strong>modules/language-specific.md<\/strong> - Language-specific patterns<ul><li>Python patterns (decorators, context managers, etc.)<\/li><li>JavaScript/TypeScript patterns (React hooks, async/await, etc.)<\/li><li>Go patterns (error handling, interfaces, etc.)<\/li><li>Rust patterns (macros, traits, etc.)<\/li><\/ul><\/li><\/ul>\n<h3 id=\"the-machine-integration\">the machine Integration<\/h3>\n<h4 id=\"tool-registry\">Tool Registry<\/h4>\n<ul><li><strong>Registration<\/strong>: <code>internal/hook/registry.go<\/code> as AST_ANALYZER type<\/li><li><strong>Permissions<\/strong>: Auto-allowed for <code>Bash(sg:*)<\/code> and <code>Bash(ast-grep:*)<\/code><\/li><li><strong>Hooks<\/strong>: PostToolUse hook for automatic security scanning<\/li><\/ul>\n<h4 id=\"running-scans\">Running Scans<\/h4>\n<pre><code class=\"language-bash\"># Scan with the machine rules\nsg scan --config sgconfig.yml\n\n# Scan specific directory\nsg scan --config sgconfig.yml src/\n\n# JSON output for CI/CD\nsg scan --config sgconfig.yml --json &gt; results.json<\/code><\/pre>\n<h3 id=\"community-support\">Community &amp; Support<\/h3>\n<ul><li><strong>GitHub Discussions<\/strong>: https://github.com/ast-grep/ast-grep/discussions<ul><li>Q&amp;A threads<\/li><li>Pattern sharing<\/li><li>Community rules<\/li><\/ul><\/li><li><strong>Discord Server<\/strong>: https://discord.gg/HuWxGYW6Pc<ul><li>Real-time chat<\/li><li>Pattern help<\/li><li>Feature discussions<\/li><\/ul><\/li><li><strong>Twitter<\/strong>: https://twitter.com/ast_grep<ul><li>Updates and tips<\/li><li>Pattern examples<\/li><li>Community highlights<\/li><\/ul><\/li><\/ul>\n<h3 id=\"related-tools\">Related Tools<\/h3>\n<h4 id=\"complementary-tools\">Comple
