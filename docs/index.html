h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Targeting modern terminals → assume truecolor + UTF-8. Reason: covers &gt;95% of dev environments.<\/li><li>Need wide portability → query terminfo / <code>tput<\/code>. Reason: source of truth for capabilities.<\/li><li>Inside a PTY → handle resize signals. Reason: terminal size changes mid-session and consumers need it.<\/li><li>Rendering controlled by a TUI lib → let the lib own escapes. Reason: mixing layers corrupts state.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Hardcoded escapes: simple, fast. Pay: portability.<\/li><li>terminfo: portable. Pay: indirection, learning curve.<\/li><li>Probing (e.g., DA1/DA2): accurate. Pay: latency, fragile parsing.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Printing escapes to non-TTY: garbles logs and pipes.<\/li><li>Assuming xterm-256color everywhere: legacy/CI terminals will show literal escapes.<\/li><li>Ignoring SIGWINCH: stale dimensions cause wrap and misalignment.<\/li><\/ul>","text":"ansi-pty When : emitting escape sequences, parsing terminal output, deciding capability detection strategy. Why care : wrong sequence garbles the terminal; capability assumptions break on minority terminals. Decision tree Targeting modern terminals → assume truecolor + UTF-8. Reason: covers >95% of dev environments. Need wide portability → query terminfo / tput . Reason: source of truth for capabilities. Inside a PTY → handle resize signals. Reason: terminal size changes mid-session and consumers need it. Rendering controlled by a TUI lib → let the lib own escapes. Reason: mixing layers corrupts state. Tradeoffs Hardcoded escapes: simple, fast. Pay: portability. terminfo: portable. Pay: indirection, learning curve. Probing (e.g., DA1/DA2): accurate. Pay: latency, fragile parsing. Anti-patterns (why) Printing escapes to non-TTY: garbles logs and pipes. Assuming xterm-256color everywhere: legacy/CI terminals will show literal escapes. Ignoring SIGWINCH: stale dimensions cause wrap and misalignment."},{"id":".claude/skills/specialists/cache-locality.md","title":"cache-locality","category":"Skills","path":".claude/skills/specialists/cache-locality.md","desc":"","html":"<h1 id=\"cache-locality\">cache-locality<\/h1>\n<p><strong>When<\/strong>: data structure layout decisions in hot loops, sharing across cores. <strong>Why care<\/strong>: cache misses dominate runtime in tight loops; false sharing destroys multicore scaling.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Iterating over one field of many records → Structure-of-Arrays. Reason: only the touched field streams through cache.<\/li><li>Accessing all fields of one record → Array-of-Structures. Reason: spatial locality on the record.<\/li><li>Two threads write to neighboring fields → pad to cache line. Reason: false sharing causes invalidation storms.<\/li><li>Large struct in a tight loop → split hot/cold fields. Reason: cold fields evict hot ones.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>SoA: better streaming, harder to reason about as a \"thing\".<\/li><li>AoS: natural OO model, worse for column-wise scans.<\/li><li>Padding: cheap memory, big perf win where false sharing exists.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Cache-friendly micro-optimizations applied where the bottleneck is elsewhere: noise.<\/li><li>Padding everything \"just in case\": balloons memory, evicts unrelated data.<\/li><li>Assuming <code>Vec&lt;Box&lt;T&gt;&gt;<\/code> is contiguous: it's pointers to scattered boxes.<\/li><\/ul>","text":"cache-locality When : data structure layout decisions in hot loops, sharing across cores. Why care : cache misses dominate runtime in tight loops; false sharing destroys multicore scaling. Decision tree Iterating over one field of many records → Structure-of-Arrays. Reason: only the touched field streams through cache. Accessing all fields of one record → Array-of-Structures. Reason: spatial locality on the record. Two threads write to neighboring fields → pad to cache line. Reason: false sharing causes invalidation storms. Large struct in a tight loop → split hot/cold fields. Reason: cold fields evict hot ones. Tradeoffs SoA: better streaming, harder to reason about as a \"thing\". AoS: natural OO model, worse for column-wise scans. Padding: cheap memory, big perf win where false sharing exists. Anti-patterns (why) Cache-friendly micro-optimizations applied where the bottleneck is elsewhere: noise. Padding everything \"just in case\": balloons memory, evicts unrelated data. Assuming Vec<Box<T>> is contiguous: it's pointers to scattered boxes."},{"id":".claude/skills/specialists/capability-sandbox.md","title":"capability-sandbox","category":"Skills","path":".claude/skills/specialists/capability-sandbox.md","desc":"","html":"<h1 id=\"capability-sandbox\">capability-sandbox<\/h1>\n<p><strong>When<\/strong>: designing the permission model for tools/agents/plugins. <strong>Why care<\/strong>: ambient authority lets one bug compromise everything; capability scoping bounds blast radius by construction.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>New tool needs resource X → grant capability for X only. Reason: principle of least authority.<\/li><li>Cross-tool composition → pass capabilities, not raw paths/credentials. Reason: holder controls scope.<\/li><li>Untrusted plugin → no ambient authority, all access via injected capabilities. Reason: makes scope auditable.<\/li><li>Privilege escalation needed → explicit user approval, time-boxed. Reason: avoid TOCTOU + scope creep.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Pure capability model: rigorous, friction on every new feature.<\/li><li>Role-based (RBAC): familiar, drifts toward \"admin everywhere\".<\/li><li>Capability + RBAC hybrid: practical, harder to audit.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Running tools with the user's full shell privileges: one prompt injection = total compromise.<\/li><li>\"Permission\" that's checked once then cached forever: defeats time-boxing.<\/li><li>Implicit globals (process env, cwd) as capability source: invisible scope.<\/li><\/ul>","text":"capability-sandbox When : designing the permission model for tools/agents/plugins. Why care : ambient authority lets one bug compromise everything; capability scoping bounds blast radius by construction. Decision tree New tool needs resource X → grant capability for X only. Reason: principle of least authority. Cross-tool composition → pass capabilities, not raw paths/credentials. Reason: holder controls scope. Untrusted plugin → no ambient authority, all access via injected capabilities. Reason: makes scope auditable. Privilege escalation needed → explicit user approval, time-boxed. Reason: avoid TOCTOU + scope creep. Tradeoffs Pure capability model: rigorous, friction on every new feature. Role-based (RBAC): familiar, drifts toward \"admin everywhere\". Capability + RBAC hybrid: practical, harder to audit. Anti-patterns (why) Running tools with the user's full shell privileges: one prompt injection = total compromise. \"Permission\" that's checked once then cached forever: defeats time-boxing. Implicit globals (process env, cwd) as capability source: invisible scope."},{"id":".claude/skills/specialists/contention.md","title":"contention","category":"Skills","path":".claude/skills/specialists/contention.md","desc":"","html":"<h1 id=\"contention\">contention<\/h1>\n<p><strong>When<\/strong>: multithread bottleneck, deciding lock-free vs mutex vs sharding. <strong>Why care<\/strong>: contention turns parallel work serial; lock-free is hard to get right and rarely needed.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Critical section is tiny + uncontended → mutex. Reason: simple, fast in fast path.<\/li><li>Read-heavy, rare writers → RwLock or RCU. Reason: parallel readers.<\/li><li>High contention, simple op → atomic / lock-free. Reason: avoid OS wait queue.<\/li><li>Workload partitionable → shard by key. Reason: removes contention entirely.<\/li><li>Producer/consumer → channel. Reason: ownership-passing eliminates shared mutation.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Mutex: easy, predictable, can starve under contention.<\/li><li>RwLock: scales reads, writer starvation risk; reader/writer cost asymmetric.<\/li><li>Lock-free: scales, very hard to write correctly; ABA, memory ordering pitfalls.<\/li><li>Sharding: best when keys distribute uniformly; hot keys defeat it.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Lock-free as default: complexity tax, often slower under low contention.<\/li><li>Coarse global lock around fast work: serializes everything for one slow op.<\/li><li>Holding a lock across IO: turns lock contention into IO contention.<\/li><\/ul>","text":"contention When : multithread bottleneck, deciding lock-free vs mutex vs sharding. Why care : contention turns parallel work serial; lock-free is hard to get right and rarely needed. Decision tree Critical section is tiny + uncontended → mutex. Reason: simple, fast in fast path. Read-heavy, rare writers → RwLock or RCU. Reason: parallel readers. High contention, simple op → atomic / lock-free. Reason: avoid OS wait queue. Workload partitionable → shard by key. Reason: removes contention entirely. Producer/consumer → channel. Reason: ownership-passing eliminates shared mutation. Tradeoffs Mutex: easy, predictable, can starve under contention. RwLock: scales reads, writer starvation risk; reader/writer cost asymmetric. Lock-free: scales, very hard to write correctly; ABA, memory ordering pitfalls. Sharding: best when keys distribute uniformly; hot keys defeat it. Anti-patterns (why) Lock-free as default: complexity tax, often slower under low contention. Coarse global lock around fast work: serializes everything for one slow op. Holding a lock across IO: turns lock contention into IO contention."},{"id":".claude/skills/specialists/context-mgmt.md","title":"context-mgmt","category":"Skills","path":".claude/skills/specialists/context-mgmt.md","desc":"","html":"<h1 id=\"context-mgmt\">context-mgmt<\/h1>\n<p><strong>When<\/strong>: long sessions, large tool outputs, choosing summarization vs deferral vs delegation. <strong>Why care<\/strong>: context is finite and expensive; cache invalidation by reordering wastes spend; loss of key facts breaks coherence.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Tool output &gt;20 lines → sandbox-and-summarize. Reason: raw flood eats budget for no recall benefit.<\/li><li>Long-running session approaching budget → compact prior turns. Reason: continued work needs headroom.<\/li><li>Repeated questions about codebase → graph/index once, query many. Reason: re-grepping is wasteful.<\/li><li>Tool unlikely to be reused → defer schema loading. Reason: schemas are permanent context cost.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Eager summarization: lean context, risk dropping a detail later needed.<\/li><li>Lazy / on-demand recall: full fidelity, pay each retrieval.<\/li><li>Subagent offload: best isolation, pay coordination overhead.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Reading 2000-line files just to find one function: use grep/glob first.<\/li><li>Re-pasting prior content into a new turn: invalidates cache from that point.<\/li><li>Keeping ephemeral planning docs in-conversation forever: nothing is reusing them.<\/li><\/ul>","text":"context-mgmt When : long sessions, large tool outputs, choosing summarization vs deferral vs delegation. Why care : context is finite and expensive; cache invalidation by reordering wastes spend; loss of key facts breaks coherence. Decision tree Tool output >20 lines → sandbox-and-summarize. Reason: raw flood eats budget for no recall benefit. Long-running session approaching budget → compact prior turns. Reason: continued work needs headroom. Repeated questions about codebase → graph/index once, query many. Reason: re-grepping is wasteful. Tool unlikely to be reused → defer schema loading. Reason: schemas are permanent context cost. Tradeoffs Eager summarization: lean context, risk dropping a detail later needed. Lazy / on-demand recall: full fidelity, pay each retrieval. Subagent offload: best isolation, pay coordination overhead. Anti-patterns (why) Reading 2000-line files just to find one function: use grep/glob first. Re-pasting prior content into a new turn: invalidates cache from that point. Keeping ephemeral planning docs in-conversation forever: nothing is reusing them."},{"id":".claude/skills/specialists/harness-hooks.md","title":"harness-hooks","category":"Skills","path":".claude/skills/specialists/harness-hooks.md","desc":"","html":"<h1 id=\"harness-hooks\">harness-hooks<\/h1>\n<p><strong>When<\/strong>: configuring PreToolUse / PostToolUse / UserPromptSubmit / SessionStart hooks. <strong>Why care<\/strong>: hooks are how the harness enforces invariants the model can't be trusted to remember.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>\"From now on do X\" automated behavior → SessionStart or UserPromptSubmit hook. Reason: model can't self-enforce.<\/li><li>Block dangerous tool calls → PreToolUse. Reason: only chance to deny before execution.<\/li><li>Post-process tool output → PostToolUse. Reason: redact / summarize / log.<\/li><li>Inject session-wide context → SessionStart. Reason: stable prefix, cache-friendly.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Hook-enforced rules: deterministic. Pay: bypass requires editing settings.<\/li><li>Memory/preferences alone: drift over long sessions.<\/li><li>Heavy hooks: latency on every event; keep them fast.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Network call in PreToolUse: blocks every tool call on remote latency.<\/li><li>Writing prompts to hooks instead of skills: hooks are control, skills are guidance.<\/li><li>Silent hook failures: model never learns the rule didn't apply.<\/li><\/ul>","text":"harness-hooks When : configuring PreToolUse / PostToolUse / UserPromptSubmit / SessionStart hooks. Why care : hooks are how the harness enforces invariants the model can't be trusted to remember. Decision tree \"From now on do X\" automated behavior → SessionStart or UserPromptSubmit hook. Reason: model can't self-enforce. Block dangerous tool calls → PreToolUse. Reason: only chance to deny before execution. Post-process tool output → PostToolUse. Reason: redact / summarize / log. Inject session-wide context → SessionStart. Reason: stable prefix, cache-friendly. Tradeoffs Hook-enforced rules: deterministic. Pay: bypass requires editing settings. Memory/preferences alone: drift over long sessions. Heavy hooks: latency on every event; keep them fast. Anti-patterns (why) Network call in PreToolUse: blocks every tool call on remote latency. Writing prompts to hooks instead of skills: hooks are control, skills are guidance. Silent hook failures: model never learns the rule didn't apply."},{"id":".claude/skills/specialists/input-validation.md","title":"input-validation","category":"Skills","path":".claude/skills/specialists/input-validation.md","desc":"","html":"<h1 id=\"input-validation\">input-validation<\/h1>\n<p><strong>When<\/strong>: data crossing a trust boundary; parsing user/network/file input. <strong>Why care<\/strong>: most security bugs are validation gaps at boundaries; over-validating inside trusted code wastes effort and obscures intent.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Data from outside the process → validate at the boundary, once. Reason: single chokepoint, easy to audit.<\/li><li>Data already parsed into a typed struct → trust it. Reason: redundant checks rot.<\/li><li>Parse-don't-validate: turn raw input into a type that can't be invalid. Reason: invalid states become unrepresentable.<\/li><li>Range/length limits → enforce at parse time. Reason: downstream code can assume invariants.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Strict parsers: safer, may reject legitimate-but-weird input.<\/li><li>Permissive parsers: ergonomic, leave invariants implicit downstream.<\/li><li>Schema-driven: centralized, can lag the code that uses it.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Sanitizing at the point of use instead of the boundary: every use site is a potential miss.<\/li><li>String validation by regex for structured data: misses edge cases, creates a second parser.<\/li><li>Trusting \"internal\" RPC inputs: internal threat model is real; treat as boundary.<\/li><\/ul>","text":"input-validation When : data crossing a trust boundary; parsing user/network/file input. Why care : most security bugs are validation gaps at boundaries; over-validating inside trusted code wastes effort and obscures intent. Decision tree Data from outside the process → validate at the boundary, once. Reason: single chokepoint, easy to audit. Data already parsed into a typed struct → trust it. Reason: redundant checks rot. Parse-don't-validate: turn raw input into a type that can't be invalid. Reason: invalid states become unrepresentable. Range/length limits → enforce at parse time. Reason: downstream code can assume invariants. Tradeoffs Strict parsers: safer, may reject legitimate-but-weird input. Permissive parsers: ergonomic, leave invariants implicit downstream. Schema-driven: centralized, can lag the code that uses it. Anti-patterns (why) Sanitizing at the point of use instead of the boundary: every use site is a potential miss. String validation by regex for structured data: misses edge cases, creates a second parser. Trusting \"internal\" RPC inputs: internal threat model is real; treat as boundary."},{"id":".claude/skills/specialists/mcp-design.md","title":"mcp-design","category":"Skills","path":".claude/skills/specialists/mcp-design.md","desc":"","html":"<h1 id=\"mcp-design\">mcp-design<\/h1>\n<p><strong>When<\/strong>: building an MCP server, deciding tool granularity, choosing MCP vs in-process lib. <strong>Why care<\/strong>: chatty tools burn context; coarse tools hide intent; wrong boundary forces re-architecture.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Capability needs cross-agent/cross-language reuse → MCP server. Reason: protocol portability.<\/li><li>Single agent, single language, hot path → in-process lib. Reason: no IPC overhead, simpler ops.<\/li><li>One logical operation → one tool. Reason: tools that \"do many things\" force callers to compose via parameters, hurting model accuracy.<\/li><li>Tool output likely &gt;20 lines → return sandbox handle or summary, not raw. Reason: floods context.<\/li><li>State across calls → server holds it, tool returns IDs. Reason: model doesn't have to re-pass blobs.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Fine-grained tools: accurate dispatch, more roundtrips.<\/li><li>Coarse tools: fewer roundtrips, weaker model selection.<\/li><li>Deferred/searchable tools: scale catalog, pay one ToolSearch hop. Worth it past ~30 tools.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Returning megabytes from a tool: blows context window for everyone downstream.<\/li><li>Mirroring REST verbs as tool names (GET/POST): model picks worse than verbs like <code>query<\/code>, <code>update<\/code>.<\/li><li>Optional params with hidden defaults: model can't tell what changed.<\/li><\/ul>","text":"mcp-design When : building an MCP server, deciding tool granularity, choosing MCP vs in-process lib. Why care : chatty tools burn context; coarse tools hide intent; wrong boundary forces re-architecture. Decision tree Capability needs cross-agent/cross-language reuse → MCP server. Reason: protocol portability. Single agent, single language, hot path → in-process lib. Reason: no IPC overhead, simpler ops. One logical operation → one tool. Reason: tools that \"do many things\" force callers to compose via parameters, hurting model accuracy. Tool output likely >20 lines → return sandbox handle or summary, not raw. Reason: floods context. State across calls → server holds it, tool returns IDs. Reason: model doesn't have to re-pass blobs. Tradeoffs Fine-grained tools: accurate dispatch, more roundtrips. Coarse tools: fewer roundtrips, weaker model selection. Deferred/searchable tools: scale catalog, pay one ToolSearch hop. Worth it past ~30 tools. Anti-patterns (why) Returning megabytes from a tool: blows context window for everyone downstream. Mirroring REST verbs as tool names (GET/POST): model picks worse than verbs like query , update . Optional params with hidden defaults: model can't tell what changed."},{"id":".claude/skills/specialists/parallel-subagents.md","title":"parallel-subagents","category":"Skills","path":".claude/skills/specialists/parallel-subagents.md","desc":"","html":"<h1 id=\"parallel-subagents\">parallel-subagents<\/h1>\n<p><strong>When<\/strong>: deciding to fan out work, isolating context, splitting research from synthesis. <strong>Why care<\/strong>: serial work wastes wallclock; unprincipled fan-out wastes tokens and produces incoherent merges.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>2+ independent units of work → parallel. Reason: wallclock + context isolation.<\/li><li>One agent's output feeds another's input → sequential. Reason: parallel would race or duplicate.<\/li><li>Output would flood main context → delegate to subagent, take summary. Reason: main thread stays lean.<\/li><li>Risk of divergent decisions → keep in one agent. Reason: parallel agents can't coordinate mid-flight.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Fan-out: faster wallclock, harder to merge findings.<\/li><li>Sequential: coherent, slower.<\/li><li>Subagent for context shielding: keeps main thread lean, pays a roundtrip.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Splitting one logical task across agents: each sees half the picture, both make local-optimum choices.<\/li><li>Spawning agents for trivial single-file edits: orchestration overhead exceeds the work.<\/li><li>Letting parent re-do the search the subagent already did: doubles cost.<\/li><\/ul>","text":"parallel-subagents When : deciding to fan out work, isolating context, splitting research from synthesis. Why care : serial work wastes wallclock; unprincipled fan-out wastes tokens and produces incoherent merges. Decision tree 2+ independent units of work → parallel. Reason: wallclock + context isolation. One agent's output feeds another's input → sequential. Reason: parallel would race or duplicate. Output would flood main context → delegate to subagent, take summary. Reason: main thread stays lean. Risk of divergent decisions → keep in one agent. Reason: parallel agents can't coordinate mid-flight. Tradeoffs Fan-out: faster wallclock, harder to merge findings. Sequential: coherent, slower. Subagent for context shielding: keeps main thread lean, pays a roundtrip. Anti-patterns (why) Splitting one logical task across agents: each sees half the picture, both make local-optimum choices. Spawning agents for trivial single-file edits: orchestration overhead exceeds the work. Letting parent re-do the search the subagent already did: doubles cost."},{"id":".claude/skills/specialists/profiling.md","title":"profiling","category":"Skills","path":".claude/skills/specialists/profiling.md","desc":"","html":"<h1 id=\"profiling\">profiling<\/h1>\n<p><strong>When<\/strong>: investigating slowdowns, validating an optimization, picking a profiler. <strong>Why care<\/strong>: optimizing without measuring is guessing; the wrong tool hides the real bottleneck.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>\"Where does time go?\" → sampling profiler. Reason: low overhead, captures real distribution.<\/li><li>\"Why is this function slow?\" → instrumentation / tracing on the path. Reason: per-call detail.<\/li><li>Concurrency stalls / lock waits → off-CPU profiling. Reason: sampling misses sleeping threads.<\/li><li>Memory regression → heap profiler / allocation tracker. Reason: CPU profilers miss allocations.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Sampling: low overhead, statistical (misses rare events).<\/li><li>Instrumentation: precise, perturbs the program.<\/li><li>Tracing: full timeline, expensive to store/analyze.<\/li><li>Microbenchmarks: control variables, often unrepresentative of real workloads.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Optimizing without a baseline: can't prove improvement, can regress.<\/li><li>Profiling debug builds: noise dominates; conclusions misleading.<\/li><li>Trusting a single run: variance can swamp a 20% delta.<\/li><\/ul>","text":"profiling When : investigating slowdowns, validating an optimization, picking a profiler. Why care : optimizing without measuring is guessing; the wrong tool hides the real bottleneck. Decision tree \"Where does time go?\" → sampling profiler. Reason: low overhead, captures real distribution. \"Why is this function slow?\" → instrumentation / tracing on the path. Reason: per-call detail. Concurrency stalls / lock waits → off-CPU profiling. Reason: sampling misses sleeping threads. Memory regression → heap profiler / allocation tracker. Reason: CPU profilers miss allocations. Tradeoffs Sampling: low overhead, statistical (misses rare events). Instrumentation: precise, perturbs the program. Tracing: full timeline, expensive to store/analyze. Microbenchmarks: control variables, often unrepresentative of real workloads. Anti-patterns (why) Optimizing without a baseline: can't prove improvement, can regress. Profiling debug builds: noise dominates; conclusions misleading. Trusting a single run: variance can swamp a 20% delta."},{"id":".claude/skills/specialists/prompt-caching.md","title":"prompt-caching","category":"Skills","path":".claude/skills/specialists/prompt-caching.md","desc":"","html":"<h1 id=\"prompt-caching\">prompt-caching<\/h1>\n<p><strong>When<\/strong>: structuring prompts/messages for repeated calls, deciding cache breakpoints. <strong>Why care<\/strong>: cache misses cost full input tokens + latency; bad breakpoints invalidate stable prefixes.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Content stable across calls → place earliest, mark cacheable. Reason: prefix caching only works left-to-right.<\/li><li>Content changes per call → place latest. Reason: keeps the long stable prefix reusable.<\/li><li>System prompt + tool defs + memory + history → order most-stable-first. Reason: any change invalidates everything after.<\/li><li>Cache TTL near expiry → consider refresh-on-write; otherwise next call eats full miss.<\/li><li>Many small variants → cache the shared base, vary the tail.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Aggressive cache breakpoints: more reuse, more bookkeeping.<\/li><li>Cache-friendly structure constrains prompt design (can't sprinkle dynamic data through stable sections).<\/li><li>Provider-side TTLs (5 min on Anthropic) make sleep-between-calls expensive — see speed-vs-cache windowing.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Timestamp in the system prompt: invalidates cache every call.<\/li><li>Per-call random IDs in stable prefix: same.<\/li><li>Re-ordering messages between calls: invalidates from the divergence point onward.<\/li><\/ul>","text":"prompt-caching When : structuring prompts/messages for repeated calls, deciding cache breakpoints. Why care : cache misses cost full input tokens + latency; bad breakpoints invalidate stable prefixes. Decision tree Content stable across calls → place earliest, mark cacheable. Reason: prefix caching only works left-to-right. Content changes per call → place latest. Reason: keeps the long stable prefix reusable. System prompt + tool defs + memory + history → order most-stable-first. Reason: any change invalidates everything after. Cache TTL near expiry → consider refresh-on-write; otherwise next call eats full miss. Many small variants → cache the shared base, vary the tail. Tradeoffs Aggressive cache breakpoints: more reuse, more bookkeeping. Cache-friendly structure constrains prompt design (can't sprinkle dynamic data through stable sections). Provider-side TTLs (5 min on Anthropic) make sleep-between-calls expensive — see speed-vs-cache windowing. Anti-patterns (why) Timestamp in the system prompt: invalidates cache every call. Per-call random IDs in stable prefix: same. Re-ordering messages between calls: invalidates from the divergence point onward."},{"id":".claude/skills/specialists/ratatui-arch.md","title":"ratatui-arch","category":"Skills","path":".claude/skills/specialists/ratatui-arch.md","desc":"","html":"<h1 id=\"ratatui-arch\">ratatui-arch<\/h1>\n<p><strong>When<\/strong>: structuring a ratatui app, deciding state ownership, layout composition. <strong>Why care<\/strong>: immediate-mode without discipline turns into a re-render-everything ball of mud.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Pure render → derive from <code>App<\/code> state. Reason: single source of truth, deterministic frames.<\/li><li>Long-running work → background task + channel back to App. Reason: render loop must not block.<\/li><li>Component-local state → keep inside the widget if it doesn't outlive a frame. Reason: avoids App bloat.<\/li><li>Cross-component state → lift to App. Reason: components can't reach sideways.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Immediate mode: simpler mental model, redraws everything. Pay: diff via terminal buffer, mostly cheap.<\/li><li>Stateful widgets: ergonomic for lists/tables. Pay: state lives outside the widget, must be threaded through.<\/li><li>Custom widgets: full control. Pay: re-implementing layout primitives.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Doing IO inside <code>draw<\/code>: blocks the frame, jitters input.<\/li><li>Storing widget instances long-term: ratatui widgets are meant to be ephemeral per frame.<\/li><li>Deep prop drilling instead of an app-level store: refactor when threading exceeds two levels.<\/li><\/ul>","text":"ratatui-arch When : structuring a ratatui app, deciding state ownership, layout composition. Why care : immediate-mode without discipline turns into a re-render-everything ball of mud. Decision tree Pure render → derive from App state. Reason: single source of truth, deterministic frames. Long-running work → background task + channel back to App. Reason: render loop must not block. Component-local state → keep inside the widget if it doesn't outlive a frame. Reason: avoids App bloat. Cross-component state → lift to App. Reason: components can't reach sideways. Tradeoffs Immediate mode: simpler mental model, redraws everything. Pay: diff via terminal buffer, mostly cheap. Stateful widgets: ergonomic for lists/tables. Pay: state lives outside the widget, must be threaded through. Custom widgets: full control. Pay: re-implementing layout primitives. Anti-patterns (why) Doing IO inside draw : blocks the frame, jitters input. Storing widget instances long-term: ratatui widgets are meant to be ephemeral per frame. Deep prop drilling instead of an app-level store: refactor when threading exceeds two levels."},{"id":".claude/skills/specialists/rust-async.md","title":"rust-async","category":"Skills","path":".claude/skills/specialists/rust-async.md","desc":"","html":"<h1 id=\"rust-async\">rust-async<\/h1>\n<p><strong>When<\/strong>: choosing runtime, deciding sync vs async, handling blocking calls, <code>Send<\/code> bounds. <strong>Why care<\/strong>: async wrong-fits CPU work; blocking inside async stalls the executor; runtime mixing causes lockups.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>IO-bound, many concurrent tasks → async (tokio default in ecosystem). Reason: cheap task switches beat OS threads at scale.<\/li><li>CPU-bound → threads (rayon for data-parallel). Reason: async gives no speedup for compute; only adds polling cost.<\/li><li>Blocking call inside async context → <code>spawn_blocking<\/code>. Reason: blocks executor thread otherwise, starves other tasks.<\/li><li>Library code → stay runtime-agnostic if possible. Reason: locks consumers into one runtime.<\/li><li>Need <code>Send<\/code> future → audit captured types. Reason: non-Send types (Rc, RefCell) prevent cross-thread scheduling.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>tokio: ecosystem default, multi-threaded. Pay: complexity, <code>Send<\/code> bounds everywhere.<\/li><li>smol/async-std: simpler. Pay: smaller ecosystem.<\/li><li>Single-threaded runtime: removes <code>Send<\/code> bounds. Pay: no parallelism.<\/li><li>\"async all the way down\" is dogma; sync boundaries are fine when the work is short and bounded.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li><code>block_on<\/code> inside async: deadlock risk on single-threaded runtimes.<\/li><li>Holding sync <code>Mutex<\/code> across <code>.await<\/code>: blocks the executor; use async mutex or restructure.<\/li><li>Spawning futures without bounding: unbounded concurrency → resource exhaustion.<\/li><\/ul>","text":"rust-async When : choosing runtime, deciding sync vs async, handling blocking calls, Send bounds. Why care : async wrong-fits CPU work; blocking inside async stalls the executor; runtime mixing causes lockups. Decision tree IO-bound, many concurrent tasks → async (tokio default in ecosystem). Reason: cheap task switches beat OS threads at scale. CPU-bound → threads (rayon for data-parallel). Reason: async gives no speedup for compute; only adds polling cost. Blocking call inside async context → spawn_blocking . Reason: blocks executor thread otherwise, starves other tasks. Library code → stay runtime-agnostic if possible. Reason: locks consumers into one runtime. Need Send future → audit captured types. Reason: non-Send types (Rc, RefCell) prevent cross-thread scheduling. Tradeoffs tokio: ecosystem default, multi-threaded. Pay: complexity, Send bounds everywhere. smol/async-std: simpler. Pay: smaller ecosystem. Single-threaded runtime: removes Send bounds. Pay: no parallelism. \"async all the way down\" is dogma; sync boundaries are fine when the work is short and bounded. Anti-patterns (why) block_on inside async: deadlock risk on single-threaded runtimes. Holding sync Mutex across .await : blocks the executor; use async mutex or restructure. Spawning futures without bounding: unbounded concurrency → resource exhaustion."},{"id":".claude/skills/specialists/rust-errors.md","title":"rust-errors","category":"Skills","path":".claude/skills/specialists/rust-errors.md","desc":"","html":"<h1 id=\"rust-errors\">rust-errors<\/h1>\n<p><strong>When<\/strong>: designing error types, choosing library vs application error style, deciding where to <code>?<\/code> vs handle. <strong>Why care<\/strong>: leaky error types couple modules; over-typed errors crush ergonomics; over-erased errors lose recovery info.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Library boundary → typed errors (thiserror-style). Reason: callers need to match and recover.<\/li><li>Application top level → erased + context (anyhow-style). Reason: only need to log/display.<\/li><li>Recoverable vs not → typed variants where caller might branch; opaque where it's terminal.<\/li><li>Adding context as it bubbles → wrap with cause chain. Reason: stack trace alone loses domain info.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>thiserror: explicit, exhaustive matching. Pay: boilerplate, churn on new variants.<\/li><li>anyhow: ergonomic, dynamic. Pay: callers can't match without downcasting.<\/li><li>\"Result of Result\" or deeply nested error enums: usually means the type is doing two jobs — split.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li><code>unwrap<\/code>/<code>expect<\/code> in library code: removes caller's choice to recover.<\/li><li>Stringly-typed errors (<code>Err(&quot;something failed&quot;)<\/code>): unmatched, untranslatable.<\/li><li>Catch-all <code>From<\/code> impls: silent error coercion hides bugs.<\/li><\/ul>","text":"rust-errors When : designing error types, choosing library vs application error style, deciding where to ? vs handle. Why care : leaky error types couple modules; over-typed errors crush ergonomics; over-erased errors lose recovery info. Decision tree Library boundary → typed errors (thiserror-style). Reason: callers need to match and recover. Application top level → erased + context (anyhow-style). Reason: only need to log/display. Recoverable vs not → typed variants where caller might branch; opaque where it's terminal. Adding context as it bubbles → wrap with cause chain. Reason: stack trace alone loses domain info. Tradeoffs thiserror: explicit, exhaustive matching. Pay: boilerplate, churn on new variants. anyhow: ergonomic, dynamic. Pay: callers can't match without downcasting. \"Result of Result\" or deeply nested error enums: usually means the type is doing two jobs — split. Anti-patterns (why) unwrap / expect in library code: removes caller's choice to recover. Stringly-typed errors ( Err(\"something failed\") ): unmatched, untranslatable. Catch-all From impls: silent error coercion hides bugs."},{"id":".claude/skills/specialists/rust-ownership.md","title":"rust-ownership","category":"Skills","path":".claude/skills/specialists/rust-ownership.md","desc":"","html":"<h1 id=\"rust-ownership\">rust-ownership<\/h1>\n<p><strong>When<\/strong>: choosing between borrow, clone, <code>Arc<\/code>, <code>Rc<\/code>, <code>Cow<\/code>, or move semantics. <strong>Why care<\/strong>: wrong choice cascades — extra clones hurt perf, wrong <code>Arc<\/code> placement creates contention, missing borrow forces API rewrites.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Single owner, no sharing → move. Reason: simplest, zero overhead.<\/li><li>Caller keeps value, callee reads briefly → <code>&amp;T<\/code>. Reason: no allocation, no refcount.<\/li><li>Multiple readers, single thread → <code>Rc&lt;T&gt;<\/code>. Reason: refcount cheaper than atomic.<\/li><li>Multiple readers across threads → <code>Arc&lt;T&gt;<\/code>. Reason: atomic refcount needed for <code>Send + Sync<\/code>.<\/li><li>Cheap to clone, callee may need owned → <code>Cow&lt;T&gt;<\/code>. Reason: defer the choice to runtime.<\/li><li>\"Just clone it\" is fine if T is small/Copy or hot path proves clone is noise.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Clone-heavy code reads simpler but obscures perf cost. Prefer borrows in library APIs; allow clones in app code where data is small.<\/li><li><code>Arc&lt;Mutex&lt;T&gt;&gt;<\/code> is a smell when ownership could be redesigned with channels or actor-style isolation.<\/li><li>Reaching for <code>Rc&lt;RefCell&lt;T&gt;&gt;<\/code> often means the data model wants a graph — consider arena/index-based instead.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li><code>Arc&lt;String&gt;<\/code> where <code>Arc&lt;str&gt;<\/code> suffices: extra indirection without benefit.<\/li><li>Cloning to satisfy borrow checker repeatedly: signals lifetime model is wrong, not that clones are needed.<\/li><\/ul>","text":"rust-ownership When : choosing between borrow, clone, Arc , Rc , Cow , or move semantics. Why care : wrong choice cascades — extra clones hurt perf, wrong Arc placement creates contention, missing borrow forces API rewrites. Decision tree Single owner, no sharing → move. Reason: simplest, zero overhead. Caller keeps value, callee reads briefly → &T . Reason: no allocation, no refcount. Multiple readers, single thread → Rc<T> . Reason: refcount cheaper than atomic. Multiple readers across threads → Arc<T> . Reason: atomic refcount needed for Send + Sync . Cheap to clone, callee may need owned → Cow<T> . Reason: defer the choice to runtime. \"Just clone it\" is fine if T is small/Copy or hot path proves clone is noise. Tradeoffs Clone-heavy code reads simpler but obscures perf cost. Prefer borrows in library APIs; allow clones in app code where data is small. Arc<Mutex<T>> is a smell when ownership could be redesigned with channels or actor-style isolation. Reaching for Rc<RefCell<T>> often means the data model wants a graph — consider arena/index-based instead. Anti-patterns (why) Arc<String> where Arc<str> suffices: extra indirection without benefit. Cloning to satisfy borrow checker repeatedly: signals lifetime model is wrong, not that clones are needed."},{"id":".claude/skills/specialists/rust-traits.md","title":"rust-traits","category":"Skills","path":".claude/skills/specialists/rust-traits.md","desc":"","html":"<h1 id=\"rust-traits\">rust-traits<\/h1>\n<p><strong>When<\/strong>: designing abstractions, choosing static vs dynamic dispatch, encoding invariants. <strong>Why care<\/strong>: wrong dispatch tanks perf or destroys ergonomics; missing type-state misses compile-time guarantees.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Hot path, monomorphizable → generics (<code>impl Trait<\/code> / <code>&lt;T: Trait&gt;<\/code>). Reason: inlined, no vtable.<\/li><li>Heterogeneous collections, plugin-like → <code>dyn Trait<\/code>. Reason: uniform size, runtime dispatch.<\/li><li>State transitions with invalid states → type-state pattern. Reason: invalid transitions become compile errors.<\/li><li>API stability across crates → sealed trait. Reason: prevents downstream impls breaking on additions.<\/li><li>Many associated types signal \"this is one type, not a trait\" — collapse.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Generics: zero-cost, but explodes binary size and compile time.<\/li><li><code>dyn<\/code>: pays vtable lookup; gains binary size, faster compiles.<\/li><li>Type-state: compile-time safety; pays in API surface (more types).<\/li><li>Over-trait-ifying everything: indirection without payoff. Concrete first, abstract on second use.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Trait with one impl: indirection for no benefit. Inline until a second case exists.<\/li><li><code>Box&lt;dyn Trait&gt;<\/code> in hot loops: heap + vtable cost where generic would inline.<\/li><li>Generic over trait that's never extended: complexity tax.<\/li><\/ul>","text":"rust-traits When : designing abstractions, choosing static vs dynamic dispatch, encoding invariants. Why care : wrong dispatch tanks perf or destroys ergonomics; missing type-state misses compile-time guarantees. Decision tree Hot path, monomorphizable → generics ( impl Trait / <T: Trait> ). Reason: inlined, no vtable. Heterogeneous collections, plugin-like → dyn Trait . Reason: uniform size, runtime dispatch. State transitions with invalid states → type-state pattern. Reason: invalid transitions become compile errors. API stability across crates → sealed trait. Reason: prevents downstream impls breaking on additions. Many associated types signal \"this is one type, not a trait\" — collapse. Tradeoffs Generics: zero-cost, but explodes binary size and compile time. dyn : pays vtable lookup; gains binary size, faster compiles. Type-state: compile-time safety; pays in API surface (more types). Over-trait-ifying everything: indirection without payoff. Concrete first, abstract on second use. Anti-patterns (why) Trait with one impl: indirection for no benefit. Inline until a second case exists. Box<dyn Trait> in hot loops: heap + vtable cost where generic would inline. Generic over trait that's never extended: complexity tax."},{"id":".claude/skills/specialists/secrets.md","title":"secrets","category":"Skills","path":".claude/skills/specialists/secrets.md","desc":"","html":"<h1 id=\"secrets\">secrets<\/h1>\n<p><strong>When<\/strong>: storing API keys, tokens, credentials; choosing env vs keyring vs vault; planning rotation. <strong>Why care<\/strong>: leaked secrets are the cheapest attacker path; blast radius scales with where the secret lives.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Local dev → OS keyring or <code>.env<\/code> outside repo. Reason: prevents accidental commits.<\/li><li>CI → ephemeral, masked secrets from the CI vault. Reason: no long-lived material on disk.<\/li><li>Prod → centralized vault with short-lived tokens. Reason: rotation + audit trail.<\/li><li>Multi-tenant blast risk → per-tenant scoping, not shared root. Reason: contains compromise.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Env vars: simple, easy to leak via logs/dumps/child processes.<\/li><li>Keyring: OS-protected, less portable.<\/li><li>Vault: best posture, operational overhead, single point of failure.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Secrets in source / commit history: forever leaked once pushed.<\/li><li>Logging request bodies that contain secrets: ends up in centralized logs, indexed.<\/li><li>Long-lived static tokens: rotation becomes \"never\"; one leak = unbounded exposure.<\/li><\/ul>","text":"secrets When : storing API keys, tokens, credentials; choosing env vs keyring vs vault; planning rotation. Why care : leaked secrets are the cheapest attacker path; blast radius scales with where the secret lives. Decision tree Local dev → OS keyring or .env outside repo. Reason: prevents accidental commits. CI → ephemeral, masked secrets from the CI vault. Reason: no long-lived material on disk. Prod → centralized vault with short-lived tokens. Reason: rotation + audit trail. Multi-tenant blast risk → per-tenant scoping, not shared root. Reason: contains compromise. Tradeoffs Env vars: simple, easy to leak via logs/dumps/child processes. Keyring: OS-protected, less portable. Vault: best posture, operational overhead, single point of failure. Anti-patterns (why) Secrets in source / commit history: forever leaked once pushed. Logging request bodies that contain secrets: ends up in centralized logs, indexed. Long-lived static tokens: rotation becomes \"never\"; one leak = unbounded exposure."},{"id":".claude/skills/specialists/startup-latency.md","title":"startup-latency","category":"Skills","path":".claude/skills/specialists/startup-latency.md","desc":"","html":"<h1 id=\"startup-latency\">startup-latency<\/h1>\n<p><strong>When<\/strong>: CLI tools, short-lived processes, first-paint metrics for interactive apps. <strong>Why care<\/strong>: cold start is the dominant cost when the process is invoked frequently; users perceive startup as overall app speed.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Work needed for every invocation → eager in main. Reason: deferral pays nothing.<\/li><li>Work needed only sometimes → lazy / on first use. Reason: cuts cold path.<\/li><li>Heavy init shared across invocations → daemon / persistent process. Reason: amortize once.<\/li><li>Many small modules at boot → measure import/link cost. Reason: often the silent killer.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Lazy init: fast start, occasional first-use stalls.<\/li><li>Daemon mode: instant subsequent calls, more ops complexity.<\/li><li>AOT compilation / precompiled artifacts: fast start, slower build / bigger binary.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Connecting to optional services at boot: blocks startup on something the user may not use.<\/li><li>Loading config from N files synchronously: serial latency.<\/li><li>Initializing logging / telemetry inline before anything else can run: first-byte delay.<\/li><\/ul>","text":"startup-latency When : CLI tools, short-lived processes, first-paint metrics for interactive apps. Why care : cold start is the dominant cost when the process is invoked frequently; users perceive startup as overall app speed. Decision tree Work needed for every invocation → eager in main. Reason: deferral pays nothing. Work needed only sometimes → lazy / on first use. Reason: cuts cold path. Heavy init shared across invocations → daemon / persistent process. Reason: amortize once. Many small modules at boot → measure import/link cost. Reason: often the silent killer. Tradeoffs Lazy init: fast start, occasional first-use stalls. Daemon mode: instant subsequent calls, more ops complexity. AOT compilation / precompiled artifacts: fast start, slower build / bigger binary. Anti-patterns (why) Connecting to optional services at boot: blocks startup on something the user may not use. Loading config from N files synchronously: serial latency. Initializing logging / telemetry inline before anything else can run: first-byte delay."},{"id":".claude/skills/specialists/streaming-batch.md","title":"streaming-batch","category":"Skills","path":".claude/skills/specialists/streaming-batch.md","desc":"","html":"<h1 id=\"streaming-batch\">streaming-batch<\/h1>\n<p><strong>When<\/strong>: choosing between streaming results, micro-batching, or full-batch. <strong>Why care<\/strong>: streaming buys first-token / first-row latency at throughput cost; batching wins throughput but hides progress.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>User waits on output → stream. Reason: perceived latency = time to first token.<\/li><li>Background pipeline, throughput-bound → batch. Reason: amortize per-item overhead.<\/li><li>Need both → micro-batch. Reason: balances first-byte vs amortization.<\/li><li>Downstream is itself streaming → stream end-to-end. Reason: buffering adds latency without payoff.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Streaming: low latency, complex backpressure, partial-failure handling.<\/li><li>Batching: simple, high throughput, bad UX for interactive paths.<\/li><li>Micro-batching: tunable middle ground, hyperparameter to maintain.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Buffering a stream \"for efficiency\" at the UI: kills the only reason to stream.<\/li><li>Unbounded buffer behind a producer: OOMs on backpressure absence.<\/li><li>Batch sizes hand-tuned per environment without measurement: drift silently when workload changes.<\/li><\/ul>","text":"streaming-batch When : choosing between streaming results, micro-batching, or full-batch. Why care : streaming buys first-token / first-row latency at throughput cost; batching wins throughput but hides progress. Decision tree User waits on output → stream. Reason: perceived latency = time to first token. Background pipeline, throughput-bound → batch. Reason: amortize per-item overhead. Need both → micro-batch. Reason: balances first-byte vs amortization. Downstream is itself streaming → stream end-to-end. Reason: buffering adds latency without payoff. Tradeoffs Streaming: low latency, complex backpressure, partial-failure handling. Batching: simple, high throughput, bad UX for interactive paths. Micro-batching: tunable middle ground, hyperparameter to maintain. Anti-patterns (why) Buffering a stream \"for efficiency\" at the UI: kills the only reason to stream. Unbounded buffer behind a producer: OOMs on backpressure absence. Batch sizes hand-tuned per environment without measurement: drift silently when workload changes."},{"id":".claude/skills/specialists/supply-chain.md","title":"supply-chain","category":"Skills","path":".claude/skills/specialists/supply-chain.md","desc":"","html":"<h1 id=\"supply-chain\">supply-chain<\/h1>\n<p><strong>When<\/strong>: adding dependencies, updating lockfiles, choosing vendor vs registry, setting audit cadence. <strong>Why care<\/strong>: most recent high-impact breaches start with a compromised package; lockfile drift hides the true bill of materials.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Production dep → pin via lockfile, audit on update. Reason: reproducibility + intrusion detection.<\/li><li>Rarely updated, security-critical → vendor. Reason: full control of the source.<\/li><li>Frequent updates from trusted org → registry with verified publisher. Reason: ergonomics vs paranoia balance.<\/li><li>New dep proposal → review maintainer count, release cadence, install scripts. Reason: lone-maintainer + install hooks is the classic compromise vector.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Strict pinning: reproducible, falls behind on patches.<\/li><li>Floating versions: latest fixes, supply-chain risk.<\/li><li>Vendoring: max control, audit burden on you.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li><code>npm install<\/code> in CI with no lockfile: non-reproducible, vulnerable to upstream takeover.<\/li><li>Auto-merging dependency PRs without review: defeats the audit step entirely.<\/li><li>Treating transitive deps as someone else's problem: they run your code.<\/li><\/ul>","text":"supply-chain When : adding dependencies, updating lockfiles, choosing vendor vs registry, setting audit cadence. Why care : most recent high-impact breaches start with a compromised package; lockfile drift hides the true bill of materials. Decision tree Production dep → pin via lockfile, audit on update. Reason: reproducibility + intrusion detection. Rarely updated, security-critical → vendor. Reason: full control of the source. Frequent updates from trusted org → registry with verified publisher. Reason: ergonomics vs paranoia balance. New dep proposal → review maintainer count, release cadence, install scripts. Reason: lone-maintainer + install hooks is the classic compromise vector. Tradeoffs Strict pinning: reproducible, falls behind on patches. Floating versions: latest fixes, supply-chain risk. Vendoring: max control, audit burden on you. Anti-patterns (why) npm install in CI with no lockfile: non-reproducible, vulnerable to upstream takeover. Auto-merging dependency PRs without review: defeats the audit step entirely. Treating transitive deps as someone else's problem: they run your code."},{"id":".claude/skills/specialists/tail-latency.md","title":"tail-latency","category":"Skills","path":".claude/skills/specialists/tail-latency.md","desc":"","html":"<h1 id=\"tail-latency\">tail-latency<\/h1>\n<p><strong>When<\/strong>: SLOs measured at p99/p999, interactive workloads, fan-out systems. <strong>Why care<\/strong>: tails dominate user-perceived performance; in fan-out, the slowest replica drives the response.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>p99 spike correlated with GC/allocator → pre-allocate or switch allocator. Reason: pause time is the cause.<\/li><li>p99 spike correlated with locks → reduce critical section or shard. Reason: queueing under contention.<\/li><li>Fan-out request → hedging / backup requests. Reason: cut tail at the cost of small extra load.<\/li><li>Long tasks blocking short ones → priority queues / separate pools. Reason: head-of-line blocking is structural.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Hedging: lower tails, extra capacity cost.<\/li><li>Larger pools: reduces queueing, more memory.<\/li><li>Pre-allocation: smooth tails, more steady-state memory.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Optimizing the mean: invisible to users whose pain is at the tail.<\/li><li>Logging at p99 without context: knowing it's slow doesn't tell you why.<\/li><li>Treating p50/p99 as the same problem: causes are usually different.<\/li><\/ul>","text":"tail-latency When : SLOs measured at p99/p999, interactive workloads, fan-out systems. Why care : tails dominate user-perceived performance; in fan-out, the slowest replica drives the response. Decision tree p99 spike correlated with GC/allocator → pre-allocate or switch allocator. Reason: pause time is the cause. p99 spike correlated with locks → reduce critical section or shard. Reason: queueing under contention. Fan-out request → hedging / backup requests. Reason: cut tail at the cost of small extra load. Long tasks blocking short ones → priority queues / separate pools. Reason: head-of-line blocking is structural. Tradeoffs Hedging: lower tails, extra capacity cost. Larger pools: reduces queueing, more memory. Pre-allocation: smooth tails, more steady-state memory. Anti-patterns (why) Optimizing the mean: invisible to users whose pain is at the tail. Logging at p99 without context: knowing it's slow doesn't tell you why. Treating p50/p99 as the same problem: causes are usually different."},{"id":".claude/skills/specialists/terminal-input.md","title":"terminal-input","category":"Skills","path":".claude/skills/specialists/terminal-input.md","desc":"","html":"<h1 id=\"terminal-input\">terminal-input<\/h1>\n<p><strong>When<\/strong>: handling key events, mouse, paste, modifiers; choosing input protocol. <strong>Why care<\/strong>: legacy mode loses keys (e.g., Ctrl+Shift+letter), paste-as-keystrokes corrupts data, mouse without enable leaks coordinates.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Need Ctrl+Shift / multi-mod combos → Kitty keyboard protocol. Reason: legacy CSI can't represent them.<\/li><li>Need paste detection → bracketed paste. Reason: avoids interpreting pasted newlines as commands.<\/li><li>Need mouse → enable explicit mode, disable on exit. Reason: orphaned mode leaks coords into shell.<\/li><li>Targeting older terminals → degrade gracefully when protocol unsupported. Reason: probe response is optional.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Kitty protocol: full fidelity. Pay: not universally supported; need fallback.<\/li><li>Bracketed paste: clean paste handling. Pay: marker stripping logic.<\/li><li>Raw mode: full control. Pay: must restore on every exit path (panics included).<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Forgetting to disable mouse/raw on panic: leaves user's terminal broken.<\/li><li>Treating paste chunks as typing: triggers autocomplete, command exec, garbage.<\/li><li>Polling input on a timer: latency floor; prefer event-driven blocking read.<\/li><\/ul>","text":"terminal-input When : handling key events, mouse, paste, modifiers; choosing input protocol. Why care : legacy mode loses keys (e.g., Ctrl+Shift+letter), paste-as-keystrokes corrupts data, mouse without enable leaks coordinates. Decision tree Need Ctrl+Shift / multi-mod combos → Kitty keyboard protocol. Reason: legacy CSI can't represent them. Need paste detection → bracketed paste. Reason: avoids interpreting pasted newlines as commands. Need mouse → enable explicit mode, disable on exit. Reason: orphaned mode leaks coords into shell. Targeting older terminals → degrade gracefully when protocol unsupported. Reason: probe response is optional. Tradeoffs Kitty protocol: full fidelity. Pay: not universally supported; need fallback. Bracketed paste: clean paste handling. Pay: marker stripping logic. Raw mode: full control. Pay: must restore on every exit path (panics included). Anti-patterns (why) Forgetting to disable mouse/raw on panic: leaves user's terminal broken. Treating paste chunks as typing: triggers autocomplete, command exec, garbage. Polling input on a timer: latency floor; prefer event-driven blocking read."},{"id":".claude/skills/specialists/tool-routing.md","title":"tool-routing","category":"Skills","path":".claude/skills/specialists/tool-routing.md","desc":"","html":"<h1 id=\"tool-routing\">tool-routing<\/h1>\n<p><strong>When<\/strong>: harness has many tools, deciding eager vs deferred loading, choosing dispatch path. <strong>Why care<\/strong>: loaded-tool schemas eat context permanently; bad routing makes the model pick the wrong tool.<\/p>\n<h2 id=\"decision-tree\">Decision tree<\/h2>\n<ul><li>Tool used every session → eager-load. Reason: dispatch latency matters more than schema cost.<\/li><li>Tool used occasionally → defer behind search/lookup. Reason: keeps idle context lean.<\/li><li>Catalog &gt; ~30 tools → search-based routing. Reason: model accuracy degrades with too many similar choices.<\/li><li>Tool overlaps with another → merge or namespace. Reason: ambiguity = bad dispatch.<\/li><\/ul>\n<h2 id=\"tradeoffs\">Tradeoffs<\/h2>\n<ul><li>Eager loading: instant dispatch, fat context.<\/li><li>Deferred + search: lean context, one extra hop per first use.<\/li><li>Hierarchical (categories → tools): scales further; pays a category-pick step.<\/li><\/ul>\n<h2 id=\"anti-patterns-why\">Anti-patterns (why)<\/h2>\n<ul><li>Every MCP server eager-loaded: schemas can dominate context budget.<\/li><li>Two tools that do nearly the same thing: model alternates randomly, results inconsistent.<\/li><li>Tool names that don't describe action (<code>process<\/code>, <code>handle<\/code>): selection accuracy tanks.<\/li><\/ul>","text":"tool-routing When : harness has many tools, deciding eager vs deferred loading, choosing dispatch path. Why care : loaded-tool schemas eat context permanently; bad routing makes the model pick the wrong tool. Decision tree Tool used every session → eager-load. Reason: dispatch latency matters more than schema cost. Tool used occasionally → defer behind search/lookup. Reason: keeps idle context lean. Catalog > ~30 tools → search-based routing. Reason: model accuracy degrades with too many similar choices. Tool overlaps with another → merge or namespace. Reason: ambiguity = bad dispatch. Tradeoffs Eager loading: instant dispatch, fat context. Deferred + search: lean context, one extra hop per first use. Hierarchical (categories → tools): scales further; pays a category-pick step. Anti-patterns (why) Every MCP server eager-loaded: schemas can dominate context budget. Two tools that do nearly the same thing: model alternates randomly, results inconsistent. Tool names that don't describe action ( process , handle ): selection accuracy tanks."},{"id":".claude/skills/tool-ast-grep/SKILL.md","title":"tool-ast-grep","category":"Skills","path":".claude/skills/tool-ast-grep/SKILL.md","desc":">","html":"<h1 id=\"ast-grep-integration\">AST-Grep Integration<\/h1>\n<p>ast-grep (sg) matches patterns against the AST, not text — no false positives from comments, strings, or name fragments. Use it over regex whenever the question is structural.<\/p>\n<h2 id=\"when-to-use\">When to Use<\/h2>\n<ul><li>Code patterns regex cannot capture (nested calls, scoped matches)<\/li><li>Multi-file refactoring with semantic awareness; API migrations<\/li><li>Security scanning for vulnerability patterns (SQLi, XSS, secrets)<\/li><li>Enforcing style rules at the syntax level<\/li><\/ul>\n<h2 id=\"core-commands\">Core Commands<\/h2>\n<pre><code class=\"language-bash\">sg -p &#x27;&lt;pattern&gt;&#x27; [path] --lang &lt;lang&gt;     # structural search\nsg -p &#x27;&lt;old&gt;&#x27; -r &#x27;&lt;new&gt;&#x27; [path]            # transform (preview; -U applies)\nsg scan [--config sgconfig.yml] [path]     # rule-based scan (auto-discovers sgconfig.yml at root)\nsg test rules/                             # validate rule files<\/code><\/pre>\n<p>Install: <code>brew install ast-grep<\/code> / <code>npm install -g @ast-grep/cli<\/code> / <code>cargo install ast-grep<\/code>.<\/p>\n<h2 id=\"pattern-essentials\">Pattern Essentials<\/h2>\n<ul><li><code>$NAME<\/code> — capture one AST node (e.g. <code>const $NAME = require($PATH)<\/code>)<\/li><li><code>$$$ARGS<\/code> — variadic capture (e.g. <code>function $NAME($$$ARGS)<\/code>)<\/li><li><code>$$_<\/code> — anonymous match when the value is not needed<\/li><\/ul>\n<p>YAML rules add relational power: <code>inside<\/code>, <code>has<\/code>, <code>follows<\/code>, <code>precedes<\/code>, <code>not<\/code>, and composite <code>all<\/code>/<code>any<\/code> — full grammar in modules/pattern-syntax.md.<\/p>\n<p>Supported languages: Python, JavaScript, TypeScript, Go, Rust, Java, Kotlin, C, C++, Ruby, Swift, C#, PHP, Scala, Elixir, Lua, HTML, Vue, Svelte, and 30+ more.<\/p>\n<h2 id=\"module-map\">Module Map<\/h2>\n<table><thead><tr><th>Need<\/th><th>File<\/th><\/tr><\/thead><tbody><tr><td>Full pattern/rule grammar, fix syntax<\/td><td>modules/pattern-syntax.md<\/td><\/tr><tr><td>Refactoring and migration codemods<\/td><td>modules/refactoring-patterns.md<\/td><\/tr><tr><td>OWASP security rule templates<\/td><td>modules/security-rules.md<\/td><\/tr><tr><td>Per-language pattern catalogs<\/td><td>modules/language-specific.md<\/td><\/tr><tr><td>Workflows, CI/CD recipes, troubleshooting<\/td><td>references/examples.md<\/td><\/tr><tr><td>Official docs links, ecosystem<\/td><td>references/reference.md<\/td><\/tr><\/tbody><\/table>\n<p>Current upstream documentation: resolve <code>ast-grep<\/code> via Context7 (<code>mcp__context7__resolve-library-id<\/code> → <code>mcp__context7__get-library-docs<\/code>).<\/p>\n<h2 id=\"machine-integration\">Machine Integration<\/h2>\n<ul><li><code>Bash(sg:*)<\/code> and <code>Bash(ast-grep:*)<\/code> are in this skill's allowed-tools; the Explore agent prefers structural search over text search where patterns are structural.<\/li><li>expert-refactoring (large-scale codemods), expert-security (vulnerability scans), and manager-quality (complexity checks) lean on this skill.<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-start id=\"rationalizations\" --&gt;<\/p>\n<h2 id=\"common-rationalizations\">Common Rationalizations<\/h2>\n<table><thead><tr><th>Rationalization<\/th><th>Reality<\/th><\/tr><\/thead><tbody><tr><td>\"Regex search is good enough for finding code patterns\"<\/td><td>Regex matches text, not structure. Searching for <code>function<\/code> matches comments, strings, and variable names. AST matching is structural.<\/td><\/tr><tr><td>\"I will review the codemod output manually, dry-run is unnecessary\"<\/td><td>Codemods at scale produce hundreds of changes. Manual review without dry-run misses edge cases in obscure files.<\/td><\/tr><tr><td>\"This rule is too strict, I will disable it globally\"<\/td><td>Global disable hides all violations, including legitimate ones. Disable per-file with inline comments and justification.<\/td><\/tr><tr><td>\"ast-grep is overkill for a small refactor\"<\/td><td>Small refactors across many files are exactly where ast-grep prevents missed occurrences. Manual find-replace misses variants.<\/td><\/tr><tr><td>\"The pattern works in the playground, it will work on the codebase\"<\/td><td>Playground uses a single file context. Codebase patterns encounter language variants, file encodings, and edge cases. Always dry-run.<\/td><\/tr><\/tbody><\/table>\n<p><strong>Rule of 500<\/strong>: For changes affecting more than 500 lines, automated structural search is more reliable than manual inspection. ast-grep provides the structural guarantee that regex cannot.<\/p>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"red-flags\" --&gt;<\/p>\n<h2 id=\"red-flags\">Red Flags<\/h2>\n<ul><li>Codemod applied without dry-run output reviewed first<\/li><li>ast-grep rule disabled globally instead of per-file with justification<\/li><li>Regex used for structural code search when ast-grep pattern would be more precise<\/li><li>Pattern tested only in playground, not on actual codebase files<\/li><li>Codemod output not verified by running tests after application<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>\n<p>&lt;!-- machine:evolvable-start id=\"verification\" --&gt;<\/p>\n<h2 id=\"verification\">Verification<\/h2>\n<ul><li>[ ] Dry-run output reviewed before applying codemod (show dry-run results)<\/li><li>[ ] Tests pass after codemod application (show test output)<\/li><li>[ ] Pattern validated on at least 3 representative files before bulk application<\/li><li>[ ] No ast-grep rules disabled globally without documented justification<\/li><li>[ ] Codemod diff reviewed for unintended changes (show diff summary)<\/li><\/ul>\n<p>&lt;!-- machine:evolvable-end --&gt;<\/p>","text":"AST-Grep Integration ast-grep (sg) matches patterns against the AST, not text — no false positives from comments, strings, or name fragments. Use it over regex whenever the question is structural. When to Use Code patterns regex cannot capture (nested calls, scoped matches) Multi-file refactoring with semantic awareness; API migrations Security scanning for vulnerability patterns (SQLi, XSS, secrets) Enforcing style rules at the syntax level Core Commands sg -p '<pattern>' [path] --lang <lang> # structural search sg -p '<old>' -r '<new>' [path] # transform (preview; -U applies) sg scan [--config sgconfig.yml] [path] # rule-based scan (auto-discovers sgconfig.yml at root) sg test rules/ # validate rule files Install: brew install ast-grep / npm install -g @ast-grep/cli / cargo install ast-grep . Pattern Essentials $NAME — capture one AST node (e.g. const $NAME = require($PATH) ) $$$ARGS — variadic capture (e.g. function $NAME($$$ARGS) ) $$_ — anonymous match when the value is not needed YAML rules add relational power: inside , has , follows , precedes , not , and composite all / any — full grammar in modules/pattern-syntax.md. Supported languages: Python, JavaScript, TypeScript, Go, Rust, Java, Kotlin, C, C++, Ruby, Swift, C#, PHP, Scala, Elixir, Lua, HTML, Vue, Svelte, and 30+ more. Module Map Need File Full pattern/rule grammar, fix syntax modules/pattern-syntax.md Refactoring and migration codemods modules/refactoring-patterns.md OWASP security rule templates modules/security-rules.md Per-language pattern catalogs modules/language-specific.md Workflows, CI/CD recipes, troubleshooting references/examples.md Official docs links, ecosystem references/reference.md Current upstream documentation: resolve ast-grep via Context7 ( mcp__context7__resolve-library-id → mcp__context7__get-library-docs ). Machine Integration Bash(sg:*) and Bash(ast-grep:*) are in this skill's allowed-tools; the Explore agent prefers structural search over text search where patterns are structural. expert-refactoring (large-scale codemods), expert-security (vulnerability scans), and manager-quality (complexity checks) lean on this skill. <!-- machine:evolvable-start id=\"rationalizations\" --> Common Rationalizations Rationalization Reality \"Regex search is good enough for finding code patterns\" Regex matches text, not structure. Searching for function matches comments, strings, and variable names. AST matching is structural. \"I will review the codemod output manually, dry-run is unnecessary\" Codemods at scale produce hundreds of changes. Manual review without dry-run misses edge cases in obscure files. \"This rule is too strict, I will disable it globally\" Global disable hides all violations, including legitimate ones. Disable per-file with inline comments and justification. \"ast-grep is overkill for a small refactor\" Small refactors across many files are exactly where ast-grep prevents missed occurrences. Manual find-replace misses variants. \"The pattern works in the playground, it will work on the codebase\" Playground uses a single file context. Codebase patterns encounter language variants, file encodings, and edge cases. Always dry-run. Rule of 500 : For changes affecting more than 500 lines, automated structural search is more reliable than manual inspection. ast-grep provides the structural guarantee that regex cannot. <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"red-flags\" --> Red Flags Codemod applied without dry-run output reviewed first ast-grep rule disabled globally instead of per-file with justification Regex used for structural code search when ast-grep pattern would be more precise Pattern tested only in playground, not on actual codebase files Codemod output not verified by running tests after application <!-- machine:evolvable-end --> <!-- machine:evolvable-start id=\"verification\" --> Verification [ ] Dry-run output reviewed before applying codemod (show dry-run results) [ ] Tests pass after codemod application (show test output) [ ] Pattern validated on at least 3 representative files before bulk application [ ] No ast-grep rules disabled globally without documented justification [ ] Codemod diff reviewed for unintended changes (show diff summary) <!-- machine:evolvable-end -->"},{"id":".claude/skills/tool-ast-grep/modules/language-specific.md","title":"Language-Specific AST-Grep Patterns","category":"Skills","path":".claude/skills/tool-ast-grep/modules/language-specific.md","desc":"","html":"<h1 id=\"language-specific-ast-grep-patterns\">Language-Specific AST-Grep Patterns<\/h1>\n<p>Optimized patterns for specific programming languages.<\/p>\n<h2 id=\"python\">Python<\/h2>\n<h3 id=\"type-hints\">Type Hints<\/h3>\n<pre><code class=\"language-yaml\">id: missing-return-type\nlanguage: python\nrule:\n  pattern: &#x27;def $FUNC($$$ARGS):&#x27;\n  not:\n    pattern: &#x27;def $FUNC($$$ARGS) -&gt; $TYPE:&#x27;\nmessage: &#x27;Function missing return type annotation&#x27;\n\n---\nid: missing-param-types\nlanguage: python\nrule:\n  pattern: &#x27;def $FUNC($PARAM):&#x27;\n  constraints:\n    PARAM:\n      not:\n        regex: &#x27;.*:.*&#x27;  # No type annotation\nmessage: &#x27;Parameter missing type annotation&#x27;<\/code><\/pre>\n<h3 id=\"async-patterns\">Async Patterns<\/h3>\n<pre><code class=\"language-yaml\">id: sync-in-async\nlanguage: python\nrule:\n  pattern: &#x27;time.sleep($DURATION)&#x27;\n  inside:\n    pattern: &#x27;async def $FUNC($$$ARGS): $$$BODY&#x27;\nfix: &#x27;await asyncio.sleep($DURATION)&#x27;\nmessage: &#x27;Use asyncio.sleep in async functions&#x27;\n\n---\nid: blocking-io-in-async\nlanguage: python\nrule:\n  any:\n    - pattern: &#x27;open($PATH)&#x27;\n    - pattern: &#x27;requests.get($URL)&#x27;\n  inside:\n    pattern: &#x27;async def $FUNC($$$ARGS): $$$BODY&#x27;\nmessage: &#x27;Blocking I/O in async function. Use aiofiles or aiohttp.&#x27;<\/code><\/pre>\n<h3 id=\"exception-handling\">Exception Handling<\/h3>\n<pre><code class=\"language-yaml\">id: bare-except\nlanguage: python\nseverity: warning\nrule:\n  pattern: |\n    except:\n        $$$BODY\nfix: |\n  except Exception as e:\n      $$$BODY\nmessage: &#x27;Avoid bare except clauses&#x27;\n\n---\nid: exception-pass\nlanguage: python\nrule:\n  pattern: |\n    except $EXC:\n        pass\nmessage: &#x27;Silent exception handling - consider logging&#x27;<\/code><\/pre>\n<h2 id=\"typescript\">TypeScript<\/h2>\n<h3 id=\"type-safety\">Type Safety<\/h3>\n<pre><code class=\"language-yaml\">id: any-type-usage\nlanguage: typescript\nseverity: warning\nrule:\n  any:\n    - pattern: &#x27;const $NAME: any = $VALUE&#x27;\n    - pattern: &#x27;let $NAME: any = $VALUE&#x27;\n    - pattern: &#x27;function $FUNC($$$ARGS): any&#x27;\nmessage: &#x27;Avoid using &quot;any&quot; type - be more specific&#x27;\n\n---\nid: type-assertion-warning\nlanguage: typescript\nrule:\n  pattern: &#x27;$EXPR as any&#x27;\nmessage: &#x27;Type assertion to &quot;any&quot; bypasses type checking&#x27;<\/code><\/pre>\n<h3 id=\"react-best-practices\">React Best Practices<\/h3>\n<pre><code class=\"language-yaml\">id: missing-key-prop\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;$ARR.map($ITEM =&gt; &lt;$COMPONENT $$$PROPS /&gt;)&#x27;\n  not:\n    has:\n      pattern: &#x27;key={$KEY}&#x27;\nmessage: &#x27;Missing key prop in list rendering&#x27;\n\n---\nid: inline-function-in-jsx\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;&lt;$COMPONENT onClick={() =&gt; $$$BODY} /&gt;&#x27;\nmessage: &#x27;Avoid inline functions in JSX - may cause unnecessary re-renders&#x27;\n\n---\nid: direct-state-mutation\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;$STATE.$PROP = $VALUE&#x27;\n  inside:\n    has:\n      pattern: &#x27;useState($INIT)&#x27;\nmessage: &#x27;Do not mutate state directly - use setState&#x27;<\/code><\/pre>\n<h3 id=\"next-js-patterns\">Next.js Patterns<\/h3>\n<pre><code class=\"language-yaml\">id: use-next-image\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;&lt;img $$$ATTRS /&gt;&#x27;\nfix: &#x27;&lt;Image $$$ATTRS /&gt;&#x27;\nmessage: &#x27;Use next/image for optimized images&#x27;\n\n---\nid: use-next-link\nlanguage: typescriptreact\nrule:\n  pattern: &#x27;&lt;a href=&quot;$URL&quot;&gt;$$$CHILDREN&lt;/a&gt;&#x27;\n  constraints:\n    URL:\n      not:\n        regex: &#x27;^https?://.*&#x27;  # External links are OK\nfix: &#x27;&lt;Link href=&quot;$URL&quot;&gt;$$$CHILDREN&lt;/Link&gt;&#x27;\nmessage: &#x27;Use next/link for internal navigation&#x27;<\/code><\/pre>\n<h2 id=\"go\">Go<\/h2>\n<h3 id=\"error-handling\">Error Handling<\/h3>\n<pre><code class=\"language-yaml\">id: unchecked-error\nlanguage: go\nseverity: error\nrule:\n  pattern: &#x27;$RESULT, _ := $FUNC($$$ARGS)&#x27;\nmessage: &#x27;Error ignored - handle or explicitly ignore with comment&#x27;\n\n---\nid: error-string-comparison\nlanguage: go\nrule:\n  pattern: &#x27;err.Error() == &quot;$MSG&quot;&#x27;\nmessage: &#x27;Use errors.Is() or errors.As() for error comparison&#x27;<\/code><\/pre>\n<h3 id=\"concurrency\">Concurrency<\/h3>\n<pre><code class=\"language-yaml\">id: goroutine-leak\nlanguage: go\nrule:\n  pattern: &#x27;go $FUNC($$$ARGS)&#x27;\n  not:\n    inside:\n      has:\n        any:\n          - pattern: &#x27;ctx.Done()&#x27;\n          - pattern: &#x27;select { $$$CASES }&#x27;\nmessage: &#x27;Goroutine may leak - ensure proper cancellation&#x27;\n\n---\nid: mutex-not-deferred\nlanguage: go\nrule:\n  pattern: &#x27;$MU.Lock()&#x27;\n  not:\n    follows:\n      pattern: &#x27;defer $MU.Unlock()&#x27;\nmessage: &#x27;Consider using defer for Unlock()&#x27;<\/code><\/pre>\n<h3 id=\"context-usage\">Context Usage<\/h3>\n<pre><code class=\"language-yaml\">id: context-first-param\nlanguage: go\nrule:\n  pattern: &#x27;func $FUNC($$$BEFORE, ctx context.Context, $$$AFTER)&#x27;\nmessage: &#x27;Context should be the first parameter&#x27;\nfix: &#x27;func $FUNC(ctx context.Context, $$$BEFORE, $$$AFTER)&#x27;<\/code><\/pre>\n<h2 id=\"rust\">Rust<\/h2>\n<h3 id=\"memory-safety\">Memory Safety<\/h3>\n<pre><code class=\"language-yaml\">id: unsafe-block\nlanguage: rust\nseverity: warning\nrule:\n  pattern: &#x27;unsafe { $$$BODY }&#x27;\nmessage: &#x27;Unsafe block - ensure memory safety is manually verified&#x27;\n\n---\nid: unwrap-usage\nlanguage: rust\nrule:\n  any:\n    - pattern: &#x27;$RESULT.unwrap()&#x27;\n    - pattern: &#x27;$OPTION.unwrap()&#x27;\nmessage: &#x27;Consider using ? operator or expect() with message&#x27;<\/code><\/pre>\n<h3 id=\"ownership-patterns\">Ownership Patterns<\/h3>\n<pre><code class=\"language-yaml\">id: clone-in-loop\nlanguage: rust\nrule:\n  pattern: &#x27;$VAR.clone()&#x27;\n  inside:\n    any:\n      - pattern: &#x27;for $ITEM in $ITER { $$$BODY }&#x27;\n      - pattern: &#x27;while $COND { $$$BODY }&#x27;\nmessage: &#x27;Clone in loop may be inefficient - consider borrowing&#x27;<\/code><\/pre>\n<h2 id=\"java\">Java<\/h2>\n<h3 id=\"resource-management\">Resource Management<\/h3>\n<pre><code class=\"language-yaml\">id: resource-not-closed\nlanguage: java\nrule:\n  pattern: &#x27;$TYPE $VAR = new $RESOURCE($$$ARGS)&#x27;\n  not:\n    any:\n      - inside:\n          pattern: &#x27;try ($TYPE $VAR = new $RESOURCE($$$ARGS)) { $$$BODY }&#x27;\n      - follows:\n          pattern: &#x27;$VAR.close()&#x27;\nmessage: &#x27;Resource may not be closed - use try-with-resources&#x27;<\/code><\/pre>\n<h3 id=\"null-safety\">Null Safety<\/h3>\n<pre><code class=\"language-yaml\">id: null-check-pattern\nlanguage: java\nrule:\n  pattern: &#x27;if ($OBJ != null) { $$$BODY }&#x27;\nmessage: &#x27;Consider using Optional for null handling&#x27;\n\n---\nid: string-equals\nlanguage: java\nrule:\n  pattern: &#x27;$STR.equals($OTHER)&#x27;\n  not:\n    precedes:\n      pattern: &#x27;if ($STR != null)&#x27;\nmessage: &#x27;Potential NPE - use Objects.equal
