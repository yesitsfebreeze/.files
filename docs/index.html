 different capabilities:<\/p>\n<h3 id=\"1-settings-files-global-project\">1. Settings Files (Global/Project)<\/h3>\n<ul><li>Location: <code>~/.claude/settings.json<\/code> (user) or <code>.claude/settings.json<\/code> (project)<\/li><li>Scope: All sessions in scope<\/li><li>Features: Full hook types, matchers, timeouts<\/li><li>Limitation: <code>once<\/code> field NOT supported<\/li><\/ul>\n<h3 id=\"2-skill-slash-command-frontmatter-component-scoped\">2. Skill/Slash Command Frontmatter (Component-scoped)<\/h3>\n<ul><li>Location: SKILL.md or command .md frontmatter<\/li><li>Scope: Only when the skill/command is active<\/li><li>Features: Full hook types, matchers, timeouts, <code>once<\/code> field<\/li><li>Special: <code>once: true<\/code> runs hook only once per session<\/li><\/ul>\n<h3 id=\"3-agent-frontmatter-agent-scoped\">3. Agent Frontmatter (Agent-scoped)<\/h3>\n<ul><li>Location: Agent .md frontmatter<\/li><li>Scope: Only when the agent is running<\/li><li>Features: PreToolUse, PostToolUse, Stop hooks<\/li><li>Limitation: <code>once<\/code> field NOT supported (agents only)<\/li><\/ul>\n<h2 id=\"skill-command-frontmatter-hooks-2026-01\">Skill/Command Frontmatter Hooks (2026-01)<\/h2>\n<p>Skills and slash commands can define hooks directly in their YAML frontmatter. This is the ONLY location where the <code>once<\/code> field is supported.<\/p>\n<h3 id=\"basic-skill-hook-example\">Basic Skill Hook Example<\/h3>\n<pre><code class=\"language-yaml\">---\nname: secure-file-operations\ndescription: File operations with security checks\nhooks:\n  PreToolUse:\n    - matcher: &quot;Write|Edit&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/security-check.sh $TOOL_INPUT&quot;\n          timeout: 30\n  PostToolUse:\n    - matcher: &quot;Write&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/verify-write.sh&quot;\n---<\/code><\/pre>\n<h3 id=\"using-once-true-skills-only\">Using once: true (Skills Only)<\/h3>\n<p>The <code>once<\/code> field ensures a hook runs only once per session, regardless of how many times the tool is used:<\/p>\n<pre><code class=\"language-yaml\">---\nname: setup-skill\ndescription: Skill with one-time initialization\nhooks:\n  PreToolUse:\n    - matcher: &quot;Bash&quot;\n      hooks:\n        - type: command\n          command: &quot;./init.sh&quot;\n          once: true\n---<\/code><\/pre>\n<p>IMPORTANT: The <code>once<\/code> field is ONLY supported in skill/slash command frontmatter hooks. It is NOT supported in settings.json or agent frontmatter.<\/p>\n<h3 id=\"slash-command-hook-example\">Slash Command Hook Example<\/h3>\n<pre><code class=\"language-yaml\">---\nname: deploy\ndescription: Deploy application with pre-checks\nhooks:\n  PreToolUse:\n    - matcher: &quot;Bash&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/deployment-check.sh&quot;\n          timeout: 60\n          once: true\n---<\/code><\/pre>\n<h3 id=\"agent-frontmatter-hooks\">Agent Frontmatter Hooks<\/h3>\n<p>Agents can also define hooks, but <code>once<\/code> is NOT supported:<\/p>\n<pre><code class=\"language-yaml\">---\nname: code-reviewer\ndescription: Review code changes\nhooks:\n  PreToolUse:\n    - matcher: &quot;Edit&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/pre-edit-check.sh&quot;\n  PostToolUse:\n    - matcher: &quot;Edit|Write&quot;\n      hooks:\n        - type: command\n          command: &quot;./scripts/run-linter.sh&quot;\n          timeout: 45\n---<\/code><\/pre>\n<h2 id=\"hook-configuration-structure\">Hook Configuration Structure<\/h2>\n<h3 id=\"basic-configuration\">Basic Configuration<\/h3>\n<p>Configure hooks in <code>settings.json<\/code>:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo &#x27;Executing bash command:&#x27; &gt;&gt; ~/.claude/hooks.log&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h3 id=\"advanced-configuration\">Advanced Configuration<\/h3>\n<p>Multiple Event Handlers:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;validate-bash-command \\&quot;$COMMAND\\&quot;&quot;,\n &quot;blocking&quot;: true\n },\n {\n &quot;type&quot;: &quot;prompt&quot;,\n &quot;prompt&quot;: &quot;Review bash command for security: $COMMAND&quot;\n }\n ]\n },\n {\n &quot;matcher&quot;: &quot;Write&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;backup-file \\&quot;$TARGET_PATH\\&quot;&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h3 id=\"complex-hook-patterns\">Complex Hook Patterns<\/h3>\n<p>Conditional Execution:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;if [[ \\&quot;$COMMAND\\&quot; == *\\&quot;rm -rf\\&quot;* ]]; then exit 1; fi&quot;,\n &quot;blocking&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"hook-types-and-usage\">Hook Types and Usage<\/h2>\n<h3 id=\"command-hooks\">Command Hooks<\/h3>\n<p>Shell Command Execution:<\/p>\n<pre><code class=\"language-json\">{\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo \\&quot;Tool: $TOOL_NAME, Args: $ARGUMENTS\\&quot; &gt;&gt; ~/claude-hooks.log&quot;,\n &quot;env&quot;: {\n &quot;HOOK_LOG_LEVEL&quot;: &quot;debug&quot;\n }\n}<\/code><\/pre>\n<p>Available Variables:<\/p>\n<ul><li><code>$TOOL_NAME<\/code>: Name of the tool being executed<\/li><li><code>$ARGUMENTS<\/code>: Tool arguments as JSON string<\/li><li><code>$SESSION_ID<\/code>: Current session identifier<\/li><li><code>$USER_INPUT<\/code>: User's original input<\/li><\/ul>\n<h3 id=\"prompt-hooks\">Prompt Hooks<\/h3>\n<p>Prompt Generation and Execution:<\/p>\n<pre><code class=\"language-json\">{\n &quot;type&quot;: &quot;prompt&quot;,\n &quot;prompt&quot;: &quot;Review this command for security risks: $COMMAND\\n\\nProvide a risk assessment and recommendations.&quot;,\n &quot;model&quot;: &quot;claude-3-5-sonnet-20241022&quot;,\n &quot;max_tokens&quot;: 500\n}<\/code><\/pre>\n<p>Prompt Variables:<\/p>\n<ul><li>All command hook variables available<\/li><li><code>$HOOK_CONTEXT<\/code>: Current hook execution context<\/li><li><code>$PREVIOUS_RESULTS<\/code>: Results from previous hooks<\/li><\/ul>\n<h3 id=\"validation-hooks\">Validation Hooks<\/h3>\n<p>Input/Output Validation:<\/p>\n<pre><code class=\"language-json\">{\n &quot;type&quot;: &quot;validation&quot;,\n &quot;pattern&quot;: &quot;^[a-zA-Z0-9_\\\\-\\\\.]+$&quot;,\n &quot;message&quot;: &quot;File name contains invalid characters&quot;,\n &quot;blocking&quot;: true\n}<\/code><\/pre>\n<h2 id=\"security-considerations\">Security Considerations<\/h2>\n<h3 id=\"security-best-practices\">Security Best Practices<\/h3>\n<p>Principle of Least Privilege:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;allowed_commands=(npm python git make)&quot;,\n &quot;command&quot;: &quot;if [[ ! \\&quot; ${allowed_commands[@]} \\&quot; =~ \\&quot; ${COMMAND%% *} \\&quot; ]]; then exit 1; fi&quot;,\n &quot;blocking&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<p>Input Sanitization:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;UserPromptSubmit&quot;: [\n {\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo \\&quot;$USER_INPUT\\&quot; | sanitize-input&quot;,\n &quot;blocking&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h3 id=\"dangerous-pattern-detection\">Dangerous Pattern Detection<\/h3>\n<p>Prevent Dangerous Commands:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;dangerous_patterns=(\\&quot;rm -rf\\&quot; \\&quot;sudo\\&quot; \\&quot;chmod 777\\&quot; \\&quot;dd\\&quot; \\&quot;mkfs\\&quot;)&quot;,\n &quot;command&quot;: &quot;for pattern in \\&quot;${dangerous_patterns[@]}\\&quot;; do if [[ \\&quot;$COMMAND\\&quot; == *\\&quot;$pattern\\&quot;* ]]; then echo \\&quot;Dangerous command detected: $pattern\\&quot; &gt;&amp;2; exit 1; fi; done&quot;,\n &quot;blocking&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"hook-management\">Hook Management<\/h2>\n<h3 id=\"configuration-management\">Configuration Management<\/h3>\n<p>Using /hooks Command:<\/p>\n<pre><code class=\"language-bash\"># Open hooks configuration editor\n/hooks\n\n# View current hooks configuration\n/hooks --list\n\n# Test hook functionality\n/hooks --test<\/code><\/pre>\n<p>Settings File Locations:<\/p>\n<ul><li>Global: <code>~/.claude/settings.json<\/code> (user-wide hooks)<\/li><li>Project: <code>.claude/settings.json<\/code> (project-specific hooks)<\/li><li>Local: <code>.claude/settings.local.json<\/code> (local overrides)<\/li><\/ul>\n<h3 id=\"hook-lifecycle-management\">Hook Lifecycle Management<\/h3>\n<ul><li>Add/edit hooks via the <code>/hooks<\/code> REPL command or by editing the <code>hooks<\/code> block in settings.json directly; validate the JSON after every edit.<\/li><li>Debug hook execution with <code>claude --debug<\/code> (shows hook matching, execution, and output).<\/li><li>A hook script must exist on disk before registering it in settings.json.<\/li><\/ul>\n<h2 id=\"common-hook-patterns\">Common Hook Patterns<\/h2>\n<h3 id=\"pre-commit-validation\">Pre-Commit Validation<\/h3>\n<p>Code Quality Checks:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;if [[ \\&quot;$COMMAND\\&quot; == \\&quot;git commit\\&quot;* ]]; then npm run lint &amp;&amp; npm test; fi&quot;,\n &quot;blocking&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h3 id=\"auto-backup-system\">Auto-Backup System<\/h3>\n<p>File Modification Backup:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Write&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;cp \\&quot;$TARGET_PATH\\&quot; \\&quot;$TARGET_PATH.backup.$(date +%s)\\&quot;&quot;\n }\n ]\n },\n {\n &quot;matcher&quot;: &quot;Edit&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;cp \\&quot;$TARGET_PATH\\&quot; \\&quot;$TARGET_PATH.backup.$(date +%s)\\&quot;&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h3 id=\"session-logging\">Session Logging<\/h3>\n<p>Comprehensive Activity Logging:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PostToolUse&quot;: [\n {\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo \\&quot;$(date &#x27;+%Y-%m-%d %H:%M:%S&#x27;) - Tool: $TOOL_NAME, Duration: $DURATION_MS ms, Success: $SUCCESS\\&quot; &gt;&gt; ~/.claude/session-logs/$SESSION_ID.log&quot;\n }\n ]\n },\n {\n &quot;matcher&quot;: &quot;*&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo \\&quot;$(date &#x27;+%Y-%m-%d %H:%M:%S&#x27;) - Session: $SESSION_ID, Event: $EVENT_TYPE\\&quot; &gt;&gt; ~/.claude/activity.log&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"error-handling-and-recovery\">Error Handling and Recovery<\/h2>\n<h3 id=\"error-handling-strategies\">Error Handling Strategies<\/h3>\n<p>Graceful Degradation:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;if ! validate-command \\&quot;$COMMAND\\&quot;; then echo \\&quot;Command validation failed, proceeding with caution\\&quot;; exit 0; fi&quot;,\n &quot;blocking&quot;: false\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<p>Fallback Mechanisms:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;*&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;primary-command \\&quot;$ARGUMENTS\\&quot; || fallback-command \\&quot;$ARGUMENTS\\&quot;&quot;,\n &quot;fallback&quot;: {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;echo \\&quot;Primary hook failed, using fallback\\&quot;&quot;\n }\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"performance-optimization\">Performance Optimization<\/h2>\n<h3 id=\"hook-performance\">Hook Performance<\/h3>\n<p>Asynchronous Execution:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PostToolUse&quot;: [\n {\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;background-process \\&quot;$ARGUMENTS\\&quot; &amp;&quot;,\n &quot;async&quot;: true\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<p>Conditional Hook Execution:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PreToolUse&quot;: [\n {\n &quot;matcher&quot;: &quot;Bash&quot;,\n &quot;condition&quot;: &quot;$COMMAND != &#x27;git status&#x27;&quot;,\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;complex-validation \\&quot;$COMMAND\\&quot;&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"integration-with-other-systems\">Integration with Other Systems<\/h2>\n<h3 id=\"external-service-integration\">External Service Integration<\/h3>\n<p>Webhook Integration:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;SessionEnd&quot;: [\n {\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;curl -X POST https://api.example.com/webhook -d &#x27;{\\&quot;session_id\\&quot;: \\&quot;$SESSION_ID\\&quot;, \\&quot;events\\&quot;: \\&quot;$EVENT_COUNT\\&quot;}&#x27;&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<p>Database Logging:<\/p>\n<pre><code class=\"language-json\">{\n &quot;hooks&quot;: {\n &quot;PostToolUse&quot;: [\n {\n &quot;hooks&quot;: [\n {\n &quot;type&quot;: &quot;command&quot;,\n &quot;command&quot;: &quot;psql -h localhost -u claude -d hooks -c \\&quot;INSERT INTO tool_usage (session_id, tool_name, timestamp) VALUES (&#x27;$SESSION_ID&#x27;, &#x27;$TOOL_NAME&#x27;, NOW())\\&quot;&quot;\n }\n ]\n }\n ]\n }\n}<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"development-guidelines\">Development Guidelines<\/h3>\n<p>Hook Development Checklist:<\/p>\n<ul><li>[ ] Test hooks in isolation before deployment<\/li><li>[ ] Implement proper error handling and logging<\/li><li>[ ] Use non-blocking hooks for non-critical operations<\/li><li>[ ] Validate all inputs and sanitize outputs<\/li><li>[ ] Document hook dependencies and requirements<\/li><li>[ ] Implement graceful fallbacks for critical operations<\/li><li>[ ] Monitor hook performance and resource usage<\/li><li>[ ] Regular security audits and permission reviews<\/li><\/ul>\n<p>Performance Guidelines:<\/p>\n<ul><li>Keep hook execution time under 100ms for critical paths<\/li><li>Use asynchronous execution for non-blocking operations<\/li><li>Minimize file I/O operations in hot paths<\/li><li>Cache frequently used data and configuration<\/li><li>Implement rate limiting for external API calls<\/li><\/ul>\n<p>Security Guidelines:<\/p>\n<ul><li>Never expose sensitive credentials in hook commands<\/li><li>Validate and sanitize all user inputs<\/li><li>Use principle of least privilege for file system access<\/li><li>Implement proper access controls for external integrations<\/li><li>Regular security reviews and penetration testing<\/li><\/ul>\n<p>This comprehensive reference provides all the information needed to create, configure, and manage Claude Code Hooks effectively and securely.<\/p>","text":"Claude Code Hooks - Official Documentation Reference Source: https://code.claude.com/docs/en/hooks Key Concepts What are Claude Code Hooks? Hooks are powerful automation tools that extend Claude Code functionality by executing commands or prompts in response to specific events. They provide deterministic control over Claude Code's behavior through event-driven automation. Security Warning: Hooks execute arbitrary shell commands with system credentials. Use with extreme caution. Hook System Architecture Event Flow: User Action → Event Trigger → Hook Execution → Result Processing Hook Types: Command Hooks: Execute shell commands Prompt Hooks: Generate and execute prompts Validation Hooks: Validate inputs and outputs Notification Hooks: Send notifications or logs Core Hook Events Tool-Related Events PreToolUse: Before tool execution Can block tool execution Perfect for validation and security checks Receives tool name and parameters PostToolUse: After successful tool use Cannot block (post-execution) Ideal for logging and cleanup Receives execution results PermissionRequest: When permission dialogs appear Can auto-approve or deny Useful for automation workflows Receives permission details Session-Related Events SessionStart: When new session begins Initialize session state Set up environment variables Configure session-specific settings SessionEnd: When session terminates Cleanup temporary files Save session state Generate session reports SubagentStop: When sub-agent tasks complete Process sub-agent results Trigger follow-up actions Log completion status Stop: When main agent finishes Final cleanup operations Generate completion reports Prepare for next session User Interaction Events UserPromptSubmit: When user submits prompts Validate user input Modify prompts programmatically Add contextual information Hook Configuration Locations Hooks can be configured in three locations with different capabilities: 1. Settings Files (Global/Project) Location: ~/.claude/settings.json (user) or .claude/settings.json (project) Scope: All sessions in scope Features: Full hook types, matchers, timeouts Limitation: once field NOT supported 2. Skill/Slash Command Frontmatter (Component-scoped) Location: SKILL.md or command .md frontmatter Scope: Only when the skill/command is active Features: Full hook types, matchers, timeouts, once field Special: once: true runs hook only once per session 3. Agent Frontmatter (Agent-scoped) Location: Agent .md frontmatter Scope: Only when the agent is running Features: PreToolUse, PostToolUse, Stop hooks Limitation: once field NOT supported (agents only) Skill/Command Frontmatter Hooks (2026-01) Skills and slash commands can define hooks directly in their YAML frontmatter. This is the ONLY location where the once field is supported. Basic Skill Hook Example --- name: secure-file-operations description: File operations with security checks hooks: PreToolUse: - matcher: \"Write|Edit\" hooks: - type: command command: \"./scripts/security-check.sh $TOOL_INPUT\" timeout: 30 PostToolUse: - matcher: \"Write\" hooks: - type: command command: \"./scripts/verify-write.sh\" --- Using once: true (Skills Only) The once field ensures a hook runs only once per session, regardless of how many times the tool is used: --- name: setup-skill description: Skill with one-time initialization hooks: PreToolUse: - matcher: \"Bash\" hooks: - type: command command: \"./init.sh\" once: true --- IMPORTANT: The once field is ONLY supported in skill/slash command frontmatter hooks. It is NOT supported in settings.json or agent frontmatter. Slash Command Hook Example --- name: deploy description: Deploy application with pre-checks hooks: PreToolUse: - matcher: \"Bash\" hooks: - type: command command: \"./scripts/deployment-check.sh\" timeout: 60 once: true --- Agent Frontmatter Hooks Agents can also define hooks, but once is NOT supported: --- name: code-reviewer description: Review code changes hooks: PreToolUse: - matcher: \"Edit\" hooks: - type: command command: \"./scripts/pre-edit-check.sh\" PostToolUse: - matcher: \"Edit|Write\" hooks: - type: command command: \"./scripts/run-linter.sh\" timeout: 45 --- Hook Configuration Structure Basic Configuration Configure hooks in settings.json : { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"echo 'Executing bash command:' >> ~/.claude/hooks.log\" } ] } ] } } Advanced Configuration Multiple Event Handlers: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"validate-bash-command \\\"$COMMAND\\\"\", \"blocking\": true }, { \"type\": \"prompt\", \"prompt\": \"Review bash command for security: $COMMAND\" } ] }, { \"matcher\": \"Write\", \"hooks\": [ { \"type\": \"command\", \"command\": \"backup-file \\\"$TARGET_PATH\\\"\" } ] } ] } } Complex Hook Patterns Conditional Execution: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"if [[ \\\"$COMMAND\\\" == *\\\"rm -rf\\\"* ]]; then exit 1; fi\", \"blocking\": true } ] } ] } } Hook Types and Usage Command Hooks Shell Command Execution: { \"type\": \"command\", \"command\": \"echo \\\"Tool: $TOOL_NAME, Args: $ARGUMENTS\\\" >> ~/claude-hooks.log\", \"env\": { \"HOOK_LOG_LEVEL\": \"debug\" } } Available Variables: $TOOL_NAME : Name of the tool being executed $ARGUMENTS : Tool arguments as JSON string $SESSION_ID : Current session identifier $USER_INPUT : User's original input Prompt Hooks Prompt Generation and Execution: { \"type\": \"prompt\", \"prompt\": \"Review this command for security risks: $COMMAND\\n\\nProvide a risk assessment and recommendations.\", \"model\": \"claude-3-5-sonnet-20241022\", \"max_tokens\": 500 } Prompt Variables: All command hook variables available $HOOK_CONTEXT : Current hook execution context $PREVIOUS_RESULTS : Results from previous hooks Validation Hooks Input/Output Validation: { \"type\": \"validation\", \"pattern\": \"^[a-zA-Z0-9_\\\\-\\\\.]+$\", \"message\": \"File name contains invalid characters\", \"blocking\": true } Security Considerations Security Best Practices Principle of Least Privilege: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"allowed_commands=(npm python git make)\", \"command\": \"if [[ ! \\\" ${allowed_commands[@]} \\\" =~ \\\" ${COMMAND%% *} \\\" ]]; then exit 1; fi\", \"blocking\": true } ] } ] } } Input Sanitization: { \"hooks\": { \"UserPromptSubmit\": [ { \"hooks\": [ { \"type\": \"command\", \"command\": \"echo \\\"$USER_INPUT\\\" | sanitize-input\", \"blocking\": true } ] } ] } } Dangerous Pattern Detection Prevent Dangerous Commands: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"dangerous_patterns=(\\\"rm -rf\\\" \\\"sudo\\\" \\\"chmod 777\\\" \\\"dd\\\" \\\"mkfs\\\")\", \"command\": \"for pattern in \\\"${dangerous_patterns[@]}\\\"; do if [[ \\\"$COMMAND\\\" == *\\\"$pattern\\\"* ]]; then echo \\\"Dangerous command detected: $pattern\\\" >&2; exit 1; fi; done\", \"blocking\": true } ] } ] } } Hook Management Configuration Management Using /hooks Command: # Open hooks configuration editor /hooks # View current hooks configuration /hooks --list # Test hook functionality /hooks --test Settings File Locations: Global: ~/.claude/settings.json (user-wide hooks) Project: .claude/settings.json (project-specific hooks) Local: .claude/settings.local.json (local overrides) Hook Lifecycle Management Add/edit hooks via the /hooks REPL command or by editing the hooks block in settings.json directly; validate the JSON after every edit. Debug hook execution with claude --debug (shows hook matching, execution, and output). A hook script must exist on disk before registering it in settings.json. Common Hook Patterns Pre-Commit Validation Code Quality Checks: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Bash\", \"hooks\": [ { \"type\": \"command\", \"command\": \"if [[ \\\"$COMMAND\\\" == \\\"git commit\\\"* ]]; then npm run lint && npm test; fi\", \"blocking\": true } ] } ] } } Auto-Backup System File Modification Backup: { \"hooks\": { \"PreToolUse\": [ { \"matcher\": \"Write\", \"hooks\": [ { \"type\": \"command\", \"command\": \"cp \\\"$TARG"},{"id":".claude/skills/foundation-cc/reference/claude-code-iam-official.md","title":"Claude Code IAM & Permissions - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-iam-official.md","desc":"","html":"<h1 id=\"claude-code-iam-permissions-official-documentation-reference\">Claude Code IAM &amp; Permissions - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/iam<\/p>\n<h2 id=\"permission-model\">Permission Model<\/h2>\n<p>Claude Code is conservative by default: read-only tools (Read, Grep, Glob) run without approval; anything that mutates state or reaches the network (Bash, Write, Edit, WebFetch, WebSearch) prompts unless a rule or mode allows it.<\/p>\n<p>There are NO roles, RBAC, tool-restriction objects, or compliance frameworks in Claude Code's configuration — access control is exactly: permission rules + permission modes + enterprise managed settings + hooks.<\/p>\n<h2 id=\"permission-rules\">Permission Rules<\/h2>\n<p>Rules live in the <code>permissions<\/code> block of settings.json (<code>allow<\/code> / <code>ask<\/code> / <code>deny<\/code> + <code>additionalDirectories<\/code>). <code>deny<\/code> beats <code>ask<\/code> beats <code>allow<\/code>. Rule shapes:<\/p>\n<ul><li><code>Tool<\/code> — the whole tool, e.g. <code>WebSearch<\/code><\/li><li><code>Bash(git status:*)<\/code> — command prefix match (<code>:*<\/code> = any suffix)<\/li><li><code>Read(~/.ssh/**)<\/code>, <code>Edit(src/**)<\/code> — gitignore-style path patterns for file tools<\/li><li><code>WebFetch(domain:*.github.com)<\/code> — domain-scoped web access<\/li><li><code>mcp__server<\/code> or <code>mcp__server__tool<\/code> — MCP servers/tools (no wildcard inside MCP names)<\/li><\/ul>\n<pre><code class=\"language-json\">{\n &quot;permissions&quot;: {\n &quot;defaultMode&quot;: &quot;default&quot;,\n &quot;allow&quot;: [&quot;Read&quot;, &quot;Bash(git status:*)&quot;, &quot;WebFetch(domain:docs.python.org)&quot;],\n &quot;ask&quot;: [&quot;Bash(git push:*)&quot;],\n &quot;deny&quot;: [&quot;Read(./.env*)&quot;, &quot;Read(~/.ssh/**)&quot;, &quot;Bash(sudo:*)&quot;],\n &quot;additionalDirectories&quot;: [&quot;../shared-lib/&quot;]\n }\n}<\/code><\/pre>\n<h2 id=\"permission-modes\">Permission Modes<\/h2>\n<p><code>default<\/code> (prompt per first use), <code>plan<\/code> (read-only analysis), <code>acceptEdits<\/code> (auto-accept file edits), <code>dontAsk<\/code> (auto-accept everything allowed by rules), <code>bypassPermissions<\/code> (skip all prompts — blockable via <code>disableBypassPermissionsMode: true<\/code> in managed settings).<\/p>\n<p>Set via <code>defaultMode<\/code>, the <code>/permissions<\/code> command, or <code>--permission-mode<\/code> CLI flag. Sub-agents may set <code>permissionMode<\/code> in their frontmatter.<\/p>\n<h2 id=\"enterprise-managed-settings\">Enterprise Managed Settings<\/h2>\n<p>Organization-wide policy that users cannot override. File: <code>managed-settings.json<\/code> — Windows: <code>C:\\ProgramData\\ClaudeCode\\<\/code>, macOS: <code>/Library/Application Support/ClaudeCode/<\/code>, Linux: <code>/etc/claude-code/<\/code>. Same schema as settings.json; sits at the top of the precedence chain. Typical use: force <code>deny<\/code> rules, disable bypassPermissions, pin <code>forceLoginMethod<\/code> and <code>apiKeyHelper<\/code>.<\/p>\n<h2 id=\"credential-management\">Credential Management<\/h2>\n<ul><li>Login: Claude.ai (subscription) or Claude Console (API billing); <code>forceLoginMethod<\/code> pins one.<\/li><li><code>apiKeyHelper<\/code>: script that returns an API key/auth token at runtime (refresh interval via <code>CLAUDE_CODE_API_KEY_HELPER_TTL_MS<\/code>).<\/li><li>Cloud providers: Bedrock (<code>CLAUDE_CODE_USE_BEDROCK=1<\/code>), Vertex (<code>CLAUDE_CODE_USE_VERTEX=1<\/code>) with provider-native IAM.<\/li><li>Credentials are stored in the OS keychain where available; never commit keys to settings files.<\/li><\/ul>\n<h2 id=\"auditing-and-enforcement-hooks\">Auditing and Enforcement Hooks<\/h2>\n<p>For policy beyond static rules, use hooks: a <code>PreToolUse<\/code> hook can inspect any tool call and block it (exit code 2), and <code>PostToolUse<\/code> can log activity. This — not a fictional monitoring config — is the supported enforcement mechanism.<\/p>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<ul><li>Least privilege: allow narrow command prefixes, not whole tools<\/li><li><code>deny<\/code> for secrets paths (<code>.env*<\/code>, key material) in shared project settings<\/li><li>Version-control project permission rules so the team shares one policy<\/li><li>Audit with <code>claude --debug<\/code> and hook-based logging<\/li><\/ul>","text":"Claude Code IAM & Permissions - Official Documentation Reference Source: https://code.claude.com/docs/en/iam Permission Model Claude Code is conservative by default: read-only tools (Read, Grep, Glob) run without approval; anything that mutates state or reaches the network (Bash, Write, Edit, WebFetch, WebSearch) prompts unless a rule or mode allows it. There are NO roles, RBAC, tool-restriction objects, or compliance frameworks in Claude Code's configuration — access control is exactly: permission rules + permission modes + enterprise managed settings + hooks. Permission Rules Rules live in the permissions block of settings.json ( allow / ask / deny + additionalDirectories ). deny beats ask beats allow . Rule shapes: Tool — the whole tool, e.g. WebSearch Bash(git status:*) — command prefix match ( :* = any suffix) Read(~/.ssh/**) , Edit(src/**) — gitignore-style path patterns for file tools WebFetch(domain:*.github.com) — domain-scoped web access mcp__server or mcp__server__tool — MCP servers/tools (no wildcard inside MCP names) { \"permissions\": { \"defaultMode\": \"default\", \"allow\": [\"Read\", \"Bash(git status:*)\", \"WebFetch(domain:docs.python.org)\"], \"ask\": [\"Bash(git push:*)\"], \"deny\": [\"Read(./.env*)\", \"Read(~/.ssh/**)\", \"Bash(sudo:*)\"], \"additionalDirectories\": [\"../shared-lib/\"] } } Permission Modes default (prompt per first use), plan (read-only analysis), acceptEdits (auto-accept file edits), dontAsk (auto-accept everything allowed by rules), bypassPermissions (skip all prompts — blockable via disableBypassPermissionsMode: true in managed settings). Set via defaultMode , the /permissions command, or --permission-mode CLI flag. Sub-agents may set permissionMode in their frontmatter. Enterprise Managed Settings Organization-wide policy that users cannot override. File: managed-settings.json — Windows: C:\\ProgramData\\ClaudeCode\\ , macOS: /Library/Application Support/ClaudeCode/ , Linux: /etc/claude-code/ . Same schema as settings.json; sits at the top of the precedence chain. Typical use: force deny rules, disable bypassPermissions, pin forceLoginMethod and apiKeyHelper . Credential Management Login: Claude.ai (subscription) or Claude Console (API billing); forceLoginMethod pins one. apiKeyHelper : script that returns an API key/auth token at runtime (refresh interval via CLAUDE_CODE_API_KEY_HELPER_TTL_MS ). Cloud providers: Bedrock ( CLAUDE_CODE_USE_BEDROCK=1 ), Vertex ( CLAUDE_CODE_USE_VERTEX=1 ) with provider-native IAM. Credentials are stored in the OS keychain where available; never commit keys to settings files. Auditing and Enforcement Hooks For policy beyond static rules, use hooks: a PreToolUse hook can inspect any tool call and block it (exit code 2), and PostToolUse can log activity. This — not a fictional monitoring config — is the supported enforcement mechanism. Best Practices Least privilege: allow narrow command prefixes, not whole tools deny for secrets paths ( .env* , key material) in shared project settings Version-control project permission rules so the team shares one policy Audit with claude --debug and hook-based logging"},{"id":".claude/skills/foundation-cc/reference/claude-code-memory-official.md","title":"Claude Code Memory System - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-memory-official.md","desc":"","html":"<h1 id=\"claude-code-memory-system-official-documentation-reference\">Claude Code Memory System - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/memory<\/p>\n<h2 id=\"memory-files\">Memory Files<\/h2>\n<p>Claude Code's file memory is CLAUDE.md, loaded automatically at session start:<\/p>\n<ol><li>Enterprise policy CLAUDE.md — managed location (Windows: <code>C:\\ProgramData\\ClaudeCode\\<\/code>, macOS: <code>/Library/Application Support/ClaudeCode/<\/code>, Linux: <code>/etc/claude-code/<\/code>)<\/li><li>Project memory — <code>./CLAUDE.md<\/code> (version-controlled, team-shared); parent directories of cwd are also read (useful in monorepos)<\/li><li>User memory — <code>~/.claude/CLAUDE.md<\/code> (personal, all projects)<\/li><\/ol>\n<p>CLAUDE.md files in subdirectories load on demand when Claude reads files there. <code>CLAUDE.local.md<\/code> is deprecated — use imports instead.<\/p>\n<h2 id=\"rules-directory\">Rules Directory<\/h2>\n<p><code>.claude/rules/*.md<\/code> holds modular instructions. Optional <code>paths<\/code> frontmatter scopes a rule to matching files only:<\/p>\n<pre><code class=\"language-yaml\">---\npaths: &quot;**/*.py,**/pyproject.toml&quot;\n---<\/code><\/pre>\n<p>Keep CLAUDE.md under 40K characters (project law); push detail into rules and imports.<\/p>\n<h2 id=\"import-syntax\">Import Syntax<\/h2>\n<pre><code class=\"language-markdown\">@README.md          # relative\n@docs/standards.md  # relative path\n@~/.claude/my-project-instructions.md  # home directory<\/code><\/pre>\n<ul><li>Max import depth: 5 hops<\/li><li>Imports are NOT evaluated inside code spans/blocks<\/li><li>There is no conditional import syntax — imports are unconditional<\/li><\/ul>\n<h2 id=\"managing-memory\">Managing Memory<\/h2>\n<ul><li><code>/init<\/code> — bootstrap a CLAUDE.md for the current project<\/li><li><code>/memory<\/code> — open memory files in the editor<\/li><li><code>#<\/code> prefix — quick-add a memory (prompts for which file)<\/li><\/ul>\n<h2 id=\"the-machine-s-memory-discipline\">The Machine's Memory Discipline<\/h2>\n<p>File memory (CLAUDE.md/rules) holds <em>instructions<\/em>. Durable project <em>knowledge<\/em> lives in kern, the per-cwd memory daemon:<\/p>\n<ul><li>Recall: SessionStart digest + <code>mcp__kern__query<\/code><\/li><li>Capture: <code>mcp__kern__ingest<\/code> (required when kern responds; skip silently when down)<\/li><li>Never use file-memory for durable knowledge; never duplicate kern content into CLAUDE.md<\/li><\/ul>\n<p>Machine command surface for memory-adjacent work: <code>/bootstrap<\/code> (re-index /.proj), <code>/gate<\/code>, <code>/code-review<\/code>, <code>/improve<\/code>, <code>/personas<\/code>.<\/p>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<ul><li>Be specific: \"Use 2-space indentation\" beats \"format code properly\"<\/li><li>Structure as bullet points under descriptive markdown headings<\/li><li>Review and prune memory periodically — stale instructions mislead<\/li><li>Version-control project CLAUDE.md and .claude/rules/<\/li><\/ul>","text":"Claude Code Memory System - Official Documentation Reference Source: https://code.claude.com/docs/en/memory Memory Files Claude Code's file memory is CLAUDE.md, loaded automatically at session start: Enterprise policy CLAUDE.md — managed location (Windows: C:\\ProgramData\\ClaudeCode\\ , macOS: /Library/Application Support/ClaudeCode/ , Linux: /etc/claude-code/ ) Project memory — ./CLAUDE.md (version-controlled, team-shared); parent directories of cwd are also read (useful in monorepos) User memory — ~/.claude/CLAUDE.md (personal, all projects) CLAUDE.md files in subdirectories load on demand when Claude reads files there. CLAUDE.local.md is deprecated — use imports instead. Rules Directory .claude/rules/*.md holds modular instructions. Optional paths frontmatter scopes a rule to matching files only: --- paths: \"**/*.py,**/pyproject.toml\" --- Keep CLAUDE.md under 40K characters (project law); push detail into rules and imports. Import Syntax @README.md # relative @docs/standards.md # relative path @~/.claude/my-project-instructions.md # home directory Max import depth: 5 hops Imports are NOT evaluated inside code spans/blocks There is no conditional import syntax — imports are unconditional Managing Memory /init — bootstrap a CLAUDE.md for the current project /memory — open memory files in the editor # prefix — quick-add a memory (prompts for which file) The Machine's Memory Discipline File memory (CLAUDE.md/rules) holds instructions . Durable project knowledge lives in kern, the per-cwd memory daemon: Recall: SessionStart digest + mcp__kern__query Capture: mcp__kern__ingest (required when kern responds; skip silently when down) Never use file-memory for durable knowledge; never duplicate kern content into CLAUDE.md Machine command surface for memory-adjacent work: /bootstrap (re-index /.proj), /gate , /code-review , /improve , /personas . Best Practices Be specific: \"Use 2-space indentation\" beats \"format code properly\" Structure as bullet points under descriptive markdown headings Review and prune memory periodically — stale instructions mislead Version-control project CLAUDE.md and .claude/rules/"},{"id":".claude/skills/foundation-cc/reference/claude-code-plugin-marketplaces-official.md","title":"Claude Code Plugin Marketplaces - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-plugin-marketplaces-official.md","desc":"","html":"<h1 id=\"claude-code-plugin-marketplaces-official-documentation-reference\">Claude Code Plugin Marketplaces - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/plugin-marketplaces Related: https://code.claude.com/docs/en/plugins-reference Updated: 2026-01-06<\/p>\n<h2 id=\"what-are-plugin-marketplaces\">What are Plugin Marketplaces?<\/h2>\n<p>A plugin marketplace is a catalog that distributes Claude Code extensions across teams and communities. It provides centralized discovery, version tracking, automatic updates, and supports multiple source types including git repositories and local paths.<\/p>\n<p>Key Benefits:<\/p>\n<ul><li>Centralized plugin discovery and management<\/li><li>Version tracking and automatic updates<\/li><li>Support for multiple source types (GitHub, GitLab, local paths)<\/li><li>Team-wide distribution and enforcement<\/li><\/ul>\n<h2 id=\"creating-a-marketplace\">Creating a Marketplace<\/h2>\n<h3 id=\"directory-structure\">Directory Structure<\/h3>\n<pre><code>my-marketplace/\n- .claude-plugin/\n  - marketplace.json\n- plugins/\n  - review-plugin/\n    - .claude-plugin/plugin.json\n    - commands/review.md<\/code><\/pre>\n<h3 id=\"quick-start\">Quick Start<\/h3>\n<p>Step 1: Create directory structure<\/p>\n<pre><code class=\"language-bash\">mkdir -p my-marketplace/.claude-plugin\nmkdir -p my-marketplace/plugins/review-plugin/.claude-plugin\nmkdir -p my-marketplace/plugins/review-plugin/commands<\/code><\/pre>\n<p>Step 2: Create plugin manifest (plugins/review-plugin/.claude-plugin/plugin.json)<\/p>\n<pre><code class=\"language-json\">{&quot;name&quot;: &quot;review-plugin&quot;, &quot;description&quot;: &quot;Quick code reviews&quot;, &quot;version&quot;: &quot;1.0.0&quot;}<\/code><\/pre>\n<p>Step 3: Create marketplace manifest (.claude-plugin/marketplace.json)<\/p>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;my-plugins&quot;,\n  &quot;owner&quot;: {&quot;name&quot;: &quot;Your Name&quot;},\n  &quot;plugins&quot;: [{&quot;name&quot;: &quot;review-plugin&quot;, &quot;source&quot;: &quot;./plugins/review-plugin&quot;}]\n}<\/code><\/pre>\n<h2 id=\"marketplace-json-schema\">marketplace.json Schema<\/h2>\n<h3 id=\"required-fields\">Required Fields<\/h3>\n<ul><li>name: Marketplace identifier (kebab-case)<\/li><li>owner: Object with name (required) and email (optional)<\/li><li>plugins: Array of plugin entries<\/li><\/ul>\n<h3 id=\"optional-metadata\">Optional Metadata<\/h3>\n<ul><li>metadata.description: Brief marketplace description<\/li><li>metadata.version: Marketplace version<\/li><li>metadata.pluginRoot: Base directory for relative paths<\/li><\/ul>\n<h3 id=\"complete-example\">Complete Example<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;acme-dev-tools&quot;,\n  &quot;owner&quot;: {&quot;name&quot;: &quot;ACME DevTools Team&quot;, &quot;email&quot;: &quot;[email protected]&quot;},\n  &quot;metadata&quot;: {&quot;description&quot;: &quot;ACME engineering tools&quot;, &quot;version&quot;: &quot;2.0.0&quot;, &quot;pluginRoot&quot;: &quot;./plugins&quot;},\n  &quot;plugins&quot;: [\n    {&quot;name&quot;: &quot;code-formatter&quot;, &quot;source&quot;: &quot;./formatter&quot;},\n    {&quot;name&quot;: &quot;security-scanner&quot;, &quot;source&quot;: {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;acme/security-plugin&quot;}}\n  ]\n}<\/code><\/pre>\n<h2 id=\"plugin-entry-configuration\">Plugin Entry Configuration<\/h2>\n<h3 id=\"required-fields\">Required Fields<\/h3>\n<ul><li>name: Plugin identifier (kebab-case)<\/li><li>source: Plugin location (string path or source object)<\/li><\/ul>\n<h3 id=\"optional-fields\">Optional Fields<\/h3>\n<p>Metadata: description, version, author (object with name/email), homepage, repository, license, keywords, category, tags<\/p>\n<p>Behavior: strict (boolean, default true) - whether plugin needs its own plugin.json<\/p>\n<p>Components: commands, agents, hooks, mcpServers, lspServers - custom path overrides<\/p>\n<h2 id=\"plugin-source-types\">Plugin Source Types<\/h2>\n<h3 id=\"relative-paths\">Relative Paths<\/h3>\n<pre><code class=\"language-json\">{&quot;name&quot;: &quot;my-plugin&quot;, &quot;source&quot;: &quot;./plugins/my-plugin&quot;}<\/code><\/pre>\n<h3 id=\"github-repositories\">GitHub Repositories<\/h3>\n<pre><code class=\"language-json\">{&quot;name&quot;: &quot;github-plugin&quot;, &quot;source&quot;: {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;owner/repo&quot;}}<\/code><\/pre>\n<p>With specific ref:<\/p>\n<pre><code class=\"language-json\">{&quot;name&quot;: &quot;github-plugin&quot;, &quot;source&quot;: {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;owner/repo&quot;, &quot;ref&quot;: &quot;v2.0&quot;}}<\/code><\/pre>\n<h3 id=\"git-url-repositories\">Git URL Repositories<\/h3>\n<pre><code class=\"language-json\">{&quot;name&quot;: &quot;git-plugin&quot;, &quot;source&quot;: {&quot;source&quot;: &quot;url&quot;, &quot;url&quot;: &quot;https://gitlab.com/team/plugin.git&quot;}}<\/code><\/pre>\n<h2 id=\"hosting-and-distribution\">Hosting and Distribution<\/h2>\n<h3 id=\"github-recommended\">GitHub (Recommended)<\/h3>\n<ol><li>Create GitHub repository<\/li><li>Add .claude-plugin/marketplace.json at root<\/li><li>Users add with: /plugin marketplace add owner/repo<\/li><\/ol>\n<h3 id=\"other-git-services\">Other Git Services<\/h3>\n<pre><code class=\"language-bash\">/plugin marketplace add https://gitlab.com/company/plugins.git<\/code><\/pre>\n<h3 id=\"local-testing\">Local Testing<\/h3>\n<pre><code class=\"language-bash\">/plugin marketplace add ./my-marketplace\n/plugin install test-plugin@my-marketplace\n/plugin validate .<\/code><\/pre>\n<h2 id=\"team-configuration\">Team Configuration<\/h2>\n<h3 id=\"add-marketplace-to-settings-claude-settings-json\">Add Marketplace to Settings (.claude/settings.json)<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;extraKnownMarketplaces&quot;: {\n    &quot;company-tools&quot;: {&quot;source&quot;: {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;your-org/claude-plugins&quot;}}\n  }\n}<\/code><\/pre>\n<h3 id=\"auto-enable-plugins\">Auto-Enable Plugins<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;enabledPlugins&quot;: {\n    &quot;code-formatter@company-tools&quot;: true,\n    &quot;security-scanner@company-tools&quot;: true\n  }\n}<\/code><\/pre>\n<h2 id=\"enterprise-restrictions\">Enterprise Restrictions<\/h2>\n<h3 id=\"strictknownmarketplaces-setting\">strictKnownMarketplaces Setting<\/h3>\n<p>Undefined (default): No restrictions<\/p>\n<p>Empty array (lockdown): No external marketplaces allowed<\/p>\n<pre><code class=\"language-json\">{&quot;strictKnownMarketplaces&quot;: []}<\/code><\/pre>\n<p>Allowlist: Only specified marketplaces permitted<\/p>\n<pre><code class=\"language-json\">{\n  &quot;strictKnownMarketplaces&quot;: [\n    {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;acme-corp/approved-plugins&quot;},\n    {&quot;source&quot;: &quot;url&quot;, &quot;url&quot;: &quot;https://plugins.example.com/marketplace.json&quot;}\n  ]\n}<\/code><\/pre>\n<p>Note: Set in managed settings only (cannot be overridden by user/project settings)<\/p>\n<h2 id=\"validation-and-testing\">Validation and Testing<\/h2>\n<h3 id=\"commands\">Commands<\/h3>\n<pre><code class=\"language-bash\">claude plugin validate .    # CLI\n/plugin validate .          # Slash command<\/code><\/pre>\n<h3 id=\"common-errors\">Common Errors<\/h3>\n<ul><li>File not found: marketplace.json - Create .claude-plugin/marketplace.json<\/li><li>Invalid JSON syntax - Check commas, quotes<\/li><li>Duplicate plugin name - Use unique names<\/li><li>Path traversal not allowed - Remove \"..\" from paths<\/li><\/ul>\n<h3 id=\"non-blocking-warnings\">Non-Blocking Warnings<\/h3>\n<ul><li>No plugins defined<\/li><li>No marketplace description<\/li><li>npm sources not fully implemented<\/li><\/ul>\n<h2 id=\"advanced-plugin-entry\">Advanced Plugin Entry<\/h2>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;enterprise-tools&quot;,\n  &quot;source&quot;: {&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;company/enterprise-plugin&quot;},\n  &quot;description&quot;: &quot;Enterprise workflow automation&quot;,\n  &quot;version&quot;: &quot;2.1.0&quot;,\n  &quot;author&quot;: {&quot;name&quot;: &quot;Enterprise Team&quot;, &quot;email&quot;: &quot;[email protected]&quot;},\n  &quot;homepage&quot;: &quot;https://docs.example.com/plugins/enterprise-tools&quot;,\n  &quot;license&quot;: &quot;MIT&quot;,\n  &quot;keywords&quot;: [&quot;enterprise&quot;, &quot;workflow&quot;],\n  &quot;category&quot;: &quot;productivity&quot;,\n  &quot;commands&quot;: [&quot;./commands/core/&quot;, &quot;./commands/enterprise/&quot;],\n  &quot;agents&quot;: [&quot;./agents/security-reviewer.md&quot;],\n  &quot;hooks&quot;: {\n    &quot;PostToolUse&quot;: [{\n      &quot;matcher&quot;: &quot;Write|Edit&quot;,\n      &quot;hooks&quot;: [{&quot;type&quot;: &quot;command&quot;, &quot;command&quot;: &quot;${CLAUDE_PLUGIN_ROOT}/scripts/validate.sh&quot;}]\n    }]\n  },\n  &quot;mcpServers&quot;: {\n    &quot;enterprise-db&quot;: {\n      &quot;command&quot;: &quot;${CLAUDE_PLUGIN_ROOT}/servers/db-server&quot;,\n      &quot;args&quot;: [&quot;--config&quot;, &quot;${CLAUDE_PLUGIN_ROOT}/config.json&quot;]\n    }\n  },\n  &quot;strict&quot;: false\n}<\/code><\/pre>\n<p>Notes:<\/p>\n<ul><li>${CLAUDE_PLUGIN_ROOT} references plugin installation directory<\/li><li>strict: false means plugin does not require its own plugin.json<\/li><\/ul>\n<h2 id=\"reserved-marketplace-names\">Reserved Marketplace Names<\/h2>\n<p>Cannot be used by third-party marketplaces:<\/p>\n<ul><li>claude-code-marketplace, claude-code-plugins, claude-plugins-official<\/li><li>anthropic-marketplace, anthropic-plugins<\/li><li>agent-skills, life-sciences<\/li><\/ul>\n<p>Also blocked: Names impersonating official marketplaces<\/p>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"marketplace-not-loading\">Marketplace Not Loading<\/h3>\n<ul><li>Verify URL is accessible<\/li><li>Check .claude-plugin/marketplace.json exists at root<\/li><li>Validate JSON with /plugin validate<\/li><li>Confirm access permissions for private repos<\/li><\/ul>\n<h3 id=\"plugin-installation-failures\">Plugin Installation Failures<\/h3>\n<ul><li>Verify plugin source URLs are accessible<\/li><li>Check plugin directories contain required files<\/li><li>For GitHub sources, ensure repos are public or accessible<\/li><li>Test by cloning repository manually<\/li><\/ul>\n<h3 id=\"files-not-found-after-installation\">Files Not Found After Installation<\/h3>\n<p>Cause: Plugins are copied to cache. External paths (../shared) do not work.<\/p>\n<p>Solutions:<\/p>\n<ul><li>Use symlinks (followed during copying)<\/li><li>Restructure shared directories inside plugin source<\/li><li>Include all required files within plugin directory<\/li><\/ul>\n<h2 id=\"commands-reference\">Commands Reference<\/h2>\n<h3 id=\"marketplace-management\">Marketplace Management<\/h3>\n<pre><code class=\"language-bash\">/plugin marketplace add owner/repo              # Add from GitHub\n/plugin marketplace add https://url/repo.git   # Add from URL\n/plugin marketplace add ./local-path           # Add local\n/plugin marketplace list                        # List marketplaces\n/plugin marketplace remove name                 # Remove marketplace<\/code><\/pre>\n<h3 id=\"plugin-installation\">Plugin Installation<\/h3>\n<pre><code class=\"language-bash\">/plugin install plugin-name@marketplace-name   # Install from marketplace<\/code><\/pre>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<p>Marketplace Organization:<\/p>\n<ul><li>Group related plugins together<\/li><li>Use clear, descriptive names<\/li><li>Maintain consistent versioning<\/li><li>Document all plugins<\/li><\/ul>\n<p>Security:<\/p>\n<ul><li>Review plugin scripts before distribution<\/li><li>Avoid hardcoded credentials<\/li><li>Use environment variables for sensitive data<\/li><li>Document required permissions<\/li><\/ul>\n<p>Distribution:<\/p>\n<ul><li>Test locally before publishing<\/li><li>Validate structure before sharing<\/li><li>Provide clear installation instructions<\/li><\/ul>\n<h2 id=\"additional-resources\">Additional Resources<\/h2>\n<ul><li>Plugin Creation: https://code.claude.com/docs/en/plugins<\/li><li>Plugin Reference: https://code.claude.com/docs/en/plugins-reference<\/li><li>Plugin Settings: https://code.claude.com/docs/en/settings#plugin-settings<\/li><li>Discover Plugins: https://code.claude.com/docs/en/discover-plugins<\/li><\/ul>","text":"Claude Code Plugin Marketplaces - Official Documentation Reference Source: https://code.claude.com/docs/en/plugin-marketplaces Related: https://code.claude.com/docs/en/plugins-reference Updated: 2026-01-06 What are Plugin Marketplaces? A plugin marketplace is a catalog that distributes Claude Code extensions across teams and communities. It provides centralized discovery, version tracking, automatic updates, and supports multiple source types including git repositories and local paths. Key Benefits: Centralized plugin discovery and management Version tracking and automatic updates Support for multiple source types (GitHub, GitLab, local paths) Team-wide distribution and enforcement Creating a Marketplace Directory Structure my-marketplace/ - .claude-plugin/ - marketplace.json - plugins/ - review-plugin/ - .claude-plugin/plugin.json - commands/review.md Quick Start Step 1: Create directory structure mkdir -p my-marketplace/.claude-plugin mkdir -p my-marketplace/plugins/review-plugin/.claude-plugin mkdir -p my-marketplace/plugins/review-plugin/commands Step 2: Create plugin manifest (plugins/review-plugin/.claude-plugin/plugin.json) {\"name\": \"review-plugin\", \"description\": \"Quick code reviews\", \"version\": \"1.0.0\"} Step 3: Create marketplace manifest (.claude-plugin/marketplace.json) { \"name\": \"my-plugins\", \"owner\": {\"name\": \"Your Name\"}, \"plugins\": [{\"name\": \"review-plugin\", \"source\": \"./plugins/review-plugin\"}] } marketplace.json Schema Required Fields name: Marketplace identifier (kebab-case) owner: Object with name (required) and email (optional) plugins: Array of plugin entries Optional Metadata metadata.description: Brief marketplace description metadata.version: Marketplace version metadata.pluginRoot: Base directory for relative paths Complete Example { \"name\": \"acme-dev-tools\", \"owner\": {\"name\": \"ACME DevTools Team\", \"email\": \"[email protected]\"}, \"metadata\": {\"description\": \"ACME engineering tools\", \"version\": \"2.0.0\", \"pluginRoot\": \"./plugins\"}, \"plugins\": [ {\"name\": \"code-formatter\", \"source\": \"./formatter\"}, {\"name\": \"security-scanner\", \"source\": {\"source\": \"github\", \"repo\": \"acme/security-plugin\"}} ] } Plugin Entry Configuration Required Fields name: Plugin identifier (kebab-case) source: Plugin location (string path or source object) Optional Fields Metadata: description, version, author (object with name/email), homepage, repository, license, keywords, category, tags Behavior: strict (boolean, default true) - whether plugin needs its own plugin.json Components: commands, agents, hooks, mcpServers, lspServers - custom path overrides Plugin Source Types Relative Paths {\"name\": \"my-plugin\", \"source\": \"./plugins/my-plugin\"} GitHub Repositories {\"name\": \"github-plugin\", \"source\": {\"source\": \"github\", \"repo\": \"owner/repo\"}} With specific ref: {\"name\": \"github-plugin\", \"source\": {\"source\": \"github\", \"repo\": \"owner/repo\", \"ref\": \"v2.0\"}} Git URL Repositories {\"name\": \"git-plugin\", \"source\": {\"source\": \"url\", \"url\": \"https://gitlab.com/team/plugin.git\"}} Hosting and Distribution GitHub (Recommended) Create GitHub repository Add .claude-plugin/marketplace.json at root Users add with: /plugin marketplace add owner/repo Other Git Services /plugin marketplace add https://gitlab.com/company/plugins.git Local Testing /plugin marketplace add ./my-marketplace /plugin install test-plugin@my-marketplace /plugin validate . Team Configuration Add Marketplace to Settings (.claude/settings.json) { \"extraKnownMarketplaces\": { \"company-tools\": {\"source\": {\"source\": \"github\", \"repo\": \"your-org/claude-plugins\"}} } } Auto-Enable Plugins { \"enabledPlugins\": { \"code-formatter@company-tools\": true, \"security-scanner@company-tools\": true } } Enterprise Restrictions strictKnownMarketplaces Setting Undefined (default): No restrictions Empty array (lockdown): No external marketplaces allowed {\"strictKnownMarketplaces\": []} Allowlist: Only specified marketplaces permitted { \"strictKnownMarketplaces\": [ {\"source\": \"github\", \"repo\": \"acme-corp/approved-plugins\"}, {\"source\": \"url\", \"url\": \"https://plugins.example.com/marketplace.json\"} ] } Note: Set in managed settings only (cannot be overridden by user/project settings) Validation and Testing Commands claude plugin validate . # CLI /plugin validate . # Slash command Common Errors File not found: marketplace.json - Create .claude-plugin/marketplace.json Invalid JSON syntax - Check commas, quotes Duplicate plugin name - Use unique names Path traversal not allowed - Remove \"..\" from paths Non-Blocking Warnings No plugins defined No marketplace description npm sources not fully implemented Advanced Plugin Entry { \"name\": \"enterprise-tools\", \"source\": {\"source\": \"github\", \"repo\": \"company/enterprise-plugin\"}, \"description\": \"Enterprise workflow automation\", \"version\": \"2.1.0\", \"author\": {\"name\": \"Enterprise Team\", \"email\": \"[email protected]\"}, \"homepage\": \"https://docs.example.com/plugins/enterprise-tools\", \"license\": \"MIT\", \"keywords\": [\"enterprise\", \"workflow\"], \"category\": \"productivity\", \"commands\": [\"./commands/core/\", \"./commands/enterprise/\"], \"agents\": [\"./agents/security-reviewer.md\"], \"hooks\": { \"PostToolUse\": [{ \"matcher\": \"Write|Edit\", \"hooks\": [{\"type\": \"command\", \"command\": \"${CLAUDE_PLUGIN_ROOT}/scripts/validate.sh\"}] }] }, \"mcpServers\": { \"enterprise-db\": { \"command\": \"${CLAUDE_PLUGIN_ROOT}/servers/db-server\", \"args\": [\"--config\", \"${CLAUDE_PLUGIN_ROOT}/config.json\"] } }, \"strict\": false } Notes: ${CLAUDE_PLUGIN_ROOT} references plugin installation directory strict: false means plugin does not require its own plugin.json Reserved Marketplace Names Cannot be used by third-party marketplaces: claude-code-marketplace, claude-code-plugins, claude-plugins-official anthropic-marketplace, anthropic-plugins agent-skills, life-sciences Also blocked: Names impersonating official marketplaces Troubleshooting Marketplace Not Loading Verify URL is accessible Check .claude-plugin/marketplace.json exists at root Validate JSON with /plugin validate Confirm access permissions for private repos Plugin Installation Failures Verify plugin source URLs are accessible Check plugin directories contain required files For GitHub sources, ensure repos are public or accessible Test by cloning repository manually Files Not Found After Installation Cause: Plugins are copied to cache. External paths (../shared) do not work. Solutions: Use symlinks (followed during copying) Restructure shared directories inside plugin source Include all required files within plugin directory Commands Reference Marketplace Management /plugin marketplace add owner/repo # Add from GitHub /plugin marketplace add https://url/repo.git # Add from URL /plugin marketplace add ./local-path # Add local /plugin marketplace list # List marketplaces /plugin marketplace remove name # Remove marketplace Plugin Installation /plugin install plugin-name@marketplace-name # Install from marketplace Best Practices Marketplace Organization: Group related plugins together Use clear, descriptive names Maintain consistent versioning Document all plugins Security: Review plugin scripts before distribution Avoid hardcoded credentials Use environment variables for sensitive data Document required permissions Distribution: Test locally before publishing Validate structure before sharing Provide clear installation instructions Additional Resources Plugin Creation: https://code.claude.com/docs/en/plugins Plugin Reference: https://code.claude.com/docs/en/plugins-reference Plugin Settings: https://code.claude.com/docs/en/settings#plugin-settings Discover Plugins: https://code.claude.com/docs/en/discover-plugins"},{"id":".claude/skills/foundation-cc/reference/claude-code-plugins-official.md","title":"Claude Code Plugins - Official Documentation Reference","category":"Skills","path":".claude/skills/foundation-cc/reference/claude-code-plugins-official.md","desc":"","html":"<h1 id=\"claude-code-plugins-official-documentation-reference\">Claude Code Plugins - Official Documentation Reference<\/h1>\n<p>Source: https://code.claude.com/docs/en/plugins Related: https://code.claude.com/docs/en/plugins-reference Related: https://code.claude.com/docs/en/discover-plugins Related: https://code.claude.com/docs/en/plugin-marketplaces Updated: 2026-01-06<\/p>\n<h2 id=\"what-are-claude-code-plugins\">What are Claude Code Plugins?<\/h2>\n<p>Plugins are reusable extensions that bundle Claude Code configurations for distribution across projects. Unlike standalone configurations in <code>.claude/<\/code> directories, plugins can be installed via marketplaces, shared across teams, and version-controlled independently.<\/p>\n<h2 id=\"plugin-vs-standalone-configuration\">Plugin vs Standalone Configuration<\/h2>\n<p>Standalone Configuration (<code>.claude/<\/code> directory):<\/p>\n<ul><li>Scope: Single project only<\/li><li>Sharing: Manual copy or git submodules<\/li><li>Updates: Manual synchronization<\/li><li>Best for: Project-specific customizations<\/li><\/ul>\n<p>Plugin Configuration:<\/p>\n<ul><li>Scope: Reusable across multiple projects<\/li><li>Sharing: Installable via marketplaces or git URLs<\/li><li>Updates: Automatic or manual via plugin manager<\/li><li>Best for: Team standards, reusable workflows, community tools<\/li><\/ul>\n<h2 id=\"plugin-directory-structure\">Plugin Directory Structure<\/h2>\n<p>A plugin is a directory with the following structure:<\/p>\n<pre><code>my-plugin/\n- .claude-plugin/\n  - plugin.json (ONLY file in this directory)\n- commands/ (slash commands, markdown files)\n- agents/ (custom sub-agents, markdown files)\n- skills/ (agent skills with SKILL.md)\n- hooks/\n  - hooks.json (hook definitions)\n- .mcp.json (MCP server configurations)\n- .lsp.json (LSP server configurations)\n- settings.json (plugin-specific settings, v2.1.49+)<\/code><\/pre>\n<p>Critical Rule: Only plugin.json belongs in the .claude-plugin/ directory. All other components are at the plugin root level.<\/p>\n<h2 id=\"plugin-manifest-plugin-json\">Plugin Manifest (plugin.json)<\/h2>\n<p>The plugin manifest defines metadata and component locations.<\/p>\n<h3 id=\"required-fields\">Required Fields<\/h3>\n<ul><li>name: Unique identifier in kebab-case format<\/li><\/ul>\n<h3 id=\"recommended-fields\">Recommended Fields<\/h3>\n<ul><li>description: Shown in plugin manager and marketplaces<\/li><li>version: Semantic versioning (MAJOR.MINOR.PATCH)<\/li><li>author: Object with name field, optionally email and url<\/li><li>homepage: URL to plugin documentation or landing page<\/li><li>repository: Git URL for source code<\/li><li>license: SPDX license identifier<\/li><\/ul>\n<h3 id=\"optional-path-overrides\">Optional Path Overrides<\/h3>\n<ul><li>commands: Path to commands directory (default: commands/)<\/li><li>agents: Path to agents directory (default: agents/)<\/li><li>skills: Path to skills directory (default: skills/)<\/li><li>hooks: Path to hooks configuration<\/li><li>mcpServers: Path to MCP server configuration<\/li><li>lspServers: Path to LSP server configuration<\/li><li>outputStyles: Path to output styles directory<\/li><li>settings: Path to plugin settings file (v2.1.49+)<\/li><\/ul>\n<h3 id=\"discovery-keywords\">Discovery Keywords<\/h3>\n<ul><li>keywords: Array of discovery tags for finding plugins in marketplaces<\/li><\/ul>\n<p>Example:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;keywords&quot;: [&quot;deployment&quot;, &quot;ci-cd&quot;, &quot;automation&quot;, &quot;devops&quot;]\n}<\/code><\/pre>\n<p>Keywords help users discover plugins through search. Use relevant, descriptive terms that reflect the plugin's functionality and domain.<\/p>\n<h3 id=\"example-plugin-manifest\">Example Plugin Manifest<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;my-team-plugin&quot;,\n  &quot;description&quot;: &quot;Team development standards and workflows&quot;,\n  &quot;version&quot;: &quot;1.0.0&quot;,\n  &quot;author&quot;: {\n    &quot;name&quot;: &quot;Development Team&quot;\n  },\n  &quot;homepage&quot;: &quot;https://github.com/org/my-team-plugin&quot;,\n  &quot;repository&quot;: &quot;https://github.com/org/my-team-plugin.git&quot;,\n  &quot;license&quot;: &quot;MIT&quot;,\n  &quot;keywords&quot;: [&quot;team-standards&quot;, &quot;workflow&quot;, &quot;development&quot;]\n}<\/code><\/pre>\n<h2 id=\"plugin-components\">Plugin Components<\/h2>\n<h3 id=\"commands\">Commands<\/h3>\n<p>Slash commands are markdown files in the commands/ directory:<\/p>\n<pre><code>commands/\n- review.md (becomes /my-plugin:review)\n- deploy/\n  - staging.md (becomes /my-plugin:deploy/staging)\n  - production.md (becomes /my-plugin:deploy/production)<\/code><\/pre>\n<p>Plugin commands use the namespace prefix pattern: /plugin-name:command-name<\/p>\n<p>Command File Structure:<\/p>\n<pre><code class=\"language-markdown\">---\ndescription: Command description for discovery\n---\n\nCommand instructions and prompt content.\n\nArguments: $ARGUMENTS (all), $1, $2 (positional)\nFile references: @path/to/file.md<\/code><\/pre>\n<p>Frontmatter Fields:<\/p>\n<ul><li>description (required): Command purpose for help display<\/li><\/ul>\n<p>Argument Handling:<\/p>\n<ul><li><code>$ARGUMENTS<\/code> - All arguments as single string<\/li><li><code>$1<\/code>, <code>$2<\/code>, <code>$3<\/code> - Individual positional arguments<\/li><li><code>@file.md<\/code> - File content injection<\/li><\/ul>\n<h3 id=\"agents\">Agents<\/h3>\n<p>Custom sub-agents with markdown definitions:<\/p>\n<pre><code>agents/\n- code-reviewer.md\n- security-analyst.md<\/code><\/pre>\n<p>Agent File Structure:<\/p>\n<pre><code class=\"language-markdown\">---\nname: my-agent\ndescription: Agent purpose and capabilities\ntools: Read, Write, Edit, Grep, Glob, Bash\nmodel: sonnet\npermissionMode: default\nskills:\n  - skill-name-one\n  - skill-name-two\n---\n\nAgent system prompt and instructions.<\/code><\/pre>\n<p>Frontmatter Fields:<\/p>\n<ul><li>name (required): Agent identifier<\/li><li>description: Agent purpose<\/li><li>tools: Comma-separated tool list<\/li><li>model: sonnet, opus, haiku, inherit<\/li><li>permissionMode: default, bypassPermissions, plan, passthrough<\/li><li>skills: Array of skill names to load<\/li><\/ul>\n<p>Available Tools:<\/p>\n<ul><li>Read, Write, Edit - File operations<\/li><li>Grep, Glob - Search operations<\/li><li>Bash - Command execution<\/li><li>WebFetch, WebSearch - Web access<\/li><li>Agent - Sub-agent delegation<\/li><li>TodoWrite - Task management<\/li><\/ul>\n<h3 id=\"skills\">Skills<\/h3>\n<p>Agent skills following the standard SKILL.md structure:<\/p>\n<pre><code>skills/\n- my-skill/\n  - SKILL.md\n  - reference.md\n  - examples.md<\/code><\/pre>\n<h3 id=\"hooks\">Hooks<\/h3>\n<p>Hook definitions in hooks/hooks.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;hooks&quot;: {\n    &quot;PreToolUse&quot;: [\n      {\n        &quot;matcher&quot;: &quot;Write&quot;,\n        &quot;hooks&quot;: [\n          {\n            &quot;type&quot;: &quot;command&quot;,\n            &quot;command&quot;: &quot;${CLAUDE_PLUGIN_ROOT}/scripts/validate.sh&quot;\n          }\n        ]\n      }\n    ]\n  }\n}<\/code><\/pre>\n<p>Use ${CLAUDE_PLUGIN_ROOT} for absolute paths within the plugin.<\/p>\n<p>Available Hook Events:<\/p>\n<ul><li>PreToolUse, PostToolUse, PostToolUseFailure - Tool execution lifecycle<\/li><li>PermissionRequest, UserPromptSubmit, Notification, Stop - User interaction<\/li><li>SubagentStart, SubagentStop - Sub-agent lifecycle<\/li><li>SessionStart, SessionEnd, PreCompact - Session lifecycle<\/li><\/ul>\n<p>Hook Types:<\/p>\n<ul><li>command: Execute bash command<\/li><li>prompt: Send prompt to LLM<\/li><li>agent: Invoke custom agent<\/li><\/ul>\n<p>Matcher Patterns: Exact name (\"Write\"), wildcard (\"\\*\"), tool-specific filtering<\/p>\n<h3 id=\"mcp-servers\">MCP Servers<\/h3>\n<p>MCP server configurations in .mcp.json:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;mcpServers&quot;: {\n    &quot;my-server&quot;: {\n      &quot;command&quot;: &quot;${CLAUDE_PLUGIN_ROOT}/mcp-server/run.sh&quot;,\n      &quot;args&quot;: [&quot;--config&quot;, &quot;${CLAUDE_PLUGIN_ROOT}/config.json&quot;]\n    }\n  }\n}<\/code><\/pre>\n<h3 id=\"lsp-servers\">LSP Servers<\/h3>\n<p>Language server configurations in .lsp.json for code intelligence features.<\/p>\n<p>LSP Server Structure:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;lspServers&quot;: {\n    &quot;python&quot;: {\n      &quot;command&quot;: &quot;pylsp&quot;,\n      &quot;args&quot;: [],\n      &quot;extensionToLanguage&quot;: {\n        &quot;.py&quot;: &quot;python&quot;,\n        &quot;.pyi&quot;: &quot;python&quot;\n      },\n      &quot;env&quot;: {\n        &quot;PYTHONPATH&quot;: &quot;${CLAUDE_PROJECT_DIR}&quot;\n      }\n    }\n  }\n}<\/code><\/pre>\n<p>Required Fields:<\/p>\n<ul><li>command: LSP server executable<\/li><li>extensionToLanguage: File extension to language mapping<\/li><\/ul>\n<p>Optional Fields: args, env, transport, initializationOptions, settings, workspaceFolder, startupTimeout, shutdownTimeout, restartOnCrash, maxRestarts, loggingConfig<\/p>\n<h3 id=\"plugin-settings\">Plugin Settings<\/h3>\n<p>Plugin-specific settings can be defined in settings.json at the plugin root (v2.1.49+):<\/p>\n<pre><code class=\"language-json\">{\n  &quot;env&quot;: {\n    &quot;PLUGIN_API_URL&quot;: &quot;https://api.example.com&quot;\n  },\n  &quot;permissions&quot;: {\n    &quot;allow&quot;: [&quot;Read&quot;, &quot;Grep&quot;, &quot;WebFetch&quot;]\n  }\n}<\/code><\/pre>\n<p>Plugin settings are merged with project and user settings, allowing plugins to:<\/p>\n<ul><li>Define required environment variables<\/li><li>Set default tool permissions<\/li><li>Provide configuration defaults that users can override<\/li><\/ul>\n<h2 id=\"installation-scopes\">Installation Scopes<\/h2>\n<p>Plugins can be installed at different scopes:<\/p>\n<h3 id=\"user-scope-default\">User Scope (default)<\/h3>\n<ul><li>Location: ~/.claude/plugins/<\/li><li>Availability: All projects for current user<\/li><li>Use case: Personal productivity tools<\/li><\/ul>\n<h3 id=\"project-scope\">Project Scope<\/h3>\n<ul><li>Location: .claude/settings.json (reference only, not copied)<\/li><li>Availability: Current project only<\/li><li>Version controlled: Yes, shareable via git<\/li><li>Use case: Project-specific requirements<\/li><\/ul>\n<h3 id=\"local-scope\">Local Scope<\/h3>\n<ul><li>Location: Interactive selection via /plugin command<\/li><li>Availability: Current session only<\/li><li>Version controlled: No<\/li><li>Use case: Testing and evaluation<\/li><\/ul>\n<h3 id=\"managed-scope\">Managed Scope<\/h3>\n<ul><li>Location: Enterprise configuration<\/li><li>Availability: Enforced across organization<\/li><li>Use case: Compliance and security requirements<\/li><\/ul>\n<h2 id=\"official-anthropic-marketplace\">Official Anthropic Marketplace<\/h2>\n<p>Anthropic maintains an official plugin marketplace with curated, verified plugins.<\/p>\n<p>Marketplace Name: claude-plugins-official<\/p>\n<p>Availability: Automatically available in Claude Code without additional configuration.<\/p>\n<p>Installation Syntax: /plugin install plugin-name@claude-plugins-official<\/p>\n<p>The official marketplace contains plugins that have been reviewed for quality and security. For a complete catalog of available plugins, see the discover-plugins reference documentation.<\/p>\n<h2 id=\"interactive-plugin-manager\">Interactive Plugin Manager<\/h2>\n<p>Access the interactive plugin manager using the /plugin command.<\/p>\n<p>The plugin manager provides four navigation tabs:<\/p>\n<ul><li>Discover: Browse and search available plugins from configured marketplaces<\/li><li>Installed: View and manage currently installed plugins<\/li><li>Marketplaces: Configure and manage plugin marketplace sources<\/li><li>Errors: View and troubleshoot plugin-related errors<\/li><\/ul>\n<p>Navigation Controls:<\/p>\n<ul><li>Tab key: Cycle forward through tabs<\/li><li>Shift+Tab: Cycle backward through tabs<\/li><li>Arrow keys: Navigate within tab content<\/li><li>Enter: Select or confirm action<\/li><\/ul>\n<h2 id=\"plugin-management-commands\">Plugin Management Commands<\/h2>\n<h3 id=\"installation\">Installation<\/h3>\n<p>Install from marketplace: /plugin install plugin-name<\/p>\n<p>Install from official Anthropic marketplace: /plugin install plugin-name@claude-plugins-official<\/p>\n<p>Install from GitHub: /plugin install owner/repo<\/p>\n<p>Install from git URL: /plugin install https://github.com/owner/repo.git<\/p>\n<p>Install with scope: /plugin install plugin-name --scope project<\/p>\n<h3 id=\"other-commands\">Other Commands<\/h3>\n<p>Uninstall: /plugin uninstall plugin-name Enable: /plugin enable plugin-name Disable: /plugin disable plugin-name Update: /plugin update plugin-name Update all: /plugin update List installed: /plugin list Validate: /plugin validate . (in plugin directory)<\/p>\n<h2 id=\"reserved-names\">Reserved Names<\/h2>\n<p>The following name patterns are reserved and cannot be used:<\/p>\n<ul><li>claude-code-\\*<\/li><li>anthropic-\\*<\/li><li>official-\\*<\/li><\/ul>\n<h2 id=\"environment-variables-in-plugins\">Environment Variables in Plugins<\/h2>\n<p>Use these variables for path resolution:<\/p>\n<ul><li>${CLAUDE_PLUGIN_ROOT}: Absolute path to plugin installation directory<\/li><\/ul>\n<p>Example usage:<\/p>\n<pre><code class=\"language-json\">{\n  &quot;command&quot;: &quot;${CLAUDE_PLUGIN_ROOT}/scripts/my-script.sh&quot;\n}<\/code><\/pre>\n<h2 id=\"plugin-caching-behavior\">Plugin Caching Behavior<\/h2>\n<p>When a plugin is installed:<\/p>\n<ol><li>Plugin files are copied to the cache directory<\/li><li>Symlinks within the plugin are honored<\/li><li>Path traversal (../) does not work post-installation<\/li><li>Updates require re-installation or /plugin update command<\/li><\/ol>\n<h2 id=\"creating-a-plugin\">Creating a Plugin<\/h2>\n<h3 id=\"step-1-create-directory-structure\">Step 1: Create Directory Structure<\/h3>\n<p>Create the plugin directory with required structure:<\/p>\n<pre><code>mkdir -p my-plugin/.claude-plugin\nmkdir -p my-plugin/commands\nmkdir -p my-plugin/agents\nmkdir -p my-plugin/skills\nmkdir -p my-plugin/hooks<\/code><\/pre>\n<h3 id=\"step-2-create-plugin-manifest\">Step 2: Create Plugin Manifest<\/h3>\n<p>Create .claude-plugin/plugin.json with required metadata.<\/p>\n<h3 id=\"step-3-add-components\">Step 3: Add Components<\/h3>\n<p>Add commands, agents, skills, hooks, or server configurations as needed.<\/p>\n<h3 id=\"step-4-validate\">Step 4: Validate<\/h3>\n<p>Run validation in the plugin directory: /plugin validate .<\/p>\n<p>Or via CLI: claude plugin validate .<\/p>\n<h3 id=\"step-5-test-locally\">Step 5: Test Locally<\/h3>\n<p>Install from local path for testing: /plugin install /path/to/my-plugin<\/p>\n<h3 id=\"step-6-distribute\">Step 6: Distribute<\/h3>\n<p>Push to git repository and share via:<\/p>\n<ul><li>GitHub repository URL<\/li><li>Custom marketplace<\/li><li>Direct git URL<\/li><\/ul>\n<h2 id=\"plugin-distribution\">Plugin Distribution<\/h2>\n<h3 id=\"via-github\">Via GitHub<\/h3>\n<ol><li>Create a GitHub repository for the plugin<\/li><li>Ensure .claude-plugin/plugin.json exists at root<\/li><li>Share the repository URL: owner/repo<\/li><\/ol>\n<h3 id=\"via-custom-marketplace\">Via Custom Marketplace<\/h3>\n<ol><li>Create marketplace.json in .claude-plugin/ directory<\/li><li>List plugins with relative paths or git URLs<\/li><li>Add marketplace to team settings<\/li><\/ol>\n<h3 id=\"via-direct-git-url\">Via Direct Git URL<\/h3>\n<p>Share the full git URL including protocol:<\/p>\n<ul><li>HTTPS: https://github.com/owner/repo.git<\/li><li>SSH: git@github.com:owner/repo.git<\/li><\/ul>\n<h2 id=\"best-practices\">Best Practices<\/h2>\n<h3 id=\"naming\">Naming<\/h3>\n<ul><li>Use descriptive, unique names<\/li><li>Follow kebab-case convention<\/li><li>Avoid reserved prefixes<\/li><\/ul>\n<h3 id=\"versioning\">Versioning<\/h3>\n<ul><li>Use semantic versioning<\/li><li>Update version on each release<\/li><li>Document changes in CHANGELOG<\/li><\/ul>\n<h3 id=\"documentation\">Documentation<\/h3>\n<ul><li>Include comprehensive README<\/li><li>Document all commands and their purposes<\/li><li>Provide usage examples<\/li><\/ul>\n<h3 id=\"security\">Security<\/h3>\n<ul><li>Review all scripts before distribution<\/li><li>Avoid hardcoded credentials<\/li><li>Use environment variables for sensitive data<\/li><li>Document required permissions<\/li><\/ul>\n<h3 id=\"testing\">Testing<\/h3>\n<ul><li>Test on fresh installations<\/li><li>Verify all components load correctly<\/li><li>Test across different operating systems<\/li><li>Validate plugin structure before publishing<\/li><\/ul>\n<h2 id=\"troubleshooting\">Troubleshooting<\/h2>\n<h3 id=\"plugin-not-loading\">Plugin Not Loading<\/h3>\n<p>Check plugin.json is valid JSON Verify plugin is enabled: /plugin list Check for naming conflicts<\/p>\n<h3 id=\"commands-not-appearing\">Commands Not Appearing<\/h3>\n<p>Verify commands/ directory exists Check markdown files have correct format Ensure plugin is enabled<\/p>\n<h3 id=\"hooks-not-executing\">Hooks Not Executing<\/h3>\n<p>Verify hooks.json syntax Check script permissions Use ${CLAUDE_PLUGIN_ROOT} for absolute paths<\/p>\n<h3 id=\"mcp-servers-not-connecting\">MCP Servers Not Connecting<\/h3>\n<p>Verify .mcp.json syntax Check server command exists Review server logs for errors<\/p>\n<h2 id=\"development-workflow\">Development Workflow<\/h2>\n<h3 id=\"local-development\">Local Development<\/h3>\n<pre><code class=\"language-bash\"># Test single plugin\nclaude --plugin-dir ./my-plugin\n\n# Test multiple plugins\nclaude --plugin-dir ./plugin-one --plugin-dir ./plugin-two<\/code><\/pre>\n<h3 id=\"testing-components\">Testing Components<\/h3>\n<ul><li>Commands: <code>/plugin-name:command-name<\/code> invocation<\/li><li>Agents: <code>/agents<\/code> to list, then invoke by name<\/li><li>Skills: Ask questions relevant to skill domain<\/li><li>Hooks: Trigger events and check debug logs<\/li><\/ul>\n<h3 id=\"debugging\">Debugging<\/h3>\n<pre><code class=\"language-bash\"># Enable debug mode\nclaude --debug\n\n# Validate plugin structure\nclaude plugin validate\n\n# View plugin errors\n/plugin errors<\/code><\/pre>\n<h2 id=\"creating-custom-marketplaces\">Creating Custom Marketplaces<\/h2>\n<h3 id=\"marketplace-json-structure\">marketplace.json Structure<\/h3>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;my-marketplace&quot;,\n  &quot;owner&quot;: {\n    &quot;name&quot;: &quot;Organization Name&quot;,\n    &quot;email&quot;: &quot;contact@example.com&quot;\n  },\n  &quot;metadata&quot;: {\n    &quot;description&quot;: &quot;Custom plugins for our team&quot;,\n    &quot;version&quot;: &quot;1.0.0&quot;,\n    &quot;pluginRoot&quot;: &quot;./plugins&quot;\n  },\n  &quot;plugins&quot;: [\n    {\n      &quot;name&quot;: &quot;my-plugin&quot;,\n      &quot;source&quot;: &quot;./plugins/my-plugin&quot;,\n      &quot;description&quot;: &quot;Plugin description&quot;,\n      &quot;version&quot;: &quot;1.0.0&quot;,\n      &quot;category&quot;: &quot;development&quot;,\n      &quot;keywords&quot;: [&quot;automation&quot;, &quot;workflow&quot;]\n    }\n  ]\n}<\/code><\/pre>\n<h3 id=\"required-fields\">Required Fields<\/h3>\n<ul><li>name: Marketplace identifier in kebab-case<\/li><li>owner: Object with name (required) and email (optional)<\/li><li>plugins: Array of plugin entries<\/li><\/ul>\n<h3 id=\"plugin-source-types\">Plugin Source Types<\/h3>\n<ul><li>Relative paths: <code>&quot;source&quot;: &quot;./plugins/my-plugin&quot;<\/code><\/li><li>GitHub: <code>{&quot;source&quot;: &quot;github&quot;, &quot;repo&quot;: &quot;owner/repo&quot;}<\/code><\/li><li>Git URL: <code>{&quot;source&quot;: &quot;url&quot;, &quot;url&quot;: &quot;https://gitlab.com/org/plugin.git&quot;}<\/code><\/li><\/ul>\n<h3 id=\"reserved-marketplace-names\">Reserved Marketplace Names<\/h3>\n<p>Cannot be used:<\/p>\n<ul><li>claude-code-marketplace, claude-code-plugins, claude-plugins-official<\/li><li>anthropic-marketplace, anthropic-plugins<\/li><li>agent-skills, life-sciences<\/li><\/ul>\n<h3 id=\"marketplace-hosting-options\">Marketplace Hosting Options<\/h3>\n<ul><li>GitHub repository (recommended): Users add via <code>/plugin marketplace add owner/repo<\/code><\/li><li>Other Git services: Full URL with <code>/plugin
