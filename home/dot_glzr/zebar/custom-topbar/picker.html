<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    ::-webkit-scrollbar { display: none; }

    body {
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--fg, #c1c1c1);
      font-family: "DepartureMono Nerd Font", "Departure Mono",
                   "JetBrainsMono Nerd Font", "Cascadia Code", Menlo, monospace;
      font-size: 14px;
      user-select: none;
      background: rgba(0, 0, 0, 0.4);
    }
    body.open { display: flex; }

    /* The whole panel mirrors the topbar's square 3x3 matrix: square cells,
       so the grid itself is a square; text inside ellipsizes, never widens. */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: min(58vh, 620px, 90vw);
      padding: 12px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--bg, #000) 88%, transparent);
      border: 1px solid color-mix(in srgb, var(--fg, #c1c1c1) 14%, transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .cell {
      display: flex;
      flex-direction: column;
      gap: 3px;
      aspect-ratio: 1;
      min-width: 0;
      overflow-y: auto;
      padding: 7px;
      border-radius: 8px;
      background: color-mix(in srgb, var(--fg, #c1c1c1) 5%, transparent);
      border: 1px solid transparent;
      cursor: pointer;
    }
    .cell.displayed { border-color: color-mix(in srgb, var(--fg, #c1c1c1) 22%, transparent); }
    .cell.focused   { border-color: color-mix(in srgb, var(--accent, #7799bb) 55%, transparent); }

    .cell-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0 4px 4px;
      opacity: 0.55;
      font-size: 12px;
    }
    .cell.focused .cell-head { opacity: 0.9; color: var(--accent, #7799bb); }
    .cell-head .num { font-weight: bold; }

    .win {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 6px;
      border-radius: 5px;
      min-width: 0;
      flex: none;
      cursor: pointer;
      font-size: 12px;
    }
    .win .proc {
      flex: 0 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .win .title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      opacity: 0.5;
      font-size: 11px;
    }
    .win .tag { flex: none; opacity: 0.4; font-size: 11px; }
    .win.minimized { opacity: 0.55; }
    .win.active .proc { color: var(--green, #a1c181); }
    .win.selected {
      background: color-mix(in srgb, var(--accent, #7799bb) 28%, transparent);
      opacity: 1;
    }

    .empty { padding: 4px 7px; opacity: 0.25; font-size: 12px; }

    .hint {
      display: flex;
      justify-content: center;
      gap: 18px;
      font-size: 11px;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="grid" id="grid"></div>
    <div class="hint">
      <span>↑↓←→/hjkl move</span><span>tab cycle</span><span>1-9 workspace</span>
      <span>enter focus</span><span>esc close</span>
    </div>
  </div>

  <script>
    // App picker overlay (alt+tab): a big 3x3 workspace matrix mirroring the
    // topbar dots, each cell listing that workspace's windows.
    //
    // The widget runs permanently (zebar startup) but stays hidden. It never
    // takes keyboard focus — a background process can't reliably steal the
    // foreground on Windows. Instead alt+tab enters the 'picker' GlazeWM binding
    // mode, so GlazeWM owns the keys: navigation keys pulse transient
    // 'picker-<action>' modes purely as IPC signals, which this widget observes
    // via a binding_modes_changed subscription. Enter focuses the selection over
    // IPC; leaving the mode (escape / after enter) hides the overlay again.
    const invoke = window.__TAURI_INTERNALS__?.invoke;
    const winCall = (cmd, args) =>
      invoke?.(`plugin:window|${cmd}`, args)?.catch?.(() => {});

    // Always-on ring buffer of what the picker did — readable over CDP when
    // debugging "it didn't jump" reports without re-instrumenting.
    const trace = (...a) => {
      window.__trace = window.__trace || [];
      window.__trace.push([new Date().toISOString().slice(11, 23), ...a].join(' '));
      if (window.__trace.length > 200) window.__trace.shift();
    };

    // Hidden until the picker mode enables; the window itself stays around so
    // opening is instant. Ignore cursor events while hidden — the transparent
    // fullscreen window must not eat clicks meant for what's underneath.
    winCall('hide');
    winCall('set_ignore_cursor_events', { ignore: true });

    let open = false;
    const showOverlay = () => {
      if (open) return;
      open = true;
      trace('showOverlay');
      document.body.classList.add('open');
      winCall('set_ignore_cursor_events', { ignore: false });
      winCall('show');
      // Re-assert top-most on every show (zebar's own command, same as the
      // topbar's zOrder handling): hide/show cycles and other top-most or
      // fullscreen windows can push us down the z-band — the overlay must
      // never sit behind other programs.
      invoke?.('set_always_on_top')?.catch?.(() => {});
    };
    const hideOverlay = () => {
      if (!open) return;
      open = false;
      trace('hideOverlay');
      document.body.classList.remove('open');
      winCall('set_ignore_cursor_events', { ignore: true });
      winCall('hide');
      reassertFocus();
    };

    // A mouse click on the overlay makes it the OS foreground window; hiding it
    // then leaves the foreground on a hidden window — keystrokes go nowhere and
    // GlazeWM's state disagrees with the OS. After every hide, hand the
    // foreground back to whatever GlazeWM considers focused (a no-op when the
    // overlay was never clicked, since glazewm re-runs its focus routine).
    async function reassertFocus() {
      try {
        const q = await send('query focused');
        if (q?.focused?.type === 'window') {
          await send(`command focus --container-id ${q.focused.id}`);
          trace('reassertFocus', q.focused.processName);
        }
      } catch {}
    }
    const exitPicker = () => {
      // Hide immediately for snappiness; the mode-disable event confirms it.
      send('command wm-disable-binding-mode --name picker').catch(() => {});
      hideOverlay();
    };

    // --- GlazeWM IPC (same protocol as regrid.js / balance-daemon.js) ---
    const pending = new Map();
    let sock = null;
    let prevModes = [];

    function send(message) {
      return new Promise((resolve, reject) => {
        if (sock?.readyState !== WebSocket.OPEN) return reject(new Error('closed'));
        let key = message;
        while (pending.has(key)) key += ' ';
        const timer = setTimeout(() => {
          pending.delete(key);
          reject(new Error('timeout'));
        }, 4000);
        pending.set(key, { resolve, reject, timer });
        sock.send(key);
      });
    }

    function connect() {
      sock = new WebSocket('ws://localhost:6123');
      sock.onopen = async () => {
        try {
          await send('sub --events binding_modes_changed');
          // Catch up in case the mode was entered while we were down/restarting.
          const q = await send('query binding-modes');
          onModes((q?.bindingModes || []).map(m => m.name ?? m));
        } catch {}
      };
      sock.onmessage = ev => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.messageType === 'client_response') {
          const entry = pending.get(msg.clientMessage);
          if (!entry) return;
          pending.delete(msg.clientMessage);
          clearTimeout(entry.timer);
          msg.success ? entry.resolve(msg.data) : entry.reject(new Error(msg.error || 'failed'));
        } else if (msg.data?.eventType === 'binding_modes_changed') {
          onModes((msg.data.newBindingModes || []).map(m => m.name ?? m));
        }
      };
      sock.onclose = () => {
        hideOverlay();
        for (const e of pending.values()) { clearTimeout(e.timer); e.reject(new Error('closed')); }
        pending.clear();
        setTimeout(connect, 1000);
      };
      sock.onerror = () => { try { sock.close(); } catch {} };
    }
    connect();

    function onModes(modes) {
      const fresh = modes.filter(m => !prevModes.includes(m));
      prevModes = modes;
      if (fresh.length || !modes.length) trace('modes', JSON.stringify(modes));
      // Binding modes replace each other, so during a signal pulse the base
      // 'picker' mode is briefly absent — any picker* mode counts as open.
      if (!modes.some(m => m.startsWith('picker'))) return hideOverlay();
      for (const m of fresh) {
        // The enter keybinding re-enters 'picker' right after its signal; while
        // an activation is in flight that must not re-open the overlay.
        if (m === 'picker') { if (!open && !activating) openPicker(); }
        else if (m === 'picker-down') moveVertical(1);
        else if (m === 'picker-up') moveVertical(-1);
        else if (m === 'picker-left') moveCell(0, -1, len => Math.min(sel?.idx ?? 0, len - 1));
        else if (m === 'picker-right') moveCell(0, 1, len => Math.min(sel?.idx ?? 0, len - 1));
        else if (m === 'picker-next') moveFlat(1);
        else if (m === 'picker-prev') moveFlat(-1);
        else if (m === 'picker-enter') confirm();
        else if (/^picker-[1-9]$/.test(m)) pickCell(Number(m.slice(7)) - 1);
      }
    }

    function collectWindows(node, out) {
      if (!node) return;
      if (node.type === 'window') out.push(node);
      (node.children || []).forEach(c => collectWindows(c, out));
    }

    // --- state ---
    const NAMES = ['1','2','3','4','5','6','7','8','9'];
    // cells[i] = { name, wins, displayed, focused }; sel = { cell, idx } into cells.
    let cells = NAMES.map(name => ({ name, wins: [], displayed: false, focused: false }));
    let sel = null;

    async function openPicker() {
      try {
        const data = await send('query workspaces');
        const byName = new Map((data?.workspaces || []).map(w => [w.name, w]));
        cells = NAMES.map(name => {
          const ws = byName.get(name);
          const wins = [];
          collectWindows(ws, wins);
          return {
            name,
            wins,
            displayed: !!ws?.isDisplayed,
            focused: !!ws && (ws.hasFocus || wins.some(w => w.hasFocus)),
          };
        });
      } catch {
        return exitPicker();
      }

      // The mode can be exited (escape / alt+tab again) while the query above
      // was in flight — showing now would strand a keyboard-less overlay over
      // the whole screen.
      if (!prevModes.some(m => m.startsWith('picker'))) {
        trace('openPicker aborted, mode gone');
        return;
      }

      // Start on the window after the currently focused one, so alt+tab, enter
      // hops to the next window — like a classic switcher.
      const f = flat();
      const cur = f.findIndex(e => e.w.hasFocus);
      const start = f.length ? f[(cur + 1) % f.length] : null;
      sel = start ? { cell: start.cell, idx: start.idx } : null;
      buildGrid();
      showOverlay();
    }

    const grid = document.getElementById('grid');
    let rowEls = [];

    const esc = s => (s ?? '').replace(/[&<>"]/g,
      c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    // Built ONCE per open. Selection changes must only toggle classes — a
    // rebuild here destroys the element under the cursor, which re-fires
    // mouseenter on its replacement in an endless loop and leaves real clicks
    // hitting orphaned nodes instead of the row handlers.
    function buildGrid() {
      rowEls = cells.map(() => []);
      grid.replaceChildren(...cells.map((cell, ci) => {
        const el = document.createElement('div');
        el.className = 'cell'
          + (cell.displayed ? ' displayed' : '')
          + (cell.focused ? ' focused' : '');
        el.onmousedown = e => e.stopPropagation();
        el.onclick = () => activateWorkspace(cell.name);

        const head = document.createElement('div');
        head.className = 'cell-head';
        head.innerHTML = `<span class="num">${cell.name}</span>`;
        el.append(head);

        if (!cell.wins.length) {
          const e2 = document.createElement('div');
          e2.className = 'empty';
          e2.textContent = 'empty';
          el.append(e2);
        }

        cell.wins.forEach((w, wi) => {
          const row = document.createElement('div');
          const st = w.state?.type;
          row.className = 'win'
            + (st === 'minimized' ? ' minimized' : '')
            + (w.hasFocus ? ' active' : '');
          const tag = st === 'minimized' ? 'min'
                    : st === 'fullscreen' ? 'full'
                    : st === 'floating' ? 'float' : '';
          row.innerHTML =
            `<span class="proc">${esc(w.processName)}</span>` +
            `<span class="title">${esc(w.title)}</span>` +
            (tag ? `<span class="tag">${tag}</span>` : '');
          row.onmouseenter = () => {
            if (sel?.cell !== ci || sel?.idx !== wi) { sel = { cell: ci, idx: wi }; updateSel(); }
          };
          row.onclick = e => { e.stopPropagation(); activateWindow(w); };
          rowEls[ci][wi] = row;
          el.append(row);
        });
        return el;
      }));
      updateSel();
    }

    function updateSel() {
      grid.querySelectorAll('.win.selected')
        .forEach(el => el.classList.remove('selected'));
      const el = sel && rowEls[sel.cell]?.[sel.idx];
      if (el) {
        el.classList.add('selected');
        // Square cells can overflow; keep the selection in view.
        el.scrollIntoView({ block: 'nearest' });
      }
    }

    // --- selection movement over the 3x3 grid ---
    const flat = () =>
      cells.flatMap((c, ci) => c.wins.map((w, wi) => ({ cell: ci, idx: wi, w })));

    function moveFlat(step) {
      const f = flat();
      if (!f.length) return;
      const cur = f.findIndex(e => sel && e.cell === sel.cell && e.idx === sel.idx);
      const next = f[((cur < 0 ? 0 : cur + step) + f.length) % f.length];
      sel = { cell: next.cell, idx: next.idx };
      updateSel();
    }

    // Step cell-wise through the grid (wrapping), skipping workspaces with no
    // windows; pick keeps the vertical position sensible per direction.
    function moveCell(dr, dc, pick) {
      if (!sel) return moveFlat(1);
      let r = Math.floor(sel.cell / 3), c = sel.cell % 3;
      for (let i = 0; i < 3; i++) {
        r = (r + dr + 3) % 3;
        c = (c + dc + 3) % 3;
        const cell = r * 3 + c;
        if (cells[cell].wins.length) {
          sel = { cell, idx: pick(cells[cell].wins.length) };
          updateSel();
          return;
        }
      }
    }

    function moveVertical(dir) {
      if (!sel) return moveFlat(1);
      const next = sel.idx + dir;
      if (next >= 0 && next < cells[sel.cell].wins.length) {
        sel = { cell: sel.cell, idx: next };
        updateSel();
      } else {
        moveCell(dir, 0, len => (dir > 0 ? 0 : len - 1));
      }
    }

    function pickCell(ci) {
      if (!cells[ci].wins.length) return activateWorkspace(NAMES[ci]);
      // Repeated presses of the same digit cycle through that workspace's windows.
      const idx = sel?.cell === ci ? (sel.idx + 1) % cells[ci].wins.length : 0;
      sel = { cell: ci, idx };
      updateSel();
    }

    // --- actions ---
    function confirm() {
      const w = sel && cells[sel.cell].wins[sel.idx];
      w ? activateWindow(w) : exitPicker();
    }

    // Activation ordering is delicate. Hiding the OS window first makes Windows
    // re-activate the previously focused app, and that event reaches GlazeWM
    // AFTER our focus command, overriding the jump; a hidden webview also gets
    // its timers throttled. So: vanish only VISUALLY (CSS + click-through, the
    // OS window stays shown so nothing re-activates and JS keeps running), send
    // the focus, and only then actually hide via exitPicker.
    let activating = false;

    async function activateWindow(w) {
      activating = true;
      trace('activateWindow', w.processName, w.id, w.state?.type);
      document.body.classList.remove('open');
      winCall('set_ignore_cursor_events', { ignore: true });
      try {
        // Restore minimized windows straight into the tiling grid (same verb as
        // regrid.js) — toggle-minimized can resurface them as floating.
        if (w.state?.type === 'minimized') await send(`command --id ${w.id} set-tiling`);
        await send(`command focus --container-id ${w.id}`);
        trace('focus ok', w.id);
      } catch (e) {
        trace('focus FAILED', String(e));
      }
      exitPicker();
      activating = false;
    }

    async function activateWorkspace(name) {
      activating = true;
      trace('activateWorkspace', name);
      document.body.classList.remove('open');
      winCall('set_ignore_cursor_events', { ignore: true });
      try { await send(`command focus --workspace ${name}`); } catch (e) { trace('ws focus FAILED', String(e)); }
      exitPicker();
      activating = false;
    }

    // Click on the backdrop (outside the panel) closes.
    document.addEventListener('mousedown', e => {
      if (open && !document.getElementById('panel').contains(e.target)) exitPicker();
    });

    // Self-healing watchdog: whatever races the async show/hide calls lose,
    // converge to a consistent state — closed means hidden AND click-through
    // (a stuck fullscreen window silently eats every click on the desktop),
    // and an overlay without an active picker mode has no keyboard, so close it.
    setInterval(() => {
      if (!open) {
        winCall('hide');
        winCall('set_ignore_cursor_events', { ignore: true });
      } else if (!activating && !prevModes.some(m => m.startsWith('picker'))) {
        trace('watchdog: open without mode');
        hideOverlay();
      }
    }, 2000);
  </script>
</body>
</html>
