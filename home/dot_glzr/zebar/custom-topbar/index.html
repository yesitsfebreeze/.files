<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    ::-webkit-scrollbar { display: none; }

    body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      box-sizing: border-box;
      color: var(--fg, #c1c1c1);
      font-family: "DepartureMono Nerd Font", "Departure Mono",
                   "JetBrainsMono Nerd Font", "Cascadia Code", Menlo, monospace;
      font-size: 16px;
      user-select: none;
      transition: opacity 0.18s ease;
      display: flex;
      align-items: center;
      margin: 0 12px;
    }

    body.reveal-on-hover.at-top { opacity: 0; }

    .left  { display: flex; align-items: center; gap: 6px; flex: none; }
    .right { display: flex; align-items: center; gap: 6px; min-width: 0; }

    .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      height: 26px;
      box-sizing: border-box;
      border-radius: 6px;
      background: color-mix(in srgb, var(--bg, #000) 82.1%, transparent);
     }

    .tray { gap: 8px; }
    .tray:empty { display: none; }
    .tray img {
      width: 13px; height: 13px; display: block; cursor: pointer;
      filter: brightness(0) invert(1);
      opacity: 0.5;
    }

    /* Workspaces render as a 3x3 grid (row-major 1-9): the cell's position IS the
       number, so cells are bare swatches. Same states as before, mapped to opacity;
       the focused cell takes the accent. Tighter bubble padding (2px) buys 22px of
       inner height so the grid fits the 26px bubble: 3*6px cells + 2*2px gaps. */
    .wsbox { padding: 2px 8px; }
    .workspaces {
      display: grid;
      grid-template-columns: repeat(3, 6px);
      grid-auto-rows: 6px;
      gap: 2px;
    }
    .ws {
      position: relative;
      border: 0; padding: 0;
      border-radius: 2px;
      background: currentColor;
      opacity: 0.25; cursor: pointer;
      transition-property: opacity, background-color;
      transition-duration: 0.15s;
    }
    /* Cells are 6px; pad the hit target out to the gap midline so clicks land. */
    .ws::after { content: ''; position: absolute; inset: -1px; }
    .ws.populated { opacity: 0.5; }
    .ws.displayed { opacity: 0.75; }
    .ws:hover     { opacity: 0.9; }
    .ws.focused   { opacity: 1; background: var(--accent, #7799bb); }

    .stats { flex: none; }
    .stat { display: flex; align-items: baseline; gap: 5px; }
    .stat .lbl { opacity: 0.5; }
    .stat .val { font-variant-numeric: tabular-nums; }

    .clockbox { flex: none; }
    .clock { font-variant-numeric: tabular-nums; }
    .date  { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="left">
    <div class="bubble wsbox">
      <div class="workspaces" id="workspaces"></div>
    </div>
    <div class="bubble tray" id="tray"></div>
  </div>

  <div class="right">
    <div class="bubble stats" id="stats"></div>
    <div class="bubble clockbox">
      <span class="clock" id="clock"></span>
      <span class="date" id="date"></span>
    </div>
  </div>

  <script type="module">
    import * as zebar from 'https://esm.sh/zebar@3.0';

    if (!navigator.userAgent.includes('Windows')) {
      document.body.classList.add('reveal-on-hover');

      const inv = window.__TAURI_INTERNALS__?.invoke;
      const winCall = (cmd, args) =>
        inv?.(`plugin:window|${cmd}`, args)?.catch?.(() => {});
      // Reveal-on-hover: when the cursor enters the bar we go click-through so the
      // native (auto-hidden) menu bar beneath reveals on hover. Zebar grants the
      // set_ignore_cursor_events capability, so this is reliable on macOS.
      //
      // We deliberately do NOT hide the whole window as a fallback: macOS suspends a
      // hidden webview's timers (window occlusion / App Nap), which freezes the cursor
      // poll below — so once hidden the bar never un-hides and vanishes for good.
      // Opacity + click-through keeps the window shown so the poll keeps running.
      const setClickThrough = on => winCall('set_ignore_cursor_events', { ignore: on });

      let faded = false;
      const fade = () => {
        if (faded) return;
        faded = true;
        document.body.classList.add('at-top');
        setClickThrough(true);
      };
      const show = () => {
        if (!faded) return;
        faded = false;
        document.body.classList.remove('at-top');
        setClickThrough(false);
      };

      if (inv) {
        const barPx = () =>
          Math.round(window.innerHeight * window.devicePixelRatio) || 80;
        let rect = null, n = 0;
        const refreshRect = async () => {
          const [p, s] = await Promise.all([
            inv('plugin:window|outer_position'),
            inv('plugin:window|outer_size'),
          ]);
          rect = { x: p.x, y: p.y, w: s.width, h: s.height };
        };
        setInterval(async () => {
          try {
            // The docked geometry is static, so cache it; re-measure periodically to
            // catch monitor / resolution changes. (The window is always shown now, so
            // the rect is never stale — no need to gate this on the faded state.)
            if (!rect || n++ % 25 === 0) await refreshRect();
            if (!rect) return;
            const c = await inv('plugin:window|cursor_position');
            const band = Math.min(rect.h, barPx());
            const over = c.x >= rect.x && c.x <= rect.x + rect.w &&
                         c.y >= rect.y && c.y <= rect.y + band;
            over ? fade() : show();
          } catch {
            // Never get stuck click-through: if a poll throws while faded, fail safe
            // to shown so the bar stays visible and interactive.
            if (faded) show();
          }
        }, 100);
      } else {
        let idle;
        document.addEventListener('mousemove', e => {
          clearTimeout(idle);
          e.clientY <= 30 ? fade() : show();
          idle = setTimeout(show, 1200);
        });
        document.addEventListener('mouseleave', show);
      }
    }

    const providers = zebar.createProviderGroup({
      glazewm: { type: 'glazewm' },
      systray: { type: 'systray' },
      cpu:     { type: 'cpu',     refreshInterval: 2000 },
      memory:  { type: 'memory',  refreshInterval: 5000 },
      network: { type: 'network', refreshInterval: 2000 },
      battery: { type: 'battery', refreshInterval: 10000 },
      clock:   { type: 'date', formatting: 'HH:mm' },
      cal:     { type: 'date', formatting: 'EEE, MMM d' },
    });

    const WORKSPACES = ['1','2','3','4','5','6','7','8','9'];

    const workspacesEl = document.getElementById('workspaces');
    const trayEl = document.getElementById('tray');
    const statsEl = document.getElementById('stats');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');

    const wsButtons = WORKSPACES.map(name => {
      const b = document.createElement('button');
      b.className = 'ws';
      b.title = `Workspace ${name}`;
      b.onclick = () =>
        providers.outputMap.glazewm?.runCommand(`focus --workspace ${name}`);
      return b;
    });
    workspacesEl.replaceChildren(...wsButtons);

    const stat = (lbl, val) =>
      `<span class="stat"><span class="lbl">${lbl}</span><span class="val">${val}</span></span>`;
    const rate = t => t ? `${t.siValue.toFixed(1)}${t.siUnit}` : '--';

    providers.onOutput(() => {
      const { glazewm, systray, cpu, memory, network, battery, clock, cal } =
        providers.outputMap;

      if (systray) {
        trayEl.replaceChildren(
          ...systray.icons.map(icon => {
            const img = document.createElement('img');
            img.src = icon.iconUrl;
            img.title = icon.tooltip ?? '';
            img.onclick = () => systray.onLeftClick(icon.id);
            img.oncontextmenu = e => {
              e.preventDefault();
              systray.onRightClick(icon.id);
            };
            return img;
          }),
        );
      }

      if (glazewm) {
        const byName = new Map(
          glazewm.currentWorkspaces.map(ws => [ws.name, ws]),
        );
        wsButtons.forEach((b, i) => {
          const ws = byName.get(WORKSPACES[i]);
          b.className =
            'ws' +
            (ws ? ' populated' : '') +
            (ws?.hasFocus ? ' focused' : '') +
            (ws?.isDisplayed ? ' displayed' : '');
        });
      }

      const parts = [];
      if (cpu) parts.push(stat('CPU', `${cpu.usage.toFixed(0)}%`));
      if (memory) parts.push(stat('RAM', `${memory.usage.toFixed(0)}%`));
      if (network?.traffic) {
        parts.push(stat('↓', rate(network.traffic.received)));
        parts.push(stat('↑', rate(network.traffic.transmitted)));
      }
      if (battery && battery.chargePercent != null) {
        const t = battery.isCharging
          ? battery.timeTillFull
          : battery.timeTillEmpty;
        const eta = t != null ? ` ${Math.round(t / 60000)}m` : '';
        const icon = battery.isCharging ? '⚡' : '';
        parts.push(stat('BAT', `${icon}${battery.chargePercent.toFixed(0)}%${eta}`));
      }
      statsEl.innerHTML = parts.join('');

      if (clock) clockEl.textContent = clock.formatted;
      if (cal) dateEl.textContent = cal.formatted;
    });
  </script>
</body>
</html>
