<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Theme palette generated from the active tinty scheme by
       ~/.config/tinted-theming/tinty/zebar-colors.sh — defines --bg/--fg/etc.
       so the bar matches the terminal. -->
  <link rel="stylesheet" href="./theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    /* No scrollbar — a webview scrollbar would inset the right edge and make
       the left/right padding look unequal. */
    ::-webkit-scrollbar { display: none; }

    body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;                          /* = GlazeWM inner_gap */
      padding: 0 11px;                    /* = GlazeWM outer_gap sides (12px) */
      background: transparent;            /* only the bubbles are tinted */
      color: var(--fg, #c1c1c1);
      /* Same font stack as the terminal (wezterm.lua). */
      font-family: "DepartureMono Nerd Font", "Departure Mono",
                   "JetBrainsMono Nerd Font", "Cascadia Code", Menlo, monospace;
      font-size: 18px;                    /* 1.5x the terminal's 12px */
      user-select: none;
      transition: opacity 0.18s ease;
    }

    /* macOS only (toggled by the reveal-on-hover class in JS): the menu bar is
       auto-hidden and slides down when the cursor reaches the top edge — exactly
       where this bar sits. Fade the bar out while the cursor is at the top so the
       two don't overlap; it fades back when the cursor leaves. Driven by JS
       pointer tracking (see below), NOT CSS :hover — a Zebar overlay window is
       non-focused and doesn't reliably deliver :hover/mouseleave, which can leave
       the bar stuck invisible. Not applied on Windows. */
    body.reveal-on-hover.at-top { opacity: 0; }

    .left  { display: flex; align-items: center; gap: 12px; flex: none; }
    .right { display: flex; align-items: center; gap: 12px; min-width: 0; }

    /* A bubble: the tinty background at WezTerm's window opacity (0.821), so the bar
       shares the terminal's exact translucent background. Corner radius + padding
       match GlazeWM's windows so the UI reads as one system. */
    .bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 2.5px 6px;
      box-sizing: border-box;
      border-radius: 4px;                 /* half the GlazeWM/Win11 window corner */
      background: color-mix(in srgb, var(--bg, #000) 82.1%, transparent);
    }
    /* System tray: the Windows tray icons, rendered as their native bitmaps. */
    .tray { gap: 8px; }
    .tray:empty { display: none; }
    /* brightness(0) crushes the icon to a black silhouette, invert(1) flips it
       to a flat white one — normalizes the tray's mixed-color icons. */
    .tray img {
      width: 16px; height: 16px; display: block; cursor: pointer;
      filter: brightness(0) invert(1);
    }

    /* Workspace buttons 1-9, always present so alt+1..9 has a fixed target.
       Empty workspaces are dimmest, populated ones brighter, focused accented. */
    .ws {
      border: 0; background: transparent; color: inherit; font: inherit;
      padding: 0 2px; opacity: 0.25; cursor: pointer;
    }
    .ws.populated { opacity: 0.5; }
    .ws.displayed { opacity: 0.75; }
    .ws.focused   { opacity: 1; color: var(--accent, #7799bb); }

    /* A labelled stat: dim label, tabular value so widths don't jitter. */
    .stats { flex: none; }
    .stat { display: flex; align-items: baseline; gap: 5px; }
    .stat .lbl { opacity: 0.5; font-size: 14px; }
    .stat .val { font-variant-numeric: tabular-nums; }

    .clockbox { flex: none; }
    .clock { font-variant-numeric: tabular-nums; }
    .date  { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="left">
    <div class="bubble">
      <div class="workspaces" id="workspaces"></div>
    </div>
    <div class="bubble tray" id="tray"></div>
  </div>

  <div class="right">
    <div class="bubble stats" id="stats"></div>
    <div class="bubble clockbox">
      <span class="clock" id="clock"></span>
      <span class="date" id="date"></span>
    </div>
  </div>

  <script type="module">
    import * as zebar from 'https://esm.sh/zebar@3.0';

    // macOS auto-hides its menu bar and reveals it when the cursor hits the very
    // top edge, where this bar sits — fade the bar out there so the two don't
    // clash. Driven by explicit pointer tracking, not CSS :hover: a Zebar overlay
    // is a non-focused window that doesn't reliably deliver mouseleave, so :hover
    // can get stuck on and pin the bar invisible. We fade ONLY while the cursor is
    // in the top few px (the menu-bar reveal zone) — so buttons/clock stay solid
    // and usable — and an idle timer always restores the bar, so it can never get
    // stuck hidden. Windows has no such menu bar, so it's left solid there.
    if (!navigator.userAgent.includes('Windows')) {
      document.body.classList.add('reveal-on-hover');
      const TOP_ZONE = 30;         // px from top that fades — covers the menu-bar
                                   // strip so it stays faded while you use it
      let idle;
      const show = () => document.body.classList.remove('at-top');
      document.addEventListener('mousemove', e => {
        clearTimeout(idle);
        if (e.clientY <= TOP_ZONE) document.body.classList.add('at-top');
        else show();
        idle = setTimeout(show, 1500);   // safety: never stay hidden
      });
      document.addEventListener('mouseleave', show);
    }

    const providers = zebar.createProviderGroup({
      glazewm: { type: 'glazewm' },
      systray: { type: 'systray' },
      cpu:     { type: 'cpu',     refreshInterval: 2000 },
      memory:  { type: 'memory',  refreshInterval: 5000 },
      network: { type: 'network', refreshInterval: 2000 },
      battery: { type: 'battery', refreshInterval: 10000 },
      clock:   { type: 'date', formatting: 'HH:mm' },
      cal:     { type: 'date', formatting: 'EEE, MMM d' },
    });

    const WORKSPACES = ['1','2','3','4','5','6','7','8','9'];

    const workspacesEl = document.getElementById('workspaces');
    const trayEl = document.getElementById('tray');
    const statsEl = document.getElementById('stats');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');

    // Build the 9 workspace buttons once, up front, so the bubble is never
    // empty even before GlazeWM emits. onOutput only updates their state.
    const wsButtons = WORKSPACES.map(name => {
      const b = document.createElement('button');
      b.className = 'ws';
      b.textContent = name;
      b.onclick = () =>
        providers.outputMap.glazewm?.runCommand(`focus --workspace ${name}`);
      return b;
    });
    workspacesEl.replaceChildren(...wsButtons);

    const stat = (lbl, val) =>
      `<span class="stat"><span class="lbl">${lbl}</span><span class="val">${val}</span></span>`;
    const rate = t => t ? `${t.siValue.toFixed(1)}${t.siUnit}` : '--';

    providers.onOutput(() => {
      const { glazewm, systray, cpu, memory, network, battery, clock, cal } =
        providers.outputMap;

      if (systray) {
        trayEl.replaceChildren(
          ...systray.icons.map(icon => {
            const img = document.createElement('img');
            img.src = icon.iconUrl;
            img.title = icon.tooltip ?? '';
            img.onclick = () => systray.onLeftClick(icon.id);
            img.oncontextmenu = e => {
              e.preventDefault();
              systray.onRightClick(icon.id);
            };
            return img;
          }),
        );
      }

      if (glazewm) {
        const byName = new Map(
          glazewm.currentWorkspaces.map(ws => [ws.name, ws]),
        );
        wsButtons.forEach((b, i) => {
          const ws = byName.get(WORKSPACES[i]);
          b.className =
            'ws' +
            (ws ? ' populated' : '') +
            (ws?.hasFocus ? ' focused' : '') +
            (ws?.isDisplayed ? ' displayed' : '');
        });
      }

      const parts = [];
      if (cpu) parts.push(stat('CPU', `${cpu.usage.toFixed(0)}%`));
      if (memory) parts.push(stat('RAM', `${memory.usage.toFixed(0)}%`));
      if (network?.traffic) {
        parts.push(stat('↓', rate(network.traffic.received)));
        parts.push(stat('↑', rate(network.traffic.transmitted)));
      }
      if (battery && battery.chargePercent != null) {
        const t = battery.isCharging
          ? battery.timeTillFull
          : battery.timeTillEmpty;
        const eta = t != null ? ` ${Math.round(t / 60000)}m` : '';
        const icon = battery.isCharging ? '⚡' : '';
        parts.push(stat('BAT', `${icon}${battery.chargePercent.toFixed(0)}%${eta}`));
      }
      statsEl.innerHTML = parts.join('');

      if (clock) clockEl.textContent = clock.formatted;
      if (cal) dateEl.textContent = cal.formatted;
    });
  </script>
</body>
</html>
