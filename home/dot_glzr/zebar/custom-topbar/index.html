<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Theme palette generated from the active tinty scheme by
       ~/.config/tinted-theming/tinty/zebar-colors.sh — defines --bg/--fg/etc.
       so the bar matches the terminal. -->
  <link rel="stylesheet" href="./theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    /* No scrollbar — a webview scrollbar would inset the right edge and make
       the left/right padding look unequal. */
    ::-webkit-scrollbar { display: none; }

    body {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;                          /* = GlazeWM inner_gap */
      padding: 0 22px;                    /* = 2x GlazeWM outer_gap sides (12px) */
      background: transparent;            /* only the bubbles are tinted */
      color: var(--fg, #c1c1c1);
      /* Same font stack as the terminal (wezterm.lua). */
      font-family: "DepartureMono Nerd Font", "Departure Mono",
                   "JetBrainsMono Nerd Font", "Cascadia Code", Menlo, monospace;
      font-size: 18px;                    /* 1.5x the terminal's 12px */
      user-select: none;
    }

    .right { display: flex; align-items: center; gap: 12px; min-width: 0; }

    /* A bubble: the tinty background at golden-ratio (0.618) opacity. Corner
       radius + padding match GlazeWM's windows so the UI reads as one system. */
    .bubble {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 12px;
      box-sizing: border-box;
      border-radius: 4px;                 /* half the GlazeWM/Win11 window corner */
      background: color-mix(in srgb, var(--bg, #000) 61.8%, transparent);
    }
    .left { flex: none; }

    /* Workspace buttons 1-9, always present so alt+1..9 has a fixed target.
       Empty workspaces are dimmest, populated ones brighter, focused accented. */
    .ws {
      border: 0; background: transparent; color: inherit; font: inherit;
      padding: 0 2px; opacity: 0.25; cursor: pointer;
    }
    .ws.populated { opacity: 0.5; }
    .ws.displayed { opacity: 0.75; }
    .ws.focused   { opacity: 1; color: var(--accent, #7799bb); }

    /* Running-window taskbar: shrinks and clips before it would push the
       clock off the right edge. */
    .taskbar { min-width: 0; overflow: hidden; }
    .taskbar:empty { display: none; }
    .task {
      border: 0; background: transparent; color: inherit; font: inherit;
      display: flex; align-items: center; gap: 6px;
      max-width: 160px; padding: 0 2px;
      opacity: 0.6; cursor: pointer; white-space: nowrap;
    }
    .task.active { opacity: 1; color: var(--accent, #7799bb); }
    .task .name { overflow: hidden; text-overflow: ellipsis; }

    /* A labelled stat: dim label, tabular value so widths don't jitter. */
    .stats { flex: none; }
    .stat { display: flex; align-items: baseline; gap: 5px; }
    .stat .lbl { opacity: 0.5; font-size: 14px; }
    .stat .val { font-variant-numeric: tabular-nums; }

    .clockbox { flex: none; }
    .clock { font-variant-numeric: tabular-nums; }
    .date  { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="bubble left">
    <div class="workspaces" id="workspaces"></div>
  </div>

  <div class="right">
    <div class="bubble taskbar" id="taskbar"></div>
    <div class="bubble stats" id="stats"></div>
    <div class="bubble clockbox">
      <span class="clock" id="clock"></span>
      <span class="date" id="date"></span>
    </div>
  </div>

  <script type="module">
    import * as zebar from 'https://esm.sh/zebar@3.0';

    const providers = zebar.createProviderGroup({
      glazewm: { type: 'glazewm' },
      cpu:     { type: 'cpu',     refreshInterval: 2000 },
      memory:  { type: 'memory',  refreshInterval: 5000 },
      network: { type: 'network', refreshInterval: 2000 },
      battery: { type: 'battery', refreshInterval: 10000 },
      clock:   { type: 'date', formatting: 'HH:mm' },
      cal:     { type: 'date', formatting: 'EEE, MMM d' },
    });

    const WORKSPACES = ['1','2','3','4','5','6','7','8','9'];

    const workspacesEl = document.getElementById('workspaces');
    const taskbarEl = document.getElementById('taskbar');
    const statsEl = document.getElementById('stats');
    const clockEl = document.getElementById('clock');
    const dateEl = document.getElementById('date');

    const stat = (lbl, val) =>
      `<span class="stat"><span class="lbl">${lbl}</span><span class="val">${val}</span></span>`;
    const rate = t => t ? `${t.siValue.toFixed(1)}${t.siUnit}` : '--';

    // Walk a GlazeWM container tree, collecting every window leaf.
    const collectWindows = (node, out) => {
      if (!node) return out;
      if (node.type === 'window') out.push(node);
      for (const child of node.children ?? []) collectWindows(child, out);
      return out;
    };

    providers.onOutput(() => {
      const { glazewm, cpu, memory, network, battery, clock, cal } =
        providers.outputMap;

      if (glazewm) {
        const byName = new Map(
          glazewm.currentWorkspaces.map(ws => [ws.name, ws]),
        );
        workspacesEl.replaceChildren(
          ...WORKSPACES.map(name => {
            const ws = byName.get(name);
            const b = document.createElement('button');
            b.className =
              'ws' +
              (ws ? ' populated' : '') +
              (ws?.hasFocus ? ' focused' : '') +
              (ws?.isDisplayed ? ' displayed' : '');
            b.textContent = name;
            b.onclick = () => glazewm.runCommand(`focus --workspace ${name}`);
            return b;
          }),
        );

        // Taskbar: windows on the displayed workspace of this monitor.
        const shown = glazewm.displayedWorkspace ?? glazewm.focusedWorkspace;
        const focusedId = glazewm.focusedContainer?.id;
        const windows = collectWindows(shown, []);
        taskbarEl.replaceChildren(
          ...windows.map(win => {
            const b = document.createElement('button');
            b.className = 'task' + (win.id === focusedId ? ' active' : '');
            const label = win.processName || win.title || '?';
            b.innerHTML = `<span class="name">${label}</span>`;
            b.title = win.title ?? label;
            b.onclick = () => glazewm.runCommand('focus', win.id).catch(() => {});
            return b;
          }),
        );
      }

      const parts = [];
      if (cpu) parts.push(stat('CPU', `${cpu.usage.toFixed(0)}%`));
      if (memory) parts.push(stat('RAM', `${memory.usage.toFixed(0)}%`));
      if (network?.traffic) {
        parts.push(stat('↓', rate(network.traffic.received)));
        parts.push(stat('↑', rate(network.traffic.transmitted)));
      }
      if (battery && battery.chargePercent != null) {
        const t = battery.isCharging
          ? battery.timeTillFull
          : battery.timeTillEmpty;
        const eta = t != null ? ` ${Math.round(t / 60000)}m` : '';
        const icon = battery.isCharging ? '⚡' : '';
        parts.push(stat('BAT', `${icon}${battery.chargePercent.toFixed(0)}%${eta}`));
      }
      statsEl.innerHTML = parts.join('');

      if (clock) clockEl.textContent = clock.formatted;
      if (cal) dateEl.textContent = cal.formatted;
    });
  </script>
</body>
</html>
