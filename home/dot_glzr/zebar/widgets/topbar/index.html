<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zebar Top Bar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: #000;
      font-size: 12px;
      line-height: 28px;
    }

    body.dark {
      background: rgba(20, 20, 20, 0.95);
      color: #fff;
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .left {
      flex: 1;
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .right {
      flex: 0;
      display: flex;
      gap: 20px;
      align-items: center;
      margin-left: 16px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      opacity: 0.8;
      font-weight: 500;
      letter-spacing: -0.3px;
    }

    .divider {
      width: 1px;
      height: 16px;
      background: currentColor;
      opacity: 0.2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="item" id="workspace">1</div>
      <div class="divider"></div>
    </div>
    <div class="right">
      <div class="item" id="time">00:00</div>
    </div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('time').textContent = `${h}:${m}`;
    }

    updateTime();
    setInterval(updateTime, 1000);

    // Update workspace from GlazeWM
    async function updateWorkspace() {
      try {
        const res = await fetch('http://localhost:6119/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: '{ workspaceManager { focusedWorkspaceName } }' })
        });
        const data = await res.json();
        if (data.data?.workspaceManager?.focusedWorkspaceName) {
          document.getElementById('workspace').textContent = data.data.workspaceManager.focusedWorkspaceName;
        }
      } catch (e) {
        // GlazeWM not available
      }
    }

    updateWorkspace();
    setInterval(updateWorkspace, 500);

    // Detect system theme
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.body.classList.add('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
      document.body.classList.toggle('dark', e.matches);
    });
  </script>
</body>
</html>
