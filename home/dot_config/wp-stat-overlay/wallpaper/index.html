<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wallpaper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Background layer: holds a <video>, <iframe>, or <img> chosen at runtime.
       blur / brightness / opacity / zoom are CSS vars applied here. -->
  <div id="bg"></div>

  <!-- Vignette overlay (eased darkened corners). -->
  <div id="vignette"></div>

  <!-- Background load status (errors only). -->
  <div id="bgstatus" class="status" hidden></div>

  <script src="js/background.js"></script>
  <script src="js/look.js"></script>
  <script src="js/typing.js"></script>
  <script src="js/properties.js"></script>
</body>
</html>
