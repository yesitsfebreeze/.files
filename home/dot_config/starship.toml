# Starship prompt — identical on Nushell across Windows / macOS / Linux.
# Theme: Catppuccin Mocha.

"$schema" = "https://starship.rs/config-schema.json"

format = """
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$rust\
$golang\
$python\
[](fg:teal bg:blue)\
$cmd_duration\
[](fg:blue)\
$line_break\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Windows = "󰍲"
Macos = "󰀵"
Linux = "󰌽"
Arch = "󰣇"
Ubuntu = "󰕈"
Debian = "󰣚"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:crust bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = " "
"Music" = "󰝚"
"Pictures" = " "
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "bg:green"
format = '[ $symbol $branch ](fg:crust bg:green)'

[git_status]
style = "bg:green"
format = '[$all_status$ahead_behind ](fg:crust bg:green)'

[cmd_duration]
min_time = 500
style = "fg:crust bg:blue"
format = '[  $duration ]($style)'

[nodejs]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[rust]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[golang]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[python]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[character]
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold blue)"
