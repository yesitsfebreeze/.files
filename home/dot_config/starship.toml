# Starship prompt — identical on Nushell across Linux / WSL / macOS.
# The palette below maps layout-slot names to standard ANSI color names, so the
# prompt is drawn from the terminal's live palette: the shell `theme` switcher
# (tinty / tinted-shell) retints those ANSI colors, and the prompt follows the
# active scheme with no hardcoded hex and no templating.

"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = """
[](surface0)\
$os\
$username\
[](bg:peach fg:surface0)\
$directory\
[](fg:peach bg:green)\
$git_branch\
$git_status\
[](fg:green bg:teal)\
$nodejs\
$rust\
$golang\
$python\
[](fg:teal bg:blue)\
$cmd_duration\
[](fg:blue)\
$line_break\
$character"""

palette = "theme"

[palettes.theme]
surface0 = "bright-black"
peach    = "yellow"
green    = "green"
teal     = "cyan"
blue     = "blue"
crust    = "black"
text     = "white"
red      = "red"

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Arch = "󰣇"
Ubuntu = "󰕈"
Debian = "󰣚"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:red"
format = '[ $user ]($style)'

[directory]
style = "fg:crust bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = " "
"Music" = "󰝚"
"Pictures" = " "
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "bg:green"
format = '[ $symbol $branch ](fg:crust bg:green)'

[git_status]
style = "bg:green"
format = '[$all_status$ahead_behind ](fg:crust bg:green)'

[cmd_duration]
min_time = 500
style = "fg:crust bg:blue"
format = '[  $duration ]($style)'

[nodejs]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[rust]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[golang]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[python]
symbol = ""
style = "bg:teal"
format = '[ $symbol ($version) ](fg:crust bg:teal)'

[character]
format = "$symbol"
success_symbol = "[](bold green)"
error_symbol = "[](bold red)"
vimcmd_symbol = "[](bold blue)"
