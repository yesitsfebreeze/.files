[metadata]
name = "alias"
description = "A channel to select from shell aliases"

[source]
# nu aliases live in config.nu; source it (env-free) and list them via `scope aliases`.
command = "nu -n -c 'source ~/.config/nushell/config.nu; scope aliases | get name | str join (char nl)'"

[preview]
command = "nu -n -c 'source ~/.config/nushell/config.nu; scope aliases | where name == \"{}\" | get 0.expansion'"

[ui.preview_panel]
size = 30
