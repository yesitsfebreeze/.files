# Custom nu-history channel. Overrides tv's builtin default, which runs
# `nu -c '...'` — that cold-starts a full Nushell (re-sourcing starship, zoxide,
# the tv init, theme.nu) on every Ctrl-R, and assumes the plaintext history.txt
# format. Our Nushell uses `file_format: sqlite` (see nushell/config.nu), so the
# default both lagged AND mangled the list (read a SQLiteDatabase as text).
#
# This version: `nu -n` skips all config load (the latency win), and queries the
# sqlite history directly — correct, complete, most-recent-first dedup.
[metadata]
name = "nu-history"
description = "A channel to select from your nu history"

[source]
command = "nu -n -c \"open ~/.config/nushell/history.sqlite3 | query db 'SELECT command_line FROM history GROUP BY command_line ORDER BY MAX(id) DESC' | get command_line | to text\""
no_sort = true
frecency = false
