# television cable channel: `cht.sh` — step 1 of the cht.sh cheatsheet drill: pick a
# language or CLI tool. In `finder`, ctrl-p (pipe) carries the pick into `cht-query`,
# whose source is that language's live topic `:list` (see cht-query.toml) — so you query
# the cht.sh database in steps: lang ▸ query ▸ sheet, with suggestions at every step.
# Standalone (`tv cht.sh` / f5) it is the language browser with a topic-list preview.
#
# source : a curated, OFFLINE list of languages + CLI tools. Offline on purpose — the
#          global cht.sh/:list is ~14k noisy, mixed entries; this keeps the picker fast
#          and always-populated. Only the preview + the query step need the network.
# preview: the hovered language's topic list (cht.sh/<lang>/:list) — a live look at what
#          you can drill into next.
# ctrl-e : open that language's :learn tutorial in a pager.

[metadata]
name = "cht.sh"
description = "cht.sh cheatsheets — pick a language (pipe ▸ cht-query to drill in)"
requirements = ["curl"]

[source]
command = """printf '%s\\n' \
  golang python javascript typescript nodejs deno rust c cpp objc \
  java kotlin scala swift ruby php perl lua elixir erlang clojure \
  haskell ocaml fsharp csharp dart julia r matlab groovy zig nim \
  bash fish powershell sql solidity \
  awk sed grep ripgrep find fd xargs cut sort uniq tr tee \
  tar zip gzip rsync scp ssh curl wget \
  git docker docker-compose kubectl helm terraform ansible \
  jq yq make cmake systemctl journalctl ip ss netstat lsof \
  ffmpeg imagemagick openssl tmux vim chmod chown ln mount"""

[preview]
# nu has no `||`; delegate the curl-or-fallback to bash (same pattern as theme.toml).
command = '''bash -c "curl -sf --max-time 15 'cht.sh/{}/:list' || echo 'cht.sh unreachable (overloaded or offline) — retry'"'''

[ui]
preview_panel = { size = 50 }

[ui.input_bar]
header = "cht.sh language: {}"

[keybindings]
shortcut = "f5"
ctrl-e = "actions:learn"

[actions.learn]
description = "Open this language's :learn tutorial in a pager"
command = "curl -sf --max-time 20 'cht.sh/{}/:learn' | less -R"
mode = "fork"
