# television cable channel: `tv theme` — the live theme switcher's picker.
# source : every scheme tinty knows — the official base16/base24 catalog
#          (`tinty list`) plus our custom-schemes (`tinty list --custom-schemes`:
#          base24-feb and the converted base24-gogh-* themes). Each entry is a
#          "<system>-<slug>" id that `tinty apply` can build + apply on demand.
# preview: theme-preview.sh applies the scheme live (OSC -> /dev/tty) per focus.
# Driven by the `theme` Nushell command: Enter persists, Esc reverts to launch state.

[metadata]
name = "theme"
description = "Live theme switcher — official base16/base24 schemes via tinty, apply-on-focus preview"
requirements = ["tinty"]

# NB: television runs these commands through $SHELL = Nushell, which can't parse
# POSIX-isms (2>/dev/null, subshells, ${VAR:-x}, "$HOME" expansion). So both
# commands delegate to `bash -c '...'`: nu runs bash as a plain external and the
# single-quoted body is handed to bash verbatim. Keep the bodies single-quoted.
[source]
command = "bash -c '( tinty list; tinty list --custom-schemes ) 2>/dev/null | sort -u'"

# `_` is $0; television fills '{}' with the focused entry, which arrives as $1.
[preview]
command = "bash -c '\"$HOME/.config/television/theme-preview.sh\" \"$1\"' _ '{}'"

# When Enter is pressed, commit and push the theme change to git.
[action]
command = "bash -c 'cd \"$(chezmoi source-path)\" && git add --all && git diff --cached --quiet || git commit -m \"theme: {}\" && git push' _"
