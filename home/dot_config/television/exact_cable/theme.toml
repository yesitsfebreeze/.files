# television cable channel: `tv theme` — the live theme switcher's picker.
# source : the cache (liked set + recency stack) at the TOP, then every scheme
#          tinty knows — the official base16/base24 catalog plus our
#          custom-schemes (base24-feb, base16-feb-neon, the converted base24-gogh-*
#          themes). _theme_list (theme.nu) builds the ordered, deduped list;
#          television preserves source order so the cache sits at the head. Each
#          entry is a "<system>-<slug>" id that `tinty apply` can build + apply.
# preview: theme-preview.sh draws a self-contained swatch of the scheme (banner,
# UI mockup, palette) from its own hex values — no live apply, so focusing a scheme
# never retints the terminal or restarts the bar. Driven by the `theme` Nushell
# command: Enter persists + pushes to the recency cache; Esc cancels (nothing to
# revert). Like/unlike via `theme like` / `theme unlike`.

[metadata]
name = "theme"
description = "Live theme switcher — liked + recent cache on top, then the tinty base16/base24 catalog, swatch preview"
requirements = ["tinty"]

# Source delegates to Nushell (where the cache lives): _theme_list emits liked +
# recent + catalog, deduped, cache first. Mirrors recent-dirs.toml's `nu -n -c`.
# NB: the preview/action below run through $SHELL = Nushell, which can't parse
# POSIX-isms (2>/dev/null, subshells, ${VAR:-x}, "$HOME" expansion), so they
# delegate to `bash -c '...'`: nu runs bash as a plain external and the
# single-quoted body is handed to bash verbatim. Keep those bodies single-quoted.
[source]
command = "nu -n -c 'source ~/.config/nushell/theme.nu; _theme_list | str join (char nl)'"

# television substitutes '{}' with the focused entry directly into the command
# string (same as [action] below). Scheme ids are [a-z0-9-] only, so this is safe
# and avoids the brittle `bash -c ... _ '{}'` positional indirection (the entry's
# arg position shifts between tv versions, which left the script with an empty id).
[preview]
command = "bash -c '\"$HOME/.config/television/theme-preview.sh\" \"{}\"'"

# On Enter, just emit the focused id on stdout so the `theme` Nushell wrapper
# applies it (a single `tinty apply`, hooks fire once). An explicit action is
# required so television doesn't fall back to its default — opening the entry in
# $EDITOR (nvim). Deliberately no apply/git here: the wrapper owns the apply.
[action]
command = "bash -c 'printf \"%s\" \"{}\"' _"
