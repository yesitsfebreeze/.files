# television cable channel: `tv theme` — the live theme switcher's picker.
# source : Gogh-derived base24 schemes under tinty's custom-schemes dir, listed
#          directly from the files so the entry format ("base24-<slug>") is
#          deterministic regardless of `tinty list` output across versions.
# preview: theme-preview.sh applies the scheme live (OSC -> /dev/tty) per focus.
# Driven by the `theme` Nushell command: Enter persists, Esc reverts to launch state.

[metadata]
name = "theme"
description = "Live theme switcher — Gogh themes via tinty, apply-on-focus preview"
requirements = ["tinty"]

[source]
command = "ls \"${XDG_DATA_HOME:-$HOME/.local/share}/tinted-theming/tinty/custom-schemes/base24\" 2>/dev/null | grep '\\.yaml$' | sed 's/^/base24-/; s/\\.yaml$//'"

[preview]
command = "\"$HOME/.config/television/theme-preview.sh\" '{}'"
