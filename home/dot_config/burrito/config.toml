# burrito — terminal multiplexer (daemon + 9x9 grid, tool overlays). The host
# terminal is just the window; all multiplexing lives here. burrito has no theme
# of its own — it inherits the terminal's colors, which the `theme` switcher retints.

[settings]
# Leader. Tap twice for the 9x9 grid navigator: jump by coordinate (hjkl /
# qweasdzxc), Enter to commit, [ ] for the MRU ring.
leader = "ctrl+space"

# Run Nushell in every grid cell, on every OS.
shell = "nu"

[grid]
# New cells branch from the active shell's cwd, not burrito's launch dir.
spawn_cwd = "active"

[bindings]
# Built-in actions (defaults; rebindable to any key).
q = ":quit"
"," = ":config"

# Tool overlays — a floating shell over the active pane, gone when dismissed.
g = "!lazygit"
f = "!tv ."
