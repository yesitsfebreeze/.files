# tinty (Tinted Theming) — engine behind the live `theme` switcher. Managed by
# chezmoi. The tinted-shell item emits OSC sequences that retint the terminal's
# ANSI colors live on `tinty apply`. The switcher browses tinty's official
# base16/base24 catalog — the prebuilt tinted-shell scripts that `tinty install`
# clones — so every listed scheme is one tinty can actually apply.
#
# CAVEAT: this machine runs WezTerm -> burrito -> Nushell. OSC palette sequences
# emitted inside a burrito pane may be intercepted by the multiplexer instead of
# forwarded to WezTerm, so WezTerm's own bg/cursor might not follow. The fix is a
# multiplexer-aware path (burrito passthrough or a WezTerm overlay), not this config.
#
# `default-scheme` is our own `base24-feb` — the custom Matrix scheme whose
# palette lives, tracked, next to this file. We ship two variants:
# feb.base16.yaml and feb.base24.yaml; base24 is a superset (adds base10-17 for
# distinct bright ANSI colors) and renders fine wherever base16 does, so it's the
# default and base24-aware programs get the richer palette for free. On `chezmoi
# apply` the run_after_generate-shell-init.sh hook copies each into the
# (gitignored) data-dir at custom-schemes/<system>/feb.yaml and regenerates
# WezTerm's colors.lua from the active scheme, so a fresh checkout lands on feb
# without launching a shell/WezTerm first. The `theme` switcher (and `tinty init`
# from config.nu) then drive the live OSC retint on top; pick anything via the
# switcher and that choice persists over this default.

default-scheme = "base24-feb"
shell = "bash -c '{}'"

[[items]]
name = "tinted-shell"
path = "https://github.com/tinted-theming/tinted-shell"
themes-dir = "scripts"
hook = "source \"$TINTY_THEME_FILE_PATH\" && \"$HOME/.config/tinted-theming/tinty/wezterm-colors.sh\""
supported-systems = ["base16", "base24"]
