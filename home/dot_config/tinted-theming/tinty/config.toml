# tinty (Tinted Theming) — engine behind the live `theme` switcher. Managed by
# chezmoi. The tinted-shell item emits OSC sequences that retint the terminal's
# ANSI colors live on `tinty apply`. The switcher browses tinty's official
# base16/base24 catalog — the prebuilt tinted-shell scripts that `tinty install`
# clones — so every listed scheme is one tinty can actually apply.
#
# CAVEAT: this machine runs WezTerm -> burrito -> Nushell. OSC palette sequences
# emitted inside a burrito pane may be intercepted by the multiplexer instead of
# forwarded to WezTerm, so WezTerm's own bg/cursor might not follow. The fix is a
# multiplexer-aware path (burrito passthrough or a WezTerm overlay), not this config.
#
# `default-scheme` is the Gruvbox base16 hard scheme — matching WezTerm's builtin
# fallback — so a fresh checkout with no prior pick lands on a neutral base, NOT on
# our own feb. Our custom feb scheme still ships and is listed in the switcher: the
# run_after_generate-shell-init.sh hook copies feb.base16.yaml / feb.base24.yaml
# into the (gitignored) data-dir at custom-schemes/<system>/feb.yaml, so `base16-feb`
# / `base24-feb` appear in the `theme` picker alongside the catalog (base24 is a
# superset of base16 — adds base10-17 for distinct bright ANSI). The colors.lua
# generator and `tinty init` resolve the LAST picked scheme (current_scheme) first
# and only fall back to this default when nothing has been picked yet — so your
# last `theme` choice persists across applies and new shells.

default-scheme = "base16-gruvbox-dark-hard"
shell = "bash -c '{}'"

[[items]]
name = "tinted-shell"
path = "https://github.com/tinted-theming/tinted-shell"
themes-dir = "scripts"
hook = "source \"$TINTY_THEME_FILE_PATH\" && \"$HOME/.config/tinted-theming/tinty/wezterm-colors.sh\" && \"$HOME/.config/tinted-theming/tinty/zebar-colors.sh\""
supported-systems = ["base16", "base24"]
