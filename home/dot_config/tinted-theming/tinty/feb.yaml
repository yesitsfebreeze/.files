system: "base16"
name: "feb"
author: "feb — Matrix (digital rain): phosphor green on near-black"
description: "Custom default scheme for this dotfiles repo. Tracked source lives here in the config dir; run_after copies it into the (gitignored) tinty data-dir custom-schemes/ so tinty and wezterm-colors.sh can resolve base16-feb."
variant: "dark"
palette:
  base00: "#0a0e0a" # background — near-black, faint green tint
  base01: "#10180f" # lighter background
  base02: "#1b3a1b" # selection — dark green
  base03: "#357a35" # comments / dim green
  base04: "#4fb84f" # darker foreground
  base05: "#3bff6a" # foreground — phosphor green
  base06: "#9bffb0" # light foreground
  base07: "#e6ffe6" # brightest — pale green-white
  base08: "#ff6b6b" # red — kept distinct for errors
  base09: "#ffb454" # orange
  base0A: "#c8ff5f" # yellow — green-tinted
  base0B: "#00ff41" # green — iconic Matrix green
  base0C: "#2bffd0" # cyan — green-cyan
  base0D: "#23d18b" # blue slot — emerald
  base0E: "#7dffb0" # purple slot — mint
  base0F: "#1f7a1f" # brown slot — dark green
