system: "base24"
name: "feb"
author: "feb — Matrix (digital rain): phosphor green on near-black, base24 variant"
description: "Custom default scheme for this dotfiles repo (base24 superset of feb.base16). Tracked source lives here in the config dir; run_after copies it into the (gitignored) tinty data-dir custom-schemes/ so tinty and wezterm-colors.sh can resolve base24-feb. base24-aware programs use base12-17 for distinct bright ANSI colors."
variant: "dark"
palette:
  base00: "#0a0e0a" # background — near-black, faint green tint
  base01: "#10180f" # lighter background
  base02: "#1b3a1b" # selection — dark green
  base03: "#357a35" # comments / dim green
  base04: "#4fb84f" # darker foreground
  base05: "#3bff6a" # foreground — phosphor green
  base06: "#9bffb0" # light foreground
  base07: "#e6ffe6" # brightest — pale green-white
  base08: "#ff6b6b" # red — kept distinct for errors
  base09: "#ffb454" # orange
  base0A: "#c8ff5f" # yellow — green-tinted
  base0B: "#00ff41" # green — iconic Matrix green
  base0C: "#2bffd0" # cyan — green-cyan
  base0D: "#23d18b" # blue slot — emerald
  base0E: "#7dffb0" # purple slot — mint
  base0F: "#1f7a1f" # brown slot — dark green
  base10: "#060906" # darker background
  base11: "#030503" # darkest background
  base12: "#ff9d9d" # bright red
  base13: "#e4ff9b" # bright yellow
  base14: "#6dff8f" # bright green
  base15: "#74ffe4" # bright cyan
  base16: "#7affc0" # bright blue — bright emerald
  base17: "#b3ffd1" # bright purple — bright mint
