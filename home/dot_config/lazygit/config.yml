# lazygit configuration. Theme colors use standard ANSI color names, so lazygit
# is drawn from the terminal's live palette — the shell `theme` switcher (tinty /
# tinted-shell) retints those ANSI colors and lazygit follows the active scheme.
# No hardcoded hex, no templating.
gui:
  nerdFontsVersion: "3"
  scrollHeight: 2
  showFileTree: true
  showRandomTip: false
  showCommandLog: false
  theme:
    activeBorderColor:
      - "yellow"
      - bold
    inactiveBorderColor:
      - "white"
    optionsTextColor:
      - "blue"
    selectedLineBgColor:
      - "blue"
    cherryPickedCommitBgColor:
      - "cyan"
    cherryPickedCommitFgColor:
      - "yellow"
    unstagedChangesColor:
      - "red"
    defaultFgColor:
      - "default"
    searchingActiveBorderColor:
      - "yellow"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
  parseEmoji: true

os:
  editPreset: "nvim"
