# lazygit configuration — Catppuccin Mocha (mauve accent).
gui:
  nerdFontsVersion: "3"
  scrollHeight: 2
  showFileTree: true
  showRandomTip: false
  showCommandLog: false
  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#cba6f7"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#f9e2af"

git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never
  parseEmoji: true

os:
  editPreset: "nvim"
