# Central theme definition for the whole machine — single source of truth.
#
# Change values here, run `chezmoi apply`, and every tool re-themes together:
# wezterm, nushell, starship, nvim (colorscheme + lualine), bat, lazygit,
# git/delta. Templates under home/ read from `.theme`.
#
# Active theme: Gruvbox Dark Hard.  Cursor: blinking block everywhere.
theme:
  # Theme identifiers consumed by tools that ship the theme themselves
  # (the setup() call in nvim is plugin-specific; see colorscheme.lua.tmpl).
  names:
    bat: "gruvbox-dark"           # built into bat (no fetch needed)
    delta: "gruvbox-dark"         # delta reads bat's theme set
    nvim_plugin: "ellisonleao/gruvbox.nvim"
    nvim_colorscheme: "gruvbox"
    nvim_background: "dark"
    nvim_contrast: "hard"
    lualine: "gruvbox"
    zellij: "gruvbox-dark"        # built into zellij
    television: "gruvbox-dark"    # built into television (themes/gruvbox-dark.toml)

  # Cursor. wezterm uses CamelCase styles; nvim uses a guicursor spec;
  # nushell only controls shape (the terminal handles blinking).
  cursor:
    wezterm: "BlinkingBlock"
    nushell: "block"
    nvim_guicursor: "a:block-blinkwait700-blinkon400-blinkoff250"

  # Palette — Gruvbox Dark Hard. Raw hex for tools that need explicit colors.
  palette:
    bg0:        "#1d2021"  # hard background
    bg1:        "#3c3836"
    bg2:        "#504945"
    bg3:        "#665c54"
    bg4:        "#7c6f64"
    fg0:        "#fbf1c7"
    fg1:        "#ebdbb2"  # main foreground
    fg2:        "#d5c4a1"
    fg3:        "#bdae93"
    fg4:        "#a89984"
    gray:       "#928374"
    # bright accents
    red:        "#fb4934"
    green:      "#b8bb26"
    yellow:     "#fabd2f"
    blue:       "#83a598"
    purple:     "#d3869b"
    aqua:       "#8ec07c"
    orange:     "#fe8019"
    # neutral (dim) accents — used for ANSI normal colors
    red_dim:    "#cc241d"
    green_dim:  "#98971a"
    yellow_dim: "#d79921"
    blue_dim:   "#458588"
    purple_dim: "#b16286"
    aqua_dim:   "#689d6e"

  # Diff frame backgrounds (git/delta). Dark gruvbox-tinted red/green.
  diff:
    minus_bg:      "#402120"
    minus_emph_bg: "#5a2c28"
    plus_bg:       "#28301d"
    plus_emph_bg:  "#3d4a23"
