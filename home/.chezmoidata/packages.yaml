# Single source of truth for what the dotfiles install: each entry maps one tool
# to its package name per manager (empty string = not packaged there, installer
# skips or falls back). Linux/WSL is the target; macOS via Homebrew; Windows boots
# into WSL. Editing this re-triggers the run_onchange installer on next apply.

packages:
    - name: burrito       # terminal multiplexer (daemon + 9x9 grid nav, tool overlays), shell-side
      brew: ""            # not packaged on any manager; built from source via cargo (see cargo_git + installer)
      apt: ""
      pacman: ""
      dnf: ""
      cargo_git: https://github.com/yesitsfebreeze/burrito   # source of truth: `cargo install --git` this repo

    - name: neovim
      brew: neovim
      apt: neovim
      pacman: neovim
      dnf: neovim

    - name: nushell
      brew: nushell
      apt: ""           # not in default apt; cargo/brew/official repo
      pacman: nushell
      dnf: ""

    - name: ripgrep
      brew: ripgrep
      apt: ripgrep
      pacman: ripgrep
      dnf: ripgrep

    - name: fd
      brew: fd
      apt: fd-find       # binary is `fdfind` on Debian/Ubuntu
      pacman: fd
      dnf: fd-find

    - name: fzf
      brew: fzf
      apt: fzf
      pacman: fzf
      dnf: fzf

    - name: entr          # run arbitrary commands when files change (file-watcher)
      brew: entr
      apt: entr
      pacman: entr
      dnf: entr

    - name: television    # fuzzy finder TUI (binary: `tv`) — interactive in-shell finder (Ctrl-R history, Ctrl-T autocomplete)
      brew: television
      apt: ""             # not in Debian/Ubuntu repos; installed via GitHub-release musl binary fallback (see installer)
      pacman: television
      dnf: ""             # not packaged for Fedora; GitHub-release binary / cargo fallback

    - name: bat
      brew: bat
      apt: bat           # binary is `batcat` on Debian/Ubuntu
      pacman: bat
      dnf: bat

    - name: zoxide
      brew: zoxide
      apt: zoxide
      pacman: zoxide
      dnf: zoxide

    - name: starship
      brew: starship
      apt: ""            # use official installer; not in apt
      pacman: starship
      dnf: ""

    - name: jq
      brew: jq
      apt: jq
      pacman: jq
      dnf: jq

    - name: imagemagick   # bake gaussian blur into the wezterm background image (`magick`/`convert`)
      brew: imagemagick
      apt: imagemagick
      pacman: imagemagick
      dnf: imagemagick

    - name: python3       # used to extract Nerd Font zips during install and as a
      brew: python        # common base dep. Stdlib only — no pip packages needed.
      apt: python3
      pacman: python
      dnf: python3

    - name: git
      brew: git
      apt: git
      pacman: git
      dnf: git

    - name: delta
      brew: git-delta
      apt: ""            # `git-delta` not in default apt; cargo/brew/repo
      pacman: git-delta
      dnf: git-delta

    - name: lazygit
      brew: lazygit
      apt: ""            # PPA/repo needed; not in default apt
      pacman: lazygit
      dnf: lazygit

    - name: gh
      brew: gh
      apt: ""            # not in default apt (needs GitHub's apt repo); installed via GitHub-release binary fallback (see installer)
      pacman: github-cli
      dnf: gh

    - name: worktrunk     # git worktree manager (binary: `wt`) — parallel-agent worktree workflows
      brew: worktrunk     # in homebrew-core; covers macOS + Linuxbrew
      apt: ""             # not in Debian/Ubuntu repos; installed via GitHub-release musl binary fallback (see installer)
      pacman: ""          # AUR-only; GitHub-release binary / cargo fallback
      dnf: ""             # not packaged for Fedora; GitHub-release binary / cargo fallback
      gh_release: max-sixty/worktrunk   # source of truth: prebuilt `wt` binary (.tar.xz) from this repo's latest release

    - name: just          # command runner / `.justfile` task automation (casey/just)
      brew: just
      apt: just           # in Debian 13+/Ubuntu 24.04+; older releases fall back to cargo
      pacman: just
      dnf: just

    - name: bubblewrap    # Linux subprocess sandbox (binary: `bwrap`); the `claude` CLI requires it for
      brew: ""            # env scrubbing / plugin installs. macOS uses Seatbelt (sandbox-exec), so no brew pkg.
      apt: bubblewrap
      pacman: bubblewrap
      dnf: bubblewrap

    - name: gnupg         # GPG (binary: `gpg`) — required backend for `pass`; encrypts each entry
      brew: gnupg
      apt: gnupg
      pacman: gnupg
      dnf: gnupg2         # Fedora packages GnuPG 2 as `gnupg2` (provides `gpg`)

    - name: pass          # standard unix password manager (gpg-backed password-store)
      brew: pass
      apt: pass
      pacman: pass
      dnf: pass

    - name: tinty         # Tinted Theming CLI — base16/base24 engine behind the live `theme` switcher
      brew: tinted-theming/tinty/tinty   # not in homebrew-core; fully-qualified name auto-taps tinted-theming/tinty
      apt: ""             # not in Debian/Ubuntu repos; installed via GitHub-release musl binary fallback (see installer)
      pacman: ""          # AUR-only (tinty); GitHub-release binary / cargo fallback
      dnf: ""             # not packaged for Fedora; GitHub-release binary / cargo fallback

    - name: kern          # self-learning memory daemon + MCP server for AI agents (per-cwd knowledge graph)
      brew: ""            # not packaged on any manager; installed via GitHub-release binary fallback (see installer)
      apt: ""
      pacman: ""
      dnf: ""             # the crates.io `kern` is an unrelated library, so no cargo fallback
      gh_release: yesitsfebreeze/relay-kern   # source of truth: prebuilt `kern` binary from this repo's latest release

    - name: pi            # pi coding agent (earendil-works) — npm-published CLI (binary: `pi`)
      brew: ""            # not on any package manager; installed globally via npm (see installer)
      apt: ""
      pacman: ""
      dnf: ""
      npm: "@earendil-works/pi-coding-agent"   # source of truth: global npm package name

    - name: docker        # container engine. Special-cased in the installer (see the "docker" block):
      brew: ""            # WSL + Windows Docker Desktop reachable -> shim `docker` to it (windows ?? local);
      apt: ""             # otherwise install Docker Engine natively from Docker's official apt repo, enable
      pacman: docker      # the service, and add the user to the docker group. apt is handled by the block;
      dnf: docker         # pacman/dnf just get the plain package as a baseline (no WSL there anyway).

    # Chromium/Electron runtime libs (no binary, Linux-only): headless chromium and
    # Electron link against NSS/NSPR at runtime. The playwright install-deps block
    # pulls these too, but only when npx is present and sudo is non-interactive, so
    # list them explicitly to guarantee them on every apt run. `lib: true` marks
    # them binary-less so the cargo/missing-check loops skip them.
    - name: libnss3       # Network Security Services — chromium/electron runtime dep
      lib: true
      brew: ""            # macOS chromium uses system frameworks; not needed
      apt: libnss3
      pacman: nss
      dnf: nss

    - name: libnspr4      # Netscape Portable Runtime — companion to NSS
      lib: true
      brew: ""
      apt: libnspr4
      pacman: nspr
      dnf: nspr

    # Nerd Font: package-manager coverage is thin, so the installer also fetches it
    # from the nerd-fonts release when missing (nerdfont_asset, below).
    - name: karabiner-elements   # macOS keyboard customizer (GUI app + DriverKit virtual-HID extension).
      brew: karabiner-elements   # Used here ONLY for its per-device "disable the built-in keyboard while
      cask: true                 # this device is connected" setting (see run_after_karabiner-disable-
      apt: ""                    # internal-keyboard.sh). macOS-only — no Linux/Windows equivalent, so the
      pacman: ""                 # non-brew managers leave it blank and skip it. First launch needs a
      dnf: ""                    # one-time Input-Monitoring grant + driver-extension approval in Settings.

    - name: nerd-font
      brew: font-departure-mono-nerd-font   # cask
      cask: true
      apt: ""               # not packaged; installed via nerd-fonts release fallback
      pacman: ""            # AUR-only (otf-departure-mono-nerd); use release fallback
      dnf: ""               # not packaged; release fallback
      nerdfont_asset: DepartureMono         # nerd-fonts release zip basename -> download fallback source
