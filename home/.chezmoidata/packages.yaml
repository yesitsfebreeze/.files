# Single source of truth for what the dotfiles install.
# Each entry maps one logical tool to its package name per manager.
# An empty string means "no package under this manager" -> the installer skips it.
#
# Linux/WSL is the target; macOS is supported via Homebrew. On Windows there is
# no native install: WezTerm boots straight into WSL Ubuntu and everything is
# provisioned there with the Linux path.
#
# Consumed at render time by:
#   run_onchange_install-packages.sh.tmpl   (brew / apt / pacman / dnf)
#
# Keep this list as the place you add/remove tools. Editing it re-triggers the
# run_onchange installer on the next `chezmoi apply`.

packages:
    # --- core experience: terminal, editor, shell, multiplexer ---
    - name: wezterm
      brew: wezterm
      cask: true
      apt: ""           # no reliable apt package; install via official repo/AppImage manually
      pacman: wezterm
      dnf: ""

    - name: zellij        # terminal multiplexer (tabs/panes/session-restore), shell-side
      brew: zellij
      apt: ""             # not in Debian/Ubuntu repos; installed via GitHub-release musl binary fallback (see installer)
      pacman: zellij
      dnf: zellij

    - name: neovim
      brew: neovim
      apt: neovim
      pacman: neovim
      dnf: neovim

    - name: nushell
      brew: nushell
      apt: ""           # not in default apt; cargo/brew/official repo
      pacman: nushell
      dnf: ""

    # --- modern CLI core ---
    - name: ripgrep
      brew: ripgrep
      apt: ripgrep
      pacman: ripgrep
      dnf: ripgrep

    - name: fd
      brew: fd
      apt: fd-find       # binary is `fdfind` on Debian/Ubuntu
      pacman: fd
      dnf: fd-find

    - name: fzf
      brew: fzf
      apt: fzf
      pacman: fzf
      dnf: fzf

    - name: television    # fuzzy finder TUI (binary: `tv`) — interactive in-shell finder (Ctrl-R history, Ctrl-T autocomplete)
      brew: television
      apt: ""             # not in Debian/Ubuntu repos; installed via GitHub-release musl binary fallback (see installer)
      pacman: television
      dnf: ""             # not packaged for Fedora; GitHub-release binary / cargo fallback

    - name: bat
      brew: bat
      apt: bat           # binary is `batcat` on Debian/Ubuntu
      pacman: bat
      dnf: bat

    - name: eza
      brew: eza
      apt: ""            # not in older apt; cargo/brew/repo
      pacman: eza
      dnf: eza

    - name: zoxide
      brew: zoxide
      apt: zoxide
      pacman: zoxide
      dnf: zoxide

    - name: starship
      brew: starship
      apt: ""            # use official installer; not in apt
      pacman: starship
      dnf: ""

    - name: jq
      brew: jq
      apt: jq
      pacman: jq
      dnf: jq

    # --- git experience ---
    - name: git
      brew: git
      apt: git
      pacman: git
      dnf: git

    - name: delta
      brew: git-delta
      apt: ""            # `git-delta` not in default apt; cargo/brew/repo
      pacman: git-delta
      dnf: git-delta

    - name: lazygit
      brew: lazygit
      apt: ""            # PPA/repo needed; not in default apt
      pacman: lazygit
      dnf: lazygit

    - name: gh
      brew: gh
      apt: ""            # not in default apt (needs GitHub's apt repo); installed via GitHub-release binary fallback (see installer)
      pacman: github-cli
      dnf: gh

    # --- font: DepartureMono Nerd Font for prompt/eza/lualine glyphs ---
    # Package-manager coverage is thin for this font, so the installer also fetches
    # it from the nerd-fonts release when missing (nerdfont_asset, below). That
    # download path is the "install if not available" guarantee; the per-manager
    # fields are used where they exist.
    - name: nerd-font
      brew: font-departure-mono-nerd-font   # cask
      cask: true
      apt: ""               # not packaged; installed via nerd-fonts release fallback
      pacman: ""            # AUR-only (otf-departure-mono-nerd); use release fallback
      dnf: ""               # not packaged; release fallback
      nerdfont_asset: DepartureMono         # nerd-fonts release zip basename -> download fallback source
