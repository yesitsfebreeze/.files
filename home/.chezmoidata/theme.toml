# The ONLY tracked theme state — the single source of truth that syncs the active
# tinty scheme across machines. Everything else (WezTerm colors.lua, Zebar theme.css,
# GlazeWM's focused-border green) is a derived artifact regenerated locally from this:
#
#   - scheme : the last-picked tinty scheme id. run_after_generate-shell-init.sh.tmpl
#              reads it on `chezmoi apply` and runs `tinty apply <scheme>`, which fires
#              the color hooks to regenerate every deployed artifact on this machine.
#   - green  : base0B of that scheme — the one value GlazeWM's config.yaml.tmpl needs
#              inlined (`color: '{{ .theme.green }}' # tinty:base0B`), since config.yaml
#              is hand-maintained and can't be a fully-generated file.
#
# Both fields are rewritten by wezterm-colors.sh when you switch themes (the live
# `theme` picker), so a switch on one machine becomes a one-line commit the others
# adopt on apply. The generated files are NO LONGER tracked, so they never conflict.
[theme]
scheme = "base16-ascendancy"
green = "#b8bb26"
